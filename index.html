<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>The Vault - Home</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
body{font-family:'Inter',sans-serif;background:#020617;color:#e2e8f0}
.mono{font-family:'JetBrains Mono',monospace}
.card{background:rgba(15,23,42,.6);border:1px solid #1e293b;border-radius:1rem}
.btn{padding:.75rem 1rem;border-radius:.75rem;font-weight:600;transition:.2s}
.btn-primary{background:#f59e0b;color:#020617}
.btn-primary:hover{background:#fbbf24}
.btn-secondary{background:#1e293b;color:#e2e8f0;border:1px solid #334155}
.btn-secondary:hover{background:#334155}
.btn-disabled{opacity:.5;cursor:not-allowed}
</style>
</head>
<body class="min-h-screen">
<div class="max-w-4xl mx-auto px-4 py-12">
  <div class="text-center mb-10">
    <div class="inline-flex items-center gap-3 mb-4">
      <div class="w-12 h-12 rounded-2xl bg-gradient-to-br from-amber-400 to-orange-600 flex items-center justify-center">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" class="text-slate-950"><path d="M12 3l7 4v10l-7 4-7-4V7l7-4z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/></svg>
      </div>
      <h1 class="text-3xl font-bold">The Vault</h1>
    </div>
    <p class="text-slate-400">Sleeper x RosterAudit • Dynasty Tools</p>
  </div>

  <div class="card p-6 mb-8">
    <h2 class="text-xl font-semibold mb-4">Sign in with Sleeper</h2>
    <div class="grid sm:grid-cols-[1fr_120px_120px] gap-3 mb-4">
      <input id="username" placeholder="Sleeper username" class="h-12 px-4 rounded-xl bg-slate-950 border border-slate-800 focus:border-amber-500 outline-none" />
      <select id="year" class="h-12 px-3 rounded-xl bg-slate-950 border border-slate-800 outline-none">
        <option>2026</option><option selected>2025</option><option>2024</option><option>2023</option><option>2022</option><option>2021</option><option>2020</option><option>2019</option><option>2018</option><option>2017</option><option>2016</option><option>2015</option>
      </select>
      <button id="load" class="btn btn-primary">Load Leagues</button>
    </div>
    <select id="league" disabled class="w-full h-12 px-3 rounded-xl bg-slate-950 border border-slate-800 outline-none disabled:opacity-50">
      <option value="">Select league...</option>
    </select>
    <p id="status" class="text-sm text-slate-500 mt-3 hidden"></p>
  </div>

  <div class="grid md:grid-cols-3 gap-4">
    <button id="btnOverview" class="card p-6 text-left hover:border-amber-500/50 transition btn-disabled" disabled>
      <div class="w-10 h-10 rounded-xl bg-emerald-500/15 border border-emerald-500/30 grid place-items-center mb-3">📊</div>
      <h3 class="font-semibold text-lg mb-1">League Overview</h3>
      <p class="text-sm text-slate-400">Power rankings, team strengths, cap space</p>
    </button>
    <button id="btnRankings" class="card p-6 text-left hover:border-amber-500/50 transition btn-disabled" disabled>
      <div class="w-10 h-10 rounded-xl bg-sky-500/15 border border-sky-500/30 grid place-items-center mb-3">🏈</div>
      <h3 class="font-semibold text-lg mb-1">Player Rankings</h3>
      <p class="text-sm text-slate-400">Top 1000 with RA values & PPG</p>
    </button>
    <button id="btnTrade" class="card p-6 text-left hover:border-amber-500/50 transition btn-disabled" disabled>
      <div class="w-10 h-10 rounded-xl bg-amber-500/15 border border-amber-500/30 grid place-items-center mb-3">⚖️</div>
      <h3 class="font-semibold text-lg mb-1">Trade Calculator</h3>
      <p class="text-sm text-slate-400">Side-by-side trade analyzer</p>
    </button>
  </div>
</div>

<script>
const $ = s => document.querySelector(s);
const username = $('#username');
const year = $('#year');
const loadBtn = $('#load');
const leagueSel = $('#league');
const statusEl = $('#status');
const btnOverview = $('#btnOverview');
const btnRankings = $('#btnRankings');
const btnTrade = $('#btnTrade');

function setStatus(msg){ statusEl.textContent = msg; statusEl.classList.remove('hidden'); }
function clearStatus(){ statusEl.classList.add('hidden'); }

async function loadLeagues(){
  const u = username.value.trim();
  if(!u) return alert('Enter username');
  loadBtn.disabled = true; loadBtn.textContent = 'Loading...';
  setStatus('Fetching user...');
  try{
    const userRes = await fetch(`https://api.sleeper.app/v1/user/${encodeURIComponent(u)}`);
    if(!userRes.ok) throw new Error('User not found');
    const user = await userRes.json();
    setStatus('Fetching leagues...');
    const leaguesRes = await fetch(`https://api.sleeper.app/v1/user/${user.user_id}/leagues/nfl/${year.value}`);
    const leagues = await leaguesRes.json();
    leagueSel.innerHTML = '<option value="">Select league...</option>';
    leagues.forEach(l=>{
      const opt = document.createElement('option');
      opt.value = l.league_id;
      opt.textContent = `${l.name} • ${l.total_rosters} teams`;
      leagueSel.appendChild(opt);
    });
    leagueSel.disabled = leagues.length===0;
    clearStatus();
    if(leagues.length===0) setStatus('No leagues found for that year');
  }catch(e){
    setStatus(e.message);
  }finally{
    loadBtn.disabled = false; loadBtn.textContent = 'Load Leagues';
  }
}

function updateButtons(){
  const lid = leagueSel.value;
  const disabled = !lid;
  [btnOverview, btnRankings, btnTrade].forEach(b=>{
    b.disabled = disabled;
    b.classList.toggle('btn-disabled', disabled);
  });
}

function go(page){
  const lid = leagueSel.value;
  if(!lid) return;
  location.href = `${page}?league_id=${lid}`;
}

loadBtn.onclick = loadLeagues;
leagueSel.onchange = updateButtons;
btnOverview.onclick = ()=>go('app.html');
btnRankings.onclick = ()=>go('player_rankings.html');
btnTrade.onclick = ()=>go('trade.html');

username.addEventListener('keydown', e=>{ if(e.key==='Enter') loadLeagues(); });
</script>
</body>
</html>
