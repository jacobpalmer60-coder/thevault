<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>The Vault - Enter Sleeper Username</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
body{font-family:Inter,system-ui;background:#050a14;color:#fde68a}
.card{background:linear-gradient(180deg,#0b1220 0%,#070b14 100%);border:1px solid rgba(251,191,36,.15)}
</style>
</head>
<body class="min-h-screen grid place-items-center p-4">
<div class="card rounded-2xl p-8 max-w-md w-full">
<h1 class="text-2xl font-bold text-amber-300 mb-2">The Vault</h1>
<p class="text-amber-100/80 text-sm mb-6">Enter your Sleeper username to view your leagues.</p>
<form id="form" class="flex gap-2">
<input id="user" placeholder="e.g., cooterdoodle" class="flex-1 bg-[#0b1324] border border-amber-900/40 rounded-xl px-3 py-2.5 outline-none focus:border-amber-500/50 text-amber-100" required>
<button class="px-4 py-2.5 rounded-xl bg-amber-500 hover:bg-amber-400 text-slate-900 font-semibold">Continue</button>
</form>
<p class="text-[11px] text-amber-300/60 mt-4">Powered by Sleeper × RosterAudit</p>
</div>
<script>
document.getElementById('form').addEventListener('submit',e=>{
 e.preventDefault();
 const u=document.getElementById('user').value.trim();
 if(u) location.href=`app.html?user=${encodeURIComponent(u)}`;
});
</script>
</body>
</html>
