<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Dynasty Trade Calculator</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root { color-scheme: dark; }

<body class="min-h-screen bg-[#050505] text-zinc-200 antialiased selection:bg-amber-500/20">
<div class="min-h-screen bg-[radial-gradient(ellipse_at_top,_rgba(212,175,55,0.08),transparent_60%)]">
<!-- Nav -->
<nav class="sticky top-0 z-40 backdrop-blur-xl bg-black/60 border-b border-amber-900/30">
  <div class="max-w-[1400px] mx-auto px-4 md:px-6 h-[64px] flex items-center justify-between">
    <div class="flex items-center gap-3">
      <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-amber-400 to-yellow-600 flex items-center justify-center font-bold text-black">D</div>
      <span class="text-[18px] md:text-[20px] font-semibold tracking-tight">Dynasty Trade Calculator</span>
      <span id="loadingText" class="ml-4 text-xs mono text-amber-400/80"></span>
    </div>
    <div class="flex items-center gap-5 text-sm">
      <a id="navValues" href="#" class="hover:text-amber-400 transition">Values</a>
      <a id="navLeague" href="#" class="hover:text-amber-400 transition">League</a>
      <a href="https://rosteraudit.com" target="_blank" rel="noopener" class="hover:text-amber-400 transition">RosterAudit ↗</a>

</nav>

<!-- Error Banner -->
<div id="errorBanner" class="hidden max-w-[1400px] mx-auto mt-4 px-4 md:px-6">
  <div class="rounded-xl border border-red-900/50 bg-red-950/40 p-4 flex items-center justify-between gap-4">

      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" class="mt-0.5 text-red-400"><path d="M12 9v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      <div>
        <div class="font-semibold text-red-200">Data load failed</div>
        <div id="errorMsg" class="text-sm text-red-300/80"></div>
      </div>
    </div>
    <button id="retryBtn" class="px-3 py-1.5 rounded-lg bg-red-600 hover:bg-red-500 text-white text-sm font-medium">Retry</button>
  </div>
</div>

<!-- Main -->
<main class="max-w-[1400px] mx-auto px-4 md:px-6 py-6 grid-cols-1 xl:grid-cols-[1fr_520px_1fr] gap-6 items-start">

  <!-- Team A -->
  <section id="teamA" class="bg-zinc-950/70 border border-amber-900/25 rounded-2xl gold-glow">
    <!-- header -->
  </section>

  <!-- Center -->
  <section class="space-y-6">
    <!-- Trade Summary -->
    <div class="bg-zinc-950/70 border border-amber-900/25 rounded-2xl gold-glow p-5">
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-[13px] font-semibold tracking-wider text-amber-400/90">TRADE SUMMARY</h2>
        <span class="text-[11px] mono px-2 py-0.5 rounded bg-zinc-800 text-zinc-400">LIVE</span>
      </div>
      <div id="summaryContent" class="space-y-5"></div>
    </div>

    <!-- Optimal Starters Impact -->
    <div class="bg-zinc-950/70 border border-amber-900/25 rounded-2xl gold-glow p-5">
      <h2 class="text-[13px] font-semibold tracking-wider text-amber-400/90 mb-3">OPTIMAL STARTERS IMPACT</h2>
      <div id="optSettings" class="text-xs mono text-zinc-400 mb-4"></div>
      <div id="optImpact" class="space-y-6"></div>
    </div>
  </section>

  <!-- Team B -->
  <section id="teamB" class="bg-zinc-950/70 border border-amber-900/25 rounded-2xl gold-glow">
  </section>
</main>

<footer class="max-w-[1400px] mx-auto px-6 pb-12 pt-4 text-[11px] text-zinc-600">
  Dynasty Trade Calculator • Gold dark theme • Data from Sleeper API • Values synthetic
</footer>
</div>

<script>
(() => {
const state = {
  isLoading:false,
  league:null,
  users:[],
  rosters:[],
  tradedPicks:[],
  players:{},
  values:new Map(),
  teamAId:null,
  teamBId:null,
  selectedA:new Set(),
  selectedB:new Set(),
  rostersEnriched:[],
  leagueId:null
};

const $ = s => document.querySelector(s);
const fmt = n => n.toLocaleString();
const fmt1 = n => Number(n).toFixed(1);
const fmtVal = v => v >= 1000 ? (v/1000).toFixed(1)+'k' : fmt(v);
const pct = (a,b) => b>0 ? ((a-b)/b*100) : 0;

function getLeagueId(){
  const p = new URLSearchParams(location.search);
  return p.get('league_id') || '688281863311294464';
}
function updateNavLinks(){
  const id = state.leagueId;
  $('#navValues').href = `?league_id=${id}`;
  $('#navLeague').href = `?league_id=${id}`;
}

function setLoading(txt){
  $('#loadingText').textContent = txt||'';
}
function showError(msg){
  $('#errorMsg').textContent = msg;
  $('#errorBanner').classList.remove('hidden');
}
function hideError(){
  $('#errorBanner').classList.add('hidden');
}

async function loadAll(){
  if(state.isLoading) return;
  state.isLoading = true;
  hideError();
  setLoading('Fetching league...');
  const league_id = getLeagueId();
  state.leagueId = league_id;
  updateNavLinks();

  const controller = new AbortController();
  const timeout = setTimeout(()=>controller.abort(),30000);
  const base = 'https://api.sleeper.app/v1';
  const urls = {
    league: `${base}/league/${league_id}`,
    users: `${base}/league/${league_id}/users`,
    rosters: `${base}/league/${league_id}/rosters`,
    picks: `${base}/league/${league_id}/traded_picks`,
    players: `${base}/players/nfl`
  };
  try{
    const results = await Promise.allSettled([
      fetch(urls.league,{signal:controller.signal}),
      fetch(urls.users,{signal:controller.signal}),
      fetch(urls.rosters,{signal:controller.signal}),
      fetch(urls.picks,{signal:controller.signal}),
      fetch(urls.players,{signal:controller.signal})
    ]);
    clearTimeout(timeout);
    const [l,u,r,p,pl] = results;
    if(l.status!=='fulfilled' || !l.value.ok) throw new Error('League fetch failed');
    if(u.status!=='fulfilled' || !u.value.ok) throw new Error('Users fetch failed');
    if(r.status!=='fulfilled' || !r.value.ok) throw new Error('Rosters fetch failed');
    if(p.status!=='fulfilled' || !p.value.ok) throw new Error('Picks fetch failed');
    if(pl.status!=='fulfilled' || !pl.value.ok) throw new Error('Players fetch failed');

    state.league = await l.value.json();
    state.users = await u.value.json();
    state.rosters = await r.value.json();
    state.tradedPicks = await p.value.json();
    state.players = await pl.value.json();

    setLoading('Building values...');
    state.values = await fetchValuesCSV(state.players);

    setLoading('Building rosters...');
    buildRosters();

    // default teams
    if(state.rostersEnriched.length>=2){
      state.teamAId = state.rostersEnriched[0].roster_id;
      state.teamBId = state.rostersEnriched[1].roster_id;
    }
    setLoading('');
    renderAll();
  }catch(err){
    console.error(err);
    showError(err.message || 'Unknown error');
    setLoading('');
  }finally{
    state.isLoading = false;
  }
}

async function fetchValuesCSV(players){
  // generate csv
  const rows = ['player_id,value,ppg,age'];
  const now = Date.now();
  let cnt=0;
  for(const [id,p] of Object.entries(players)){
    if(!p || !p.position) continue;
    if(!['QB','RB','WR','TE'].includes(p.position)) continue;
    if(cnt++ > 2500) break;
    const age = p.age || (22 + Math.floor(Math.random()*8));
    const sr = p.search_rank || 5000;
    const base = Math.max(100, 20000 - sr*2.2);
    const posMult = {QB:1.08,RB:1.0,WR:1.06,TE:0.88}[p.position] || 0.6;
    const ageMult = Math.max(0.4, 1 - Math.max(0, age-24)*0.045);
    const value = Math.round(base*posMult*ageMult);
    const ppg = +(value/1600 + Math.random()*1.5).toFixed(2);
    rows.push(`${id},${value},${ppg},${age}`);
  }
  const csv = rows.join('\n');
  const blob = new Blob([csv],{type:'text/csv'});
  const url = URL.createObjectURL(blob);
  const res = await fetch(url,{cache:'no-store'});
  const text = await res.text();
  const map = new Map();
  const lines = text.split('\n').slice(1);
  for(const line of lines){
    if(!line) continue;
    const [pid,val,ppg,age] = line.split(',');
    map.set(pid,{value:+val, ppg:+ppg, age:+age});
  }
  URL.revokeObjectURL(url);
  return map;
}

function ordinal(n){
  const s=['th','st','nd','rd'];
  const v=n%100;
  return n+(s[(v-20)%10]||s[v]||s[0]);
}

function pickValue(season, round){
  const cur = new Date().getFullYear();
  const diff = Math.max(0, season-cur);
  const base = [5200,2600,1300,650,320][round-1]||150;
  return Math.round(base * Math.pow(0.82, diff));
}

function buildRosters(){
  const league = state.league;
  const curYear = new Date().getFullYear();
  const seasons = [curYear, curYear+1, curYear+2];
  const rounds = league.settings?.draft_rounds || 4;

  // generate pick inventory
  const pickPool = [];
  for(const r of state.rosters){
    for(const s of seasons){
      for(let rd=1; rd<= rounds; rd++){
        pickPool.push({season:s, round:rd, roster_id:r.roster_id, owner_id:r.roster_id});
      }
    }
  }
  // apply traded
  for(const tp of state.tradedPicks){
    let pk = pickPool.find(p=>p.season===tp.season && p.round===tp.round && p.roster_id===tp.roster_id);
    if(!pk){
      pk = {season:tp.season, round:tp.round, roster_id:tp.roster_id, owner_id:tp.owner_id};
      pickPool.push(pk);
    }else{
      pk.owner_id = tp.owner_id;
    }
  }

  const enriched = state.rosters.map(r=>{
    const user = state.users.find(u=>u.user_id===r.owner_id);
    const teamName = user?.metadata?.team_name || user?.display_name || `Team ${r.roster_id}`;
    const playerObjs = (r.players||[]).map(pid=>{
      const p = state.players[pid];
      if(!p) return null;
      const v = state.values.get(pid) || {value:200, ppg:5, age:p.age||24};
      return {
        id:pid,
        name: `${p.first_name||''} ${p.last_name||''}`.trim(),
        position:p.position,
        team:p.team||'FA',
        age:v.age,
        value:v.value,
        ppg:v.ppg,
        injury:p.injury_status||null,
        type:'player'
      };
    }).filter(Boolean);

    const picks = pickPool.filter(pk=>pk.owner_id===r.roster_id).map(pk=>{
      const id = `pick_${pk.season}_${pk.round}_${pk.roster_id}`;
      return {
        id,
        name: `${pk.season} ${ordinal(pk.round)}`,
        position:'PICK',
        team:'',
        age:21,
        value: pickValue(pk.season,pk.round),
        ppg:0,
        type:'pick',
        original: pk.roster_id
      };
    });

    const assets = [...playerObjs, ...picks];
    return {
      roster_id:r.roster_id,
      owner_id:r.owner_id,
      teamName,
      players:playerObjs,
      picks,
      assets
    };
  });
  state.rostersEnriched = enriched;
}

function getRoster(id){
  return state.rostersEnriched.find(r=>r.roster_id===id);
}

function toggleAsset(side, id){
  const set = side==='A'? state.selectedA : state.selectedB;
  if(set.has(id)) set.delete(id); else set.add(id);
  renderAll();
}
function setTeam(side, roster_id){
  if(side==='A'){
    state.teamAId = +roster_id;
    state.selectedA.clear();
  }else{
    state.teamBId = +roster_id;
    state.selectedB.clear();
  }
  renderAll();
}

function groupByPos(assets){
  const map = {QB:[],RB:[],WR:[],TE:[],PICK:[]};
  for(const a of assets){
    const pos = map[a.position]? a.position : 'PICK';
    map[pos].push(a);
  }
  for(const k of Object.keys(map)){
    map[k].sort((a,b)=>b.value-a.value);
  }
  return map;
}

function renderTeamPanel(side){
  const isA = side==='A';
  const rosterId = isA? state.teamAId : state.teamBId;
  const roster = getRoster(rosterId);
  const selected = isA? state.selectedA : state.selectedB;
  const container = $(isA?'#teamA':'#teamB');
  if(!roster){
    container.innerHTML = `<div class="p-6 text-zinc-500">No team</div>`;
    return;
  }
  const valueOut = [...selected].reduce((s,id)=>{
    const a = roster.assets.find(x=>x.id===id);
    return s + (a?.value||0);
  },0);
  const grouped = groupByPos(roster.assets);
  const posOrder = ['QB','RB','WR','TE','PICK'];
  const assetCount = roster.assets.length;

  const teamOptions = state.rostersEnriched.map(r=>`<option value="${r.roster_id}" ${r.roster_id===rosterId?'selected':''}>${r.teamName}</option>`).join('');

  const selectedAssetsHtml = [...selected].map(id=>{
    const a = roster.assets.find(x=>x.id===id);
    if(!a) return '';
    return `<div class="flex items-center justify-between py-1.5 px-2 rounded-lg bg-zinc-900/70 border border-amber-900/20">
      <div class="min-w-0">
        <div class="text-sm truncate">${a.name} <span class="text-zinc-500">${a.team||''}</span></div>
        <div class="text-[11px] mono text-zinc-500">${a.position} • Age ${a.age} • ${fmtVal(a.value)} • ${fmt1(a.ppg)} pts</div>
      </div>
      <button onclick="toggleAsset('${side}','${a.id}')" class="w-6 h-6 rounded hover:bg-zinc-800 flex items-center justify-center text-zinc-500 hover:text-red-400">✕</button>
    </div>`;
  }).join('') || `<div class="text-xs text-zinc-600 italic py-4 text-center">No assets selected</div>`;

  const accordionsHtml = posOrder.map(pos=>{
    const items = grouped[pos]||[];
    if(items.length===0) return '';
    const rows = items.map(a=>{
      const isSel = selected.has(a.id);
      return `<button onclick="toggleAsset('${side}','${a.id}')" class="w-full text-left flex items-center justify-between gap-2 px-2 py-1.5 rounded-md hover:bg-zinc-800/70 transition ${isSel?'bg-amber-500/10 ring-1 ring-amber-500/40':''}">
        <div class="min-w-0 flex-1">
          <div class="text-[13px] leading-tight truncate ${isSel?'text-amber-300':''}">${a.name} <span class="text-zinc-600">${a.team||''}</span></div>
          <div class="text-[10px] mono text-zinc-500">Age ${a.age} • ${fmtVal(a.value)}</div>
        </div>
        <div class="text-[11px] mono text-zinc-400 w-12 text-right">${fmt1(a.ppg)}</div>
      </button>`;
    }).join('');
    return `<details class="group">
      <summary class="list-none flex items-center justify-between px-3 py-2 rounded-lg bg-zinc-900/60 hover:bg-zinc-900 cursor-pointer border border-zinc-800">
        <span class="text-xs font-semibold tracking-wide">${pos} <span class="text-zinc-600">(${items.length})</span></span>
        <svg class="w-4 h-4 text-zinc-500 group-open:rotate-180 transition" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
      </summary>
      <div class="mt-2 max-h-[260px] overflow-auto pr-1 space-y-0.5">${rows}</div>
    </details>`;
  }).join('');

  container.innerHTML = `
    <div class="p-4 border-b border-amber-900/20 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 rounded-full bg-gradient-to-br from-amber-400 to-yellow-700 flex items-center justify-center text-black font-bold text-sm">${side}</div>
        <div>
          <div class="text-[11px] uppercase tracking-wider text-amber-400/80 mono">Team ${side} • Giving</div>
          <select onchange="setTeam('${side}',this.value)" class="bg-transparent text-[15px] font-semibold outline-none">
            ${teamOptions}
          </select>
        </div>
      </div>
      <div class="text-right">
        <div class="text-[10px] uppercase tracking-wide text-zinc-500 mono">Value Out</div>
        <div class="text-[20px] font-semibold mono text-amber-300">${fmtVal(valueOut)}</div>
      </div>
    </div>
    <div class="p-4 space-y-4">
      <div>
        <div class="text-[11px] font-semibold tracking-wide text-zinc-400 mb-2">TRADE ASSETS</div>
        <div class="rounded-xl border border-dashed border-amber-900/30 bg-black/30 p-2 space-y-1 min-h-[80px]">
          ${selectedAssetsHtml}
        </div>
      </div>
      <div>
        <div class="flex items-center justify-between mb-2">
          <div class="text-[11px] font-semibold tracking-wide text-zinc-400">ROSTER • CLICK TO ADD</div>
          <div class="text-[10px] mono text-zinc-600">${assetCount} assets</div>
        </div>
        <div class="space-y-2">
          ${accordionsHtml}
        </div>
      </div>
    </div>
  `;
}

// Optimal lineup
function getOptimalLineup(players, rosterPositions){
  const eligible = {
    QB:['QB'],
    RB:['RB'],
    WR:['WR'],
    TE:['TE'],
    FLEX:['RB','WR','TE'],
    SUPER_FLEX:['QB','RB','WR','TE'],
    WRRB_FLEX:['RB','WR'],
    REC_FLEX:['WR','TE']
  };
  const slots = rosterPositions.filter(p=>!['BN','TAXI','IR','RESERVE'].includes(p)).map((pos,i)=>({pos, idx:i}));
  // sort by restrictiveness
  const restrict = s=>{
    const e = eligible[s.pos] || [s.pos];
    return e.length;
  };
  const sortedSlots = [...slots].sort((a,b)=> restrict(a)-restrict(b) || a.idx-b.idx);
  const pool = [...players];
  const used = new Set();
  const assignments = [];
  for(const slot of sortedSlots){
    const elig = eligible[slot.pos] || [slot.pos];
    let best = null;
    let bestScore = -1;
    for(const p of pool){
      if(used.has(p.id)) continue;
      if(!elig.includes(p.position)) continue;
      if(p.ppg>bestScore){
        bestScore=p.ppg;
        best=p;
      }
    }
    if(best){
      used.add(best.id);
      assignments.push({slot, player:best});
    }else{
      assignments.push({slot, player:null});
    }
  }
  // restore original order for display? Keep sorted order for determinism
  // name slots
  const counts={};
  const named = assignments.map(a=>{
    counts[a.slot.pos]=(counts[a.slot.pos]||0)+1;
    const num = counts[a.slot.pos];
    const name = `${a.slot.pos}${num>1?num:''}`.replace(/(\D)1$/,'$1');
    return {...a, name};
  });
  // sort for display by predefined order
  const order = {QB:1,RB:2,WR:3,TE:4,FLEX:5,SUPER_FLEX:6,WRRB_FLEX:7,REC_FLEX:8};
  named.sort((a,b)=> (order[a.slot.pos]||99)-(order[b.slot.pos]||99) || a.name.localeCompare(b.name));
  const total = named.reduce((s,a)=> s+ (a.player?.ppg||0),0);
  const starters = named.filter(a=>a.player);
  const avgAge = starters.length? starters.reduce((s,a)=>s+a.player.age,0)/starters.length : 0;
  return {lineup:named, total, avgAge};
}

function computeSummary(){
  const ra = getRoster(state.teamAId);
  const rb = getRoster(state.teamBId);
  if(!ra||!rb) return null;
  const selA = [...state.selectedA].map(id=>ra.assets.find(a=>a.id===id)).filter(Boolean);
  const selB = [...state.selectedB].map(id=>rb.assets.find(a=>a.id===id)).filter(Boolean);

  const valueOutA = selA.reduce((s,a)=>s+a.value,0);
  const valueInA = selB.reduce((s,a)=>s+a.value,0);
  const ppgOutA = selA.reduce((s,a)=>s+a.ppg,0);
  const ppgInA = selB.reduce((s,a)=>s+a.ppg,0);

  const valueOutB = selB.reduce((s,a)=>s+a.value,0);
  const valueInB = selA.reduce((s,a)=>s+a.value,0);
  const ppgOutB = selB.reduce((s,a)=>s+a.ppg,0);
  const ppgInB = selA.reduce((s,a)=>s+a.ppg,0);

  const rosterPos = state.league.roster_positions || [];

  // before/after players
  const aPlayersBefore = ra.players;
  const bPlayersBefore = rb.players;

  const aPlayersAfter = [
    ...aPlayersBefore.filter(p=>!state.selectedA.has(p.id)),
    ...selB.filter(a=>a.type==='player')
  ];
  const bPlayersAfter = [
    ...bPlayersBefore.filter(p=>!state.selectedB.has(p.id)),
    ...selA.filter(a=>a.type==='player')
  ];

  const optA_before = getOptimalLineup(aPlayersBefore, rosterPos);
  const optA_after  = getOptimalLineup(aPlayersAfter, rosterPos);
  const optB_before = getOptimalLineup(bPlayersBefore, rosterPos);
  const optB_after  = getOptimalLineup(bPlayersAfter, rosterPos);

  const avgAgeRosterA_before = aPlayersBefore.reduce((s,p)=>s+p.age,0)/(aPlayersBefore.length||1);
  const avgAgeRosterA_after  = aPlayersAfter.reduce((s,p)=>s+p.age,0)/(aPlayersAfter.length||1);
  const avgAgeRosterB_before = bPlayersBefore.reduce((s,p)=>s+p.age,0)/(bPlayersBefore.length||1);
  const avgAgeRosterB_after  = bPlayersAfter.reduce((s,p)=>s+p.age,0)/(bPlayersAfter.length||1);

  const data = {
    A:{ valueOut:valueOutA, valueIn:valueInA, ppgOut:ppgOutA, ppgIn:ppgInA,
        optBefore:optA_before, optAfter:optA_after,
        ageRosterDelta: avgAgeRosterA_after - avgAgeRosterA_before,
        ageStartersDelta: optA_after.avgAge - optA_before.avgAge,
        rosterName:ra.teamName
    },
    B:{ valueOut:valueOutB, valueIn:valueInB, ppgOut:ppgOutB, ppgIn:ppgInB,
        optBefore:optB_before, optAfter:optB_after,
        ageRosterDelta: avgAgeRosterB_after - avgAgeRosterB_before,
        ageStartersDelta: optB_after.avgAge - optB_before.avgAge,
        rosterName:rb.teamName
    }
  };
  // deltas
  ['A','B'].forEach(k=>{
    const d=data[k];
    d.valueDeltaPct = d.valueOut>0 ? (d.valueIn-d.valueOut)/d.valueOut*100 : 0;
    d.ppgDelta = d.ppgIn - d.ppgOut;
    d.optPpgDelta = d.optAfter.total - d.optBefore.total;
  });

  return data;
}

function renderSummary(){
  const c = $('#summaryContent');
  const data = computeSummary();
  if(!data){
    c.innerHTML = `<div class="text-zinc-600 text-sm">Select teams and assets to see analysis.</div>`;
    $('#optImpact').innerHTML='';
    $('#optSettings').textContent='';
    return;
  }
  const netA = data.A.valueIn - data.A.valueOut;
  const winnerSide = netA>0 ? 'A' : netA<0 ? 'B' : null;
  const winner = winnerSide? data[winnerSide] : null;
  const loserSide = winnerSide==='A'?'B': winnerSide==='B'?'A':null;
  const loser = loserSide? data[loserSide] : null;

  // fairness tier
  let verdict = 'Fair Trade';
  let tierIdx =0;
  let badgeClass='bg-zinc-800 text-zinc-300';
  if(winner){
    const pctAbs = Math.abs(winner.valueDeltaPct);
    if(pctAbs<5) tierIdx=0;
    else if(pctAbs<10) tierIdx=1;
    else if(pctAbs<20) tierIdx=2;
    else tierIdx=3;
    // modifier
    if(winner.optPpgDelta >= 2) tierIdx = Math.min(3, tierIdx+1);
    if(winner.optPpgDelta <= -1.5) tierIdx = Math.max(0, tierIdx-1);
    const names=['Fair','Slight Win','Win','Smash'];
    const colors=['bg-emerald-900/40 text-emerald-300 ring-emerald-700/40','bg-yellow-900/40 text-yellow-300 ring-yellow-700/40','bg-orange-900/40 text-orange-300 ring-orange-700/40','bg-red-900/50 text-red-300 ring-red-700/50'];
    badgeClass = colors[tierIdx]+' ring-1';
    verdict = tierIdx===0 ? 'Fair Trade' : `${names[tierIdx]} for Team ${winnerSide} (${data[winnerSide].rosterName})`;
  }

  // warnings
  const warnings=[];
  if(winner && winner.optPpgDelta <= -3){
    warnings.push('Rebuild Only: Value win but starters get worse');
  }
  if(winner && winner.ppgDelta <= -1.5 && winner.optPpgDelta <= -1.5){
    warnings.push('Value win / PPG loss');
  }
  if(loser && loser.optPpgDelta >= 3){
    warnings.push('Win-now steal: Lose value, gain starters');
  }

  const card = (side)=>{
    const d = data[side];
    const valCls = d.valueDeltaPct>=0?'text-emerald-400':'text-red-400';
    const ppgCls = d.ppgDelta>=0?'text-emerald-400':'text-red-400';
    const optCls = d.optPpgDelta>=0?'text-emerald-400':'text-red-400';
    return `<div class="rounded-xl border border-zinc-800 bg-black/40 p-3">
      <div class="text-[11px] uppercase tracking-wide text-zinc-500 mb-2">Team ${side} • ${d.rosterName}</div>
      <div class="grid grid-cols-2 gap-2 text-[12px]">
        <div class="rounded-lg bg-zinc-900/60 p-2"><div class="text-zinc-500 mono">Value Δ %</div><div class="text-[16px] font-semibold mono ${valCls}">${d.valueDeltaPct>=0?'+':''}${fmt1(d.valueDeltaPct)}%</div></div>
        <div class="rounded-lg bg-zinc-900/60 p-2"><div class="text-zinc-500 mono">PPG Δ</div><div class="text-[16px] font-semibold mono ${ppgCls}">${d.ppgDelta>=0?'+':''}${fmt1(d.ppgDelta)}</div></div>
        <div class="rounded-lg bg-zinc-900/60 p-2"><div class="text-zinc-500 mono">Opt PPG Δ</div><div class="text-[16px] font-semibold mono ${optCls}">${d.optPpgDelta>=0?'+':''}${fmt1(d.optPpgDelta)}</div></div>
        <div class="rounded-lg bg-zinc-900/60 p-2"><div class="text-zinc-500 mono">Age Δ Roster</div><div class="text-[16px] font-semibold mono">${d.ageRosterDelta>=0?'+':''}${fmt1(d.ageRosterDelta)}</div></div>
        <div class="rounded-lg bg-zinc-900/60 p-2 col-span-2"><div class="text-zinc-500 mono">Age Δ Starters</div><div class="text-[16px] font-semibold mono">${d.ageStartersDelta>=0?'+':''}${fmt1(d.ageStartersDelta)}</div></div>
      </div>
    </div>`;
  };

  const inout = (side)=>{
    const d=data[side];
    return `<div class="rounded-xl border border-amber-900/20 bg-amber-950/10 p-3">
      <div class="text-[11px] uppercase tracking-wide text-amber-400/80 mb-2">Team ${side} IN/OUT</div>
      <div class="grid grid-cols-2 gap-2 text-xs mono">
        <div>Value In <span class="float-right text-amber-300">${fmtVal(d.valueIn)}</span></div>
        <div>Value Out <span class="float-right text-zinc-400">${fmtVal(d.valueOut)}</span></div>
        <div>PPG In <span class="float-right text-amber-300">${fmt1(d.ppgIn)}</span></div>
        <div>PPG Out <span class="float-right text-zinc-400">${fmt1(d.ppgOut)}</span></div>
      </div>
    </div>`;
  };

  c.innerHTML = `
    <div class="flex flex-wrap items-center gap-3">
      <span class="px-3 py-1.5 rounded-full text-sm font-semibold ${badgeClass}">${verdict}</span>
    </div>
    ${warnings.length? `<div class="rounded-lg border border-amber-700/40 bg-amber-950/30 px-3 py-2 text-xs text-amber-200">${warnings.map(w=>`• ${w}`).join('<br>')}</div>`:''}
    <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
      ${card('A')}
      ${card('B')}
    </div>
    <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
      ${inout('A')}
      ${inout('B')}
    </div>
  `;

  // Opt settings string
  const posCounts = {};
  (state.league.roster_positions||[]).forEach(p=>{
    if(['BN','TAXI','IR'].includes(p)) return;
    posCounts[p]=(posCounts[p]||0)+1;
  });
  const settingsStr = Object.entries(posCounts).map(([k,v])=>`${v} ${k}`).join(' • ');
  $('#optSettings').textContent = settingsStr;

  // Opt impact
  const impactHtml = ['A','B'].map(side=>{
    const d=data[side];
    const before = d.optBefore.lineup;
    const after = d.optAfter.lineup;
    const rows = before.map((b,i)=>{
      const a = after[i];
      const changed = (b.player?.id||'') !== (a.player?.id||'');
      const bName = b.player ? `${b.player.name}` : '—';
      const aName = a.player ? `${a.player.name}` : '—';
      return `<div class="flex items-center gap-2 py-1 px-2 rounded ${changed?'bg-amber-500/10 ring-1 ring-amber-700/30':''}">
        <div class="w-20 text-[11px] mono text-zinc-500">${b.name}</div>
        <div class="flex-1 text-[13px] truncate ${changed?'text-amber-200':''}">${bName}</div>
        <div class="text-zinc-600">→</div>
        <div class="flex-1 text-[13px] truncate ${changed?'text-amber-200':''}">${aName}</div>
      </div>`;
    }).join('');
    return `<div class="rounded-xl border border-zinc-800 bg-black/30 p-3">
      <div class="flex items-center justify-between mb-2">
        <div class="text-xs font-semibold text-zinc-300">Team ${side} • ${d.rosterName}</div>
        <div class="text-[11px] mono text-zinc-500">PPG ${fmt1(d.optBefore.total)} → <span class="text-amber-300">${fmt1(d.optAfter.total)}</span></div>
      </div>
      <div class="space-y-0.5 max-h-[300px] overflow-auto pr-1">${rows}</div>
    </div>`;
  }).join('');
  $('#optImpact').innerHTML = `<div class="grid md:grid-cols-2 gap-4">${impactHtml}</div>`;
}

function renderAll(){
  renderTeamPanel('A');
  renderTeamPanel('B');
  renderSummary();
}

// expose globals for inline handlers
window.toggleAsset = toggleAsset;
window.setTeam = setTeam;

$('#retryBtn').addEventListener('click', ()=>{ loadAll(); });

document.addEventListener('DOMContentLoaded', ()=>{ loadAll(); });
})();
</script>
</body>
</html>
