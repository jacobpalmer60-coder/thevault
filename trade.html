<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Dynasty Trade Calculator</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
body{font-family:'Outfit',system-ui;background:#020617;color:#e2e8f0}
.mono{font-family:'JetBrains Mono',monospace}
.player-row{cursor:pointer;border:1px solid transparent}
.player-row:hover{background:rgba(255,255,255,.04)}
.player-row.selected{background:rgba(245,158,11,.12);border-color:rgba(245,158,11,.4)}
.badge{font-size:12px;padding:3px 8px;border-radius:6px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1)}
.pill{font-size:13px;padding:4px 12px;border-radius:999px;border:1px solid transparent;display:inline-flex;align-items:center;gap:6px}
.tab-btn{padding:8px 14px;border-radius:10px;font-size:14px;border:1px solid transparent;color:#94a3b8}
.tab-btn.active{background:rgba(245,158,11,.12);border-color:rgba(245,158,11,.35);color:#fcd34d}
.tab-panel{display:none}
.tab-panel.active{display:block}
</style>
</head>
<body class="min-h-screen">
<header class="sticky top-0 z-40 border-b border-white/10 bg-slate-950/80 backdrop-blur">
  <div class="max-w- mx-auto px-4 h-14 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <div class="w-8 h-8 rounded-xl bg-gradient-to-br from-amber-400 to-yellow-600"></div>
      <div class="font-semibold text-lg">Dynasty Trade Calculator</div>
      <span id="league-name" class="ml-2 text-sm text-slate-400 mono"></span>
      <span id="scoring-name" class="ml-2 text-sm text-amber-300 mono">PPR 0.5 TEP</span>
    </div>
    <div class="flex items-center gap-2">
      <button id="value-tools-open" class="px-3 py-1.5 rounded-lg bg-amber-500/20 border border-amber-500/40 text-amber-200 text-sm">Value Tools</button>
      <button id="swap-btn" class="px-3 py-1.5 rounded-lg bg-white/5 border-white/10 text-sm">Swap</button>
      <button id="reset-btn" class="px-3 py-1.5 rounded-lg bg-white/5 border border-white/10 text-sm">Reset</button>
    </div>
  </div>
</header>

<main class="max-w- mx-auto px-4 py-4">
  <div id="status" class="mb-3 text-sm text-slate-400"><span id="status-text">Loading…</span></div>

  <div class="grid grid-cols-3 gap-3 mb-4">
    <div class="bg-slate-900/60 border border-white/10 rounded-2xl p-2.5">
      <div class="text- uppercase text-slate-500">Team A Sends</div>
      <div id="send-a" class="text-lg font-semibold mono">0</div>
      <div class="text-xs text-slate-400"><span id="count-a">0</span> assets</div>
    </div>
    <div class="bg-slate-900/60 border border-amber-500/20 rounded-2xl p-2.5 text-center">
      <div class="text- uppercase text-amber-300">Fairness</div>
      <div id="fairness-label" class="text-lg font-semibold mono">Even</div>
    </div>
    <div class="bg-slate-900/60 border border-white/10 rounded-2xl p-2.5 text-right">
      <div class="text- uppercase text-slate-500">Team B Sends</div>
      <div id="send-b" class="text-lg font-semibold mono">0</div>
      <div class="text-xs text-slate-400"><span id="count-b">0</span> assets</div>
    </div>
  </div>

  <div class="flex gap-4">
    <section class="bg-slate-900/60 border border-white/10 rounded-2xl flex-col w-">
      <div class="px-3 py-3 border-b border-white/10 bg-amber-500/10">
        <div class="flex items-start justify-between">
          <div>
            <div class="text- uppercase text-amber-300/80">Team A</div>
            <div id="team-a-name" class="font-semibold"></div>
            <div id="team-a-owner" class="text-xs text-slate-400"></div>
          </div>
          <select id="team-a-select" class="bg-slate-900 border border-white/10 rounded-lg px-2 py-1.5 text-sm w-32"></select>
        </div>
        <div id="pill-a" class="mt-2"></div>
        <div id="needs-a" class="mt-2 flex-wrap gap-1.5"></div>
      </div>
      <div class="p-3 space-y-3 max-h- overflow-y-auto">
        <div><div class="text-xs uppercase text-slate-500 mb-2">Picks</div><div id="picks-a" class="space-y-1.5"></div></div>
        <div><div class="text-xs uppercase text-slate-500 mb-2">Players</div><div id="roster-a" class="space-y-1.5"></div></div>
      </div>
    </section>

    <div class="flex gap-6 flex-1">
      <section class="bg-slate-900/60 border border-white/10 rounded-2xl flex-col flex-1 min-h-">
        <div class="p-3 border-b border-white/10 bg-amber-500/10"><h2 class="font-semibold text-amber-300">Impact A</h2></div>
        <div id="impact-a" class="flex-1 p-4"></div>
      </section>
      <section class="bg-slate-900/60 border border-white/10 rounded-2xl flex flex-col flex-1 min-h-">
        <div class="p-3 border-b border-white/10 bg-amber-500/10"><h2 class="font-semibold text-amber-300">Impact B</h2></div>
        <div id="impact-b" class="flex-1 p-4"></div>
      </section>
    </div>

    <section class="bg-slate-900/60 border border-white/10 rounded-2xl flex flex-col w-">
      <div class="px-3 py-3 border-b border-white/10 bg-amber-500/10">
        <div class="flex items-start justify-between">
          <div>
            <div class="text- uppercase text-amber-300/80">Team B</div>
            <div id="team-b-name" class="font-semibold"></div>
            <div id="team-b-owner" class="text-xs text-slate-400"></div>
          </div>
          <select id="team-b-select" class="bg-slate-900 border border-white/10 rounded-lg px-2 py-1.5 text-sm w-32"></select>
        </div>
        <div id="pill-b" class="mt-2"></div>
        <div id="needs-b" class="mt-2 flex-wrap gap-1.5"></div>
      </div>
      <div class="p-3 space-y-3 max-h- overflow-y-auto">
        <div><div class="text-xs uppercase text-slate-500 mb-2">Picks</div><div id="picks-b" class="space-y-1.5"></div></div>
        <div><div class="text-xs uppercase text-slate-500 mb-2">Players</div><div id="roster-b" class="space-y-1.5"></div></div>
      </div>
    </section>
  </div>
</main>

<div id="value-tools-modal" class="fixed inset-0 z-[100] hidden">
  <div id="modal-backdrop" class="absolute inset-0 bg-black/70"></div>
  <div class="relative z-10 flex items-center justify-center min-h-screen p-4">
    <div class="bg-slate-900 border border-white/10 rounded-2xl w-full max-w- max-h- flex flex-col">
      <div class="p-4 border-b border-white/10 flex items-center justify-between">
        <div class="flex items-center gap-4">
          <h2 class="font-semibold text-xl">Value Tools</h2>
          <div class="flex gap-2">
            <button data-tab="similar" class="tab-btn active">Similar Value Finder</button>
            <button data-tab="package" class="tab-btn">Package Builder</button>
          </div>
        </div>
        <button id="modal-close" class="w-9 h-9 rounded-full hover:bg-white/10">✕</button>
      </div>
      <div class="p-6 overflow-y-auto flex-1">
        <div id="tab-similar" class="tab-panel active">Similar Finder UI…</div>
        <div id="tab-package" class="tab-panel">Package Builder UI…</div>
      </div>
    </div>
  </div>
</div>

<script>
(() => {
  const DEFAULT_LEAGUE = '1313454100225990656';
  const league_id = new URLSearchParams(location.search).get('league_id') || DEFAULT_LEAGUE;

  const CSV_URLS = {
    age: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRqxhqyuKK6vu_EoYta5FZ_KdOB8M54Q_qBwJKOUF5KcgbTt2dmHn_FuLj9d-FS8-ta5T0zkU0QEGcN/pub?gid=0&single=true&output=csv',
    ppg: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRqxhqyuKK6vu_EoYta5FZ_KdOB8M54Q_qBwJKOUF5KcgbTt2dmHn_FuLj9d-FS8-ta5T0zkU0QEGcN/pub?gid=1865143681&single=true&output=csv'
  };

  const state = {
    league:null, users:[], rosters:[], players:{},
    ageValueMap:new Map(), ageMap:new Map(), ppgMap:new Map(), ppgPosMap:new Map(), pickValueMap:new Map(),
    pickInventory:new Map(), teamSlots:new Map(),
    teamA:null, teamB:null, selectedA:new Set(), selectedB:new Set(),
    tradedPicks:[], teamMetrics:new Map()
  };

  const $ = s => document.querySelector(s);
  const fmt = n => Math.round(n).toLocaleString();
  const setStatus = t => { $('#status-text').textContent = t; };

  async function fetchJSON(u){ const r=await fetch(u); return r.json(); }
  async function fetchText(u){ const r=await fetch(u); return r.text(); }

  function splitCSVLine(line){
    const res=[]; let cur='',inQ=false;
    for(let i=0;i<line.length;i++){
      const ch=line[i];
      if(ch=='"'){ if(inQ&&line[i+1]=='"'){cur+='"';i++} else inQ=!inQ }
      else if(ch===','&&!inQ){res.push(cur);cur=''} else cur+=ch
    }
    res.push(cur); return res;
  }
  function parseCSV(text){
    const lines=text.trim().split(/\r?\n/).filter(l=>l.trim());
    if(!lines.length) return [];
    const headers=splitCSVLine(lines[0]).map(h=>h.trim().replace(/^"|"$/g,''));
    const rows=[];
    for(let i=1;i<lines.length;i++){
      const vals=splitCSVLine(lines[i]);
      const obj={}; headers.forEach((h,j)=>obj[h]=(vals[j]??'').trim().replace(/^"|"$/g,''));
      rows.push(obj);
    }
    return rows;
  }

  const norm = s => String(s||'').toLowerCase().replace(/\./g,'').replace(/'/g,'').replace(/,/g,'').replace(/\b(jr|sr|ii|iii|iv|v)\b/g,'').replace(/\s+/g,' ').trim();

  async function loadCSVData(){
    setStatus('Loading Age & PPG CSVs…');
    const [ageTxt, ppgTxt] = await Promise.all([fetchText(CSV_URLS.age), fetchText(CSV_URLS.ppg)]);
    const ageRows = parseCSV(ageTxt);
    const ppgRows = parseCSV(ppgTxt);

    state.ageValueMap.clear(); state.ageMap.clear(); state.ppgMap.clear(); state.pickValueMap.clear();

    for(const r of ageRows){
      const player = r.Player || ''; if(!player) continue;
      const key = norm(player);
      const val = parseFloat(r.Value || '');
      const age = parseFloat(r.Age || '');
      if(!isNaN(val)) state.ageValueMap.set(key, val);
      if(!isNaN(age)) state.ageMap.set(key, age);
    }
    for(const r of ppgRows){
      const player = r.Player || ''; if(!player) continue;
      const key = norm(player);
      const v = parseFloat(r['Avg_PPR_0.5_TEP']);
      if(!isNaN(v)) state.ppgMap.set(key, v);
    }
  }

  function playerFromId(pid){
    const p = state.players[pid] || {};
    const name = p.full_name || `${p.first_name||''} ${p.last_name||''}`.trim() || pid;
    const key = norm(name);
    return {
      id:pid,
      name,
      pos: p.position || 'UNK',
      age: p.age?? state.ageMap.get(key)?? null,
      ppg: state.ppgMap.get(key)?? 0,
      value: state.ageValueMap.get(key)?? 0,
      type:'player'
    };
  }

  function computeSlots(){
    const scores = state.rosters.map(r=>{
      const total = (r.players||[]).map(playerFromId).reduce((s,p)=>s+p.value,0);
      return {id:r.roster_id,total};
    }).sort((a,b)=>b.total-a.total);
    state.teamSlots.clear();
    scores.forEach((s,i)=>{
      let slot='mid'; if(i<3) slot='late'; else if(i>=scores.length-3) slot='early';
      state.teamSlots.set(s.id,slot);
    });
  }

  function getPickValue(season,round,slot){
    return state.pickValueMap.get(`${season}-${round}-${slot}`)?? state.pickValueMap.get(`${round}-${slot}`)?? 0;
  }

  function buildPickInventory(){
    state.pickInventory.clear();
    state.rosters.forEach(r=>state.pickInventory.set(r.roster_id,[]));
    const traded = state.tradedPicks;
    const year = new Date().getFullYear()+1;
    const pickYears = [year, year+1, year+2];
    const pickOwn = new Map();
    for(const yr of pickYears) for(let rd=1; rd<=4; rd++) for(const r of state.rosters) pickOwn.set(`${yr}-${rd}-${r.roster_id}`, r.roster_id);
    for(const tp of traded){
      const season = parseInt(tp.season), rd = parseInt(tp.round);
      if(pickYears.includes(season) && rd>=1 && rd<=4) pickOwn.set(`${season}-${rd}-${tp.roster_id}`, tp.owner_id);
    }
    for(const r of state.rosters){
      const inv = state.pickInventory.get(r.roster_id);
      for(const yr of pickYears){
        for(let rd=1; rd<=4; rd++){
          for(const orig of state.rosters){
            const owner = pickOwn.get(`${yr}-${rd}-${orig.roster_id}`);
            if(owner === r.roster_id){
              const slot = state.teamSlots.get(orig.roster_id) || 'mid';
              const value = getPickValue(yr, rd, slot);
              inv.push({
                id:`${yr}-${rd}-${slot}-${orig.roster_id}`,
                name:`${yr} ${rd} ${slot}`,
                season:yr, round:rd, slot, value,
                type:'pick'
              });
            }
          }
        }
      }
      inv.sort((a,b)=>b.value-a.value);
    }
  }

  function renderSelects(){
    const a=$('#team-a-select'), b=$('#team-b-select'); a.innerHTML=''; b.innerHTML='';
    state.rosters.forEach(r=>{
      const name = state.users.find(u=>u.user_id===r.owner_id)?.display_name || `Team ${r.roster_id}`;
      const o=document.createElement('option'); o.value=r.roster_id; o.textContent=name;
      a.appendChild(o.cloneNode(true)); b.appendChild(o.cloneNode(true));
    });
    state.teamA = state.rosters[0]?.roster_id;
    state.teamB = state.rosters[1]?.roster_id || state.rosters[0]?.roster_id;
    a.value = state.teamA; b.value = state.teamB;
    $('#team-a-name').textContent = a.options[a.selectedIndex].text;
    $('#team-b-name').textContent = b.options[b.selectedIndex].text;
  }

  function renderRoster(rosterId, containerId, selSet){
    const r = state.rosters.find(x=>x.roster_id==rosterId); if(!r) return;
    const players = (r.players||[]).map(playerFromId).sort((a,b)=>b.value-a.value);
    const cont = $(containerId); cont.innerHTML='';
    players.forEach(p=>{
      const div=document.createElement('div');
      div.className='player-row px-3 py-2 rounded-xl'+(selSet.has(p.id)?' selected':'');
      div.innerHTML=`<div class="text-sm">${p.name}</div><div class="text-xs mono text-slate-400">${p.pos} • ${p.ppg.toFixed(1)} PPG • ${fmt(p.value)}</div>`;
      div.onclick=()=>{ selSet.has(p.id)?selSet.delete(p.id):selSet.add(p.id); renderRoster(rosterId,containerId,selSet); updateFairness(); };
      cont.appendChild(div);
    });
  }

  function renderPicks(rosterId, containerId, selSet){
    const inv = state.pickInventory.get(rosterId)||[];
    const cont = $(containerId); cont.innerHTML='';
    inv.forEach(p=>{
      const div=document.createElement('div');
      div.className='player-row px-3 py-2 rounded-xl'+(selSet.has(p.id)?' selected':'');
      div.innerHTML=`<div class="text-sm">${p.name}</div><div class="text-xs mono text-slate-400">Val ${fmt(p.value)}</div>`;
      div.onclick=()=>{ selSet.has(p.id)?selSet.delete(p.id):selSet.add(p.id); renderPicks(rosterId,containerId,selSet); updateFairness(); };
      cont.appendChild(div);
    });
  }

  function sumAssets(rosterId, selSet){
    const players = (state.rosters.find(r=>r.roster_id==rosterId)?.players||[]).filter(pid=>selSet.has(pid)).map(playerFromId);
    const picks = (state.pickInventory.get(rosterId)||[]).filter(p=>selSet.has(p.id));
    return [...players,...picks].reduce((s,x)=>s+x.value,0);
  }

  function updateFairness(){
    const aVal = sumAssets(state.teamA, state.selectedA);
    const bVal = sumAssets(state.teamB, state.selectedB);
    $('#send-a').textContent = fmt(aVal);
    $('#send-b').textContent = fmt(bVal);
    $('#count-a').textContent = state.selectedA.size;
    $('#count-b').textContent = state.selectedB.size;
    const diff = bVal - aVal;
    $('#fairness-label').textContent = diff>500?'A wins big': diff>100?'A wins': diff<-500?'B wins big': diff<-100?'B wins':'Even';
  }

  async function init(){
    setStatus('Loading league…');
    const [league, users, rosters, players, traded] = await Promise.all([
      fetchJSON(`https://api.sleeper.app/v1/league/${league_id}`),
      fetchJSON(`https://api.sleeper.app/v1/league/${league_id}/users`),
      fetchJSON(`https://api.sleeper.app/v1/league/${league_id}/rosters`),
      fetchJSON('https://api.sleeper.app/v1/players/nfl'),
      fetchJSON(`https://api.sleeper.app/v1/league/${league_id}/traded_picks`).catch(()=>[])
    ]);
    state.league = league; state.users = users; state.rosters = rosters; state.players = players; state.tradedPicks = traded;
    $('#league-name').textContent = league.name;
    await loadCSVData();
    computeSlots();
    buildPickInventory();
    renderSelects();
    renderRoster(state.teamA, '#roster-a', state.selectedA);
    renderRoster(state.teamB, '#roster-b', state.selectedB);
    renderPicks(state.teamA, '#picks-a', state.selectedA);
    renderPicks(state.teamB, '#picks-b', state.selectedB);
    setStatus('Ready • Age + PPG loaded');
    updateFairness();
  }

  document.addEventListener('DOMContentLoaded', ()=>{
    $('#team-a-select')?.addEventListener('change', e=>{ state.teamA=+e.target.value; state.selectedA.clear(); renderRoster(state.teamA,'#roster-a',state.selectedA); renderPicks(state.teamA,'#picks-a',state.selectedA); $('#team-a-name').textContent=e.target.options[e.target.selectedIndex].text; updateFairness(); });
    $('#team-b-select')?.addEventListener('change', e=>{ state.teamB=+e.target.value; state.selectedB.clear(); renderRoster(state.teamB,'#roster-b',state.selectedB); renderPicks(state.teamB,'#picks-b',state.selectedB); $('#team-b-name').textContent=e.target.options[e.target.selectedIndex].text; updateFairness(); });
    $('#reset-btn')?.addEventListener('click', ()=>{ state.selectedA.clear(); state.selectedB.clear(); renderRoster(state.teamA,'#roster-a',state.selectedA); renderRoster(state.teamB,'#roster-b',state.selectedB); renderPicks(state.teamA,'#picks-a',state.selectedA); renderPicks(state.teamB,'#picks-b',state.selectedB); updateFairness(); });
    $('#swap-btn')?.addEventListener('click', ()=>{ [state.teamA,state.teamB]=[state.teamB,state.teamA]; [state.selectedA,state.selectedB]=[state.selectedB,state.selectedA]; $('#team-a-select').value=state.teamA; $('#team-b-select').value=state.teamB; $('#team-a-name').textContent=$('#team-a-select').options[$('#team-a-select').selectedIndex].text; $('#team-b-name').textContent=$('#team-b-select').options[$('#team-b-select').selectedIndex].text; renderRoster(state.teamA,'#roster-a',state.selectedA); renderRoster(state.teamB,'#roster-b',state.selectedB); renderPicks(state.teamA,'#picks-a',state.selectedA); renderPicks(state.teamB,'#picks-b',state.selectedB); updateFairness(); });
    const modal=$('#value-tools-modal');
    $('#value-tools-open')?.addEventListener('click', ()=>{ modal.classList.remove('hidden'); });
    $('#modal-close')?.addEventListener('click', ()=>{ modal.classList.add('hidden'); });
    $('#modal-backdrop')?.addEventListener('click', ()=>{ modal.classList.add('hidden'); });
    init();
  });
})();
</script>
</body>
</html>
