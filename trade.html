<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>TradeCalc Pro — 4 Column</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<style>body{font-family:Outfit,system-ui;background:#050810;color:#fff}:root{color-scheme:dark}.glass{backdrop-filter:blur(16px)}</style>
</head>
<body>
<header class="sticky top-0 border-b border-white/10 bg-black/50 glass z-40">
  <div class="max-w-[1600px] mx-auto px-6 h-14 flex items-center justify-between">
    <div class="font-semibold">TradeCalc Pro</div>
    <button id="reset" class="text-xs px-3 py-1.5 bg-white/5 rounded-lg border border-white/10">Reset</button>
  </div>
</header>

<main class="max-w-[1600px] mx-auto px-6 py-8">
  <div class="grid grid-cols-1 xl:grid-cols-4 gap-5 items-start">

    <!-- 1. TEAM A ROSTER -->
    <section class="xl:col-span-1 glass rounded-2xl border border-white/10 bg-white/[0.02] p-4 h-[720px] flex flex-col">
      <div class="flex items-center justify-between mb-3">
        <h2 class="font-semibold text-violet-300">Team A</h2>
        <select id="teamA" class="bg-black/50 border-white/10 rounded px-2 py-1 text-xs"></select>
      </div>
      <div id="rosterA" class="flex-1 overflow-auto space-y-1 text-[12px] pr-2"></div>
      <div class="mt-3 pt-3 border-t border-white/10 text-[11px] text-white/50">
        <div>Picks: <span id="picksA" class="text-white/80">—</span></div>
      </div>
    </section>

    <!-- 2. IMPACT ON TEAM A -->
    <section class="xl:col-span-1 glass rounded-2xl border border-violet-500/20 bg-violet-500/5 p-5">
      <h3 class="font-semibold text-violet-200 mb-4 flex items-center gap-2">
        <span class="w-6 h-6 rounded bg-violet-500/20 grid place-items-center text-xs">A</span>
        Impact on Team A
      </h3>
      <div id="impactA" class="space-y-3"></div>
    </section>

    <!-- 3. IMPACT ON TEAM B -->
    <section class="xl:col-span-1 glass rounded-2xl border border-cyan-500/20 bg-cyan-500/5 p-5">
      <h3 class="font-semibold text-cyan-200 mb-4 flex items-center gap-2">
        <span class="w-6 h-6 rounded bg-cyan-500/20 grid place-items-center text-xs">B</span>
        Impact on Team B
      </h3>
      <div id="impactB" class="space-y-3"></div>
    </section>

    <!-- 4. TEAM B ROSTER -->
    <section class="xl:col-span-1 glass rounded-2xl border border-white/10 bg-white/[0.02] p-4 h-[720px] flex flex-col">
      <div class="flex items-center justify-between mb-3">
        <h2 class="font-semibold text-cyan-300">Team B</h2>
        <select id="teamB" class="bg-black/50 border border-white/10 rounded px-2 py-1 text-xs"></select>
      </div>
      <div id="rosterB" class="flex-1 overflow-auto space-y-1 text-[12px] pr-2"></div>
      <div class="mt-3 pt-3 border-t border-white/10 text-[11px] text-white/50">
        <div>Picks: <span id="picksB" class="text-white/80">—</span></div>
      </div>
    </section>

  </div>

  <!-- Fairness bar underneath -->
  <div class="mt-6 glass rounded-2xl border border-white/10 p-4">
    <div class="flex justify-between text-sm mb-2"><span>Trade Fairness</span><span id="fairLabel" class="font-mono">—</span></div>
    <div class="h-2 bg-white/5 rounded-full overflow-hidden"><div id="fairBar" class="h-full w-0 bg-gradient-to-r from-violet-500 to-cyan-400 transition-all"></div></div>
  </div>
</main>

<script>
const LEAGUE='1313454100225990656';
const VAL='https://docs.google.com/spreadsheets/d/e/2PACX-1vRqxhqyuKK6vu_EoYta5FZ_KdOB8M54Q_qBwJKOUF5KcgbTt2dmHn_FuLj9d-FS8-ta5T0zkU0QEGcN/pub?gid=4113168&single=true&output=csv';
const PPG='https://docs.google.com/spreadsheets/d/e/2PACX-1vRqxhqyuKK6vu_EoYta5FZ_KdOB8M54Q_qBwJKOUF5KcgbTt2dmHn_FuLj9d-FS8-ta5T0zkU0QEGcN/pub?gid=118408869&single=true&output=csv';
const PICKS='https://docs.google.com/spreadsheets/d/e/2PACX-1vRqxhqyuKK6vu_EoYta5FZ_KdOB8M54Q_qBwJKOUF5KcgbTt2dmHn_FuLj9d-FS8-ta5T0zkU0QEGcN/pub?gid=972793131&single=true&output=csv';

let S={users:[],rosters:[],players:{},vals:new Map(),ppg:new Map(),picks:new Map(),slots:[]};
let teams={A:[],B:[]};

async function init(){
  const [lg,us,ro,pl,v,p,pi]=await Promise.all([
    fetch(`https://api.sleeper.app/v1/league/${LEAGUE}`).then(r=>r.json()),
    fetch(`https://api.sleeper.app/v1/league/${LEAGUE}/users`).then(r=>r.json()),
    fetch(`https://api.sleeper.app/v1/league/${LEAGUE}/rosters`).then(r=>r.json()),
    fetch('https://api.sleeper.app/v1/players/nfl').then(r=>r.json()),
    fetch(VAL).then(r=>r.text()), fetch(PPG).then(r=>r.text()), fetch(PICKS).then(r=>r.text())
  ]);
  S.users=us; S.rosters=ro; S.players=pl; S.slots=lg.roster_positions.filter(x=>!['BN','IR','TAXI'].includes(x));
  const sf=lg.roster_positions.includes('SUPER_FLEX');
  Papa.parse(v,{header:true,skipEmptyLines:true}).data.forEach(r=>{if(r.sleeper_id)S.vals.set(r.sleeper_id,parseFloat(sf?r.val_sf_ppr_tep05:r.val_1qb_ppr_tep05)||0)});
  Papa.parse(p,{header:true,skipEmptyLines:true}).data.forEach(r=>{if(r.Player)S.ppg.set(r.Player.toLowerCase(),parseFloat(r['Avg_PPR_0.5_TEP'])||0)});
  Papa.parse(pi,{header:true,skipEmptyLines:true}).data.forEach(r=>{if(r.season)S.picks.set(`${r.season}-${r.round}`,parseFloat(sf?r.sf_value:r.qb_value)||0)});

  const a=document.getElementById('teamA'), b=document.getElementById('teamB'); a.innerHTML=''; b.innerHTML='';
  us.forEach(u=>{const r=ro.find(x=>x.owner_id===u.user_id);if(!r)return;const n=u.metadata?.team_name||u.display_name;const o=document.createElement('option');o.value=r.roster_id;o.textContent=n;a.appendChild(o.cloneNode(true));b.appendChild(o)});
  a.onchange=()=>load('A',+a.value); b.onchange=()=>load('B',+b.value);
  a.value=ro[0].roster_id; b.value=ro[1].roster_id; load('A',ro[0].roster_id); load('B',ro[1].roster_id);
}

function load(side,id){
  const r=S.rosters.find(x=>x.roster_id===id);
  teams[side]=(r.players||[]).map(pid=>{const p=S.players[pid]||{};const nm=`${p.first_name||''} ${p.last_name||''}`.trim();return{id:pid,n:nm,pos:p.position,age:p.age||0,val:S.vals.get(pid)||0,ppg:S.ppg.get(nm.toLowerCase())||0}}).filter(x=>x.n);
  document.getElementById('roster'+side).innerHTML=teams[side].map(p=>`<div class="flex justify-between py-0.5 hover:bg-white/5 px-1 rounded"><span class="truncate">${p.pos} ${p.n}</span><span class="font-mono text-white/50">${Math.round(p.val)}</span></div>`).join('');
  document.getElementById('picks'+side).textContent = (r.settings?.total_roster_points||'—'); // placeholder
  update();
}

const long=(a,pos)=>{const pk={QB:30,RB:24,WR:26,TE:27}[pos]||26;return Math.max(.3,1-Math.abs(a-pk)*.06)};
const base=p=>Math.round((p.val||p.ppg*10)*long(p.age,p.pos)*({QB:1.2,RB:1.05,WR:1.08,TE:.82}[p.pos]||1));
const optimal=team=>{const pool=[...team].sort((x,y)=>y.ppg-x.ppg);const used=new Set();let t=0;for(const s of S.slots){let pos=[s];if(s==='FLEX')pos=['RB','WR','TE'];if(s==='SUPER_FLEX')pos=['QB','RB','WR','TE'];if(s==='WRRB_FLEX')pos=['RB','WR'];if(s==='REC_FLEX')pos=['WR','TE'];const i=pool.findIndex(p=>!used.has(p.id)&&pos.includes(p.pos));if(i>=0){t+=pool[i].ppg;used.add(pool[i].id)}}return t};

function update(){
  const stats=t=>{const v=t.reduce((s,p)=>s+base(p),0);const age=t.length?t.reduce((s,p)=>s+p.age,0)/t.length:0;const opt=optimal(t);const long=t.length?t.reduce((s,p)=>s+long(p.age,p.pos),0)/t.length*100:0;return{v,age,opt,long}};
  const A=stats(teams.A), B=stats(teams.B);
  const fmt=(l,v,f=x=>x)=>`<div class="flex justify-between py-1.5 border-b border-white/5 last:border-0"><span class="text-white/60">${l}</span><span class="font-mono">${f(v)}</span></div>`;

  document.getElementById('impactA').innerHTML = [
    fmt('Value',A.v,x=>x.toLocaleString()),
    fmt('Opt PPG',A.opt,x=>x.toFixed(1)),
    fmt('Productivity',A.opt,x=>x.toFixed(1)),
    fmt('Longevity',A.long,x=>x.toFixed(0)+'%'),
    fmt('Age',A.age,x=>x.toFixed(1))
  ].join('');

  document.getElementById('impactB').innerHTML = [
    fmt('Value',B.v,x=>x.toLocaleString()),
    fmt('Opt PPG',B.opt,x=>x.toFixed(1)),
    fmt('Productivity',B.opt,x=>x.toFixed(1)),
    fmt('Longevity',B.long,x=>x.toFixed(0)+'%'),
    fmt('Age',B.age,x=>x.toFixed(1))
  ].join('');

  const diff=A.v-B.v; const fair=Math.max(0,100-Math.abs(diff)/Math.max(1,(A.v+B.v)/2)*100);
  document.getElementById('fairBar').style.width=fair+'%';
  document.getElementById('fairLabel').textContent = Math.abs(diff)<200?'Even':diff>0?`A +${Math.round(diff).toLocaleString()}`:`B +${Math.round(-diff).toLocaleString()}`;
}

document.getElementById('reset').onclick=init;
init();
</script>
</body>
</html>
