<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Dynasty Trade Calculator • 4 Equal Columns</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
body{font-family:'Outfit',system-ui;background:#020617;color:#e2e8f0}
.mono{font-family:'JetBrains Mono',monospace}
.scroll-thin::-webkit-scrollbar{width:6px;height:6px}
.scroll-thin::-webkit-scrollbar-thumb{background:rgba(148,163,184,.3);border-radius:3px}
.player-row:hover{background:rgba(255,255,255,.04)}
.player-row.selected{background:rgba(56,189,248,.10)}
.grid-4{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:1rem}
@media (max-width:1400px){.grid-4{grid-template-columns:repeat(4,minmax(320px,1fr));overflow-x:auto;padding-bottom:0.5rem}}
</style>
</head>
<body class="min-h-screen">
<header class="sticky top-0 z-40 border-b border-white/10 bg-slate-950/80 backdrop-blur">
  <div class="max-w-[1800px] mx-auto px-4 h-14 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-cyan-400 to-violet-500 flex items-center justify-center"><i class="fa-solid fa-arrows-rotate text-slate-900 text-sm"></i></div>
      <div class="font-semibold">Dynasty Trade Calculator</div>
      <span id="league-name" class="ml-3 text-xs text-slate-400 mono hidden sm:inline"></span>
    </div>
    <div class="flex items-center gap-2">
      <select id="team-a-select" class="bg-slate-900 border border-white/10 rounded-lg px-2 py-1.5 text-xs w-40"></select>
      <button id="swap-btn" class="px-2 py-1.5 rounded-lg bg-white/5 hover:bg-white/10 border border-white/10 text-xs"><i class="fa-solid fa-right-left"></i></button>
      <select id="team-b-select" class="bg-slate-900 border border-white/10 rounded-lg px-2 py-1.5 text-xs w-40"></select>
      <button id="reset-btn" class="px-2 py-1.5 rounded-lg bg-white/5 hover:bg-white/10 border border-white/10 text-xs">Reset</button>
    </div>
  </div>
</header>

<main class="max-w-[1800px] mx-auto px-4 py-4">
  <div id="status" class="mb-3 text-xs text-slate-400 flex items-center gap-2"><div class="w-1.5 h-1.5 rounded-full bg-cyan-400 animate-pulse"></div><span id="status-text">Loading…</span></div>

  <!-- Top summary bar -->
  <div class="grid grid-cols-4 gap-4 mb-4">
    <div class="bg-slate-900/60 border border-white/10 rounded-xl p-3">
      <div class="text-[10px] uppercase text-slate-500">Team A Sends</div>
      <div id="send-a" class="text-xl font-semibold mono">0</div>
      <div class="text-xs text-slate-400"><span id="count-a">0</span> players</div>
    </div>
    <div class="bg-slate-900/60 border border-cyan-500/20 rounded-xl p-3">
      <div class="text-[10px] uppercase text-cyan-300">Fairness</div>
      <div id="fairness-label" class="text-xl font-semibold mono">Even</div>
      <div class="mt-1 h-1.5 rounded-full bg-slate-800 overflow-hidden"><div id="fairness-bar" class="h-full w-1/2 bg-gradient-to-r from-cyan-400 to-violet-500"></div></div>
    </div>
    <div class="bg-slate-900/60 border border-violet-500/20 rounded-xl p-3">
      <div class="text-[10px] uppercase text-violet-300">Trade Summary</div>
      <div class="text-xs mt-1 text-slate-300">A ↔ B value delta</div>
      <div class="text-xs mono" id="delta-summary">0</div>
    </div>
    <div class="bg-slate-900/60 border border-white/10 rounded-xl p-3">
      <div class="text-[10px] uppercase text-slate-500">Team B Sends</div>
      <div id="send-b" class="text-xl font-semibold mono">0</div>
      <div class="text-xs text-slate-400"><span id="count-b">0</span> players</div>
    </div>
  </div>

  <!-- 4 EQUAL COLUMNS -->
  <div class="grid-4">
    <!-- Col 1: Team A -->
    <section class="bg-slate-900/60 border border-white/10 rounded-2xl flex flex-col h-[720px] min-w-0">
      <div class="p-3 border-b border-white/10 bg-cyan-500/10">
        <h2 class="font-semibold text-cyan-300 text-sm">Team A Roster</h2>
        <input id="search-a" placeholder="Filter…" class="mt-2 w-full bg-slate-950 border border-white/10 rounded-lg px-2 py-1.5 text-xs">
      </div>
      <div class="px-2 py-1.5 text-[10px] uppercase tracking-wider text-slate-500 grid grid-cols-[20px_36px_1fr_40px_50px_50px] gap-2 border-b border-white/5">
        <div></div><div>Pos</div><div>Name</div><div class="text-right">Age</div><div class="text-right">Val</div><div class="text-right">PPG</div>
      </div>
      <div id="roster-a" class="flex-1 overflow-y-auto scroll-thin p-1.5 space-y-0.5"></div>
    </section>

    <!-- Col 2: Impact A -->
    <section class="bg-slate-900/60 border border-cyan-500/20 rounded-2xl flex flex-col h-[720px] min-w-0">
      <div class="p-3 border-b border-white/10 bg-cyan-500/10">
        <h2 class="font-semibold text-cyan-300 text-sm">Impact on Team A</h2>
      </div>
      <div class="p-3 space-y-3 overflow-y-auto scroll-thin">
        <div id="impact-a" class="grid grid-cols-2 gap-2"></div>
        <div id="warnings-a" class="space-y-1.5"></div>
        <div class="pt-3 border-t border-white/10">
          <h3 class="text-[11px] font-semibold text-slate-300 mb-2 uppercase tracking-wide">Optimal Starters</h3>
          <div id="opt-a" class="mono text-[11px] space-y-0.5"></div>
        </div>
      </div>
    </section>

    <!-- Col 3: Impact B -->
    <section class="bg-slate-900/60 border border-violet-500/20 rounded-2xl flex flex-col h-[720px] min-w-0">
      <div class="p-3 border-b border-white/10 bg-violet-500/10">
        <h2 class="font-semibold text-violet-300 text-sm">Impact on Team B</h2>
      </div>
      <div class="p-3 space-y-3 overflow-y-auto scroll-thin">
        <div id="impact-b" class="grid grid-cols-2 gap-2"></div>
        <div id="warnings-b" class="space-y-1.5"></div>
        <div class="pt-3 border-t border-white/10">
          <h3 class="text-[11px] font-semibold text-slate-300 mb-2 uppercase tracking-wide">Optimal Starters</h3>
          <div id="opt-b" class="mono text-[11px] space-y-0.5"></div>
        </div>
      </div>
    </section>

    <!-- Col 4: Team B -->
    <section class="bg-slate-900/60 border border-white/10 rounded-2xl flex flex-col h-[720px] min-w-0">
      <div class="p-3 border-b border-white/10 bg-violet-500/10">
        <h2 class="font-semibold text-violet-300 text-sm">Team B Roster</h2>
        <input id="search-b" placeholder="Filter…" class="mt-2 w-full bg-slate-950 border border-white/10 rounded-lg px-2 py-1.5 text-xs">
      </div>
      <div class="px-2 py-1.5 text-[10px] uppercase tracking-wider text-slate-500 grid grid-cols-[20px_36px_1fr_40px_50px_50px] gap-2 border-b border-white/5">
        <div></div><div>Pos</div><div>Name</div><div class="text-right">Age</div><div class="text-right">Val</div><div class="text-right">PPG</div>
      </div>
      <div id="roster-b" class="flex-1 overflow-y-auto scroll-thin p-1.5 space-y-0.5"></div>
    </section>
  </div>
</main>

<script>
(() => {
  const DEFAULT_LEAGUE = '1313454100225990656';
  const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRZY-Dra8s3j-ocJ7OK6yTs3BFcj-A_WeiIX35u49fg2xA8Y3Pg-nnOHVOnfZGOEAFWrj1EFBOV6qzi/pub?gid=2077026411&single=true&output=csv';
  const params = new URLSearchParams(location.search);
  const league_id = params.get('league_id') || DEFAULT_LEAGUE;

  const state = { league:null, users:[], rosters:[], players:{}, values:new Map(), teamA:null, teamB:null, selectedA:new Set(), selectedB:new Set(), rosterPos:[] };
  const $ = s => document.querySelector(s);
  const fmt = n => n.toLocaleString();
  const fmt1 = n => (n>=0?'+':'')+n.toFixed(1);
  const fmtPct = n => (n>=0?'+':'')+n.toFixed(1)+'%';
  const setStatus = t => $('#status-text').textContent = t;

  const teamName = r => {
    const u = state.users.find(x=>x.user_id===r.owner_id);
    return u?.metadata?.team_name || u?.display_name || `Team ${r.roster_id}`;
  };

  function parseCSVLine(line){const out=[];let cur='';let q=false;for(let i=0;i<line.length;i++){const c=line[i];if(c==='"'){if(q&&line[i+1]==='"'){cur+='"';i++;}else q=!q;}else if(c===','&&!q){out.push(cur);cur='';}else cur+=c;}out.push(cur);return out;}

  async function loadValues(){
    try{
      let text;
      try{const r=await fetch(CSV_URL);text=await r.text();}catch{const r=await fetch('https://api.allorigins.win/raw?url='+encodeURIComponent(CSV_URL));text=await r.text();}
      const lines=text.split(/\r?\n/).filter(l=>l.trim());
      const h=parseCSVLine(lines[0]).map(x=>x.toLowerCase());
      const idx={id:h.findIndex(x=>x.includes('sleeper')),value:h.findIndex(x=>x.includes('value')),ppg:h.findIndex(x=>x.includes('ppg')),age:h.findIndex(x=>x.includes('age')),pos:h.findIndex(x=>x.includes('pos')),team:h.findIndex(x=>x.includes('team')),name:h.findIndex(x=>x.includes('name'))};
      for(let i=1;i<lines.length;i++){const c=parseCSVLine(lines[i]);const id=c[idx.id]?.trim();if(!id)continue;state.values.set(id,{value:+c[idx.value]||0,ppg:+c[idx.ppg]||0,age:+c[idx.age]||0,pos:c[idx.pos],team:c[idx.team],name:c[idx.name]});}
    }catch(e){console.warn(e);}
  }

  function playerFromId(pid){
    const p=state.players[pid]||{};
    const v=state.values.get(pid)||{};
    const pos=p.position||v.pos||'UNK';
    const age=p.age||v.age||24;
    const name=p.full_name||`${p.first_name||''} ${p.last_name||''}`.trim()||v.name||pid;
    const team=p.team||v.team||'FA';
    const value=v.value||1000;
    const ppg=v.ppg||5;
    return {id:pid,name,pos,team,age:+age,value:Math.round(value),ppg:+ppg.toFixed(1)};
  }

  function rosterPlayers(r){return (r.players||[]).map(playerFromId).sort((a,b)=>b.value-a.value);}

  function renderSelect(){
    const a=$('#team-a-select'),b=$('#team-b-select');
    a.innerHTML=b.innerHTML='';
    state.rosters.forEach(r=>{const o=document.createElement('option');o.value=r.roster_id;o.textContent=teamName(r);a.appendChild(o.cloneNode(true));b.appendChild(o.cloneNode(true));});
    state.teamA=state.rosters[0]?.roster_id;
    state.teamB=state.rosters[1]?.roster_id||state.rosters[0]?.roster_id;
    a.value=state.teamA; b.value=state.teamB;
  }

  function renderRoster(teamId,containerId,selSet,side){
    const r=state.rosters.find(x=>x.roster_id==teamId);
    if(!r) return;
    const players=rosterPlayers(r);
    const filter=$(`#search-${side}`).value.toLowerCase();
    const cont=$(containerId);
    cont.innerHTML='';
    players.filter(p=>!filter||p.name.toLowerCase().includes(filter)||p.pos.toLowerCase().includes(filter)).forEach(p=>{
      const sel=selSet.has(p.id);
      const row=document.createElement('div');
      row.className=`player-row grid grid-cols-[20px_36px_1fr_40px_50px_50px] gap-2 items-center px-2 py-1.5 rounded-lg border ${sel?'selected border-cyan-500/40':'border-transparent'} cursor-pointer`;
      row.innerHTML=`
        <input type="checkbox" ${sel?'checked':''} class="w-3.5 h-3.5 accent-cyan-500">
        <div class="text-[10px] font-bold mono bg-slate-800 rounded px-1 py-0.5 text-center">${p.pos}</div>
        <div class="text-sm truncate">${p.name}</div>
        <div class="text-xs mono text-right">${p.age.toFixed(1)}</div>
        <div class="text-xs mono font-semibold text-right">${fmt(p.value)}</div>
        <div class="text-xs mono text-right">${p.ppg.toFixed(1)}</div>
      `;
      row.onclick=e=>{if(e.target.tagName!=='INPUT')row.querySelector('input').click();};
      row.querySelector('input').onchange=e=>{e.target.checked?selSet.add(p.id):selSet.delete(p.id);updateAll();};
      cont.appendChild(row);
    });
  }

  function isEligible(pos,slot){
    if(slot===pos) return true;
    if(slot==='FLEX') return ['RB','WR','TE'].includes(pos);
    if(slot==='SUPER_FLEX') return ['QB','RB','WR','TE'].includes(pos);
    return false;
  }

  function computeOptimal(players){
    const slots=state.rosterPos.filter(s=>!['BN','IR','TAXI'].includes(s));
    const used=new Set();
    const line=[];
    for(const slot of slots){
      let best=null;
      for(const p of players){
        if(used.has(p.id)) continue;
        if(isEligible(p.pos,slot)&&(!best||p.ppg>best.ppg)) best=p;
      }
      if(best){used.add(best.id);line.push({slot,player:best});}
      else line.push({slot,player:null});
    }
    const total=line.reduce((s,x)=>s+(x.player?.ppg||0),0);
    const avgAge=line.filter(x=>x.player).reduce((s,x)=>s+x.player.age,0)/Math.max(1,line.filter(x=>x.player).length);
    return {line,total,avgAge};
  }

  function computeImpact(){
    const ra=state.rosters.find(r=>r.roster_id==state.teamA);
    const rb=state.rosters.find(r=>r.roster_id==state.teamB);
    if(!ra||!rb) return;
    const pa=rosterPlayers(ra), pb=rosterPlayers(rb);
    const selA=pa.filter(p=>state.selectedA.has(p.id));
    const selB=pb.filter(p=>state.selectedB.has(p.id));
    const sum=(a,k)=>a.reduce((s,x)=>s+x[k],0);
    const optBeforeA=computeOptimal(pa);
    const afterA=[...pa.filter(p=>!state.selectedA.has(p.id)),...selB];
    const optAfterA=computeOptimal(afterA);
    const optBeforeB=computeOptimal(pb);
    const afterB=[...pb.filter(p=>!state.selectedB.has(p.id)),...selA];
    const optAfterB=computeOptimal(afterB);
    const A={valueOut:sum(selA,'value'),valueIn:sum(selB,'value'),valueDeltaPct:sum(selA,'value')?(sum(selB,'value')-sum(selA,'value'))/sum(selA,'value')*100:0,ppgDelta:sum(selB,'ppg')-sum(selA,'ppg'),optPpgDelta:optAfterA.total-optBeforeA.total,ageDelta:(afterA.reduce((s,x)=>s+x.age,0)/afterA.length)-(pa.reduce((s,x)=>s+x.age,0)/pa.length)};
    const B={valueOut:sum(selB,'value'),valueIn:sum(selA,'value'),valueDeltaPct:sum(selB,'value')?(sum(selA,'value')-sum(selB,'value'))/sum(selB,'value')*100:0,ppgDelta:sum(selA,'ppg')-sum(selB,'ppg'),optPpgDelta:optAfterB.total-optBeforeB.total,ageDelta:(afterB.reduce((s,x)=>s+x.age,0)/afterB.length)-(pb.reduce((s,x)=>s+x.age,0)/pb.length)};
    return {A,B,selA,selB,optBeforeA,optAfterA,optBeforeB,optAfterB};
  }

  function metricCard(label,val){
    return `<div class="rounded-lg bg-white/[0.03] border border-white/10 p-2.5"><div class="text-[10px] uppercase text-slate-400">${label}</div><div class="mono text-sm font-semibold mt-0.5">${val}</div></div>`;
  }

  function renderImpact(){
    const imp=computeImpact(); if(!imp) return;
    const {A,B,selA,selB,optBeforeA,optAfterA,optBeforeB,optAfterB}=imp;
    $('#impact-a').innerHTML=[metricCard('Value Δ %',fmtPct(A.valueDeltaPct)),metricCard('PPG Δ',fmt1(A.ppgDelta)),metricCard('OPT PPG Δ',fmt1(A.optPpgDelta)),metricCard('Age Δ',fmt1(A.ageDelta)+'y')].join('');
    $('#impact-b').innerHTML=[metricCard('Value Δ %',fmtPct(B.valueDeltaPct)),metricCard('PPG Δ',fmt1(B.ppgDelta)),metricCard('OPT PPG Δ',fmt1(B.optPpgDelta)),metricCard('Age Δ',fmt1(B.ageDelta)+'y')].join('');
    $('#send-a').textContent=fmt(A.valueOut);
    $('#send-b').textContent=fmt(B.valueOut);
    $('#count-a').textContent=selA.length;
    $('#count-b').textContent=selB.length;
    $('#delta-summary').textContent=`${fmtPct(A.valueDeltaPct)} / ${fmtPct(B.valueDeltaPct)}`;
    const fairness=Math.max(-100,Math.min(100,B.valueDeltaPct-A.valueDeltaPct));
    $('#fairness-bar').style.width=`${50+fairness/2}%`;
    $('#fairness-label').textContent=Math.abs(fairness)<5?'Even':fairness>0?'B +':'A +';
    const lineHTML=(b,a)=>b.line.map((l,i)=>`<div class="flex justify-between"><span class="text-slate-500 w-14">${l.slot}</span><span class="truncate flex-1">${l.player?.name||'—'}</span><span class="text-slate-600 mx-1">→</span><span class="truncate flex-1 text-cyan-300">${a.line[i].player?.name||'—'}</span></div>`).join('');
    $('#opt-a').innerHTML=lineHTML(optBeforeA,optAfterA);
    $('#opt-b').innerHTML=lineHTML(optBeforeB,optAfterB);
    const warn=(m)=>{const w=[];if(m.valueDeltaPct<-10)w.push('Losing value');if(m.optPpgDelta<-1)w.push('Starters weaker');if(m.ageDelta>0.5)w.push('Getting older');return w;};
    $('#warnings-a').innerHTML=warn(A).map(t=>`<div class="text-xs px-2 py-1 rounded bg-amber-500/10 border border-amber-500/20 text-amber-200">${t}</div>`).join('')||'<div class="text-xs text-slate-500">No warnings</div>';
    $('#warnings-b').innerHTML=warn(B).map(t=>`<div class="text-xs px-2 py-1 rounded bg-amber-500/10 border border-amber-500/20 text-amber-200">${t}</div>`).join('')||'<div class="text-xs text-slate-500">No warnings</div>';
  }

  function updateAll(){
    renderRoster(state.teamA,'#roster-a',state.selectedA,'a');
    renderRoster(state.teamB,'#roster-b',state.selectedB,'b');
    renderImpact();
  }

  async function init(){
    setStatus('Loading league…');
    try{
      const [league,users,rosters,players]=await Promise.all([
        fetch(`https://api.sleeper.app/v1/league/${league_id}`).then(r=>r.json()),
        fetch(`https://api.sleeper.app/v1/league/${league_id}/users`).then(r=>r.json()),
        fetch(`https://api.sleeper.app/v1/league/${league_id}/rosters`).then(r=>r.json()),
        fetch('https://api.sleeper.app/v1/players/nfl').then(r=>r.json())
      ]);
      state.league=league; state.users=users; state.rosters=rosters; state.players=players; state.rosterPos=league.roster_positions||[];
      $('#league-name').textContent=league.name;
      await loadValues();
      renderSelect();
      setStatus('Ready');
      updateAll();
    }catch(e){
      console.error(e);
      setStatus('Failed to load league');
    }
  }

  $('#team-a-select').onchange=e=>{state.teamA=+e.target.value;state.selectedA.clear();updateAll()};
  $('#team-b-select').onchange=e=>{state.teamB=+e.target.value;state.selectedB.clear();updateAll()};
  $('#search-a').oninput=()=>renderRoster(state.teamA,'#roster-a',state.selectedA,'a');
  $('#search-b').oninput=()=>renderRoster(state.teamB,'#roster-b',state.selectedB,'b');
  $('#reset-btn').onclick=()=>{state.selectedA.clear();state.selectedB.clear();updateAll()};
  $('#swap-btn').onclick=()=>{[state.teamA,state.teamB]=[state.teamB,state.teamA];[state.selectedA,state.selectedB]=[state.selectedB,state.selectedA];$('#team-a-select').value=state.teamA;$('#team-b-select').value=state.teamB;updateAll()};

  document.addEventListener('DOMContentLoaded',init);
})();
</script>
</body>
</html>
