<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>TradeCalc Pro — Lineup View</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>:root{color-scheme:dark}body{font-family:Outfit;background:#030712;color:#e5e7eb}.glass{background:rgba(17,24,39,.7);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.08)}.mono{font-family:"JetBrains Mono",monospace}.player:hover{background:rgba(255,255,255,.05)}</style>
</head>
<body>
<main class="max-w-[1600px] mx-auto p-6">
  <!-- IMPACT -->
  <div class="grid lg:grid-cols-2 gap-5 mb-6">
    <div class="glass rounded-2xl p-5">
      <h2 class="font-medium mb-3 text-violet-300">Team A Impact <span id="countA" class="text-xs opacity-60"></span></h2>
      <div id="tradeA" class="flex flex-wrap gap-1.5 mb-3 min-h-[28px]"></div>
      <div id="statsA" class="space-y-1"></div>
    </div>
    <div class="glass rounded-2xl p-5">
      <h2 class="font-medium mb-3 text-cyan-300">Team B Impact <span id="countB" class="text-xs opacity-60"></span></h2>
      <div id="tradeB" class="flex flex-wrap gap-1.5 mb-3 min-h-[28px]"></div>
      <div id="statsB" class="space-y-1"></div>
    </div>
  </div>

  <!-- ROSTERS -->
  <div class="grid lg:grid-cols-2 gap-5">
    <div class="glass rounded-2xl p-4">
      <select id="teamA" class="w-full mb-3 bg-black/40 border border-white/10 rounded-lg px-3 py-2 text-sm"></select>
      <div id="listA" class="max-h-[700px] overflow-auto pr-2"></div>
    </div>
    <div class="glass rounded-2xl p-4">
      <select id="teamB" class="w-full mb-3 bg-black/40 border border-white/10 rounded-lg px-3 py-2 text-sm"></select>
      <div id="listB" class="max-h-[700px] overflow-auto pr-2"></div>
    </div>
  </div>
</main>

<script>
const LEAGUE='1313454100225990656';
const VAL='https://docs.google.com/spreadsheets/d/e/2PACX-1vRqxhqyuKK6vu_EoYta5FZ_KdOB8M54Q_qBwJKOUF5KcgbTt2dmHn_FuLj9d-FS8-ta5T0zkU0QEGcN/pub?gid=4113168&single=true&output=csv';
const PPG='https://docs.google.com/spreadsheets/d/e/2PACX-1vRqxhqyuKK6vu_EoYta5FZ_KdOB8M54Q_qBwJKOUF5KcgbTt2dmHn_FuLj9d-FS8-ta5T0zkU0QEGcN/pub?gid=118408869&single=true&output=csv';

let S={}, rosters={A:[],B:[]}, trade={A:[],B:[]};

async function init(){
  const [lg,us,ro,pl,v,p]=await Promise.all([
    fetch(`https://api.sleeper.app/v1/league/${LEAGUE}`).then(r=>r.json()),
    fetch(`https://api.sleeper.app/v1/league/${LEAGUE}/users`).then(r=>r.json()),
    fetch(`https://api.sleeper.app/v1/league/${LEAGUE}/rosters`).then(r=>r.json()),
    fetch('https://api.sleeper.app/v1/players/nfl').then(r=>r.json()),
    fetch(VAL).then(r=>r.text()), fetch(PPG).then(r=>r.text())
  ]);
  S.slots=lg.roster_positions.filter(x=>!['BN','IR','TAXI'].includes(x));
  const sf=lg.roster_positions.includes('SUPER_FLEX');
  S.vals=new Map(); S.ppg=new Map(); S.players=pl; S.rosters=ro;
  Papa.parse(v,{header:true}).data.forEach(r=>r.sleeper_id&&S.vals.set(r.sleeper_id,parseFloat(sf?r.val_sf_ppr_tep05:r.val_1qb_ppr_tep05)||0));
  Papa.parse(p,{header:true}).data.forEach(r=>r.Player&&S.ppg.set(r.Player.toLowerCase(),parseFloat(r['Avg_PPR_0.5_TEP'])||0));
  const a=teamA,b=teamB;
  us.forEach(u=>{const r=ro.find(x=>x.owner_id===u.user_id);if(!r)return;const o=document.createElement('option');o.value=r.roster_id;o.textContent=u.metadata?.team_name||u.display_name;a.appendChild(o.cloneNode(true));b.appendChild(o);});
  a.onchange=()=>load('A',+a.value); b.onchange=()=>load('B',+b.value);
  load('A',+a.options[0].value); load('B',+b.options[1].value);
}

function load(side,id){
  const r=S.rosters.find(x=>x.roster_id===id);
  rosters[side]=r.players.map(pid=>{const p=S.players[pid]||{};const n=`${p.first_name||''} ${p.last_name||''}`.trim();return{id:pid,n,pos:p.position,age:p.age||0,val:S.vals.get(pid)||0,ppg:S.ppg.get(n.toLowerCase())||0}}).filter(x=>x.n);
  trade[side]=[]; render(side); update();
}

function getOptimal(team){
  const pool=[...team].sort((a,b)=>b.ppg-a.ppg);const used=new Set();const out=[];
  for(const slot of S.slots){
    let pos=[slot];if(slot==='FLEX')pos=['RB','WR','TE'];if(slot==='SUPER_FLEX')pos=['QB','RB','WR','TE'];if(slot==='WRRB_FLEX')pos=['RB','WR'];if(slot==='REC_FLEX')pos=['WR','TE'];
    const idx=pool.findIndex(p=>!used.has(p.id)&&pos.includes(p.pos));
    if(idx>=0){out.push({slot,player:pool[idx]});used.add(pool[idx].id)}else out.push({slot,player:null});
  }
  return out;
}

function render(side){
  const team=rosters[side];
  const lineup=getOptimal(team);
  const starterIds=new Set(lineup.filter(l=>l.player).map(l=>l.player.id));
  const bench=team.filter(p=>!starterIds.has(p.id)).sort((a,b)=>b.val-a.val);

  const row=(p,slot='')=>{
    const sel=trade[side].some(x=>x.id===p.id);
    return `<div class="player flex items-center justify-between p-2.5 mb-1 rounded-xl border ${sel?'border-violet-500 bg-violet-500/10':'border-white/10'} cursor-pointer" onclick="toggle('${side}','${p.id}')">
      <div class="flex items-center gap-2.5 min-w-0">
        ${slot?`<span class="text-[10px] w-16 text-emerald-400/70">${slot}</span>`:`<span class="w-16"></span>`}
        <div class="min-w-0">
          <div class="text-[13px] truncate">${p.pos} ${p.n} <span class="text-white/40 text-[11px]">${p.age}</span></div>
          <div class="text-[11px] text-white/40">${p.ppg.toFixed(1)} ppg</div>
        </div>
      </div>
      <div class="mono text-[11px] text-right">${Math.round(p.val).toLocaleString()}</div>
    </div>`;
  };

  document.getElementById('list'+side).innerHTML=`
    <div class="mb-4">
      <div class="text-[10px] uppercase tracking-wider text-emerald-400 mb-2 px-1">Starting Lineup</div>
      ${lineup.map(l=>l.player?row(l.player,l.slot):`<div class="p-2.5 mb-1 rounded-xl border border-dashed border-white/10 text-xs text-white/30">${l.slot} — empty</div>`).join('')}
    </div>
    <div>
      <div class="text-[10px] uppercase tracking-wider text-white/30 mb-2 px-1">Bench (${bench.length})</div>
      ${bench.map(p=>row(p)).join('')}
    </div>`;
}

function toggle(s,id){const p=rosters[s].find(x=>x.id===id);const i=trade[s].findIndex(x=>x.id===id);i>=0?trade[s].splice(i,1):trade[s].push(p);render(s);update();}

function getStats(team){
  const val=team.reduce((s,p)=>s+p.val,0);
  const optRoster=team.reduce((s,p)=>s+p.ppg,0);
  const lineup=getOptimal(team);
  const opt=lineup.reduce((s,l)=>s+(l.player?.ppg||0),0);
  const production=opt*17;
  const long=team.length?team.reduce((s,p)=>{const pk={QB:30,RB:24,WR:26,TE:27}[p.pos]||26;return s+Math.max(30,100-Math.abs(p.age-pk)*5)},0)/team.length:0;
  const age=team.length?team.reduce((s,p)=>s+p.age,0)/team.length:0;
  const starters=lineup.filter(l=>l.player);
  const ageStarter=starters.length?starters.reduce((s,l)=>s+l.player.age,0)/starters.length:0;
  return {val,optRoster,opt,production,long,age,ageStarter};
}

function update(){
  ['A','B'].forEach(s=>{
    document.getElementById('count'+s).textContent=`(${trade[s].length})`;
    document.getElementById('trade'+s).innerHTML=trade[s].map(p=>`<span class="px-2.5 py-1 rounded-lg bg-white/10 text-xs cursor-pointer" onclick="toggle('${s}','${p.id}')">${p.pos} ${p.n} ✕</span>`).join('')||'<span class="text-xs text-white/30">No players selected</span>';
  });

  const teamA=[...rosters.A.filter(p=>!trade.A.some(t=>t.id===p.id)),...trade.B];
  const teamB=[...rosters.B.filter(p=>!trade.B.some(t=>t.id===p.id)),...trade.A];
  const A=getStats(teamA), B=getStats(teamB), bA=getStats(rosters.A), bB=getStats(rosters.B);

  const renderStats=(el,after,before)=>{
    const rows=[
      ['Starting Value',after.val,before.val,0],
      ['Opt PPG Roster',after.optRoster,before.optRoster,1],
      ['Opt PPG Starters',after.opt,before.opt,1],
      ['Production',after.production,before.production,0],
      ['Longevity',after.long,before.long,0],
      ['Avg Age',after.age,before.age,1],
      ['Avg Age Starters',after.ageStarter,before.ageStarter,1]
    ];
    el.innerHTML=rows.map(([l,a,b,d])=>{
      const delta=a-b;const col=delta>0?'text-emerald-400':delta<0?'text-red-400':'text-white/40';
      return `<div class="flex justify-between items-center py-2 px-3 mb-1 rounded-lg bg-black/20 border border-white/5">
        <span class="text-[12px] text-white/60">${l}</span>
        <div class="flex items-center gap-4">
          <span class="mono text-[13px] w-20 text-right">${a.toFixed(d)}</span>
          <span class="mono text-[11px] w-14 text-right ${col}">${delta!==0?(delta>0?'+':'')+delta.toFixed(d):'—'}</span>
        </div>
      </div>`;
    }).join('');
  };
  renderStats(statsA,A,bA); renderStats(statsB,B,bB);
}

window.toggle=toggle; init();
</script>
</body>
</html>
