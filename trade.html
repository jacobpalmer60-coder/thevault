<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TradeCalc Pro — Position Groups</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>:root{color-scheme:dark}body{font-family:Outfit,system-ui;background:#050810}.glass{backdrop-filter:blur(20px)}</style>
</head>
<body class="text-white">
<header class="sticky top-0 z-40 border-b border-white/5 bg-black/30 glass">
  <div class="max-w-[1200px] mx-auto px-6 h-[64px] flex items-center justify-between">
    <div class="font-semibold">TradeCalc Pro</div>
    <button id="resetBtn" class="text-xs px-3 py-1.5 rounded-xl bg-white/5 border border-white/10">Reset</button>
  </div>
</header>

<main class="max-w-[1200px] mx-auto px-6 py-8">
  <section id="analysis" class="mb-8 hidden">
    <div class="glass rounded-[28px] border border-white/10 bg-white/[0.03] p-6">
      <div class="flex items-center justify-between mb-5">
        <h3 class="font-semibold text-[18px]">Trade Evaluation</h3>
        <span id="verdictPill" class="text-[11px] px-2.5 py-1 rounded-full bg-white/10">—</span>
      </div>
      <div class="grid md:grid-cols-2 gap-5">
        <div class="rounded-2xl bg-violet-500/5 border border-violet-500/20 p-5">
          <div class="font-medium text-violet-200 mb-3">Team A Impact</div>
          <div id="statsA" class="space-y-2.5 text-[13px]"></div>
        </div>
        <div class="rounded-2xl bg-cyan-500/5 border border-cyan-500/20 p-5">
          <div class="font-medium text-cyan-200 mb-3">Team B Impact</div>
          <div id="statsB" class="space-y-2.5 text-[13px]"></div>
        </div>
      </div>
      <div class="mt-5 pt-4 border-t border-white/10">
        <div class="flex justify-between text-[12px] mb-2"><span class="text-white/60">Fairness</span><span id="fairText" class="font-mono">—</span></div>
        <div class="h-2 bg-white/5 rounded-full overflow-hidden"><div id="fairBar" class="h-full w-0 bg-gradient-to-r from-violet-500 to-cyan-400"></div></div>
      </div>
    </div>
  </section>

  <div class="grid lg:grid-cols-[1fr_72px_1fr] gap-5">
    <section class="glass rounded-[24px] border border-white/10 p-5">
      <div class="flex justify-between mb-3"><select id="teamSelectA" class="bg-black/40 border border-white/10 rounded px-2 py-1 text-sm"></select><span class="text-xs text-white/50">Team A</span></div>
      <div id="listA" class="space-y-3 max-h-[520px] overflow-auto pr-2 text-[13px]">Loading...</div>
    </section>
    <div class="hidden lg:grid place-items-center"><div class="w-10 h-10 rounded-full bg-white/5 grid place-items-center">VS</div></div>
    <section class="glass rounded-[24px] border border-white/10 p-5">
      <div class="flex justify-between mb-3"><select id="teamSelectB" class="bg-black/40 border border-white/10 rounded px-2 py-1 text-sm"></select><span class="text-xs text-white/50">Team B</span></div>
      <div id="listB" class="space-y-3 max-h-[520px] overflow-auto pr-2 text-[13px]">Loading...</div>
    </section>
  </div>
</main>

<script>
const LEAGUE_ID='1313454100225990656';
const VALUES_URL='https://docs.google.com/spreadsheets/d/e/2PACX-1vRqxhqyuKK6vu_EoYta5FZ_KdOB8M54Q_qBwJKOUF5KcgbTt2dmHn_FuLj9d-FS8-ta5T0zkU0QEGcN/pub?gid=4113168&single=true&output=csv';
const PPG_URL='https://docs.google.com/spreadsheets/d/e/2PACX-1vRqxhqyuKK6vu_EoYta5FZ_KdOB8M54Q_qBwJKOUF5KcgbTt2dmHn_FuLj9d-FS8-ta5T0zkU0QEGcN/pub?gid=118408869&single=true&output=csv';

let sleeper={users:[],rosters:[],players:{},values:new Map(),ppg:new Map(),slots:[]};
const state={A:[],B:[]};

async function load(){
  const [league,users,rosters,players,vCsv,pCsv]=await Promise.all([
    fetch(`https://api.sleeper.app/v1/league/${LEAGUE_ID}`).then(r=>r.json()),
    fetch(`https://api.sleeper.app/v1/league/${LEAGUE_ID}/users`).then(r=>r.json()),
    fetch(`https://api.sleeper.app/v1/league/${LEAGUE_ID}/rosters`).then(r=>r.json()),
    fetch('https://api.sleeper.app/v1/players/nfl').then(r=>r.json()),
    fetch(VALUES_URL).then(r=>r.text()),
    fetch(PPG_URL).then(r=>r.text())
  ]);
  sleeper.users=users; sleeper.rosters=rosters; sleeper.players=players;
  sleeper.slots=(league.roster_positions||[]).filter(s=>!['BN','IR','TAXI'].includes(s));
  const isSF=league.roster_positions.includes('SUPER_FLEX');
  Papa.parse(vCsv,{header:true,skipEmptyLines:true}).data.forEach(r=>{const id=String(r.sleeper_id||'').trim();if(id)sleeper.values.set(id,parseFloat(isSF?r.val_sf_ppr_tep05:r.val_1qb_ppr_tep05)||0)});
  Papa.parse(pCsv,{header:true,skipEmptyLines:true}).data.forEach(r=>{const n=r.Player||'';if(n)sleeper.ppg.set(n.toLowerCase(),parseFloat(r['Avg_PPR_0.5_TEP'])||0)});

  const a=document.getElementById('teamSelectA'), b=document.getElementById('teamSelectB'); a.innerHTML=''; b.innerHTML='';
  users.forEach(u=>{const r=rosters.find(x=>x.owner_id===u.user_id);if(!r)return;const n=u.metadata?.team_name||u.display_name;const o=document.createElement('option');o.value=r.roster_id;o.textContent=n;a.appendChild(o.cloneNode(true));b.appendChild(o);});
  a.onchange=()=>loadTeam('A',+a.value); b.onchange=()=>loadTeam('B',+b.value);
  if(rosters[0]){a.value=rosters[0].roster_id;loadTeam('A',rosters[0].roster_id)}
  if(rosters[1]){b.value=rosters[1].roster_id;loadTeam('B',rosters[1].roster_id)}
}

function loadTeam(side,id){
  const r=sleeper.rosters.find(x=>x.roster_id===id);
  state[side]=(r.players||[]).map(pid=>{const p=sleeper.players[pid]||{};const nm=`${p.first_name||''} ${p.last_name||''}`.trim();return{id:pid,n:nm,pos:p.position||'?',age:p.age||0,value:sleeper.values.get(pid)||0,ppg:sleeper.ppg.get(nm.toLowerCase())||0}}).filter(p=>p.n);

  // ORGANIZE BY POSITION, DESCENDING VALUE
  const grouped={}; state[side].forEach(p=>{(grouped[p.pos]=grouped[p.pos]||[]).push(p)});
  const order=['QB','RB','WR','TE','K','DEF'];
  const allPos=[...order.filter(p=>grouped[p]),...Object.keys(grouped).filter(p=>!order.includes(p)).sort()];

  const html=allPos.map(pos=>{
    const players=grouped[pos].sort((a,b)=>b.value-a.value);
    return `<div>
      <div class="text-[11px] uppercase tracking-wider text-white/40 mb-1.5 mt-3 first:mt-0">${pos} <span class="text-white/20">(${players.length})</span></div>
      <div class="space-y-1">
        ${players.map(p=>`
          <div class="flex items-center justify-between py-1.5 px-2.5 rounded-lg bg-white/[0.02] hover:bg-white/[0.05] border border-white/5">
            <div class="flex items-center gap-2 min-w-0">
              <span class="text-[11px] w-5 text-white/40">${players.indexOf(p)+1}</span>
              <span class="truncate">${p.n}</span>
              <span class="text-[10px] text-white/30">${p.age}y</span>
            </div>
            <div class="flex items-center gap-3">
              <span class="text-[11px] text-white/40">${p.ppg.toFixed(1)}</span>
              <span class="font-mono text-[12px] w-12 text-right">${Math.round(p.value).toLocaleString()}</span>
            </div>
          </div>`).join('')}
      </div>
    </div>`;
  }).join('');

  document.getElementById('list'+side).innerHTML=html;
  calc();
}

const long=(a,pos)=>{const pk={QB:30,RB:24,WR:26,TE:27}[pos]||26;return Math.max(.3,1-Math.abs(a-pk)*.06)};
const base=p=>Math.round((p.value||p.ppg*10)*long(p.age,p.pos)*({QB:1.2,RB:1.05,WR:1.08,TE:.82}[p.pos]||1));

function optimal(team){
  const pool=[...team].sort((x,y)=>y.ppg-x.ppg); const used=new Set(); let t=0;
  for(const s of sleeper.slots){
    let pos=[s]; if(s==='FLEX')pos=['RB','WR','TE']; if(s==='SUPER_FLEX')pos=['QB','RB','WR','TE']; if(s==='WRRB_FLEX')pos=['RB','WR']; if(s==='REC_FLEX')pos=['WR','TE'];
    const i=pool.findIndex(p=>!used.has(p.id)&&pos.includes(p.pos)); if(i>=0){t+=pool[i].ppg;used.add(pool[i].id)}
  }
  return t;
}

function calc(){
  const getStats=team=>{
    const val=team.reduce((s,p)=>s+base(p),0);
    const age=team.length?team.reduce((s,p)=>s+p.age,0)/team.length:0;
    const opt=optimal(team);
    const long=team.length?team.reduce((s,p)=>s+long(p.age,p.pos),0)/team.length*100:0;
    return {val,age,opt,prod:opt,long};
  };
  const A=getStats(state.A), B=getStats(state.B);
  document.getElementById('analysis').classList.toggle('hidden',!(A.val+B.val));

  const row=(l,v,f=x=>x)=>`<div class="flex justify-between"><span class="text-white/60">${l}</span><span class="font-mono">${f(v)}</span></div>`;
  document.getElementById('statsA').innerHTML=[row('Value',A.val,x=>x.toLocaleString()),row('Opt PPG',A.opt,x=>x.toFixed(1)),row('Productivity',A.prod,x=>x.toFixed(1)),row('Longevity',A.long,x=>x.toFixed(0)+'%'),row('Age',A.age,x=>x.toFixed(1))].join('');
  document.getElementById('statsB').innerHTML=[row('Value',B.val,x=>x.toLocaleString()),row('Opt PPG',B.opt,x=>x.toFixed(1)),row('Productivity',B.prod,x=>x.toFixed(1)),row('Longevity',B.long,x=>x.toFixed(0)+'%'),row('Age',B.age,x=>x.toFixed(1))].join('');

  const diff=A.val-B.val; const fair=Math.max(0,100-Math.abs(diff)/Math.max(1,(A.val+B.val)/2)*100);
  document.getElementById('verdictPill').textContent=Math.abs(diff)<200?'Even':diff>0?'A +'+Math.round(diff).toLocaleString():'B +'+Math.round(-diff).toLocaleString();
  document.getElementById('fairText').textContent=Math.round(fair)+'% fair';
  document.getElementById('fairBar').style.width=Math.round(fair)+'%';
}

document.getElementById('resetBtn').onclick=load;
load();
</script>
</body>
</html>
