<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>TradeCalc Pro — Revamped</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root{color-scheme:dark}
  body{font-family:Outfit,system-ui;background:#030712;color:#e5e7eb}
 .glass{background:rgba(17,24,39,.7);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.08)}
 .player{transition:all.15s}
 .player:hover{transform:translateY(-1px);background:rgba(255,255,255,.05)}
 .player.selected{outline:2px solid #8b5cf6;background:rgba(139,92,246,.12);box-shadow:0 0 20px rgba(139,92,246,.2)}
 .mono{font-family:"JetBrains Mono",monospace}
</style>
</head>
<body class="min-h-screen">
<div class="absolute inset-0 -z-10">
  <div class="absolute top-[-20%] left-[10%] w-[500px] h-[500px] bg-violet-600/20 rounded-full blur-[120px]"></div>
  <div class="absolute bottom-[-10%] right-[5%] w-[400px] h-[400px] bg-cyan-500/15 rounded-full blur-[100px]"></div>
</div>

<header class="sticky top-0 z-40 border-b border-white/5 glass">
  <div class="max-w-[1600px] mx-auto px-6 h-16 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-violet-600 to-cyan-500 grid place-items-center font-bold">TC</div>
      <div>
        <div class="font-semibold leading-none">TradeCalc Pro</div>
        <div class="text-[11px] text-white/50">Sleeper • THE VAULT • 0.5 PPR TEP</div>
      </div>
    </div>
    <div class="text-xs px-3 py-1.5 rounded-full bg-white/5 border border-white/10">League 1313454100225990656</div>
  </div>
</header>

<main class="max-w-[1600px] mx-auto p-6">
  <!-- TRADE SUMMARY -->
  <div class="grid lg:grid-cols-[1fr_auto_1fr] gap-5 items-start mb-6">
    <!-- TEAM A -->
    <div class="glass rounded-[24px] p-5">
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-[15px] font-medium flex items-center gap-2"><span class="w-2 h-2 rounded-full bg-violet-500"></span>Team A Receives</h2>
        <span id="countA" class="text-[11px] px-2 py-0.5 rounded-full bg-violet-500/20 text-violet-300">(0)</span>
      </div>
      <div id="tradeA" class="min-h-[44px] flex flex-wrap gap-1.5 mb-4"></div>
      <div id="statsA" class="text-[13px]"></div>
    </div>

    <!-- VS -->
    <div class="hidden lg:flex flex-col items-center pt-8">
      <div class="w-12 h-12 rounded-2xl glass grid place-items-center font-medium">VS</div>
      <div class="mt-3 text-center">
        <div class="text-[11px] text-white/50 mb-1">Fairness</div>
        <div id="fair" class="mono text-sm">—</div>
        <div class="w-24 h-1 mt-2 bg-white/10 rounded-full overflow-hidden"><div id="bar" class="h-full w-0 bg-gradient-to-r from-violet-500 to-cyan-400 transition-all duration-500"></div></div>
      </div>
    </div>

    <!-- TEAM B -->
    <div class="glass rounded-[24px] p-5">
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-[15px] font-medium flex items-center gap-2"><span class="w-2 h-2 rounded-full bg-cyan-500"></span>Team B Receives</h2>
        <span id="countB" class="text-[11px] px-2 py-0.5 rounded-full bg-cyan-500/20 text-cyan-300">(0)</span>
      </div>
      <div id="tradeB" class="min-h-[44px] flex flex-wrap gap-1.5 mb-4"></div>
      <div id="statsB" class="text-[13px]"></div>
    </div>
  </div>

  <!-- ROSTERS -->
  <div class="grid lg:grid-cols-2 gap-5">
    <div class="glass rounded-[24px] p-5">
      <select id="teamA" class="w-full mb-4 bg-black/40 border border-white/10 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:border-violet-500/50"></select>
      <div id="listA" class="space-y-1.5 max-h-[620px] overflow-auto pr-2 -mr-2"></div>
    </div>
    <div class="glass rounded-[24px] p-5">
      <select id="teamB" class="w-full mb-4 bg-black/40 border border-white/10 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:border-cyan-500/50"></select>
      <div id="listB" class="space-y-1.5 max-h-[620px] overflow-auto pr-2 -mr-2"></div>
    </div>
  </div>
</main>

<script>
const LEAGUE='1313454100225990656';
const VAL='https://docs.google.com/spreadsheets/d/e/2PACX-1vRqxhqyuKK6vu_EoYta5FZ_KdOB8M54Q_qBwJKOUF5KcgbTt2dmHn_FuLj9d-FS8-ta5T0zkU0QEGcN/pub?gid=4113168&single=true&output=csv';
const PPG='https://docs.google.com/spreadsheets/d/e/2PACX-1vRqxhqyuKK6vu_EoYta5FZ_KdOB8M54Q_qBwJKOUF5KcgbTt2dmHn_FuLj9d-FS8-ta5T0zkU0QEGcN/pub?gid=118408869&single=true&output=csv';

let S={}, rosters={A:[],B:[]}, trade={A:[],B:[]};

async function init(){
  const [lg,us,ro,pl,v,p]=await Promise.all([
    fetch(`https://api.sleeper.app/v1/league/${LEAGUE}`).then(r=>r.json()),
    fetch(`https://api.sleeper.app/v1/league/${LEAGUE}/users`).then(r=>r.json()),
    fetch(`https://api.sleeper.app/v1/league/${LEAGUE}/rosters`).then(r=>r.json()),
    fetch('https://api.sleeper.app/v1/players/nfl').then(r=>r.json()),
    fetch(VAL).then(r=>r.text()), fetch(PPG).then(r=>r.text())
  ]);

  S={users:us,rosters:ro,players:pl,vals:new Map(),ppg:new Map()};
  S.slots = lg.roster_positions.filter(x=>!['BN','IR','TAXI'].includes(x));
  const sf = lg.roster_positions.includes('SUPER_FLEX');

  Papa.parse(v,{header:true}).data.forEach(r=>r.sleeper_id&&S.vals.set(r.sleeper_id,parseFloat(sf?r.val_sf_ppr_tep05:r.val_1qb_ppr_tep05)||0));
  Papa.parse(p,{header:true}).data.forEach(r=>r.Player&&S.ppg.set(r.Player.toLowerCase(),parseFloat(r['Avg_PPR_0.5_TEP'])||0));

  const a=teamA,b=teamB;
  us.forEach(u=>{const r=ro.find(x=>x.owner_id===u.user_id);if(!r)return;const o=document.createElement('option');o.value=r.roster_id;o.textContent=u.metadata?.team_name||u.display_name;a.appendChild(o.cloneNode(true));b.appendChild(o);});
  a.onchange=()=>load('A',+a.value); b.onchange=()=>load('B',+b.value);
  load('A',+a.options[0].value); load('B',+b.options[1].value);
}

function load(side,id){
  const r=S.rosters.find(x=>x.roster_id===id);
  rosters[side]=r.players.map(pid=>{const p=S.players[pid]||{};const n=`${p.first_name||''} ${p.last_name||''}`.trim();return{id:pid,n,pos:p.position||'?',age:p.age||0,val:S.vals.get(pid)||0,ppg:S.ppg.get(n.toLowerCase())||0}}).filter(x=>x.n).sort((a,b)=>b.val-a.val);
  trade[side]=[]; render(side); update();
}

function render(side){
  const el=document.getElementById('list'+side);
  const grouped={}; rosters[side].forEach(p=>(grouped[p.pos]=grouped[p.pos]||[]).push(p));
  const order=['QB','RB','WR','TE','K','DEF'];

  el.innerHTML = order.filter(pos=>grouped[pos]).map(pos=>`
    <div class="mb-3">
      <div class="text-[10px] uppercase tracking-wider text-white/40 mb-1.5 px-2">${pos}</div>
      ${grouped[pos].map(p=>{
        const sel=trade[side].some(x=>x.id===p.id);
        return `<div class="player ${sel?'selected':''} group flex items-center justify-between px-3 py-2.5 mb-1 rounded-xl border border-white/5 bg-white/[0.02] cursor-pointer" onclick="toggle('${side}','${p.id}')">
          <div class="flex items-center gap-3 min-w-0">
            <div class="w-5 h-5 rounded-md border ${sel?'bg-violet-500 border-violet-500':'border-white/15 group-hover:border-white/30'} grid place-items-center transition-colors"><span class="text-[10px] ${sel?'':'opacity-0 group-hover:opacity-50'}">✓</span></div>
            <div class="min-w-0">
              <div class="text-[13px] truncate">${p.n}</div>
              <div class="text-[11px] text-white/40">${p.age}y • ${p.ppg.toFixed(1)} ppg</div>
            </div>
          </div>
          <div class="text-right">
            <div class="mono text-[12px]">${Math.round(p.val).toLocaleString()}</div>
            <div class="text-[10px] text-white/30">${p.pos}</div>
          </div>
        </div>`;
      }).join('')}
    </div>
  `).join('');
}

function toggle(side,id){const p=rosters[side].find(x=>x.id===id);const i=trade[side].findIndex(x=>x.id===id);i>=0?trade[side].splice(i,1):trade[side].push(p);render(side);update();}

function getOptimal(team){
  const pool=[...team].sort((a,b)=>b.ppg-a.ppg);
  const used=new Set(); const out=[];
  for(const slot of S.slots){
    let pos=[slot];
    if(slot==='FLEX')pos=['RB','WR','TE'];
    if(slot==='SUPER_FLEX')pos=['QB','RB','WR','TE'];
    if(slot==='WRRB_FLEX')pos=['RB','WR'];
    if(slot==='REC_FLEX')pos=['WR','TE'];
    const idx=pool.findIndex(p=>!used.has(p.id)&&pos.includes(p.pos));
    if(idx>=0){out.push({slot,player:pool[idx]});used.add(pool[idx].id)} else out.push({slot,player:null});
  }
  return out;
}

function getStats(team){
  if(!team.length) return {val:0,age:0,opt:0,long:0,lineup:[]};
  const val=team.reduce((s,p)=>s+(p.val||p.ppg*50),0);
  const age=team.reduce((s,p)=>s+p.age,0)/team.length;
  const lineup=getOptimal(team);
  const opt=lineup.reduce((s,l)=>s+(l.player?.ppg||0),0);
  const long=team.reduce((s,p)=>{const pk={QB:30,RB:24,WR:26,TE:27}[p.pos]||26;return s+Math.max(30,100-Math.abs(p.age-pk)*5)},0)/team.length;
  return {val,age,opt,long,lineup};
}

function update(){
  ['A','B'].forEach(s=>{
    countA.textContent=`(${trade.A.length})`; countB.textContent=`(${trade.B.length})`;
    document.getElementById('trade'+s).innerHTML = trade[s].length? trade[s].map(p=>`<button class="group px-2.5 py-1.5 rounded-lg bg-white/10 hover:bg-white/15 border border-white/10 text-[12px] flex items-center gap-1.5 transition-colors" onclick="toggle('${s}','${p.id}')">${p.pos} ${p.n}<span class="opacity-50 group-hover:opacity-100">✕</span></button>`).join('') : `<div class="text-[12px] text-white/30 py-2">Click players below to add</div>`;
  });

  const teamA=[...rosters.A.filter(p=>!trade.A.some(t=>t.id===p.id)),...trade.B];
  const teamB=[...rosters.B.filter(p=>!trade.B.some(t=>t.id===p.id)),...trade.A];

  const A=getStats(teamA), B=getStats(teamB);
  const bA=getStats(rosters.A), bB=getStats(rosters.B);

  const renderCard=(el,stats,before,color)=>{
    const delta=stats.val-before.val;
    const deltaPct=before.val? (delta/before.val*100) : 0;
    el.innerHTML = `
      <div class="grid grid-cols-3 gap-3 mb-4">
        ${[['Value',Math.round(stats.val).toLocaleString(),delta],['Opt PPG',stats.opt.toFixed(1),stats.opt-before.opt],['Age',stats.age.toFixed(1),stats.age-before.age]].map(([l,v,d])=>`
          <div class="rounded-xl bg-black/30 border border-white/5 p-3">
            <div class="text-[10px] uppercase tracking-wider text-white/40 mb-1">${l}</div>
            <div class="text-[18px] font-medium leading-none">${v}</div>
            <div class="text-[11px] mt-1 ${d>0?'text-emerald-400':d<0?'text-red-400':'text-white/30'}">${d!==0?(d>0?'+':'')+(typeof d==='number'?d.toFixed(l==='Value'?0:1):d):'—'}</div>
          </div>
        `).join('')}
      </div>
      <div class="text-[11px] uppercase tracking-wider text-white/30 mb-2">Optimal Starters</div>
      <div class="grid grid-cols-2 gap-x-3 gap-y-1 max-h-[110px] overflow-auto pr-2">
        ${stats.lineup.slice(0,10).map(l=>`<div class="flex justify-between text-[11px] py-0.5"><span class="text-white/40 w-16">${l.slot}</span><span class="truncate flex-1">${l.player?l.player.n:'—'}</span><span class="mono text-white/50">${l.player?l.player.ppg.toFixed(1):''}</span></div>`).join('')}
      </div>
    `;
  };

  if(trade.A.length||trade.B.length){
    renderCard(statsA,A,bA,'violet'); renderCard(statsB,B,bB,'cyan');
    const valueDiff=Math.abs((A.val-bA.val)+(B.val-bB.val));
    const fairness=Math.max(0,100-valueDiff/Math.max(bA.val,bB.val)*100);
    fair.textContent=fairness>92?'Even':fairness>75?'Fair':'Unbalanced';
    bar.style.width=fairness+'%';
    fair.className=`mono text-sm ${fairness>92?'text-emerald-400':fairness>75?'text-amber-400':'text-red-400'}`;
  } else {
    statsA.innerHTML='<div class="text-white/30 text-[13px]">Select players to see impact</div>';
    statsB.innerHTML='<div class="text-white/30 text-[13px]">Select players to see impact</div>';
    fair.textContent='—'; bar.style.width='0%';
  }
}

window.toggle=toggle; init();
</script>
</body>
</html>
