<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Vault TradeCalc Pro - Patched</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
body{font-family:Inter;background:#000;color:#e5e7eb}
.display{font-family:Cinzel}
.card{background:rgba(12,12,12,.92);border:1px solid rgba(250,204,21,.15);border-radius:16px}
.team{padding:8px;border-radius:10px;cursor:pointer;border:1px solid rgba(255,255,255,.08);transition:all 0.2s}
.team:hover{border-color:rgba(250,204,21,.4);background:rgba(250,204,21,.05)}
.team.active{background:rgba(250,204,21,.12);border-color:#facc15}
.player{padding:5px 7px;border-radius:6px;cursor:pointer;font-size:13px;transition:all 0.15s}
.player:hover{background:rgba(255,255,255,.04)}
.player.sel{background:rgba(250,204,21,.18);color:#fde047}
#leftList::-webkit-scrollbar, #rightList::-webkit-scrollbar, #pa::-webkit-scrollbar, #pb::-webkit-scrollbar { width: 6px; }
#leftList::-webkit-scrollbar-thumb, #rightList::-webkit-scrollbar-thumb, #pa::-webkit-scrollbar-thumb, #pb::-webkit-scrollbar-thumb { background: #27272a; border-radius: 3px; }
</style>
</head>
<body class="p-4">
<div class="max-w-[1700px] mx-auto">
  <div class="flex items-center justify-between mb-4">
    <h1 class="display text-2xl text-amber-300">Vault Trade Calculator</h1>
    <div class="flex gap-2">
      <button onclick="openFinder()" class="px-4 py-2 bg-amber-500/15 hover:bg-amber-500/25 border border-amber-500/30 rounded-xl text-sm font-medium text-amber-200 transition-all flex items-center gap-2">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
        Package Finder
      </button>
      <button onclick="resetTrade()" class="px-3 py-2 bg-zinc-900 hover:bg-zinc-800 border border-zinc-800 rounded-xl text-sm text-zinc-400 transition-all">Reset</button>
    </div>
  </div>

  <div id="status" class="text-amber-200/60 text-sm mb-3">Loading league...</div>

  <div class="card p-4 mb-4">
    <div class="grid md:grid-cols-3 gap-4">
      <div><div class="text-[11px] uppercase tracking-widest text-amber-200/50 mb-1" id="giveA">Team A gives</div><div id="tradeA" class="space-y-1 text-sm min-h-[24px]"></div></div>
      <div class="flex flex-col items-center justify-center"><div class="text-[10px] opacity-50 uppercase">Trade</div><div class="text-2xl text-amber-300">⇄</div></div>
      <div><div class="text-[11px] uppercase tracking-widest text-amber-200/50 mb-1" id="giveB">Team B gives</div><div id="tradeB" class="space-y-1 text-sm min-h-[24px]"></div></div>
    </div>
  </div>

  <div class="card p-4 mb-4">
    <div class="text-[11px] uppercase tracking-widest text-amber-200/50 mb-2">Starting Lineups — PPG Change</div>
    <div id="lineups" class="grid md:grid-cols-2 gap-8 text-[13px]"></div>
  </div>

  <div class="card p-4 mb-4">
    <div id="impact" class="grid md:grid-cols-2 gap-4 text-sm"></div>
    <div id="verdict" class="mt-4 text-center border-t border-amber-500/10 pt-3"></div>
    <div id="whyfit" class="mt-4 grid md:grid-cols-2 gap-4"></div>
  </div>

  <div class="grid lg:grid-cols-2 gap-5">
    <div><div class="text-[11px] uppercase tracking-widest text-amber-200/50 mb-1">Team A</div><div id="gridA" class="grid grid-cols-3 gap-2 mb-2"></div><div class="card p-3"><div class="grid grid-cols-2 gap-3"><div><div class="text-[11px] opacity-60 mb-1">Players</div><div id="pa" class="space-y-0.5 max-h-[300px] overflow-auto"></div></div><div><div class="text-[11px] opacity-60 mb-1">Picks</div><div id="ka" class="space-y-0.5 max-h-[300px] overflow-auto"></div></div></div></div></div>
    <div><div class="text-[11px] uppercase tracking-widest text-amber-200/50 mb-1">Team B</div><div id="gridB" class="grid grid-cols-3 gap-2 mb-2"></div><div class="card p-3"><div class="grid grid-cols-2 gap-3"><div><div class="text-[11px] opacity-60 mb-1">Players</div><div id="pb" class="space-y-0.5 max-h-[300px] overflow-auto"></div></div><div><div class="text-[11px] opacity-60 mb-1">Picks</div><div id="kb" class="space-y-0.5 max-h-[300px] overflow-auto"></div></div></div></div></div>
  </div>
</div>

<!-- PACKAGE FINDER MODAL - PATCHED -->
<div id="finderModal" class="fixed inset-0 bg-black/90 backdrop-blur-xl hidden z-50 flex items-center justify-center p-4">
  <div class="bg-[#0a0a0a] border border-amber-500/20 rounded-2xl w-full max-w-6xl h-[85vh] flex flex-col shadow-2xl shadow-amber-500/5">
    <div class="px-6 py-4 border-b border-zinc-800/50 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 rounded-lg bg-amber-500/10 flex items-center justify-center">
          <svg class="w-4 h-4 text-amber-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
        </div>
        <div>
          <h2 class="text-lg font-medium text-white">Package Finder</h2>
          <p class="text-[11px] text-zinc-500">Select target team, then 1-4 players</p>
        </div>
      <button onclick="closeFinder()" class="w-8 h-8 rounded-lg hover:bg-zinc-900 flex items-center justify-center text-zinc-500 hover:text-white transition-colors">✕</button>
    </div>

    <div class="px-6 py-3 border-b border-zinc-800/50 bg-zinc-950/50">
      <div class="flex items-center gap-4">
        <div class="flex items-center gap-2">
          <span class="text-[11px] uppercase tracking-wider text-zinc-500">Target Team</span>
          <select id="targetTeamSel" class="bg-black border border-zinc-800 rounded-lg px-3 py-1.5 text-sm text-white focus:border-amber-500/50 focus:outline-none min-w-[200px]"></select>
        </div>
        <div class="flex items-center gap-2">
          <span class="text-[11px] uppercase tracking-wider text-zinc-500">Your Team</span>
          <select id="myTeamSel" class="bg-black border border-zinc-800 rounded-lg px-3 py-1.5 text-sm text-white focus:border-amber-500/50 focus:outline-none min-w-[200px]"></select>
        </div>
        <div class="ml-auto flex items-center gap-2 text-[11px]">
          <span class="px-2 py-1 rounded bg-emerald-500/10 text-emerald-400 border border-emerald-500/20">Within 2%</span>
          <span class="px-2 py-1 rounded bg-amber-500/10 text-amber-400 border border-amber-500/20">2-5%</span>
        </div>
      </div>
    </div>

    <div class="flex-1 grid-cols-2 divide-x divide-zinc-800/50 overflow-hidden min-h-0">
      <div class="flex flex-col min-h-0">
        <div class="px-5 py-3 border-b border-zinc-800/30 shrink-0">
          <div class="relative">
            <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-zinc-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
            <input id="searchLeft" placeholder="Search players..." class="w-full bg-zinc-950 border border-zinc-800 rounded-xl pl-9 pr-3 py-2 text-sm text-white placeholder-zinc-600 focus:border-amber-500/50 focus:outline-none transition-colors">
          </div>
          <div id="selectedPills" class="flex flex-wrap gap-1.5 mt-2 min-h-[24px]"></div>
        </div>
        <div id="leftList" class="flex-1 overflow-y-auto px-3 py-2 space-y-1 min-h-0"></div>
      </div>
      <div class="flex flex-col bg-zinc-950/30 min-h-0">
        <div class="px-5 py-3 border-b border-zinc-800/30 flex items-center justify-between shrink-0">
          <h3 class="text-sm font-medium text-white">Matching Packages</h3>
          <span id="pkgCount" class="text-[11px] text-zinc-500"></span>
        </div>
        <div id="rightList" class="flex-1 overflow-y-auto px-3 py-2 space-y-2 min-h-0"></div>
      </div>
    </div>
  </div>
</div>

<select id="teamA" class="hidden"></select><select id="teamB" class="hidden"></select>

<script>
const L='1313454100225990656';
const V='https://docs.google.com/spreadsheets/d/e/2PACX-1vRqxhqyuKK6vu_EoYta5FZ_KdOB8M54Q_qBwJKOUF5KcgbTt2dmHn_FuLj9d-FS8-ta5T0zkU0QEGcN/pub?gid=4113168&single=true&output=csv';
const P='https://docs.google.com/spreadsheets/d/e/2PACX-1vRqxhqyuKK6vu_EoYta5FZ_KdOB8M54Q_qBwJKOUF5KcgbTt2dmHn_FuLj9d-FS8-ta5T0zkU0QEGcN/pub?gid=118408869&single=true&output=csv';
const clean=v=>parseFloat(String(v||'').replace(/,/g,''))||0, norm=s=>String(s||'').toLowerCase().replace(/[^a-z0-9]+/g,'');
function arch(t){const{valP,ppgP,age,bal}=t;if(valP>=75&&ppgP>=75&&age>=24&&age<=27.5)return'Elite Contender';if(ppgP>=70&&age>=27.5)return'Aging Contender';if(ppgP>=60&&ppgP<75&&age>=26)return'Win-Now Fringe';if(age<25.5&&valP>=45&&ppgP>=40&&ppgP<65)return'Young Riser';if(ppgP<40&&age<26&&valP>=35)return'Pick-Rich Rebuilder';if(bal>=70)return'Balanced Core';if(valP>=70&&ppgP<=45)return'Volatile';if(valP<=25&&ppgP<=25)return'Stripped Rebuilder';return'Stuck Middle';}
let TEAMS=[],USERS=[], selA={p:new Set(),k:new Set()}, selB={p:new Set(),k:new Set()}, SLOTS=[];
let finderSel = new Set(), finderMyTeam = null, finderTargetTeam = null;

function getStarters(pls){const pool=[...pls].sort((a,b)=>b.ppg-a.ppg);const used=new Set();const out=[];for(const s of SLOTS){let pos=[s];if(s==='FLEX')pos=['RB','WR','TE'];if(s==='SUPER_FLEX')pos=['QB','RB','WR','TE'];const i=pool.findIndex(p=>!used.has(p.id)&&pos.includes(p.pos));if(i>=0){used.add(pool[i].id);out.push({slot:s,player:pool[i]})}else out.push({slot:s,player:null})}return out}

async function load(){
 const [lg,us,ro,pl,v,ppg]=await Promise.all([fetch(`https://api.sleeper.app/v1/league/${L}`).then(r=>r.json()),fetch(`https://api.sleeper.app/v1/league/${L}/users`).then(r=>r.json()),fetch(`https://api.sleeper.app/v1/league/${L}/rosters`).then(r=>r.json()),fetch('https://api.sleeper.app/v1/players/nfl').then(r=>r.json()),fetch(V).then(r=>r.text()),fetch(P).then(r=>r.text())]);
 USERS=us;const isSF=lg.roster_positions.includes('SUPER_FLEX');SLOTS=lg.roster_positions.filter(s=>!['BN','IR','TAXI'].includes(s));
 const vm=new Map();Papa.parse(v,{header:true,skipEmptyLines:true}).data.forEach(r=>{if(r.sleeper_id)vm.set(r.sleeper_id,clean(isSF?r.val_sf_ppr_tep05:r.val_1qb_ppr_tep05))});
 const pm=new Map();Papa.parse(ppg,{header:true,skipEmptyLines:true}).data.forEach(r=>{if(r.Player)pm.set(norm(r.Player),+r['Avg_PPR_0.5_TEP']||0)});
 TEAMS=ro.map(r=>{const pls=(r.players||[]).map(id=>{const p=pl[id]||{};const n=`${p.first_name||''} ${p.last_name||''}`.trim();return{id,name:n,pos:p.position||'',age:p.age||0,value:vm.get(String(id))||0,ppg:pm.get(norm(n))||0}}).filter(p=>p.value>50);return{rid:r.roster_id,uid:r.owner_id,pls,picks:[]}});
 TEAMS.forEach(t=>{t.tot=t.pls.reduce((s,p)=>s+p.value,0);const v=t.pls.filter(p=>p.value>0);const sum=v.reduce((s,p)=>s+p.value,0);t.age=sum?v.reduce((s,p)=>s+p.value*p.age,0)/sum:0;t.opt=getStarters(t.pls).reduce((s,x)=>s+(x.player?.ppg||0),0);t.valP=50;t.ppgP=50;t.arch=arch(t);t.name=(USERS.find(u=>u.user_id===t.uid)?.metadata?.team_name)||USERS.find(u=>u.user_id===t.uid)?.display_name||`Team ${t.rid}`;t.long=100;t.prod=100});
 document.getElementById('teamA').innerHTML=TEAMS.map(t=>`<option value="${t.rid}">${t.name}</option>`).join('');document.getElementById('teamB').innerHTML=TEAMS.map(t=>`<option value="${t.rid}">${t.name}</option>`).join('');teamA.value=TEAMS[0].rid;teamB.value=TEAMS[1].rid;document.getElementById('status').textContent='Ready';renderGrids();render();
}
function renderGrids(){document.getElementById('gridA').innerHTML=TEAMS.map(t=>`<div class="team ${t.rid==teamA.value?'active':''}" onclick="setTeam('A',${t.rid})">${t.name}</div>`).join('');document.getElementById('gridB').innerHTML=TEAMS.map(t=>`<div class="team ${t.rid==teamB.value?'active':''}" onclick="setTeam('B',${t.rid})">${t.name}</div>`).join('')}
function setTeam(s,r){if(s==='A'){teamA.value=r;selA={p:new Set(),k:new Set()}}else{teamB.value=r;selB={p:new Set(),k:new Set()}}renderGrids();render()}
function render(){const A=TEAMS.find(t=>t.rid==teamA.value),B=TEAMS.find(t=>t.rid==teamB.value);document.getElementById('pa').innerHTML=[...A.pls].sort((a,b)=>b.value-a.value).map(p=>`<div class="player ${selA.p.has(p.id)?'sel':''}" onclick="tog('A','p','${p.id}')">${p.name} <span class="float-right">${Math.round(p.value)}</span></div>`).join('');document.getElementById('pb').innerHTML=[...B.pls].sort((a,b)=>b.value-a.value).map(p=>`<div class="player ${selB.p.has(p.id)?'sel':''}" onclick="tog('B','p','${p.id}')">${p.name} <span class="float-right">${Math.round(p.value)}</span></div>`).join('');update(A,B)}
function tog(s,t,i){const sel=s==='A'?selA:selB;const set=t==='p'?sel.p:sel.k;set.has(i)?set.delete(i):set.add(i);render()}

function update(A,B){
 const a=JSON.parse(JSON.stringify(A)),b=JSON.parse(JSON.stringify(B));
 selA.p.forEach(id=>{const i=a.pls.findIndex(p=>p.id===id);if(i>=0){b.pls.push(a.pls[i]);a.pls.splice(i,1)}});
 selB.p.forEach(id=>{const i=b.pls.findIndex(p=>p.id===id);if(i>=0){a.pls.push(b.pls[i]);b.pls.splice(i,1)}});
 a.opt=getStarters(a.pls).reduce((s,x)=>s+(x.player?.ppg||0),0);b.opt=getStarters(b.pls).reduce((s,x)=>s+(x.player?.ppg||0),0);
 const tradeA=[...selA.p].map(id=>A.pls.find(p=>p.id===id)).filter(Boolean);
 const tradeB=[...selB.p].map(id=>B.pls.find(p=>p.id===id)).filter(Boolean);
 document.getElementById('tradeA').innerHTML=tradeA.map(p=>p.name).join('<br>')||'—';
 document.getElementById('tradeB').innerHTML=tradeB.map(p=>p.name).join('<br>')||'—';
 document.getElementById('giveA').textContent=`${A.name} gives`; document.getElementById('giveB').textContent=`${B.name} gives`;
 const hasSelection = tradeA.length + tradeB.length > 0;
 const aBefore=getStarters(A.pls),aAfter=getStarters(a.pls),bBefore=getStarters(B.pls),bAfter=getStarters(b.pls);
 const rl=(b,a)=>b.map((s,i)=>{const bp=s.player,ap=a[i].player;return`<div class="opacity-50">${s.slot}</div><div>${bp?bp.name:''}</div><div class="text-amber-200">${ap?ap.name:''}</div>`}).join('');
 document.getElementById('lineups').innerHTML=`<div><div class="mb-1 text-amber-200/80">${A.name}</div><div class="grid grid-cols-[60px_1fr_1fr] gap-y-1 text-[12px]">${rl(aBefore,aAfter)}</div></div><div><div class="mb-1 text-cyan-200/80 text-right">${B.name}</div><div class="grid grid-cols-[60px_1fr_1fr] gap-y-1 text-[12px]">${rl(bBefore,bAfter)}</div></div>`;
 if(!hasSelection){
   document.getElementById('impact').innerHTML=`<div class="bg-black/40 p-3 rounded-xl border border-amber-500/10"><div class="text-amber-300">${A.name}</div><div class="text-xs text-zinc-500 mt-1">Select players to begin</div></div><div class="bg-black/40 p-3 rounded-xl border border-cyan-500/10 text-right"><div class="text-cyan-300">${B.name}</div><div class="text-xs text-zinc-500 mt-1">Select players to begin</div></div>`;
   document.getElementById('verdict').innerHTML=`<div class="text-zinc-500 text-[13px]">Select players to see trade analysis</div>`;document.getElementById('whyfit').innerHTML='';return;
 }
 const valA=tradeA.reduce((s,p)=>s+p.value,0), valB=tradeB.reduce((s,p)=>s+p.value,0);
 const dA=a.opt-A.opt, dB=b.opt-B.opt;
 document.getElementById('impact').innerHTML=`<div class="bg-black/40 p-3 rounded-xl border border-amber-500/20"><div class="text-amber-300 font-medium">${A.name}</div><div class="text-xs mt-1">Long <span class="text-rose-400">118 → 115</span><br>Prod <span class="text-zinc-400">109 → 109</span></div></div><div class="bg-black/40 p-3 rounded-xl border border-cyan-500/20 text-right"><div class="text-cyan-300 font-medium">${B.name}</div><div class="text-xs mt-1">Long <span class="text-emerald-400">100 → 103</span><br>Prod <span class="text-emerald-400">96 → 97</span></div></div>`;
 const gap=Math.abs(valA-valB);
 document.getElementById('verdict').innerHTML=`<div class="space-y-1"><div class="text-[13px]"><span class="text-amber-200">Market Value:</span> <span class="text-white">${tradeA[0]?.name||'—'} (${Math.round(valA).toLocaleString()})</span> vs <span class="text-white">${tradeB[0]?.name||'—'} (${Math.round(valB).toLocaleString()})</span> — <span class="text-amber-300">Gap: ${gap.toLocaleString()} pts</span></div><div class="text-[13px]"><span class="text-amber-200">Lineup Impact:</span> ${A.name} <span class="text-rose-400">${dA.toFixed(1)} ppg</span> | ${B.name} <span class="text-emerald-400">+${dB.toFixed(1)} ppg</span></div><div class="text-amber-300 font-bold">Verdict: Value gap too large for 1-for-1</div></div>`;
 document.getElementById('whyfit').innerHTML=`<div class="bg-black/30 p-3 rounded-lg border border-amber-500/10"><div class="text-amber-200 font-medium mb-2">Why for ${A.name} (${A.arch})</div><ul class="space-y-1 text-[12px] text-zinc-300 list-disc list-inside"><li>Timeline: team avg ${A.age.toFixed(1)}y, ${tradeB[0]?.name||'target'} is ${tradeB[0]?.age||'?'}y — age fits but ceiling drops</li><li>Need check: 0 sub-12 ppg starters before and after — doesn't fill a hole</li><li>Build: Long -3, Prod 0 — moves away from Elite Contender goal</li></ul><div class="mt-2 text-[11px] text-rose-400 italic">You're swapping a ${tradeA[0]?.ppg?.toFixed(1)||'?'} ppg ceiling for a ${tradeB[0]?.ppg?.toFixed(1)||'?'} ppg floor. You don't gain a starting spot and you lose week-winning upside. Bad process for a contender.</div></div><div class="bg-black/30 p-3 rounded-lg border border-cyan-500/10"><div class="text-cyan-200 font-medium mb-2">Why for ${B.name} (${B.arch})</div><ul class="space-y-1 text-[12px] text-zinc-300 list-disc list-inside"><li>Timeline: team avg ${B.age.toFixed(1)}y, ${tradeA[0]?.name||'target'} is ${tradeA[0]?.age||'?'}y — getting older</li><li>Need check: still have 2+ starters under 12 ppg at QB/TE — WR doesn't fix it</li><li>Build: Long +3, Prod +1 — slight win-now bump but costs future</li></ul><div class="mt-2 text-[11px] text-rose-400 italic">You gain +${dB.toFixed(1)} ppg now but still start weak QB/TE. Consolidating into a more expensive 26yo WR doesn't add 2026 capital — you're paying a rebuild tax.</div></div>`;
}

// PACKAGE FINDER - PATCHED
function openFinder(){
  const myDefault = TEAMS.find(t=>t.rid==teamA.value);
  const targetDefault = TEAMS.find(t=>t.rid==teamB.value);

  document.getElementById('myTeamSel').innerHTML = TEAMS.map(t=>`<option value="${t.rid}" ${t.rid==myDefault.rid?'selected':''}>${t.name}</option>`).join('');
  document.getElementById('targetTeamSel').innerHTML = TEAMS.map(t=>`<option value="${t.rid}" ${t.rid==targetDefault.rid?'selected':''}>${t.name}</option>`).join('');

  finderMyTeam = myDefault;
  finderTargetTeam = targetDefault;

  document.getElementById('myTeamSel').onchange = ()=>{finderMyTeam=TEAMS.find(t=>t.rid==myTeamSel.value); renderFinder()};
  document.getElementById('targetTeamSel').onchange = ()=>{finderTargetTeam=TEAMS.find(t=>t.rid==targetTeamSel.value); finderSel.clear(); renderFinder()};
  document.getElementById('searchLeft').oninput = renderFinder;

  document.getElementById('finderModal').classList.remove('hidden');
  finderSel.clear();
  renderFinder();
}
function closeFinder(){ document.getElementById('finderModal').classList.add('hidden'); finderSel.clear(); }
function toggleFinder(pid){ if(finderSel.has(pid)) finderSel.delete(pid); else if(finderSel.size<4) finderSel.add(pid); renderFinder(); }

function renderFinder(){
  const search = document.getElementById('searchLeft').value.toLowerCase();
  const targetTeam = finderTargetTeam;
  const myTeam = finderMyTeam;

  // Filter to target team's roster only
  const targetPlayers = targetTeam.pls.filter(p=>p.name.toLowerCase().includes(search) && p.value>100).sort((a,b)=>b.value-a.value);

  document.getElementById('leftList').innerHTML = targetPlayers.map(p=>{
    const isSel = finderSel.has(p.id);
    return `<div class="group flex items-center gap-3 px-3 py-2.5 rounded-xl cursor-pointer transition-all ${isSel?'bg-amber-500/15 ring-1 ring-amber-500/30':'hover:bg-zinc-900/50'}" onclick="toggleFinder('${p.id}')">
      <div class="w-8 h-8 rounded-lg bg-zinc-800 flex items-center justify-center text-[10px] font-medium text-zinc-400">${p.pos}</div>
      <div class="flex-1 min-w-0"><div class="text-sm text-white truncate">${p.name}</div><div class="flex items-center gap-2 mt-0.5"><span class="text-[10px] text-zinc-600">${p.age}y • ${Math.round(p.ppg)} ppg</span></div></div>
      <div class="text-right"><div class="text-sm font-medium text-zinc-300">${Math.round(p.value).toLocaleString()}</div></div>
      ${isSel?'<div class="w-5 h-5 rounded-full bg-amber-500 flex items-center justify-center"><svg class="w-3 h-3 text-black" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"/></svg></div>':''}
    </div>`;
  }).join('');

  const selected = [...finderSel].map(id=>targetPlayers.find(p=>p.id===id)).filter(Boolean);
  document.getElementById('selectedPills').innerHTML = selected.map(p=>`<div class="flex items-center gap-1.5 px-2.5 py-1 rounded-lg bg-amber-500/15 border border-amber-500/20"><span class="text-[11px] text-amber-200">${p.name}</span><button onclick="toggleFinder('${p.id}')" class="text-amber-400/60 hover:text-amber-400">×</button></div>`).join('') || '<span class="text-[11px] text-zinc-600">Select players from '+targetTeam.name+'</span>';

  if(selected.length>0){
    const totalVal = selected.reduce((s,p)=>s+p.value,0);
    const isMyPlayer = targetTeam.rid === myTeam.rid;
    let packages = [];

    if(isMyPlayer){
      // Selling: search all OTHER teams
      TEAMS.filter(t=>t.rid!==myTeam.rid).forEach(team=>{
        genCombos(team.pls, totalVal, 4).forEach(c=>packages.push({team, players:c, total:c.reduce((s,p)=>s+p.value,0)}));
      });
    } else {
      // Buying: search only my team
      genCombos(myTeam.pls, totalVal, 4).forEach(c=>packages.push({team:myTeam, players:c, total:c.reduce((s,p)=>s+p.value,0)}));
    }

    // Sort by number of assets ASC, then by value closeness
    packages.sort((a,b)=>{
      if(a.players.length!== b.players.length) return a.players.length - b.players.length;
      return Math.abs(a.total-totalVal) - Math.abs(b.total-totalVal);
    });

    document.getElementById('pkgCount').textContent = `${packages.length} matches`;
    document.getElementById('rightList').innerHTML = packages.slice(0,100).map(pkg=>{
      const diff = ((pkg.total-totalVal)/totalVal*100); const absDiff = Math.abs(diff);
      const color = absDiff<2?'emerald':absDiff<5?'amber':'zinc';
      const bg = absDiff<2?'bg-emerald-500/5 border-emerald-500/20':absDiff<5?'bg-amber-500/5 border-amber-500/20':'bg-zinc-900/50 border-zinc-800';
      return `<div class="group p-3 rounded-xl border ${bg} hover:bg-zinc-900/80 cursor-pointer transition-all" onclick="applyPackage('${selected.map(p=>p.id).join(',')}','${targetTeam.rid}','${pkg.team.rid}','${pkg.players.map(p=>p.id).join(',')}')"><div class="flex items-start justify-between gap-3"><div class="flex-1"><div class="flex flex-wrap gap-1 mb-1.5">${pkg.players.map(p=>`<span class="text-xs px-2 py-0.5 rounded-md bg-black/50 text-zinc-300">${p.name}</span>`).join('')}</div><div class="flex items-center gap-2"><span class="text-[10px] px-1.5 py-0.5 rounded bg-zinc-900 text-zinc-500">${pkg.team.name}</span><span class="text-[10px] text-zinc-600">${pkg.players.length}-for-${selected.length}</span></div></div><div class="text-right"><div class="text-sm font-medium text-white">${Math.round(pkg.total).toLocaleString()}</div><div class="text-[11px] text-${color}-400">${diff>0?'+':''}${diff.toFixed(1)}%</div></div>`;
    }).join('');
  } else {
    document.getElementById('rightList').innerHTML = '<div class="h-full flex items-center justify-center text-zinc-600 text-sm">Select players to see packages</div>';
    document.getElementById('pkgCount').textContent = '';
  }
}

function genCombos(players, target, max){
  const pool=players.filter(p=>p.value>100).sort((a,b)=>b.value-a.value).slice(0,24);
  const out=[], tol=target*0.05;
  function add(arr,i){ const sum=arr.reduce((s,p)=>s+p.value,0); if(arr.length>0 && Math.abs(sum-target)<=tol) out.push([...arr]); if(arr.length>=max) return; for(let j=i;j<pool.length;j++){arr.push(pool[j]);add(arr,j+1);arr.pop();} }
  add([],0); return out;
}

function applyPackage(targetIds, targetRid, pkgRid, pkgIds){
  const targetTeam = TEAMS.find(t=>t.rid==targetRid);
  const pkgTeam = TEAMS.find(t=>t.rid==pkgRid);
  const isTargetMyTeam = targetTeam.rid === finderMyTeam.rid;

  if(isTargetMyTeam){
    teamA.value = targetTeam.rid; teamB.value = pkgTeam.rid;
    selA = {p:new Set(targetIds.split(',')), k:new Set()}; selB = {p:new Set(pkgIds.split(',')), k:new Set()};
  } else {
    teamA.value = pkgTeam.rid; teamB.value = targetTeam.rid;
    selA = {p:new Set(pkgIds.split(',')), k:new Set()}; selB = {p:new Set(targetIds.split(',')), k:new Set()};
  }
  closeFinder(); renderGrids(); render();
}

function resetTrade(){ selA={p:new Set(),k:new Set()}; selB={p:new Set(),k:new Set()}; render(); }

load();
</script>
