<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Dynasty Trade Calculator</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
body{font-family:'Outfit',system-ui;background:#020617;color:#e2e8f0}
.mono{font-family:'JetBrains Mono',monospace}
.player-row{cursor:pointer;border:1px solid transparent}
.player-row:hover{background:rgba(255,255,255,.04)}
.player-row.selected{background:rgba(245,158,11,.12);border-color:rgba(245,158,11,.4)}
.badge{font-size:10px;padding:2px 6px;border-radius:6px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1)}
.badge-pick{background:rgba(168,85,247,.15);border-color:rgba(168,85,247,.3);color:#e9d5ff}
.grid-4{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:1rem}
@media(max-width:1400px){.grid-4{grid-template-columns:repeat(4,minmax(320px,1fr));overflow-x:auto}}
</style>
</head>
<body class="min-h-screen">
<header class="sticky top-0 z-40 border-b border-white/10 bg-slate-950/80 backdrop-blur">
  <div class="max-w-[1800px] mx-auto px-4 h-14 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-amber-400 to-yellow-600"></div>
      <div class="font-semibold">Dynasty Trade Calculator</div>
      <span id="league-name" class="ml-3 text-xs text-slate-400 mono hidden sm:inline"></span>
      <span id="scoring-name" class="ml-3 text-xs text-amber-300 mono hidden sm:inline"></span>
    </div>
    <div class="flex items-center gap-2">
      <button id="swap-btn" class="px-3 py-2 rounded-lg bg-white/5 hover:bg-white/10 border border-white/10 text-sm">Swap</button>
      <button id="reset-btn" class="px-3 py-2 rounded-lg bg-white/5 hover:bg-white/10 border border-white/10 text-sm">Reset</button>
    </div>
  </div>
</header>

<main class="max-w-[1800px] mx-auto px-4 py-3">
  <div id="status" class="mb-3 text-xs text-slate-400"><span id="status-text">Loading…</span></div>

  <div class="grid grid-cols-3 gap-4 mb-4">
    <div class="bg-slate-900/60 border border-white/10 rounded-xl p-3">
      <div class="text-[10px] uppercase text-slate-500">Team A Sends</div>
      <div id="send-a" class="text-xl font-semibold mono">0</div>
      <div class="text-xs text-slate-400"><span id="count-a">0</span> assets</div>
    </div>
    <div class="bg-slate-900/60 border border-amber-500/20 rounded-xl p-3">
      <div class="text-[10px] uppercase text-amber-300">Fairness</div>
      <div id="fairness-label" class="text-lg font-semibold mono">Even</div>
    </div>
    <div class="bg-slate-900/60 border border-white/10 rounded-xl p-3 text-right">
      <div class="text-[10px] uppercase text-slate-500">Team B Sends</div>
      <div id="send-b" class="text-xl font-semibold mono">0</div>
      <div class="text-xs text-slate-400"><span id="count-b">0</span> assets</div>
    </div>
  </div>

  <div class="grid-4">
    <section class="bg-slate-900/60 border border-white/10 rounded-2xl flex flex-col h-[720px]">
      <div class="p-3 border-b border-white/10 bg-amber-500/10">
        <div class="flex items-center justify-between gap-2">
          <h2 class="font-semibold text-amber-300 text-sm">Team A</h2>
          <select id="team-a-select" class="bg-slate-900 border border-white/10 rounded-lg px-3 py-2 text-sm w-56"></select>
        </div>
      </div>
      <div class="flex-1 overflow-y-auto p-2">
        <div class="text-[10px] uppercase text-slate-500 px-1 mb-1">Picks</div>
        <div id="picks-a" class="space-y-1 mb-3"></div>
        <div class="text-[10px] uppercase text-slate-500 px-1 mb-1">Players</div>
        <div id="roster-a" class="space-y-1"></div>
      </div>
    </section>

    <section class="bg-slate-900/60 border border-white/10 rounded-2xl flex flex-col h-[720px]">
      <div class="p-3 border-b border-white/10 bg-amber-500/10"><h2 class="font-semibold text-amber-300 text-sm">Impact A</h2></div>
      <div class="p-3 text-xs text-slate-400">Select assets to see impact</div>
    </section>

    <section class="bg-slate-900/60 border border-white/10 rounded-2xl flex flex-col h-[720px]">
      <div class="p-3 border-b border-white/10 bg-amber-500/10"><h2 class="font-semibold text-amber-300 text-sm">Impact B</h2></div>
      <div class="p-3 text-xs text-slate-400">Select assets to see impact</div>
    </section>

    <section class="bg-slate-900/60 border border-white/10 rounded-2xl flex flex-col h-[720px]">
      <div class="p-3 border-b border-white/10 bg-amber-500/10">
        <div class="flex items-center justify-between gap-2">
          <h2 class="font-semibold text-amber-300 text-sm">Team B</h2>
          <select id="team-b-select" class="bg-slate-900 border border-white/10 rounded-lg px-3 py-2 text-sm w-56"></select>
        </div>
      </div>
      <div class="flex-1 overflow-y-auto p-2">
        <div class="text-[10px] uppercase text-slate-500 px-1 mb-1">Picks</div>
        <div id="picks-b" class="space-y-1 mb-3"></div>
        <div class="text-[10px] uppercase text-slate-500 px-1 mb-1">Players</div>
        <div id="roster-b" class="space-y-1"></div>
      </div>
    </section>
  </div>
</main>

<script>
(() => {
  const DEFAULT_LEAGUE = '1313454100225990656';
  const params = new URLSearchParams(location.search);
  const league_id = params.get('league_id') || DEFAULT_LEAGUE;

  // Projection CSVs we fixed earlier
  const CSV_URLS = {
    sleeper: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRqxhqyuKK6vu_EoYta5FZ_KdOB8M54Q_qBwJKOUF5KcgbTt2dmHn_FuLj9d-FS8-ta5T0zkU0QEGcN/pub?gid=1866730819&single=true&output=csv',
    fp: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRqxhqyuKK6vu_EoYta5FZ_KdOB8M54Q_qBwJKOUF5KcgbTt2dmHn_FuLj9d-FS8-ta5T0zkU0QEGcN/pub?gid=2012227164&single=true&output=csv',
    ra: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRqxhqyuKK6vu_EoYta5FZ_KdOB8M54Q_qBwJKOUF5KcgbTt2dmHn_FuLj9d-FS8-ta5T0zkU0QEGcN/pub?gid=1226234680&single=true&output=csv'
  };

  const state = {
    league:null, users:[], rosters:[], players:{},
    values:new Map(), pickValues:new Map(), pickInventory:new Map(),
    teamSlots:new Map(), teamA:null, teamB:null,
    selectedA:new Set(), selectedB:new Set(),
    tradedPicks:[],
    scoringKey:'ppr',
    scoringLabel:'PPR'
  };

  const $ = s => document.querySelector(s);
  const fmt = n => Math.round(n).toLocaleString();
  const setStatus = t => { const el=$('#status-text'); if(el) el.textContent=t; };
  const teamName = r => {
    const u = state.users.find(x=>x.user_id===r.owner_id);
    return u?.metadata?.team_name || u?.display_name || `Team ${r.roster_id}`;
  };
  const ordinal = n => { const s=['th','st','nd','rd']; const v=n%100; return n+(s[(v-20)%10]||s[v]||s[0]); };
  const norm = s => String(s||'').toLowerCase().replace(/\./g,'').replace(/[^a-z0-9]+/g,' ').trim();

  async function fetchJSON(url){ const r=await fetch(url); return r.json(); }
  async function fetchText(url){ const r=await fetch(url); return r.text(); }

  function parseCSV(text){
    const lines = text.trim().split(/\r?\n/);
    const headers = lines[0].split(',').map(h=>h.trim());
    return lines.slice(1).map(line=>{
      const cols = line.split(',');
      const obj = {};
      headers.forEach((h,i)=> obj[h]=cols[i]?.trim());
      return obj;
    });
  }

  function toNum(v){
    if(v===null||v===undefined) return NaN;
    if(typeof v==='string' && v.trim()==='') return NaN;
    const n = Number(v);
    return Number.isFinite(n)? n : NaN;
  }

  function buildSourceMap(rows){
    const map = new Map();
    const cols = ['Std','Std 0.5 TEP','Std TEP','Half','Half 0.5 TEP','Half TEP','PPR','PPR 0.5 TEP','PPR TEP'];
    rows.forEach(r=>{
      const name = r.Player || r.player;
      if(!name) return;
      const pos = (r.Position||r.Pos||'').toUpperCase();
      const rec = {};
      cols.forEach(c=>{
        let v = toNum(r[c]);
        // synthesize 0.5 TEP if missing
        if(!Number.isFinite(v) && c.includes('0.5 TEP')){
          const base = c.replace(' 0.5 TEP','');
          const full = base+' TEP';
          const b = toNum(r[base]);
          const f = toNum(r[full]);
          if(Number.isFinite(b) && Number.isFinite(f)) v = (b+f)/2;
          else if(Number.isFinite(b)) v = pos==='TE'? b+0.5 : b;
        }
        rec[c]=v;
      });
      map.set(norm(name), {name, pos,...rec});
    });
    return map;
  }

  async function loadConsensusValues(){
    setStatus('Loading projections…');
    const [sTxt,fTxt,rTxt] = await Promise.all([
      fetchText(CSV_URLS.sleeper),
      fetchText(CSV_URLS.fp),
      fetchText(CSV_URLS.ra)
    ]);
    const sMap = buildSourceMap(parseCSV(sTxt));
    const fMap = buildSourceMap(parseCSV(fTxt));
    const rMap = buildSourceMap(parseCSV(rTxt));

    const keys = new Set([...sMap.keys(),...fMap.keys(),...rMap.keys()]);
    const comboKeys = ['Std','Std 0.5 TEP','Std TEP','Half','Half 0.5 TEP','Half TEP','PPR','PPR 0.5 TEP','PPR TEP'];
    const consensus = new Map();

    keys.forEach(k=>{
      const s=sMap.get(k)||{}, f=fMap.get(k)||{}, r=rMap.get(k)||{};
      const out = {name: s.name||f.name||r.name, pos: s.pos||f.pos||r.pos};
      comboKeys.forEach(c=>{
        const vals=[s[c],f[c],r[c]].filter(Number.isFinite);
        out[c]= vals.length? vals.reduce((a,b)=>a+b,0)/vals.length : NaN;
      });
      consensus.set(k,out);
    });

    // map to sleeper player_ids
    const nameToId = new Map();
    Object.entries(state.players).forEach(([id,p])=>{
      const full = norm(p.full_name || `${p.first_name||''} ${p.last_name||''}`);
      if(full) nameToId.set(full,id);
    });

    // pick scoring combo from league settings
    const rec = state.league.scoring_settings?.rec || 0;
    const bonusTe = state.league.scoring_settings?.bonus_rec_te || 0;
    const recLabel = rec>=1? 'PPR' : rec>=0.5? 'Half' : 'Std';
    const tepLabel = bonusTe>=1? ' TEP' : bonusTe>=0.5? ' 0.5 TEP' : '';
    state.scoringKey = (recLabel+tepLabel).trim();
    state.scoringLabel = state.scoringKey;
    $('#scoring-name').textContent = state.scoringKey;

    // build values map
    state.values.clear();
    consensus.forEach((c,k)=>{
      const pid = nameToId.get(k);
      if(!pid) return;
      const val = c[state.scoringKey];
      if(Number.isFinite(val)){
        // scale to trade value range ~ 1000-10000
        const scaled = Math.max(100, val*1000);
        state.values.set(pid,{value:scaled});
      }
    });
  }

  async function loadPickValues(){
    const defaults = [
      ['2026 1st Early',8000],['2026 1st Mid',6000],['2026 1st Late',4000],
      ['2026 2nd Early',3000],['2026 2nd Mid',2000],['2026 2nd Late',1500],
      ['2027 1st Early',7500],['2027 1st Mid',5500],['2027 1st Late',3500],
      ['2027 2nd Early',2800],['2027 2nd Mid',1800],['2027 2nd Late',1300]
    ];
    defaults.forEach(([n,v])=>state.pickValues.set(norm(n),v));
  }

  function playerFromId(pid){
    const p = state.players[pid]||{};
    const v = state.values.get(pid)||{value:1000};
    return {
      id:pid,
      name:p.full_name||`${p.first_name||''} ${p.last_name||''}`.trim()||pid,
      pos:p.position||'UNK',
      value:v.value||1000
    };
  }

  function computeSlots(){
    const scores = state.rosters.map(r=>{
      const players=(r.players||[]).map(playerFromId);
      const total=players.reduce((s,p)=>s+p.value,0);
      return {id:r.roster_id,total};
    }).sort((a,b)=>b.total-a.total);
    state.teamSlots.clear();
    scores.forEach((s,i)=>{
      let slot='mid';
      if(i<3) slot='late';
      else if(i>=scores.length-3) slot='early';
      state.teamSlots.set(s.id,slot);
    });
  }

  function getPickValue(season,round,slot){
    const key=norm(`${season} ${ordinal(round)} ${slot}`);
    if(state.pickValues.has(key)) return state.pickValues.get(key);
    const base = round===1?5000: round===2?2000: round===3?800:300;
    return slot==='early'?base*1.3: slot==='late'?base*0.7:base;
  }

  function buildPickInventory(){
    state.rosters.forEach(r=>state.pickInventory.set(r.roster_id,[]));
    state.tradedPicks.forEach(tp=>{
      const owner=state.rosters.find(r=>r.owner_id===tp.owner_id);
      const orig=state.rosters.find(r=>r.roster_id===tp.roster_id);
      if(!owner||!orig) return;
      const slot=state.teamSlots.get(orig.roster_id)||'mid';
      const value=getPickValue(tp.season,tp.round,slot);
      const name=`${tp.season} ${ordinal(tp.round)} ${slot.charAt(0).toUpperCase()+slot.slice(1)}`;
      state.pickInventory.get(owner.roster_id).push({
        id:`${tp.season}-${tp.round}-${slot}-${orig.roster_id}`,
        name,season:tp.season,round:tp.round,slot,value,
        origTeam:teamName(orig),isOwn:owner.roster_id===orig.roster_id
      });
    });
    const start=new Date().getFullYear()+1;
    state.rosters.forEach(r=>{
      const inv=state.pickInventory.get(r.roster_id);
      for(let y=start;y<start+3;y++){
        [1,2,3,4].forEach(rd=>{
          if(state.tradedPicks.some(tp=>tp.roster_id===r.roster_id&&tp.season==y&&tp.round==rd)) return;
          const slot=state.teamSlots.get(r.roster_id)||'mid';
          const value=getPickValue(y,rd,slot);
          const name=`${y} ${ordinal(rd)} ${slot.charAt(0).toUpperCase()+slot.slice(1)}`;
          inv.push({id:`${y}-${rd}-${slot}-own`,name,season:y,round:rd,slot,value,origTeam:teamName(r),isOwn:true});
        });
      }
      inv.sort((a,b)=>b.value-a.value);
    });
  }

  function renderSelect(){
    const a=$('#team-a-select'),b=$('#team-b-select');
    a.innerHTML=''; b.innerHTML='';
    state.rosters.forEach(r=>{
      const o=document.createElement('option');
      o.value=r.roster_id; o.textContent=teamName(r);
      a.appendChild(o.cloneNode(true)); b.appendChild(o.cloneNode(true));
    });
    state.teamA=state.rosters[0]?.roster_id;
    state.teamB=state.rosters[1]?.roster_id||state.rosters[0]?.roster_id;
    a.value=state.teamA; b.value=state.teamB;
  }

  function toggle(set,id){ set.has(id)?set.delete(id):set.add(id); updateAll(); }

  function renderPicks(rosterId,containerId,selSet){
    const inv=state.pickInventory.get(rosterId)||[];
    const cont=$(containerId); cont.innerHTML='';
    if(inv.length===0){ cont.innerHTML='<div class="text-xs text-slate-600 px-2 py-2">No picks</div>'; return; }
    inv.forEach(p=>{
      const sel=selSet.has(p.id);
      const row=document.createElement('div');
      row.className=`player-row flex items-center gap-2 px-2 py-1.5 rounded-lg ${sel?'selected':''}`;
      row.innerHTML=`<div class="badge badge-pick">${p.season}</div><div class="badge">R${p.round}</div><div class="badge">${p.slot}</div><div class="flex-1 text-sm truncate">${p.name} ${p.isOwn?'':'<span class="text-[10px] text-slate-500">via '+p.origTeam+'</span>'}</div><div class="text-xs mono">${fmt(p.value)}</div>`;
      row.onclick=()=>toggle(selSet,p.id);
      cont.appendChild(row);
    });
  }

  function renderRoster(teamId,containerId,selSet){
    const r=state.rosters.find(x=>x.roster_id==teamId); if(!r) return;
    const players=(r.players||[]).map(playerFromId).sort((a,b)=>b.value-a.value);
    const cont=$(containerId); cont.innerHTML='';
    players.forEach(p=>{
      const sel=selSet.has(p.id);
      const row=document.createElement('div');
      row.className=`player-row flex items-center gap-2 px-2 py-1.5 rounded-lg ${sel?'selected':''}`;
      row.innerHTML=`<div class="text-[10px] mono bg-slate-800 rounded px-1 w-9 text-center">${p.pos}</div><div class="flex-1 text-sm truncate">${p.name}</div><div class="text-xs mono">${fmt(p.value)}</div>`;
      row.onclick=()=>toggle(selSet,p.id);
      cont.appendChild(row);
    });
  }

  function sumAssets(rosterId,selSet){
    const r=state.rosters.find(x=>x.roster_id==rosterId);
    const players=(r.players||[]).map(playerFromId).filter(p=>selSet.has(p.id));
    const picks=(state.pickInventory.get(rosterId)||[]).filter(p=>selSet.has(p.id));
    return [...players,...picks].reduce((s,x)=>s+x.value,0);
  }

  function updateAll(){
    renderPicks(state.teamA,'#picks-a',state.selectedA);
    renderPicks(state.teamB,'#picks-b',state.selectedB);
    renderRoster(state.teamA,'#roster-a',state.selectedA);
    renderRoster(state.teamB,'#roster-b',state.selectedB);
    const aVal=sumAssets(state.teamA,state.selectedA);
    const bVal=sumAssets(state.teamB,state.selectedB);
    $('#send-a').textContent=fmt(aVal);
    $('#send-b').textContent=fmt(bVal);
    $('#count-a').textContent=state.selectedA.size;
    $('#count-b').textContent=state.selectedB.size;
    const diff=bVal-aVal;
    $('#fairness-label').textContent=diff>0?'A wins':diff<0?'B wins':'Even';
  }

  async function init(){
    setStatus('Loading league…');
    const [league,users,rosters,players,traded]=await Promise.all([
      fetchJSON(`https://api.sleeper.app/v1/league/${league_id}`),
      fetchJSON(`https://api.sleeper.app/v1/league/${league_id}/users`),
      fetchJSON(`https://api.sleeper.app/v1/league/${league_id}/rosters`),
      fetchJSON('https://api.sleeper.app/v1/players/nfl'),
      fetchJSON(`https://api.sleeper.app/v1/league/${league_id}/traded_picks`).catch(()=>[])
    ]);
    state.league=league; state.users=users; state.rosters=rosters; state.players=players; state.tradedPicks=traded;
    $('#league-name').textContent=league.name;
    await loadPickValues();
    await loadConsensusValues();
    computeSlots();
    buildPickInventory();
    renderSelect();
    setStatus('Ready');
    updateAll();
  }

  document.addEventListener('DOMContentLoaded',()=>{
    $('#team-a-select')?.addEventListener('change',e=>{state.teamA=+e.target.value;state.selectedA.clear();updateAll();});
    $('#team-b-select')?.addEventListener('change',e=>{state.teamB=+e.target.value;state.selectedB.clear();updateAll();});
    $('#reset-btn')?.addEventListener('click',()=>{state.selectedA.clear();state.selectedB.clear();updateAll();});
    $('#swap-btn')?.addEventListener('click',()=>{[state.teamA,state.teamB]=[state.teamB,state.teamA];[state.selectedA,state.selectedB]=[state.selectedB,state.selectedA];$('#team-a-select').value=state.teamA;$('#team-b-select').value=state.teamB;updateAll();});
    init();
  });
})();
</script>
</body>
</html>
