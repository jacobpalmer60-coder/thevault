<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Dynasty Trade Calculator</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
body{font-family:'Outfit',system-ui;background:#020617;color:#e2e8f0}
.mono{font-family:'JetBrains Mono',monospace}
.player-row{cursor:pointer;border:1px solid transparent}
.player-row:hover{background:rgba(255,255,255,.04)}
.player-row.selected{background:rgba(245,158,11,.12);border-color:rgba(245,158,11,.4)}
.badge{font-size:10px;padding:2px 6px;border-radius:6px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1)}
.badge-pick{background:rgba(168,85,247,.15);border-color:rgba(168,85,247,.3);color:#e9d5ff}
.table-head{font-size:10px;text-transform:uppercase;color:#64748b}
.role-starter{color:#22c55e}
.role-depth{color:#94a3b8}
.lineup-new{color:#22c55e}
.pill{font-size:11px;padding:3px 8px;border-radius:999px;border:1px solid transparent;display:inline-flex;align-items:center;gap:6px}
.pill-rebuild{background:rgba(59,130,246,.12);border-color:rgba(59,130,246,.35);color:#93c5fd}
.pill-mid{background:rgba(100,116,139,.12);border-color:rgba(100,116,139,.35);color:#cbd5e1}
.pill-fringe{background:rgba(245,158,11,.12);border-color:rgba(245,158,11,.35);color:#fcd34d}
.pill-contender{background:rgba(34,197,94,.12);border-color:rgba(34,197,94,.35);color:#86efac}
.tooltip{position:relative}
.tooltip:hover .tooltip-card{display:block}
.tooltip-card{display:none;position:absolute;top:100%;left:0;margin-top:6px;z-index:50;width:280px;background:#0f172a;border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:10px}
.meter{height:6px;background:rgba(255,255,255,.08);border-radius:999px;overflow:hidden}
.meter-fill{height:100%}
</style>
</head>
<body class="min-h-screen">
<header class="sticky top-0 z-40 border-b border-white/10 bg-slate-950/80 backdrop-blur">
  <div class="max-w-[1400px] mx-auto px-4 h-14 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-amber-400 to-yellow-600"></div>
      <div class="font-semibold">Dynasty Trade Calculator</div>
      <span id="league-name" class="ml-3 text-xs text-slate-400 mono hidden sm:inline"></span>
      <span id="scoring-name" class="ml-3 text-xs text-amber-300 mono hidden sm:inline"></span>
    </div>
    <div class="flex items-center gap-2">
      <button id="swap-btn" class="px-3 py-2 rounded-lg bg-white/5 hover:bg-white/10 border border-white/10 text-sm">Swap</button>
      <button id="reset-btn" class="px-3 py-2 rounded-lg bg-white/5 hover:bg-white/10 border border-white/10 text-sm">Reset</button>
    </div>
  </div>
</header>

<main class="max-w-[1400px] mx-auto px-4 py-3">
  <div id="status" class="mb-3 text-xs text-slate-400"><span id="status-text">Loading…</span></div>

  <div class="grid grid-cols-3 gap-3 mb-3">
    <div class="bg-slate-900/60 border border-white/10 rounded-xl p-2.5">
      <div class="text-[10px] uppercase text-slate-500">Team A Sends</div>
      <div id="send-a" class="text-lg font-semibold mono">0</div>
      <div class="text-xs text-slate-400"><span id="count-a">0</span> assets</div>
    </div>
    <div class="bg-slate-900/60 border border-amber-500/20 rounded-xl p-2.5">
      <div class="text-[10px] uppercase text-amber-300">Fairness</div>
      <div id="fairness-label" class="text-base font-semibold mono">Even</div>
    </div>
    <div class="bg-slate-900/60 border border-white/10 rounded-xl p-2.5 text-right">
      <div class="text-[10px] uppercase text-slate-500">Team B Sends</div>
      <div id="send-b" class="text-lg font-semibold mono">0</div>
      <div class="text-xs text-slate-400"><span id="count-b">0</span> assets</div>
    </div>
  </div>

  <div class="overflow-x-auto">
    <div class="grid gap-3 min-w-[1200px]" style="grid-template-columns: 240px 1fr 1fr 240px;">

      <!-- Team A -->
      <section class="bg-slate-900/60 border border-white/10 rounded-2xl flex flex-col h-[720px]">
        <div class="p-2.5 border-b border-white/10 bg-amber-500/10">
          <div class="flex items-center justify-between gap-2">
            <h2 class="font-semibold text-amber-300 text-sm">Team A</h2>
            <select id="team-a-select" class="bg-slate-900 border border-white/10 rounded-lg px-2 py-1.5 text-xs w-32"></select>
          </div>
          <div id="pill-a" class="mt-2"></div>
        </div>
        <div class="flex-1 overflow-y-auto p-2">
          <div class="text-[10px] uppercase text-slate-500 px-1 mb-1">Picks</div>
          <div id="picks-a" class="space-y-1 mb-3"></div>
          <div class="text-[10px] uppercase text-slate-500 px-1 mb-1">Players</div>
          <div id="roster-a" class="space-y-1"></div>
        </div>
      </section>

      <!-- Impact A -->
      <section class="bg-slate-900/60 border border-white/10 rounded-2xl flex flex-col h-[720px]">
        <div class="p-2.5 border-b border-white/10 bg-amber-500/10">
          <h2 class="font-semibold text-amber-300 text-sm">Impact A — What You Get</h2>
        </div>
        <div id="impact-a" class="flex-1 overflow-y-auto p-3"></div>
      </section>

      <!-- Impact B -->
      <section class="bg-slate-900/60 border border-white/10 rounded-2xl flex flex-col h-[720px]">
        <div class="p-2.5 border-b border-white/10 bg-amber-500/10">
          <h2 class="font-semibold text-amber-300 text-sm">Impact B — What You Get</h2>
        </div>
        <div id="impact-b" class="flex-1 overflow-y-auto p-3"></div>
      </section>

      <!-- Team B -->
      <section class="bg-slate-900/60 border border-white/10 rounded-2xl flex flex-col h-[720px]">
        <div class="p-2.5 border-b border-white/10 bg-amber-500/10">
          <div class="flex items-center justify-between gap-2">
            <h2 class="font-semibold text-amber-300 text-sm">Team B</h2>
            <select id="team-b-select" class="bg-slate-900 border border-white/10 rounded-lg px-2 py-1.5 text-xs w-32"></select>
          </div>
          <div id="pill-b" class="mt-2"></div>
        </div>
        <div class="flex-1 overflow-y-auto p-2">
          <div class="text-[10px] uppercase text-slate-500 px-1 mb-1">Picks</div>
          <div id="picks-b" class="space-y-1 mb-3"></div>
          <div class="text-[10px] uppercase text-slate-500 px-1 mb-1">Players</div>
          <div id="roster-b" class="space-y-1"></div>
        </div>
      </section>

    </div>
  </div>
</main>

<script>
(() => {
  const DEFAULT_LEAGUE = '1313454100225990656';
  const params = new URLSearchParams(location.search);
  const league_id = params.get('league_id') || DEFAULT_LEAGUE;

  const CSV_URLS = {
    audit: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRqxhqyuKK6vu_EoYta5FZ_KdOB8M54Q_qBwJKOUF5KcgbTt2dmHn_FuLj9d-FS8-ta5T0zkU0QEGcN/pub?gid=0&single=true&output=csv',
    sleeper: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRqxhqyuKK6vu_EoYta5FZ_KdOB8M54Q_qBwJKOUF5KcgbTt2dmHn_FuLj9d-FS8-ta5T0zkU0QEGcN/pub?gid=1866730819&single=true&output=csv',
    fp: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRqxhqyuKK6vu_EoYta5FZ_KdOB8M54Q_qBwJKOUF5KcgbTt2dmHn_FuLj9d-FS8-ta5T0zkU0QEGcN/pub?gid=2012227164&single=true&output=csv',
    ra: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRqxhqyuKK6vu_EoYta5FZ_KdOB8M54Q_qBwJKOUF5KcgbTt2dmHn_FuLj9d-FS8-ta5T0zkU0QEGcN/pub?gid=1226234680&single=true&output=csv'
  };

  const state = {
    league:null, users:[], rosters:[], players:{},
    ppg:new Map(), auditValues:new Map(),
    pickValues:new Map(), pickInventory:new Map(),
    teamSlots:new Map(), teamA:null, teamB:null,
    selectedA:new Set(), selectedB:new Set(),
    tradedPicks:[],
    scoringKey:'PPR',
    teamMetrics:new Map(),
    refreshTime:null
  };

  const $ = s => document.querySelector(s);
  const fmt = n => Math.round(n).toLocaleString();
  const fmt1 = n => (Math.round(n*10)/10).toFixed(1);
  const setStatus = t => { const el=$('#status-text'); if(el) el.textContent=t; };
  const teamName = r => {
    const u = state.users.find(x=>x.user_id===r.owner_id);
    return u?.metadata?.team_name || u?.display_name || `Team ${r.roster_id}`;
  };
  const ordinal = n => { const s=['th','st','nd','rd']; const v=n%100; return n+(s[(v-20)%10]||s[v]||s[0]); };
  const norm = s => String(s||'').toLowerCase().replace(/\./g,'').replace(/[^a-z0-9]+/g,' ').trim();

  async function fetchJSON(url){ const r=await fetch(url); return r.json(); }
  async function fetchText(url){ const r=await fetch(url); return r.text(); }

  function parseCSV(text){
    const lines = text.trim().split(/\r?\n/);
    const headers = lines[0].split(',').map(h=>h.trim());
    return lines.slice(1).map(line=>{
      const cols = line.split(',');
      const obj = {};
      headers.forEach((h,i)=> obj[h]=cols[i]?.trim());
      return obj;
    });
  }
  function toNum(v){ if(v==null||v==='')return NaN; const n=Number(v); return Number.isFinite(n)?n:NaN; }

  async function loadAuditValues(){
    const txt = await fetchText(CSV_URLS.audit);
    const rows = parseCSV(txt);
    const headers = Object.keys(rows[0]||{});
    const playerCol = headers.find(h=>/player/i.test(h)) || 'Player';
    const valueCol = headers.find(h=>/value/i.test(h)) || 'Value';
    state.auditValues.clear();
    rows.forEach(r=>{
      const name = r[playerCol];
      const val = toNum(r[valueCol]);
      if(name && Number.isFinite(val)){
        state.auditValues.set(norm(name), val);
      }
    });
  }

  function buildSourceMap(rows){
    const map=new Map();
    rows.forEach(r=>{
      const name=r.Player||r.player; if(!name) return;
      const pos=(r.Position||'').toUpperCase();
      const rec={name,pos};
      ['Std','Std 0.5 TEP','Std TEP','Half','Half 0.5 TEP','Half TEP','PPR','PPR 0.5 TEP','PPR TEP'].forEach(c=>{
        let v=toNum(r[c]);
        if(!Number.isFinite(v)&&c.includes('0.5 TEP')){
          const base=c.replace(' 0.5 TEP',''); const full=base+' TEP';
          const b=toNum(r[base]), f=toNum(r[full]);
          if(Number.isFinite(b)&&Number.isFinite(f)) v=(b+f)/2;
          else if(Number.isFinite(b)) v=pos==='TE'?b+0.5:b;
        }
        rec[c]=v;
      });
      map.set(norm(name),rec);
    });
    return map;
  }

  async function loadPPG(){
    setStatus('Loading projections…');
    const [sTxt,fTxt,rTxt]=await Promise.all([fetchText(CSV_URLS.sleeper),fetchText(CSV_URLS.fp),fetchText(CSV_URLS.ra)]);
    const sMap=buildSourceMap(parseCSV(sTxt));
    const fMap=buildSourceMap(parseCSV(fTxt));
    const rMap=buildSourceMap(parseCSV(rTxt));
    const keys=new Set([...sMap.keys(),...fMap.keys(),...rMap.keys()]);
    const comboKeys=['Std','Std 0.5 TEP','Std TEP','Half','Half 0.5 TEP','Half TEP','PPR','PPR 0.5 TEP','PPR TEP'];
    const consensus=new Map();
    keys.forEach(k=>{
      const s=sMap.get(k)||{}, f=fMap.get(k)||{}, r=rMap.get(k)||{};
      const out={name:s.name||f.name||r.name,pos:s.pos||f.pos||r.pos};
      comboKeys.forEach(c=>{
        const vals=[s[c],f[c],r[c]].filter(Number.isFinite);
        out[c]=vals.length?vals.reduce((a,b)=>a+b,0)/vals.length:NaN;
      });
      consensus.set(k,out);
    });
    const nameToId=new Map();
    Object.entries(state.players).forEach(([id,p])=>{
      const full=norm(p.full_name||`${p.first_name||''} ${p.last_name||''}`);
      if(full) nameToId.set(full,id);
    });
    const rec=state.league.scoring_settings?.rec||0;
    const bonusTe=state.league.scoring_settings?.bonus_rec_te||0;
    const recLabel=rec>=1?'PPR':rec>=0.5?'Half':'Std';
    const tepLabel=bonusTe>=1?' TEP':bonusTe>=0.5?' 0.5 TEP':'';
    state.scoringKey=(recLabel+tepLabel).trim();
    $('#scoring-name').textContent=state.scoringKey;
    state.ppg.clear();
    consensus.forEach((c,k)=>{
      const pid=nameToId.get(k); if(!pid) return;
      const ppg=c[state.scoringKey];
      if(Number.isFinite(ppg)) state.ppg.set(pid, ppg);
    });
  }

  async function loadPickValues(){
    const year=new Date().getFullYear()+1;
    const base={1:{early:8000,mid:6000,late:4000},2:{early:3000,mid:2000,late:1500},3:{early:1000,mid:800,late:600},4:{early:400,mid:300,late:200}};
    for(let y=year;y<year+3;y++){
      const decay=Math.pow(0.85,y-year);
      [1,2,3,4].forEach(rd=>{
        ['early','mid','late'].forEach(slot=>{
          state.pickValues.set(norm(`${y} ${ordinal(rd)} ${slot}`), Math.round(base[rd][slot]*decay));
        });
      });
    }
  }

  function playerFromId(pid){
    const p=state.players[pid]||{};
    const name=p.full_name||`${p.first_name||''} ${p.last_name||''}`.trim()||pid;
    const auditVal = state.auditValues.get(norm(name));
    const ppg = state.ppg.get(pid)||0;
    return {
      id:pid,
      name,
      pos:p.position||'UNK',
      team:p.team||'',
      age:p.age?Number(p.age):null,
      ppg,
      value: Number.isFinite(auditVal)? auditVal : 500,
      type:'player'
    };
  }

  function computeSlots(){
    const scores=state.rosters.map(r=>{
      const total=(r.players||[]).map(playerFromId).reduce((s,p)=>s+p.value,0);
      return {id:r.roster_id,total};
    }).sort((a,b)=>b.total-a.total);
    state.teamSlots.clear();
    scores.forEach((s,i)=>{
      let slot='mid'; if(i<3)slot='late'; else if(i>=scores.length-3)slot='early';
      state.teamSlots.set(s.id,slot);
    });
  }

  function getPickValue(season,round,slot){
    const key=norm(`${season} ${ordinal(round)} ${slot}`);
    return state.pickValues.get(key)||2000;
  }

  function buildPickInventory(){
    state.rosters.forEach(r=>state.pickInventory.set(r.roster_id,[]));
    state.tradedPicks.forEach(tp=>{
      const owner=state.rosters.find(r=>r.owner_id===tp.owner_id);
      const orig=state.rosters.find(r=>r.roster_id===tp.roster_id);
      if(!owner||!orig)return;
      const slot=state.teamSlots.get(orig.roster_id)||'mid';
      const value=getPickValue(tp.season,tp.round,slot);
      state.pickInventory.get(owner.roster_id).push({
        id:`${tp.season}-${tp.round}-${slot}-${orig.roster_id}`,
        name:`${tp.season} ${ordinal(tp.round)} ${slot}`,
        season:tp.season,round:tp.round,slot,value,
        origTeam:teamName(orig),isOwn:owner.roster_id===orig.roster_id,type:'pick'
      });
    });
    const start=new Date().getFullYear()+1;
    state.rosters.forEach(r=>{
      const inv=state.pickInventory.get(r.roster_id);
      for(let y=start;y<start+3;y++){
        [1,2,3,4].forEach(rd=>{
          if(state.tradedPicks.some(tp=>tp.roster_id===r.roster_id&&tp.season==y&&tp.round==rd))return;
          const slot=state.teamSlots.get(r.roster_id)||'mid';
          inv.push({
            id:`${y}-${rd}-${slot}-own`,
            name:`${y} ${ordinal(rd)} ${slot}`,
            season:y,round:rd,slot,
            value:getPickValue(y,rd,slot),
            origTeam:teamName(r),isOwn:true,type:'pick'
          });
        });
      }
      inv.sort((a,b)=>b.value-a.value);
    });
  }

  function getStarterSlots(){
    const pos=state.league.roster_positions||[];
    return pos.filter(p=>!['BN','TAXI','IR'].includes(p));
  }

  function computeOptimalLineup(rosterId, addPlayers=[], removeIds=new Set()){
    const r=state.rosters.find(x=>x.roster_id==rosterId);
    const base=(r.players||[]).filter(pid=>!removeIds.has(pid)).map(playerFromId);
    const pool=[...base,...addPlayers];
    const slots=getStarterSlots();
    const used=new Set();
    let total=0;
    const starters=[];
    const pickBest=(filter, slotName)=>{
      let best=null;
      pool.forEach(p=>{
        if(used.has(p.id))return;
        if(filter(p)){
          if(!best||p.ppg>best.ppg) best=p;
        }
      });
      if(best){
        used.add(best.id);
        total+=best.ppg;
        starters.push({...best, slot: slotName});
      }
    };
    const counts={};
    slots.forEach(s=>{
      counts[s]=(counts[s]||0)+1;
      const label = counts[s]>1? `${s}${counts[s]}` : s;
      if(s==='FLEX') pickBest(p=>['RB','WR','TE'].includes(p.pos), 'FLEX');
      else if(s==='SUPER_FLEX') pickBest(p=>['QB','RB','WR','TE'].includes(p.pos), 'SUPER_FLEX');
      else pickBest(p=>p.pos===s, label);
    });
    const ages=starters.map(s=>s.age).filter(a=>Number.isFinite(a));
    const avgAge=ages.length? ages.reduce((a,b)=>a+b,0)/ages.length : null;
    return {total, starters, avgAge};
  }

  function computeTeamMetrics(){
    const metrics=[];
    state.rosters.forEach(r=>{
      const rosterId=r.roster_id;
      const players=(r.players||[]).map(playerFromId);
      const rosterValue=players.reduce((s,p)=>s+p.value,0);
      const picks=state.pickInventory.get(rosterId)||[];
      const pickCapital=picks.reduce((s,p)=>s+p.value,0);
      const opt=computeOptimalLineup(rosterId);
      metrics.push({
        rosterId,
        ppg:opt.total,
        rosterValue,
        pickCapital,
        avgAge:opt.avgAge||28,
        name:teamName(r)
      });
    });
    const z = arr => {
      const mean=arr.reduce((a,b)=>a+b,0)/arr.length;
      const sd=Math.sqrt(arr.reduce((a,b)=>a+(b-mean)**2,0)/arr.length)||1;
      return arr.map(v=>(v-mean)/sd);
    };
    const ppgZ=z(metrics.map(m=>m.ppg));
    const valZ=z(metrics.map(m=>m.rosterValue));
    const pickZ=z(metrics.map(m=>m.pickCapital));
    const ageZ=z(metrics.map(m=>-m.avgAge));
    const weights={ppg:0.5,val:0.3,pick:0.1,age:0.1};
    metrics.forEach((m,i)=>{
      const score=ppgZ[i]*weights.ppg + valZ[i]*weights.val + pickZ[i]*weights.pick + ageZ[i]*weights.age;
      m.score=score;
    });
    const sorted=[...metrics].sort((a,b)=>a.score-b.score);
    sorted.forEach((m,i)=>{
      m.percentile=Math.round((i/(sorted.length-1))*100);
    });
    state.teamMetrics.clear();
    metrics.forEach(m=>{
      let bucket='Mid', cls='pill-mid';
      if(m.percentile<30){bucket='Rebuild';cls='pill-rebuild';}
      else if(m.percentile<55){bucket='Mid';cls='pill-mid';}
      else if(m.percentile<75){bucket='Fringe';cls='pill-fringe';}
      else {bucket='Contender';cls='pill-contender';}
      const narrative = bucket==='Contender' ? `Top PPG, strong starters${m.pickCapital>15000?' • good picks':''}` :
                        bucket==='Fringe' ? `Mid PPG, mixed age` :
                        bucket==='Mid' ? `Average profile` :
                        `Developing, pick heavy`;
      state.teamMetrics.set(m.rosterId,{...m,bucket,cls,narrative});
    });
    state.refreshTime=new Date();
  }

  function pillHTML(rosterId){
    const m=state.teamMetrics.get(rosterId);
    if(!m) return '';
    const time = state.refreshTime ? state.refreshTime.toLocaleTimeString() : '';
    return `<div class="tooltip inline-block">
      <span class="pill ${m.cls}">${m.bucket} ${m.percentile}%</span>
      <div class="tooltip-card">
        <div class="text-xs font-semibold mb-2">${m.name}</div>
        <div class="text-[10px] uppercase text-slate-500 mb-1">Window</div>
        <div class="meter mb-2"><div class="meter-fill ${m.cls.replace('pill-','bg-')}" style="width:${m.percentile}%;background:currentColor;opacity:.6"></div></div>
        <div class="grid grid-cols-2 gap-2 text-[11px]">
          <div>PPG: <span class="mono">${fmt1(m.ppg)}</span></div>
          <div>Value: <span class="mono">${fmt(m.rosterValue)}</span></div>
          <div>Picks: <span class="mono">${fmt(m.pickCapital)}</span></div>
          <div>Avg Age: <span class="mono">${fmt1(m.avgAge)}</span></div>
        </div>
        <div class="text-[11px] text-slate-300 mt-2">${m.narrative}</div>
        <div class="text-[10px] text-slate-500 mt-2">Updated ${time}</div>
      </div>
    </div>`;
  }

  function getSelectedAssets(rosterId,selSet){
    const r=state.rosters.find(x=>x.roster_id==rosterId);
    const players=(r.players||[]).filter(pid=>selSet.has(pid)).map(playerFromId);
    const picks=(state.pickInventory.get(rosterId)||[]).filter(p=>selSet.has(p.id));
    return [...players,...picks];
  }

  function renderSelect(){
    const a=$('#team-a-select'),b=$('#team-b-select');
    a.innerHTML='';b.innerHTML='';
    state.rosters.forEach(r=>{
      const o=document.createElement('option');o.value=r.roster_id;o.textContent=teamName(r);
      a.appendChild(o.cloneNode(true));b.appendChild(o.cloneNode(true));
    });
    state.teamA=state.rosters[0]?.roster_id;
    state.teamB=state.rosters[1]?.roster_id||state.rosters[0]?.roster_id;
    a.value=state.teamA;b.value=state.teamB;
  }

  function toggle(set,id){set.has(id)?set.delete(id):set.add(id);updateAll();}

  function renderPicks(rosterId,containerId,selSet){
    const inv=state.pickInventory.get(rosterId)||[];
    const cont=$(containerId);cont.innerHTML='';
    inv.forEach(p=>{
      const sel=selSet.has(p.id);
      const row=document.createElement('div');
      row.className=`player-row px-2 py-1.5 rounded-lg ${sel?'selected':''}`;
      row.innerHTML=`<div class="flex items-center gap-1.5 flex-wrap">
        <span class="badge badge-pick">${p.season}</span>
        <span class="badge">R${p.round}</span>
        <span class="badge">${p.slot}</span>
      </div>
      <div class="text-xs mt-1 break-words" title="${p.name}">${p.name}</div>
      <div class="text-[10px] mono text-slate-400">Val ${fmt(p.value)}</div>`;
      row.onclick=()=>toggle(selSet,p.id);
      cont.appendChild(row);
    });
  }

  function renderRoster(teamId,containerId,selSet){
    const r=state.rosters.find(x=>x.roster_id==teamId);if(!r)return;
    const players=(r.players||[]).map(playerFromId).sort((a,b)=>b.value-a.value);
    const cont=$(containerId);cont.innerHTML='';
    players.forEach(p=>{
      const sel=selSet.has(p.id);
      const row=document.createElement('div');
      row.className=`player-row px-2 py-1.5 rounded-lg ${sel?'selected':''}`;
      row.title=p.name;
      row.innerHTML=`<div class="text-xs leading-tight break-words">${p.name}</div>
        <div class="text-[10px] mono text-slate-400">${p.pos} • ${fmt1(p.ppg)} PPG • ${fmt(p.value)}</div>`;
      row.onclick=()=>toggle(selSet,p.id);
      cont.appendChild(row);
    });
  }

  function lineupHTML(title, starters, highlightIds=new Set()){
    const rows = starters.map(s=>{
      const cls = highlightIds.has(s.id)? 'lineup-new' : '';
      return `<div class="flex items-center justify-between text-xs py-0.5 ${cls}">
        <div class="flex items-center gap-2"><span class="text-[10px] mono w-16">${s.slot}</span><span class="truncate">${s.name}</span></div>
        <div class="text-[10px] mono text-slate-400">${s.age||'-'} • ${fmt1(s.ppg)}</div>
      </div>`;
    }).join('');
    return `<div>
      <div class="text-[10px] uppercase text-slate-500 mb-1">${title}</div>
      <div class="bg-slate-950/50 rounded-lg border border-white/5 p-2">${rows || '<div class="text-xs text-slate-600">—</div>'}</div>
    </div>`;
  }

  function renderImpactPanel(containerId, receivingTeamId, givingTeamId, outSelSet, inSelSet){
    const cont=$(containerId);
    const incoming=getSelectedAssets(givingTeamId,inSelSet);
    const outgoing=getSelectedAssets(receivingTeamId,outSelSet);
    const addPlayers=incoming.filter(a=>a.type==='player');
    const removeIds=new Set(outgoing.filter(a=>a.type==='player').map(a=>a.id));
    const before=computeOptimalLineup(receivingTeamId);
    const after=computeOptimalLineup(receivingTeamId, addPlayers, removeIds);
    const starterIds=new Set(after.starters.map(s=>s.id));
    const beforeIds=new Set(before.starters.map(s=>s.id));
    const newIds=new Set([...starterIds].filter(id=>!beforeIds.has(id)));
    const ageBefore=before.avgAge?fmt1(before.avgAge):'-';
    const ageAfter=after.avgAge?fmt1(after.avgAge):'-';
    const ageDelta=before.avgAge&&after.avgAge?fmt1(after.avgAge-before.avgAge):'0.0';
    const inVal=incoming.reduce((s,a)=>s+a.value,0);
    const outVal=outgoing.reduce((s,a)=>s+a.value,0);
    const netVal=inVal-outVal;
    const head=`<div class="mb-3 grid grid-cols-3 gap-2">
      <div class="p-2.5 rounded-xl bg-slate-800/60 border border-white/10">
        <div class="text-[10px] uppercase text-slate-500">Optimal PPG</div>
        <div class="text-lg mono">${fmt1(before.total)} → <span class="text-amber-300">${fmt1(after.total)}</span></div>
        <div class="text-xs text-slate-400">${after.total>=before.total?'+':''}${fmt1(after.total-before.total)}</div>
      </div>
      <div class="p-2.5 rounded-xl bg-slate-800/60 border border-white/10">
        <div class="text-[10px] uppercase text-slate-500">Avg Age</div>
        <div class="text-lg mono">${ageBefore} → <span class="text-amber-300">${ageAfter}</span></div>
        <div class="text-xs text-slate-400">${Number(ageDelta)>=0?'+':''}${ageDelta} yrs</div>
      </div>
      <div class="p-2.5 rounded-xl bg-slate-800/60 border border-white/10">
        <div class="text-[10px] uppercase text-slate-500">Net Value</div>
        <div class="text-lg mono">${netVal>=0?'+':''}${fmt(netVal)}</div>
        <div class="text-xs text-slate-400">${fmt(inVal)} in / ${fmt(outVal)} out</div>
      </div>
    </div>`;

    const lineup = `<div class="grid grid-cols-2 gap-2 mb-3">
      ${lineupHTML('Before', before.starters)}
      ${lineupHTML('After', after.starters, newIds)}
    </div>`;

    if(incoming.length===0){
      cont.innerHTML=head+lineup+`<div class="text-xs text-slate-500">No assets selected to receive</div>`;
      return;
    }
    const rows=incoming.map(a=>{
      if(a.type==='pick'){
        return `<tr class="border-b border-white/5">
          <td class="py-1.5 pr-2 text-xs">${a.name}</td>
          <td class="py-1.5 text-xs">PICK</td>
          <td class="py-1.5 text-xs">-</td>
          <td class="py-1.5 text-xs">-</td>
          <td class="py-1.5 mono text-xs">${fmt(a.value)}</td>
          <td class="py-1.5 text-xs">-</td>
        </tr>`;
      }else{
        const role=starterIds.has(a.id)?'<span class="role-starter">Starter</span>':'<span class="role-depth">Depth</span>';
        return `<tr class="border-b border-white/5">
          <td class="py-1.5 pr-2 text-xs">${a.name}</td>
          <td class="py-1.5 text-xs">${a.pos}</td>
          <td class="py-1.5 text-xs">${a.age||'-'}</td>
          <td class="py-1.5 mono text-xs">${fmt1(a.ppg)}</td>
          <td class="py-1.5 mono text-xs">${fmt(a.value)}</td>
          <td class="py-1.5 text-xs">${role}</td>
        </tr>`;
      }
    }).join('');
    cont.innerHTML=head+lineup+`
      <div class="text-[10px] uppercase text-slate-500 mb-1">Incoming Assets</div>
      <div class="overflow-x-auto">
        <table class="w-full">
          <thead class="table-head"><tr><th class="text-left pb-1">Player</th><th class="text-left pb-1">Pos</th><th class="text-left pb-1">Age</th><th class="text-left pb-1">PPG</th><th class="text-left pb-1">Value</th><th class="text-left pb-1">Role</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>`;
  }

  function sumAssets(rosterId,selSet){
    return getSelectedAssets(rosterId,selSet).reduce((s,x)=>s+x.value,0);
  }

  function updateAll(){
    $('#pill-a').innerHTML = pillHTML(state.teamA);
    $('#pill-b').innerHTML = pillHTML(state.teamB);
    renderPicks(state.teamA,'#picks-a',state.selectedA);
    renderPicks(state.teamB,'#picks-b',state.selectedB);
    renderRoster(state.teamA,'#roster-a',state.selectedA);
    renderRoster(state.teamB,'#roster-b',state.selectedB);
    renderImpactPanel('#impact-a', state.teamA, state.teamB, state.selectedA, state.selectedB);
    renderImpactPanel('#impact-b', state.teamB, state.teamA, state.selectedB, state.selectedA);
    const aVal=sumAssets(state.teamA,state.selectedA);
    const bVal=sumAssets(state.teamB,state.selectedB);
    $('#send-a').textContent=fmt(aVal);
    $('#send-b').textContent=fmt(bVal);
    $('#count-a').textContent=state.selectedA.size;
    $('#count-b').textContent=state.selectedB.size;
    const diff=bVal-aVal;
    $('#fairness-label').textContent= diff>500?'A wins big': diff>100?'A wins': diff<-500?'B wins big': diff<-100?'B wins':'Even';
  }

  async function init(){
    setStatus('Loading league…');
    const [league,users,rosters,players,traded]=await Promise.all([
      fetchJSON(`https://api.sleeper.app/v1/league/${league_id}`),
      fetchJSON(`https://api.sleeper.app/v1/league/${league_id}/users`),
      fetchJSON(`https://api.sleeper.app/v1/league/${league_id}/rosters`),
      fetchJSON('https://api.sleeper.app/v1/players/nfl'),
      fetchJSON(`https://api.sleeper.app/v1/league/${league_id}/traded_picks`).catch(()=>[])
    ]);
    state.league=league; state.users=users; state.rosters=rosters; state.players=players; state.tradedPicks=traded;
    $('#league-name').textContent=league.name;
    await loadPickValues();
    await loadAuditValues();
    await loadPPG();
    computeSlots();
    buildPickInventory();
    computeTeamMetrics();
    renderSelect();
    setStatus('Ready • computed on refresh');
    updateAll();
  }

  document.addEventListener('DOMContentLoaded',()=>{
    $('#team-a-select')?.addEventListener('change',e=>{state.teamA=+e.target.value;state.selectedA.clear();updateAll();});
    $('#team-b-select')?.addEventListener('change',e=>{state.teamB=+e.target.value;state.selectedB.clear();updateAll();});
    $('#reset-btn')?.addEventListener('click',()=>{state.selectedA.clear();state.selectedB.clear();updateAll();});
    $('#swap-btn')?.addEventListener('click',()=>{[state.teamA,state.teamB]=[state.teamB,state.teamA];[state.selectedA,state.selectedB]=[state.selectedB,state.selectedA];$('#team-a-select').value=state.teamA;$('#team-b-select').value=state.teamB;updateAll();});
    init();
  });
})();
</script>
</body>
</html>
