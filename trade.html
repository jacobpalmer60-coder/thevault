<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>TradeCalc Pro — Fixed Selection</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600&display=swap" rel="stylesheet">
<style>body{font-family:Outfit;background:#050810;color:#fff}:root{color-scheme:dark}.player.selected{outline:2px solid #8b5cf6;background:rgba(139,92,246,.15)}</style>
</head>
<body>
<main class="max-w-[1400px] mx-auto p-6">
  <div class="grid md:grid-cols-2 gap-4 mb-6">
    <div class="bg-violet-500/5 border border-violet-500/30 rounded-xl p-4 min-h-[180px]">
      <h3 class="text-violet-300 font-medium mb-2">Team A Sends <span id="countA" class="text-xs opacity-60">(0)</span></h3>
      <div id="tradeA" class="flex flex-wrap gap-1.5 mb-3 min-h-[28px]"></div>
      <div id="statsA" class="text-[12px] space-y-1 opacity-70">Click players below</div>
    </div>
    <div class="bg-cyan-500/5 border border-cyan-500/30 rounded-xl p-4 min-h-[180px]">
      <h3 class="text-cyan-300 font-medium mb-2">Team B Sends <span id="countB" class="text-xs opacity-60">(0)</span></h3>
      <div id="tradeB" class="flex flex-wrap gap-1.5 mb-3 min-h-[28px]"></div>
      <div id="statsB" class="text-[12px] space-y-1 opacity-70">Click players below</div>
    </div>
  </div>

  <div class="text-center mb-4">
    <div class="inline-flex items-center gap-3 px-4 py-2 bg-white/5 rounded-full border border-white/10">
      <span class="text-sm">Fairness:</span>
      <span id="fair" class="font-mono">Select players</span>
      <div class="w-24 h-1 bg-white/10 rounded"><div id="bar" class="h-full bg-gradient-to-r from-violet-500 to-cyan-400 w-0"></div></div>
    </div>
  </div>

  <div class="grid lg:grid-cols-2 gap-5">
    <div class="border border-white/10 rounded-xl p-4">
      <select id="teamA" class="w-full mb-3 bg-black/50 border border-white/10 rounded px-2 py-1.5 text-sm"></select>
      <div id="listA" class="space-y-1 max-h-[500px] overflow-auto"></div>
    </div>
    <div class="border border-white/10 rounded-xl p-4">
      <select id="teamB" class="w-full mb-3 bg-black/50 border border-white/10 rounded px-2 py-1.5 text-sm"></select>
      <div id="listB" class="space-y-1 max-h-[500px] overflow-auto"></div>
    </div>
  </div>
</main>

<script>
const LEAGUE='1313454100225990656';
const VAL='https://docs.google.com/spreadsheets/d/e/2PACX-1vRqxhqyuKK6vu_EoYta5FZ_KdOB8M54Q_qBwJKOUF5KcgbTt2dmHn_FuLj9d-FS8-ta5T0zkU0QEGcN/pub?gid=4113168&single=true&output=csv';
const PPG='https://docs.google.com/spreadsheets/d/e/2PACX-1vRqxhqyuKK6vu_EoYta5FZ_KdOB8M54Q_qBwJKOUF5KcgbTt2dmHn_FuLj9d-FS8-ta5T0zkU0QEGcN/pub?gid=118408869&single=true&output=csv';

let S={}, rosters={A:[],B:[]}, trade={A:[],B:[]};

async function init(){
  const [lg,us,ro,pl,v,p]=await Promise.all([
    fetch(`https://api.sleeper.app/v1/league/${LEAGUE}`).then(r=>r.json()),
    fetch(`https://api.sleeper.app/v1/league/${LEAGUE}/users`).then(r=>r.json()),
    fetch(`https://api.sleeper.app/v1/league/${LEAGUE}/rosters`).then(r=>r.json()),
    fetch('https://api.sleeper.app/v1/players/nfl').then(r=>r.json()),
    fetch(VAL).then(r=>r.text()), fetch(PPG).then(r=>r.text())
  ]);
  S={users:us,rosters:ro,players:pl,vals:new Map(),ppg:new Map()};
  const sf=lg.roster_positions.includes('SUPER_FLEX');
  Papa.parse(v,{header:true}).data.forEach(r=>r.sleeper_id&&S.vals.set(r.sleeper_id,parseFloat(sf?r.val_sf_ppr_tep05:r.val_1qb_ppr_tep05)||0));
  Papa.parse(p,{header:true}).data.forEach(r=>r.Player&&S.ppg.set(r.Player.toLowerCase(),parseFloat(r['Avg_PPR_0.5_TEP'])||0));

  const a=teamA,b=teamB; us.forEach(u=>{const r=ro.find(x=>x.owner_id===u.user_id);if(!r)return;const o=document.createElement('option');o.value=r.roster_id;o.textContent=u.metadata?.team_name||u.display_name;a.appendChild(o.cloneNode(true));b.appendChild(o)});
  a.onchange=()=>load('A',+a.value); b.onchange=()=>load('B',+b.value);
  load('A',+a.options[0].value); load('B',+b.options[1].value);
}

function load(side,id){
  const r=S.rosters.find(x=>x.roster_id===id);
  rosters[side]=r.players.map(pid=>{const p=S.players[pid]||{};const n=`${p.first_name||''} ${p.last_name||''}`.trim();return{id:pid,n,pos:p.position,age:p.age||0,val:S.vals.get(pid)||0,ppg:S.ppg.get(n.toLowerCase())||0}}).filter(x=>x.n).sort((a,b)=>b.val-a.val);
  trade[side]=[];
  render(side); update();
}

function render(side){
  document.getElementById('list'+side).innerHTML = rosters[side].map(p=>{
    const sel=trade[side].some(x=>x.id===p.id);
    return `<div class="player ${sel?'selected':''} flex justify-between items-center p-2 rounded border border-white/10 hover:bg-white/5 cursor-pointer" onclick="toggle('${side}','${p.id}')">
      <span class="text-sm">${p.pos} ${p.n} <span class="text-xs opacity-50">${p.age}</span></span>
      <span class="font-mono text-xs">${Math.round(p.val).toLocaleString()}</span>
    </div>`
  }).join('');
}

function toggle(side,id){
  const p=rosters[side].find(x=>x.id===id);
  const i=trade[side].findIndex(x=>x.id===id);
  if(i>=0) trade[side].splice(i,1); else trade[side].push(p);
  render(side); update();
}

function update(){
  ['A','B'].forEach(side=>{
    const t=trade[side];
    document.getElementById('count'+side).textContent=`(${t.length})`;
    document.getElementById('trade'+side).innerHTML = t.map(p=>`<span class="px-2 py-1 bg-white/10 rounded text-xs">${p.pos} ${p.n} ✕</span>`).join('') || '<span class="text-xs opacity-40">No players</span>';

    if(t.length){
      const val=t.reduce((s,p)=>s+(p.val||p.ppg*50),0);
      const age=t.reduce((s,p)=>s+p.age,0)/t.length;
      const ppg=t.reduce((s,p)=>s+p.ppg,0);
      const long=t.reduce((s,p)=>s+(1-Math.abs(p.age-26)*0.04),0)/t.length*100;
      document.getElementById('stats'+side).innerHTML = `
        <div class="grid grid-cols-2 gap-x-4">
          <div>Value: <span class="font-mono">${Math.round(val).toLocaleString()}</span></div>
          <div>Opt PPG: <span class="font-mono">${ppg.toFixed(1)}</span></div>
          <div>Productivity: <span class="font-mono">${ppg.toFixed(1)}</span></div>
          <div>Longevity: <span class="font-mono">${long.toFixed(0)}%</span></div>
          <div>Age: <span class="font-mono">${age.toFixed(1)}</span></div>
        </div>`;
    } else {
      document.getElementById('stats'+side).innerHTML = '<span class="opacity-50">Click players below</span>';
    }
  });

  const vA=trade.A.reduce((s,p)=>s+(p.val||p.ppg*50),0);
  const vB=trade.B.reduce((s,p)=>s+(p.val||p.ppg*50),0);
  if(vA||vB){
    const diff=vA-vB; const fair=100-Math.min(100,Math.abs(diff)/Math.max(vA,vB)*100);
    document.getElementById('fair').textContent = Math.abs(diff)<100?'Even':diff>0?`A +${Math.round(diff)}`:`B +${Math.round(-diff)}`;
    document.getElementById('bar').style.width = fair+'%';
  }
}

window.toggle=toggle;
init();
</script>
</body>
</html>
