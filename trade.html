<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Pick Debug</title><script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script><style>body{background:#000;color:#0f0;font-family:monospace;padding:20px}table{border-collapse:collapse;margin:20px 0}td,th{border:1px solid #333;padding:4px 8px}th{background:#111}</style></head>
<body>
<h2>DEBUG — Picks Only</h2>
<div id="out"></div>
<script>
const L='1313454100225990656';
const K='https://docs.google.com/spreadsheets/d/e/2PACX-1vRqxhqyuKK6vu_EoYta5FZ_KdOB8M54Q_qBwJKOUF5KcgbTt2dmHn_FuLj9d-FS8-ta5T0zkU0QEGcN/pub?gid=972793131&single=true&output=csv';
const P='https://docs.google.com/spreadsheets/d/e/2PACX-1vRqxhqyuKK6vu_EoYta5FZ_KdOB8M54Q_qBwJKOUF5KcgbTt2dmHn_FuLj9d-FS8-ta5T0zkU0QEGcN/pub?gid=118408869&single=true&output=csv';

(async()=>{
 const [lg,ro,tr,pk,ppg]=await Promise.all([fetch(`https://api.sleeper.app/v1/league/${L}`).then(r=>r.json()),fetch(`https://api.sleeper.app/v1/league/${L}/rosters`).then(r=>r.json()),fetch(`https://api.sleeper.app/v1/league/${L}/traded_picks`).then(r=>r.json()),fetch(K).then(r=>r.text()),fetch(P).then(r=>r.text())]);
 const slots=lg.roster_positions.filter(x=>!['BN','IR','TAXI'].includes(x));
 const ppgMap=new Map(); Papa.parse(ppg,{header:true}).data.forEach(r=>r.Player&&ppgMap.set(r.Player.toLowerCase().replace(/[^a-z0-9]/g,''),+r['Avg_PPR_0.5_TEP']||0));
 const pl=await fetch('https://api.sleeper.app/v1/players/nfl').then(r=>r.json());
 
 // calc OPT for tier
 const teams=ro.map(r=>{const ps=(r.players||[]).map(id=>{const p=pl[id]||{};const nm=`${p.first_name||''} ${p.last_name||''}`.trim().toLowerCase().replace(/[^a-z0-9]/g,'');return{ppg:ppgMap.get(nm)||0,pos:p.position}});let u=new Set(),o=0;for(const s of slots){let ps=[s];if(s==='FLEX')ps=['RB','WR','TE'];if(s==='SUPER_FLEX')ps=['QB','RB','WR','TE'];const f=ps.filter(x=>!u.has(x.id)&&ps.includes(x.pos)).sort((a,b)=>b.ppg-a.ppg)[0];if(f){o+=f.ppg;u.add(f.id)}}return{rid:r.roster_id,opt:o}});
 const sorted=[...teams].sort((a,b)=>b.opt-a.opt);
 const tier=new Map(sorted.map((x,i,a)=>[x.rid,i<Math.ceil(a.length*0.3)?'late':i<Math.ceil(a.length*0.7)?'mid':'early']));

 const pm=new Map(); Papa.parse(pk,{header:true}).data.forEach(r=>{pm.set(`${r.season}-${r.round}-${(r.slot||'').toLowerCase()}`,+r.sf_value||0)});

 let html='<h3>1. Tier Assignment</h3><table><tr><th>Team</th><th>OPT</th><th>Tier</th></tr>';
 sorted.forEach(t=>{html+=`<tr><td>${t.rid}</td><td>${t.opt.toFixed(1)}</td><td>${tier.get(t.rid)}</td></tr>`});html+='</table>';

 html+='<h3>2. Pick Values from Sheet (2027-29)</h3><table><tr><th>Year-Rd-Slot</th><th>Value</th></tr>';
 [2027,2028,2029].forEach(y=>[1,2,3,4].forEach(rd=>['early','mid','late'].forEach(s=>{html+=`<tr><td>${y}-${rd}-${s}</td><td>${pm.get(`${y}-${rd}-${s}`)||0}</td></tr>`})));html+='</table>';

 html+='<h3>3. Calculated Totals</h3><table><tr><th>RID</th><th>Base (own)</th><th>After Trades</th><th>Vault Should Be</th></tr>';
 const us=await fetch(`https://api.sleeper.app/v1/league/${L}/users`).then(r=>r.json());
 ro.forEach(r=>{let base=0;[2027,2028,2029].forEach(y=>[1,2,3,4].forEach(rd=>{base+=pm.get(`${y}-${rd}-${tier.get(r.roster_id)}`)||0}));let after=base;tr.filter(t=>+t.season>=2027&&+t.season<=2029).forEach(t=>{if(+t.roster_id===r.roster_id)after-=pm.get(`${t.season}-${t.round}-${tier.get(r.roster_id)}`)||0;if(+t.owner_id===r.roster_id)after+=pm.get(`${t.season}-${t.round}-${tier.get(+t.roster_id)}`)||0});const name=us.find(u=>u.user_id===r.owner_id)?.metadata?.team_name||r.roster_id;const vault={'1':4611,'2':5014,'3':5246,'4':8351,'5':8351,'6':15490,'7':8351,'8':14971,'9':8351,'10':14971}[r.roster_id]||0;html+=`<tr><td>${name} (${r.roster_id})</td><td>${base}</td><td>${after}</td><td>${vault}</td></tr>`});
 html+='</table>';
 document.getElementById('out').innerHTML=html;
})();
</script>
</body>
</html>
