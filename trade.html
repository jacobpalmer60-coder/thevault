<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Dynasty Trade Calculator</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
body{font-family:'Outfit',system-ui;background:#020617;color:#e2e8f0}
.mono{font-family:'JetBrains Mono',monospace}
.player-row{cursor:pointer;border:1px solid transparent}
.player-row:hover{background:rgba(255,255,255,.04)}
.player-row.selected{background:rgba(245,158,11,.12);border-color:rgba(245,158,11,.4)}
.badge{font-size:10px;padding:2px 6px;border-radius:6px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1)}
.badge-pick{background:rgba(168,85,247,.15);border-color:rgba(168,85,247,.3);color:#e9d5ff}
.grid-4{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:1rem}
@media(max-width:1400px){.grid-4{grid-template-columns:repeat(4,minmax(320px,1fr));overflow-x:auto}}
.table-head{font-size:10px;text-transform:uppercase;color:#64748b}
.role-starter{color:#22c55e}
.role-depth{color:#94a3b8}
</style>
</head>
<body class="min-h-screen">
<header class="sticky top-0 z-40 border-b border-white/10 bg-slate-950/80 backdrop-blur">
  <div class="max-w- mx-auto px-4 h-14 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-amber-400 to-yellow-600"></div>
      <div class="font-semibold">Dynasty Trade Calculator</div>
      <span id="league-name" class="ml-3 text-xs text-slate-400 mono hidden sm:inline"></span>
      <span id="scoring-name" class="ml-3 text-xs text-amber-300 mono hidden sm:inline"></span>
    </div>
    <div class="flex items-center gap-2">
      <button id="swap-btn" class="px-3 py-2 rounded-lg bg-white/5 hover:bg-white/10 border border-white/10 text-sm">Swap</button>
      <button id="reset-btn" class="px-3 py-2 rounded-lg bg-white/5 hover:bg-white/10 border border-white/10 text-sm">Reset</button>
    </div>
  </div>
</header>

<main class="max-w- mx-auto px-4 py-3">
  <div id="status" class="mb-3 text-xs text-slate-400"><span id="status-text">Loading…</span></div>

  <div class="grid grid-cols-3 gap-4 mb-4">
    <div class="bg-slate-900/60 border border-white/10 rounded-xl p-3">
      <div class="text- uppercase text-slate-500">Team A Sends</div>
      <div id="send-a" class="text-xl font-semibold mono">0</div>
      <div class="text-xs text-slate-400"><span id="count-a">0</span> assets</div>
    </div>
    <div class="bg-slate-900/60 border border-amber-500/20 rounded-xl p-3">
      <div class="text- uppercase text-amber-300">Fairness</div>
      <div id="fairness-label" class="text-lg font-semibold mono">Even</div>
      <div class="mt-2 text- text-slate-500 leading-tight">
        ±0-100 Even • 101-500 Win • 500+ Win Big
      </div>
    </div>
    <div class="bg-slate-900/60 border border-white/10 rounded-xl p-3 text-right">
      <div class="text- uppercase text-slate-500">Team B Sends</div>
      <div id="send-b" class="text-xl font-semibold mono">0</div>
      <div class="text-xs text-slate-400"><span id="count-b">0</span> assets</div>
    </div>
  </div>

  <div class="grid-4">
    <section class="bg-slate-900/60 border border-white/10 rounded-2xl flex flex-col h-">
      <div class="p-3 border-b border-white/10 bg-amber-500/10">
        <div class="flex items-center justify-between gap-2">
          <h2 class="font-semibold text-amber-300 text-sm">Team A</h2>
          <select id="team-a-select" class="bg-slate-900 border border-white/10 rounded-lg px-3 py-2 text-sm w-56"></select>
        </div>
      <div class="flex-1 overflow-y-auto p-2">
        <div class="text- uppercase text-slate-500 px-1 mb-1">Picks</div>
        <div id="picks-a" class="space-y-1 mb-3"></div>
        <div class="text- uppercase text-slate-500 px-1 mb-1">Players</div>
        <div id="roster-a" class="space-y-1"></div>
      </div>
    </section>

    <section class="bg-slate-900/60 border border-white/10 rounded-2xl flex flex-col h-">
      <div class="p-3 border-b border-white/10 bg-amber-500/10"><h2 class="font-semibold text-amber-300 text-sm">Impact A — What You Get</h2></div>
      <div id="impact-a" class="flex-1 overflow-y-auto p-3"></div>
    </section>

    <section class="bg-slate-900/60 border border-white/10 rounded-2xl flex flex-col h-">
      <div class="p-3 border-b border-white/10 bg-amber-500/10"><h2 class="font-semibold text-amber-300 text-sm">Impact B — What You Get</h2></div>
      <div id="impact-b" class="flex-1 overflow-y-auto p-3"></div>
    </section>

    <section class="bg-slate-900/60 border border-white/10 rounded-2xl flex flex-col h-">
      <div class="p-3 border-b border-white/10 bg-amber-500/10">
        <div class="flex items-center justify-between gap-2">
          <h2 class="font-semibold text-amber-300 text-sm">Team B</h2>
          <select id="team-b-select" class="bg-slate-900 border border-white/10 rounded-lg px-3 py-2 text-sm w-56"></select>
        </div>
      </div>
      <div class="flex-1 overflow-y-auto p-2">
        <div class="text- uppercase text-slate-500 px-1 mb-1">Picks</div>
        <div id="picks-b" class="space-y-1 mb-3"></div>
        <div class="text- uppercase text-slate-500 px-1 mb-1">Players</div>
        <div id="roster-b" class="space-y-1"></div>
      </div>
    </section>
  </div>
</main>

<script>
(() => {
  const DEFAULT_LEAGUE = '1313454100225990656';
  const params = new URLSearchParams(location.search);
  const league_id = params.get('league_id') || DEFAULT_LEAGUE;

  const CSV_URLS = {
    audit: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRqxhqyuKK6vu_EoYta5FZ_KdOB8M54Q_qBwJKOUF5KcgbTt2dmHn_FuLj9d-FS8-ta5T0zkU0QEGcN/pub?gid=0&single=true&output=csv',
    sleeper: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRqxhqyuKK6vu_EoYta5FZ_KdOB8M54Q_qBwJKOUF5KcgbTt2dmHn_FuLj9d-FS8-ta5T0zkU0QEGcN/pub?gid=1866730819&single=true&output=csv',
    fp: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRqxhqyuKK6vu_EoYta5FZ_KdOB8M54Q_qBwJKOUF5KcgbTt2dmHn_FuLj9d-FS8-ta5T0zkU0QEGcN/pub?gid=2012227164&single=true&output=csv',
    ra: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRqxhqyuKK6vu_EoYta5FZ_KdOB8M54Q_qBwJKOUF5KcgbTt2dmHn_FuLj9d-FS8-ta5T0zkU0QEGcN/pub?gid=1226234680&single=true&output=csv'
  };

  const state = {
    league:null, users:[], rosters:[], players:{},
    ppg:new Map(), auditValues:new Map(),
    pickValues:new Map(), pickInventory:new Map(),
    teamSlots:new Map(), teamA:null, teamB:null,
    selectedA:new Set(), selectedB:new Set(),
    tradedPicks:[],
    scoringKey:'PPR'
  };

  const $ = s => document.querySelector(s);
  const fmt = n => Math.round(n).toLocaleString();
  const fmt1 = n => (Math.round(n*10)/10).toFixed(1);
  const setStatus = t => { const el=$('#status-text'); if(el) el.textContent=t; };
  const teamName = r => {
    const u = state.users.find(x=>x.user_id===r.owner_id);
    return u?.metadata?.team_name || u?.display_name || `Team ${r.roster_id}`;
  };
  const ordinal = n => { const s=['th','st','nd','rd']; const v=n%100; return n+(s[(v-20)%10]||s[v]||s[0]); };
  const norm = s => String(s||'').toLowerCase().replace(/\./g,'').replace(/[^a-z0-9]+/g,' ').trim();

  async function fetchJSON(url){ const r=await fetch(url); return r.json(); }
  async function fetchText(url){ const r=await fetch(url); return r.text(); }

  function parseCSV(text){
    const lines = text.trim().split(/\r?\n/);
    const headers = lines[0].split(',').map(h=>h.trim());
    return lines.slice(1).map(line=>{
      const cols = line.split(',');
      const obj = {};
      headers.forEach((h,i)=> obj[h]=cols[i]?.trim());
      return obj;
    });
  }
  function toNum(v){ if(v==null||v==='')return NaN; const n=Number(v); return Number.isFinite(n)?n:NaN; }

  async function loadAuditValues(){
    const txt = await fetchText(CSV_URLS.audit);
    const rows = parseCSV(txt);
    const headers = Object.keys(rows[0]||{});
    const playerCol = headers.find(h=>/player/i.test(h)) || 'Player';
    const valueCol = headers.find(h=>/value/i.test(h)) || 'Value';
    state.auditValues.clear();
    rows.forEach(r=>{
      const name = r[playerCol];
      const val = toNum(r[valueCol]);
      if(name && Number.isFinite(val)){
        state.auditValues.set(norm(name), val);
      }
    });
  }

  function buildSourceMap(rows){
    const map=new Map();
    rows.forEach(r=>{
      const name=r.Player||r.player; if(!name) return;
      const pos=(r.Position||'').toUpperCase();
      const rec={name,pos};
      ['Std','Std 0.5 TEP','Std TEP','Half','Half 0.5 TEP','Half TEP','PPR','PPR 0.5 TEP','PPR TEP'].forEach(c=>{
        let v=toNum(r[c]);
        if(!Number.isFinite(v)&&c.includes('0.5 TEP')){
          const base=c.replace(' 0.5 TEP',''); const full=base+' TEP';
          const b=toNum(r[base]), f=toNum(r[full]);
          if(Number.isFinite(b)&&Number.isFinite(f)) v=(b+f)/2;
          else if(Number.isFinite(b)) v=pos==='TE'?b+0.5:b;
        }
        rec[c]=v;
      });
      map.set(norm(name),rec);
    });
    return map;
  }

  async function loadPPG(){
    setStatus('Loading projections…');
    const [sTxt,fTxt,rTxt]=await Promise.all([fetchText(CSV_URLS.sleeper),fetchText(CSV_URLS.fp),fetchText(CSV_URLS.ra)]);
    const sMap=buildSourceMap(parseCSV(sTxt));
    const fMap=buildSourceMap(parseCSV(fTxt));
    const rMap=buildSourceMap(parseCSV(rTxt));
    const keys=new Set([...sMap.keys(),...fMap.keys(),...rMap.keys()]);
    const comboKeys=['Std','Std 0.5 TEP','Std TEP','Half','Half 0.5 TEP','Half TEP','PPR','PPR 0.5 TEP','PPR TEP'];
    const consensus=new Map();
    keys.forEach(k=>{
      const s=sMap.get(k)||{}, f=fMap.get(k)||{}, r=rMap.get(k)||{};
      const out={name:s.name||f.name||r.name,pos:s.pos||f.pos||r.pos};
      comboKeys.forEach(c=>{
        const vals=[s[c],f[c],r[c]].filter(Number.isFinite);
        out[c]=vals.length?vals.reduce((a,b)=>a+b,0)/vals.length:NaN;
      });
      consensus.set(k,out);
    });
    const nameToId=new Map();
    Object.entries(state.players).forEach(([id,p])=>{
      const full=norm(p.full_name||`${p.first_name||''} ${p.last_name||''}`);
      if(full) nameToId.set(full,id);
    });
    const rec=state.league.scoring_settings?.rec||0;
    const bonusTe=state.league.scoring_settings?.bonus_rec_te||0;
    const recLabel=rec>=1?'PPR':rec>=0.5?'Half':'Std';
    const tepLabel=bonusTe>=1?' TEP':bonusTe>=0.5?' 0.5 TEP':'';
    state.scoringKey=(recLabel+tepLabel).trim();
    $('#scoring-name').textContent=state.scoringKey;
    state.ppg.clear();
    consensus.forEach((c,k)=>{
      const pid=nameToId.get(k); if(!pid) return;
      const ppg=c[state.scoringKey];
