<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Dynasty Trade Calculator</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root { color-scheme: dark; }
  * { font-family: 'Inter', system-ui, -apple-system, sans-serif; }
  .mono { font-family: 'JetBrains Mono', monospace; }
  .scroll-thin::-webkit-scrollbar { width:6px; height:6px }
  .scroll-thin::-webkit-scrollbar-thumb { background:#2a2a2e; border-radius:3px }
  .scroll-thin::-webkit-scrollbar-track { background:#0a0a0b }
</style>
</head>
<body class="bg-[#0a0a0b] text-zinc-200 min-h-screen antialiased">
  <!-- Top Nav -->
  <nav class="sticky top-0 z-40 bg-[#0f0f10] border-b border-[#222]">
    <div class="max-w-[1600px] mx-auto px-6 py-3 flex items-center justify-between">
      <div class="text-xl font-bold text-amber-400 tracking-tight">Dynasty Trade Calculator</div>
      <div class="flex items-center gap-6 text-sm">
        <a id="nav-values" href="#" class="text-zinc-400 hover:text-zinc-200 transition">Values</a>
        <a id="nav-league" href="#" class="text-zinc-400 hover:text-zinc-200 transition">League</a>
        <a href="https://rosteraudit.com" target="_blank" rel="noopener" class="text-zinc-400 hover:text-zinc-200 transition">RosterAudit</a>
      </div>
    </div>
  </nav>

  <main class="max-w-[1600px] mx-auto px-6 py-6">
    <div class="grid grid-cols-1 lg:grid-cols-[1fr_460px_1fr] gap-6 items-start">
      <!-- Team A -->
      <section id="panel-a" class="lg:sticky lg:top-[68px]"></section>

      <!-- Center -->
      <section id="panel-center" class="min-w-0"></section>

      <!-- Team B -->
      <section id="panel-b" class="lg:sticky lg:top-[68px]"></section>
    </div>
  </main>

<script>
(() => {
  const state = {
    loading: false,
    leagueId: new URLSearchParams(location.search).get('league_id') || '',
    users: [],
    rosters: [],
    players: {}, // id -> data
    values: {}, // id -> value
    teamA: { rosterId: null, selected: new Set() },
    teamB: { rosterId: null, selected: new Set() },
    accordionA: {},
    accordionB: {}
  };

  // Utils
  const $ = s => document.querySelector(s);
  const initials = name => name.split(' ').map(p=>p[0]).slice(0,2).join('').toUpperCase();
  const fmt = n => n ? n.toLocaleString() : '—';
  const fmt1 = n => n ? n.toFixed(1) : '—';
  const sum = arr => arr.reduce((a,b)=>a+b,0);
  const avg = arr => arr.length ? sum(arr)/arr.length : 0;

  // Nav links preserve league_id
  function updateNav() {
    const params = state.leagueId ? `?league_id=${state.leagueId}` : '';
    $('#nav-values').href = 'values.html' + params;
    $('#nav-league').href = 'league.html' + params;
  }

  // Mock Data Generator
  function generateMock() {
    const names = {
      QB: ['Patrick Mahomes','Josh Allen','Jalen Hurts','Joe Burrow','Lamar Jackson','Justin Herbert','C.J. Stroud','Jordan Love','Dak Prescott','Brock Purdy','Kyler Murray','Tua Tagovailoa'],
      RB: ['Bijan Robinson','Breece Hall','Jahmyr Gibbs','Christian McCaffrey','Saquon Barkley','Jonathan Taylor','De\'Von Achane','Kyren Williams','Isiah Pacheco','Kenneth Walker','James Cook','Jahmyr Gibbs'],
      WR: ['Justin Jefferson','Ja\'Marr Chase','CeeDee Lamb','Amon-Ra St. Brown','Puka Nacua','Garrett Wilson','Malik Nabers','Marvin Harrison Jr','Drake London','AJ Brown','Nico Collins','DK Metcalf'],
      TE: ['Sam LaPorta','Trey McBride','Dalton Kincaid','Mark Andrews','Travis Kelce','T.J. Hockenson','Kyle Pitts','Evan Engram','David Njoku','George Kittle','Jake Ferguson','Brock Bowers']
    };
    const teams = ['KC','BUF','PHI','CIN','BAL','LAC','HOU','GB','DAL','SF','ARI','MIA','DET','NYJ','ATL','CAR'];
    let pid = 1000;
    const players = {};
    const values = {};
    Object.entries(names).forEach(([pos,list])=>{
      list.forEach((n,i)=>{
        const id = ''+pid++;
        const age = 22 + Math.floor(Math.random()*8);
        const ppg = pos==='QB'? 18+Math.random()*8 : pos==='RB'? 10+Math.random()*10 : pos==='WR'? 11+Math.random()*9 : 8+Math.random()*6;
        const val = Math.round((ppg*400 + (30-age)*80 + Math.random()*500));
        players[id] = { player_id:id, full_name:n, position:pos, team:teams[Math.floor(Math.random()*teams.length)], age, ppg };
        values[id] = val;
      });
    });
    // Picks
    for(let y=2025;y<=2027;y++){
      ['early','mid','late'].forEach(t=>{
        const id = `PICK_${y}_${t}`;
        players[id] = { player_id:id, full_name:`${y} ${t} 1st`, position:'PICK', team:'—', age:null, ppg:0 };
        values[id] = t==='early'? 5000 : t==='mid'? 3500 : 2200;
      });
    }
    const users = Array.from({length:12},(_,i)=>({user_id:'u'+i, display_name:['Alpha','Bravo','Charlie','Delta','Echo','Foxtrot','Golf','Hotel','India','Juliet','Kilo','Lima'][i], metadata:{team_name:`Team ${String.fromCharCode(65+i)}`}}));
    const rosters = users.map((u,i)=>{
      const roster_players = [];
      ['QB','RB','WR','TE'].forEach(pos=>{
        const pool = Object.values(players).filter(p=>p.position===pos);
        for(let k=0;k<(pos==='QB'?4:pos==='RB'?6:pos==='WR'?8:4);k++){
          const p = pool[(i*7+k)%pool.length];
          roster_players.push(p.player_id);
        }
      });
      // add picks
      roster_players.push(`PICK_2025_${['early','mid','late'][i%3]}`);
      roster_players.push(`PICK_2026_${['early','mid','late'][(i+1)%3]}`);
      return { roster_id:i+1, owner_id:u.user_id, players:roster_players };
    });
    state.users = users;
    state.rosters = rosters;
    state.players = players;
    state.values = values;
    state.teamA.rosterId = 1;
    state.teamB.rosterId = 2;
  }

  // Data Loading
  async function loadData() {
    if(state.loading) return;
    state.loading = true;
    updateNav();
    try {
      if(state.leagueId) {
        const [league, users, rosters] = await Promise.all([
          fetch(`https://api.sleeper.app/v1/league/${state.leagueId}`).then(r=>r.json()),
          fetch(`https://api.sleeper.app/v1/league/${state.leagueId}/users`).then(r=>r.json()),
          fetch(`https://api.sleeper.app/v1/league/${state.leagueId}/rosters`).then(r=>r.json())
        ]);
        const players = await fetch(`https://api.sleeper.app/v1/players/nfl`).then(r=>r.json()).catch(()=>({}));
        // Values CSV fallback mock
        const values = {};
        Object.keys(players).slice(0,2000).forEach(id=>{
          const p = players[id];
          if(p && p.position) values[id] = Math.round((p.age? (30-(p.age||25))*50:0)+ Math.random()*3000+500);
        });
        state.users = users;
        state.rosters = rosters;
        state.players = players;
        state.values = values;
        state.teamA.rosterId = rosters[0]?.roster_id;
        state.teamB.rosterId = rosters[1]?.roster_id;
      } else {
        generateMock();
      }
    } catch(e) {
      console.error(e);
      generateMock();
    } finally {
      state.loading = false;
      renderAll();
    }
  }

  // Rendering
  function renderAll() {
    renderTeam('A');
    renderTeam('B');
    renderCenter();
  }

  function getRoster(rosterId) {
    return state.rosters.find(r=>r.roster_id===rosterId);
  }
  function getUserByRoster(rosterId) {
    const r = getRoster(rosterId);
    return state.users.find(u=>u.user_id===r?.owner_id);
  }
  function getPlayersForRoster(rosterId) {
    const r = getRoster(rosterId);
    if(!r) return [];
    return r.players.map(pid => state.players[pid]).filter(Boolean);
  }
  function getValue(pid) { return state.values[pid] || 0; }
  function getPPG(p){ return p?.ppg || 0; }

  function renderTeam(side) {
    const isA = side==='A';
    const team = isA ? state.teamA : state.teamB;
    const panel = isA ? $('#panel-a') : $('#panel-b');
    const rosterId = team.rosterId;
    const roster = getRoster(rosterId);
    const user = getUserByRoster(rosterId);
    const players = getPlayersForRoster(rosterId);
    const selected = team.selected;
    const valueOut = sum([...selected].map(pid=>getValue(pid)));
    const positions = ['QB','RB','WR','TE','PICK'];
    const posGroups = Object.fromEntries(positions.map(p=>[p, []]));
    players.forEach(p=>{ if(posGroups[p.position]) posGroups[p.position].push(p); else posGroups[p.position]=[p]; });
    positions.forEach(p=>posGroups[p].sort((a,b)=> getValue(b.player_id)-getValue(a.player_id)));

    const assetCount = players.length;
    const teamOptions = state.rosters.map(r=>{
      const u = getUserByRoster(r.roster_id);
      const name = u?.metadata?.team_name || u?.display_name || `Team ${r.roster_id}`;
      return `<option value="${r.roster_id}" ${r.roster_id===rosterId?'selected':''}>${name}</option>`;
    }).join('');

    // Assets chips
    const chips = [...selected].map(pid=>{
      const p = state.players[pid];
      if(!p) return '';
      return `<button data-remove="${pid}" data-side="${side}" class="group flex items-center gap-1.5 pl-2 pr-1.5 py-1 rounded-full bg-amber-500/10 border border-amber-500/20 hover:bg-amber-500/20 transition">
        <span class="text-xs font-medium text-amber-300">${p.full_name}</span>
        <span class="w-4 h-4 rounded-full bg-amber-500/20 group-hover:bg-amber-500/30 flex items-center justify-center text-[10px] text-amber-200">✕</span>
      </button>`;
    }).join('');

    panel.innerHTML = `
    <div class="bg-[#111113] border border-[#222] rounded-xl p-4">
      <div class="flex items-start justify-between gap-4">
        <div class="w-10 h-10 rounded-lg bg-amber-400 text-black font-bold flex items-center justify-center text-lg">${side}</div>
        <div class="flex-1 min-w-0">
          <div class="text-[11px] tracking-widest text-zinc-500">TEAM ${side} • GIVING</div>
          <select data-side="${side}" class="team-select mt-1 w-full bg-[#0a0a0b] border border-[#222] rounded-md px-2 py-2 text-sm text-zinc-200 focus:outline-none focus:ring-1 focus:ring-amber-400">${teamOptions}</select>
        </div>
        <div class="text-right">
          <div class="text-[11px] tracking-widest text-zinc-500">VALUE OUT</div>
          <div class="text-amber-400 font-semibold text-xl mono">${fmt(valueOut)}</div>
        </div>
      </div>

      <div class="mt-4">
        <div class="text-[11px] tracking-widest text-zinc-500 mb-2">TRADE ASSETS</div>
        <div class="min-h-[64px] border border-dashed border-[#2a2a2e] rounded-lg p-3 flex flex-wrap gap-2 items-start bg-[#0a0a0b]">
          ${chips || `<span class="text-zinc-600 text-sm">No assets selected</span>`}
        </div>
      </div>

      <div class="mt-5">
        <div class="flex items-center justify-between">
          <div class="text-[11px] tracking-widest text-zinc-500">ROSTER • CLICK TO ADD</div>
          <span class="text-[11px] px-2 py-0.5 rounded-full bg-[#1e1e20] text-zinc-400 mono">${assetCount} assets</span>
        </div>
        <div class="mt-2 space-y-2">
          ${positions.map(pos=>{
            const list = posGroups[pos]||[];
            const isOpen = (isA?state.accordionA:state.accordionB)[pos];
            return `
            <div class="border border-[#222] rounded-lg overflow-hidden bg-[#0f0f10]">
              <button data-acc="${pos}" data-side="${side}" class="w-full flex items-center justify-between px-3 py-2.5 hover:bg-[#141416] transition">
                <div class="flex items-center gap-3">
                  <span class="text-[11px] font-semibold px-1.5 py-0.5 rounded bg-[#1e1e20] text-zinc-300 w-10 text-center">${pos}</span>
                  <span class="text-xs text-zinc-500">${list.length} players</span>
                </div>
                <svg class="w-4 h-4 text-zinc-600 transition-transform ${isOpen?'rotate-180':''}" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M6 9l6 6 6-6"/></svg>
              </button>
              <div class="${isOpen?'block':'hidden'} border-t border-[#222] max-h-60 overflow-y-auto scroll-thin">
                ${list.map(p=>{
                  const sel = selected.has(p.player_id);
                  return `
                  <div data-pid="${p.player_id}" data-side="${side}" class="player-row flex items-center gap-3 px-3 py-2 cursor-pointer border-l-2 ${sel?'border-amber-400 bg-[#1a1610]':'border-transparent hover:bg-[#141416]'}">
                    <div class="w-8 h-8 rounded-full bg-[#1e1e20] flex items-center justify-center text-[11px] font-semibold text-zinc-300">${initials(p.full_name)}</div>
                    <div class="flex-1 min-w-0">
                      <div class="text-sm text-zinc-200 truncate leading-tight">${p.full_name}</div>
                      <div class="text-[11px] text-zinc-500">${p.team} • ${p.age??'—'}</div>
                    </div>
                    <div class="text-right">
                      <div class="text-xs font-medium text-zinc-200 mono">${fmt(getValue(p.player_id))}</div>
                      <div class="text-[10px] text-zinc-500 mono">${fmt1(getPPG(p))} ppg</div>
                    </div>
                  </div>`;
                }).join('')}
              </div>
            </div>`;
          }).join('')}
        </div>
      </div>
    </div>`;
  }

  function renderCenter() {
    const panel = $('#panel-center');
    const aSel = [...state.teamA.selected].map(id=>state.players[id]).filter(Boolean);
    const bSel = [...state.teamB.selected].map(id=>state.players[id]).filter(Boolean);
    const aValOut = sum(aSel.map(p=>getValue(p.player_id)));
    const bValOut = sum(bSel.map(p=>getValue(p.player_id)));
    const aValIn = bValOut;
    const bValIn = aValOut;
    const aNet = aValIn - aValOut;
    const bNet = bValIn - bValOut;
    const avgVal = (aValOut + bValOut)/2 || 1;
    const pctDiff = Math.abs(aValOut - bValOut) / avgVal * 100;

    // PPG
    const aPPGOut = sum(aSel.map(p=>getPPG(p)));
    const bPPGOut = sum(bSel.map(p=>getPPG(p)));
    const aPPGIn = bPPGOut;
    const bPPGIn = aPPGOut;
    const aPPGDelta = aPPGIn - aPPGOut;
    const bPPGDelta = bPPGIn - bPPGOut;

    // Age
    const aAgeOut = avg(aSel.filter(p=>p.age).map(p=>p.age));
    const bAgeOut = avg(bSel.filter(p=>p.age).map(p=>p.age));
    const aAgeIn = bAgeOut;
    const bAgeIn = aAgeOut;

    // Fairness tier
    let tier = 'Fair', tierColor='bg-emerald-500/10 text-emerald-300 border-emerald-500/20';
    let winner = null;
    if(pctDiff >=20) { tier='Smash'; tierColor='bg-red-500/10 text-red-300 border-red-500/20'; winner = aNet > 0 ? 'A' : 'B'; }
    else if(pctDiff >=10) { tier='Win'; tierColor='bg-orange-500/10 text-orange-300 border-orange-500/20'; winner = aNet > 0 ? 'A' : 'B'; }
    else if(pctDiff >=5) { tier='Slight Edge'; tierColor='bg-amber-500/10 text-amber-300 border-amber-500/20'; winner = aNet > 0 ? 'A' : 'B'; }

    const verdict = !aSel.length && !bSel.length ? 'Select assets to evaluate' :
      tier==='Fair' ? 'Fair Trade' : `${tier} to Team ${winner}`;

    // Conflict warning
    const valueWinner = aNet > 0 ? 'A' : aNet < 0 ? 'B' : null;
    const ppgWinner = aPPGDelta > 0 ? 'A' : aPPGDelta < 0 ? 'B' : null;
    const conflict = valueWinner && ppgWinner && valueWinner !== ppgWinner;

    // Optimal starters
    const rosterSettings = { QB:1, RB:2, WR:3, TE:1, FLEX:2, SF:1 };
    function getOptimal(players) {
      const pool = [...players].sort((a,b)=>getPPG(b)-getPPG(a));
      const used = new Set();
      const slots = [];
      const take = (pos,cnt,eligible=null)=>{
        const cand = pool.filter(p=>!used.has(p.player_id) && (eligible? eligible.includes(p.position): p.position===pos));
        for(let i=0;i<cnt && i<cand.length;i++){
          used.add(cand[i].player_id);
          slots.push({slot:pos, player:cand[i]});
        }
      };
      take('QB', rosterSettings.QB);
      take('RB', rosterSettings.RB);
      take('WR', rosterSettings.WR);
      take('TE', rosterSettings.TE);
      take('FLEX', rosterSettings.FLEX, ['RB','WR','TE']);
      take('SF', rosterSettings.SF, ['QB','RB','WR','TE']);
      return slots;
    }
    const aRosterBefore = getPlayersForRoster(state.teamA.rosterId);
    const bRosterBefore = getPlayersForRoster(state.teamB.rosterId);
    const aRosterAfter = [...aRosterBefore.filter(p=>!state.teamA.selected.has(p.player_id)), ...bSel];
    const bRosterAfter = [...bRosterBefore.filter(p=>!state.teamB.selected.has(p.player_id)), ...aSel];
    const aOptBefore = getOptimal(aRosterBefore);
    const aOptAfter = getOptimal(aRosterAfter);
    const bOptBefore = getOptimal(bRosterBefore);
    const bOptAfter = getOptimal(bRosterAfter);
    const aOptPPGBefore = sum(aOptBefore.map(s=>getPPG(s.player)));
    const aOptPPGAfter = sum(aOptAfter.map(s=>getPPG(s.player)));
    const bOptPPGBefore = sum(bOptBefore.map(s=>getPPG(s.player)));
    const bOptPPGAfter = sum(bOptAfter.map(s=>getPPG(s.player)));

    panel.innerHTML = `
    <div class="bg-[#111113] border border-[#222] rounded-xl p-5">
      <div class="flex items-center gap-2">
        <span class="text-[10px] tracking-widest px-2 py-1 rounded-full bg-[#1e1e20] text-zinc-400">TRADE SUMMARY</span>
      </div>
      <h2 class="text-2xl font-semibold mt-3">Fairness Verdict</h2>
      <div class="mt-2 flex items-center gap-3">
        <span class="px-2.5 py-1 rounded-full border text-xs font-medium ${tierColor}">${tier.toUpperCase()}</span>
        <span class="text-zinc-300">${verdict}</span>
      </div>

      ${conflict ? `<div class="mt-4 p-3 rounded-lg border border-amber-500/30 bg-amber-500/10 text-amber-200 text-sm">Warning: Value and PPG analysis conflict. One team wins value, the other wins production.</div>` : ''}

      <div class="grid grid-cols-2 gap-4 mt-5">
        ${['A','B'].map(side=>{
          const isA = side==='A';
          const net = isA ? aNet : bNet;
          const pct = isA && aValOut ? (net/Math.max(1,aValOut)*100) : !isA && bValOut ? (net/Math.max(1,bValOut)*100) : 0;
          const ppgDelta = isA ? aPPGDelta : bPPGDelta;
          const optDelta = isA ? (aOptPPGAfter-aOptPPGBefore) : (bOptPPGAfter-bOptPPGBefore);
          const ageDeltaRoster = 0; // simplified
          return `
          <div class="bg-[#0f0f10] border border-[#222] rounded-lg p-4">
            <div class="text-[11px] tracking-widest text-zinc-500 mb-2">TEAM ${side}</div>
            <div class="space-y-2 text-sm">
              <div class="flex justify-between"><span class="text-zinc-400">Value Δ %</span><span class="mono font-medium ${net>=0?'text-emerald-400':'text-red-400'}">${net>=0?'+':''}${pct.toFixed(1)}%</span></div>
              <div class="flex justify-between"><span class="text-zinc-400">PPG Δ</span><span class="mono ${ppgDelta>=0?'text-emerald-400':'text-red-400'}">${ppgDelta>=0?'+':''}${ppgDelta.toFixed(1)}</span></div>
              <div class="flex justify-between"><span class="text-zinc-400">Opt PPG Δ</span><span class="mono ${optDelta>=0?'text-emerald-400':'text-red-400'}">${optDelta>=0?'+':''}${optDelta.toFixed(1)}</span></div>
              <div class="flex justify-between"><span class="text-zinc-400">Age Δ Roster</span><span class="mono text-zinc-300">—</span></div>
              <div class="flex justify-between"><span class="text-zinc-400">Age Δ Starters</span><span class="mono text-zinc-300">—</span></div>
            </div>
          </div>`;
        }).join('')}
      </div>

      <div class="mt-6 grid grid-cols-2 gap-6">
        <div>
          <div class="text-[11px] tracking-widest text-zinc-500 mb-2">TEAM A IN / OUT</div>
          <div class="bg-[#0f0f10] border border-[#222] rounded-lg p-3 min-h-[120px] text-sm space-y-1">
            <div class="text-zinc-500 text-xs">OUT:</div>
            ${aSel.length? aSel.map(p=>`<div class="text-zinc-300">${p.full_name} <span class="text-zinc-500 mono text-xs">${fmt(getValue(p.player_id))}</span></div>`).join('') : '<div class="text-zinc-600">—</div>'}
            <div class="text-zinc-500 text-xs pt-2 border-t border-[#222] mt-2">IN:</div>
            ${bSel.length? bSel.map(p=>`<div class="text-zinc-300">${p.full_name} <span class="text-zinc-500 mono text-xs">${fmt(getValue(p.player_id))}</span></div>`).join('') : '<div class="text-zinc-600">—</div>'}
          </div>
        </div>
        <div>
          <div class="text-[11px] tracking-widest text-zinc-500 mb-2">TEAM B IN / OUT</div>
          <div class="bg-[#0f0f10] border border-[#222] rounded-lg p-3 min-h-[120px] text-sm space-y-1">
            <div class="text-zinc-500 text-xs">OUT:</div>
            ${bSel.length? bSel.map(p=>`<div class="text-zinc-300">${p.full_name} <span class="text-zinc-500 mono text-xs">${fmt(getValue(p.player_id))}</span></div>`).join('') : '<div class="text-zinc-600">—</div>'}
            <div class="text-zinc-500 text-xs pt-2 border-t border-[#222] mt-2">IN:</div>
            ${aSel.length? aSel.map(p=>`<div class="text-zinc-300">${p.full_name} <span class="text-zinc-500 mono text-xs">${fmt(getValue(p.player_id))}</span></div>`).join('') : '<div class="text-zinc-600">—</div>'}
          </div>
        </div>
      </div>

      <div class="mt-6">
        <div class="text-[11px] tracking-widest text-zinc-500">OPTIMAL STARTERS IMPACT</div>
        <div class="text-xs text-zinc-500 mt-1">QB 1 • RB 2 • WR 3 • TE 1 • FLEX 2 • SF 1</div>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mt-3">
          ${[
            {side:'A', before:aOptBefore, after:aOptAfter},
            {side:'B', before:bOptBefore, after:bOptAfter}
          ].map(block=>{
            const rows = Math.max(block.before.length, block.after.length);
            const lines = [];
            for(let i=0;i<rows;i++){
              const b = block.before[i];
              const a = block.after[i];
              lines.push(`
                <div class="grid grid-cols-[80px_1fr_24px_1fr] items-center gap-2 py-1 text-xs">
                  <span class="text-zinc-500 mono">${b?.slot||''}</span>
                  <span class="text-zinc-300 truncate">${b? b.player.full_name : '—'}</span>
                  <span class="text-zinc-600">→</span>
                  <span class="${a && b && a.player.player_id!==b.player.player_id ? 'text-amber-300' : 'text-zinc-300'} truncate">${a? a.player.full_name : '—'}</span>
                </div>`);
            }
            return `
            <div class="bg-[#0f0f10] border border-[#222] rounded-lg p-3">
              <div class="text-xs font-medium text-zinc-400 mb-2">TEAM ${block.side}</div>
              <div class="divide-y divide-[#1a1a1e]">${lines.join('')}</div>
            </div>`;
          }).join('')}
        </div>
      </div>
    </div>`;
  }

  // Event Delegation
  document.addEventListener('click', e=>{
    const acc = e.target.closest('[data-acc]');
    if(acc){
      const side = acc.dataset.side;
      const pos = acc.dataset.acc;
      const map = side==='A'? state.accordionA : state.accordionB;
      map[pos] = !map[pos];
      renderTeam(side);
      return;
    }
    const row = e.target.closest('.player-row');
    if(row){
      const pid = row.dataset.pid;
      const side = row.dataset.side;
      const set = side==='A'? state.teamA.selected : state.teamB.selected;
      if(set.has(pid)) set.delete(pid); else set.add(pid);
      renderTeam(side);
      renderCenter();
      return;
    }
    const rem = e.target.closest('[data-remove]');
    if(rem){
      const pid = rem.dataset.remove;
      const side = rem.dataset.side;
      const set = side==='A'? state.teamA.selected : state.teamB.selected;
      set.delete(pid);
      renderTeam(side);
      renderCenter();
    }
  });

  document.addEventListener('change', e=>{
    if(e.target.classList.contains('team-select')){
      const side = e.target.dataset.side;
      const rosterId = parseInt(e.target.value,10);
      if(side==='A'){ state.teamA.rosterId = rosterId; state.teamA.selected.clear(); renderTeam('A'); }
      else { state.teamB.rosterId = rosterId; state.teamB.selected.clear(); renderTeam('B'); }
      renderCenter();
    }
  });

  document.addEventListener('DOMContentLoaded', loadData);
})();
</script>
</body>
</html>
