<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>TradeCalc Pro — Select Players</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<style>body{font-family:Outfit,system-ui;background:#050810;color:#fff}:root{color-scheme:dark}.glass{backdrop-filter:blur(16px)}.player{transition:all.15s}.player.selected{background:rgba(139,92,246,.2);border-color:rgba(139,92,246,.5)}</style>
</head>
<body>
<header class="sticky top-0 border-b border-white/10 bg-black/50 glass z-40">
  <div class="max-w-[1400px] mx-auto px-6 h-14 flex items-center justify-between">
    <div class="font-semibold">TradeCalc Pro — Click players to trade</div>
    <button id="reset" class="text-xs px-3 py-1.5 bg-white/5 rounded-lg border border-white/10">Clear Trade</button>
  </div>
</header>

<main class="max-w-[1400px] mx-auto px-6 py-6">
  <!-- Evaluation on top -->
  <section id="analysis" class="mb-6">
    <div class="glass rounded-2xl border border-white/10 p-5">
      <div class="grid md:grid-cols-2 gap-5">
        <div class="bg-violet-500/5 border border-violet-500/20 rounded-xl p-4">
          <div class="flex items-center justify-between mb-3">
            <h3 class="font-medium text-violet-200">Team A Sends</h3>
            <span id="countA" class="text-xs px-2 py-0.5 bg-violet-500/20 rounded">0 players</span>
          </div>
          <div id="statsA" class="space-y-1.5 text-[13px]"></div>
        </div>
        <div class="bg-cyan-500/5 border border-cyan-500/20 rounded-xl p-4">
          <div class="flex items-center justify-between mb-3">
            <h3 class="font-medium text-cyan-200">Team B Sends</h3>
            <span id="countB" class="text-xs px-2 py-0.5 bg-cyan-500/20 rounded">0 players</span>
          </div>
          <div id="statsB" class="space-y-1.5 text-[13px]"></div>
        </div>
      </div>
      <div class="mt-4 pt-4 border-t border-white/10 flex items-center justify-between">
        <div><span class="text-sm text-white/60">Fairness: </span><span id="fair" class="font-mono">Select players</span></div>
        <div class="w-48 h-1.5 bg-white/10 rounded-full overflow-hidden"><div id="bar" class="h-full w-0 bg-gradient-to-r from-violet-500 to-cyan-400"></div></div>
      </div>
    </div>
  </section>

  <!-- Rosters -->
  <div class="grid lg:grid-cols-2 gap-5">
    <section class="glass rounded-2xl border border-white/10 p-4">
      <div class="flex items-center gap-2 mb-3">
        <select id="teamA" class="flex-1 bg-black/50 border border-white/10 rounded px-3 py-1.5 text-sm"></select>
      </div>
      <div id="listA" class="space-y-2 max-h-[600px] overflow-auto pr-2"></div>
    </section>

    <section class="glass rounded-2xl border border-white/10 p-4">
      <div class="flex items-center gap-2 mb-3">
        <select id="teamB" class="flex-1 bg-black/50 border border-white/10 rounded px-3 py-1.5 text-sm"></select>
      </div>
      <div id="listB" class="space-y-2 max-h-[600px] overflow-auto pr-2"></div>
    </section>
  </div>
</main>

<script>
const LEAGUE='1313454100225990656';
const VAL='https://docs.google.com/spreadsheets/d/e/2PACX-1vRqxhqyuKK6vu_EoYta5FZ_KdOB8M54Q_qBwJKOUF5KcgbTt2dmHn_FuLj9d-FS8-ta5T0zkU0QEGcN/pub?gid=4113168&single=true&output=csv';
const PPG='https://docs.google.com/spreadsheets/d/e/2PACX-1vRqxhqyuKK6vu_EoYta5FZ_KdOB8M54Q_qBwJKOUF5KcgbTt2dmHn_FuLj9d-FS8-ta5T0zkU0QEGcN/pub?gid=118408869&single=true&output=csv';

let S={users:[],rosters:[],players:{},vals:new Map(),ppg:new Map(),slots:[]};
let rosters={A:[],B:[]}, trade={A:[],B:[]};

async function init(){
  const [lg,us,ro,pl,v,p]=await Promise.all([
    fetch(`https://api.sleeper.app/v1/league/${LEAGUE}`).then(r=>r.json()),
    fetch(`https://api.sleeper.app/v1/league/${LEAGUE}/users`).then(r=>r.json()),
    fetch(`https://api.sleeper.app/v1/league/${LEAGUE}/rosters`).then(r=>r.json()),
    fetch('https://api.sleeper.app/v1/players/nfl').then(r=>r.json()),
    fetch(VAL).then(r=>r.text()), fetch(PPG).then(r=>r.text())
  ]);
  S.users=us; S.rosters=ro; S.players=pl; S.slots=lg.roster_positions.filter(x=>!['BN','IR','TAXI'].includes(x));
  const sf=lg.roster_positions.includes('SUPER_FLEX');
  Papa.parse(v,{header:true,skipEmptyLines:true}).data.forEach(r=>{if(r.sleeper_id)S.vals.set(r.sleeper_id,parseFloat(sf?r.val_sf_ppr_tep05:r.val_1qb_ppr_tep05)||0)});
  Papa.parse(p,{header:true,skipEmptyLines:true}).data.forEach(r=>{if(r.Player)S.ppg.set(r.Player.toLowerCase(),parseFloat(r['Avg_PPR_0.5_TEP'])||0)});

  const a=document.getElementById('teamA'), b=document.getElementById('teamB');
  us.forEach(u=>{const r=ro.find(x=>x.owner_id===u.user_id);if(!r)return;const n=u.metadata?.team_name||u.display_name;const o=document.createElement('option');o.value=r.roster_id;o.textContent=n;a.appendChild(o.cloneNode(true));b.appendChild(o)});
  a.onchange=()=>load('A',+a.value); b.onchange=()=>load('B',+b.value);
  a.value=ro[0].roster_id; b.value=ro[1].roster_id; load('A',ro[0].roster_id); load('B',ro[1].roster_id);
}

function load(side,id){
  const r=S.rosters.find(x=>x.roster_id===id);
  rosters[side]=(r.players||[]).map(pid=>{
    const p=S.players[pid]||{}; const nm=`${p.first_name||''} ${p.last_name||''}`.trim();
    return {id:pid,n:nm,pos:p.position||'?',age:p.age||0,val:S.vals.get(pid)||0,ppg:S.ppg.get(nm.toLowerCase())||0}
  }).filter(x=>x.n).sort((a,b)=>b.val-a.val);

  trade[side]=[]; // clear trade on team switch
  render(side);
  update();
}

function render(side){
  const list=document.getElementById('list'+side);
  const grouped={}; rosters[side].forEach(p=>(grouped[p.pos]=grouped[p.pos]||[]).push(p));
  const order=['QB','RB','WR','TE'];

  list.innerHTML=order.filter(pos=>grouped[pos]).map(pos=>`
    <div class="mb-3">
      <div class="text-[11px] text-white/40 uppercase mb-1">${pos}</div>
      ${grouped[pos].map(p=>{
        const sel=trade[side].find(x=>x.id===p.id);
        return `<div class="player ${sel?'selected':''} flex items-center justify-between p-2 rounded-lg border border-white/10 bg-white/[0.02] hover:bg-white/[0.05] cursor-pointer mb-1" onclick="toggle('${side}','${p.id}')">
          <div class="flex items-center gap-2 min-w-0">
            <div class="w-5 h-5 rounded border ${sel?'bg-violet-500 border-violet-500':'border-white/20'} grid place-items-center text-[10px]">${sel?'✓':''}</div>
            <span class="truncate text-[13px]">${p.n}</span>
            <span class="text-[10px] text-white/40">${p.age}</span>
          </div>
          <div class="flex items-center gap-3 text-[11px]">
            <span class="text-white/50">${p.ppg.toFixed(1)}</span>
            <span class="font-mono w-12 text-right">${Math.round(p.val).toLocaleString()}</span>
          </div>
        </div>`
      }).join('')}
    </div>
  `).join('');
}

function toggle(side,id){
  const p=rosters[side].find(x=>x.id===id);
  const idx=trade[side].findIndex(x=>x.id===id);
  if(idx>=0) trade[side].splice(idx,1); else trade[side].push(p);
  render(side);
  update();
}

const long=(a,pos)=>{const pk={QB:30,RB:24,WR:26,TE:27}[pos]||26;return Math.max(.3,1-Math.abs(a-pk)*.06)};

function stats(team){
  const val=team.reduce((s,p)=>s+(p.val||p.ppg*50),0);
  const age=team.length?team.reduce((s,p)=>s+p.age,0)/team.length:0;
  const opt=team.reduce((s,p)=>s+p.ppg,0);
  const long=team.length?team.reduce((s,p)=>s+long(p.age,p.pos),0)/team.length*100:0;
  return {val,age,opt,long};
}

function update(){
  const A=stats(trade.A), B=stats(trade.B);
  document.getElementById('countA').textContent=`${trade.A.length} players`;
  document.getElementById('countB').textContent=`${trade.B.length} players`;

  const row=(l,v)=>`<div class="flex justify-between py-0.5"><span class="text-white/50">${l}</span><span class="font-mono">${v}</span></div>`;

  document.getElementById('statsA').innerHTML = trade.A.length? [
    row('Value', Math.round(A.val).toLocaleString()),
    row('Opt PPG', A.opt.toFixed(1)),
    row('Productivity', A.opt.toFixed(1)),
    row('Longevity', A.long.toFixed(0)+'%'),
    row('Age', A.age.toFixed(1))
  ].join('') : '<div class="text-white/40 text-xs">Click players to add</div>';

  document.getElementById('statsB').innerHTML = trade.B.length? [
    row('Value', Math.round(B.val).toLocaleString()),
    row('Opt PPG', B.opt.toFixed(1)),
    row('Productivity', B.opt.toFixed(1)),
    row('Longevity', B.long.toFixed(0)+'%'),
    row('Age', B.age.toFixed(1))
  ].join('') : '<div class="text-white/40 text-xs">Click players to add</div>';

  if(trade.A.length||trade.B.length){
    const diff=A.val-B.val; const fair=Math.max(0,100-Math.abs(diff)/Math.max(1,(A.val+B.val)/2)*100);
    document.getElementById('fair').textContent = Math.abs(diff)<200? 'Even' : diff>0? `A +${Math.round(diff).toLocaleString()}` : `B +${Math.round(-diff).toLocaleString()}`;
    document.getElementById('bar').style.width = fair+'%';
  } else {
    document.getElementById('fair').textContent='Select players';
    document.getElementById('bar').style.width='0%';
  }
}

document.getElementById('reset').onclick=()=>{trade={A:[],B:[]};render('A');render('B');update()};
window.toggle=toggle;
init();
</script>
</body>
</html>
