<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>THE VAULT • Player Rankings</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root { color-scheme: dark; }
  body { font-family: 'Inter', system-ui, -apple-system, sans-serif; }
  .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; }
  .scroll-thin::-webkit-scrollbar { height:8px; width:8px }
  .scroll-thin::-webkit-scrollbar-thumb { background:#334155; border-radius:999px }
  .glass { backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
</style>
</head>
<body class="bg-[#050a14] text-slate-100 min-h-screen selection:bg-cyan-500/30">
  <!-- BG GLOW -->
  <div class="fixed inset-0 pointer-events-none overflow-hidden">
    <div class="absolute -top-1/2 left-1/2 -translate-x-1/2 w-[1200px] h-[1200px] rounded-full bg-[radial-gradient(circle_at_center,rgba(14,165,233,0.15),transparent_60%)]"></div>
    <div class="absolute top-1/3 -right-1/4 w-[800px] h-[800px] rounded-full bg-[radial-gradient(circle_at_center,rgba(139,92,246,0.12),transparent_60%)]"></div>
  </div>

  <div class="relative z-10 max-w-[1400px] mx-auto px-4 md:px-8 py-6">
    <!-- HEADER -->
    <header class="flex flex-col md:flex-row md:items-center md:justify-between gap-6 mb-8">
      <div class="flex items-center gap-4">
        <div class="w-12 h-12 rounded-2xl bg-gradient-to-br from-cyan-400 to-violet-600 flex items-center justify-center shadow-lg shadow-cyan-500/20">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none"><path d="M12 3l7 4v10l-7 4-7-4V7l7-4z" stroke="white" stroke-width="1.5" stroke-linejoin="round"/><path d="M12 3v14M19 7l-7 4-7-4" stroke="white" stroke-width="1.5" stroke-linecap="round"/></svg>
        </div>
        <div>
          <h1 class="text-3xl md:text-4xl font-black tracking-tight leading-none">
            <span class="bg-gradient-to-r from-cyan-300 via-sky-300 to-violet-300 bg-clip-text text-transparent">THE VAULT</span>
          </h1>
          <p class="text-slate-400 text-sm font-medium -mt-0.5">Player Rankings • Values + PPG Merge</p>
        </div>
      <div class="flex items-center gap-3">
        <div class="mono text-xs px-3 py-1.5 rounded-full bg-slate-800/70 border border-slate-700 text-slate-300">
          <span id="status-dot" class="inline-block w-2 h-2 rounded-full bg-amber-400 mr-2 animate-pulse"></span>
          <span id="status-text">Idle</span>
        </div>
        <button id="refreshBtn" class="inline-flex items-center gap-2 px-4 py-2 rounded-xl bg-slate-800 hover:bg-slate-700 border border-slate-700 text-sm font-semibold transition">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 11-9-9"/><path d="M21 3v6h-6"/></svg>
          Refresh
        </button>
      </div>
    </header>

    <!-- CONTROLS -->
    <section class="grid lg:grid-cols-12 gap-4 mb-6">
      <div class="lg:col-span-8 grid md:grid-cols-3 gap-4">
        <!-- FORMAT -->
        <div class="relative group">
          <label class="block text-xs font-semibold text-slate-400 mb-1.5 uppercase tracking-wider">Format</label>
          <div class="relative">
            <select id="formatSelect" class="w-full appearance-none bg-slate-900/80 border border-slate-700 rounded-xl px-3 py-2.5 pr-10 text-sm font-medium focus:outline-none focus:ring-2 focus:ring-cyan-500/50 focus:border-cyan-500 transition">
              <option value="val_sf_ppr">SF • PPR</option>
              <option value="val_sf_ppr_tep05">SF • PPR • TEP 0.5</option>
              <option value="val_sf_ppr_tep">SF • PPR • TEP 1.0</option>
              <option value="val_1qb_ppr">1QB • PPR</option>
              <option value="val_1qb_ppr_tep05">1QB • PPR • TEP 0.5</option>
              <option value="val_1qb_ppr_tep">1QB • PPR • TEP 1.0</option>
            </select>
            <svg class="absolute right-3 top-1/2 -translate-y-1/2 pointer-events-none text-slate-500" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
          </div>
          <span id="autoBadge" class="hidden absolute -top-2 -right-2 text-[10px] font-bold px-2 py-0.5 rounded-full bg-cyan-500 text-slate-900 shadow-lg shadow-cyan-500/30">AUTO</span>
        </div>

        <!-- LEAGUE -->
        <div class="md:col-span-2">
          <label class="block text-xs font-semibold text-slate-400 mb-1.5 uppercase tracking-wider">Sleeper League ID</label>
          <div class="flex gap-2">
            <input id="leagueInput" placeholder="e.g. 123456789012345678" class="flex-1 bg-slate-900/80 border border-slate-700 rounded-xl px-3 py-2.5 text-sm mono focus:outline-none focus:ring-2 focus:ring-violet-500/50 focus:border-violet-500 transition" />
            <button id="loadLeagueBtn" class="px-4 py-2.5 rounded-xl bg-violet-600 hover:bg-violet-500 text-sm font-semibold transition shadow-lg shadow-violet-600/20">Load</button>
          </div>
        </div>
      </div>

      <div class="lg:col-span-4 grid sm:grid-cols-2 gap-4">
        <div>
          <label class="block text-xs font-semibold text-slate-400 mb-1.5 uppercase tracking-wider">Search</label>
          <div class="relative">
            <input id="searchInput" placeholder="Player name…" class="w-full bg-slate-900/80 border border-slate-700 rounded-xl pl-9 pr-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-cyan-500/50 focus:border-cyan-500 transition" />
            <svg class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-600" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.3-4.3"/></svg>
          </div>
        </div>
        <div>
          <label class="block text-xs font-semibold text-slate-400 mb-1.5 uppercase tracking-wider">Position</label>
          <select id="posFilter" class="w-full bg-slate-900/80 border border-slate-700 rounded-xl px-3 py-2.5 text-sm font-medium focus:outline-none focus:ring-2 focus:ring-cyan-500/50 focus:border-cyan-500 transition">
            <option value="ALL">All POS</option>
            <option value="QB">QB</option>
            <option value="RB">RB</option>
            <option value="WR">WR</option>
            <option value="TE">TE</option>
          </select>
        </div>
      </div>
    </section>

    <!-- STATS CHIPS -->
    <section class="flex flex-wrap items-center gap-3 mb-6">
      <div class="px-3 py-1.5 rounded-full bg-slate-900 border border-slate-800 text-xs font-medium text-slate-300 flex items-center gap-2">
        <span class="w-2 h-2 rounded-full bg-emerald-400"></span> Values: <span id="chipValues" class="mono text-slate-100 font-semibold">0</span>
      </div>
      <div class="px-3 py-1.5 rounded-full bg-slate-900 border border-slate-800 text-xs font-medium text-slate-300 flex items-center gap-2">
        <span class="w-2 h-2 rounded-full bg-sky-400"></span> PPG: <span id="chipPpg" class="mono text-slate-100 font-semibold">0</span>
      </div>
      <div class="px-3 py-1.5 rounded-full bg-slate-900 border border-slate-800 text-xs font-medium text-slate-300 flex items-center gap-2">
        <span class="w-2 h-2 rounded-full bg-violet-400"></span> Merged: <span id="chipMerged" class="mono text-slate-100 font-semibold">0</span>
      </div>
      <div class="ml-auto text-xs text-slate-500 mono">
        Updated: <span id="updatedAt" class="text-slate-300">—</span>
      </div>
    </section>

    <!-- TABLE -->
    <section class="relative rounded-2xl border border-slate-800 bg-slate-950/60 glass shadow-2xl shadow-black/30 overflow-hidden">
      <div class="overflow-x-auto scroll-thin max-h-[70vh]">
        <table class="w-full text-sm">
          <thead class="sticky top-0 z-20 bg-slate-950/95 backdrop-blur border-b border-slate-800">
            <tr class="text-[11px] uppercase tracking-wider text-slate-400">
              <th class="text-left font-semibold px-4 py-3 sticky left-0 bg-slate-950/95">Player</th>
              <th class="text-left font-semibold px-3 py-3 cursor-pointer hover:text-slate-200" data-sort="pos">POS</th>
              <th class="text-left font-semibold px-3 py-3 cursor-pointer hover:text-slate-200" data-sort="team">Team</th>
              <th class="text-right font-semibold px-3 py-3 cursor-pointer hover:text-slate-200" data-sort="age">Age</th>
              <th class="text-right font-semibold px-3 py-3 cursor-pointer hover:text-slate-200" data-sort="value">Value</th>
              <th class="text-right font-semibold px-3 py-3 cursor-pointer hover:text-slate-200" data-sort="sleeper_ppg">Sleeper PPG</th>
              <th class="text-right font-semibold px-3 py-3 cursor-pointer hover:text-slate-200" data-sort="fp_ppg">FP PPG</th>
              <th class="text-right font-semibold px-3 py-3 cursor-pointer hover:text-slate-200" data-sort="avg_ppg">Avg PPG</th>
              <th class="text-right font-semibold px-4 py-3 cursor-pointer hover:text-slate-200" data-sort="value_per_ppg">Value / PPG</th>
            </tr>
          </thead>
          <tbody id="tbody" class="divide-y divide-slate-900/70">
            <tr>
              <td colspan="9" class="px-4 py-16 text-center text-slate-500">
                <div class="inline-flex flex-col items-center gap-3">
                  <svg class="animate-spin" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 11-9-9"/></svg>
                  <span class="text-sm">Loading data…</span>
                </div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>

    <!-- STATUS LOG -->
    <section class="mt-6">
      <div class="rounded-2xl border border-slate-800 bg-slate-950/40 p-4">
        <h2 class="text-xs font-semibold uppercase tracking-wider text-slate-500 mb-2">Fetch Status</h2>
        <div id="log" class="mono text-xs leading-relaxed text-slate-400 max-h-32 overflow-y-auto scroll-thin whitespace-pre-wrap"></div>
      </div>
    </section>

    <footer class="text-center text-[11px] text-slate-600 mt-10 pb-10">
      THE VAULT • Built for dynasty degeneracy. Data from Google Sheets via AllOrigins proxy.
    </footer>
  </div>

<script>
(() => {
  const CSV_VALUES_ORIG = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRqxhqyuKK6vu_EoYta5FZ_KdOB8M54Q_qBwJKOUF5KcgbTt2dmHn_FuLj9d-FS8-ta5T0zkU0QEGcN/pub?gid=689232361&single=true&output=csv';
  const CSV_PPG_ORIG = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRqxhqyuKK6vu_EoYta5FZ_KdOB8M54Q_qBwJKOUF5KcgbTt2dmHn_FuLj9d-FS8-ta5T0zkU0QEGcN/pub?gid=118408869&single=true&output=csv';
  const PROXY = url => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`;

  const $ = sel => document.querySelector(sel);
  const logEl = $('#log');
  const statusText = $('#status-text');
  const statusDot = $('#status-dot');
  const tbody = $('#tbody');
  const chipValues = $('#chipValues');
  const chipPpg = $('#chipPpg');
  const chipMerged = $('#chipMerged');
  const updatedAt = $('#updatedAt');
  const formatSelect = $('#formatSelect');
  const autoBadge = $('#autoBadge');
  const searchInput = $('#searchInput');
  const posFilter = $('#posFilter');
  const leagueInput = $('#leagueInput');
  const loadLeagueBtn = $('#loadLeagueBtn');
  const refreshBtn = $('#refreshBtn');

  let valuesRaw = [];
  let ppgRaw = [];
  let merged = [];
  let sortKey = 'value';
  let sortDir = 'desc';
  let lastLeagueAuto = null;

  function log(msg, type='info') {
    const ts = new Date().toLocaleTimeString();
    const color = type==='error' ? 'text-red-400' : type==='success' ? 'text-emerald-400' : 'text-slate-500';
    logEl.innerHTML += `<span class="${color}">[${ts}]</span> ${msg}\n`;
    logEl.scrollTop = logEl.scrollHeight;
  }
  function setStatus(text, color='amber') {
    statusText.textContent = text;
    statusDot.className = `inline-block w-2 h-2 rounded-full mr-2 animate-pulse bg-${color}-400`;
  }

  const normalizeName = s => s.toLowerCase().replace(/[^a-z0-9]/g,'');

  function parseValues(txt) {
    txt = txt.replace(/^\uFEFF/, '');
    txt = txt.replace(/\s+/g, ' ').trim();
    const m = txt.search(/\b\d{3,7}/);
    if (m >= 0) txt = txt.slice(m);
    const recs = txt.split(/(?=\b\d{3,7},)/);
    const out = [];
    for (const rec of recs) {
      const parts = rec.split(',');
      if (parts.length < 11) continue;
      const id = parts[0].trim();
      const name = parts[1].trim();
      const pos = parts[2].trim().toUpperCase();
      const team = parts[3].trim().toUpperCase();
      const age = parseFloat(parts[4]);
      const val_sf_ppr = parseFloat(parts[5]);
      const val_sf_ppr_tep05 = parseFloat(parts[6]);
      const val_sf_ppr_tep = parseFloat(parts[7]);
      const val_1qb_ppr = parseFloat(parts[8]);
      const val_1qb_ppr_tep05 = parseFloat(parts[9]);
      const val_1qb_ppr_tep = parseFloat(parts[10]);
      if (!['QB','RB','WR','TE'].includes(pos)) continue;
      if (!/^\d+$/.test(id)) continue;
      out.push({ id, name, pos, team, age, val_sf_ppr, val_sf_ppr_tep05, val_sf_ppr_tep, val_1qb_ppr, val_1qb_ppr_tep05, val_1qb_ppr_tep });
    }
    return out;
  }

  function parsePPG(txt) {
    txt = txt.replace(/^\uFEFF/, '');
    txt = txt.replace(/\s+/g, ' ').trim();
    // split by player pattern
    const splitter = /(?=[A-Za-z][A-Za-z.'\-\s]{2,40},\s*[A-Z]{2,4},\s*(?:QB|RB|WR|TE|K),)/g;
    const chunks = txt.split(splitter).filter(c => c.includes(','));
    const out = [];
    for (const chunk of chunks) {
      const parts = chunk.split(',');
      if (parts.length < 21) continue;
      const player = parts[0].trim();
      const team = parts[1].trim().toUpperCase();
      const pos = parts[2].trim().toUpperCase();
      const sleeper_ppr = parseFloat(parts[9]);
      const sleeper_ppr_05 = parseFloat(parts[10]);
      const sleeper_ppr_tep = parseFloat(parts[11]);
      const fp_ppr = parseFloat(parts[18]);
      const fp_ppr_05 = parseFloat(parts[19]);
      const fp_ppr_tep = parseFloat(parts[20]);
      if (!player) continue;
      out.push({ player, team, pos, sleeper_ppr, sleeper_ppr_05, sleeper_ppr_tep, fp_ppr_05, fp_ppr_tep });
    }
    return out;
  }

  function mergeData() {
    const ppgMap = new Map();
    for (const p of ppgRaw) {
      ppgMap.set(normalizeName(p.player), p);
    }
    const fmt = formatSelect.value; // e.g. val_sf_ppr_tep05
    const tepLevel = fmt.includes('tep05') ? '05' : fmt.includes('tep') ? 'tep' : 'base';

    const mapped = [];
    for (const v of valuesRaw) {
      const p = ppgMap.get(normalizeName(v.name));
      if (!p) continue;
      const value = v[fmt];
      let sleeper_ppg, fp_ppg;
      if (tepLevel === 'tep') { sleeper_ppg = p.sleeper_ppr_tep; fp_ppg = p.fp_ppr_tep; }
      else if (tepLevel === '05') { sleeper_ppg = p.sleeper_ppr_05; fp_ppg = p.fp_ppr_05; }
      else { sleeper_ppg = p.sleeper_ppr; fp_ppg = p.fp_ppr; }
      const avg_ppg = (isFinite(sleeper_ppg) && isFinite(fp_ppg)) ? (sleeper_ppg + fp_ppg)/2 : (isFinite(sleeper_ppg) ? sleeper_ppg : fp_ppg);
      const value_per_ppg = (isFinite(value) && isFinite(avg_ppg) && avg_ppg > 0) ? value / avg_ppg : null;
      mapped.push({
        name: v.name,
        pos: v.pos,
        team: v.team,
        age: v.age,
        value,
        sleeper_ppg,
        fp_ppg,
        avg_ppg,
        value_per_ppg
      });
    }
    merged = mapped;
    chipValues.textContent = valuesRaw.length.toLocaleString();
    chipPpg.textContent = ppgRaw.length.toLocaleString();
    chipMerged.textContent = merged.length.toLocaleString();
  }

  function formatNum(n, dec=1) {
    if (!isFinite(n)) return '—';
    return n.toLocaleString(undefined, { minimumFractionDigits: dec, maximumFractionDigits: dec });
  }

  function render() {
    const q = searchInput.value.trim().toLowerCase();
    const pos = posFilter.value;
    let rows = merged.filter(r => {
      if (pos !== 'ALL' && r.pos !== pos) return false;
      if (q && !r.name.toLowerCase().includes(q)) return false;
      return true;
    });

    rows.sort((a,b) => {
      const av = a[sortKey];
      const bv = b[sortKey];
      const an = isFinite(av) ? av : -Infinity;
      const bn = isFinite(bv) ? bv : -Infinity;
      return sortDir === 'asc' ? an - bn : bn - an;
    });

    if (rows.length === 0) {
      tbody.innerHTML = `<tr><td colspan="9" class="px-4 py-16 text-center text-slate-600">No players match filters.</td></tr>`;
      return;
    }

    const posColor = {
      QB: 'text-amber-300 bg-amber-500/10 border-amber-500/20',
      RB: 'text-emerald-300 bg-emerald-500/10 border-emerald-500/20',
      WR: 'text-sky-300 bg-sky-500/10 border-sky-500/20',
      TE: 'text-violet-300 bg-violet-500/10 border-violet-500/20'
    };

    tbody.innerHTML = rows.map(r => `
      <tr class="hover:bg-slate-900/60 transition">
        <td class="px-4 py-3 sticky left-0 bg-slate-950/80 backdrop-blur">
          <div class="font-semibold text-slate-100">${r.name}</div>
          <div class="text-[11px] text-slate-500 mono">${normalizeName(r.name)}</div>
        </td>
        <td class="px-3 py-3">
          <span class="inline-flex items-center px-2 py-0.5 rounded-md text-[11px] font-bold border ${posColor[r.pos]||''}">${r.pos}</span>
        </td>
        <td class="px-3 py-3 text-slate-300 font-medium">${r.team}</td>
        <td class="px-3 py-3 text-right mono text-slate-300">${isFinite(r.age)?r.age.toFixed(1):'—'}</td>
        <td class="px-3 py-3 text-right mono font-semibold text-slate-100">${formatNum(r.value,0)}</td>
        <td class="px-3 py-3 text-right mono text-slate-300">${formatNum(r.sleeper_ppg)}</td>
        <td class="px-3 py-3 text-right mono text-slate-300">${formatNum(r.fp_ppg)}</td>
        <td class="px-3 py-3 text-right mono text-cyan-300 font-medium">${formatNum(r.avg_ppg)}</td>
        <td class="px-4 py-3 text-right mono font-semibold ${r.value_per_ppg && r.value_per_ppg>300 ? 'text-emerald-300' : 'text-slate-200'}">${r.value_per_ppg?formatNum(r.value_per_ppg,0):'—'}</td>
      </tr>
    `).join('');

    // update sort indicators
    document.querySelectorAll('th[data-sort]').forEach(th => {
      const k = th.dataset.sort;
      const isActive = k === sortKey;
      th.innerHTML = th.textContent.replace(/ [\u2191\u2193]/,'') + (isActive ? (sortDir==='asc'?' ↑':' ↓') : '');
      th.classList.toggle('text-cyan-300', isActive);
    });
  }

  async function fetchCSV(name, url) {
    log(`Fetching ${name}...`);
    setStatus(`Fetching ${name}…`, 'amber');
    const res = await fetch(PROXY(url));
    if (!res.ok) throw new Error(`${name} HTTP ${res.status}`);
    const txt = await res.text();
    log(`${name} fetched (${(txt.length/1024).toFixed(1)} KB)`, 'success');
    return txt;
  }

  async function loadAll() {
    try {
      setStatus('Loading…', 'amber');
      const [valuesTxt, ppgTxt] = await Promise.all([
        fetchCSV('VALUES', CSV_VALUES_ORIG),
        fetchCSV('PPG', CSV_PPG_ORIG)
      ]);
      log(`Parsing VALUES...`);
      valuesRaw = parseValues(valuesTxt);
      log(`Parsed ${valuesRaw.length} values`, 'success');
      log(`Parsing PPG...`);
      ppgRaw = parsePPG(ppgTxt);
      log(`Parsed ${ppgRaw.length} PPG rows`, 'success');
      mergeData();
      render();
      updatedAt.textContent = new Date().toLocaleString();
      setStatus('Ready', 'emerald');
      log(`Render complete.`, 'success');
    } catch (e) {
      console.error(e);
      setStatus('Error', 'red');
      log(`ERROR: ${e.message}`, 'error');
      tbody.innerHTML = `<tr><td colspan="9" class="px-4 py-16 text-center text-red-400">Failed to load data. See log.</td></tr>`;
    }
  }

  async function detectLeagueFormat(leagueId) {
    try {
      setStatus('Detecting league…', 'amber');
      log(`Detecting league ${leagueId}...`);
      const res = await fetch(`https://api.sleeper.app/v1/league/${leagueId}`);
      if (!res.ok) throw new Error(`Sleeper ${res.status}`);
      const json = await res.json();
      const rp = json.roster_positions || [];
      const isSF = rp.includes('SUPER_FLEX') || rp.filter(p=>p==='QB').length >= 2;
      const bonusTe = json.scoring_settings?.bonus_rec_te || 0;
      let tep = '';
      if (bonusTe >= 0.9) tep = '_tep';
      else if (bonusTe >= 0.4) tep = '_tep05';
      const prefix = isSF ? 'val_sf_ppr' : 'val_1qb_ppr';
      const fmt = prefix + tep;
      formatSelect.value = fmt;
      autoBadge.classList.remove('hidden');
      lastLeagueAuto = fmt;
      log(`Auto-detected format: ${fmt} (SF=${isSF}, TE bonus=${bonusTe})`, 'success');
      setStatus('Ready', 'emerald');
      mergeData();
      render();
    } catch (e) {
      log(`League detect failed: ${e.message}`, 'error');
      setStatus('Ready', 'emerald');
    }
  }

  // Events
  formatSelect.addEventListener('change', () => {
    autoBadge.classList.add('hidden');
    mergeData();
    render();
  });
  searchInput.addEventListener('input', () => render());
  posFilter.addEventListener('change', () => render());
  refreshBtn.addEventListener('click', loadAll);
  loadLeagueBtn.addEventListener('click', () => {
    const id = leagueInput.value.trim();
    if (!id) return;
    localStorage.setItem('vault_league_id', id);
    detectLeagueFormat(id);
  });
  document.querySelectorAll('th[data-sort]').forEach(th => {
    th.addEventListener('click', () => {
      const k = th.dataset.sort;
      if (sortKey === k) sortDir = sortDir === 'asc' ? 'desc' : 'asc';
      else { sortKey = k; sortDir = k === 'player' ? 'asc' : 'desc'; }
      render();
    });
  });

  // Init
  leagueInput.value = localStorage.getItem('vault_league_id') || '';
  loadAll();
})();
</script>
