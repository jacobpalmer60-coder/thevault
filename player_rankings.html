<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Rookie Alchemy • Player Rankings</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<style>
  :root { color-scheme: dark; }
  html { font-family: 'Inter', system-ui, sans-serif; }
.display { font-family: 'Space Grotesk', 'Inter', sans-serif; }
  body { background: #04060a; }
.glass { background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.02)); backdrop-filter: blur(16px); border:1px solid rgba(255,255,255,.08); }
.glass-strong { background: linear-gradient(180deg, rgba(15,17,22,.85), rgba(10,12,16,.85)); backdrop-filter: blur(20px); border:1px solid rgba(255,255,255,.08); }
.scroller::-webkit-scrollbar { width:10px; height:10px; }
.scroller::-webkit-scrollbar-thumb { background: rgba(255,193,7,.25); border-radius:999px; border:2px solid transparent; background-clip:padding-box; }
</style>
</head>
<body class="min-h-screen text-zinc-100 antialiased">
<div class="fixed inset-0 -z-10 bg-[radial-gradient(60%_60%_at_50%_-10%,rgba(251,191,36,0.15),transparent_60%),radial-gradient(40%_40%_at_100%_0%,rgba(59,130,246,0.12),transparent_50%),#04060a]"></div>

<div class="max-w-[1400px] mx-auto px-4 md:px-8 py-8">
  <header class="flex flex-wrap items-center justify-between gap-4 mb-6">
    <div class="flex items-center gap-4">
      <div class="size-12 grid place-items-center rounded-2xl bg-gradient-to-br from-amber-400 to-orange-600 shadow-[0_0_40px_rgba(245,158,11,.35)]">
        <span class="display font-bold text-xl text-black">RA</span>
      </div>
      <div>
        <h1 class="display text-[32px] font-bold">Player Rankings</h1>
        <p class="text-sm text-zinc-400 -mt-1">Age • Value • Sleeper • RA • FP • Avg PPG • Value/PPG</p>
      </div>
      <span id="scoringBadge" class="hidden md:inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full bg-emerald-500/10 text-emerald-300 text-xs font-medium border border-emerald-500/20">
        <span class="size-1.5 rounded-full bg-emerald-400 animate-pulse"></span>
        <span id="scoringText">PPR</span>
      </span>
    </div>
    <div class="flex items-center gap-2">
      <input id="leagueInput" placeholder="Sleeper League ID" class="px-3 py-2.5 rounded-xl bg-zinc-900/70 border border-white/10 text-sm w-[200px] focus:outline-none focus:ring-2 focus:ring-amber-500/50" />
      <button id="loadLeagueBtn" class="px-3.5 py-2.5 rounded-xl bg-amber-500 hover:bg-amber-400 text-black font-semibold text-sm">Load</button>
      <button id="refreshBtn" class="px-3.5 py-2.5 rounded-xl glass hover:bg-white/10 text-sm font-medium">Refresh</button>
    </div>
  </header>

  <section class="glass-strong rounded-2xl p-4 mb-6 flex flex-wrap gap-3 items-center">
    <input id="search" placeholder="Search player..." class="flex-1 min-w-[200px] px-3 py-2.5 rounded-xl bg-zinc-900/70 border border-white/10 text-sm focus:outline-none focus:ring-2 focus:ring-amber-500/50" />
    <select id="posFilter" class="px-3 py-2.5 rounded-xl bg-zinc-900/70 border border-white/10 text-sm">
      <option value="">All Positions</option>
      <option>QB</option><option>RB</option><option>WR</option><option>TE</option>
    </select>
    <div id="count" class="text-xs text-zinc-500 ml-auto">—</div>
  </section>

  <section class="glass-strong rounded-2xl overflow-hidden">
    <div class="scroller overflow-auto max-h-[70vh]">
      <table class="w-full text-sm">
        <thead class="sticky top-0 bg-zinc-950/90 backdrop-blur border-b border-white/10 text-[11px] uppercase tracking-wider text-zinc-500">
          <tr>
            <th class="text-left px-5 py-3 font-medium">Player</th>
            <th class="text-left px-2 py-3 font-medium">Age</th>
            <th class="text-left px-2 py-3 font-medium">Value</th>
            <th class="text-left px-2 py-3 font-medium">Sleeper PPG</th>
            <th class="text-left px-2 py-3 font-medium">RA PPG</th>
            <th class="text-left px-2 py-3 font-medium">FP PPG</th>
            <th class="text-left px-2 py-3 font-medium">Avg PPG</th>
            <th class="text-left px-5 py-3 font-medium">Value / PPG</th>
          </tr>
        </thead>
        <tbody id="tbody" class="divide-y divide-white/5"></tbody>
      </table>
    </div>
  </section>
</div>

<script>
/* === PUBLISHED CSVs === */
const PUB = '2PACX-1vRqxhqyuKK6vu_EoYta5FZ_KdOB8M54Q_qBwJKOUF5KcgbTt2dmHn_FuLj9d-FS8-ta5T0zkU0QEGcN';
const CSV_BASE = `https://docs.google.com/spreadsheets/d/e/${PUB}/pub?gid=0&single=true&output=csv`;
const CSV_SLEEPER = `https://docs.google.com/spreadsheets/d/e/${PUB}/pub?gid=1866730819&single=true&output=csv`;
const CSV_FP = `https://docs.google.com/spreadsheets/d/e/${PUB}/pub?gid=2012227164&single=true&output=csv`;
const CSV_RA = `https://docs.google.com/spreadsheets/d/e/${PUB}/pub?gid=1226234680&single=true&output=csv`;

const state = { rows: [], filtered: [], scoring: { base:'PPR', tep:0.5 } };

const norm = s => String(s||'')
.toLowerCase()
.replace(/\s*\(.*?\)/g,'')
.replace(/\./g,'')
.replace(/'/g,'')
.replace(/-/g,' ')
.replace(/[^a-z0-9 ]/g,' ')
.replace(/\s+/g,' ')
.trim()
.replace(/\s+(?:qb|rb|wr|te|dst|k)\b$/,'')
.replace(/\s+(?:min|gb|det|chi|ne|nwe|nyj|nyg|phi|was|wsh|dal|ari|atl|car|no|nor|tb|tam|lar|la|sf|sfo|sea|pit|cle|cin|bal|hou|ind|jax|jac|ten|kc|kan|lv|oak|lac|sd|den|mia|buf)\b$/,'')
.replace(/\s+(?:jr|sr|ii|iii|iv|v)$/,'')
.trim();

function parseCSV(text){
  const rows=[]; let cur='', row=[], inQ=false;
  for(let i=0;i<text.length;i++){
    const c=text[i], n=text[i+1];
    if(c=='"'){ if(inQ&&n=='"'){cur+='"';i++;} else inQ=!inQ; }
    else if(c==','&&!inQ){ row.push(cur); cur=''; }
    else if((c=='\n'||c=='\r')&&!inQ){ if(cur!==''||row.length){ row.push(cur); rows.push(row); cur=''; row=[]; } }
    else cur+=c;
  }
  if(cur!==''||row.length){ row.push(cur); rows.push(row); }
  return rows.filter(r=>r.some(c=>c.trim()!==''));
}

function toMap(rows, pick){
  if(!rows.length) return new Map();
  const head = rows[0].map(h=>h.trim().toLowerCase());
  const idx = name => head.findIndex(h=>h.includes(name));
  const iPlayer = idx('player');
  const out = new Map();
  rows.slice(1).forEach(r=>{
    const raw = (r[iPlayer]||'').trim().replace(/\s+[A-Z]{2,3}$/,'');
    if(!raw) return;
    out.set(norm(raw), pick(r, head));
  });
  return out;
}

async function getLeague(id){
  if(!id) return null;
  try{
    const res = await fetch(`https://api.sleeper.app/v1/league/${id}`,{cache:'no-store'});
    return res.ok? await res.json() : null;
  }catch{ return null; }
}

function detectScoring(league){
  if(!league) return { base:'PPR', tep:0.5 };
  const rec = Number(league.scoring_settings?.rec || 1);
  const tep = Number(league.scoring_settings?.bonus_rec_te || 0);
  const base = rec >= 0.9? 'PPR' : rec >= 0.4? 'Half' : 'Std';
  return { base, tep };
}

async function load(){
  const params = new URLSearchParams(location.search);
  const leagueId = params.get('league_id') || localStorage.getItem('ra_league_id') || '';
  document.getElementById('leagueInput').value = leagueId;

  const league = await getLeague(leagueId);
  state.scoring = detectScoring(league);
  document.getElementById('scoringText').textContent =
    state.scoring.tep >= 0.9? `${state.scoring.base} + TEP 1.0` :
    state.scoring.tep >= 0.4? `${state.scoring.base} + TEP 0.5` : state.scoring.base;

  const [baseTxt, sTxt, fpTxt, raTxt] = await Promise.all([
    fetch(CSV_BASE,{cache:'no-store'}).then(r=>r.text()),
    fetch(CSV_SLEEPER,{cache:'no-store'}).then(r=>r.text()),
    fetch(CSV_FP,{cache:'no-store'}).then(r=>r.text()),
    fetch(CSV_RA,{cache:'no-store'}).then(r=>r.text())
  ]);

  const baseRows = parseCSV(baseTxt);
  const sRows = parseCSV(sTxt);
  const fpRows = parseCSV(fpTxt);
  const raRows = parseCSV(raTxt);

  const baseMap = toMap(baseRows, (r,h)=>{
    const get = n => { const i=h.findIndex(x=>x.includes(n)); return i>-1? r[i]:''; };
    return {
      player: get('player'),
      age: parseFloat(get('age')),
      value: parseFloat(String(get('value')).replace(/[^0-9.]/g,'')),
      pos: (get('pos')||get('position')||'').toUpperCase()
    };
  });

  const calcPick = (r,h)=>{
    const get = n => { const i=h.findIndex(x=>x.includes(n)); return i>-1? r[i]:''; };
    const ppr = parseFloat(get('ppr'));
    const pprTep = parseFloat(get('ppr tep')||get('ppr 0.5 tep')||get('ppr 1.0 tep'));
    const half = parseFloat(get('half'));
    const std = parseFloat(get('std'));
    return {
      ppg: isFinite(ppr)? ppr : isFinite(half)? half : isFinite(std)? std : NaN,
      ppgTep: isFinite(pprTep)? pprTep : NaN
    };
  };

  const sMap = toMap(sRows, calcPick);
  const fpMap = toMap(fpRows, calcPick);
  const raMap = toMap(raRows, calcPick);

  const keys = new Set([...baseMap.keys(),...sMap.keys(),...fpMap.keys(),...raMap.keys()]);
  const rows = [];

  keys.forEach(k=>{
    const b = baseMap.get(k)||{};
    const s = sMap.get(k)||{};
    const f = fpMap.get(k)||{};
    const r = raMap.get(k)||{};

    const pos = (b.pos||'').toUpperCase();
    const isTE = pos==='TE';
    const useTep = state.scoring.tep > 0 && isTE;

    const sPpg = useTep && isFinite(s.ppgTep)? s.ppgTep : s.ppg;
    const fPpg = useTep && isFinite(f.ppgTep)? f.ppgTep : f.ppg;
    const rPpg = useTep && isFinite(r.ppgTep)? r.ppgTep : r.ppg;

    const ppgs = [sPpg, fPpg, rPpg].filter(v=>isFinite(v));
    const avgPpg = ppgs.length? ppgs.reduce((a,b)=>a+b,0)/ppgs.length : NaN;
    const valPerPpg = isFinite(b.value) && isFinite(avgPpg) && avgPpg>0? b.value/avgPpg : NaN;

    rows.push({
      player: b.player || '',
      age: b.age,
      value: b.value,
      pos,
      sPpg, rPpg, fPpg,
      avgPpg,
      valPerPpg
    });
  });

  rows.sort((a,b)=>(b.value||-1e9)-(a.value||-1e9));
  state.rows = rows;
  applyFilters();
}

function applyFilters(){
  const q = document.getElementById('search').value.toLowerCase().trim();
  const pos = document.getElementById('posFilter').value;
  let data = state.rows;
  if(q) data = data.filter(r=>r.player.toLowerCase().includes(q));
  if(pos) data = data.filter(r=>r.pos===pos);
  state.filtered = data;
  render();
}

function render(){
  const tb = document.getElementById('tbody');
  tb.innerHTML = state.filtered.map(r=>`
    <tr class="hover:bg-white/[0.03]">
      <td class="px-5 py-3">
        <div class="font-medium">${r.player}</div>
        <div class="text-xs text-zinc-500">${r.pos||''}</div>
      </td>
      <td class="px-2 py-3 text-zinc-300">${isFinite(r.age)? r.age.toFixed(1):'—'}</td>
      <td class="px-2 py-3 font-mono text-zinc-200">${isFinite(r.value)? Math.round(r.value).toLocaleString(): '—'}</td>
      <td class="px-2 py-3 font-mono text-amber-300">${isFinite(r.sPpg)? r.sPpg.toFixed(2):'—'}</td>
      <td class="px-2 py-3 font-mono text-amber-300">${isFinite(r.rPpg)? r.rPpg.toFixed(2):'—'}</td>
      <td class="px-2 py-3 font-mono text-amber-300">${isFinite(r.fPpg)? r.fPpg.toFixed(2):'—'}</td>
      <td class="px-2 py-3 font-mono text-emerald-300">${isFinite(r.avgPpg)? r.avgPpg.toFixed(2):'—'}</td>
      <td class="px-5 py-3 font-mono text-zinc-300">${isFinite(r.valPerPpg)? r.valPerPpg.toFixed(2):'—'}</td>
    </tr>
  `).join('');
  document.getElementById('count').textContent = `${state.filtered.length.toLocaleString()} players`;
}

document.getElementById('search').oninput = applyFilters;
document.getElementById('posFilter').onchange = applyFilters;
document.getElementById('refreshBtn').onclick = load;
document.getElementById('loadLeagueBtn').onclick = ()=>{
  const id = document.getElementById('leagueInput').value.trim();
  if(id){
    localStorage.setItem('ra_league_id', id);
    const url = new URL(location.href);
    url.searchParams.set('league_id', id);
    history.replaceState(null,'',url);
    load();
  }
};

load();
</script>
</body>
</html>
