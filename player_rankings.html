<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Dynasty Player Rankings • Roster Audit</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://sleepercdn.com">
<style>
  :root { color-scheme: dark; }
  body {
    font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Inter, "Helvetica Neue", Arial, "Noto Sans", sans-serif;
    background: radial-gradient(1200px 800px at 80% -10%, rgba(245,158,11,.15), transparent 60%),
                radial-gradient(1000px 600px at 0% 100%, rgba(14,165,233,.12), transparent 60%),
                #020617;
  }
  .glass {
    background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.02));
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid rgba(255,255,255,.08);
  }
  .scrollbar-thin::-webkit-scrollbar { height: 8px; width: 8px; }
  .scrollbar-thin::-webkit-scrollbar-thumb { background: rgba(255,255,255,.15); border-radius: 999px; }
  .chip-active { background: rgba(245,158,11,.2); color: #fbbf24; border-color: rgba(245,158,11,.4); }
  .sort-asc::after { content: "▲"; font-size: .6em; margin-left: .4em; opacity: .7; }
  .sort-desc::after { content: "▼"; font-size: .6em; margin-left: .4em; opacity: .7; }
  input[type="range"] { accent-color: #f59e0b; }
  .skeleton { background: linear-gradient(90deg, rgba(255,255,255,.04) 25%, rgba(255,255,255,.08) 50%, rgba(255,255,255,.04) 75%); background-size: 200% 100%; animation: shimmer 1.2s infinite; }
  @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
</style>
</head>
<body class="min-h-screen text-slate-100 antialiased">
<div class="max-w-7xl mx-auto px-4 py-6 md:py-10">
  <!-- Header -->
  <header class="flex flex-col md:flex-row md:items-center md:justify-between gap-4 mb-6">
    <div class="flex items-center gap-3">
      <div class="w-10 h-10 rounded-2xl glass flex items-center justify-center shadow-lg shadow-amber-500/10">
        <span class="text-amber-400 font-black text-xl">RA</span>
      </div>
      <div>
        <h1 class="text-2xl md:text-3xl font-bold tracking-tight">Dynasty Player Rankings</h1>
        <p class="text-sm text-slate-400">Live values • PPG • Trends • Roster Audit</p>
      </div>
    </div>
    <div class="flex items-center gap-2">
      <span id="presetBadge" class="px-3 py-1.5 rounded-full text-xs font-semibold glass text-amber-300 border border-amber-400/20">sf_ppr</span>
      <div class="relative">
        <button id="settingsBtn" class="glass px-3 py-2 rounded-xl text-sm hover:bg-white/10 transition flex items-center gap-2">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6z"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 0 0 0-1.82-.33 1.65 0 0 1-1 1.51V21a2 2 0 1 1-4 0v-.09a1.65 1.65 0 0 1-1-1.51 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 0 0 0 .33-1.82 1.65 0 0 1-1.51-1H3a2 2 0 1 1 0-4h.09a1.65 1.65 0 0 1 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33h.09a1.65 1.65 0 0 1 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 1 1 1.51 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 0 0 0-.33 1.82v.09a1.65 1.65 0 0 1 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 1-1.51 1z"/></svg>
          Settings
        </button>
        <div id="settingsPop" class="hidden absolute right-0 mt-2 w-72 glass rounded-2xl shadow-2xl p-4 z-40">
          <h3 class="font-semibold mb-3 text-sm text-slate-200">Ranking Settings</h3>
          <div class="space-y-3">
            <div>
              <label class="text-xs text-slate-400">Format</label>
              <select id="formatSel" class="mt-1 w-full bg-slate-900/70 border border-white/10 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-amber-500">
                <option value="sf">Superflex</option>
                <option value="1qb">1QB</option>
              </select>
            </div>
            <div>
              <label class="text-xs text-slate-400">Scoring</label>
              <select id="scoringSel" class="mt-1 w-full bg-slate-900/70 border border-white/10 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-amber-500">
                <option value="ppr">PPR</option>
                <option value="half">Half PPR</option>
                <option value="standard">Standard</option>
              </select>
            </div>
            <div class="flex items-center justify-between pt-2">
              <span class="text-xs text-slate-400">Auto-detected from league</span>
              <button id="detectBtn" class="text-xs text-amber-400 hover:text-amber-300">Re-detect</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </header>

  <!-- Controls -->
  <section class="glass rounded-3xl p-4 md:p-5 mb-6">
    <div class="flex flex-wrap items-center gap-3">
      <div class="flex items-center gap-2">
        <span class="text-xs uppercase tracking-wider text-slate-400">Position</span>
        <div id="posChips" class="flex gap-1.5">
          <button data-pos="ALL" class="chip chip-active px-3 py-1.5 rounded-full text-xs border border-white/10 bg-white/5 hover:bg-white/10">All</button>
          <button data-pos="QB" class="chip px-3 py-1.5 rounded-full text-xs border border-white/10 hover:bg-white/10">QB</button>
          <button data-pos="RB" class="chip px-3 py-1.5 rounded-full text-xs border border-white/10 hover:bg-white/10">RB</button>
          <button data-pos="WR" class="chip px-3 py-1.5 rounded-full text-xs border border-white/10 hover:bg-white/10">WR</button>
          <button data-pos="TE" class="chip px-3 py-1.5 rounded-full text-xs border border-white/10 hover:bg-white/10">TE</button>
        </div>
      </div>

      <div class="h-6 w-px bg-white/10 hidden md:block"></div>

      <label class="flex items-center gap-2 cursor-pointer">
        <input id="tepToggle" type="checkbox" class="sr-only">
        <div class="w-10 h-6 rounded-full bg-slate-800 border border-white/10 relative transition">
          <div class="dot absolute top-0.5 left-0.5 w-5 h-5 rounded-full bg-slate-400 transition"></div>
        </div>
        <span class="text-sm text-slate-300">TE Premium</span>
      </label>

      <div class="flex-1 min-w-[200px]">
        <div class="relative">
          <input id="searchInp" placeholder="Search player..." class="w-full bg-slate-900/70 border border-white/10 rounded-xl pl-9 pr-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-amber-500 placeholder-slate-500" />
          <svg class="absolute left-3 top-2.5 text-slate-500" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3"/></svg>
        </div>
      </div>

      <button id="exportBtn" class="px-3 py-2 rounded-xl text-sm glass hover:bg-white/10 flex items-center gap-2">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        CSV
      </button>
    </div>

    <div class="grid md:grid-cols-2 gap-4 mt-4 pt-4 border-t border-white/10">
      <div>
        <div class="flex justify-between mb-1">
          <label class="text-xs text-slate-400">Age Range</label>
          <span class="text-xs text-slate-300"><span id="ageMinLabel">18</span> – <span id="ageMaxLabel">40</span></span>
        </div>
        <div class="flex items-center gap-3">
          <input id="ageMin" type="range" min="18" max="40" value="18" class="w-full">
          <input id="ageMax" type="range" min="18" max="40" value="40" class="w-full">
        </div>
      <div>
        <div class="flex justify-between mb-1">
          <label class="text-xs text-slate-400">Min Value</label>
          <span class="text-xs text-slate-300" id="minValLabel">0</span>
        </div>
        <input id="minVal" type="range" min="0" max="10000" value="0" class="w-full">
      </div>
    </div>
  </section>

  <!-- Table -->
  <section class="glass rounded-3xl overflow-hidden">
    <div class="overflow-x-auto scrollbar-thin">
      <table class="min-w-full text-sm">
        <thead class="bg-white/[0.04] border-b border-white/10 sticky top-0 backdrop-blur-xl z-10">
          <tr class="text-xs uppercase tracking-wider text-slate-400">
            <th class="text-left px-4 py-3 font-medium cursor-pointer select-none" data-sort="rank">Rank</th>
            <th class="text-left px-4 py-3 font-medium cursor-pointer select-none" data-sort="name">Player</th>
            <th class="text-left px-4 py-3 font-medium cursor-pointer select-none" data-sort="position">Pos</th>
            <th class="text-right px-4 py-3 font-medium cursor-pointer select-none" data-sort="value">Value</th>
            <th class="text-right px-4 py-3 font-medium cursor-pointer select-none" data-sort="ppg">PPG</th>
            <th class="text-right px-4 py-3 font-medium cursor-pointer select-none" data-sort="trend_7d">7D</th>
            <th class="text-right px-4 py-3 font-medium cursor-pointer select-none" data-sort="trend_30d">30D</th>
          </tr>
        </thead>
        <tbody id="tbody" class="divide-y divide-white/5">
          <!-- skeleton -->
          <tr class="animate-pulse"><td colspan="7" class="p-4">
            <div class="space-y-3">
              <div class="h-10 skeleton rounded-xl"></div>
              <div class="h-10 skeleton rounded-xl"></div>
              <div class="h-10 skeleton rounded-xl"></div>
              <div class="h-10 skeleton rounded-xl"></div>
              <div class="h-10 skeleton rounded-xl"></div>
            </div>
          </td></tr>
        </tbody>
      </table>
    </div>
    <div id="countBar" class="px-4 py-3 border-t border-white/10 text-xs text-slate-400 bg-white/[0.02]">Loading…</div>
  </section>

  <footer class="mt-8 text-center text-xs text-slate-500">
    Data via <a href="https://api.sleeper.app" class="text-amber-400 hover:underline" target="_blank" rel="noreferrer">Sleeper</a> & <a href="https://rosteraudit.com" class="text-amber-400 hover:underline" target="_blank" rel="noreferrer">Roster Audit</a>. 
    Rankings, values and trends © Roster Audit. Built for dynasty managers.
  </footer>
</div>

<script>
(() => {
  const state = {
    raw: [],
    filtered: [],
    sortKey: 'rank',
    sortDir: 'asc',
    pos: 'ALL',
    tep: false,
    search: '',
    ageMin: 18,
    ageMax: 40,
    minVal: 0,
    maxVal: 10000,
    expanded: new Set(),
    settings: { format: 'sf', scoring: 'ppr', tePremium: false }
  };

  const $ = sel => document.querySelector(sel);
  const $$ = sel => Array.from(document.querySelectorAll(sel));

  const presetBadge = $('#presetBadge');
  const tbody = $('#tbody');
  const countBar = $('#countBar');
  const settingsPop = $('#settingsPop');
  const formatSel = $('#formatSel');
  const scoringSel = $('#scoringSel');
  const tepToggle = $('#tepToggle');

  // UI helpers
  function formatKey() {
    const k = `${state.settings.format}_${state.settings.scoring}${state.settings.tePremium ? '_tep' : ''}`;
    presetBadge.textContent = k;
    return k;
  }

  function toggleSettings() {
    settingsPop.classList.toggle('hidden');
  }
  $('#settingsBtn').addEventListener('click', (e)=>{ e.stopPropagation(); toggleSettings(); });
  document.addEventListener('click', (e)=>{ if(!settingsPop.contains(e.target) && e.target.id!=='settingsBtn') settingsPop.classList.add('hidden'); });

  // TE Premium switch UI
  function updateTepUI() {
    const dot = tepToggle.nextElementSibling.querySelector('.dot');
    if (state.settings.tePremium) {
      tepToggle.nextElementSibling.classList.add('bg-amber-500/30','border-amber-500/40');
      dot.classList.add('translate-x-4','bg-amber-400');
    } else {
      tepToggle.nextElementSibling.classList.remove('bg-amber-500/30','border-amber-500/40');
      dot.classList.remove('translate-x-4','bg-amber-400');
    }
  }
  tepToggle.addEventListener('change', ()=>{});
  tepToggle.parentElement.addEventListener('click', (e)=>{
    e.preventDefault();
    state.settings.tePremium = !state.settings.tePremium;
    updateTepUI();
    persistSettings();
    formatKey();
    applyFilters();
  });

  // Position chips
  $('#posChips').addEventListener('click', e=>{
    const btn = e.target.closest('.chip');
    if(!btn) return;
    state.pos = btn.dataset.pos;
    $$('#posChips .chip').forEach(c=>c.classList.remove('chip-active','chip-active'));
    $$('#posChips .chip').forEach(c=>c.classList.remove('chip-active'));
    btn.classList.add('chip-active');
    applyFilters();
  });

  // Search
  let searchTO;
  $('#searchInp').addEventListener('input', e=>{
    clearTimeout(searchTO);
    searchTO = setTimeout(()=>{ state.search = e.target.value.trim().toLowerCase(); applyFilters(); }, 200);
  });

  // Age sliders
  const ageMin = $('#ageMin'), ageMax = $('#ageMax');
  const ageMinLabel = $('#ageMinLabel'), ageMaxLabel = $('#ageMaxLabel');
  function syncAge(){
    let min = +ageMin.value, max = +ageMax.value;
    if(min>max) [min,max]=[max,min];
    state.ageMin=min; state.ageMax=max;
    ageMinLabel.textContent=min; ageMaxLabel.textContent=max;
    applyFilters();
  }
  ageMin.addEventListener('input', syncAge);
  ageMax.addEventListener('input', syncAge);

  // Min value
  const minVal = $('#minVal'), minValLabel = $('#minValLabel');
  minVal.addEventListener('input', ()=>{
    state.minVal = +minVal.value;
    minValLabel.textContent = state.minVal.toLocaleString();
    applyFilters();
  });

  // Sorting
  $$('th[data-sort]').forEach(th=>{
    th.addEventListener('click', ()=>{
      const key = th.dataset.sort;
      if(state.sortKey===key) state.sortDir = state.sortDir==='asc'?'desc':'asc';
      else { state.sortKey=key; state.sortDir='asc'; }
      $$('th[data-sort]').forEach(h=>h.classList.remove('sort-asc','sort-desc'));
      th.classList.add(state.sortDir==='asc'?'sort-asc':'sort-desc');
      applyFilters();
    });
  });

  // Export CSV
  $('#exportBtn').addEventListener('click', ()=>{
    const rows = [['Rank','Player','Team','Age','Number','Pos','Value','PPG','7D','30D']];
    state.filtered.forEach(p=>{
      rows.push([p.rank,p.name,p.team||'',p.age??'',p.number??'',p.position,p.value,p.ppg??'',p.trend_7d??'',p.trend_30d??'']);
    });
    const csv = rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
    const blob = new Blob([csv],{type:'text/csv'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `dynasty-rankings-${formatKey()}.csv`;
    a.click();
    URL.revokeObjectURL(a.href);
  });

  // Fetch helpers with proxy fallback + cache
  const TTL = 1000*60*30; //30m
  async function fetchJSON(url, ttl=TTL){
    const key='ra_cache_'+btoa(url);
    try{
      const cached = localStorage.getItem(key);
      if(cached){
        const {ts,data}=JSON.parse(cached);
        if(Date.now()-ts < ttl) return data;
      }
    }catch{}
    const data = await fetchWithProxy(url);
    try{ localStorage.setItem(key, JSON.stringify({ts:Date.now(),data})); }catch{}
    return data;
  }
  async function fetchWithProxy(url){
    const attempts = [
      url,
      'https://api.allorigins.win/raw?url='+encodeURIComponent(url),
      'https://corsproxy.io/?'+encodeURIComponent(url)
    ];
    let lastErr;
    for(const u of attempts){
      try{
        const res = await fetch(u, {cache:'no-store'});
        if(!res.ok) throw new Error('HTTP '+res.status);
        const txt = await res.text();
        return JSON.parse(txt);
      }catch(e){ lastErr=e; continue; }
    }
    throw lastErr;
  }

  // Settings persist
  function persistSettings(){
    localStorage.setItem('ra_rankings_override', JSON.stringify(state.settings));
  }
  function loadSettings(){
    const over = localStorage.getItem('ra_rankings_override');
    if(over){
      try{ state.settings = {...state.settings, ...JSON.parse(over)} }catch{}
    }
    formatSel.value = state.settings.format;
    scoringSel.value = state.settings.scoring;
    updateTepUI();
    formatKey();
  }
  formatSel.addEventListener('change', ()=>{ state.settings.format = formatSel.value; persistSettings(); formatKey(); init(); });
  scoringSel.addEventListener('change', ()=>{ state.settings.scoring = scoringSel.value; persistSettings(); formatKey(); init(); });

  // Auto-detect league
  async function autoDetectLeague(){
    const leagueId = localStorage.getItem('vault_league_id');
    if(!leagueId) return;
    try{
      const league = await fetchJSON(`https://api.sleeper.app/v1/league/${leagueId}`, 1000*60*60);
      const rp = league.roster_positions||[];
      const isSF = rp.includes('SUPER_FLEX') || rp.filter(p=>p==='QB').length>1;
      const rec = league.scoring_settings?.rec ?? 1;
      const rec_te = league.scoring_settings?.rec_te ?? rec;
      const bonus_rec_te = league.scoring_settings?.bonus_rec_te ?? 0;
      const scoring = rec>=1 ? 'ppr' : rec>=0.5 ? 'half' : 'standard';
      const tePrem = rec_te>rec || bonus_rec_te>0;
      state.settings.format = isSF ? 'sf' : '1qb';
      state.settings.scoring = scoring;
      state.settings.tePremium = tePrem;
      formatSel.value = state.settings.format;
      scoringSel.value = state.settings.scoring;
      updateTepUI();
      formatKey();
      persistSettings();
    }catch(e){ console.warn('League detect failed', e); }
  }
  $('#detectBtn').addEventListener('click', autoDetectLeague);

  // Core data load
  async function loadSleeperMap(){
    const players = await fetchJSON('https://api.sleeper.app/v1/players/nfl', 1000*60*60*6);
    const map = {};
    Object.entries(players).forEach(([id,p])=>{
      if(!p) return;
      const pos = p.position;
      if(!['QB','RB','WR','TE'].includes(pos)) return;
      map[id] = p;
    });
    return map;
  }

  async function loadRankings(format){
    const all=[];
    for(let page=1; page<=8; page++){
      const url = `https://rosteraudit.com/wp-json/ra/v1/rankings?format=${format}&position=all&per_page=100&page=${page}`;
      try{
        const data = await fetchJSON(url, 1000*60*15);
        if(!Array.isArray(data) || data.length===0) break;
        all.push(...data);
        if(data.length<100) break;
      }catch(e){ console.warn('Rankings page fail', page, e); break; }
    }
    return all;
  }

  async function loadPPG(){
    try{
      const data = await fetchJSON('https://rosteraudit.com/wp-json/ra/v1/projections/ppg-rankings', 1000*60*30);
      const map={};
      if(Array.isArray(data)){
        data.forEach(d=>{
          const sid = d.sleeper_id || d.player_id || d.id;
          const ppg = d.ppg ?? d.fantasy_points_per_game ?? d.points_per_game ?? d.avg ?? null;
          if(sid && ppg!=null) map[sid]=Number(ppg);
        });
      }
      return map;
    }catch(e){ console.warn('PPG load fail', e); return {}; }
  }

  function merge(sleeperMap, rankings, ppgMap){
    const out=[];
    rankings.forEach(r=>{
      const sid = String(r.sleeper_id||r.player_id||r.id||'');
      const sp = sleeperMap[sid]||{};
      const name = r.player_name || sp.full_name || `${sp.first_name||''} ${sp.last_name||''}`.trim() || 'Unknown';
      const pos = r.position || sp.position || '';
      if(!['QB','RB','WR','TE'].includes(pos)) return;
      const team = r.team || sp.team || '';
      const age = r.age ?? sp.age ?? null;
      const number = sp.number ?? null;
      const value = Number(r.value)||0;
      const ppg = ppgMap[sid] ?? null;
      const trend_7d = r.trend_7d ?? r.trend7 ?? r.trend_7 ?? null;
      const trend_30d = r.trend_30d ?? r.trend30 ?? r.trend_30 ?? null;
      out.push({ sleeper_id:sid, name, position:pos, team, age, number, value, ppg, trend_7d, trend_30d });
    });
    // TE Premium boost for display only
    out.forEach(p=>{
      if(state.settings.tePremium && p.position==='TE'){
        p.value = Math.round(p.value*1.08);
      }
    });
    out.sort((a,b)=>b.value-a.value);
    out.forEach((p,i)=>p.rank=i+1);
    return out;
  }

  function applyFilters(){
    let list = [...state.raw];
    if(state.pos!=='ALL') list = list.filter(p=>p.position===state.pos);
    if(state.search) list = list.filter(p=>p.name.toLowerCase().includes(state.search));
    list = list.filter(p=>{
      const age = p.age??0;
      return age>=state.ageMin && age<=state.ageMax && p.value>=state.minVal;
    });
    // sort
    const key = state.sortKey;
    list.sort((a,b)=>{
      let av = a[key], bv = b[key];
      if(key==='name') return state.sortDir==='asc'? av.localeCompare(bv): bv.localeCompare(av);
      av = av??-Infinity; bv = bv??-Infinity;
      return state.sortDir==='asc'? av-bv : bv-av;
    });
    state.filtered = list;
    render();
  }

  function posBadge(pos){
    const map={ QB:'bg-sky-500/20 text-sky-300 border-sky-500/30', RB:'bg-emerald-500/20 text-emerald-300 border-emerald-500/30', WR:'bg-violet-500/20 text-violet-300 border-violet-500/30', TE:'bg-amber-500/20 text-amber-300 border-amber-500/30' };
    return `<span class="px-2 py-0.5 rounded-md text-[11px] font-semibold border ${map[pos]||'bg-white/10'}">${pos}</span>`;
  }
  function trendCell(v){
    if(v==null || isNaN(v)) return `<span class="text-slate-500">—</span>`;
    const num = Number(v);
    const cls = num>0?'text-emerald-400':num<0?'text-rose-400':'text-slate-400';
    const arrow = num>0?'▲':num<0?'▼':'•';
    return `<span class="${cls} font-medium">${arrow} ${Math.abs(num).toFixed(1)}</span>`;
  }

  function render(){
    if(state.filtered.length===0){
      tbody.innerHTML = `<tr><td colspan="7" class="px-4 py-12 text-center text-slate-500">No players match filters.</td></tr>`;
      countBar.textContent = `0 players`;
      return;
    }
    const rows = state.filtered.map(p=>{
      const isOpen = state.expanded.has(p.sleeper_id);
      return `
      <tr class="hover:bg-white/[0.03] cursor-pointer" data-id="${p.sleeper_id}">
        <td class="px-4 py-3 text-slate-400 font-medium">${p.rank}</td>
        <td class="px-4 py-3">
          <div class="flex items-center gap-3">
            <img src="https://sleepercdn.com/images/team_logos/nfl/${(p.team||'').toLowerCase()}.png" onerror="this.style.display='none'" class="w-7 h-7 rounded-lg bg-white/5 border border-white/10" alt="">
            <div>
              <div class="font-semibold leading-tight">${p.name}</div>
              <div class="text-xs text-slate-500">${p.team||'FA'} • ${p.age??'—'}${p.number? ' • #'+p.number:''}</div>
            </div>
          </div>
        </td>
        <td class="px-4 py-3">${posBadge(p.position)}</td>
        <td class="px-4 py-3 text-right font-semibold tabular-nums">${p.value.toLocaleString()}</td>
        <td class="px-4 py-3 text-right tabular-nums">${p.ppg!=null? p.ppg.toFixed(1): '<span class="text-slate-600">—</span>'}</td>
        <td class="px-4 py-3 text-right">${trendCell(p.trend_7d)}</td>
        <td class="px-4 py-3 text-right">${trendCell(p.trend_30d)}</td>
      </tr>
      ${isOpen? `<tr class="bg-white/[0.02]"><td colspan="7" class="px-4 py-3">
        <div class="grid md:grid-cols-4 gap-3 text-xs text-slate-400">
          <div><span class="text-slate-500">Sleeper ID:</span> ${p.sleeper_id}</div>
          <div><span class="text-slate-500">Team:</span> ${p.team||'FA'}</div>
          <div><span class="text-slate-500">Age:</span> ${p.age??'—'}</div>
          <div><span class="text-slate-500">Number:</span> ${p.number??'—'}</div>
        </div>
      </td></tr>`:''}
      `;
    }).join('');
    tbody.innerHTML = rows;
    countBar.textContent = `${state.filtered.length.toLocaleString()} players • Updated live • ${formatKey()}`;
    // row click expand
    tbody.querySelectorAll('tr[data-id]').forEach(tr=>{
      tr.addEventListener('click', ()=>{
        const id = tr.dataset.id;
        if(state.expanded.has(id)) state.expanded.delete(id); else state.expanded.add(id);
        render();
      });
    });
  }

  async function init(){
    try{
      loadSettings();
      await autoDetectLeague();
      formatKey();
      tbody.innerHTML = `<tr><td colspan="7" class="p-4"><div class="space-y-3">${Array(6).fill(0).map(()=>'<div class="h-12 skeleton rounded-xl"></div>').join('')}</div></td></tr>`;
      const [sleeperMap, rankings, ppgMap] = await Promise.all([
        loadSleeperMap(),
        loadRankings(state.settings.format),
        loadPPG()
      ]);
      state.raw = merge(sleeperMap, rankings, ppgMap);
      // set minVal max
      const maxVal = Math.max(...state.raw.map(p=>p.value), 0);
      state.maxVal = maxVal;
      minVal.max = maxVal;
      minVal.value = 0;
      minValLabel.textContent = '0';
      applyFilters();
    }catch(e){
      console.error(e);
      tbody.innerHTML = `<tr><td colspan="7" class="px-4 py-12 text-center text-rose-400">Failed to load rankings. ${e.message}</td></tr>`;
      countBar.textContent = `Error`;
    }
  }

  init();
})();
</script>
</body>
</html>
