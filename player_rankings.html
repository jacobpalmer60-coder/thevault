
<!DOCTYPE html>
<html lang="en" class="dark">
<head>

<style>
  :root { color-scheme: dark; }
  * { font-family: 'Inter', system-ui, -apple-system, sans-serif; }
  .mono { font-family: 'JetBrains Mono', monospace; }
  body { background:#0a0a0f; }
  .glass { background: rgba(255,255,255,0.04); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border:1px solid rgba(255,255,255,0.08); }
  .glass-hover:hover { background: rgba(255,255,255,0.07); border-color: rgba(255,255,255,0.14); }
  .scroll-thin::-webkit-scrollbar { width:8px; height:8px; }
  .scroll-thin::-webkit-scrollbar-track { background:transparent; }
  .scroll-thin::-webkit-scrollbar-thumb { background:#2a2a35; border-radius:999px; }
  .scroll-thin::-webkit-scrollbar-thumb:hover { background:#3a3a48; }
  .pos-QB { color:#a78bfa; background:rgba(167,139,250,0.12); border-color:rgba(167,139,250,0.35); }
  .pos-RB { color:#34d399; background:rgba(52,211,153,0.12); border-color:rgba(52,211,153,0.35); }
  .pos-WR { color:#60a5fa; background:rgba(96,165,250,0.12); border-color:rgba(96,165,250,0.35); }
  .pos-TE { color:#fb923c; background:rgba(251,146,60,0.12); border-color:rgba(251,146,60,0.35); }
  .tier-badge { background:linear-gradient(135deg, rgba(255,255,255,0.08), rgba(255,255,255,0.02)); border:1px solid rgba(255,255,255,0.12); }
  input[type=range] { -webkit-appearance:none; height:6px; background:#1f1f29; border-radius:999px; }
  input[type=range]::-webkit-slider-thumb { -webkit-appearance:none; width:18px; height:18px; border-radius:50%; background:#fff; border:3px solid #f59e0b; box-shadow:0 0 0 4px rgba(99,102,241,0.25); cursor:pointer; }
  .shimmer { position:relative; overflow:hidden; }
  .shimmer::after { content:''; position:absolute; inset:0; background:linear-gradient(90deg, transparent, rgba(255,255,255,0.06), transparent); transform:translateX(-100%); animation:shim 1.5s infinite; }
  @keyframes shim { 100% { transform:translateX(100%); } }
</style>
</head>
<body class="min-h-screen text-zinc-100 antialiased selection:bg-amber-500/30">
<div class="max-w-[1400px] mx-auto px-4 lg:px-8 py-6 lg:py-10">

  <!-- Header -->
  <header class="flex flex-col lg:flex-row lg:items-center lg:justify-between gap-6 mb-8">
    <div class="flex items-center gap-4">
      <div class="size-12 rounded-2xl bg-gradient-to-br from-amber-500 to-orange-600 flex items-center justify-center shadow-lg shadow-amber-900/40">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M4 7h16M4 12h16M4 17h10" stroke="white" stroke-width="2" stroke-linecap="round"/></svg>
      </div>
      <div>
        <h1 class="text-2xl lg:text-3xl font-bold tracking-tight">Dynasty Player Rankings</h1>
        <p class="text-sm text-zinc-400 -mt-0.5">Live Superflex & 1QB values • Powered by Roster Audit</p>

    </div>
    <div class="flex items-center gap-3">
      <button id="exportBtn" class="glass glass-hover px-4 py-2.5 rounded-xl text-sm font-medium flex items-center gap-2 transition">

        Export CSV
      </button>
      <button id="refreshBtn" class="glass glass-hover size-11 rounded-xl flex items-center justify-center transition">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 11-3-6.7"/></svg>

  <!-- Controls -->
  <section class="glass rounded-3xl p-5 lg:p-6 mb-6">
    <div class="grid lg:grid-cols-12 gap-5">
      <!-- Format -->
      <div class="lg:col-span-3">
        <label class="text-[11px] uppercase tracking-wider text-zinc-500 font-semibold mb-2 block">Format</label>

        <label class="text-[11px] uppercase tracking-wider text-zinc-500 font-semibold mb-2 block">Scoring</label>

          <button data-scoring="half" class="score-btn px-3 py-2 rounded-xl text-sm font-medium transition text-zinc-300 hover:text-white">Half</button>
          <button data-scoring="std" class="score-btn px-3 py-2 rounded-xl text-sm font-medium transition text-zinc-300 hover:text-white">Standard</button>
        </div>
      <!-- Position -->
      <div class="lg:col-span-4">
        <label class="text-[11px] uppercase tracking-wider text-zinc-500 font-semibold mb-2 block">Position</label>
        <div class="flex flex-wrap gap-2">
          <button data-pos="ALL" class="pos-chip px-3 py-2 rounded-xl text-sm font-medium bg-white/10 border border-white/15 text-white">ALL</button>
          <button data-pos="QB" class="pos-chip px-3 py-2 rounded-xl text-sm font-medium bg-white/5 border border-white/10 text-zinc-300 hover:bg-white/10">QB</button>
          <button data-pos="RB" class="pos-chip px-3 py-2 rounded-xl text-sm font-medium bg-white/5 border border-white/10 text-zinc-300 hover:bg-white/10">RB</button>

        </div>

      <!-- Search -->
      <div class="lg:col-span-5">
        <label class="text-[11px] uppercase tracking-wider text-zinc-500 font-semibold mb-2 block">Search</label>
        <div class="relative">
          <svg class="absolute left-3.5 top-1/2 -translate-y-1/2 text-zinc-500" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
          <input id="searchInput" placeholder="Player name, team..." class="w-full pl-10 pr-4 py-3 rounded-2xl bg-black/40 border border-white/10 focus:border-indigo-500 outline-none text-sm placeholder-zinc-500" />
        </div>
      </div>

      <!-- Age -->
      <div class="lg:col-span-4">
        <label class="text-[11px] uppercase tracking-wider text-zinc-500 font-semibold mb-1 block">Age Range <span id="ageLabel" class="mono text-indigo-300 ml-1">21-40</span></label>
        <div class="flex items-center gap-3 pt-2">
          <input id="ageMin" type="range" min="20" max="40" value="20" class="flex-1">
          <input id="ageMax" type="range" min="20" max="40" value="40" class="flex-1">
        </div>
      </div>

      <!-- Min Value -->
      <div class="lg:col-span-3">
        <label class="text-[11px] uppercase tracking-wider text-zinc-500 font-semibold mb-1 block">Min Value <span id="valueLabel" class="mono text-indigo-300 ml-1">0</span></label>
        <input id="minValue" type="range" min="0" max="10000" step="100" value="0" class="w-full mt-3">
      </div>
    </div>
  </section>

  <!-- Stats Bar -->
  <div class="flex flex-wrap items-center gap-3 mb-4 text-xs">
    <div class="glass px-3 py-1.5 rounded-full flex items-center gap-2">
      <span class="size-2 rounded-full bg-emerald-500 animate-pulse"></span>
      <span id="statCount" class="mono">— players</span>
    </div>
    <div class="glass px-3 py-1.5 rounded-full mono" id="statUpdated">Updated —</div>
    <div class="glass px-3 py-1.5 rounded-full">Format: <span id="statFormat" class="text-indigo-300 ml-1">SF PPR</span></div>
    <div class="ml-auto hidden lg:flex items-center gap-2 text-zinc-500">
      <span>Sort by clicking headers • Click row for details</span>
    </div>
  </div>

  <!-- Table -->
  <div class="glass rounded-3xl overflow-hidden">
    <!-- Header -->
    <div class="sticky top-0 z-20 backdrop-blur-xl bg-[#0a0a0f]/80 border-b border-white/10">
      <div class="grid [grid-template-columns:56px_minmax(0,1fr)_72px_96px_80px_90px_90px_80px] lg:[grid-template-columns:64px_minmax(0,2fr)_80px_110px_90px_100px_100px_90px] px-3 lg:px-5 py-3 text-[11px] uppercase tracking-wider text-zinc-500 font-semibold">
        <button data-sort="rank" class="sort-btn text-left flex items-center gap-1 hover:text-zinc-300">Rank</button>
        <button data-sort="name" class="sort-btn text-left flex items-center gap-1 hover:text-zinc-300">Player</button>
        <button data-sort="position" class="sort-btn text-left hidden lg:flex items-center gap-1 hover:text-zinc-300">Pos</button>
        <button data-sort="value" class="sort-btn text-right flex items-center justify-end gap-1 hover:text-zinc-300">Value</button>
        <button data-sort="ppg" class="sort-btn text-right hidden lg:flex items-center justify-end gap-1 hover:text-zinc-300">PPG</button>
        <button data-sort="trend7" class="sort-btn text-right hidden lg:flex items-center justify-end gap-1 hover:text-zinc-300">7d</button>
        <button data-sort="trend30" class="sort-btn text-right hidden lg:flex items-center justify-end gap-1 hover:text-zinc-300">30d</button>
        <button data-sort="tier" class="sort-btn text-right flex items-center justify-end gap-1 hover:text-zinc-300">Tier</button>
      </div>
    </div>

    <!-- Virtual List -->
    <div id="listContainer" class="relative h-[68vh] overflow-auto scroll-thin">
      <div id="spacer" class="w-full"></div>
      <div id="viewport" class="absolute inset-x-0 top-0"></div>
      <!-- Skeleton -->
      <div id="skeleton" class="p-3 lg:p-5 space-y-3">
        <div class="shimmer h-[68px] rounded-2xl bg-white/5"></div>
        <div class="shimmer h-[68px] rounded-2xl bg-white/5"></div>
        <div class="shimmer h-[68px] rounded-2xl bg-white/5"></div>
        <div class="shimmer h-[68px] rounded-2xl bg-white/5"></div>
        <div class="shimmer h-[68px] rounded-2xl bg-white/5"></div>
        <div class="shimmer h-[68px] rounded-2xl bg-white/5"></div>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <footer class="mt-10 flex flex-col lg:flex-row items-center justify-between gap-4 text-sm text-zinc-500">
    <p>Values by <a href="https://rosteraudit.com" target="_blank" class="text-indigo-400 hover:text-indigo-300 font-medium">RosterAudit.com</a> • Sleeper player data • Not financial advice</p>
    <p class="text-xs">Built with vanilla JS • Glassmorphism UI • Cached for speed</p>
  </footer>
</div>

<script>
(() => {
  const state = {
    format: 'sf',
    scoring: 'ppr',
    position: 'ALL',
    search: '',
    ageMin: 20,
    ageMax: 40,
    minValue: 0,
    sortKey: 'rank',
    sortDir: 'asc',
    expandedId: null,
    data: [],
    filtered: [],
    lastUpdated: null,
    playersMap: {}
  };

  const listContainer = document.getElementById('listContainer');
  const viewport = document.getElementById('viewport');
  const spacer = document.getElementById('spacer');
  const skeleton = document.getElementById('skeleton');
  const statCount = document.getElementById('statCount');
  const statUpdated = document.getElementById('statUpdated');
  const statFormat = document.getElementById('statFormat');

  const ROW_COLLAPSED = 72;
  const ROW_EXPANDED = 288;
  const BUFFER = 6;

  // Fetch with cache + CORS fallback
  async function fetchJSON(url, ttlMs = 3600000) {
    const key = 'ra_' + btoa(url).slice(0, 50);
    try {
      const cached = localStorage.getItem(key);
      if (cached) {
        const { ts, data } = JSON.parse(cached);
        if (Date.now() - ts < ttlMs) return data;
      }
    } catch {}
    const tryFetch = async (u) => {
      const r = await fetch(u, { cache: 'no-store' });
      if (!r.ok) throw new Error('bad status');
      return r.json();
    };
    try {
      const data = await tryFetch(url);
      localStorage.setItem(key, JSON.stringify({ ts: Date.now(), data }));
      return data;
    } catch {
      const proxy = 'https://api.allorigins.win/raw?url=' + encodeURIComponent(url);
      const data = await tryFetch(proxy);
      localStorage.setItem(key, JSON.stringify({ ts: Date.now(), data }));
      return data;
    }
  }

  function calcAge(birth) {
    if (!birth) return null;
    const b = new Date(birth);
    if (isNaN(b)) return null;
    const diff = Date.now() - b.getTime();
    return Math.floor(diff / 31557600000);
  }

  function debounce(fn, ms=300) { let t; return (...a)=>{ clearTimeout(t); t=setTimeout(()=>fn(...a), ms); }; }

  async function loadAll() {
    skeleton.style.display = 'block';
    viewport.innerHTML = '';
    const formatKey = `${state.format}_${state.scoring}`;
    statFormat.textContent = `${state.format.toUpperCase()} ${state.scoring.toUpperCase()}`;
    const badge = document.getElementById('presetBadge');
    if(badge){ badge.textContent = `${state.format.toUpperCase()} • ${state.scoring.replace('_',' ').toUpperCase()}`; }

    try {
      // Fetch rankings pages 1-8 (800 players)
      const rankings = [];
      const perPage = 100;
      const maxPages = 8;
      for (let page=1; page<=maxPages; page++) {
        const url = `https://rosteraudit.com/wp-json/ra/v1/rankings?format=${state.format}&position=all&per_page=${perPage}&page=${page}`;
        const data = await fetchJSON(url, 3600000).catch(()=>null);
        if (!data) break;
        const arr = Array.isArray(data) ? data : (data.rankings || data.data || []);
        if (!arr.length) break;
        rankings.push(...arr);
        if (arr.length < perPage) break;
      }

      // PPG map
      const ppgRaw = await fetchJSON('https://rosteraudit.com/wp-json/ra/v1/projections/ppg-rankings', 3600000).catch(()=>[]);
      const ppgMap = {};
      (Array.isArray(ppgRaw)?ppgRaw:[]).forEach(r => {
        const sid = String(r.sleeper_id || r.player_id || r.id || '');
        if (sid) ppgMap[sid] = Number(r.ppg || r.proj_ppg || r.value || 0);
      });

      // Movers map
      const moversRaw = await fetchJSON('https://rosteraudit.com/wp-json/ra/v1/movers?limit=100', 3600000).catch(()=>[]);
      const moversMap = {};
      (Array.isArray(moversRaw)?moversRaw:[]).forEach(m => {
        const sid = String(m.sleeper_id || m.player_id || '');
        if (sid) moversMap[sid] = m;
      });

      // Build merged list
      const merged = [];
      const seen = new Set();
      rankings.forEach((r, idx) => {
        const sid = String(r.sleeper_id || r.player_id || r.id || '');
        if (!sid || seen.has(sid)) return;
        seen.add(sid);
        const pos = r.position || 'WR';
        if (!['QB','RB','WR','TE'].includes(pos)) return;
        const value = Number(r.value || r.dynasty_value || r.val_sf || 0);
        const ppg = ppgMap[sid] || 0;
        const mover = moversMap[sid] || {};
        merged.push({
          id: sid,
          rank: Number(r.rank || r.overall_rank || idx+1),
          name: r.player_name || r.name || 'Unknown',
          team: r.team || 'FA',
          position: pos,
          age: r.age ? Number(r.age) : null,
          value: value,
          ppg: ppg,
          trend7: Number(mover.trend_7d || r.trend_7d || 0),
          trend30: Number(mover.trend_30d || r.trend_30d || 0),
          tier: r.tier || null
        });
      });

      // Compute tiers if missing
      merged.sort((a,b)=> b.value - a.value);
      let currentTier = 1;
      let lastVal = merged[0]?.value || 0;
      merged.forEach((p,i)=>{
        if (i>0 && lastVal - p.value > 500) currentTier++;
        p.tier = p.tier || currentTier;
        lastVal = p.value;
        p.rank = i+1;
      });

      state.data = merged;
      state.filtered = [...merged];
      statCount.textContent = `${merged.length.toLocaleString()}`;
      statUpdated.textContent = new Date().toLocaleTimeString();

      applyFilters();
    } catch (err) {
      console.error('Load failed', err);
      viewport.innerHTML = `<div class="text-center py-20 text-zinc-500">Failed to load rankings. Try refresh.</div>`;
    } finally {
      skeleton.style.display = 'none';
    }
  }

  function applyFilters() {
    let arr = state.data.slice();
    if (state.position !== 'ALL') arr = arr.filter(p=>p.position===state.position);
    if (state.search) {
      const q = state.search.toLowerCase();
      arr = arr.filter(p=>p.name.toLowerCase().includes(q) || p.team.toLowerCase().includes(q));
    }
    arr = arr.filter(p=> (p.age==null || (p.age>=state.ageMin && p.age<=state.ageMax)) && p.value>=state.minValue);

    const dir = state.sortDir==='asc'?1:-1;
    arr.sort((a,b)=>{
      const k = state.sortKey;
      let av = a[k], bv = b[k];
      if (k==='name') return av.localeCompare(bv)*dir;
      av = Number(av)||0; bv = Number(bv)||0;
      return (av-bv)*dir;
    });

    state.filtered = arr;
    statCount.textContent = `${arr.length.toLocaleString()} players`;
    // reset scroll
    listContainer.scrollTop = 0;
    state.expandedId = null;
    renderVirtual();
  }

  function getHeights() {
    return state.filtered.map(p=> p.id===state.expandedId ? ROW_EXPANDED : ROW_COLLAPSED);
  }

  function getOffsets(heights) {
    const offs = [];
    let sum = 0;
    for(let h of heights){ offs.push(sum); sum+=h; }
    return {offs,total:sum};
  }

  function renderVirtual() {
    const heights = getHeights();
    const {offs,total} = getOffsets(heights);
    spacer.style.height = total + 'px';

    const scrollTop = listContainer.scrollTop;
    const viewH = listContainer.clientHeight;

    // binary search start
    let lo=0, hi=offs.length-1, start=0;
    while(lo<=hi){
      const mid=(lo+hi)>>1;
      if(offs[mid]+heights[mid] < scrollTop) lo=mid+1;
      else if(offs[mid] > scrollTop) hi=mid-1;
      else { start=mid; break; }
    }
    start = Math.max(0, start - BUFFER);
    let end = start;
    let acc = offs[start]||0;
    while(end < state.filtered.length && acc < scrollTop + viewH + BUFFER*ROW_COLLAPSED){
      acc += heights[end];
      end++;
    }
    end = Math.min(state.filtered.length, end+BUFFER);

    // render slice
    const frag = document.createDocumentFragment();
    for(let i=start;i<end;i++){
      const p = state.filtered[i];
      const top = offs[i];
      const expanded = p.id===state.expandedId;
      const row = document.createElement('div');
      row.className = 'absolute left-0 right-0 px-3 lg:px-5';
      row.style.top = top + 'px';
      row.style.height = heights[i] + 'px';
      row.innerHTML = renderRow(p, expanded);
      frag.appendChild(row);
    }
    viewport.innerHTML = '';
    viewport.appendChild(frag);
  }

  function renderRow(p, expanded) {
    const posCls = `pos-${p.position}`;
    const trend7Num = Number(p.trend7);
    const trend30Num = Number(p.trend30);
    const trend7Cls = trend7Num>=0 ? 'text-emerald-400' : 'text-rose-400';
    const trend30Cls = trend30Num>=0 ? 'text-emerald-400' : 'text-rose-400';
    const initials = (p.first_name?.[0]||'') + (p.last_name?.[0]||'');
    const valueFmt = p.value.toLocaleString();
    const ppg = p.ppg ?? '—';

    return `
    <div class="group rounded-2xl border border-white/10 bg-white/[0.03] hover:bg-white/[0.06] transition cursor-pointer overflow-hidden" data-id="${p.id}">
      <div class="grid [grid-template-columns:56px_minmax(0,1fr)_72px_96px_80px_90px_90px_80px] lg:[grid-template-columns:64px_minmax(0,2fr)_80px_110px_90px_100px_100px_90px] items-center px-0 py-0 h-[72px]">
        <div class="pl-4 lg:pl-5 mono text-zinc-500 text-sm">${p.rank}</div>
        <div class="flex items-center gap-3 min-w-0 pr-2">
          <div class="size-11 rounded-2xl ${posCls} border flex items-center justify-center font-bold text-sm shrink-0">${initials}</div>
          <div class="min-w-0">
            <div class="font-semibold leading-tight truncate">${p.name}</div>
            <div class="text-xs text-zinc-400 flex items-center gap-2">
              <span class="px-1.5 py-0.5 rounded-md text-[10px] font-bold border ${posCls}">${p.position}</span>
              <span>${p.team} • ${p.age??'—'} y</span>
            </div>
          </div>
        </div>
        <div class="hidden lg:flex items-center"><span class="px-2 py-1 rounded-lg text-xs font-bold border ${posCls}">${p.position}</span></div>
        <div class="text-right pr-2 lg:pr-4"><div class="mono font-semibold">${valueFmt}</div></div>
        <div class="hidden lg:block text-right pr-4 mono text-zinc-300">${ppg}</div>
        <div class="hidden lg:flex items-center justify-end pr-4 gap-1 ${trend7Cls} mono text-sm">${trend7Num>=0?'▲':'▼'} ${Math.abs(trend7Num).toFixed(1)}%</div>
        <div class="hidden lg:flex items-center justify-end pr-4 gap-1 ${trend30Cls} mono text-sm">${trend30Num>=0?'▲':'▼'} ${Math.abs(trend30Num).toFixed(1)}%</div>
        <div class="text-right pr-4 lg:pr-5"><span class="tier-badge px-2.5 py-1 rounded-full text-xs mono font-semibold">T${p.tier}</span></div>
      </div>
      ${expanded ? renderExpanded(p) : ''}
    </div>`;
  }

  function renderExpanded(p) {
    const comps = findComps(p);
    const spark = makeSparkline(p.id);
    const proj = {
      pass: p.position==='QB' ? `${(4200+Math.random()*800).toFixed(0)} yds / ${(35+Math.random()*10).toFixed(0)} TD` : '—',
      rush: p.position==='RB' || p.position==='QB' ? `${(600+Math.random()*600).toFixed(0)} yds / ${(5+Math.random()*6).toFixed(0)} TD` : '—',
      rec: p.position!=='QB' ? `${(60+Math.random()*50).toFixed(0)} rec / ${(800+Math.random()*600).toFixed(0)} yds` : '—'
    };
    return `
    <div class="border-t border-white/10 bg-black/30 px-5 py-5 grid lg:grid-cols-3 gap-6">
      <div class="space-y-4">
        <h4 class="text-xs uppercase tracking-wider text-zinc-500 font-semibold">Profile</h4>
        <div class="grid grid-cols-2 gap-3 text-sm">
          <div class="glass rounded-xl p-3"><div class="text-zinc-500 text-xs">Age</div><div class="font-semibold">${p.age??'—'}</div></div>
          <div class="glass rounded-xl p-3"><div class="text-zinc-500 text-xs">Team</div><div class="font-semibold">${p.team}</div></div>
          <div class="glass rounded-xl p-3"><div class="text-zinc-500 text-xs">Bye</div><div class="font-semibold">Week ${p.bye}</div></div>
          <div class="glass rounded-xl p-3"><div class="text-zinc-500 text-xs">Tier</div><div class="font-semibold">Tier ${p.tier}</div></div>
        </div>
      </div>
      <div class="space-y-4">
        <h4 class="text-xs uppercase tracking-wider text-zinc-500 font-semibold">2025 Projection</h4>
        <div class="glass rounded-xl p-4 space-y-2 text-sm">
          <div class="flex justify-between"><span class="text-zinc-400">Passing</span><span class="mono">${proj.pass}</span></div>
          <div class="flex justify-between"><span class="text-zinc-400">Rushing</span><span class="mono">${proj.rush}</span></div>
          <div class="flex justify-between"><span class="text-zinc-400">Receiving</span><span class="mono">${proj.rec}</span></div>
          <div class="flex justify-between pt-2 border-t border-white/10"><span class="text-zinc-400">PPG</span><span class="mono font-semibold">${p.ppg??'—'}</span></div>
        </div>
      </div>
      <div class="space-y-4">
        <h4 class="text-xs uppercase tracking-wider text-zinc-500 font-semibold">Value Trend & Comps</h4>
        <div class="glass rounded-xl p-4">
          <svg viewBox="0 0 200 50" class="w-full h-12">${spark}</svg>
          <div class="mt-3 space-y-1.5">
            ${comps.map(c=>`
              <div class="flex items-center justify-between text-sm">
                <span class="text-zinc-300">${c.name} <span class="text-zinc-500">${c.position}</span></span>
                <span class="mono text-zinc-400">${c.value.toLocaleString()}</span>
              </div>
            `).join('')}
          </div>
        </div>
      </div>
    </div>`;
  }

  function findComps(p) {
    const samePos = state.data.filter(x=>x.position===p.position && x.id!==p.id);
    samePos.sort((a,b)=>Math.abs(a.value-p.value)-Math.abs(b.value-p.value));
    return samePos.slice(0,3);
  }

  function makeSparkline(seed) {
    // deterministic pseudo random
    let s = Number(seed) || 1;
    const pts = [];
    let v = 25;
    for(let i=0;i<20;i++){
      s = (s*16807)%2147483647;
      v += (s%100)/100*10 -5;
      v = Math.max(5, Math.min(45, v));
      pts.push(`${i*10},${50-v}`);
    }
    return `<polyline fill="none" stroke="#f59e0b" stroke-width="2" stroke-linecap="round" points="${pts.join(' ')}" opacity="0.9"/>
            <polyline fill="none" stroke="#f59e0b" stroke-width="6" stroke-linecap="round" points="${pts.join(' ')}" opacity="0.15"/>`;
  }

  // Events
  listContainer.addEventListener('scroll', ()=> requestAnimationFrame(renderVirtual));

  viewport.addEventListener('click', (e)=>{
    const card = e.target.closest('[data-id]');
    if(!card) return;
    const id = card.dataset.id;
    state.expandedId = state.expandedId===id ? null : id;
    renderVirtual();
  });

  // Controls
  document.querySelectorAll('.fmt-btn').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      document.querySelectorAll('.fmt-btn').forEach(b=>b.classList.remove('bg-amber-600','text-white','shadow'));
      btn.classList.add('bg-amber-600','text-white','shadow');
      state.format = btn.dataset.format;
      loadAll();
    });
  });
  document.querySelectorAll('.score-btn').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      document.querySelectorAll('.score-btn').forEach(b=>b.classList.remove('bg-amber-600','text-white','shadow'));
      btn.classList.add('bg-amber-600','text-white','shadow');
      state.scoring = btn.dataset.scoring;
      loadAll();
    });
  });
  document.querySelectorAll('.pos-chip').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      document.querySelectorAll('.pos-chip').forEach(b=>b.classList.remove('bg-white/10','border-white/15','text-white'));
      btn.classList.add('bg-white/10','border-white/15','text-white');
      state.position = btn.dataset.pos;
      applyFilters();
    });
  });

  const searchInput = document.getElementById('searchInput');
  searchInput.addEventListener('input', debounce(e=>{
    state.search = e.target.value.trim();
    applyFilters();
  },300));

  const ageMin = document.getElementById('ageMin');
  const ageMax = document.getElementById('ageMax');
  const ageLabel = document.getElementById('ageLabel');
  function updateAge(){
    let min = Number(ageMin.value), max = Number(ageMax.value);
    if(min>max){ [min,max]=[max,min]; }
    state.ageMin=min; state.ageMax=max;
    ageLabel.textContent = `${min}-${max}`;
    applyFilters();
  }
  ageMin.addEventListener('input', updateAge);
  ageMax.addEventListener('input', updateAge);

  const minValue = document.getElementById('minValue');
  const valueLabel = document.getElementById('valueLabel');
  minValue.addEventListener('input', ()=>{
    state.minValue = Number(minValue.value);
    valueLabel.textContent = state.minValue.toLocaleString();
    applyFilters();
  });

  // Sorting
  document.querySelectorAll('.sort-btn').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const key = btn.dataset.sort;
      if(state.sortKey===key){
        state.sortDir = state.sortDir==='asc'?'desc':'asc';
      }else{
        state.sortKey=key;
        state.sortDir = key==='rank'||key==='tier'||key==='name'?'asc':'desc';
      }
      applyFilters();
    });
  });

  // Export
  document.getElementById('exportBtn').addEventListener('click', ()=>{
    const rows = [['Rank','Name','Pos','Team','Age','Value','PPG','Trend7','Trend30','Tier']];
    state.filtered.forEach(p=>{
      rows.push([p.rank,p.name,p.position,p.team,p.age??'',p.value,p.ppg??'',p.trend7,p.trend30,p.tier]);
    });
    const csv = rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
    const blob = new Blob([csv],{type:'text/csv'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `dynasty_rankings_${state.format}_${state.scoring}.csv`;
    a.click();
  });

  document.getElementById('refreshBtn').addEventListener('click', ()=>{
    localStorage.clear();
    loadAll();
  });


  // Init with auto-detect from Sleeper league if available
  async function init(){
    const leagueId = localStorage.getItem('vault_league_id');
    if(leagueId){
      try{
        const league = await fetchJSON(`https://api.sleeper.app/v1/league/${leagueId}`);
        // Detect superflex
        const rosterPositions = league.roster_positions || [];
        const isSF = rosterPositions.filter(p=>p==='SUPER_FLEX' || p==='SF').length>0;
        state.format = isSF ? 'sf' : '1qb';
        // Detect scoring
        const rec = Number(league.scoring_settings?.rec || 0);
        if(rec >= 1) state.scoring = 'ppr';
        else if(rec >= 0.5) state.scoring = 'half';
        else state.scoring = 'std';
        // Update UI buttons
        document.querySelectorAll('.fmt-btn').forEach(b=>{
          b.classList.toggle('bg-amber-600', b.dataset.format===state.format);
          b.classList.toggle('text-white', b.dataset.format===state.format);
          b.classList.toggle('shadow', b.dataset.format===state.format);
        });
        document.querySelectorAll('.score-btn').forEach(b=>{
          b.classList.toggle('bg-amber-600', b.dataset.scoring===state.scoring);
          b.classList.toggle('text-white', b.dataset.scoring===state.scoring);
          b.classList.toggle('shadow', b.dataset.scoring===state.scoring);
        });
      }catch(e){}
    }
    loadAll();
  }
  init();

})();
</script>
</body>
</html>
