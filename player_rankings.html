  :root { color-scheme: dark; }
  html { font-family: 'Inter', system-ui, -apple-system, sans-serif; }

<script>
(() => {
  const STATE = {
    format: 'sf',
    scoring: 'ppr',
    tep: false,
    position: 'All',
    search: '',
    rows: [],
    loading: false,
  };

  const DOM = {
    statusPill: document.getElementById('statusPill'),
    tableBody: document.getElementById('tableBody'),
    rowCount: document.getElementById('rowCount'),
    searchInput: document.getElementById('searchInput'),
    refreshBtn: document.getElementById('refreshBtn'),
    csvBtn: document.getElementById('csvBtn'),
    tepToggle: document.getElementById('tepToggle'),
    errorBanner: document.getElementById('errorBanner'),
    errorText: document.getElementById('errorText'),
    retryBtn: document.getElementById('retryBtn'),
  };

  // Persistence
  const SETTINGS_KEY = 'ra_dashboard_settings_v1';
  function loadSettings() {
    try {
      const s = JSON.parse(localStorage.getItem(SETTINGS_KEY) || '{}');
      STATE.format = s.format || 'sf';
      STATE.scoring = s.scoring || 'ppr';
      STATE.tep = !!s.tep;
      STATE.position = s.position || 'All';
      STATE.search = s.search || '';
    } catch {}
  }
  function saveSettings() {
    localStorage.setItem(SETTINGS_KEY, JSON.stringify({
      format: STATE.format,
      scoring: STATE.scoring,
      tep: STATE.tep,
      position: STATE.position,
      search: STATE.search,
    }));
  }

  // Cache helpers
  const now = () => Date.now();
  function getCache(key, maxAgeMs) {
    try {
      const raw = localStorage.getItem(key);
      if (!raw) return null;
      const { ts, data } = JSON.parse(raw);
      if (now() - ts > maxAgeMs) return null;
      return data;
    } catch { return null; }
  }
  function setCache(key, data) {
    localStorage.setItem(key, JSON.stringify({ ts: now(), data }));
  }

  // Proxy fetch
  async function fetchWithProxy(url, label='') {
    const proxies = [
      { name: 'direct', fn: u => u },
      { name: 'allorigins', fn: u => `https://api.allorigins.win/raw?url=${encodeURIComponent(u)}` },
      { name: 'corsproxy', fn: u => `https://corsproxy.io/?${encodeURIComponent(u)}` },
    ];
    let lastErr;
    for (const p of proxies) {
      try {
        console.log(`[Fetch] ${label} → ${p.name}`);
        const res = await fetch(p.fn(url), { cache: 'no-store' });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const ct = res.headers.get('content-type') || '';
        const data = ct.includes('application/json') ? await res.json() : JSON.parse(await res.text());
        console.log(`[Fetch] ${label} ✓ via ${p.name}`);
        return data;
      } catch (e) {
        console.warn(`[Fetch] ${label} ✗ ${p.name}: ${e.message}`);
        lastErr = e;
        continue;
      }
    }
    throw lastErr || new Error('All proxies failed');
  }

  // Endpoints
  const EP = {
    sleeperPlayers: 'https://api.sleeper.app/v1/players/nfl',
    values: (key) => `https://rosteraudit.com/wp-json/ra/v1/rankings/values?format_key=${key}`,
    ppgRankings: 'https://rosteraudit.com/wp-json/ra/v1/projections/ppg-rankings',
    movers: 'https://rosteraudit.com/wp-json/ra/v1/movers?limit=200',
    embed: (id) => `https://rosteraudit.com/wp-json/ra/v1/projections/embed/${id}`,
  };

  // Status
  function setStatus(state, msg='') {
    const dot = DOM.statusPill.querySelector('span');
    const text = DOM.statusPill.querySelector('span.mono');
    DOM.statusPill.classList.remove('border-emerald-500/30','border-amber-500/30','border-red-500/30');
    if (state === 'loading') {
      dot.className = 'size-2 rounded-full bg-amber-400 animate-pulse';
      text.textContent = msg || 'LOADING';
      DOM.statusPill.classList.add('border-amber-500/30');
    } else if (state === 'error') {
      dot.className = 'size-2 rounded-full bg-red-500';
      text.textContent = 'ERROR';
      DOM.statusPill.classList.add('border-red-500/30');
    } else {
      dot.className = 'size-2 rounded-full bg-emerald-400';
      text.textContent = 'READY';
      DOM.statusPill.classList.add('border-emerald-500/30');
    }
  }

  // Data loading
  async function loadData(force=false) {
    if (STATE.loading) return;
    STATE.loading = true;
    setStatus('loading','INITIALIZING');
    DOM.errorBanner.classList.add('hidden');
    DOM.refreshBtn.disabled = true;
    DOM.refreshBtn.classList.add('opacity-60','cursor-not-allowed');

    try {
      // 1. Sleeper players
      setStatus('loading','PLAYERS');
      const PLAYER_CACHE_KEY = 'ra_cache_players';
      let players = !force ? getCache(PLAYER_CACHE_KEY, 24*60*60*1000) : null;
      if (!players) {
        console.log('[Phase] Fetching Sleeper players');
        players = await fetchWithProxy(EP.sleeperPlayers, 'sleeper_players');
        setCache(PLAYER_CACHE_KEY, players);
      } else {
        console.log('[Cache] Sleeper players hit');
      }

      const playersMap = players; // object keyed by id

      // 2. Values
      setStatus('loading','VALUES');
      const formatKey = `${STATE.format}_${STATE.scoring}${STATE.tep ? '_tep' : ''}`;
      const VALUES_CACHE_KEY = `ra_cache_values_${formatKey}`;
      let valuesResp = !force ? getCache(VALUES_CACHE_KEY, 60*60*1000) : null;
      if (!valuesResp) {
        console.log('[Phase] Fetching values', formatKey);
        valuesResp = await fetchWithProxy(EP.values(formatKey), 'values');
        setCache(VALUES_CACHE_KEY, valuesResp);
      }

      // Normalize values to array
      const valuesArr = Array.isArray(valuesResp) ? valuesResp
        : (valuesResp.data || valuesResp.players || valuesResp.values || Object.values(valuesResp));

      // 3. PPG rankings
      setStatus('loading','PPG');
      const PPG_CACHE_KEY = 'ra_cache_ppg';
      let ppgResp = !force ? getCache(PPG_CACHE_KEY, 60*60*1000) : null;
      if (!ppgResp) {
        console.log('[Phase] Fetching PPG rankings');
        ppgResp = await fetchWithProxy(EP.ppgRankings, 'ppg');
        setCache(PPG_CACHE_KEY, ppgResp);
      }
      const ppgArr = Array.isArray(ppgResp) ? ppgResp : (ppgResp.data || Object.values(ppgResp));
      const ppgMap = new Map();
      for (const p of ppgArr) {
        const id = p.sleeper_id || p.player_id || p.id;
        const val = p.ppg || p.value || p.projected_ppg || p.avg;
        if (id) ppgMap.set(String(id), Number(val) || null);
      }

      // 4. Movers
      setStatus('loading','MOVERS');
      const MOVERS_CACHE_KEY = 'ra_cache_movers';
      let moversResp = !force ? getCache(MOVERS_CACHE_KEY, 60*60*1000) : null;
      if (!moversResp) {
        console.log('[Phase] Fetching movers');
        moversResp = await fetchWithProxy(EP.movers, 'movers');
        setCache(MOVERS_CACHE_KEY, moversResp);
      }
      const moversArr = Array.isArray(moversResp) ? moversResp : (moversResp.data || []);
      const moversMap = new Map();
      for (const m of moversArr) {
        const id = m.sleeper_id || m.player_id || m.id;
        if (id) moversMap.set(String(id), {
          d7: m.change_7d ?? m['7d'] ?? m.week ?? 0,
          d30: m.change_30d ?? m['30d'] ?? m.month ?? 0,
        });
      }

      // Build rows
      setStatus('loading','MERGING');
      const rows = [];
      for (const v of valuesArr) {
        const id = String(v.sleeper_id || v.player_id || v.id || v.sleeperId || '');
        if (!id) continue;
        const p = playersMap[id];
        if (!p) continue;
        const pos = p.position || v.position || '';
        if (!['QB','RB','WR','TE'].includes(pos)) continue;
        const name = p.full_name || `${p.first_name||''} ${p.last_name||''}`.trim() || v.name || 'Unknown';
        const team = p.team || v.team || '';
        const value = Number(v.value ?? v.dynasty_value ?? v.rank_value ?? 0) || 0;
        const ppg = ppgMap.get(id) ?? null;
        const mover = moversMap.get(id) || { d7:0, d30:0 };
        rows.push({
          id, name, pos, team, value, ppg,
          d7: Number(mover.d7)||0,
          d30: Number(mover.d30)||0,
          search: `${name} ${team} ${pos}`.toLowerCase(),
        });
      }

      // Sort by value desc
      rows.sort((a,b)=> b.value - a.value);

      STATE.rows = rows;
      console.log(`[Data] Built ${rows.length} rows`);

      // Fill missing PPG for top 100
      await fillMissingPPG(rows);

      render();
      setStatus('ready');
    } catch (err) {
      console.error(err);
      setStatus('error');
      DOM.errorText.textContent = err.message || String(err);
      DOM.errorBanner.classList.remove('hidden');
    } finally {
      STATE.loading = false;
      DOM.refreshBtn.disabled = false;
      DOM.refreshBtn.classList.remove('opacity-60','cursor-not-allowed');
    }
  }

  // Fill missing PPG via embed
  async function fillMissingPPG(rows) {
    const EMBED_CACHE_KEY = 'ra_cache_embed_map';
    let embedCache = getCache(EMBED_CACHE_KEY, 24*60*60*1000) || {};
    const need = rows
      .filter(r => r.value > 0 && (r.ppg === null || r.ppg === 0))
      .sort((a,b)=> b.value - a.value)
      .slice(0, 100);

    if (need.length === 0) return;

    console.log(`[Phase] Filling missing PPG for ${need.length} players`);
    setStatus('loading', `PPG EMBED 0/${need.length}`);

    const concurrency = 5;
    let idx = 0;
    let done = 0;

    async function worker() {
      while (idx < need.length) {
        const i = idx++;
        const row = need[i];
        const id = row.id;
        try {
          if (embedCache[id] && typeof embedCache[id].ppg === 'number') {
            row.ppg = embedCache[id].ppg;
          } else {
            const data = await fetchWithProxy(EP.embed(id), `embed_${id}`);
            // Try to extract ppg
            const ppg = Number(data.ppg ?? data.projected_ppg ?? data.avg_ppg ?? data?.projections?.ppg ?? 0) || null;
            embedCache[id] = { ppg, ts: now() };
            row.ppg = ppg;
            setCache(EMBED_CACHE_KEY, embedCache);
          }
        } catch (e) {
          console.warn('Embed fail', id, e.message);
          row.ppg = row.ppg ?? null;
        }
        done++;
        setStatus('loading', `PPG EMBED ${done}/${need.length}`);
        // modest yield to UI
        if (done % 10 === 0) await new Promise(r => setTimeout(r, 0));
      }
    }

    await Promise.all(Array.from({length: concurrency}, () => worker()));
    console.log('[Phase] Embed fill complete');
  }

  // Rendering
  function render() {
    // Update controls UI
    document.querySelectorAll('[data-format]').forEach(b=>{
      b.classList.toggle('bg-white/15', b.dataset.format === STATE.format);
      b.classList.toggle('text-white', b.dataset.format === STATE.format);
      b.classList.toggle('text-slate-300', b.dataset.format !== STATE.format);
    });
    document.querySelectorAll('[data-scoring]').forEach(b=>{
      b.classList.toggle('bg-white/15', b.dataset.scoring === STATE.scoring);
      b.classList.toggle('text-white', b.dataset.scoring === STATE.scoring);
      b.classList.toggle('text-slate-300', b.dataset.scoring !== STATE.scoring);
    });
    DOM.tepToggle.checked = STATE.tep;
    document.querySelectorAll('.pos-chip').forEach(b=>{
      const active = b.dataset.pos === STATE.position;
      b.classList.toggle('bg-fuchsia-500/20', active);
      b.classList.toggle('border-fuchsia-500/40', active);
      b.classList.toggle('text-fuchsia-200', active);
    });
    DOM.searchInput.value = STATE.search;

    // Filter
    const q = STATE.search.trim().toLowerCase();
    let filtered = STATE.rows;
    if (STATE.position !== 'All') filtered = filtered.filter(r => r.pos === STATE.position);
    if (q) filtered = filtered.filter(r => r.search.includes(q));

    // Render rows
    const frag = document.createDocumentFragment();
    filtered.slice(0, 500).forEach((r, i) => {
      const tr = document.createElement('tr');
      tr.className = 'hover:bg-white/[0.03] transition';
      tr.innerHTML = `
        <td class="text-right px-4 py-2.5 text-slate-500 mono">${i+1}</td>
        <td class="px-4 py-2.5">
          <div class="flex items-center gap-3">
            <img src="https://sleepercdn.com/content/nfl/players/thumb/${r.id}.jpg" onerror="this.style.display='none'" class="size-9 rounded-xl bg-black/40 border border-white/10 object-cover"/>
            <div class="min-w-0">
              <div class="font-medium leading-tight truncate">${escapeHtml(r.name)}</div>
              <div class="text-xs text-slate-500">${r.team||'FA'} • #${r.id.slice(0,4)}</div>
            </div>
          </div>
        </td>
        <td class="px-4 py-2.5">
          <span class="inline-flex items-center px-2 py-0.5 rounded-lg text-xs font-medium border ${posClass(r.pos)}">${r.pos}</span>
        </td>
        <td class="text-right px-4 py-2.5 mono font-medium">${r.value ? r.value.toLocaleString() : '—'}</td>
        <td class="text-right px-4 py-2.5 mono">${r.ppg ? r.ppg.toFixed(1) : '—'}</td>
        <td class="text-right px-4 py-2.5 mono ${deltaClass(r.d7)}">${fmtDelta(r.d7)}</td>
        <td class="text-right px-4 py-2.5 mono ${deltaClass(r.d30)}">${fmtDelta(r.d30)}</td>
      `;
      frag.appendChild(tr);
    });
    DOM.tableBody.innerHTML = '';
    DOM.tableBody.appendChild(frag);
    DOM.rowCount.textContent = `${filtered.length.toLocaleString()} players • ${STATE.rows.length.toLocaleString()} total`;
  }

  function posClass(pos) {
    switch(pos) {
      case 'QB': return 'border-sky-500/30 bg-sky-500/10 text-sky-300';
      case 'RB': return 'border-emerald-500/30 bg-emerald-500/10 text-emerald-300';
      case 'WR': return 'border-fuchsia-500/30 bg-fuchsia-500/10 text-fuchsia-300';
      case 'TE': return 'border-amber-500/30 bg-amber-500/10 text-amber-300';
      default: return 'border-white/10 bg-white/5 text-slate-300';
    }
  }
  function deltaClass(v){ return v>0?'text-emerald-400': v<0?'text-red-400':'text-slate-500'; }
  function fmtDelta(v){
    if (!v) return '—';
    const s = v>0?'+':'';
    return `${s}${Number(v).toFixed(1)}`;
  }
  function escapeHtml(s){ return s.replace(/[&<>"']/g,m=>({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }

  // CSV export
  function exportCSV() {
    const q = STATE.search.trim().toLowerCase();
    let filtered = STATE.rows;
    if (STATE.position !== 'All') filtered = filtered.filter(r => r.pos === STATE.position);
    if (q) filtered = filtered.filter(r => r.search.includes(q));

    const headers = ['Rank','Player','Pos','Team','Value','PPG','7D','30D','SleeperID'];
    const lines = [headers.join(',')];
    filtered.forEach((r,i)=>{
      const row = [
        i+1,
        `"${r.name.replace(/"/g,'""')}"`,
        r.pos,
        r.team||'',
        r.value||'',
        r.ppg? r.ppg.toFixed(2):'',
        r.d7||'',
        r.d30||'',
        r.id
      ];
      lines.push(row.join(','));
    });
    const blob = new Blob([lines.join('\n')], {type:'text/csv'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `rosteraudit_${STATE.format}_${STATE.scoring}${STATE.tep?'_tep':''}.csv`;
    a.click();
    URL.revokeObjectURL(a.href);
  }

  // Events
  document.querySelectorAll('[data-format]').forEach(b=> b.addEventListener('click',()=>{
    STATE.format = b.dataset.format;
    saveSettings();
    loadData();
  }));
  document.querySelectorAll('[data-scoring]').forEach(b=> b.addEventListener('click',()=>{
    STATE.scoring = b.dataset.scoring;
    saveSettings();
    loadData();
  }));
  DOM.tepToggle.addEventListener('change', e=>{
    STATE.tep = e.target.checked;
    saveSettings();
    loadData();
  });
  document.querySelectorAll('.pos-chip').forEach(b=> b.addEventListener('click',()=>{
    STATE.position = b.dataset.pos;
    saveSettings();
    render();
  }));
  let searchDebounce;
  DOM.searchInput.addEventListener('input', e=>{
    clearTimeout(searchDebounce);
    searchDebounce = setTimeout(()=>{
      STATE.search = e.target.value;
      saveSettings();
      render();
    }, 200);
  });
  DOM.refreshBtn.addEventListener('click', ()=> loadData(true));
  DOM.retryBtn.addEventListener('click', ()=> loadData(true));
  DOM.csvBtn.addEventListener('click', exportCSV);

  // Init
  loadSettings();
  render();
  loadData();
})();
</script>
</body>
</html>
