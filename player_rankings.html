<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Dynasty Fantasy Football Vault</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root { color-scheme: dark; }
  body { font-family: 'Inter', system-ui, -apple-system, sans-serif; }
  .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; }
  .glass {
    background: linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.04));
    backdrop-filter: blur(20px) saturate(140%);
    -webkit-backdrop-filter: blur(20px) saturate(140%);
    border: 1px solid rgba(255,255,255,0.10);
  }
  .glass-strong {
    background: linear-gradient(180deg, rgba(255,255,255,0.10), rgba(255,255,255,0.06));
    backdrop-filter: blur(24px) saturate(160%);
    -webkit-backdrop-filter: blur(24px) saturate(160%);
    border: 1px solid rgba(255,255,255,0.14);
  }
  .scrollbar-thin::-webkit-scrollbar { width: 8px; height: 8px; }
  .scrollbar-thin::-webkit-scrollbar-track { background: transparent; }
  .scrollbar-thin::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 9999px; }
  .scrollbar-thin::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.25); }
  th.sortable { user-select: none; }
  th.sortable:hover { background: rgba(255,255,255,0.04); }
  tbody tr:hover { background: rgba(255,255,255,0.04); }
  .pos-pill { font-weight: 600; letter-spacing: 0.02em; }
  .pos-QB { background: rgba(168,85,247,0.18); color: rgb(216,180,254); border-color: rgba(168,85,247,0.35); }
  .pos-RB { background: rgba(34,197,94,0.18); color: rgb(134,239,172); border-color: rgba(34,197,94,0.35); }
  .pos-WR { background: rgba(59,130,246,0.18); color: rgb(147,197,253); border-color: rgba(59,130,246,0.35); }
  .pos-TE { background: rgba(245,158,11,0.18); color: rgb(253,224,71); border-color: rgba(245,158,11,0.35); }
  .tier-badge { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12); }
  @keyframes spin { to { transform: rotate(360deg); } }
  .spin { animation: spin 1s linear infinite; }
</style>
</head>
<body class="min-h-screen bg-[#020617] text-slate-100 antialiased">
  <div class="fixed inset-0 -z-10">
    <div class="absolute inset-0 bg-[radial-gradient(60%_60%_at_50%_0%,rgba(56,189,248,0.15),transparent_60%),radial-gradient(40%_40%_at_100%_0%,rgba(168,85,247,0.12),transparent_50%),radial-gradient(40%_40%_at_0%_100%,rgba(34,197,94,0.10),transparent_50%),#020617]"></div>
    <div class="absolute inset-0 opacity-[0.04] mix-blend-soft-light" style="background-image:repeating-linear-gradient(0deg, #fff 0 1px, transparent 1px 24px),repeating-linear-gradient(90deg, #fff 0 1px, transparent 1px 24px)"></div>
  </div>

  <div class="max-w-[1400px] mx-auto px-4 sm:px-6 lg:px-8 py-6 sm:py-10">
    <!-- Header -->
    <header class="glass-strong rounded-3xl p-6 sm:p-8 mb-6">
      <div class="flex flex-col lg:flex-row lg:items-start lg:justify-between gap-6">
        <div class="flex-1 min-w-0">
          <div class="flex items-center gap-3 mb-2">
            <div class="w-10 h-10 rounded-2xl bg-gradient-to-br from-cyan-400 to-violet-500 flex items-center justify-center shadow-lg shadow-violet-500/25">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
            </div>
            <h1 class="text-2xl sm:text-3xl font-bold tracking-tight">Dynasty Fantasy Football Vault</h1>
          </div>
          <p class="text-slate-300 text-sm sm:text-base max-w-2xl">SF • PPR • TEP 0.5. Values merged with 2024 PPG. Sortable, searchable, live from Google Sheets.</p>
          
          <div class="mt-4 flex flex-wrap items-center gap-3 text-xs">
            <div id="leaguePill" class="inline-flex items-center gap-2 px-3 py-1.5 rounded-full bg-white/5 border border-white/10">
              <span class="w-2 h-2 rounded-full bg-emerald-400 animate-pulse"></span>
              <span class="mono text-slate-300" id="leagueName">Loading league…</span>
            </div>
            <div class="inline-flex items-center gap-2 px-3 py-1.5 rounded-full bg-white/5 border border-white/10">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/></svg>
              <span class="mono text-slate-300" id="playerCount">— players</span>
            </div>
            <div class="inline-flex items-center gap-2 px-3 py-1.5 rounded-full bg-white/5 border border-white/10">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 8v4l3 3"/><circle cx="12" cy="12" r="10"/></svg>
              <span class="mono text-slate-300" id="lastUpdated">—</span>
            </div>
          </div>
        </div>

        <!-- Status Log -->
        <div class="lg:w-[380px] w-full">
          <div class="glass rounded-2xl p-4">
            <div class="flex items-center justify-between mb-2">
              <h3 class="text-xs font-semibold uppercase tracking-wider text-slate-400">Status Log</h3>
              <span id="statusDot" class="w-2 h-2 rounded-full bg-amber-400"></span>
            </div>
            <div id="statusLog" class="mono text-[11px] leading-relaxed text-slate-300 h-[88px] overflow-y-auto scrollbar-thin pr-2"></div>
          </div>
        </div>
      </div>
    </header>

    <!-- Controls -->
    <div class="glass rounded-3xl p-4 sm:p-5 mb-6 sticky top-4 z-30 shadow-2xl shadow-black/30">
      <div class="flex flex-col lg:flex-row gap-4 lg:items-center">
        <!-- Search -->
        <div class="relative flex-1">
          <svg class="absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-500" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
          <input id="searchInput" type="text" placeholder="Search players..." class="w-full pl-10 pr-4 h-11 rounded-xl bg-black/30 border border-white/10 focus:border-cyan-400/50 focus:ring-4 focus:ring-cyan-400/10 outline-none text-sm placeholder-slate-500 transition" />
        </div>

        <!-- Position Filters -->
        <div class="flex items-center gap-1.5 p-1 rounded-xl bg-black/30 border border-white/10">
          <button data-pos="ALL" class="pos-btn px-3.5 h-9 rounded-lg text-xs font-semibold transition bg-white/10 text-white">ALL</button>
          <button data-pos="QB" class="pos-btn px-3.5 h-9 rounded-lg text-xs font-semibold transition text-slate-300 hover:bg-white/5">QB</button>
          <button data-pos="RB" class="pos-btn px-3.5 h-9 rounded-lg text-xs font-semibold transition text-slate-300 hover:bg-white/5">RB</button>
          <button data-pos="WR" class="pos-btn px-3.5 h-9 rounded-lg text-xs font-semibold transition text-slate-300 hover:bg-white/5">WR</button>
          <button data-pos="TE" class="pos-btn px-3.5 h-9 rounded-lg text-xs font-semibold transition text-slate-300 hover:bg-white/5">TE</button>
        </div>

        <!-- Actions -->
        <div class="flex items-center gap-2">
          <button id="refreshBtn" class="inline-flex items-center gap-2 px-3.5 h-11 rounded-xl bg-white/5 hover:bg-white/10 border border-white/10 text-sm font-medium transition">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 1 0 18 0 9 9 0 0 0-18 0"/><path d="M9 9l6 6M15 9l-6 6"/></svg>
            Refresh
          </button>
        </div>
      </div>
    </div>

    <!-- Table -->
    <div class="glass-strong rounded-3xl overflow-hidden">
      <div class="overflow-x-auto scrollbar-thin">
        <table class="w-full text-sm">
          <thead class="sticky top-0 z-20 bg-[#0b1220]/90 backdrop-blur-xl border-b border-white/10">
            <tr class="text-[11px] uppercase tracking-wider text-slate-400">
              <th class="sortable text-left px-4 sm:px-6 py-3 font-semibold cursor-pointer select-none w-[70px]" data-key="#"># <span class="sort-indicator ml-1 opacity-60"></span></th>
              <th class="sortable text-left px-4 py-3 font-semibold cursor-pointer select-none min-w-[200px]" data-key="Player">Player <span class="sort-indicator ml-1 opacity-60"></span></th>
              <th class="sortable text-left px-4 py-3 font-semibold cursor-pointer select-none w-[80px]" data-key="Pos">Pos <span class="sort-indicator ml-1 opacity-60"></span></th>
              <th class="sortable text-left px-4 py-3 font-semibold cursor-pointer select-none w-[80px]" data-key="Team">Team <span class="sort-indicator ml-1 opacity-60"></span></th>
              <th class="sortable text-right px-4 py-3 font-semibold cursor-pointer select-none w-[80px]" data-key="Age">Age <span class="sort-indicator ml-1 opacity-60"></span></th>
              <th class="sortable text-right px-4 py-3 font-semibold cursor-pointer select-none w-[110px]" data-key="Value">Value <span class="sort-indicator ml-1 opacity-60"></span></th>
              <th class="sortable text-right px-4 py-3 font-semibold cursor-pointer select-none w-[100px]" data-key="PPG">PPG <span class="sort-indicator ml-1 opacity-60"></span></th>
              <th class="sortable text-right px-4 sm:px-6 py-3 font-semibold cursor-pointer select-none w-[90px]" data-key="Tier">Tier <span class="sort-indicator ml-1 opacity-60"></span></th>
            </tr>
          </thead>
          <tbody id="tableBody" class="divide-y divide-white/[0.06]">
            <tr>
              <td colspan="8" class="px-6 py-20 text-center">
                <div class="inline-flex flex-col items-center gap-3">
                  <svg class="spin text-cyan-400" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
                  <p class="text-slate-400 text-sm">Loading vault data...</p>
                </div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- Footer -->
    <footer class="mt-8 text-center text-xs text-slate-500 mono">
      Dynasty Vault • SF PPR TEP 0.5 • Data from Google Sheets • <span id="footerLeague"></span>
    </footer>
  </div>

<script>
(() => {
  const VALUES_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRqxhqyuKK6vu_EoYta5FZ_KdOB8M54Q_qBwJKOUF5KcgbTt2dmHn_FuLj9d-FS8-ta5T0zkU0QEGcN/pub?gid=4113168&single=true&output=csv';
  const PPG_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRqxhqyuKK6vu_EoYta5FZ_KdOB8M54Q_qBwJKOUF5KcgbTt2dmHn_FuLj9d-FS8-ta5T0zkU0QEGcN/pub?gid=118408869&single=true&output=csv';

  const state = {
    raw: [],
    filtered: [],
    sortKey: 'Value',
    sortDir: 'desc',
    posFilter: 'ALL',
    search: '',
    leagueId: new URLSearchParams(location.search).get('league_id') || '1313454100225990656'
  };

  const els = {
    log: document.getElementById('statusLog'),
    dot: document.getElementById('statusDot'),
    body: document.getElementById('tableBody'),
    search: document.getElementById('searchInput'),
    posBtns: [...document.querySelectorAll('.pos-btn')],
    leagueName: document.getElementById('leagueName'),
    playerCount: document.getElementById('playerCount'),
    lastUpdated: document.getElementById('lastUpdated'),
    footerLeague: document.getElementById('footerLeague'),
    refreshBtn: document.getElementById('refreshBtn')
  };

  const POS_ORDER = { QB:0, RB:1, WR:2, TE:3 };

  function log(msg, type='info') {
    const time = new Date().toLocaleTimeString();
    const color = type==='error' ? 'text-red-400' : type==='success' ? 'text-emerald-400' : 'text-slate-300';
    els.log.insertAdjacentHTML('beforeend', `<div class="${color}">[${time}] ${msg}</div>`);
    els.log.scrollTop = els.log.scrollHeight;
  }

  function setStatus(ok) {
    els.dot.className = `w-2 h-2 rounded-full ${ok ? 'bg-emerald-400' : 'bg-amber-400'}`;
  }

  const normalizeName = (s='') => s.toLowerCase().replace(/\./g,'').replace(/'/g,'').replace(/[^a-z0-9]/g,'').replace(/(jr|sr|ii|iii|iv|v)$/,'').trim();

  async function fetchText(url) {
    const res = await fetch(url, { cache: 'no-store' });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return res.text();
  }

  function parseCsv(text) {
    // Papa handles quoted newlines = line-merge fix for split names
    const parsed = Papa.parse(text, { header:true, skipEmptyLines:true, dynamicTyping:false });
    return parsed.data;
  }

  async function loadLeague() {
    try {
      log(`Loading Sleeper league ${state.leagueId}…`);
      const res = await fetch(`https://api.sleeper.app/v1/league/${state.leagueId}`);
      if (!res.ok) throw new Error('League fetch failed');
      const league = await res.json();
      els.leagueName.textContent = `${league.name} • ${league.season} • ${league.total_rosters} teams`;
      els.footerLeague.textContent = league.name;
      log(`League loaded: ${league.name}`, 'success');
    } catch (e) {
      els.leagueName.textContent = `League ${state.leagueId}`;
      log(`League load failed: ${e.message}`, 'error');
    }
  }

  async function loadData() {
    try {
      setStatus(false);
      log('Fetching Values CSV…');
      const [valuesTxt, ppgTxt] = await Promise.all([
        fetchText(VALUES_URL),
        fetchText(PPG_URL)
      ]);
      log(`Values CSV ${valuesTxt.length.toLocaleString()} bytes`);
      log(`PPG CSV ${ppgTxt.length.toLocaleString()} bytes`);

      const valuesRows = parseCsv(valuesTxt);
      const ppgRows = parseCsv(ppgTxt);

      // Build PPG map
      const ppgMap = new Map();
      for (const r of ppgRows) {
        const name = r.Player || r.player || r.NAME || '';
        const key = normalizeName(name);
        if (!key) continue;
        const val = r.Avg_PPR_0_5_TEP || r['Avg_PPR_0.5_TEP'] || r.Avg_PPR_05_TEP || r['Avg PPR'] || r.PPG || '';
        ppgMap.set(key, val);
      }

      // Build merged
      const merged = [];
      for (const r of valuesRows) {
        const player = r.player || r.Player || r.name || '';
        if (!player) continue;
        const pos = (r.pos || r.Pos || r.position || '').toUpperCase();
        const team = (r.team || r.Team || r.tm || '').toUpperCase();
        const age = parseFloat(r.age || r.Age) || null;
        const value = parseFloat(r.val_sf_ppr_tep05 || r.value || r.Value) || 0;
        const tier = parseInt(r.tier || r.Tier) || null;

        const key = normalizeName(player);
        const ppgRaw = ppgMap.get(key) ?? '-';
        const ppg = ppgRaw === '-' || ppgRaw === '' ? '-' : parseFloat(String(ppgRaw).replace(/,/g,''));
        
        merged.push({
          Player: player,
          Pos: pos,
          Team: team,
          Age: age,
          Value: value,
          PPG: isNaN(ppg) ? '-' : ppg,
          Tier: tier
        });
      }

      // Rank by value desc for # column baseline
      merged.sort((a,b) => b.Value - a.Value);
      merged.forEach((r,i)=> r._rank = i+1);

      state.raw = merged;
      els.playerCount.textContent = `${merged.length.toLocaleString()} players`;
      els.lastUpdated.textContent = new Date().toLocaleString();
      log(`Merged ${merged.length} players`, 'success');
      setStatus(true);
      applyFilters();
    } catch (e) {
      log(`Data load error: ${e.message}`, 'error');
      els.body.innerHTML = `<tr><td colspan="8" class="px-6 py-16 text-center text-red-400">Failed to load data: ${e.message}</td></tr>`;
    }
  }

  function applyFilters() {
    const search = state.search.trim().toLowerCase();
    const pos = state.posFilter;
    let data = state.raw;
    if (pos !== 'ALL') data = data.filter(r => r.Pos === pos);
    if (search) data = data.filter(r => r.Player.toLowerCase().includes(search));
    state.filtered = data;
    sortAndRender();
  }

  function sortData() {
    const key = state.sortKey;
    const dir = state.sortDir === 'asc' ? 1 : -1;
    const arr = [...state.filtered];

    arr.sort((a,b) => {
      let av, bv;
      switch(key) {
        case '#': av = a._rank; bv = b._rank; break;
        case 'Player': av = a.Player.toLowerCase(); bv = b.Player.toLowerCase(); return av.localeCompare(bv) * dir;
        case 'Pos': 
          av = POS_ORDER[a.Pos] ?? 99; bv = POS_ORDER[b.Pos] ?? 99;
          if (av !== bv) return (av - bv) * dir;
          av = a.Player.toLowerCase(); bv = b.Player.toLowerCase();
          return av.localeCompare(bv) * dir;
        case 'Team': av = a.Team; bv = b.Team; return av.localeCompare(bv) * dir;
        case 'Age': av = a.Age ?? -1; bv = b.Age ?? -1; break;
        case 'Value': av = a.Value; bv = b.Value; break;
        case 'PPG': av = a.PPG === '-' ? -1 : a.PPG; bv = b.PPG === '-' ? -1 : b.PPG; break;
        case 'Tier': av = a.Tier ?? 999; bv = b.Tier ?? 999; break;
        default: av = 0; bv = 0;
      }
      return (av - bv) * dir;
    });

    state.filtered = arr;
  }

  function sortAndRender() {
    sortData();
    renderTable();
    updateSortIndicators();
  }

  function renderTable() {
    if (!state.filtered.length) {
      els.body.innerHTML = `<tr><td colspan="8" class="px-6 py-16 text-center text-slate-500">No players match filters</td></tr>`;
      return;
    }
    const rows = state.filtered.map((r,i) => {
      const posClass = `pos-${r.Pos}`;
      const valueFormatted = r.Value >= 1000 ? (r.Value/1000).toFixed(1)+'k' : Math.round(r.Value).toLocaleString();
      const ppgFormatted = r.PPG === '-' ? '–' : Number(r.PPG).toFixed(1);
      const age = r.Age ? r.Age.toFixed(1) : '–';
      const tier = r.Tier ? `<span class="tier-badge px-2 py-0.5 rounded-md text-[11px] font-medium">${r.Tier}</span>` : '–';
      return `
      <tr class="transition">
        <td class="px-4 sm:px-6 py-3 mono text-slate-400 text-xs">${i+1}</td>
        <td class="px-4 py-3">
          <div class="font-medium text-slate-100">${escapeHtml(r.Player)}</div>
        </td>
        <td class="px-4 py-3">
          <span class="pos-pill inline-flex items-center px-2 py-0.5 rounded-md text-[11px] border ${posClass}">${r.Pos || '–'}</span>
        </td>
        <td class="px-4 py-3 mono text-slate-300 text-xs">${r.Team || 'FA'}</td>
        <td class="px-4 py-3 text-right mono text-slate-300 text-xs">${age}</td>
        <td class="px-4 py-3 text-right mono font-medium text-white">${valueFormatted}</td>
        <td class="px-4 py-3 text-right mono ${r.PPG==='-'?'text-slate-600':'text-cyan-300'}">${ppgFormatted}</td>
        <td class="px-4 sm:px-6 py-3 text-right">${tier}</td>
      </tr>`;
    }).join('');
    els.body.innerHTML = rows;
  }

  function updateSortIndicators() {
    document.querySelectorAll('th.sortable').forEach(th => {
      const key = th.dataset.key;
      const indicator = th.querySelector('.sort-indicator');
      if (key === state.sortKey) {
        indicator.textContent = state.sortDir === 'asc' ? '▲' : '▼';
        indicator.classList.add('opacity-100');
        th.classList.add('text-white');
      } else {
        indicator.textContent = '';
        indicator.classList.remove('opacity-100');
        th.classList.remove('text-white');
      }
    });
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
  }

  // Events
  els.search.addEventListener('input', e => {
    state.search = e.target.value;
    applyFilters();
  });

  els.posBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      els.posBtns.forEach(b => b.classList.remove('bg-white/10','text-white'));
      btn.classList.add('bg-white/10','text-white');
      state.posFilter = btn.dataset.pos;
      applyFilters();
    });
  });

  document.querySelectorAll('th.sortable').forEach(th => {
    th.addEventListener('click', () => {
      const key = th.dataset.key;
      if (state.sortKey === key) {
        state.sortDir = state.sortDir === 'asc' ? 'desc' : 'asc';
      } else {
        state.sortKey = key;
        // sensible defaults
        state.sortDir = ['Player','Pos','Team'].includes(key) ? 'asc' : 'desc';
      }
      sortAndRender();
    });
  });

  els.refreshBtn.addEventListener('click', () => {
    loadData();
  });

  // Init
  (async () => {
    await loadLeague();
    await loadData();
  })();
})();
</script>
<script>(function(){document.addEventListener("click",function(e){var a=e.target.closest("[data-product-id]");if(!a)return;e.preventDefault();var pid=a.getAttribute("data-product-id");if(pid)parent.postMessage({type:"ecto-artifact-link-click",productId:pid},"*")})})();</script>
</body>
</html>
