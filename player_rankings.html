<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Dynasty Fantasy Football Vault</title>
<style>
  :root {
    --bg: #0a0e14;
    --bg-elev: #0f1520;
    --glass: rgba(255, 255, 255, 0.06);
    --glass-2: rgba(255, 255, 255, 0.04);
    --border: rgba(255, 255, 255, 0.12);
    --text: #e6edf3;
    --text-dim: #9aa7b5;
    --accent: #00e5ff;
    --accent-2: #7c4dff;
    --success: #00d38a;
    --warning: #ffcc00;
    --danger: #ff5c5c;
    --radius: 16px;
    --shadow: 0 10px 40px rgba(0,0,0,0.45);
  }
  * { box-sizing: border-box; }
  html, body {
    height: 100%;
    margin: 0;
    background: radial-gradient(1200px 800px at 20% -10%, rgba(0,229,255,0.12), transparent 60%),
                radial-gradient(1000px 600px at 110% 10%, rgba(124,77,255,0.10), transparent 60%),
                var(--bg);
    color: var(--text);
    font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
    -webkit-font-smoothing: antialiased;
  }
  header {
    position: sticky;
    top: 0;
    z-index: 10;
    backdrop-filter: blur(16px) saturate(140%);
    background: linear-gradient(to bottom, rgba(10,14,20,0.85), rgba(10,14,20,0.6));
    border-bottom: 1px solid var(--border);
  }
  .wrap {
    max-width: 1200px;
    margin: 0 auto;
    padding: 20px 24px;
  }
  .title {
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .logo {
    width: 40px;
    height: 40px;
    border-radius: 12px;
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    box-shadow: 0 0 30px rgba(0,229,255,0.35);
    display: grid;
    place-items: center;
    font-weight: 800;
    color: #001018;
  }
  h1 {
    font-size: clamp(20px, 3vw, 28px);
    margin: 0;
    letter-spacing: 0.3px;
  }
  .sub {
    color: var(--text-dim);
    font-size: 13px;
    margin-top: 2px;
  }
  main.wrap {
    padding-top: 28px;
    padding-bottom: 60px;
  }
  .grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 20px;
  }
  @media (min-width: 980px) {
    .grid {
      grid-template-columns: 1.1fr 0.9fr;
    }
  }
  .card {
    background: var(--glass);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    backdrop-filter: blur(16px) saturate(130%);
  }
  .card h2 {
    margin: 0;
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--text-dim);
    font-weight: 600;
  }
  .card .head {
    padding: 16px 18px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }
  .card .body {
    padding: 16px 18px;
  }
  .controls {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    align-items: center;
  }
  .input {
    flex: 1 1 260px;
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--glass-2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 10px 12px;
  }
  .input input {
    flex: 1;
    background: transparent;
    border: 0;
    outline: none;
    color: var(--text);
    font-size: 14px;
  }
  .input input::placeholder { color: #6b7a8a; }
  .btn {
    background: linear-gradient(135deg, var(--accent), #00b8d4);
    color: #001018;
    border: 0;
    border-radius: 12px;
    padding: 11px 16px;
    font-weight: 700;
    font-size: 14px;
    cursor: pointer;
    transition: transform .15s ease, box-shadow .15s ease, opacity .15s ease;
    box-shadow: 0 6px 20px rgba(0,229,255,0.25);
  }
  .btn:hover { transform: translateY(-1px); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
  .pill {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 6px 10px;
    border-radius: 999px;
    background: var(--glass-2);
    border: 1px solid var(--border);
    font-size: 12px;
    color: var(--text-dim);
    white-space: nowrap;
  }
  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--warning);
    box-shadow: 0 0 10px var(--warning);
  }
  .dot.ok { background: var(--success); box-shadow: 0 0 10px var(--success); }
  .dot.err { background: var(--danger); box-shadow: 0 0 10px var(--danger); }
  textarea.log {
    width: 100%;
    height: 220px;
    resize: vertical;
    background: #05080d;
    color: #b8f6ff;
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px;
    font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
    font-size: 12px;
    line-height: 1.5;
  }
  .table-wrap {
    overflow: auto;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    background: var(--glass);
    backdrop-filter: blur(16px);
  }
  table {
    width: 100%;
    border-collapse: separate;
    border-spacing: 0;
    min-width: 820px;
  }
  thead th {
    position: sticky;
    top: 0;
    background: rgba(15,21,32,0.9);
    backdrop-filter: blur(8px);
    text-align: left;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-dim);
    padding: 12px 14px;
    border-bottom: 1px solid var(--border);
  }
  tbody td {
    padding: 12px 14px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    font-size: 14px;
  }
  tbody tr:hover { background: rgba(255,255,255,0.03); }
  .rank {
    font-weight: 700;
    color: var(--accent);
    width: 60px;
  }
  .player {
    font-weight: 600;
  }
  .pos {
    font-size: 12px;
    padding: 4px 8px;
    border-radius: 999px;
    background: rgba(255,255,255,0.08);
    border: 1px solid var(--border);
    color: var(--text-dim);
    display: inline-block;
    min-width: 42px;
    text-align: center;
  }
  .pos.QB { color: #ff8ab8; border-color: rgba(255,138,184,0.3); }
  .pos.RB { color: #7cffc9; border-color: rgba(124,255,201,0.3); }
  .pos.WR { color: #8ab4ff; border-color: rgba(138,180,255,0.3); }
  .pos.TE { color: #ffd68a; border-color: rgba(255,214,138,0.3); }
  .tier {
    font-weight: 700;
    font-size: 12px;
    padding: 4px 8px;
    border-radius: 8px;
    background: linear-gradient(135deg, rgba(0,229,255,0.15), rgba(124,77,255,0.15));
    border: 1px solid rgba(0,229,255,0.3);
    color: #b8f6ff;
  }
  .muted { color: var(--text-dim); }
  .footer-meta {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-top: 12px;
    font-size: 12px;
    color: var(--text-dim);
  }
  .chip {
    padding: 4px 8px;
    border-radius: 999px;
    background: var(--glass-2);
    border: 1px solid var(--border);
  }
  .empty {
    text-align: center;
    padding: 40px;
    color: var(--text-dim);
  }
</style>
</head>
<body>
<header>
  <div class="wrap">
    <div class="title">
      <div class="logo">DV</div>
      <div>
        <h1>Dynasty Fantasy Football Vault</h1>
        <div class="sub">Dark glassmorphism player values • Sleeper league aware</div>
      </div>
    </div>
  </div>
</header>

<main class="wrap">
  <div class="grid">
    <section class="card">
      <div class="head">
        <h2>Load League</h2>
        <span class="pill" id="statusPill"><span class="dot" id="statusDot"></span><span id="statusText">Idle</span></span>
      </div>
      <div class="body">
        <div class="controls">
          <div class="input">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" style="opacity:.6"><path d="M4 7h16M4 12h12M4 17h8" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
            <input id="leagueId" placeholder="Sleeper League ID (optional)" inputmode="numeric" />
          </div>
          <button class="btn" id="loadBtn">Load Vault</button>
        </div>
        <div class="footer-meta">
          <span class="chip" id="metaSF">SF: auto</span>
          <span class="chip" id="metaTEP">TEP: auto</span>
          <span class="chip" id="metaCount">Players: 0</span>
        </div>
      </div>
    </section>

    <section class="card">
      <div class="head">
        <h2>Parse Log</h2>
      </div>
      <div class="body">
        <textarea class="log" id="log" readonly spellcheck="false"></textarea>
      </div>
    </section>
  </div>

  <div style="height:20px"></div>

  <section class="table-wrap">
    <table>
      <thead>
        <tr>
          <th style="width:70px">Rank</th>
          <th>Player</th>
          <th>Pos</th>
          <th>Team</th>
          <th>Age</th>
          <th>Value</th>
          <th>PPG</th>
          <th>Tier</th>
        </tr>
      </thead>
      <tbody id="tbody">
        <tr><td colspan="8" class="empty">Load a league to populate the vault</td></tr>
      </tbody>
    </table>
  </section>
</main>

<script>
(() => {
  // === PROXY CONFIG - EDIT HERE ===
  const PROXY = 'https://script.google.com/macros/s/AKfycbwfX3_zR3kdJM7iQ3RnSUGBShj9nhHAPhYqFznzAPjw5USwWeew-ZaInlg2F7FB7dNc-w/exec?url=';
  const VALUES_CSV_URL = PROXY + encodeURIComponent('https://docs.google.com/spreadsheets/d/e/2PACX-1vRqxhqyuKK6vu_EoYta5FZ_KdOB8M54Q_qBwJKOUF5KcgbTt2dmHn_FuLj9d-FS8-ta5T0zkU0QEGcN/pub?output=csv');
  const PPG_CSV_URL = PROXY + encodeURIComponent('https://docs.google.com/spreadsheets/d/e/2PACX-1vRqxhqyuKK6vu_EoYta5FZ_KdOB8M54Q_qBwJKOUF5KcgbTt2dmHn_FuLj9d-FS8-ta5T0zkU0QEGcN/pub?gid=118408869&single=true&output=csv');

  const els = {
    log: document.getElementById('log'),
    statusPill: document.getElementById('statusPill'),
    statusDot: document.getElementById('statusDot'),
    statusText: document.getElementById('statusText'),
    loadBtn: document.getElementById('loadBtn'),
    leagueId: document.getElementById('leagueId'),
    tbody: document.getElementById('tbody'),
    metaSF: document.getElementById('metaSF'),
    metaTEP: document.getElementById('metaTEP'),
    metaCount: document.getElementById('metaCount'),
  };

  function log(msg, level='info') {
    const ts = new Date().toLocaleTimeString();
    els.log.value += `[${ts}] ${msg}\n`;
    els.log.scrollTop = els.log.scrollHeight;
  }

  function setStatus(text, state='idle') {
    els.statusText.textContent = text;
    els.statusDot.classList.remove('ok','err');
    if(state==='ok') els.statusDot.classList.add('ok');
    else if(state==='err') els.statusDot.classList.add('err');
  }

  function normalizeName(name) {
    return name.toLowerCase()
      .replace(/\./g,'')
      .replace(/\'/g,'')
      .replace(/\s+/g,' ')
      .replace(/\s+(jr|sr|ii|iii|iv|v)$/,'')
      .trim();
  }

  const valuesRegex = /(\d{4,6}),([^,]+?),(QB|RB|WR|TE),([A-Z]{2,3}),([\d\.]+),([\d\.]+),([\d\.]+),([\d\.]+),([\d\.]+),([\d\.]+),([\d\.]+)/g;
  const ppgRegex = /([A-Za-z'\.\s]+),([A-Z]{2,3}),(QB|RB|WR|TE),([\d\.,]+)/g;

  async function fetchText(url, label) {
    log(`Fetching ${label}...`);
    try {
      const res = await fetch(url, {cache:'no-store'});
      if(!res.ok) throw new Error(`HTTP ${res.status}`);
      const txt = await res.text();
      log(`✓ ${label} received (${(txt.length/1024).toFixed(1)} KB)`);
      return txt;
    } catch(err) {
      log(`✗ ${label} failed: ${err.message}`);
      throw err;
    }
  }

  async function loadData() {
    const leagueId = els.leagueId.value.trim();
    els.loadBtn.disabled = true;
    setStatus('Loading', 'idle');
    els.tbody.innerHTML = `<tr><td colspan="8" class="empty">Loading…</td></tr>`;

    let isSF = false;
    let isTEP = false;
    let tepLevel = 'base'; // base | tep05 | tep

    try {
      // 1. Sleeper players
      const players = await fetchText('https://api.sleeper.app/v1/players/nfl', 'Sleeper players')
        .then(t => JSON.parse(t));
      const playerCount = Object.keys(players).length;
      log(`Parsed Sleeper players: ${playerCount.toLocaleString()}`);

      // 2. Values CSV
      const valuesCsv = await fetchText(VALUES_CSV_URL, 'Values CSV');
      const valuesMap = new Map();
      let valMatches = 0;
      for (const m of valuesCsv.matchAll(valuesRegex)) {
        const [, sleeper_id, name, pos, team, age, v1, v2, v3, v4, v5, v6] = m;
        const norm = normalizeName(name);
        valuesMap.set(norm, {
          sleeper_id,
          name: name.trim(),
          pos,
          team,
          age: parseFloat(age),
          val_sf_ppr: parseFloat(v1),
          val_sf_ppr_tep05: parseFloat(v2),
          val_sf_ppr_tep: parseFloat(v3),
          val_1qb_ppr: parseFloat(v4),
          val_1qb_ppr_tep05: parseFloat(v5),
          val_1qb_ppr_tep: parseFloat(v6),
        });
        valMatches++;
      }
      log(`Parsed values entries: ${valuesMap.size} (matches ${valMatches})`);

      // 3. PPG CSV
      const ppgCsv = await fetchText(PPG_CSV_URL, 'PPG CSV');
      const ppgMap = new Map();
      let ppgMatches = 0;
      for (const m of ppgCsv.matchAll(ppgRegex)) {
        const [, name, team, pos, nums] = m;
        const numArr = nums.split(',').map(s => parseFloat(s)).filter(n => !isNaN(n));
        const ppg = numArr.length ? (numArr.reduce((a,b)=>a+b,0)/numArr.length) : 0;
        const norm = normalizeName(name);
        ppgMap.set(norm, { ppg: +ppg.toFixed(2), team, pos });
        ppgMatches++;
      }
      log(`Parsed PPG entries: ${ppgMap.size} (matches ${ppgMatches})`);

      // 4. League detection
      if (leagueId) {
        try {
          log(`Fetching league ${leagueId}...`);
          const league = await fetch(`https://api.sleeper.app/v1/league/${leagueId}`).then(r=>r.json());
          isSF = Array.isArray(league.roster_positions) && league.roster_positions.includes('SUPER_FLEX');
          const rec = league.scoring_settings?.rec ?? 0;
          const rec_te = league.scoring_settings?.rec_te ?? rec;
          if (rec_te >= 1.75) { isTEP = true; tepLevel = 'tep'; }
          else if (rec_te > 1) { isTEP = true; tepLevel = 'tep05'; }
          log(`League detected: SF=${isSF}, TE premium=${isTEP} (${tepLevel}), rec_te=${rec_te}`);
        } catch(e) {
          log(`League fetch failed, using defaults: ${e.message}`);
        }
      } else {
        log(`No league ID provided, using 1QB base values`);
      }

      els.metaSF.textContent = `SF: ${isSF ? 'Yes' : 'No'}`;
      els.metaTEP.textContent = `TEP: ${isTEP ? tepLevel : 'No'}`;

      // 5. Merge
      const merged = [];
      for (const [norm, v] of valuesMap.entries()) {
        const p = ppgMap.get(norm);
        let value;
        if (isSF) {
          if (tepLevel === 'tep') value = v.val_sf_ppr_tep;
          else if (tepLevel === 'tep05') value = v.val_sf_ppr_tep05;
          else value = v.val_sf_ppr;
        } else {
          if (tepLevel === 'tep') value = v.val_1qb_ppr_tep;
          else if (tepLevel === 'tep05') value = v.val_1qb_ppr_tep05;
          else value = v.val_1qb_ppr;
        }
        merged.push({
          ...v,
          ppg: p?.ppg ?? null,
          value: Math.round(value || 0),
        });
      }
      log(`Merged dataset: ${merged.length} players`);

      // 6. Sort & tier
      merged.sort((a,b) => b.value - a.value);
      let tier = 1;
      let lastVal = merged[0]?.value ?? 0;
      const tierGap = 600; // adjustable
      merged.forEach((p,i) => {
        if (i>0 && (lastVal - p.value) > tierGap) {
          tier++;
          lastVal = p.value;
        }
        p.rank = i+1;
        p.tier = tier;
      });

      // 7. Render
      els.metaCount.textContent = `Players: ${merged.length}`;
      const top = merged.slice(0, 300);
      const frag = document.createDocumentFragment();
      top.forEach(p => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td class="rank">${p.rank}</td>
          <td class="player">${p.name}</td>
          <td><span class="pos ${p.pos}">${p.pos}</span></td>
          <td class="muted">${p.team}</td>
          <td class="muted">${p.age ? p.age.toFixed(1) : '-'}</td>
          <td>${p.value.toLocaleString()}</td>
          <td class="muted">${p.ppg != null ? p.ppg.toFixed(2) : '-'}</td>
          <td><span class="tier">T${p.tier}</span></td>
        `;
        frag.appendChild(tr);
      });
      els.tbody.innerHTML = '';
      els.tbody.appendChild(frag);

      setStatus('Ready', 'ok');
      log(`✓ Render complete. Top player: ${merged[0]?.name} (${merged[0]?.value})`);
    } catch(err) {
      console.error(err);
      setStatus('Error', 'err');
      els.tbody.innerHTML = `<tr><td colspan="8" class="empty">Error loading data. Check log.</td></tr>`;
      log(`Fatal error: ${err.message}`);
    } finally {
      els.loadBtn.disabled = false;
    }
  }

  els.loadBtn.addEventListener('click', loadData);
  els.leagueId.addEventListener('keydown', e => { if(e.key==='Enter') loadData(); });

  // Initial hint
  log('Dynasty Vault initialized.');
  log('Enter Sleeper League ID and click Load Vault.');
})();
</script>
<script>(function(){document.addEventListener("click",function(e){var a=e.target.closest("[data-product-id]");if(!a)return;e.preventDefault();var pid=a.getAttribute("data-product-id");if(pid)parent.postMessage({type:"ecto-artifact-link-click",productId:pid},"*")})})();</script>
</body>
</html>
