<script>
const AGE_VALUE_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRqxhqyuKK6vu_EoYta5FZ_KdOB8M54Q_qBwJKOUF5KcgbTt2dmHn_FuLj9d-FS8-ta5T0zkU0QEGcN/pub?gid=0&single=true&output=csv';
const PPG_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRqxhqyuKK6vu_EoYta5FZ_KdOB8M54Q_qBwJKOUF5KcgbTt2dmHn_FuLj9d-FS8-ta5T0zkU0QEGcN/pub?gid=1865143681&single=true&output=csv';

const state = {
  leagueId: null,
  league: null,
  users: [],
  rosters: [],
  players: {},
  tradedPicks: [],
  ageValueMap: new Map(),
  ppgMap: new Map(),
  teams: [],
  sortKey: 'scorePct',
  sortDir: 'desc',
  expanded: new Set(),
};

const $ = s => document.querySelector(s);
const leagueIdInput = $('#leagueIdInput');
const loadBtn = $('#loadBtn');
const statusWrap = $('#status');
const statusText = $('#statusText');
const leagueNameEl = $('#leagueName');
const scoringBadge = $('#scoringBadge');
const memberCount = $('#memberCount');
const tbody = $('#tbody');
const theadRow = document.querySelector('thead tr');
const expandAllBtn = $('#expandAll');
const collapseAllBtn = $('#collapseAll');

const COLUMNS = [
  { key: 'team', label: 'Team', align: 'left', width: 'min-w-[220px]' },
  { key: 'tier', label: 'Tier', align: 'center' },
  { key: 'scorePct', label: 'Score %', align: 'right' },
  { key: 'ppg', label: 'PPG', align: 'right' },
  { key: 'value', label: 'Roster Value', align: 'right' },
  { key: 'pickCapital', label: 'Pick Capital', align: 'right' },
  { key: 'avgAge', label: 'Avg Age', align: 'right' },
  { key: 'narrative', label: 'Narrative', align: 'left', width: 'min-w-[280px]' },
];

function setStatus(msg, show=true){
  statusText.textContent = msg;
  statusWrap.classList.toggle('hidden', !show);
}

function normalizeName(str){
  if(!str) return '';
  return str.toString().toLowerCase()
    .replace(/\./g,'')
    .replace(/'/g,'')
    .replace(/,/g,'')
    .replace(/\s+jr$/,'')
    .replace(/\s+sr$/,'')
    .replace(/\s+ii$/,'')
    .replace(/\s+iii$/,'')
    .replace(/\s+iv$/,'')
    .replace(/\s+v$/,'')
    .trim()
    .replace(/\s+/g,' ');
}

function getScoringType(league){
  const rec = league?.scoring_settings?.rec ?? 0;
  const recTe = league?.scoring_settings?.rec_te ?? 0;
  const bonusRecTe = league?.scoring_settings?.bonus_rec_te ?? 0;
  const isTEP = (recTe > rec) || (bonusRecTe > 0);
  let type='STD', key='std';
  if(rec >= 0.9) { type='PPR'; key='ppr'; }
  else if(rec >= 0.4) { type='HALF'; key='half'; }
  return {type, key, isTEP};
}

function parseNumber(v){
  if(v==null) return 0;
  const n = parseFloat(String(v).replace(/[^0-9.\-]/g,''));
  return isNaN(n)?0:n;
}

function mean(arr){ return arr.reduce((a,b)=>a+b,0)/(arr.length||1); }
function std(arr, m=mean(arr)){ return Math.sqrt(arr.reduce((a,b)=>a+(b-m)**2,0)/(arr.length||1)); }
function zscore(v,m,s){ return s? (v-m)/s : 0; }

function tierPill(tier){
  const colors = [
    'from-amber-300 to-yellow-500 text-black',
    'from-amber-400 to-amber-600 text-black',
    'from-amber-500 to-orange-600 text-black',
    'from-zinc-700 to-zinc-800 text-zinc-200',
    'from-zinc-700 to-zinc-800 text-zinc-200',
    'from-zinc-800 to-zinc-900 text-zinc-300',
    'from-zinc-800 to-zinc-900 text-zinc-400',
    'from-zinc-900 to-black text-zinc-500',
    'from-zinc-900 to-black text-zinc-600',
  ];
  const c = colors[Math.min(8, Math.max(0, tier-1))];
  return `<span class="inline-flex items-center gap-1 px-2.5 py-1 rounded-full text-xs font-bold bg-gradient-to-br ${c} shadow-inner shadow-black/20">T${tier}</span>`;
}

function fmtPct(v){ return `${v.toFixed(0)}%`; }
function fmtNum(v, d=1){ return v.toLocaleString(undefined,{minimumFractionDigits:d, maximumFractionDigits:d}); }
function fmtInt(v){ return Math.round(v).toLocaleString(); }

function eligibleForSlot(slot){
  const map = {
    QB:['QB'],
    RB:['RB'],
    WR:['WR'],
    TE:['TE'],
    FLEX:['RB','WR','TE'],
    SUPER_FLEX:['QB','RB','WR','TE'],
    REC_FLEX:['WR','TE'],
    WRRB_FLEX:['WR','RB'],
    K:['K'],
    DEF:['DEF']
  };
  return map[slot] || [];
}

function computeOptimalLineup(players, starterSlots){
  const slots = [];
  starterSlots.forEach(s=>{
    if(['BN','TAXI','IR'].includes(s)) return;
    slots.push({slot:s, eligible:eligibleForSlot(s)});
  });
  // sort most restrictive first
  slots.sort((a,b)=>a.eligible.length - b.eligible.length || a.slot.localeCompare(b.slot));
  const pool = players.map(p=>({...p})).sort((a,b)=>b.ppg-a.ppg);
  const used = new Set();
  const starters = [];
  let total=0;
  for(const sl of slots){
    let bestIdx=-1, bestScore=-1;
    for(let i=0;i<pool.length;i++){
      const p=pool[i];
      if(used.has(i)) continue;
      if(sl.eligible.includes(p.pos)){
        if(p.ppg>bestScore){ bestScore=p.ppg; bestIdx=i; }
      }
    }
    if(bestIdx>=0){
      used.add(bestIdx);
      const p=pool[bestIdx];
      starters.push({...p, slot:sl.slot});
      total+=p.ppg;
    }
  }
  const bench = pool.filter((_,i)=>!used.has(i));
  return {total, starters, bench};
}

function buildPickCapital(rosters, tradedPicks, league){
  const season = parseInt(league.season);
  const rounds = league.settings?.draft_rounds || 4;
  const years = [season, season+1, season+2];
  const pickOwner = new Map(); // key -> owner roster_id
  rosters.forEach(r=>{
    years.forEach(yr=>{
      for(let rd=1; rd<=rounds; rd++){
        const key = `${yr}-${rd}-${r.roster_id}`;
        pickOwner.set(key, r.roster_id);
      }
    });
  });
  tradedPicks.forEach(tp=>{
    const key = `${tp.season}-${tp.round}-${tp.roster_id}`;
    if(pickOwner.has(key)){
      pickOwner.set(key, tp.owner_id);
    }
  });
  const base = {1:1000,2:400,3:180,4:80,5:30};
  const capital = new Map();
  rosters.forEach(r=>capital.set(r.roster_id,0));
  for(const [key, owner] of pickOwner){
    const [yr, rd] = key.split('-').map(Number);
    const yearsOut = Math.max(0, yr - season);
    const discount = Math.pow(0.80, yearsOut);
    const val = (base[rd]||20) * discount;
    capital.set(owner, (capital.get(owner)||0)+val);
  }
  return capital;
}

function detectColumns(headers, candidates){
  const h = headers.map(h=>h.toLowerCase().trim());
  for(const cand of candidates){
    const idx = h.findIndex(x=>x.includes(cand));
    if(idx>=0) return headers[idx];
  }
  return null;
}

async function fetchCSV(url){
  const res = await fetch(url);
  const text = await res.text();
  return new Promise(resolve=>{
    Papa.parse(text, {
      header:true,
      skipEmptyLines:true,
      complete: res => resolve(res.data)
    });
  });
}

async function loadLeague(leagueId){
  try{
    setStatus('Fetching league metadata...');
    state.leagueId = leagueId;
    history.replaceState(null,'',`?league_id=${leagueId}`);
    leagueIdInput.value = leagueId;

    const [league, users, rosters, players, tradedPicks] = await Promise.all([
      fetch(`https://api.sleeper.app/v1/league/${leagueId}`).then(r=>r.json()),
      fetch(`https://api.sleeper.app/v1/league/${leagueId}/users`).then(r=>r.json()),
      fetch(`https://api.sleeper.app/v1/league/${leagueId}/rosters`).then(r=>r.json()),
      fetch(`https://api.sleeper.app/v1/players/nfl`).then(r=>r.json()).catch(()=>({})),
      fetch(`https://api.sleeper.app/v1/league/${leagueId}/traded_picks`).then(r=>r.json()).catch(()=>[])
    ]);

    state.league = league;
    state.users = users;
    state.rosters = rosters;
    state.players = players;
    state.tradedPicks = tradedPicks;

    setStatus('Fetching valuation & projections CSVs...');
    const [ageRows, ppgRows] = await Promise.all([
      fetchCSV(AGE_VALUE_CSV),
      fetchCSV(PPG_CSV)
    ]);

    // Build age/value map
    state.ageValueMap = new Map();
    if(ageRows.length){
      const headers = Object.keys(ageRows[0]);
      const playerCol = detectColumns(headers, ['player','name']) || headers[0];
      const ageCol = detectColumns(headers, ['age']);
      const valueCol = detectColumns(headers, ['value','ktc','price']);
      const posCol = detectColumns(headers, ['pos','position']);
      ageRows.forEach(r=>{
        const name = normalizeName(r[playerCol]);
        if(!name) return;
        state.ageValueMap.set(name, {
          age: parseNumber(r[ageCol]),
          value: parseNumber(r[valueCol]),
          pos: r[posCol] || ''
        });
      });
    }

    // Build PPG map
    state.ppgMap = new Map();
    if(ppgRows.length){
      const headers = Object.keys(ppgRows[0]);
      const lower = headers.map(h=>h.toLowerCase());
      const find = (must, mustNot=[]) => {
        const idx = lower.findIndex(l=> must.every(m=>l.includes(m)) && mustNot.every(m=>!l.includes(m)));
        return idx>=0 ? headers[idx] : null;
      };
      const playerCol = detectColumns(headers, ['player','name']) || headers[0];
      const pprCol = find(['ppr'], ['tep']);
      const halfCol = find(['half'], ['tep']);
      const stdCol = find(['std'], ['tep']) || find(['standard'], ['tep']);
      const pprTepCol = find(['ppr','tep']);
      const halfTepCol = find(['half','tep']);
      const stdTepCol = find(['std','tep']) || find(['standard','tep']);
      ppgRows.forEach(r=>{
        const name = normalizeName(r[playerCol]);
        if(!name) return;
        state.ppgMap.set(name, {
          ppr: parseNumber(r[pprCol]),
          half: parseNumber(r[halfCol]),
          std: parseNumber(r[stdCol]),
          ppr_tep: parseNumber(r[pprTepCol]),
          half_tep: parseNumber(r[halfTepCol]),
          std_tep: parseNumber(r[stdTepCol]),
        });
      });
    }

    setStatus('Computing team metrics...');
    processTeams();
    renderHeader();
    renderTable();
    setStatus('', false);

    leagueNameEl.textContent = league.name || 'Unnamed League';
    const scoring = getScoringType(league);
    scoringBadge.textContent = `${scoring.type}${scoring.isTEP ? ' TEP' : ''} Scoring`;
    scoringBadge.classList.remove('hidden');
    memberCount.textContent = `${rosters.length} teams`;
    memberCount.classList.remove('hidden');
  }catch(e){
    console.error(e);
    setStatus('Error loading league. Check league ID.', true);
  }
}

function processTeams(){
  const userMap = new Map(state.users.map(u=>[u.user_id, u]));
  const scoring = getScoringType(state.league);
  const starterSlots = state.league.roster_positions.filter(p=>!['BN','TAXI','IR'].includes(p));
  const pickCapitalMap = buildPickCapital(state.rosters, state.tradedPicks, state.league);

  const teams = state.rosters.map(roster=>{
    const user = userMap.get(roster.owner_id) || {};
    const teamName = user.metadata?.team_name || user.display_name || `Team ${roster.roster_id}`;
    const playerIds = roster.players || [];
    const players = playerIds.map(pid=>{
      const p = state.players[pid] || {};
      const fullName = p.full_name || `${p.first_name||''} ${p.last_name||''}`.trim();
      const nameNorm = normalizeName(fullName);
      const av = state.ageValueMap.get(nameNorm) || {};
      const ppgRec = state.ppgMap.get(nameNorm) || {};
      const basePpg = ppgRec[scoring.key] || 0;
      let ppg = basePpg;
      const pos = p.position || av.pos || '';
      if(pos === 'TE' && scoring.isTEP){
        const tepKey = `${scoring.key}_tep`;
        const tepVal = ppgRec[tepKey];
        if(tepVal && tepVal > 0) ppg = tepVal;
      }
      const age = av.age || p.age || 0;
      const value = av.value || 0;
      return {id:pid, name:fullName||pid, pos, team:p.team||'', age, value, ppg};
    }).filter(p=>p.name);

    const {total:ppgTotal, starters, bench} = computeOptimalLineup(players, starterSlots);
    const rosterValue = players.reduce((s,p)=>s+p.value,0);
    const avgAge = players.length ? players.reduce((s,p)=>s+p.age,0)/players.length : 0;
    const pickCapital = pickCapitalMap.get(roster.roster_id) || 0;

    return {
      rosterId: roster.roster_id,
      ownerId: roster.owner_id,
      teamName,
      avatar: user.avatar,
      players,
      starters,
      bench,
      ppg: ppgTotal,
      value: rosterValue,
      avgAge,
      pickCapital,
      record: `${roster.settings?.wins||0}-${roster.settings?.losses||0}`
    };
  });

  // z-scores
  const ppgArr = teams.map(t=>t.ppg);
  const valArr = teams.map(t=>t.value);
  const pickArr = teams.map(t=>t.pickCapital);
  const ageArr = teams.map(t=>t.avgAge);
  const ppgM=mean(ppgArr), ppgS=std(ppgArr,ppgM);
  const valM=mean(valArr), valS=std(valArr,valM);
  const pickM=mean(pickArr), pickS=std(pickArr,pickM);
  const ageM=mean(ageArr), ageS=std(ageArr,ageM);

  teams.forEach(t=>{
    const ppgZ = zscore(t.ppg, ppgM, ppgS);
    const valZ = zscore(t.value, valM, valS);
    const pickZ = zscore(t.pickCapital, pickM, pickS);
    const ageZ = -zscore(t.avgAge, ageM, ageS); // younger better
    const composite = ppgZ*0.40 + valZ*0.30 + pickZ*0.20 + ageZ*0.10;
    t.metrics = {ppgZ,valZ,pickZ,ageZ,composite};
  });

  // percentile & tier
  const sorted = [...teams].sort((a,b)=>b.metrics.composite-a.metrics.composite);
  sorted.forEach((t,i)=>{
    const rank = i+1;
    t.scorePct = ((teams.length - rank) / (teams.length-1 ||1))*100;
  });
  const tierSize = Math.ceil(teams.length/9);
  sorted.forEach((t,i)=>{
    t.tier = Math.min(9, Math.floor(i / tierSize)+1);
  });

  // narratives
  teams.forEach(t=>{
    const {ppgZ,valZ,pickZ,ageZ}=t.metrics;
    const bits=[];
    if(ppgZ>1) bits.push('Elite weekly ceiling');
    else if(ppgZ>0.5) bits.push('Strong starting lineup');
    else if(ppgZ<-0.8) bits.push('Desperate for starters');

    if(valZ>1) bits.push('Deep asset base');
    else if(valZ<-0.8) bits.push('Thin roster value');

    if(pickZ>1) bits.push('Loaded with draft capital');
    if(ageZ>1) bits.push('Youthful core building');

    if(bits.length===0) bits.push('Balanced, middle-of-pack profile');
    t.narrative = bits.slice(0,2).join(' • ');
  });

  state.teams = teams;
}

function renderHeader(){
  theadRow.innerHTML = COLUMNS.map(col=>{
    const isSorted = state.sortKey===col.key;
    const arrow = isSorted ? (state.sortDir==='asc'?'▲':'▼') : '';
    return `
      <th data-key="${col.key}" class="group px-4 md:px-5 py-3.5 text-[11px] uppercase tracking-wider font-semibold text-zinc-500 hover:text-zinc-300 cursor-pointer select-none ${col.align==='right'?'text-right':'text-left'} ${col.width||''}">
        <div class="flex items-center gap-1.5 ${col.align==='right'?'justify-end':'justify-start'}">
          <span>${col.label}</span>
          <span class="text-amber-400 text-[10px] transition opacity-60 group-hover:opacity-100">${arrow}</span>
        </div>
      </th>`;
  }).join('');
}

function sortTeams(){
  const {sortKey, sortDir} = state;
  const dir = sortDir==='asc'?1:-1;
  return [...state.teams].sort((a,b)=>{
    let av = a[sortKey], bv = b[sortKey];
    if(sortKey==='team') { av=a.teamName.toLowerCase(); bv=b.teamName.toLowerCase(); }
    if(sortKey==='narrative') { av=a.narrative.toLowerCase(); bv=b.narrative.toLowerCase(); }
    if(typeof av==='string') return av.localeCompare(bv)*dir;
    return (av-bv)*dir;
  });
}

function renderTable(){
  const teams = sortTeams();
  const rows = teams.map(t=>{
    const expanded = state.expanded.has(t.rosterId);
    const avatarUrl = t.avatar ? `https://sleepercdn.com/avatars/thumbs/${t.avatar}` : '';
    return `
      <tr data-id="${t.rosterId}" class="group cursor-pointer hover:bg-zinc-900/60 transition">
        <td class="px-4 md:px-5 py-4">
          <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-xl bg-zinc-900 border border-zinc-800 flex items-center justify-center overflow-hidden">
              ${avatarUrl?`<img src="${avatarUrl}" class="w-full h-full object-cover"/>`:`<span class="text-zinc-600 font-bold">${t.teamName.slice(0,2).toUpperCase()}</span>`}
            </div>
            <div>
              <div class="font-semibold text-zinc-100 leading-tight">${t.teamName}</div>
              <div class="text-xs text-zinc-500">${t.record} • ${t.players.length} players</div>
            </div>
          </div>
        </td>
        <td class="px-4 py-4 text-center">${tierPill(t.tier)}</td>
        <td class="px-4 py-4 text-right">
          <div class="inline-flex items-center gap-2">
            <div class="w-16 h-1.5 rounded-full bg-zinc-800 overflow-hidden">
              <div class="h-full gold-gradient" style="width:${t.scorePct.toFixed(0)}%"></div>
            </div>
            <span class="font-medium tabular-nums text-zinc-200 w-10 text-right">${fmtPct(t.scorePct)}</span>
          </div>
        </td>
        <td class="px-4 py-4 text-right font-medium tabular-nums text-zinc-100">${fmtNum(t.ppg,1)}</td>
        <td class="px-4 py-4 text-right tabular-nums text-zinc-300">${fmtInt(t.value)}</td>
        <td class="px-4 py-4 text-right tabular-nums text-zinc-300">${fmtInt(t.pickCapital)}</td>
        <td class="px-4 py-4 text-right tabular-nums text-zinc-300">${fmtNum(t.avgAge,1)}</td>
        <td class="px-4 py-4 text-zinc-400 max-w-[320px]"><span class="line-clamp-2">${t.narrative}</span></td>
      </tr>
      <tr class="${expanded?'':'hidden'}" data-details="${t.rosterId}">
        <td colspan="${COLUMNS.length}" class="bg-[#060608] border-t border-zinc-900 p-0">
          <div class="p-5 md:p-7 grid lg:grid-cols-3 gap-6">
            ${renderDetails(t)}
          </div>
        </td>
      </tr>
    `;
  }).join('');
  tbody.innerHTML = rows;
}

function renderDetails(t){
  const startersHtml = t.starters.map(s=>`
    <div class="flex items-center justify-between py-1.5 border-b border-zinc-900 last:border-0">
      <div class="flex items-center gap-2">
        <span class="text-[10px] px-1.5 py-0.5 rounded bg-zinc-800 text-zinc-400 font-mono">${s.slot}</span>
        <span class="text-sm text-zinc-200">${s.name}</span>
        <span class="text-xs text-zinc-600">${s.pos} • ${s.team}</span>
      </div>
      <div class="text-xs tabular-nums text-amber-300">${fmtNum(s.ppg,1)}</div>
    </div>`).join('') || '<div class="text-zinc-600 text-sm">No starters</div>';

  const benchHtml = t.bench.slice(0,12).map(s=>`
    <div class="flex items-center justify-between py-1 text-zinc-400">
      <span class="text-sm">${s.name} <span class="text-xs text-zinc-600">${s.pos}</span></span>
      <span class="text-xs tabular-nums">${fmtNum(s.ppg,1)}</span>
    </div>`).join('');

  const picksHtml = (()=> {
    const season = parseInt(state.league.season);
    const picks = [];
    state.tradedPicks.filter(p=>p.owner_id===t.rosterId || (p.owner_id===t.ownerId)).slice(0,10).forEach(p=>{
      picks.push(`<div class="text-sm text-zinc-400">${p.season} R${p.round} ${p.roster_id!==t.rosterId?'(from '+p.roster_id+')':''}</div>`);
    });
    return picks.length? picks.join('') : '<div class="text-zinc-600 text-sm">No traded picks tracked</div>';
  })();

  return `
    <div class="rounded-2xl border border-zinc-800 bg-zinc-950 p-4">
      <h4 class="display font-semibold text-zinc-200 mb-3">Optimal Starters • ${fmtNum(t.ppg,1)} PPG</h4>
      <div>${startersHtml}</div>
    </div>
    <div class="rounded-2xl border border-zinc-800 bg-zinc-950 p-4">
      <h4 class="display font-semibold text-zinc-200 mb-3">Bench Depth</h4>
      <div class="max-h-[260px] overflow-auto pr-2">${benchHtml || '<div class="text-zinc-600 text-sm">Empty</div>'}</div>
    </div>
    <div class="rounded-2xl border border-zinc-800 bg-zinc-950 p-4">
      <h4 class="display font-semibold text-zinc-200 mb-3">Metrics & Capital</h4>
      <div class="grid grid-cols-2 gap-3 text-sm">
        <div class="p-3 rounded-xl bg-zinc-900 border border-zinc-800"><div class="text-zinc-500 text-xs">Roster Value</div><div class="text-lg font-semibold text-zinc-100">${fmtInt(t.value)}</div></div>
        <div class="p-3 rounded-xl bg-zinc-900 border border-zinc-800"><div class="text-zinc-500 text-xs">Pick Capital</div><div class="text-lg font-semibold text-zinc-100">${fmtInt(t.pickCapital)}</div></div>
        <div class="p-3 rounded-xl bg-zinc-900 border border-zinc-800"><div class="text-zinc-500 text-xs">Avg Age</div><div class="text-lg font-semibold text-zinc-100">${fmtNum(t.avgAge,1)}</div></div>
        <div class="p-3 rounded-xl bg-zinc-900 border border-zinc-800"><div class="text-zinc-500 text-xs">Composite Z</div><div class="text-lg font-semibold text-amber-300">${fmtNum(t.metrics.composite,2)}</div></div>
      </div>
      <div class="mt-4">
        <h5 class="text-xs uppercase tracking-wide text-zinc-500 mb-2">Draft Picks</h5>
        ${picksHtml}
      </div>
    </div>
  `;
}

// Events
theadRow.addEventListener('click', e=>{
  const th = e.target.closest('th[data-key]');
  if(!th) return;
  const key = th.dataset.key;
  if(state.sortKey===key){
    state.sortDir = state.sortDir==='asc'?'desc':'asc';
  }else{
    state.sortKey = key;
    state.sortDir = ['team','narrative'].includes(key)?'asc':'desc';
  }
  renderHeader();
  renderTable();
});

tbody.addEventListener('click', e=>{
  const tr = e.target.closest('tr[data-id]');
  if(!tr) return;
  const id = Number(tr.dataset.id);
  if(state.expanded.has(id)) state.expanded.delete(id);
  else state.expanded.add(id);
  renderTable();
});

loadBtn.addEventListener('click', ()=>{
  const id = leagueIdInput.value.trim();
  if(id) loadLeague(id);
});

leagueIdInput.addEventListener('keydown', e=>{
  if(e.key==='Enter') loadBtn.click();
});

expandAllBtn.addEventListener('click', ()=>{
  state.expanded = new Set(state.teams.map(t=>t.rosterId));
  renderTable();
});
collapseAllBtn.addEventListener('click', ()=>{
  state.expanded.clear();
  renderTable();
});

// Auto load from URL
const params = new URLSearchParams(location.search);
const urlId = params.get('league_id');
if(urlId){
  leagueIdInput.value = urlId;
  loadLeague(urlId);
}
</script>
</body>
</html
