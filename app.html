<script>
const LEAGUE_ID = '1313454100225990656';
const VALUES_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRqxhqyuKK6vu_EoYta5FZ_KdOB8M54Q_qBwJKOUF5KcgbTt2dmHn_FuLj9d-FS8-ta5T0zkU0QEGcN/pub?gid=4113168&single=true&output=csv';
const PPG_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRqxhqyuKK6vu_EoYta5FZ_KdOB8M54Q_qBwJKOUF5KcgbTt2dmHn_FuLj9d-FS8-ta5T0zkU0QEGcN/pub?gid=118408869&single=true&output=csv';
const PICKS_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRqxhqyuKK6vu_EoYta5FZ_KdOB8M54Q_qBwJKOUF5KcgbTt2dmHn_FuLj9d-FS8-ta5T0zkU0QEGcN/pub?gid=972793131&single=true&output=csv';

let teams = [], sort = {key:'total',dir:-1}, expanded = new Set();
const norm = s=>String(s||'').toLowerCase().replace(/[^a-z0-9]+/g,'');
const clean = v => parseFloat(String(v||'').replace(/,/g,'')) || 0;

function archetype(t){ /* unchanged */
  const {valP,ppgP,age,bal} = t;
  if(valP>=75 && ppgP>=75 && age>=24 && age<=27.5) return ['Elite Contender','from-amber-500/20 to-yellow-500/20 text-amber-200 border-amber-600/40'];
  if(ppgP>=70 && age>=27.5) return ['Aging Contender','from-orange-500/20 to-amber-600/20 text-orange-200 border-orange-600/40'];
  if(ppgP>=60 && ppgP<75 && age>=26) return ['Win-Now Fringe','from-amber-600/20 to-yellow-700/20 text-amber-300 border-amber-700/40'];
  if(age<25.5 && valP>=45 && ppgP>=40 && ppgP<65) return ['Young Riser / Ascending','from-emerald-600/20 to-teal-600/20 text-emerald-200 border-emerald-600/40'];
  if(ppgP<40 && age<26 && valP>=35) return ['Pick-Rich Rebuilder','from-sky-600/20 to-cyan-600/20 text-sky-200 border-sky-600/40'];
  if(bal>=70) return ['Balanced Core','from-zinc-600/20 to-neutral-600/20 text-zinc-200 border-zinc-600/40'];
  if(valP>=70 && ppgP<=45) return ['Volatile / High-Variance','from-rose-600/20 to-red-600/20 text-rose-200 border-rose-600/40'];
  if(valP<=25 && ppgP<=25) return ['Stripped Rebuilder','from-stone-700/30 to-stone-800/30 text-stone-300 border-stone-700/40'];
  return ['Stuck in the Middle / Purgatory','from-zinc-700/20 to-zinc-800/20 text-zinc-300 border-zinc-700/40'];
}

async function load(){
  const [league,users,rosters,players,valuesCsv,ppgCsv,traded,picksCsv] = await Promise.all([
    fetch(`https://api.sleeper.app/v1/league/${LEAGUE_ID}`).then(r=>r.json()),
    fetch(`https://api.sleeper.app/v1/league/${LEAGUE_ID}/users`).then(r=>r.json()),
    fetch(`https://api.sleeper.app/v1/league/${LEAGUE_ID}/rosters`).then(r=>r.json()),
    fetch(`https://api.sleeper.app/v1/players/nfl`).then(r=>r.json()),
    fetch(VALUES_URL).then(r=>r.text()),
    fetch(PPG_URL).then(r=>r.text()),
    fetch(`https://api.sleeper.app/v1/league/${LEAGUE_ID}/traded_picks`).then(r=>r.json()),
    fetch(PICKS_URL).then(r=>r.text()),
  ]);
  const values = Papa.parse(valuesCsv,{header:true,skipEmptyLines:true}).data;
  const ppgs = Papa.parse(ppgCsv,{header:true,skipEmptyLines:true}).data;
  const pickVals = Papa.parse(picksCsv,{header:true,skipEmptyLines:true}).data;

  const isSF = (league.roster_positions||[]).includes('SUPER_FLEX');
  const valMap = new Map(); values.forEach(r=>{const sid=String(r.sleeper_id||'').trim(); if(sid) valMap.set(sid, clean(isSF? r.val_sf_ppr_tep05 : r.val_1qb_ppr_tep05));});
  const ppgMap = new Map(); ppgs.forEach(r=>{const n=r.Player||r.player||''; if(n) ppgMap.set(norm(n), parseFloat(r['Avg_PPR_0.5_TEP'])||0);});
  const pickMap = new Map(); pickVals.forEach(r=>{if(r.season) pickMap.set(`${r.season}-${r.round}-${(r.slot||'mid').toLowerCase()}`, isSF? clean(r.sf_value) : clean(r.qb_value));});

  const userMap = new Map(users.map(u=>[u.user_id,u]));
  const r2u = new Map(rosters.map(r=>[r.owner_id,r.roster_id]));
  const slots = (league.roster_positions||[]).filter(s=>!['BN','IR','TAXI'].includes(s));
  const optimal = plist=>{const pool=[...plist].sort((a,b)=>b.ppg-a.ppg);const used=new Set();let tot=0;const starters=[];for(const slot of slots){let a=[slot];if(slot==='FLEX')a=['RB','WR','TE'];if(slot==='SUPER_FLEX')a=['QB','RB','WR','TE'];if(slot==='WRRB_FLEX')a=['RB','WR'];if(slot==='REC_FLEX')a=['WR','TE'];const i=pool.findIndex(p=>!used.has(p.id)&&a.includes(p.pos));if(i>=0){const p=pool[i];used.add(p.id);tot+=p.ppg;starters.push({...p,slot});pool.splice(i,1);}}return{total:tot,starters};};

  // --- FIX: build pick ownership from Sleeper, final owner wins ---
  const YEARS=[2027,2028,2029], ROUNDS=[1,2,3,4];
  const pickOwner = new Map();
  // start with originals
  YEARS.forEach(y=>ROUNDS.forEach(rd=>rosters.forEach(ro=>pickOwner.set(`${y}-${rd}-${ro.roster_id}`, ro.roster_id))));
  // overwrite with every traded pick
  traded.filter(p=>YEARS.includes(+p.season)).forEach(p=>{
    const to = r2u.get(p.owner_id);
    if(to) pickOwner.set(`${p.season}-${p.round}-${p.roster_id}`, to);
  });
  // build inventory
  const own = new Map(rosters.map(r=>[r.roster_id,[]]));
  pickOwner.forEach((owner,key)=>{const [s,r,o]=key.split('-'); own.get(owner).push({season:+s,round:+r,original:+o});});

  const built = rosters.map(r=>{
    const u=userMap.get(r.owner_id)||{}; const teamName=u.metadata?.team_name||u.display_name||'Team'; const username=u.username||'';
    const plist=(r.players||[]).map(pid=>{const p=players[String(pid)]||{}; const name=`${p.first_name||''} ${p.last_name||''}`.trim()||p.full_name||''; return{id:String(pid),name,pos:p.position||'',age:p.age||0,value:valMap.get(String(pid))||0,ppg:ppgMap.get(norm(name))||0};});
    const total=plist.reduce((s,p)=>s+p.value,0); const qb=plist.filter(p=>p.pos==='QB').reduce((s,p)=>s+p.value,0); const rb=plist.filter(p=>p.pos==='RB').reduce((s,p)=>s+p.value,0); const wr=plist.filter(p=>p.pos==='WR').reduce((s,p)=>s+p.value,0); const te=plist.filter(p=>p.pos==='TE').reduce((s,p)=>s+p.value,0);
    const vAge=plist.filter(p=>p.value>0&&p.age>0); const sumV=vAge.reduce((s,p)=>s+p.value,0); const age=sumV? vAge.reduce((s,p)=>s+p.value*p.age,0)/sumV:0;
    const {total:opt,starters}=optimal(plist); const sumPos=qb+rb+wr+te||1; const shares=[qb,rb,wr,te].map(v=>v/sumPos); const mean=shares.reduce((a,b)=>a+b)/4; const std=Math.sqrt(shares.reduce((s,x)=>s+(x-mean)**2,0)/4); const bal=100-std*200;
    return {rosterId:r.roster_id,teamName,username,total,qb,rb,wr,te,age,opt,starters,plist,bal,picks:own.get(r.roster_id)||[]};
  });

  const avgOpt=built.reduce((s,t)=>s+t.opt,0)/built.length;
  built.forEach(t=>t.production=avgOpt? t.opt/avgOpt*100:100);

  // tier picks
  const sorted=[...built].sort((a,b)=>b.opt-a.opt); const n=sorted.length; const late=n===10?3:4; const mid=4;
  const tier=new Map(sorted.map((t,i)=>[t.rosterId,i<late?'late':i<late+mid?'mid':'early']));

  built.forEach(t=>{let sum=0; t.picks.forEach(p=>{p.tier=tier.get(p.original)||'mid'; p.value=pickMap.get(`${p.season}-${p.round}-${p.tier}`)||0; sum+=p.value;}); t.picksValue=sum;});

  // --- NEW LONGEVITY: 60% value + 20% age + 20% picks ---
  const maxVal=Math.max(...built.map(t=>t.total)); const maxPicks=Math.max(...built.map(t=>t.picksValue));
  built.forEach(t=>{
    const valScore = maxVal? t.total/maxVal*100 : 50;
    const ageScore = Math.max(0,Math.min(100,100-((t.age-23)*8))); // younger = higher
    const pickScore = maxPicks? t.picksValue/maxPicks*100 : 50;
    t.longRaw = valScore*0.6 + ageScore*0.2 + pickScore*0.2;
  });
  const avgLong=built.reduce((s,t)=>s+t.longRaw,0)/built.length;
  built.forEach(t=>t.longevity=avgLong? t.longRaw/avgLong*100:100);

  const vals=built.map(t=>t.total).sort((a,b)=>a-b); const opts=built.map(t=>t.opt).sort((a,b)=>a-b);
  built.forEach(t=>{t.valP=vals.indexOf(t.total)/(vals.length-1)*100; t.ppgP=opts.indexOf(t.opt)/(opts.length-1)*100; const [l,c]=archetype(t); t.arch=l; t.archCls=c;});
  built.sort((a,b)=>b.total-a.total); built.forEach((t,i)=>t.rank=i+1); teams=built; render();
  document.getElementById('status').innerHTML=`<div class="size-2 rounded-full bg-emerald-400"></div><span>Live • ${teams.length} teams • picks synced</span>`;
}
function render(){ /* your existing render() unchanged */
  const tbody=document.getElementById('tbody'); const data=[...teams].sort((a,b)=>{const av=a[sort.key],bv=b[sort.key];return sort.dir*(av>bv?1:av<bv?-1:0);}); document.querySelectorAll('th.sortable').forEach(th=>th.classList.toggle('active',th.dataset.sort===sort.key));
  tbody.innerHTML=data.map(t=>{const exp=expanded.has(t.rosterId); const qb=t.plist.filter(p=>p.pos==='QB').sort((a,b)=>b.value-a.value); const rb=t.plist.filter(p=>p.pos==='RB').sort((a,b)=>b.value-a.value); const wr=t.plist.filter(p=>p.pos==='WR').sort((a,b)=>b.value-a.value); const te=t.plist.filter(p=>p.pos==='TE').sort((a,b)=>b.value-a.value);
  return `<tr class="team-row" data-id="${t.rosterId}"><td class="px-4 py-3 font-mono text-amber-300/80">${t.rank}</td><td class="px-4 py-3"><div class="flex items-center gap-2"><svg class="size-3 text-amber-400 ${exp?'rotate-90':''}" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="m9 18 6-6-6-6" stroke-width="2"/></svg><div><div class="font-semibold">${t.teamName}</div><div class="text- text-amber-200/60">@${t.username} • ${t.picks.length} picks</div></div></div></td><td class="px-3 py-3 text-right font-mono font-semibold">${Math.round(t.total).toLocaleString()}</td><td class="px-3 py-3 text-right font-mono text-sky-300">${Math.round(t.qb).toLocaleString()}</td><td class="px-3 py-3 text-right font-mono text-emerald-300">${Math.round(t.rb).toLocaleString()}</td><td class="px-3 py-3 text-right font-mono text-fuchsia-300">${Math.round(t.wr).toLocaleString()}</td><td class="px-3 py-3 text-right font-mono text-amber-300">${Math.round(t.te).toLocaleString()}</td><td class="px-3 py-3 text-right font-mono text-yellow-300">${Math.round(t.picksValue).toLocaleString()}</td><td class="px-3 py-3 text-right font-mono">${t.age.toFixed(1)}</td><td class="px-3 py-3 text-right"><span class="opt px-2 py-1 rounded-lg bg-amber-950/60 border border-amber-800" data-id="${t.rosterId}">${t.opt.toFixed(1)}</span></td><td class="px-3 py-3 text-right font-mono ${t.production>=100?'text-emerald-300':'text-rose-300'}">${Math.round(t.production)}</td><td class="px-3 py-3 text-right font-mono ${t.longevity>=100?'text-emerald-300':'text-rose-300'}">${Math.round(t.longevity)}</td><td class="px-4 py-3"><span class="px-2.5 py-1 rounded-full text- border bg-gradient-to-r ${t.archCls}">${t.arch}</span></td></tr>${exp?`<tr class="bg-[#0b0703]"><td colspan="13" class="p-4"><div class="grid md:grid-cols-5 gap-4">${[['QB',qb,'text-sky-300'],['RB',rb,'text-emerald-300'],['WR',wr,'text-fuchsia-300'],['TE',te,'text-amber-300']].map(([l,ls,c])=>`<div class="rounded-xl border-amber-900/50 bg-[#140f06]/70 p-3"><div class="text- uppercase tracking-widest text-amber-200/70 mb-2">${l} <span class="${c}">${Math.round(t[l.toLowerCase()]).toLocaleString()}</span></div><div class="space-y-1 max-h- overflow-auto">${ls.map(p=>`<div class="flex justify-between text-"><span>${p.name} <span class="text-amber-200/40">• ${p.age||''}y</span></span><span class="font-mono">${Math.round(p.value).toLocaleString()}</span></div>`).join('')}</div></div>`).join('')}<div class="rounded-xl border border-amber-900/50 bg-[#140f06]/70 p-3"><div class="text- uppercase tracking-widest text-amber-200/70 mb-2">Picks <span class="text-yellow-300">${Math.round(t.picksValue).toLocaleString()}</span></div><div class="space-y-1 max-h- overflow-auto">${t.picks.sort((a,b)=>a.season-b.season||a.round-b.round).map(p=>`<div class="flex justify-between text-"><span>${p.season} R${p.round} <span class="text-amber-200/50">• ${p.tier}</span></span><span class="font-mono">${Math.round(p.value).toLocaleString()}</span></div>`).join('')}</div></div></td></tr>`:''}`;}).join('');
  document.querySelectorAll('tr.team-row').forEach(tr=>tr.onclick=e=>{if(e.target.closest('.opt'))return;const id=+tr.dataset.id;expanded.has(id)?expanded.delete(id):expanded.add(id);render();});
}
document.querySelectorAll('th.sortable').forEach(th=>th.addEventListener('click',()=>{const k=th.dataset.sort;if(sort.key===k)sort.dir*=-1;else{sort.key=k;sort.dir=-1;}render();}));
document.getElementById('refresh').addEventListener('click',load); load();
</script>
