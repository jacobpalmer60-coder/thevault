<!DOCTYPE html>
<html lang="en">
<head>

<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Roster Audit — League Overview</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<style>

<body class="bg-[#0a0a0a] text-[#e5e5e5] antialiased">
<div class="max-w-[1400px] mx-auto px-4 py-5">
  <!-- Top Bar -->
  <header class="bg-[#111111] border border-[#2a2a2a] px-4 py-3 flex flex-wrap items-center gap-3">
    <h1 class="text-[20px] font-bold tracking-tight mr-2">League Overview</h1>
    <div class="flex items-center gap-2">
      <input id="leagueIdInput" placeholder="League ID" class="bg-[#0a0a0a] border border-[#2a2a2a] px-3 py-1.5 text-sm w-[200px] outline-none focus:border-[#3a3a3a] placeholder-[#6b7280]" />
      <button id="loadBtn" class="bg-[#e5e5e5] text-[#0a0a0a] text-sm font-semibold px-3 py-1.5 border border-[#e5e5e5] hover:bg-white">Load</button>
    </div>
    <div class="flex-1 min-w-[200px] flex justify-end">
      <input id="searchInput" placeholder="Search team..." class="bg-[#0a0a0a] border border-[#2a2a2a] px-3 py-1.5 text-sm w-full max-w-[260px] outline-none focus:border-[#3a3a3a] placeholder-[#6b7280]" />
    </div>
    <span class="ml-auto bg-[#1f2937] text-[#e5e5e5] border border-[#2a2a2a] text-xs font-bold px-2 py-1 tracking-wide">SF LOCKED</span>
  </header>

  <!-- Legend -->
  <div class="bg-[#111111] border-x border-b border-[#2a2a2a] px-4 py-3 flex flex-wrap items-center gap-2 text-xs">
    <span class="text-[#9ca3af] mr-1">TIER LEGEND:</span>
    <span class="inline-flex items-center gap-1 px-2 py-0.5 bg-[#00bcd4] text-black font-semibold border border-[#2a2a2a]">DIAMOND <span class="opacity-70">CHAMPIONSHIP WINDOW</span></span>
    <span class="inline-flex items-center gap-1 px-2 py-0.5 bg-[#e5e7eb] text-black font-semibold border border-[#2a2a2a]">PLATINUM <span class="opacity-70">CONTENDER</span></span>
    <span class="inline-flex items-center gap-1 px-2 py-0.5 bg-[#f59e0b] text-black font-semibold border border-[#2a2a2a]">GOLD <span class="opacity-70">FRINGE/BUBBLE</span></span>
    <span class="inline-flex items-center gap-1 px-2 py-0.5 bg-[#9ca3af] text-black font-semibold border border-[#2a2a2a]">SILVER <span class="opacity-70">RETOOLING</span></span>
    <span class="inline-flex items-center gap-1 px-2 py-0.5 bg-[#d97706] text-black font-semibold border border-[#2a2a2a]">BRONZE <span class="opacity-70">REBUILDING</span></span>
    <span class="inline-flex items-center gap-1 px-2 py-0.5 bg-[#4b5563] text-white font-semibold border border-[#2a2a2a]">IRON <span class="opacity-70">TANKING</span></span>
  </div>

  <!-- Status -->
  <div id="status" class="px-1 py-3 text-sm text-[#9ca3af]">Enter a League ID to begin.</div>

  <!-- Table -->
  <div class="bg-[#111111] border border-[#2a2a2a] overflow-x-auto">
    <table class="w-full text-sm">
      <thead class="sticky top-0 z-10 bg-[#111111] border-b border-[#2a2a2a]">
        <tr class="text-left text-[#9ca3af] text-xs uppercase tracking-wide">
          <th class="px-3 py-2 w-12">#</th>
          <th class="px-3 py-2 min-w-[200px] cursor-pointer select-none" data-sort="team">Team <span class="sort-ind"></span></th>
          <th class="px-3 py-2 cursor-pointer select-none text-right" data-sort="qb">QB <span class="sort-ind"></span></th>
          <th class="px-3 py-2 cursor-pointer select-none text-right" data-sort="rb">RB <span class="sort-ind"></span></th>
          <th class="px-3 py-2 cursor-pointer select-none text-right" data-sort="wr">WR <span class="sort-ind"></span></th>
          <th class="px-3 py-2 cursor-pointer select-none text-right" data-sort="te">TE <span class="sort-ind"></span></th>
          <th class="px-3 py-2 cursor-pointer select-none text-right" data-sort="pk">PK <span class="sort-ind"></span></th>
          <th class="px-3 py-2 cursor-pointer select-none text-right" data-sort="ppg">PPG <span class="sort-ind"></span></th>
          <th class="px-3 py-2 cursor-pointer select-none text-right" data-sort="value">Value <span class="sort-ind"></span></th>
          <th class="px-3 py-2 cursor-pointer select-none text-right" data-sort="age">Age <span class="sort-ind"></span></th>
        </tr>
      </thead>
      <tbody id="tbody" class="divide-y divide-[#1a1a1a]">
      </tbody>
    </table>
  </div>

  <footer class="py-6 text-center text-xs text-[#6b7280]">Flat dark theme • No blur • No glow • No gradients</footer>
</div>

<script type="module">
const VALUES_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRZY-Dra8s3j-ocJ7OK6yTs3BFcj-A_WeiIX35u49fg2xA8Y3Pg-nnOHVOnfZGOEAFWrj1EFBOV6qzi/pub?gid=2077026411&single=true&output=csv';

const state = {
  leagueId: null,
  league: null,
  rosters: [],
  users: [],
  players: null,
  picksOwned: {},
  valuesMap: new Map(),
  pickValuesMap: new Map(),
  teams: [],
  sortKey: 'value',
  sortDir: 'desc',
  search: '',
  expanded: new Set()
};

const $ = s => document.querySelector(s);
const tbody = $('#tbody');
const statusEl = $('#status');
const leagueInput = $('#leagueIdInput');
const searchInput = $('#searchInput');

function setStatus(msg){ statusEl.textContent = msg; }

function fmtInt(n){ return n ? Math.round(n).toLocaleString() : '0'; }
function fmt1(n){ return n ? n.toFixed(1) : '0.0'; }
function fmtCompact(n){
  if(!n) return '0';
  if(n>=1000000) return (n/1000000).toFixed(1)+'M';
  if(n>=1000) return (n/1000).toFixed(1)+'k';
  return Math.round(n).toString();
}

function getParam(){
  const p = new URLSearchParams(location.search);
  return p.get('league_id') || p.get('league') || p.get('id');
}

function saveLeagueId(id){ localStorage.setItem('lastLeagueId', id); }

function tierFromRank(pct){
  // pct 0 = best
  if(pct < 0.10) return {key:'diamond', name:'CHAMPIONSHIP WINDOW', bg:'#00bcd4', fg:'#000'};
  if(pct < 0.30) return {key:'platinum', name:'CONTENDER', bg:'#e5e7eb', fg:'#000'};
  if(pct < 0.55) return {key:'gold', name:'FRINGE/BUBBLE', bg:'#f59e0b', fg:'#000'};
  if(pct < 0.75) return {key:'silver', name:'RETOOLING', bg:'#9ca3af', fg:'#000'};
  if(pct < 0.90) return {key:'bronze', name:'REBUILDING', bg:'#d97706', fg:'#000'};
  return {key:'iron', name:'TANKING', bg:'#4b5563', fg:'#fff'};
}

async function fetchJSON(url){
  const r = await fetch(url);
  if(!r.ok) throw new Error(`${r.status} ${url}`);
  return r.json();
}

async function loadPlayers(){
  if(state.players) return state.players;
  setStatus('Loading players database...');
  const data = await fetchJSON('https://api.sleeper.app/v1/players/nfl');
  state.players = data;
  return data;
}

async function loadValues(){
  setStatus('Loading values sheet...');
  const csvText = await fetch(VALUES_CSV_URL).then(r=>r.text());
  const parsed = Papa.parse(csvText, {header:true, skipEmptyLines:true});
  const rows = parsed.data;
  state.valuesMap.clear();
  state.pickValuesMap.clear();

  for(const r of rows){
    const obj = {};
    for(const k in r){ obj[k.trim().toLowerCase()] = r[k]; }
    const pid = obj.player_id || obj.id || obj.sleeper_id || '';
    const name = (obj.player || obj.name || obj.full_name || '').trim();
    const pos = (obj.position || obj.pos || '').toUpperCase();
    const team = (obj.team || obj.nfl_team || '').toUpperCase();
    const age = parseFloat(obj.age) || null;
    const ppg = parseFloat(obj.ppg || obj.fppg || obj.pts || 0) || 0;
    const value = parseFloat(obj.value || obj.dynasty_value || obj.val || 0) || 0;

    // Pick detection
    const isPick = pos==='PICK' || /pick/.test(name.toLowerCase()) || /^\d{4}\s+\d/.test(name);
    if(isPick){
      const m = name.match(/(\d{4}).*?(\d)(?:st|nd|rd|th)?/i);
      if(m){
        const season = parseInt(m[1],10);
        const round = parseInt(m[2],10);
        const key = `${season}-${round}`;
        state.pickValuesMap.set(key, value);
      }
      continue;
    }

    const rec = { pid: pid||null, name, pos, team, age, ppg, value };
    if(pid) state.valuesMap.set(pid, rec);
    if(name) state.valuesMap.set(name.toLowerCase(), rec);
  }
}

function getPlayerValue(pid){
  const p = state.players?.[pid];
  if(!p) return null;
  // try by id
  let rec = state.valuesMap.get(pid);
  if(!rec){
    const nameKey = `${p.first_name||''} ${p.last_name||''}`.trim().toLowerCase();
    rec = state.valuesMap.get(nameKey);
  }
  if(!rec && p.full_name){
    rec = state.valuesMap.get(p.full_name.toLowerCase());
  }
  return rec || { pid, name: p.full_name || `${p.first_name||''} ${p.last_name||''}`.trim(), pos:p.position, team:p.team, age:p.age||null, ppg:0, value:0 };
}

function computePickOwnership(){
  const season = parseInt(state.league.season,10);
  const years = [season, season+1, season+2];
  const rounds = [1,2,3,4];
  const rosters = state.rosters;
  const picksByOwner = {};
  for(const r of rosters) picksByOwner[r.roster_id] = [];

  // initialize defaults
  const pickMap = new Map(); // key season-round-orig -> owner
  for(const r of rosters){
    for(const y of years){
      for(const rd of rounds){
        const key = `${y}-${rd}-${r.roster_id}`;
        pickMap.set(key, r.roster_id);
      }
    }
  }
  // apply trades
  const traded = state.tradedPicks || [];
  for(const tp of traded){
    const key = `${tp.season}-${tp.round}-${tp.roster_id}`;
    // ensure key exists
    if(!pickMap.has(key)){
      // add it anyway
      pickMap.set(key, tp.owner_id);
    } else {
      pickMap.set(key, tp.owner_id);
    }
  }
  // build lists
  for(const [key, ownerId] of pickMap.entries()){
    const [seasonStr, roundStr, origStr] = key.split('-');
    const seasonNum = parseInt(seasonStr,10);
    const roundNum = parseInt(roundStr,10);
    const orig = parseInt(origStr,10);
    if(!picksByOwner[ownerId]) picksByOwner[ownerId] = [];
    picksByOwner[ownerId].push({season:seasonNum, round:roundNum, original_roster_id:orig});
  }
  // sort
  for(const rid in picksByOwner){
    picksByOwner[rid].sort((a,b)=> a.season===b.season ? a.round-b.round : a.season-b.season);
  }
  state.picksOwned = picksByOwner;
}

function pickValue(season, round){
  const key = `${season}-${round}`;
  if(state.pickValuesMap.has(key)) return state.pickValuesMap.get(key);
  const cur = parseInt(state.league.season,10);
  const base = [5000,2500,1200,600,300][round-1]||200;
  const discount = Math.pow(0.78, season-cur);
  return Math.round(base*discount);
}

function optimalPPG(players, rosterPositions){
  // Simple starter allocation
  const counts = {};
  for(const p of rosterPositions) counts[p] = (counts[p]||0)+1;
  const starters = {
    QB: counts['QB']||0,
    RB: counts['RB']||0,
    WR: counts['WR']||0,
    TE: counts['TE']||0,
    FLEX: (counts['FLEX']||0)+(counts['WRRB_FLEX']||0)+(counts['WRT']||0),
    SUPER_FLEX: counts['SUPER_FLEX']||0
  };
  // copy players with ppg
  const pool = players.slice().sort((a,b)=>b.ppg-a.ppg);
  const used = new Set();
  let total = 0;
  const take = (posList,n)=>{
    let taken=0;
    for(const pl of pool){
      if(taken>=n) break;
      if(used.has(pl.pid)) continue;
      if(posList.includes(pl.pos)){
        used.add(pl.pid);
        total += pl.ppg;
        taken++;
      }
    }
  };
  take(['QB'], starters.QB);
  take(['RB'], starters.RB);
  take(['WR'], starters.WR);
  take(['TE'], starters.TE);
  take(['QB','RB','WR','TE'], starters.SUPER_FLEX);
  take(['RB','WR','TE'], starters.FLEX);
  return total;
}

function processTeams(){
  const usersById = Object.fromEntries(state.users.map(u=>[u.user_id,u]));
  const rosters = state.rosters;
  const rosterPositions = state.league.roster_positions || [];

  const teams = [];

  for(const r of rosters){
    const user = usersById[r.owner_id];
    const teamName = user?.metadata?.team_name || user?.display_name || `Team ${r.roster_id}`;
    const playerIds = r.players || [];
    const players = [];
    let sumVal=0, sumValAge=0, sumAgeWeight=0;
    const posVals = {QB:0,RB:0,WR:0,TE:0};
    const posPlayers = {QB:[],RB:[],WR:[],TE:[]};

    for(const pid of playerIds){
      const rec = getPlayerValue(pid);
      if(!rec) continue;
      players.push(rec);
      sumVal += rec.value||0;
      if(rec.age && rec.value>0){ sumValAge += rec.age*rec.value; sumAgeWeight+=rec.value; }
      if(posVals.hasOwnProperty(rec.pos)){
        posVals[rec.pos] += rec.value||0;
        posPlayers[rec.pos].push(rec);
      }
    }
    // picks
    const picks = state.picksOwned[r.roster_id] || [];
    let pickValTotal = 0;
    const pickDetails = picks.map(p=>{
      const v = pickValue(p.season,p.round);
      pickValTotal += v;
      return {...p, value:v, label:`${p.season} R${p.round}`};
    });

    const totalValue = sumVal + pickValTotal;
    const avgAge = sumAgeWeight ? sumValAge/sumAgeWeight : null;
    const ppg = optimalPPG(players, rosterPositions);
    const record = `${r.settings?.wins||0}-${r.settings?.losses||0}${r.settings?.ties?'-'+r.settings.ties:''}`;

    teams.push({
      roster_id:r.roster_id,
      teamName,
      record,
      players,
      posVals,
      posPlayers,
      picks:pickDetails,
      pickValTotal,
      totalValue,
      playerValue:sumVal,
      avgAge,
      ppg,
      wins:r.settings?.wins||0
    });
  }

  // positional ranks
  const posKeys = ['QB','RB','WR','TE'];
  for(const pk of posKeys){
    const sorted = [...teams].sort((a,b)=>b.posVals[pk]-a.posVals[pk]);
    sorted.forEach((t,i)=> t[`${pk.toLowerCase()}_rank`] = i+1);
  }
  // pick rank
  const pickSorted = [...teams].sort((a,b)=>b.pickValTotal-a.pickValTotal);
  pickSorted.forEach((t,i)=> t.pk_rank = i+1);

  // composite for tier
  const maxVal = Math.max(...teams.map(t=>t.totalValue));
  const maxPPG = Math.max(...teams.map(t=>t.ppg));
  teams.forEach(t=>{
    const vPct = maxVal? t.totalValue/maxVal :0;
    const pPct = maxPPG? t.ppg/maxPPG :0;
    t.composite = 0.6*vPct + 0.4*pPct;
  });
  const sortedComp = [...teams].sort((a,b)=>b.composite-a.composite);
  sortedComp.forEach((t,i)=>{
    const pct = i/(teams.length-1 ||1);
    t.tier = tierFromRank(pct);
    t.overallRank = i+1;
  });

  state.teams = teams;
}

function render(){
  const search = state.search.toLowerCase();
  let rows = state.teams.filter(t=> !search || t.teamName.toLowerCase().includes(search));

  // sort
  const key = state.sortKey;
  const dir = state.sortDir==='asc'?1:-1;
  rows.sort((a,b)=>{
    let av, bv;
    switch(key){
      case 'team': av=a.teamName.toLowerCase(); bv=b.teamName.toLowerCase(); return av.localeCompare(bv)*dir;
      case 'qb': av=a.posVals.QB; bv=b.posVals.QB; break;
      case 'rb': av=a.posVals.RB; bv=b.posVals.RB; break;
      case 'wr': av=a.posVals.WR; bv=b.posVals.WR; break;
      case 'te': av=a.posVals.TE; bv=b.posVals.TE; break;
      case 'pk': av=a.pickValTotal; bv=b.pickValTotal; break;
      case 'ppg': av=a.ppg; bv=b.ppg; break;
      case 'value': av=a.totalValue; bv=b.totalValue; break;
      case 'age': av=a.avgAge||99; bv=b.avgAge||99; break;
      default: av=a.totalValue; bv=b.totalValue;
    }
    return (av - bv)*dir;
  });

  tbody.innerHTML='';
  rows.forEach((t,idx)=>{
    const tr = document.createElement('tr');
    tr.className='cursor-pointer hover:bg-[#1a1a1a]';
    tr.dataset.rosterId = t.roster_id;
    tr.innerHTML = `
      <td class="px-3 py-2 mono text-[#9ca3af]">${idx+1}</td>
      <td class="px-3 py-2">
        <div class="flex items-center gap-2">
          <span class="inline-block w-2 h-2" style="background:${t.tier.bg}"></span>
          <div>
            <div class="font-semibold leading-tight">${t.teamName}</div>
            <div class="text-[11px] text-[#6b7280] uppercase tracking-wide">${t.tier.name}</div>
          </div>
        </div>
      </td>
      <td class="px-3 py-2 text-right mono">${fmtCompact(t.posVals.QB)}</td>
      <td class="px-3 py-2 text-right mono">${fmtCompact(t.posVals.RB)}</td>
      <td class="px-3 py-2 text-right mono">${fmtCompact(t.posVals.WR)}</td>
      <td class="px-3 py-2 text-right mono">${fmtCompact(t.posVals.TE)}</td>
      <td class="px-3 py-2 text-right mono">${fmtCompact(t.pickValTotal)}</td>
      <td class="px-3 py-2 text-right mono">${fmt1(t.ppg)}</td>
      <td class="px-3 py-2 text-right mono font-semibold">${fmtCompact(t.totalValue)}</td>
      <td class="px-3 py-2 text-right mono">${t.avgAge?fmt1(t.avgAge):'-'}</td>
    `;
    tbody.appendChild(tr);

    if(state.expanded.has(t.roster_id)){
      const detailTr = document.createElement('tr');
      detailTr.className='bg-[#0f0f0f]';
      detailTr.innerHTML = `<td colspan="10" class="p-0 border-t border-[#2a2a2a]">${renderDetail(t)}</td>`;
      tbody.appendChild(detailTr);
    }
  });

  // update sort indicators
  document.querySelectorAll('th[data-sort]').forEach(th=>{
    const ind = th.querySelector('.sort-ind');
    if(th.dataset.sort===state.sortKey){
      ind.textContent = state.sortDir==='asc'?'▲':'▼';
    }else{
      ind.textContent='';
    }
  });
}

function renderDetail(t){
  const totalPosVal = t.posVals.QB+t.posVals.RB+t.posVals.WR+t.posVals.TE+t.pickValTotal;
  const segs = [
    {k:'QB',v:t.posVals.QB,c:'#3b82f6'},
    {k:'RB',v:t.posVals.RB,c:'#22c55e'},
    {k:'WR',v:t.posVals.WR,c:'#eab308'},
    {k:'TE',v:t.posVals.TE,c:'#a855f7'},
    {k:'PK',v:t.pickValTotal,c:'#6b7280'}
  ];
  const bar = `<div class="flex w-full h-3 border border-[#2a2a2a] overflow-hidden">`+
    segs.map(s=>{
      const pct = totalPosVal? (s.v/totalPosVal*100):0;
      return `<div style="width:${pct}%;background:${s.c}" title="${s.k} ${fmtCompact(s.v)}"></div>`;
    }).join('')+`</div>`;

  // scouting summary
  const strongest = segs.reduce((a,b)=> b.v>a.v?b:a);
  const weakest = segs.filter(s=>s.k!=='PK').reduce((a,b)=> b.v<a.v?b:a);
  const ageNote = t.avgAge ? (t.avgAge<25.5?'young core': t.avgAge>27.5?'aging roster':'balanced age') : '';
  const summary = `${strongest.k} strength${strongest.k==='PK'?' in draft capital':''}, ${weakest.k} is thinnest. ${ageNote}.`;

  const badges = `
    <div class="flex flex-wrap gap-2">
      <span class="px-2 py-0.5 bg-[#1f2937] border border-[#2a2a2a] text-xs font-semibold">RECORD ${t.record}</span>
      <span class="px-2 py-0.5 border border-[#2a2a2a] text-xs font-semibold" style="background:${t.tier.bg};color:${t.tier.fg}">${t.tier.name}</span>
      <span class="px-2 py-0.5 bg-[#1f2937] border border-[#2a2a2a] text-xs font-semibold">PICKS ${t.picks.length}</span>
    </div>
  `;

  function posCol(pos){
    const list = t.posPlayers[pos]||[];
    list.sort((a,b)=>b.value-a.value);
    const total = t.posVals[pos];
    const avgAge = list.length? (list.reduce((s,p)=>s+(p.age||0),0)/list.filter(p=>p.age).length ||0):0;
    const rank = t[`${pos.toLowerCase()}_rank`];
    const items = list.slice(0,12).map(p=>`
      <div class="flex justify-between gap-2 py-0.5 border-b border-[#1a1a1a] last:border-0">
        <div class="truncate">${p.name} <span class="text-[#6b7280]">(${p.team||''})</span></div>
        <div class="mono text-[#9ca3af] text-xs">${p.age? p.age.toFixed(1):'-'} • ${fmt1(p.ppg)} • ${fmtCompact(p.value)}</div>
      </div>`).join('');
    return `
      <div class="bg-[#0a0a0a] border border-[#2a2a2a] p-2">
        <div class="flex items-center justify-between mb-1">
          <div class="font-bold">${pos}</div>
          <span class="text-[10px] px-1.5 py-0.5 bg-[#1f2937] border border-[#2a2a2a]">RANK #${rank}</span>
        </div>
        <div class="text-xs text-[#9ca3af] mb-2">Total ${fmtCompact(total)} • Avg Age ${avgAge?fmt1(avgAge):'-'}</div>
        <div class="text-sm">${items || '<div class="text-[#6b7280] text-xs">No players</div>'}</div>
      </div>`;
  }

  function picksCol(){
    const items = t.picks.map(p=>`
      <div class="flex justify-between gap-2 py-0.5 border-b border-[#1a1a1a] last:border-0">
        <div>${p.label}${p.original_roster_id!==t.roster_id?' *':''}</div>
        <div class="mono text-xs text-[#9ca3af]">${fmtCompact(p.value)}</div>
      </div>`).join('');
    return `
      <div class="bg-[#0a0a0a] border border-[#2a2a2a] p-2">
        <div class="flex items-center justify-between mb-1">
          <div class="font-bold">PICKS</div>
          <span class="text-[10px] px-1.5 py-0.5 bg-[#1f2937] border border-[#2a2a2a]">RANK #${t.pk_rank}</span>
        </div>
        <div class="text-xs text-[#9ca3af] mb-2">Total ${fmtCompact(t.pickValTotal)} • Count ${t.picks.length}</div>
        <div class="text-sm">${items || '<div class="text-[#6b7280] text-xs">No picks</div>'}</div>
      </div>`;
  }

  return `
    <div class="p-4 space-y-3">
      ${bar}
      <div class="text-sm">${summary}</div>
      ${badges}
      <div class="grid grid-cols-1 md:grid-cols-5 gap-3">
        ${posCol('QB')}
        ${posCol('RB')}
        ${posCol('WR')}
        ${posCol('TE')}
        ${picksCol()}
      </div>
    </div>
  `;
}

// Event delegation for expand
tbody.addEventListener('click', e=>{
  const tr = e.target.closest('tr[data-roster-id]');
  if(!tr) return;
  const id = parseInt(tr.dataset.rosterId,10);
  if(state.expanded.has(id)) state.expanded.delete(id);
  else state.expanded.add(id);
  render();
});

// Sorting
document.querySelectorAll('th[data-sort]').forEach(th=>{
  th.addEventListener('click', ()=>{
    const key = th.dataset.sort;
    if(state.sortKey===key){
      state.sortDir = state.sortDir==='asc'?'desc':'asc';
    }else{
      state.sortKey=key;
      state.sortDir = key==='team'?'asc':'desc';
    }
    render();
  });
});

searchInput.addEventListener('input', e=>{
  state.search = e.target.value;
  render();
});

async function loadLeague(id){
  try{
    state.leagueId=id;
    saveLeagueId(id);
    setStatus('Loading league...');
    const [league, rosters, users, traded] = await Promise.all([
      fetchJSON(`https://api.sleeper.app/v1/league/${id}`),
      fetchJSON(`https://api.sleeper.app/v1/league/${id}/rosters`),
      fetchJSON(`https://api.sleeper.app/v1/league/${id}/users`),
      fetchJSON(`https://api.sleeper.app/v1/league/${id}/traded_picks`).catch(()=>[])
    ]);
    state.league=league;
    state.rosters=rosters;
    state.users=users;
    state.tradedPicks=traded;
    await loadPlayers();
    await loadValues();
    computePickOwnership();
    processTeams();
    setStatus(`Loaded ${state.teams.length} teams • ${league.name}`);
    render();
  }catch(err){
    console.error(err);
    setStatus('Error loading league: '+err.message);
  }
}

$('#loadBtn').addEventListener('click', ()=>{
  const id = leagueInput.value.trim();
  if(id) loadLeague(id);
});
leagueInput.addEventListener('keydown', e=>{ if(e.key==='Enter') $('#loadBtn').click(); });

// Auto load
const paramId = getParam();
const stored = localStorage.getItem('lastLeagueId');
const initId = paramId || stored;
if(initId){
  leagueInput.value = initId;
  loadLeague(initId);
}
</script>
</body>
</html>
