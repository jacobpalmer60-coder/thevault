<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Roster Audit • Dynasty Dashboard</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root { color-scheme: dark; }
  body { font-family: 'Inter', system-ui, -apple-system, sans-serif; background:#020617; }
  .mono { font-family:'JetBrains Mono', monospace; }
  .glass { backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
  .scrollbar-none::-webkit-scrollbar { display:none; }
  .scrollbar-none { scrollbar-width:none; }
  .rank-pill { box-shadow: 0 0 0 1px rgba(255,255,255,.08) inset, 0 4px 12px rgba(0,0,0,.4); }
  .sort-btn.active { color:#e2e8f0; }
  .sort-btn .arrow { opacity:.4; transition:.2s; }
  .sort-btn.active .arrow { opacity:1; }
  .tooltip { position:relative; }
  .tooltip:hover .tooltip-card { opacity:1; transform:translateY(0); pointer-events:auto; }
  .tooltip-card { position:absolute; bottom:100%; left:50%; transform:translateX(-50%) translateY(4px); opacity:0; pointer-events:none; transition:.15s; z-index:50; }

<body class="min-h-screen bg-[#020617] text-slate-200 selection:bg-fuchsia-500/30">
<div class="absolute inset-0 pointer-events-none overflow-hidden">

  <div class="absolute top-0 right-0 w-[500px] h-[500px] bg-cyan-500/10 rounded-full blur-3xl"></div>
  <div class="absolute bottom-0 left-1/2 -translate-x-1/2 w-[800px] h-[400px] bg-indigo-600/10 rounded-full blur-3xl"></div>

<div class="relative max-w-[1280px] mx-auto px-4 py-8 md:py-12">

            <th class="text-left font-medium px-3 py-3 whitespace-nowrap">
              <button class="sort-btn flex items-center gap-1 hover:text-slate-300" data-sort="ppg">PPG <span class="arrow">↕</span></button>
            </th>
            <th class="text-left font-medium px-3 py-3 whitespace-nowrap">
              <button class="sort-btn flex items-center gap-1 hover:text-slate-300" data-sort="qb">QB <span class="arrow">↕</span></button>
            </th>
            <th class="text-left font-medium px-3 py-3 whitespace-nowrap">
              <button class="sort-btn flex items-center gap-1 hover:text-slate-300" data-sort="rb">RB <span class="arrow">↕</span></button>
            </th>
            <th class="text-left font-medium px-3 py-3 whitespace-nowrap">
              <button class="sort-btn flex items-center gap-1 hover:text-slate-300" data-sort="wr">WR <span class="arrow">↕</span></button>
            </th>
            <th class="text-left font-medium px-3 py-3 whitespace-nowrap">
              <button class="sort-btn flex items-center gap-1 hover:text-slate-300" data-sort="te">TE <span class="arrow">↕</span></button>

            </th>

        </thead>
        <tbody id="rankingsBody" class="divide-y divide-slate-800/70"></tbody>
      </table>
    </div>
  </div>

  <!-- Expanded Team -->
  <div id="expandedWrap" class="mt-8 hidden">
    <div class="flex items-center justify-between mb-4">
      <h3 id="expandedTitle" class="text-xl font-semibold"></h3>
      <button id="collapseBtn" class="text-xs px-3 py-1.5 rounded-lg bg-slate-800 hover:bg-slate-700 border border-slate-700">Collapse</button>
    </div>
    <div id="expandedGrid" class="grid grid-cols-1 lg:grid-cols-4 gap-4"></div>
    <div id="draftPanel" class="mt-4"></div>
  </div>

  <!-- Footer -->
  <footer class="mt-16 text-center text-xs text-slate-600">
    Auto-load from ?league_id= • Dark theme • No internal scroll in expanded view
  </footer>

<script>
const tierOrder = { 'Elite Contender':0, 'Competitive':1, 'Middle Pack':2, 'Rebuild':3 };
const tierStyles = {
  'Elite Contender': 'bg-emerald-500/15 text-emerald-300 border-emerald-500/30',
  'Competitive': 'bg-cyan-500/15 text-cyan-300 border-cyan-500/30',
  'Middle Pack': 'bg-amber-500/15 text-amber-300 border-amber-500/30',
  'Rebuild': 'bg-rose-500/15 text-rose-300 border-rose-500/30'
};

const state = {
  league:null,
  users:[],
  rosters:[],
  players:{},
  valuesMap:new Map(),
  ppgMap:new Map(),
  drafts:[],
  tradedPicks:[],
  teams:[],
  sortColumn:'overall',
  sortDir:'desc',
  expandedRosterId:null,
  currentSeason:getCurrentSeason()
};

function getCurrentSeason(){
  const now = new Date();
  const year = now.getFullYear();
  const month = now.getMonth()+1;
  return month >= 3 ? year : year-1; // NFL season year starts ~ Sep, approximate
}

// ---- CSV: Values + PPG (direct pull via data URL) ----
const VALUES_CSV = `player_name,position,team,value,ppg
Josh Allen,QB,BUF,9500,24.8
Lamar Jackson,QB,BAL,9400,24.2
Jalen Hurts,QB,PHI,9300,23.9
Patrick Mahomes,QB,KC,9200,23.5
Joe Burrow,QB,CIN,8800,22.1
C.J. Stroud,QB,HOU,8700,21.8
Anthony Richardson,QB,IND,8400,21.0
Justin Herbert,QB,LAC,8300,20.7
Dak Prescott,QB,DAL,7900,20.2
Brock Purdy,QB,SF,7700,19.8
Bijan Robinson,RB,ATL,9800,22.5
Breece Hall,RB,NYJ,9600,21.9
Jahmyr Gibbs,RB,DET,9300,20.8

Justin Jefferson,WR,MIN,10000,24.1
Ja'Marr Chase,WR,CIN,9900,23.8
CeeDee Lamb,WR,DAL,9850,23.6
Amon-Ra St. Brown,WR,DET,9700,22.9
Puka Nacua,WR,LAR,9600,22.4

Marvin Harrison Jr.,WR,ARI,9200,20.8

Drake London,WR,ATL,9000,20.1
Brandon Aiyuk,WR,SF,8900,19.8
Chris Olave,WR,NO,8800,19.5
Jaylen Waddle,WR,MIA,8700,19.3
Zay Flowers,WR,BAL,8600,18.9
Tank Dell,WR,HOU,8500,18.7
DeVonta Smith,WR,PHI,8400,18.5
Brian Thomas Jr.,WR,JAX,8300,18.2
Jordan Addison,WR,MIN,8200,17.9
Rashee Rice,WR,KC,8100,17.7
Sam LaPorta,TE,DET,8800,17.2
Trey McBride,TE,ARI,8600,16.8
Dalton Kincaid,TE,BUF,8400,15.9
Mark Andrews,TE,BAL,8200,15.5
Travis Kelce,TE,KC,8100,16.0
T.J. Hockenson,TE,MIN,8000,15.2
Kyle Pitts,TE,ATL,7900,14.8
David Njoku,TE,CLE,7700,14.3
Evan Engram,TE,JAX,7600,14.0
Jake Ferguson,TE,DAL,7400,13.6
Cole Kmet,TE,CHI,7200,13.1`;

async function fetchValuesCSV(){
  const url = 'data:text/csv;charset=utf-8,'+encodeURIComponent(VALUES_CSV);
  const txt = await (await fetch(url)).text();
  const rows = txt.trim().split('\n').slice(1);
  state.valuesMap.clear();
  state.ppgMap.clear();
  for(const r of rows){
    const [name,pos,team,val,ppg] = r.split(',');
    state.valuesMap.set(name.toLowerCase(), {value:+val, pos, team});
    state.ppgMap.set(name.toLowerCase(), +ppg);
  }
}

// ---- UI Helpers ----
function setStatus(msg, show=true){
  const el = document.getElementById('status');
  document.getElementById('statusText').textContent = msg;
  el.classList.toggle('hidden', !show);
}
function fmt(n){ return n>=1000 ? (n/1000).toFixed(1).replace(/\.0$/,'')+'k' : n.toString(); }
function rankPill(rank){
  const colors = ['from-amber-400 to-yellow-500','from-slate-300 to-slate-400','from-orange-400 to-amber-600'];
  const g = rank<=3 ? colors[rank-1] : 'from-slate-600 to-slate-700';
  return `<span class="rank-pill inline-flex items-center justify-center w-7 h-7 rounded-full bg-gradient-to-br ${g} text-[11px] font-bold text-slate-900 shadow">${rank}</span>`;
}

// ---- Load League ----
async function loadLeague(leagueId){
  try{
    setStatus('Loading league…');
    state.league = await (await fetch(`https://api.sleeper.app/v1/league/${leagueId}`)).json();
    const [users, rosters, drafts, traded] = await Promise.all([
      fetch(`https://api.sleeper.app/v1/league/${leagueId}/users`).then(r=>r.json()),
      fetch(`https://api.sleeper.app/v1/league/${leagueId}/rosters`).then(r=>r.json()),
      fetch(`https://api.sleeper.app/v1/league/${leagueId}/drafts`).then(r=>r.json()).catch(()=>[]),
      fetch(`https://api.sleeper.app/v1/league/${leagueId}/traded_picks`).then(r=>r.json()).catch(()=>[])
    ]);
    state.users = users; state.rosters = rosters; state.drafts = drafts; state.tradedPicks = traded;
    setStatus('Loading players database…');
    if(Object.keys(state.players).length===0){
      state.players = await (await fetch('https://api.sleeper.app/v1/players/nfl')).json();
    }
    await fetchValuesCSV();
    processData();
    setStatus('', false);
    renderMeta();
    renderTable();
  }catch(e){
    console.error(e);
    setStatus('Failed to load league. Check ID and try again.');
  }
}

function processData(){
  const userMap = new Map(state.users.map(u=>[u.user_id,u]));
  const draftBySeason = new Map(state.drafts.map(d=>[d.season,d]));
  // baseline picks ownership: assume each roster owns its own picks for next 3 seasons rounds 1-4
  const futureSeasons = [state.currentSeason, state.currentSeason+1, state.currentSeason+2, state.currentSeason+3];
  const pickBaseline = [];
  for(const r of state.rosters){
    for(const s of futureSeasons){
      for(let rd=1; rd<=4; rd++){
        pickBaseline.push({season:s, round:rd, roster_id:r.roster_id, owner_id:r.roster_id});
      }
    }
  }
  // apply trades
  const picks = [...pickBaseline];
  for(const tp of state.tradedPicks){
    const idx = picks.findIndex(p=> p.season===tp.season && p.round===tp.round && p.roster_id===tp.roster_id);
    if(idx>=0) picks[idx].owner_id = tp.owner_id;
  }
  // filter future-only with completed draft detection
  const picksFuture = picks.filter(p=>{
    const draft = draftBySeason.get(p.season);
    const isComplete = draft && draft.status==='complete';
    if(p.season < state.currentSeason) return false;
    if(p.season === state.currentSeason && isComplete) return false;
    return true;
  });

  // Build teams
  const teams = [];
  for(const r of state.rosters){
    const user = userMap.get(r.owner_id) || {};
    const playerIds = [...new Set([...(r.players||[]), ...(r.starters||[])])]; // dedupe
    const players = playerIds.map(pid=>{
      const p = state.players[pid];
      if(!p) return null;
      const key = (p.full_name||`${p.first_name} ${p.last_name}`).toLowerCase();
      const meta = state.valuesMap.get(key) || {value: Math.max(0, 5000 - (p.age||24)*100), pos:p.position, team:p.team};
      const ppg = state.ppgMap.get(key) || (p.position==='QB'?15:p.position==='RB'?10:p.position==='WR'?11:7);
      return {
        id:pid,
        name:p.full_name||`${p.first_name} ${p.last_name}`,
        pos:p.position,
        team:p.team,
        age:p.age||null,
        value:meta.value,
        ppg,
        injury:p.injury_status
      };
    }).filter(Boolean);

    const starters = (r.starters||[]).map(pid=>{
      const p = players.find(x=>x.id===pid);
      return p || null;
    }).filter(Boolean);

    const sum = (arr,fn)=>arr.reduce((a,b)=>a+fn(b),0);
    const qbVal = sum(players.filter(p=>p.pos==='QB'), p=>p.value);
    const rbVal = sum(players.filter(p=>p.pos==='RB'), p=>p.value);
    const wrVal = sum(players.filter(p=>p.pos==='WR'), p=>p.value);
    const teVal = sum(players.filter(p=>p.pos==='TE'), p=>p.value);
    const overall = qbVal+rbVal+wrVal+teVal;
    const ppg = sum(starters, p=>p.ppg);

    const myPicks = picksFuture.filter(p=>p.owner_id===r.roster_id);
    const pickEquity = myPicks.reduce((a,p)=>{
      const base = [1000,500,250,120][p.round-1]||60;
      const decay = Math.pow(0.85, p.season - state.currentSeason);
      return a + base*decay;
    },0);

    teams.push({
      roster_id:r.roster_id,
      teamName: user.display_name || user.metadata?.team_name || `Team ${r.roster_id}`,
      avatar:user.avatar,
      record:`${r.settings.wins}-${r.settings.losses}`,
      players,
      starters,
      qbVal, rbVal, wrVal, teVal,
      overall,
      ppg,
      picks:myPicks,
      pickEquity,
      tier:''
    });
  }
  // Contender tiers
  const sorted = [...teams].sort((a,b)=> b.overall - a.overall);
  sorted.forEach((t,i)=>{
    const pct = i/ sorted.length;
    t.tier = pct<0.25?'Elite Contender': pct<0.5?'Competitive': pct<0.75?'Middle Pack':'Rebuild';
  });
  // ranks
  const rankBy = (key, desc=true)=>{
    const arr = [...teams].sort((a,b)=> desc ? b[key]-a[key] : a[key]-b[key]);
    const map = new Map();
    arr.forEach((t,i)=> map.set(t.roster_id, i+1));
    return map;
  };
  const ranks = {
    overall: rankBy('overall'),
    ppg: rankBy('ppg'),
    qb: rankBy('qbVal'),
    rb: rankBy('rbVal'),
    wr: rankBy('wrVal'),
    te: rankBy('teVal'),
    draft: rankBy('pickEquity')
  };
  teams.forEach(t=> t.ranks = {
    overall:ranks.overall.get(t.roster_id),
    ppg:ranks.ppg.get(t.roster_id),
    qb:ranks.qb.get(t.roster_id),
    rb:ranks.rb.get(t.roster_id),
    wr:ranks.wr.get(t.roster_id),
    te:ranks.te.get(t.roster_id),
    draft:ranks.draft.get(t.roster_id)
  });
  state.teams = teams;
}

// ---- Render Meta ----
function renderMeta(){
  const el = document.getElementById('leagueMeta');
  const l = state.league;
  if(!l) return;
  el.classList.remove('hidden');
  el.innerHTML = `
    <div class="rounded-2xl bg-slate-900/60 border border-slate-800 p-4">
      <div class="text-[11px] uppercase tracking-widest text-slate-500">League</div>
      <div class="text-lg font-semibold truncate">${l.name}</div>
    </div>
    <div class="rounded-2xl bg-slate-900/60 border border-slate-800 p-4">
      <div class="text-[11px] uppercase tracking-widest text-slate-500">Season</div>
      <div class="text-lg font-semibold mono">${l.season}</div>
    </div>
    <div class="rounded-2xl bg-slate-900/60 border border-slate-800 p-4">
      <div class="text-[11px] uppercase tracking-widest text-slate-500">Teams</div>
      <div class="text-lg font-semibold mono">${state.teams.length}</div>
    </div>
    <div class="rounded-2xl bg-slate-900/60 border border-slate-800 p-4">
      <div class="text-[11px] uppercase tracking-widest text-slate-500">Rosters</div>
      <div class="text-lg font-semibold mono">PPR • ${l.settings?.best_ball? 'Best Ball':'Lineup'}</div>
    </div>`;
}

// ---- Sorting ----
function getSortVal(t,col){
  switch(col){
    case 'team': return t.teamName.toLowerCase();
    case 'tier': return tierOrder[t.tier];
    case 'overall': return t.overall;
    case 'ppg': return t.ppg;
    case 'qb': return t.qbVal;
    case 'rb': return t.rbVal;
    case 'wr': return t.wrVal;
    case 'te': return t.teVal;
    case 'draft': return t.pickEquity;
  }
}
function sortTeams(){
  const col = state.sortColumn;
  const dir = state.sortDir;
  state.teams.sort((a,b)=>{
    const av = getSortVal(a,col);
    const bv = getSortVal(b,col);
    if(av===bv) return 0;
    const cmp = av > bv ? 1 : -1;
    return dir==='asc' ? cmp : -cmp;
  });
}

// ---- Render Table ----
function renderTable(){
  sortTeams();
  const tbody = document.getElementById('rankingsBody');
  tbody.innerHTML = state.teams.map(t=>{
    const avatar = t.avatar ? `https://sleepercdn.com/avatars/thumbs/${t.avatar}` : '';
    return `<tr class="hover:bg-slate-900/60 cursor-pointer transition" data-roster="${t.roster_id}">
      <td class="px-5 md:px-7 py-4">
        <div class="flex items-center gap-3">
          ${avatar? `<img src="${avatar}" class="w-9 h-9 rounded-xl object-cover border border-slate-700" onerror="this.style.display='none'">` : `<div class="w-9 h-9 rounded-xl bg-slate-800 flex items-center justify-center text-slate-500 text-xs font-bold">${t.teamName.slice(0,2).toUpperCase()}</div>`}
          <div>
            <div class="font-semibold leading-tight">${t.teamName}</div>
            <div class="text-xs text-slate-500 mono">${t.record}</div>
          </div>
        </div>
      </td>
      <td class="px-3 py-4"><span class="inline-flex items-center px-2.5 py-1 rounded-full text-xs font-medium border ${tierStyles[t.tier]}">${t.tier}</span></td>
      <td class="px-3 py-4"><div class="flex items-center gap-2">${rankPill(t.ranks.overall)} <span class="mono text-slate-300">${fmt(t.overall)}</span></div></td>
      <td class="px-3 py-4"><div class="flex items-center gap-2">${rankPill(t.ranks.ppg)} <span class="mono text-slate-300">${t.ppg.toFixed(1)}</span></div></td>
      <td class="px-3 py-4"><div class="flex items-center gap-2">${rankPill(t.ranks.qb)} <span class="mono text-slate-400">${fmt(t.qbVal)}</span></div></td>
      <td class="px-3 py-4"><div class="flex items-center gap-2">${rankPill(t.ranks.rb)} <span class="mono text-slate-400">${fmt(t.rbVal)}</span></div></td>
      <td class="px-3 py-4"><div class="flex items-center gap-2">${rankPill(t.ranks.wr)} <span class="mono text-slate-400">${fmt(t.wrVal)}</span></div></td>
      <td class="px-3 py-4"><div class="flex items-center gap-2">${rankPill(t.ranks.te)} <span class="mono text-slate-400">${fmt(t.teVal)}</span></div></td>
      <td class="px-3 py-4"><div class="flex items-center gap-2">${rankPill(t.ranks.draft)} <span class="mono text-slate-400">${fmt(Math.round(t.pickEquity))}</span></div></td>
    </tr>`;
  }).join('');
  // row click
  tbody.querySelectorAll('tr').forEach(tr=>{
    tr.addEventListener('click', ()=>{
      const id = +tr.dataset.roster;
      state.expandedRosterId = state.expandedRosterId===id ? null : id;
      renderExpanded();
    });
  });
  // sort buttons
  document.querySelectorAll('.sort-btn').forEach(btn=>{
    const col = btn.dataset.sort;
    btn.classList.toggle('active', col===state.sortColumn);
    const arrow = btn.querySelector('.arrow');
    if(col===state.sortColumn){
      arrow.textContent = state.sortDir==='asc' ? '↑' : '↓';
    }else{
      arrow.textContent = '↕';
    }
    btn.onclick = (e)=>{
      e.stopPropagation();
      if(state.sortColumn===col){
        state.sortDir = state.sortDir==='asc' ? 'desc' : 'asc';
      }else{
        state.sortColumn = col;
        state.sortDir = col==='team' || col==='tier' ? 'asc' : 'desc';
      }
      renderTable();
    };
  });
}

// ---- Render Expanded ----
function renderExpanded(){
  const wrap = document.getElementById('expandedWrap');
  if(!state.expandedRosterId){
    wrap.classList.add('hidden');
    return;
  }
  wrap.classList.remove('hidden');
  const t = state.teams.find(x=>x.roster_id===state.expandedRosterId);
  document.getElementById('expandedTitle').textContent = `${t.teamName} • Full Roster`;
  const grid = document.getElementById('expandedGrid');
  const posData = [
    {key:'QB', val:t.qbVal, rank:t.ranks.qb, players:t.players.filter(p=>p.pos==='QB')},
    {key:'RB', val:t.rbVal, rank:t.ranks.rb, players:t.players.filter(p=>p.pos==='RB')},
    {key:'WR', val:t.wrVal, rank:t.ranks.wr, players:t.players.filter(p=>p.pos==='WR')},
    {key:'TE', val:t.teVal, rank:t.ranks.te, players:t.players.filter(p=>p.pos==='TE')},
  ];
  grid.innerHTML = posData.map(pos=>{
    const players = pos.players.sort((a,b)=>b.value-a.value);
    return `
    <div class="rounded-[1.25rem] border border-slate-800 bg-slate-900/70 flex flex-col">
      <div class="px-4 py-3 border-b border-slate-800 flex items-center justify-between">
        <div class="flex items-center gap-2">
          <span class="text-sm font-bold tracking-wide">${pos.key}</span>
          <span class="text-[10px] px-1.5 py-0.5 rounded bg-slate-800 text-slate-400 border border-slate-700">Rank ${pos.rank}</span>
        </div>
        <div class="mono text-sm text-slate-300">${fmt(pos.val)}</div>
      </div>
      <div class="p-2 flex flex-col gap-1.5">
        ${players.length? players.map(p=>`
          <div class="tooltip group flex items-center justify-between rounded-xl px-3 py-2 bg-slate-950/60 border border-slate-800 hover:border-slate-700 transition">
            <div class="min-w-0">
              <div class="font-medium leading-tight truncate">${p.name} <span class="text-[10px] text-slate-500">${p.team||''}</span></div>
              <div class="text-[11px] text-slate-500 mono">Age ${p.age||'—'} • ${p.value? fmt(p.value):'—'}</div>
            </div>
            <div class="text-right">
              <div class="text-xs mono text-cyan-300">${p.ppg.toFixed(1)}</div>
              <div class="text-[10px] uppercase tracking-wide text-slate-600">PPG</div>
            </div>
            <div class="tooltip-card">
              <div class="rounded-xl bg-slate-900 border border-slate-700 shadow-2xl px-3 py-2 text-xs w-48">
                <div class="font-semibold">${p.name}</div>
                <div class="text-slate-400">${p.pos} • ${p.team||'FA'} • Age ${p.age||'—'}</div>
                <div class="mt-1 mono text-slate-300">Value: ${fmt(p.value)} • PPG: ${p.ppg.toFixed(1)}</div>
                ${p.injury? `<div class="mt-1 text-amber-400">⚠ ${p.injury}</div>`:''}
              </div>
            </div>
          </div>
        `).join('') : `<div class="text-center text-slate-600 text-sm py-8">No players</div>`}
      </div>
    </div>`;
  }).join('');

  // Draft panel - full width, responsive wrap, no scroll
  const draftEl = document.getElementById('draftPanel');
  const picksBySeason = {};
  t.picks.forEach(p=>{
    (picksBySeason[p.season] ||= []).push(p);
  });
  const seasons = Object.keys(picksBySeason).sort();
  draftEl.innerHTML = `
    <div class="rounded-[1.25rem] border border-slate-800 bg-slate-900/70">
      <div class="px-4 py-3 border-b border-slate-800 flex items-center justify-between">
        <div class="flex items-center gap-2">
          <span class="text-sm font-bold tracking-wide">DRAFT CAPITAL</span>
          <span class="text-[10px] px-1.5 py-0.5 rounded bg-slate-800 text-slate-400 border border-slate-700">Rank ${t.ranks.draft}</span>
        </div>
        <div class="mono text-sm text-slate-300">Equity ${fmt(Math.round(t.pickEquity))}</div>
      </div>
      <div class="p-4">
        ${seasons.length? seasons.map(s=>`
          <div class="mb-4 last:mb-0">
            <div class="text-xs uppercase tracking-widest text-slate-500 mb-2">${s}</div>
            <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-2">
              ${picksBySeason[s].sort((a,b)=>a.round-b.round).map(p=>`
                <div class="rounded-xl border border-slate-800 bg-slate-950/70 px-3 py-2 flex items-center justify-between">
                  <span class="text-sm font-semibold">R${p.round}</span>
                  <span class="text-[11px] mono text-slate-500">${p.roster_id===t.roster_id?'Own':'Acq'}</span>
                </div>
              `).join('')}
            </div>
          </div>
        `).join('') : `<div class="text-center text-slate-600 py-8 text-sm">No future picks</div>`}
      </div>
    </div>
  `;
  // scroll into view
  wrap.scrollIntoView({behavior:'smooth', block:'start'});
}

// ---- Init ----
document.getElementById('loadBtn').addEventListener('click', ()=>{
  const id = document.getElementById('leagueIdInput').value.trim();
  if(id) {
    history.replaceState(null,'',`?league_id=${id}`);
    loadLeague(id);
  }
});
document.getElementById('collapseBtn').addEventListener('click', ()=>{
  state.expandedRosterId=null;
  renderExpanded();
});
window.addEventListener('DOMContentLoaded', ()=>{
  const params = new URLSearchParams(location.search);
  const id = params.get('league_id');
  if(id){
    document.getElementById('leagueIdInput').value = id;
    loadLeague(id);
  }
});
</script>
</body>
</html>
