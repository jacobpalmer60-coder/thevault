<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>THE VAULT • Debug Picks</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{color-scheme:dark}
body{font-family:Inter,system-ui;background:#000}
.display{font-family:Cinzel,serif}
.gold-solid{color:#FFD700}
.gold-border{border-color:#FFD70033}
.rank-pill{min-width:2.5rem}
tr.team-row{cursor:pointer}
tr.team-row:hover{background:rgba(255,215,0,.06)}
</style>
</head>
<body class="text-zinc-200 leading-tight">
<header class="sticky top-0 z-30 border-b border-yellow-900/30 bg-black/80"><div class="max-w- mx-auto px-6 py-4 flex justify-between"><div class="flex items-center gap-3"><div class="size-10 rounded-xl bg-gradient-to-br from-yellow-600 to-amber-400 p-"><div class="size-full rounded- bg-black grid place-items-center"><span class="display text-xl gold-solid">V</span></div></div><h1 class="display text-2xl font-bold gold-solid">THE VAULT</h1></div><button id="refresh" class="px-4 py-2 rounded-xl bg-yellow-500/10 border border-yellow-700/50 text-yellow-200 text-sm">Refresh</button></div></header>
<main class="max-w- mx-auto px-6 py-8"><div id="status" class="mb-4 flex items-center gap-2 text-yellow-200/80 text-sm"><div class="size-2 rounded-full bg-yellow-400 animate-pulse"></div><span>Loading…</span></div><div class="overflow-hidden rounded-2xl border border-yellow-900/30 bg-zinc-950/80"><div class="overflow-x-auto"><table class="w-full text-"><thead class="bg-zinc-900/90 sticky top-0 border-b border-yellow-900/30"><tr class="text- uppercase tracking-widest text-yellow-200/70"><th class="px-3 w-8"></th><th class="px-3 text-left">Team</th><th class="px-2 text-right" data-sort="prodDelta">Prod</th><th class="px-2 text-right" data-sort="longDelta">Long</th><th class="px-2 text-right" data-sort="total">Total</th><th class="px-2 text-right">QB</th><th class="px-2 text-right">RB</th><th class="px-2 text-right">WR</th><th class="px-2 text-right">TE</th><th class="px-2 text-right" data-sort="picksValue">Picks</th><th class="px-2 text-right">Age</th><th class="px-2 text-right">Opt</th><th class="px-3">Arch</th></tr></thead><tbody id="tbody" class="divide-y divide-zinc-800"></tbody></table></div></main>
<script>
const LEAGUE_ID='1313454100225990656';
const VALUES_URL='https://docs.google.com/spreadsheets/d/e/2PACX-1vRqxhqyuKK6vu_EoYta5FZ_KdOB8M54Q_qBwJKOUF5KcgbTt2dmHn_FuLj9d-FS8-ta5T0zkU0QEGcN/pub?gid=4113168&single=true&output=csv';
const PPG_URL='https://docs.google.com/spreadsheets/d/e/2PACX-1vRqxhqyuKK6vu_EoYta5FZ_KdOB8M54Q_qBwJKOUF5KcgbTt2dmHn_FuLj9d-FS8-ta5T0zkU0QEGcN/pub?gid=118408869&single=true&output=csv';
const PICK_VALUES_URL='https://docs.google.com/spreadsheets/d/e/2PACX-1vRqxhqyuKK6vu_EoYta5FZ_KdOB8M54Q_qBwJKOUF5KcgbTt2dmHn_FuLj9d-FS8-ta5T0zkU0QEGcN/pub?gid=972793131&single=true&output=csv';
let teams=[],sort={key:'total',dir:-1},expanded=new Set();
const norm=s=>String(s||'').toLowerCase().replace(/[^a-z0-9]+/g,'');
const rankClass=(r,t)=>r===1?'bg-yellow-400/25 text-yellow-100 border-yellow-400/70':(p=r/t)<=.25?'bg-emerald-600/25 text-emerald-200 border-emerald-700':p<=.5?'bg-sky-600/25 text-sky-200 border-sky-700':p<=.75?'bg-zinc-700/25 text-zinc-200 border-zinc-600':'bg-rose-700/30 text-rose-200 border-rose-800';

function getArchetype(t){
  if(t.prodDelta>8 && t.age<26) return 'Win Now';
  if(t.prodDelta>3 && t.longDelta>5) return 'Contender';
  if(t.prodDelta<-5 && t.picksValue>7000) return 'Rebuild';
  if(t.longDelta>8 && t.age<25.5) return 'Youth Build';
  if(t.age>27.5 && t.picksValue<4000) return 'Aging';
  return 'Balanced';
}

async function load(){
 const [lg,users,rosters,players,vCsv,pCsv,traded]=await Promise.all([
  fetch(`https://api.sleeper.app/v1/league/${LEAGUE_ID}`).then(r=>r.json()),
  fetch(`https://api.sleeper.app/v1/league/${LEAGUE_ID}/users`).then(r=>r.json()),
  fetch(`https://api.sleeper.app/v1/league/${LEAGUE_ID}/rosters`).then(r=>r.json()),
  fetch(`https://api.sleeper.app/v1/players/nfl`).then(r=>r.json()),
  fetch(VALUES_URL).then(r=>r.text()),
  fetch(PPG_URL).then(r=>r.text()),
  fetch(`https://api.sleeper.app/v1/league/${LEAGUE_ID}/traded_picks`).then(r=>r.json())
 ]);
 const isSF = (lg.roster_positions||[]).includes('SUPER_FLEX');
 const SEASONS=[2027,2028,2029], ROUNDS=[1,2,3,4];
 const valMap=new Map();Papa.parse(vCsv,{header:true,skipEmptyLines:true}).data.forEach(r=>{if(r.sleeper_id)valMap.set(String(r.sleeper_id), isSF? +r.val_sf_ppr_tep05||0 : +r.val_1qb_ppr_tep05||0)});
 const ppgMap=new Map();Papa.parse(pCsv,{header:true,skipEmptyLines:true}).data.forEach(r=>{const n=r.Player||r.player;if(n)ppgMap.set(norm(n),+r['Avg_PPR_0.5_TEP']||0)});
 const userMap=new Map(users.map(u=>[u.user_id,u])), rosterByUser=new Map(rosters.map(r=>[r.owner_id,r.roster_id]));
 const slots=(lg.roster_positions||[]).filter(s=>!['BN','IR','TAXI'].includes(s));
 const optimal=list=>{const pool=[...list].sort((a,b)=>b.ppg-a.ppg);let t=0;const u=new Set();for(const s of slots){let a=[s];if(s==='FLEX')a=['RB','WR','TE'];if(s==='SUPER_FLEX')a=['QB','RB','WR','TE'];const i=pool.findIndex(p=>!u.has(p.id)&&a.includes(p.pos));if(i>=0){u.add(pool[i].id);t+=pool[i].ppg;pool.splice(i,1)}}return t};
 const built=rosters.map(r=>{const u=userMap.get(r.owner_id)||{};const plist=(r.players||[]).map(pid=>{const p=players[String(pid)]||{};const n=`${p.first_name||''} ${p.last_name||''}`.trim()||p.full_name||'';return{id:String(pid),name:n,pos:p.position||'',age:p.age||0,value:valMap.get(String(pid))||0,ppg:ppgMap.get(norm(n))||0}});const tot=plist.reduce((s,p)=>s+p.value,0);const age=(()=>{const v=plist.filter(p=>p.value>0&&p.age>0);const sv=v.reduce((s,p)=>s+p.value,0);return sv?v.reduce((s,p)=>s+p.value*p.age,0)/sv:0})();return{rosterId:r.roster_id,teamName:u.metadata?.team_name||u.display_name||'Team',username:u.username||'',total:tot,qb:plist.filter(p=>p.pos==='QB').reduce((s,p)=>s+p.value,0),rb:plist.filter(p=>p.pos==='RB').reduce((s,p)=>s+p.value,0),wr:plist.filter(p=>p.pos==='WR').reduce((s,p)=>s+p.value,0),te:plist.filter(p=>p.pos==='TE').reduce((s,p)=>s+p.value,0),age,opt:optimal(plist),plist}});
 const avgOpt=built.reduce((s,t)=>s+t.opt,0)/built.length;built.forEach(t=>{t.prodDelta=(t.opt/avgOpt-1)*100;t.prodPts=t.opt-avgOpt});

 // FIXED: build picks for 2027-29 only, apply trades correctly
 const own=new Map(built.map(t=>[t.rosterId,[]]));
 built.forEach(t=>SEASONS.forEach(s=>ROUNDS.forEach(r=>own.get(t.rosterId).push({season:s,round:r,original:t.rosterId}))));
 const relevant=traded.filter(p=>SEASONS.includes(+p.season));
 relevant.forEach(p=>{const nr=rosterByUser.get(p.owner_id);if(!nr)return;const list=own.get(p.roster_id);const i=list.findIndex(x=>x.season==p.season&&x.round==p.round);if(i>=0)list.splice(i,1);own.get(nr).push({season:+p.season,round:+p.round,original:p.roster_id})});

 // tier by PPG - top 3 = late, middle 6 = mid, bottom 3 = early
 const tier=new Map([...built].sort((a,b)=>b.opt-a.opt).map((t,i)=>[t.rosterId,i<3?'late':i<9?'mid':'early']));

 let pickVal=new Map();try{const csv=await fetch(PICK_VALUES_URL).then(r=>r.text());Papa.parse(csv,{header:true,skipEmptyLines:true}).data.forEach(r=>{if(r.season){const key=`${r.season}-${r.round}-${(r.slot||'mid').toLowerCase()}`;const val=isSF?+r.sf_value:+r.qb_value;pickVal.set(key,val)}})}catch(e){}

 built.forEach(t=>{const ps=own.get(t.rosterId)||[];let sum=0;ps.forEach(p=>{p.tier=tier.get(p.original)||'mid';p.value=pickVal.get(`${p.season}-${p.round}-${p.tier}`)||0;sum+=p.value});t.picks=ps.sort((a,b)=>a.season-b.season||a.round-b.round);t.picksValue=sum;t.capital=t.total+sum;t.cpy=t.capital/Math.max(t.age,1)});
 const avgCpy=built.reduce((s,t)=>s+t.cpy,0)/built.length;built.forEach(t=>t.longDelta=(t.cpy/avgCpy-1)*100);
 teams=built;render();document.getElementById('status').innerHTML=`<div class="size-2 rounded-full bg-yellow-400"></div><span>${isSF?'SF':'1QB'} • Live • ${teams.length} teams • ${relevant.length} trades • 2027-29</span>`;
}
function rankMap(k,a=false){const s=[...teams].sort((x,y)=>a?x[k]-y[k]:y[k]-x[k]);const m=new Map();s.forEach((t,i)=>m.set(t.rosterId,i+1));return m}
function render(){const tb=document.getElementById('tbody');const data=[...teams].sort((a,b)=>{const av=a[sort.key],bv=b[sort.key];return sort.dir*(av>bv?1:av<bv?-1:0)});const rP=rankMap('prodDelta'),rL=rankMap('longDelta'),rT=rankMap('total'),rK=rankMap('picksValue');tb.innerHTML=data.map(t=>{const e=expanded.has(t.rosterId);return`<tr class="team-row" data-id="${t.rosterId}"><td class="px-2"><svg class="size-3 text-yellow-400 ${e?'rotate-90':''}" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="m9 18 6-6-6-6" stroke-width="2"/></svg></td><td class="px-2 py-2"><div class="font-medium">${t.teamName}</div><div class="text- text-zinc-500">@${t.username}</div></td><td class="px-1 text-right"><span class="rank-pill mr-1 px-1 py-0.5 rounded border text- ${rankClass(rP.get(t.rosterId),teams.length)}">#${rP.get(t.rosterId)}</span>${t.prodDelta>=0?'+':''}${t.prodDelta.toFixed(0)}%</td><td class="px-1 text-right"><span class="rank-pill mr-1 px-1 py-0.5 rounded border text- ${rankClass(rL.get(t.rosterId),teams.length)}">#${rL.get(t.rosterId)}</span>${t.longDelta>=0?'+':''}${t.longDelta.toFixed(0)}%</td><td class="px-1 text-right">${Math.round(t.total).toLocaleString()}</td><td class="px-1 text-right text-sky-400">${Math.round(t.qb).toLocaleString()}</td><td class="px-1 text-right text-emerald-400">${Math.round(t.rb).toLocaleString()}</td><td class="px-1 text-right text-fuchsia-400">${Math.round(t.wr).toLocaleString()}</td><td class="px-1 text-right text-amber-400">${Math.round(t.te).toLocaleString()}</td><td class="px-1 text-right"><span class="rank-pill mr-1 px-1 py-0.5 rounded border text- ${rankClass(rK.get(t.rosterId),teams.length)}">#${rK.get(t.rosterId)}</span>${Math.round(t.picksValue).toLocaleString()}</td><td class="px-1 text-right">${t.age.toFixed(1)}</td><td class="px-1 text-right">${t.opt.toFixed(1)}</td><td class="px-2 text- text-yellow-200">${getArchetype(t)}</td></tr>${e?`<tr class="bg-zinc-950"><td colspan="13" class="p-3"><div class="mb-2 text- uppercase tracking-widest text-yellow-200/70">Picks • ${t.picks.map(p=>`${p.season} R${p.round}${p.tier[0].toUpperCase()} (${Math.round(p.value)})`).join(', ')}</div><div class="grid grid-cols-2 md:grid-cols-4 gap-3">${['QB','RB','WR','TE'].map(pos=>{const L=t.plist.filter(p=>p.pos===pos).sort((a,b)=>b.value-a.value);return`<div><div class="text- uppercase opacity-60 mb-1">${pos}</div>${L.map(p=>`<div class="flex justify-between text-"><span>${p.name}</span><span>${p.age||'-'} • ${Math.round(p.value)} • ${p.ppg.toFixed(1)}</span></div>`).join('')}</div>`}).join('')}</div></td></tr>`:''}`}).join('');tb.querySelectorAll('tr.team-row').forEach(r=>r.onclick=()=>{const id=+r.dataset.id;expanded.has(id)?expanded.delete(id):expanded.add(id);render()})}
document.getElementById('refresh').onclick=load;load();
</script>
</body>
</html>
