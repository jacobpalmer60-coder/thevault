<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>The Vault — Roster Values</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root { color-scheme: dark; }
  body { font-family: 'Inter', system-ui, -apple-system, sans-serif; background:#09090b; }
  .mono { font-family: 'JetBrains Mono', ui-monospace, SFMono-Regular, monospace; }
  * { scrollbar-width: thin; scrollbar-color:#3f3f46 #18181b; }
  ::-webkit-scrollbar{ width:8px; height:8px; }
  ::-webkit-scrollbar-track{ background:#18181b; }
  ::-webkit-scrollbar-thumb{ background:#3f3f46; border-radius:4px; }
  ::-webkit-scrollbar-thumb:hover{ background:#52525b; }
</style>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen flex flex-col">
  <!-- Header -->
  <header class="sticky top-0 z-50 border-b border-zinc-800 bg-zinc-950/80 backdrop-blur-xl">
    <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between gap-4">
      <div class="flex items-center gap-3 min-w-0">
        <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-amber-400 to-amber-600 flex items-center justify-center shadow-lg shadow-amber-500/20">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="text-zinc-950">
            <rect x="3" y="11" width="18" height="10" rx="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            <circle cx="12" cy="16" r="1" fill="currentColor"/>
          </svg>
        </div>
        <div class="min-w-0">
          <h1 class="text-[17px] font-semibold leading-tight tracking-tight">The Vault</h1>
          <p class="text-xs text-zinc-400 -mt-0.5">Roster Values</p>
        </div>
      </div>
      <a href="https://rosteraudit.com" target="_blank" rel="noopener" class="hidden sm:inline-flex items-center gap-1.5 text-sm text-zinc-400 hover:text-amber-400 transition">
        rosteraudit.com
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><path d="M15 3h6v6"/><path d="M10 14L21 3"/></svg>
      </a>
    </div>
  </header>

  <!-- Controls -->
  <div class="border-b border-zinc-900 bg-zinc-950 sticky top-[61px] z-40 backdrop-blur">
    <div class="max-w-7xl mx-auto px-4 py-4">
      <div class="flex flex-col lg:flex-row gap-3">
        <div class="flex-1 flex flex-col sm:flex-row gap-3">
          <div class="flex-1">
            <label class="sr-only">League ID</label>
            <input id="leagueId" type="text" placeholder="Sleeper League ID" class="w-full h-11 px-3.5 rounded-xl bg-zinc-900 border border-zinc-800 focus:outline-none focus:border-amber-500 focus:ring-2 focus:ring-amber-500/20 text-sm placeholder-zinc-600 transition" />
          </div>
          <div class="flex items-center p-1 rounded-xl bg-zinc-900 border border-zinc-800 h-11">
            <button data-format="superflex" id="fmt-sf" class="format-btn px-4 h-9 rounded-lg text-sm font-medium transition bg-amber-500 text-zinc-950">Superflex</button>
            <button data-format="1qb" id="fmt-1qb" class="format-btn px-4 h-9 rounded-lg text-sm font-medium transition text-zinc-400 hover:text-zinc-200">1QB</button>
          </div>
        </div>
        <button id="loadBtn" class="h-11 px-5 rounded-xl bg-amber-500 hover:bg-amber-400 active:bg-amber-600 text-zinc-950 font-semibold text-sm transition shadow-lg shadow-amber-500/10 flex items-center justify-center gap-2">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 21l-4.35-4.35"/><circle cx="11" cy="11" r="8"/></svg>
          Load
        </button>
      </div>
    </div>
  </div>

  <main class="flex-1 max-w-7xl mx-auto w-full px-4 py-8">
    <!-- Error -->
    <div id="errorBanner" class="hidden mb-6 rounded-xl border border-amber-500/30 bg-amber-500/10 px-4 py-3 text-sm text-amber-200"></div>

    <!-- Status -->
    <div id="statusBar" class="hidden mb-6 flex flex-wrap items-center gap-x-4 gap-y-1 text-sm text-zinc-400">
      <span id="statusLeague" class="font-medium text-zinc-200"></span>
      <span class="w-1 h-1 rounded-full bg-zinc-700 hidden sm:block"></span>
      <span id="statusSeason"></span>
      <span class="w-1 h-1 rounded-full bg-zinc-700 hidden sm:block"></span>
      <span id="statusTeams"></span>
      <span class="w-1 h-1 rounded-full bg-zinc-700 hidden sm:block"></span>
      <span id="statusFormat" class="uppercase tracking-wide"></span>
    </div>

    <!-- Loading -->
    <div id="loading" class="hidden py-24 flex flex-col items-center justify-center gap-4 text-zinc-500">
      <div class="w-10 h-10 rounded-full border-2 border-zinc-800 border-t-amber-500 animate-spin"></div>
      <p class="text-sm">Loading rosters & values…</p>
    </div>

    <!-- Empty -->
    <div id="empty" class="border-2 border-dashed border-zinc-800 rounded-2xl py-24 flex flex-col items-center justify-center text-center px-6">
      <div class="w-12 h-12 rounded-xl bg-zinc-900 border border-zinc-800 flex items-center justify-center mb-4">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#52525b" stroke-width="1.5"><path d="M3 7h18M6 7v10a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2V7"/><path d="M9 7V5a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v2"/></svg>
      </div>
      <h2 class="text-lg font-semibold text-zinc-200 mb-1">No league loaded</h2>
      <p class="text-sm text-zinc-500 max-w-sm">Enter a Sleeper League ID and choose a format to view roster values powered by RosterAudit.</p>
    </div>

    <!-- Grid -->
    <div id="grid" class="grid grid-cols-1 xl:grid-cols-2 gap-6"></div>
  </main>

  <footer class="border-t border-zinc-900 mt-auto">
    <div class="max-w-7xl mx-auto px-4 py-6 flex flex-col sm:flex-row items-center justify-between gap-2 text-xs text-zinc-600">
      <p>Values from <a href="https://rosteraudit.com" target="_blank" class="hover:text-amber-400 transition">RosterAudit</a> • Player data from Sleeper</p>
      <p>The Vault © <span id="year"></span></p>
    </div>
  </footer>

<script type="module">
const $ = s => document.querySelector(s);
const leagueInput = $('#leagueId');
const loadBtn = $('#loadBtn');
const fmtBtns = document.querySelectorAll('.format-btn');
const grid = $('#grid');
const loading = $('#loading');
const empty = $('#empty');
const errorBanner = $('#errorBanner');
const statusBar = $('#statusBar');

let currentFormat = 'superflex';

function setFormat(fmt){
  currentFormat = fmt;
  fmtBtns.forEach(b=>{
    const active = b.dataset.format===fmt;
    b.classList.toggle('bg-amber-500', active);
    b.classList.toggle('text-zinc-950', active);
    b.classList.toggle('text-zinc-400', !active);
  });
  localStorage.setItem('vault_format', fmt);
}
fmtBtns.forEach(b=>b.addEventListener('click',()=>setFormat(b.dataset.format)));

function showLoading(v){ loading.classList.toggle('hidden', !v); if(v){ empty.classList.add('hidden'); grid.innerHTML=''; statusBar.classList.add('hidden'); } }
function showError(msg){ if(!msg){ errorBanner.classList.add('hidden'); return;} errorBanner.textContent=msg; errorBanner.classList.remove('hidden'); }
function formatNumber(n){ return n>0 ? n.toLocaleString() : '0'; }

async function fetchWithProxies(url){
  const proxies = [
    u => `https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,
    u => `https://corsproxy.io/?${encodeURIComponent(u)}`,
    u => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(u)}`
  ];
  let lastErr;
  for(const p of proxies){
    try{
      const res = await fetch(p(url));
      if(!res.ok) throw new Error(`HTTP ${res.status}`);
      const text = await res.text();
      return JSON.parse(text);
    }catch(e){ lastErr=e; }
  }
  throw lastErr || new Error('All proxies failed');
}

async function fetchValues(format){
  const formatKey = format==='superflex' ? 'sf_ppr' : '1qb_ppr';
  const url = `https://rosteraudit.com/wp-json/ra/v1/rankings/values?format_key=${formatKey}`;
  const data = await fetchWithProxies(url);
  // Normalize
  const map = new Map();
  const src = data.values || data.data || data;
  if(Array.isArray(src)){
    // array of {player_id, value} ?
    for(const item of src){
      const id = item.player_id || item.id || item.sleeper_id;
      const val = item.value || item.sf || item['1qb'] || 0;
      if(id) map.set(String(id), Number(val)||0);
    }
  }else if(typeof src==='object'){
    for(const [id, obj] of Object.entries(src)){
      if(typeof obj==='number'){ map.set(id, obj); }
      else if(obj && typeof obj==='object'){
        const v = format==='superflex' ? (obj.sf ?? obj.superflex ?? obj.value ?? 0) : (obj['1qb'] ?? obj.qb ?? obj.value ?? 0);
        map.set(id, Number(v)||0);
      }
    }
  }
  return map;
}

async function loadLeague(leagueId, format){
  if(!leagueId) return;
  showLoading(true);
  showError('');
  grid.innerHTML='';
  try{
    const [league, rosters, users, players] = await Promise.all([
      fetch(`https://api.sleeper.app/v1/league/${leagueId}`).then(r=>r.json()),
      fetch(`https://api.sleeper.app/v1/league/${leagueId}/rosters`).then(r=>r.json()),
      fetch(`https://api.sleeper.app/v1/league/${leagueId}/users`).then(r=>r.json()),
      fetch(`https://api.sleeper.app/v1/players/nfl`).then(r=>r.json()).catch(()=>({}))
    ]);

    let valuesMap = new Map();
    try{
      valuesMap = await fetchValues(format);
    }catch(e){
      console.warn('Values fetch failed', e);
      showError('Value data unavailable – showing rosters with 0 values. RosterAudit may be blocking proxies.');
    }

    const userMap = new Map(users.map(u=>[u.user_id, u]));

    const teams = rosters.map(r=>{
      const user = userMap.get(r.owner_id);
      const teamName = user?.metadata?.team_name || user?.display_name || `Team ${r.roster_id}`;
      const avatar = user?.avatar ? `https://sleepercdn.com/avatars/thumbs/${user.avatar}` : 'https://sleepercdn.com/images/v2/icons/player_default.webp';
      const record = `${r.settings?.wins||0}-${r.settings?.losses||0}${r.settings?.ties?`-${r.settings.ties}`:''}`;
      const playerIds = (r.players||[]).filter(Boolean);
      const plist = playerIds.map(pid=>{
        const p = players[pid];
        if(!p) return null;
        const value = valuesMap.get(pid) || valuesMap.get(String(pid)) || 0;
        return {
          id: pid,
          name: `${p.first_name||''} ${p.last_name||''}`.trim() || p.full_name || pid,
          pos: p.position || '-',
          team: p.team || 'FA',
          age: p.age ?? '-',
          value
        };
      }).filter(Boolean).sort((a,b)=>b.value-a.value);
      const total = plist.reduce((s,p)=>s+p.value,0);
      return { roster_id:r.roster_id, teamName, avatar, record, players:plist, total };
    }).sort((a,b)=>b.total-a.total);

    // status
    $('#statusLeague').textContent = league.name || 'League';
    $('#statusSeason').textContent = `Season ${league.season}`;
    $('#statusTeams').textContent = `${teams.length} teams`;
    $('#statusFormat').textContent = format==='superflex' ? 'Superflex' : '1QB';
    statusBar.classList.remove('hidden');

    // render
    grid.innerHTML = teams.map((t,idx)=>renderCard(t, idx+1)).join('');
    empty.classList.add('hidden');
    localStorage.setItem('vault_league_id', leagueId);
    localStorage.setItem('vault_format', format);
  }catch(e){
    console.error(e);
    showError('Failed to load league. Check the League ID and try again.');
    empty.classList.remove('hidden');
  }finally{
    showLoading(false);
  }
}

function renderCard(team, rank){
  const rows = team.players.map(p=>`
    <tr class="hover:bg-zinc-800/40 transition">
      <td class="px-5 py-2.5">
        <div class="font-medium text-zinc-200 truncate max-w-[200px] sm:max-w-none">${escapeHtml(p.name)}</div>
      </td>
      <td class="px-2 py-2.5 hidden sm:table-cell">
        <span class="inline-flex w-6 h-6 rounded-lg bg-zinc-800 border border-zinc-700 items-center justify-center text-[10px] font-bold text-zinc-400">${escapeHtml(p.pos)}</span>
      </td>
      <td class="px-2 py-2.5 hidden sm:table-cell text-zinc-500 mono text-xs">${escapeHtml(p.team)}</td>
      <td class="px-2 py-2.5 hidden md:table-cell text-zinc-500 text-xs">${p.age}</td>
      <td class="px-5 py-2.5 text-right mono text-sm ${p.value>0?'text-amber-200':'text-zinc-600'}">${formatNumber(p.value)}</td>
    </tr>
  `).join('');

  return `
  <div class="rounded-2xl border border-zinc-800 bg-zinc-900/50 overflow-hidden flex flex-col">
    <div class="flex items-center gap-3 px-5 py-4 border-b border-zinc-800 bg-zinc-900/70">
      <img src="${team.avatar}" alt="" class="w-10 h-10 rounded-xl border border-zinc-800 object-cover" loading="lazy">
      <div class="min-w-0 flex-1">
        <div class="flex items-center gap-2">
          <h3 class="font-semibold truncate text-zinc-100">${escapeHtml(team.teamName)}</h3>
          <span class="inline-flex items-center px-1.5 py-0.5 rounded-md bg-zinc-800 border border-zinc-700 text-[10px] font-semibold text-zinc-400">#${rank}</span>
        </div>
        <div class="text-xs text-zinc-500">${team.record}</div>
      </div>
      <div class="text-right ml-auto">
        <div class="text-[10px] uppercase tracking-wider text-zinc-500">Total Value</div>
        <div class="mono text-lg font-semibold text-amber-300">${formatNumber(team.total)}</div>
      </div>
    </div>
    <div class="overflow-x-auto">
      <table class="w-full text-sm">
        <thead class="text-xs uppercase text-zinc-400 bg-zinc-950/50">
          <tr>
            <th class="text-left font-medium px-5 py-2.5">Player</th>
            <th class="text-left font-medium px-2 py-2.5 hidden sm:table-cell">Pos</th>
            <th class="text-left font-medium px-2 py-2.5 hidden sm:table-cell">Team</th>
            <th class="text-left font-medium px-2 py-2.5 hidden md:table-cell">Age</th>
            <th class="text-right font-medium px-5 py-2.5">Value</th>
          </tr>
        </thead>
        <tbody class="divide-y divide-zinc-800/60">
          ${rows || `<tr><td colspan="5" class="px-5 py-8 text-center text-zinc-600 text-sm">No players</td></tr>`}
        </tbody>
      </table>
    </div>
  </div>`;
}

function escapeHtml(s){ return String(s).replace(/[&<>"']/g, m=>({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[m])); }

loadBtn.addEventListener('click', ()=>{
  const id = leagueInput.value.trim();
  if(!id) { leagueInput.focus(); return; }
  loadLeague(id, currentFormat);
});
leagueInput.addEventListener('keydown', e=>{ if(e.key==='Enter') loadBtn.click(); });

// Auto load
function init(){
  $('#year').textContent = new Date().getFullYear();
  const params = new URLSearchParams(location.search);
  const urlLeague = params.get('league');
  const savedLeague = localStorage.getItem('vault_league_id');
  const savedFormat = localStorage.getItem('vault_format') || 'superflex';
  setFormat(savedFormat);
  const lid = urlLeague || savedLeague || '';
  leagueInput.value = lid;
  if(lid) loadLeague(lid, savedFormat);
}
init();
</script>
</body>
</html>
