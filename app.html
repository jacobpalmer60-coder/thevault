<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>THE VAULT • Debug Picks</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>:root{color-scheme:dark}body{font-family:Inter,system-ui;background:#0a0703}.display{font-family:Cinzel,serif}.gold-solid{color:#fde68a}.gold-border{border-image:linear-gradient(90deg,#a16207,#facc15,#a16207)1}.rank-pill{min-width:2.5rem}tr.team-row{cursor:pointer}tr.team-row:hover{background:rgba(120,80,20,.12)}</style>
</head>
<body class="text-amber-50 leading-tight">
<header class="sticky top-0 z-30 border-b border-amber-900/40 bg-black/60"><div class="max-w-[1500px] mx-auto px-6 py-4 flex justify-between"><div class="flex items-center gap-3"><div class="size-10 rounded-xl bg-gradient-to-br from-amber-400 to-yellow-600 p-[2px]"><div class="size-full rounded-[10px] bg-[#140f06] grid place-items-center"><span class="display text-xl gold-solid">V</span></div></div><h1 class="display text-2xl font-bold gold-solid">THE VAULT</h1></div><button id="refresh" class="px-4 py-2 rounded-xl bg-amber-500/10 border border-amber-700/50 text-amber-200 text-sm">Refresh</button></div></header>
<main class="max-w-[1500px] mx-auto px-6 py-8"><div id="status" class="mb-4 flex items-center gap-2 text-amber-200/80 text-sm"><div class="size-2 rounded-full bg-amber-400 animate-pulse"></div><span>Loading…</span></div><div class="overflow-hidden rounded-2xl border gold-border bg-[#110c05]/80"><div class="overflow-x-auto"><table class="w-full text-[13px]"><thead class="bg-[#1a1307]/90 sticky top-0 border-b border-amber-900/50"><tr class="text-[11px] uppercase tracking-widest text-amber-200/70"><th class="px-3 w-8"></th><th class="px-3 text-left">Team</th><th class="px-2 text-right" data-sort="prodDelta">Prod</th><th class="px-2 text-right" data-sort="longDelta">Long</th><th class="px-2 text-right" data-sort="total">Total</th><th class="px-2 text-right">QB</th><th class="px-2 text-right">RB</th><th class="px-2 text-right">WR</th><th class="px-2 text-right">TE</th><th class="px-2 text-right" data-sort="picksValue">Picks</th><th class="px-2 text-right">Age</th><th class="px-2 text-right">Opt</th><th class="px-3">Arch</th></tr></thead><tbody id="tbody" class="divide-y divide-amber-950/60"></tbody></table></div></main>
<script>
const LEAGUE_ID='1313454100225990656';
const VALUES_URL='https://docs.google.com/spreadsheets/d/e/2PACX-1vRqxhqyuKK6vu_EoYta5FZ_KdOB8M54Q_qBwJKOUF5KcgbTt2dmHn_FuLj9d-FS8-ta5T0zkU0QEGcN/pub?gid=4113168&single=true&output=csv';
const PPG_URL='https://docs.google.com/spreadsheets/d/e/2PACX-1vRqxhqyuKK6vu_EoYta5FZ_KdOB8M54Q_qBwJKOUF5KcgbTt2dmHn_FuLj9d-FS8-ta5T0zkU0QEGcN/pub?gid=118408869&single=true&output=csv';
const PICK_VALUES_URL='https://docs.google.com/spreadsheets/d/e/2PACX-1vRqxhqyuKK6vu_EoYta5FZ_KdOB8M54Q_qBwJKOUF5KcgbTt2dmHn_FuLj9d-FS8-ta5T0zkU0QEGcN/pub?gid=972793131&single=true&output=csv';
let teams=[],sort={key:'total',dir:-1},expanded=new Set();
const norm=s=>String(s||'').toLowerCase().replace(/[^a-z0-9]+/g,'');
const rankClass=(r,t)=>r===1?'bg-amber-400/25 text-amber-100 border-amber-400/70':(p=r/t)<=.25?'bg-emerald-600/25 text-emerald-200 border-emerald-700':p<=.5?'bg-sky-600/25 text-sky-200 border-sky-700':p<=.75?'bg-amber-700/25 text-amber-200 border-amber-800':'bg-rose-700/30 text-rose-200 border-rose-800';
async function load(){
 const [lg,users,rosters,players,vCsv,pCsv,traded,drafts]=await Promise.all([
  fetch(`https://api.sleeper.app/v1/league/${LEAGUE_ID}`).then(r=>r.json()),
  fetch(`https://api.sleeper.app/v1/league/${LEAGUE_ID}/users`).then(r=>r.json()),
  fetch(`https://api.sleeper.app/v1/league/${LEAGUE_ID}/rosters`).then(r=>r.json()),
  fetch(`https://api.sleeper.app/v1/players/nfl`).then(r=>r.json()),
  fetch(VALUES_URL).then(r=>r.text()),
  fetch(PPG_URL).then(r=>r.text()),
  fetch(`https://api.sleeper.app/v1/league/${LEAGUE_ID}/traded_picks`).then(r=>r.json()),
  fetch(`https://api.sleeper.app/v1/league/${LEAGUE_ID}/drafts`).then(r=>r.json())
 ]);
 const lastDraft= drafts.length? Math.max(...drafts.map(d=>+d.season||0)): new Date().getFullYear();
 const SEASONS=[lastDraft+1,lastDraft+2,lastDraft+3], ROUNDS=[1,2,3,4];
 const relevant=traded.filter(p=>SEASONS.includes(+p.season));
 const valMap=new Map();Papa.parse(vCsv,{header:true,skipEmptyLines:true}).data.forEach(r=>{if(r.sleeper_id)valMap.set(String(r.sleeper_id),+r.val_sf_ppr_tep05||0)});
 const ppgMap=new Map();Papa.parse(pCsv,{header:true,skipEmptyLines:true}).data.forEach(r=>{const n=r.Player||r.player;if(n)ppgMap.set(norm(n),+r['Avg_PPR_0.5_TEP']||0)});
 const userMap=new Map(users.map(u=>[u.user_id,u])), rosterByUser=new Map(rosters.map(r=>[r.owner_id,r.roster_id]));
 const slots=(lg.roster_positions||[]).filter(s=>!['BN','IR','TAXI'].includes(s));
 const optimal=list=>{const pool=[...list].sort((a,b)=>b.ppg-a.ppg);let t=0;const u=new Set();for(const s of slots){let a=[s];if(s==='FLEX')a=['RB','WR','TE'];if(s==='SUPER_FLEX')a=['QB','RB','WR','TE'];const i=pool.findIndex(p=>!u.has(p.id)&&a.includes(p.pos));if(i>=0){u.add(pool[i].id);t+=pool[i].ppg;pool.splice(i,1)}}return t};
 const built=rosters.map(r=>{const u=userMap.get(r.owner_id)||{};const plist=(r.players||[]).map(pid=>{const p=players[String(pid)]||{};const n=`${p.first_name||''} ${p.last_name||''}`.trim()||p.full_name||'';return{id:String(pid),name:n,pos:p.position||'',age:p.age||0,value:valMap.get(String(pid))||0,ppg:ppgMap.get(norm(n))||0}});const tot=plist.reduce((s,p)=>s+p.value,0);const age=(()=>{const v=plist.filter(p=>p.value>0&&p.age>0);const sv=v.reduce((s,p)=>s+p.value,0);return sv?v.reduce((s,p)=>s+p.value*p.age,0)/sv:0})();return{rosterId:r.roster_id,teamName:u.metadata?.team_name||u.display_name||'Team',username:u.username||'',total:tot,qb:plist.filter(p=>p.pos==='QB').reduce((s,p)=>s+p.value,0),rb:plist.filter(p=>p.pos==='RB').reduce((s,p)=>s+p.value,0),wr:plist.filter(p=>p.pos==='WR').reduce((s,p)=>s+p.value,0),te:plist.filter(p=>p.pos==='TE').reduce((s,p)=>s+p.value,0),age,opt:optimal(plist),plist}});
 const avgOpt=built.reduce((s,t)=>s+t.opt,0)/built.length;built.forEach(t=>{t.prodDelta=(t.opt/avgOpt-1)*100;t.prodPts=t.opt-avgOpt});
 const own=new Map(built.map(t=>[t.rosterId,[]]));built.forEach(t=>SEASONS.forEach(s=>ROUNDS.forEach(r=>own.get(t.rosterId).push({season:s,round:r,original:t.rosterId}))));
 relevant.forEach(p=>{const nr=rosterByUser.get(p.owner_id);if(!nr)return;const list=own.get(p.roster_id);const i=list.findIndex(x=>x.season==p.season&&x.round==p.round);if(i>=0)list.splice(i,1);own.get(nr).push({season:+p.season,round:+p.round,original:p.roster_id})});
 const tier=new Map([...built].sort((a,b)=>b.opt-a.opt).map((t,i)=>[t.rosterId,i<4?'late':i<8?'mid':'early']));
 let pickVal=new Map(),fallback=false;try{const csv=await fetch(PICK_VALUES_URL).then(r=>r.text());Papa.parse(csv,{header:true,skipEmptyLines:true}).data.forEach(r=>{if(r.season){const tierKey=(r.tier||r.slot||'mid').toLowerCase();const val=+r.value||+r.sf_value||+r.val_sf||0;pickVal.set(`${r.season}-${r.round}-${tierKey}`,val)}});if(!pickVal.size)fallback=true}catch(e){fallback=true}
 if(fallback){SEASONS.forEach(s=>[1,2,3,4].forEach(r=>{pickVal.set(`${s}-${r}-early`,r==1?5000:r==2?2000:r==3?800:300);pickVal.set(`${s}-${r}-mid`,r==1?3500:r==2?1400:r==3?560:210);pickVal.set(`${s}-${r}-late`,r==1?2400:r==2?960:r==3?384:144)}))}
 built.forEach(t=>{const ps=own.get(t.rosterId)||[];let sum=0;ps.forEach(p=>{p.tier=tier.get(p.original)||'mid';p.value=pickVal.get(`${p.season}-${p.round}-${p.tier}`)||0;sum+=p.value});t.picks=ps.sort((a,b)=>a.season-b.season||a.round-b.round);t.picksValue=sum;t.capital=t.total+sum;t.cpy=t.capital/Math.max(t.age,1)});
 const avgCpy=built.reduce((s,t)=>s+t.cpy,0)/built.length;built.forEach(t=>t.longDelta=(t.cpy/avgCpy-1)*100);
 teams=built;render();document.getElementById('status').innerHTML=`<div class="size-2 rounded-full bg-emerald-400"></div><span>Live • ${teams.length} teams • ${relevant.length} trades • ${SEASONS[0]}-${SEASONS[2]} picks loaded</span>`;
}
function rankMap(k,a=false){const s=[...teams].sort((x,y)=>a?x[k]-y[k]:y[k]-x[k]);const m=new Map();s.forEach((t,i)=>m.set(t.rosterId,i+1));return m}
function render(){const tb=document.getElementById('tbody');const data=[...teams].sort((a,b)=>{const av=a[sort.key],bv=b[sort.key];return sort.dir*(av>bv?1:av<bv?-1:0)});const rP=rankMap('prodDelta'),rL=rankMap('longDelta'),rT=rankMap('total'),rK=rankMap('picksValue');tb.innerHTML=data.map(t=>{const e=expanded.has(t.rosterId);return`<tr class="team-row" data-id="${t.rosterId}"><td class="px-2"><svg class="size-3 text-amber-400 ${e?'rotate-90':''}" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="m9 18 6-6" stroke-width="2"/></svg></td><td class="px-2 py-2"><div class="font-medium">${t.teamName}</div><div class="text-[10px] text-amber-200/60">@${t.username}</div></td><td class="px-1 text-right"><span class="rank-pill mr-1 px-1 py-0.5 rounded border text-[10px] ${rankClass(rP.get(t.rosterId),teams.length)}">#${rP.get(t.rosterId)}</span>${t.prodDelta>=0?'+':''}${t.prodDelta.toFixed(0)}%</td><td class="px-1 text-right"><span class="rank-pill mr-1 px-1 py-0.5 rounded border text-[10px] ${rankClass(rL.get(t.rosterId),teams.length)}">#${rL.get(t.rosterId)}</span>${t.longDelta>=0?'+':''}${t.longDelta.toFixed(0)}%</td><td class="px-1 text-right">${Math.round(t.total).toLocaleString()}</td><td class="px-1 text-right text-sky-300">${Math.round(t.qb).toLocaleString()}</td><td class="px-1 text-right text-emerald-300">${Math.round(t.rb).toLocaleString()}</td><td class="px-1 text-right text-fuchsia-300">${Math.round(t.wr).toLocaleString()}</td><td class="px-1 text-right text-amber-300">${Math.round(t.te).toLocaleString()}</td><td class="px-1 text-right"><span class="rank-pill mr-1 px-1 py-0.5 rounded border text-[10px] ${rankClass(rK.get(t.rosterId),teams.length)}">#${rK.get(t.rosterId)}</span>${Math.round(t.picksValue).toLocaleString()}</td><td class="px-1 text-right">${t.age.toFixed(1)}</td><td class="px-1 text-right">${t.opt.toFixed(1)}</td><td class="px-2 text-[10px]">${t.picks.length} picks</td></tr>${e?`<tr class="bg-[#0b0703]"><td colspan="13" class="p-3"><div class="mb-2 text-[11px] uppercase tracking-widest text-amber-200/70">Picks • ${t.picks.map(p=>`${p.season} R${p.round}${p.tier[0]}`).join(', ')}</div><div class="grid grid-cols-2 md:grid-cols-4 gap-3">${['QB','RB','WR','TE'].map(pos=>{const L=t.plist.filter(p=>p.pos===pos).sort((a,b)=>b.value-a.value);return`<div><div class="text-[10px] uppercase opacity-60 mb-1">${pos}</div>${L.map(p=>`<div class="flex justify-between text-[11px]"><span>${p.name}</span><span>${p.age||'-'} • ${Math.round(p.value)} • ${p.ppg.toFixed(1)}</span></div>`).join('')}</div>`}).join('')}</div></td></tr>`:''}`}).join('');tb.querySelectorAll('tr.team-row').forEach(r=>r.onclick=()=>{const id=+r.dataset.id;expanded.has(id)?expanded.delete(id):expanded.add(id);render()})}
document.getElementById('refresh').onclick=load;load();
</script>
</body>
</html>
