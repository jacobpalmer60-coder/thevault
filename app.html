<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Roster Audit • Gold Flat</title>
<style>
  :root{
    --bg:#0a0700;
    --card:#141008;
    --elev:#1c1408;
    --border:#3d2a0a;
    --text:#fde68a;
    --muted:#d4b373;
    --accent:#fbbf24;
    --amber:#f59e0b;
    --green:#22c55e;
    --red:#ef4444;
    --blue:#60a5fa;
    --purple:#a78bfa;
    --orange:#fb923c;
    --gray:#9ca3af;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
    font-size:14px;
    letter-spacing:-0.01em;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:1280px;margin:0 auto;padding:24px 16px 80px}
  .topbar{
    display:flex;align-items:center;justify-content:space-between;
    padding:16px 18px;background:var(--card);border:1px solid var(--border);
    border-radius:10px;
  }
  .top-left{display:flex;gap:18px;align-items:baseline;flex-wrap:wrap}
  .league-name{font-size:20px;font-weight:700;letter-spacing:-0.02em}
  .meta{color:var(--muted);font-size:13px}
  .badge{
    display:inline-flex;align-items:center;gap:6px;
    padding:4px 10px;border-radius:999px;
    background:var(--elev);border:1px solid var(--border);
    color:var(--accent);font-weight:600;font-size:12px;letter-spacing:.02em;text-transform:uppercase
  }
  .controls{
    display:flex;gap:12px;align-items:center;margin:16px 0;flex-wrap:wrap
  }
  .control-group{
    display:flex;align-items:center;gap:8px;
    background:var(--card);border:1px solid var(--border);
    padding:8px 10px;border-radius:10px
  }
  .control-group input{
    background:transparent;border:none;outline:none;color:var(--text);
    font-size:14px;width:180px
  }
  .control-group input::placeholder{color:#8b7350}
  .btn{
    appearance:none;border:1px solid var(--accent);background:var(--accent);
    color:#1a1204;font-weight:700;font-size:13px;padding:8px 12px;border-radius:8px;cursor:pointer
  }
  .btn:hover{filter:brightness(1.05)}
  .btn.ghost{background:transparent;color:var(--accent)}
  .search{
    flex:1 1 260px;display:flex;align-items:center;gap:8px;
    background:var(--card);border:1px solid var(--border);
    padding:8px 12px;border-radius:10px;min-width:220px
  }
  .search input{
    flex:1;background:transparent;border:none;outline:none;color:var(--text);font-size:14px
  }
  .sf-badge{
    margin-left:auto;
    background:#111;color:#fde68a;border:1px solid var(--border);
    padding:6px 10px;border-radius:999px;font-size:12px;font-weight:700;letter-spacing:.04em
  }
  .legend{
    display:flex;gap:8px;flex-wrap:wrap;margin:0 0 12px
  }
  .pill{
    display:inline-flex;align-items:center;gap:6px;
    padding:4px 10px;border-radius:999px;font-size:12px;font-weight:600;
    border:1px solid var(--border);background:var(--elev);color:var(--muted)
  }
  .pill.gold{background:rgba(251,191,36,.12);color:#fde68a;border-color:#fbbf24}
  .pill.silver{background:rgba(229,231,235,.10);color:#e5e7eb;border-color:#9ca3af}
  .pill.bronze{background:rgba(217,119,6,.12);color:#fcd34d;border-color:#d97706}
  .pill.copper{background:rgba(180,83,9,.12);color:#fdba74;border-color:#b45309}
  .card{
    background:var(--card);border:1px solid var(--border);border-radius:12px;
    overflow:hidden
  }
  .table-wrap{overflow:auto}
  table{width:100%;border-collapse:separate;border-spacing:0;min-width:980px}
  thead th{
    position:sticky;top:0;z-index:2;
    background:var(--card);border-bottom:1px solid var(--border);
    text-align:left;font-size:11px;letter-spacing:.08em;text-transform:uppercase;
    color:var(--muted);font-weight:700;padding:12px 16px;white-space:nowrap
  }
  tbody td{
    padding:14px 16px;border-bottom:1px solid #22180a;vertical-align:middle
  }
  tbody tr{cursor:pointer}
  tbody tr:hover td{background:#1f160a}
  .col-num{width:48px;color:var(--muted);font-variant-numeric:tabular-nums}
  .team-cell{display:flex;align-items:center;gap:12px}
  .rank-num{
    width:28px;text-align:right;color:var(--muted);font-variant-numeric:tabular-nums;font-weight:600
  }
  .avatar{
    width:36px;height:36px;border-radius:8px;background:#22180a;border:1px solid var(--border);
    flex:0 0 36px;overflow:hidden
  }
  .avatar img{width:100%;height:100%;object-fit:cover;display:block}
  .team-main{min-width:0}
  .team-name{font-size:16px;font-weight:700;line-height:1.1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .team-sub{display:flex;align-items:center;gap:8px;margin-top:4px}
  .tier-pill{
    font-size:11px;font-weight:700;padding:2px 8px;border-radius:999px;border:1px solid;
    text-transform:uppercase;letter-spacing:.04em
  }
  .tier-pill.gold{color:#fde68a;border-color:#fbbf24;background:rgba(251,191,36,.10)}
  .tier-pill.silver{color:#e5e7eb;border-color:#9ca3af;background:rgba(229,231,235,.08)}
  .tier-pill.bronze{color:#fcd34d;border-color:#d97706;background:rgba(217,119,6,.10)}
  .tier-pill.copper{color:#fdba74;border-color:#b45309;background:rgba(180,83,9,.10)}
  .record{color:var(--muted);font-size:12px}
  .rank-sq{
    display:inline-flex;align-items:center;justify-content:center;
    width:26px;height:26px;border-radius:7px;font-size:12px;font-weight:700;
    font-variant-numeric:tabular-nums;border:1px solid
  }
  .rank-sq.green{background:rgba(34,197,94,.12);color:#86efac;border-color:rgba(34,197,94,.35)}
  .rank-sq.amber{background:rgba(245,158,11,.12);color:#fcd34d;border-color:rgba(245,158,11,.35)}
  .rank-sq.red{background:rgba(239,68,68,.12);color:#fca5a5;border-color:rgba(239,68,68,.35)}
  .num-right{text-align:right;font-variant-numeric:tabular-nums}
  .muted{color:var(--muted)}
  .detail-row td{padding:0;border-bottom:1px solid var(--border);background:#0f0c05}
  .detail{
    border-top:2px solid var(--accent);
    padding:20px 16px;
  }
  .detail-grid{display:grid;gap:20px}
  .pv-section{ }
  .section-title{
    font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);font-weight:700;margin-bottom:10px
  }
  .stack-bar{
    display:flex;height:14px;border-radius:6px;overflow:hidden;border:1px solid var(--border);background:#1a1206
  }
  .stack-bar > div{height:100%}
  .pv-legend{display:flex;gap:16px;flex-wrap:wrap;margin-top:8px;color:var(--muted);font-size:12px}
  .pv-legend span{display:inline-flex;align-items:center;gap:6px}
  .dot{width:10px;height:10px;border-radius:2px}
  .scout{color:#fde68a;font-size:14px;line-height:1.5}
  .badges-row{display:flex;gap:8px;flex-wrap:wrap}
  .solid-pill{
    padding:6px 10px;border-radius:999px;background:var(--elev);border:1px solid var(--border);
    font-size:12px;font-weight:600;color:var(--text)
  }
  .solid-pill b{color:var(--muted);font-weight:600;margin-right:4px}
  .pos-grid{
    display:grid;grid-template-columns:repeat(5,1fr);gap:16px;margin-top:4px
  }
  @media (max-width:1100px){.pos-grid{grid-template-columns:repeat(2,1fr)}}
  @media (max-width:640px){.pos-grid{grid-template-columns:1fr}}
  .pos-col{
    background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px
  }
  .pos-head{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:8px}
  .pos-title{font-weight:700;letter-spacing:.02em}
  .pos-meta{color:var(--muted);font-size:12px}
  .pos-rank{
    display:inline-flex;align-items:center;justify-content:center;
    min-width:22px;height:22px;padding:0 6px;border-radius:6px;font-size:11px;font-weight:700;
    background:#1a1206;border:1px solid var(--border);color:var(--muted);margin-left:6px
  }
  .player-list{display:flex;flex-direction:column}
  .player-row{
    display:flex;align-items:center;gap:8px;padding:6px 0;border-top:1px dashed #2a1c0a;
    font-size:13px
  }
  .player-row:first-child{border-top:none}
  .player-name{flex:1 1 auto;min-width:0}
  .player-name .nfl{color:var(--muted);margin-left:6px;font-size:12px}
  .player-meta{
    display:flex;gap:12px;align-items:center;font-variant-numeric:tabular-nums;color:var(--muted);font-size:12px
  }
  .player-val{width:48px;text-align:right;color:var(--text);font-weight:600}
  .picks-list{display:flex;flex-direction:column}
  .pick-row{
    display:flex;align-items:center;justify-content:space-between;
    padding:6px 0;border-top:1px dashed #2a1c0a;font-size:13px
  }
  .pick-row:first-child{border-top:none}
  .pick-year{
    margin-top:8px;padding-top:8px;border-top:1px solid #2a1c0a;
    color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.08em
  }
  .empty{color:var(--muted);font-style:italic;padding:8px 0}
  .status{padding:16px;color:var(--muted)}
  .hidden{display:none}
</style>
</head>
<body>
<div class="wrap">
  <header class="topbar">
    <div class="top-left">
      <div class="league-name" id="leagueName">Roster Audit</div>
      <div class="meta" id="leagueMeta">— teams • — season</div>
    </div>
    <div class="badge">GOLD FLAT</div>
  </header>

  <div class="controls">
    <div class="control-group">
      <input id="leagueInput" placeholder="League ID" />
      <button class="btn" id="loadBtn">Load</button>
    </div>
    <div class="search">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#d4b373" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
      <input id="searchInput" placeholder="Search teams…" />
    </div>
    <div class="sf-badge" id="sfBadge">SF LOCKED</div>
  </div>

  <div class="legend" id="tierLegend">
    <span class="pill gold">Elite</span>
    <span class="pill silver">Contender</span>
    <span class="pill bronze">Middle</span>
    <span class="pill copper">Rebuild</span>
  </div>

  <div class="card">
    <div class="table-wrap">
      <table id="rosterTable">
        <thead>
          <tr>
            <th class="col-num">#</th>
            <th>TEAM</th>
            <th style="text-align:center">QB</th>
            <th style="text-align:center">RB</th>
            <th style="text-align:center">WR</th>
            <th style="text-align:center">TE</th>
            <th style="text-align:center">PK</th>
            <th class="num-right">PPG</th>
            <th class="num-right">VALUE</th>
            <th class="num-right">AGE</th>
          </tr>
        </thead>
        <tbody id="tbody">
          <tr><td colspan="10" class="status">Enter a Sleeper League ID and press Load.</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<script>
const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRZY-Dra8s3j-ocJ7OK6yTs3BFcj-A_WeiIX35u49fg2xA8Y3Pg-nnOHVOnfZGOEAFWrj1EFBOV6qzi/pub?gid=2077026411&single=true&output=csv';

const $ = sel => document.querySelector(sel);
const tbody = $('#tbody');
const leagueNameEl = $('#leagueName');
const leagueMetaEl = $('#leagueMeta');
const sfBadge = $('#sfBadge');

let state = {
  teams: [],
  filtered: [],
  expandedId: null,
  isSF: true
};

function fmtValue(v){
  if(!v || isNaN(v)) return '0';
  if(v >= 1000) {
    const k = v/1000;
    return (k>=10 ? k.toFixed(0) : k.toFixed(1).replace(/\.0$/,'')) + 'k';
  }
  return Math.round(v).toString();
}
function fmtNum(v, d=1){ return (v||0).toFixed(d); }
function rankClass(r){
  if(r<=3) return 'green';
  if(r<=6) return 'amber';
  return 'red';
}
function tierFromRank(rank, total){
  const pct = rank/total;
  if(pct <= 0.17) return {name:'Elite', cls:'gold'};
  if(pct <= 0.42) return {name:'Contender', cls:'silver'};
  if(pct <= 0.75) return {name:'Middle', cls:'bronze'};
  return {name:'Rebuild', cls:'copper'};
}
function ordinal(n){return['st','nd','rd'][((n+90)%100-10)%10-1]||'th'}

function parseCSV(text){
  const rows=[]; let cur='', row=[], inQ=false;
  for(let i=0;i<text.length;i++){
    const c=text[i], n=text[i+1];
    if(inQ){
      if(c=='"' && n=='"'){cur+='"';i++}
      else if(c=='"'){inQ=false}
      else cur+=c;
    }else{
      if(c=='"'){inQ=true}
      else if(c==','){row.push(cur);cur=''}
      else if(c=='\n'){row.push(cur);rows.push(row);row=[];cur=''}
      else if(c=='\r'){}
      else cur+=c;
    }
  }
  row.push(cur); rows.push(row);
  const headers = rows.shift().map(h=>h.trim().toLowerCase());
  return rows.filter(r=>r.length>1).map(r=>{
    const o={}; headers.forEach((h,i)=>o[h]=r[i]); return o;
  });
}

async function fetchJSON(url){
  const r = await fetch(url);
  if(!r.ok) throw new Error('fetch '+url);
  return r.json();
}
async function fetchText(url){
  const r = await fetch(url);
  if(!r.ok) throw new Error('fetch '+url);
  return r.text();
}

function buildValuationMap(csvRows){
  const map = new Map();
  for(const r of csvRows){
    const pid = (r.sleeper_id||r.id||r.player_id||'').trim();
    const name = (r.player||r.name||r.full_name||'').trim();
    const pos = (r.pos||r.position||'').toUpperCase();
    const team = (r.team||r.nfl_team||'').toUpperCase();
    const age = parseFloat(r.age)||null;
    const value = parseFloat(r.value||r.val||r.ecr||0)||0;
    const ppg = parseFloat(r.ppg||r.fppg||r.pts||0)||0;
    const key = pid || name.toLowerCase();
    if(!key) continue;
    map.set(key.toLowerCase(), {pid, name, pos, team, age, value, ppg});
    if(pid) map.set(pid, {pid, name, pos, team, age, value, ppg});
  }
  return map;
}

function estimatePickValue(round, yearOffset){
  const base=[6000,2500,1000,400][round-1]||200;
  return base * Math.pow(0.85, yearOffset);
}

function computePickLabel(pick, teamRank, totalTeams){
  const round = pick.round;
  const year = pick.season;
  const ord = round===1?'1st':round===2?'2nd':round===3?'3rd':`${round}th`;
  // early/mid/late based on original owner's strength
  // we don't have original rank here, use owner's rank as proxy
  let prefix='';
  if(teamRank<=Math.ceil(totalTeams*0.33)) prefix='Late ';
  else if(teamRank>=Math.ceil(totalTeams*0.66)) prefix='Early ';
  else prefix='Mid ';
  // Show both formats randomly? spec allows either.
  // Use Early/Mid/Late for 1st round, else Rd
  if(round===1) return `${year} ${prefix}${ord}`;
  return `${year} Rd ${round}`;
}

async function loadLeague(leagueId){
  tbody.innerHTML = `<tr><td colspan="10" class="status">Loading league…</td></tr>`;
  try{
    const [league, users, rosters, tradedPicks] = await Promise.all([
      fetchJSON(`https://api.sleeper.app/v1/league/${leagueId}`),
      fetchJSON(`https://api.sleeper.app/v1/league/${leagueId}/users`),
      fetchJSON(`https://api.sleeper.app/v1/league/${leagueId}/rosters`),
      fetchJSON(`https://api.sleeper.app/v1/league/${leagueId}/traded_picks`).catch(()=>[])
    ]);
    const players = await fetchJSON('https://api.sleeper.app/v1/players/nfl').catch(()=>({}));
    const csvText = await fetchText(CSV_URL).catch(()=>'');
    const csvRows = csvText ? parseCSV(csvText) : [];
    const valMap = buildValuationMap(csvRows);

    state.isSF = (league.roster_positions||[]).filter(p=>p==='QB').length>=2 || (league.roster_positions||[]).includes('SUPER_FLEX');
    sfBadge.textContent = state.isSF ? 'SF LOCKED' : '1QB';

    leagueNameEl.textContent = league.name || 'Roster Audit';
    leagueMetaEl.textContent = `${rosters.length} teams • ${league.season} season`;

    // Build pick ownership
    const seasons = [parseInt(league.season)+1, parseInt(league.season)+2, parseInt(league.season)+3];
    const pickMap = new Map();
    rosters.forEach(r=>{
      const arr=[];
      seasons.forEach(s=>{
        for(let rd=1; rd<=4; rd++){
          arr.push({season:s, round:rd, original_roster_id:r.roster_id, owner_id:r.roster_id});
        }
      });
      pickMap.set(r.roster_id, arr);
    });
    (tradedPicks||[]).forEach(tp=>{
      const prev = pickMap.get(tp.previous_owner_id);
      const curr = pickMap.get(tp.owner_id);
      if(!prev||!curr) return;
      const idx = prev.findIndex(p=>p.season==tp.season && p.round==tp.round && p.original_roster_id==tp.roster_id);
      if(idx>=0){
        const [pk]=prev.splice(idx,1);
        pk.owner_id = tp.owner_id;
        curr.push(pk);
      }
    });

    const teams = rosters.map(roster=>{
      const owner = users.find(u=>u.user_id===roster.owner_id)||{};
      const teamName = owner.metadata?.team_name || owner.display_name || `Team ${roster.roster_id}`;
      const avatar = owner.avatar ? `https://sleepercdn.com/avatars/thumbs/${owner.avatar}` : '';
      const record = `${roster.settings?.wins||0}-${roster.settings?.losses||0}`;
      const playerIds = roster.players||[];
      const playersData = playerIds.map(pid=>{
        const p = players[pid]||{};
        const v = valMap.get(pid) || valMap.get((p.full_name||'').toLowerCase()) || {};
        const name = p.full_name || v.name || 'Unknown';
        const pos = p.position || v.pos || '';
        const team = p.team || v.team || '';
        const age = p.age || v.age || (p.birth_date ? Math.floor((Date.now()-new Date(p.birth_date))/31557600000) : null);
        const value = v.value || 0;
        const ppg = v.ppg || 0;
        return {id:pid, name, pos, team, age, value, ppg};
      });
      const posGroups = {QB:[],RB:[],WR:[],TE:[]};
      playersData.forEach(pl=>{ if(posGroups[pl.pos]) posGroups[pl.pos].push(pl); });

      const posValue = {
        QB: posGroups.QB.reduce((s,x)=>s+x.value,0),
        RB: posGroups.RB.reduce((s,x)=>s+x.value,0),
        WR: posGroups.WR.reduce((s,x)=>s+x.value,0),
        TE: posGroups.TE.reduce((s,x)=>s+x.value,0),
      };
      const picksOwned = (pickMap.get(roster.roster_id)||[]).map(p=>{
        const yearOffset = p.season - parseInt(league.season) -1;
        const value = estimatePickValue(p.round, Math.max(0,yearOffset));
        return {...p, value};
      });
      const pickValue = picksOwned.reduce((s,x)=>s+x.value,0);
      const totalValue = Object.values(posValue).reduce((a,b)=>a+b,0) + pickValue;

      // optimal lineup PPG
      const qbCount = state.isSF ? 2 : 1;
      const need = {QB:qbCount, RB:2, WR:3, TE:1};
      let ppgSum=0;
      const used=new Set();
      ['QB','RB','WR','TE'].forEach(pos=>{
        const arr = posGroups[pos].slice().sort((a,b)=>b.ppg-a.ppg).slice(0,need[pos]||0);
        arr.forEach(pl=>{ppgSum+=pl.ppg||0; used.add(pl.id);});
      });
      // flex 2 best remaining RB/WR/TE
      const flexPool = [].concat(posGroups.RB,posGroups.WR,posGroups.TE).filter(pl=>!used.has(pl.id)).sort((a,b)=>b.ppg-a.ppg).slice(0,2);
      ppgSum += flexPool.reduce((s,x)=>s+x.ppg||0,0);

      const ageWeighted = playersData.filter(p=>p.value>0 && p.age).reduce((a,p)=>{a.sum+=p.age*p.value;a.w+=p.value;return a;},{sum:0,w:0});
      const avgAge = ageWeighted.w ? ageWeighted.sum/ageWeighted.w : null;

      const oneStCount = picksOwned.filter(p=>p.round===1).length;

      return {
        roster_id: roster.roster_id,
        owner_id: roster.owner_id,
        teamName,
        avatar,
        record,
        rank:0,
        players: playersData,
        posGroups,
        posValue,
        pickValue,
        picksOwned,
        totalValue,
        ppg: ppgSum,
        avgAge,
        oneStCount,
        wins: roster.settings?.wins||0
      };
    });

    // rank by total value
    teams.sort((a,b)=>b.totalValue-a.totalValue);
    teams.forEach((t,i)=>t.rank=i+1);
    // positional ranks
    ['QB','RB','WR','TE','PK'].forEach(pos=>{
      const sorted = teams.slice().sort((a,b)=>{
        const av = pos==='PK' ? a.pickValue : a.posValue[pos]||0;
        const bv = pos==='PK' ? b.pickValue : b.posValue[pos]||0;
        return bv-av;
      });
      sorted.forEach((t,i)=>{ t[pos+'Rank']=i+1; });
    });
    // tiers
    teams.forEach(t=>{
      const tier = tierFromRank(t.rank, teams.length);
      t.tierName = tier.name;
      t.tierCls = tier.cls;
    });

    state.teams = teams;
    state.filtered = teams;
    renderTable();
  }catch(e){
    console.error(e);
    tbody.innerHTML = `<tr><td colspan="10" class="status">Failed to load. ${e.message}</td></tr>`;
    // fallback mock
    loadMock();
  }
}

function renderTable(){
  if(!state.filtered.length){
    tbody.innerHTML = `<tr><td colspan="10" class="status">No teams match.</td></tr>`;
    return;
  }
  const rows = [];
  state.filtered.forEach(t=>{
    rows.push(`
      <tr data-id="${t.roster_id}">
        <td class="col-num">${t.rank}</td>
        <td>
          <div class="team-cell">
            <div class="rank-num">${t.rank}</div>
            <div class="avatar">${t.avatar?`<img src="${t.avatar}" onerror="this.style.display='none'">`:''}</div>
            <div class="team-main">
              <div class="team-name">${t.teamName}</div>
              <div class="team-sub">
                <span class="tier-pill ${t.tierCls}">${t.tierName}</span>
                <span class="record">${t.record}</span>
              </div>
            </div>
          </div>
        </td>
        <td style="text-align:center"><span class="rank-sq ${rankClass(t.QBRank)}">${t.QBRank}</span></td>
        <td style="text-align:center"><span class="rank-sq ${rankClass(t.RBRank)}">${t.RBRank}</span></td>
        <td style="text-align:center"><span class="rank-sq ${rankClass(t.WRRank)}">${t.WRRank}</span></td>
        <td style="text-align:center"><span class="rank-sq ${rankClass(t.TERank)}">${t.TERank}</span></td>
        <td style="text-align:center"><span class="rank-sq ${rankClass(t.PKRank)}">${t.PKRank}</span></td>
        <td class="num-right">${fmtNum(t.ppg,1)}</td>
        <td class="num-right">${fmtValue(t.totalValue)}</td>
        <td class="num-right">${t.avgAge?fmtNum(t.avgAge,1):'—'}</td>
      </tr>
    `);
    if(state.expandedId===t.roster_id){
      rows.push(renderDetail(t));
    }
  });
  tbody.innerHTML = rows.join('');
  tbody.querySelectorAll('tr[data-id]').forEach(tr=>{
    tr.addEventListener('click',e=>{
      const id = parseInt(tr.dataset.id);
      state.expandedId = state.expandedId===id?null:id;
      renderTable();
    });
  });
}

function renderDetail(t){
  const totalPos = t.posValue.QB+t.posValue.RB+t.posValue.WR+t.posValue.TE+t.pickValue;
  const pct = {
    QB: totalPos? t.posValue.QB/totalPos*100:0,
    RB: totalPos? t.posValue.RB/totalPos*100:0,
    WR: totalPos? t.posValue.WR/totalPos*100:0,
    TE: totalPos? t.posValue.TE/totalPos*100:0,
    PK: totalPos? t.pickValue/totalPos*100:0,
  };
  const bar = `
    <div class="stack-bar">
      <div style="width:${pct.QB}%;background:var(--blue)"></div>
      <div style="width:${pct.RB}%;background:var(--green)"></div>
      <div style="width:${pct.WR}%;background:var(--purple)"></div>
      <div style="width:${pct.TE}%;background:var(--orange)"></div>
      <div style="width:${pct.PK}%;background:var(--gray)"></div>
    </div>
    <div class="pv-legend">
      <span><i class="dot" style="background:var(--blue)"></i>QB ${pct.QB.toFixed(0)}%</span>
      <span><i class="dot" style="background:var(--green)"></i>RB ${pct.RB.toFixed(0)}%</span>
      <span><i class="dot" style="background:var(--purple)"></i>WR ${pct.WR.toFixed(0)}%</span>
      <span><i class="dot" style="background:var(--orange)"></i>TE ${pct.TE.toFixed(0)}%</span>
      <span><i class="dot" style="background:var(--gray)"></i>PK ${pct.PK.toFixed(0)}%</span>
    </div>
  `;

  // scouting summary
  const topPos = Object.entries(t.posValue).sort((a,b)=>b[1]-a[1])[0][0];
  const window = t.tierName==='Elite'||t.tierName==='Contender' ? 'Contending' : 'Rebuilding';
  const summary = `${topPos} strength anchors a ${window.toLowerCase()} roster${t.avgAge && t.avgAge<25.5?' with a young core':' with veteran depth'}.`;

  const badges = `
    <div class="badges-row">
      <span class="solid-pill"><b>RECORD</b>${t.record}</span>
      <span class="solid-pill"><b>WINDOW</b>${window}</span>
      <span class="solid-pill"><b>1STS</b>${t.oneStCount}</span>
      <span class="solid-pill"><b>AGE</b>${t.avgAge?fmtNum(t.avgAge,1):'—'}</span>
    </div>
  `;

  const posCols = ['QB','RB','WR','TE'].map(pos=>{
    const arr = t.posGroups[pos].slice().sort((a,b)=>b.value-a.value).slice(0,12);
    const total = arr.reduce((s,x)=>s+x.value,0);
    const avgAge = arr.filter(x=>x.age).reduce((a,x)=>{a.s+=x.age;a.c++;return a;},{s:0,c:0});
    const avg = avgAge.c? (avgAge.s/avgAge.c).toFixed(1):'—';
    const rank = t[pos+'Rank'];
    const rows = arr.length ? arr.map(p=>`
      <div class="player-row">
        <div class="player-name">${p.name}<span class="nfl">${p.team||''}</span></div>
        <div class="player-meta">
          <span>${p.age?Math.round(p.age):'—'}</span>
          <span>${p.ppg?fmtNum(p.ppg,1):'0.0'}</span>
          <span class="player-val">${fmtValue(p.value)}</span>
        </div>
      </div>
    `).join('') : `<div class="empty">No players</div>`;
    return `
      <div class="pos-col">
        <div class="pos-head">
          <div class="pos-title">${pos}<span class="pos-rank">#${rank}</span></div>
          <div class="pos-meta">${fmtValue(total)} • ${avg}</div>
        </div>
        <div class="player-list">${rows}</div>
      </div>
    `;
  }).join('');

  // picks column
  const picksSorted = t.picksOwned.slice().sort((a,b)=> a.season===b.season ? a.round-b.round : a.season-b.season);
  let pickHtml='';
  let lastYear=null;
  picksSorted.forEach(p=>{
    if(p.season!==lastYear){
      pickHtml+=`<div class="pick-year">${p.season}</div>`;
      lastYear=p.season;
    }
    const label = computePickLabel(p, t.rank, state.teams.length);
    pickHtml+=`
      <div class="pick-row">
        <div>${label}</div>
        <div class="player-val">${fmtValue(p.value)}</div>
      </div>
    `;
  });
  const picksCol = `
    <div class="pos-col">
      <div class="pos-head">
        <div class="pos-title">PICKS<span class="pos-rank">#${t.PKRank}</span></div>
        <div class="pos-meta">${fmtValue(t.pickValue)}</div>
      </div>
      <div class="picks-list">${pickHtml||'<div class="empty">No picks</div>'}</div>
    </div>
  `;

  return `
    <tr class="detail-row">
      <td colspan="10">
        <div class="detail">
          <div class="detail-grid">
            <div class="pv-section">
              <div class="section-title">Positional Value %</div>
              ${bar}
            </div>
            <div>
              <div class="section-title">Scouting Summary</div>
              <div class="scout">${summary}</div>
            </div>
            ${badges}
            <div class="pos-grid">
              ${posCols}
              ${picksCol}
            </div>
          </div>
        </div>
      </td>
    </tr>
  `;
}

function loadMock(){
  // minimal mock to show UI works
  const mock = [
    {
      roster_id:1, teamName:'Gold Standard', avatar:'', record:'10-4', rank:1,
      QBRank:1,RBRank:2,WRRank:1,TERank:3,PKRank:4, ppg:142.3,totalValue:45200,avgAge:26.1,
      tierName:'Elite',tierCls:'gold',posValue:{QB:12000,RB:10000,WR:15000,TE:4000},
      pickValue:4200, posGroups:{QB:[{name:'Patrick Mahomes',team:'KC',age:29,ppg:24.1,value:8500}],RB:[],WR:[],TE:[]},
      picksOwned:[{season:2026,round:1,value:5000}], oneStCount:1
    }
  ];
  state.teams = mock;
  state.filtered = mock;
  leagueNameEl.textContent='Demo Roster Audit';
  leagueMetaEl.textContent='12 teams • 2025 season';
  renderTable();
}

$('#loadBtn').addEventListener('click',()=>{
  const id = $('#leagueInput').value.trim();
  if(id) loadLeague(id);
});
$('#searchInput').addEventListener('input',e=>{
  const q = e.target.value.toLowerCase();
  state.filtered = state.teams.filter(t=>t.teamName.toLowerCase().includes(q));
  renderTable();
});

// Auto load from URL ?league=
const params = new URLSearchParams(location.search);
const lid = params.get('league');
if(lid){ $('#leagueInput').value=lid; loadLeague(lid); }
</script>
</body>
</html>
