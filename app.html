<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>THE VAULT • Gold Dynasty Dashboard</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{color-scheme:dark}
body{font-family:Inter,system-ui;background:#0a0703}
.display{font-family:Cinzel,serif}
.gold-text{background:linear-gradient(90deg,#facc15,#fde68a,#facc15);-webkit-background-clip:text;background-clip:text;color:transparent}
.gold-solid{color:#fde68a}
.gold-border{border-image:linear-gradient(90deg,#a16207,#facc15,#a16207) 1}
.glass{backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px)}
.scrollbar::-webkit-scrollbar{height:8px;width:8px}
.scrollbar::-webkit-scrollbar-thumb{background:#3a2e12;border-radius:8px}
th.sortable{cursor:pointer;user-select:none}
.arrow{opacity:.4;transition:.15s}
th.sortable.active.arrow{opacity:1}
.rank-pill{min-width:2.5rem}
tr.team-row{cursor:pointer}
tr.team-row:hover{background:rgba(120,80,20,.12)}
tr.expanded{box-shadow:inset 0 1px rgba(250,204,21,.25);background:rgba(120,80,20,.08)}
</style>
</head>
<body class="text-amber-50 antialiased leading-tight">
<div class="fixed inset-0 -z-10 bg-[#0a0703]">
  <div class="absolute inset-0 bg-[radial-gradient(60%_50%_at_50%_0%,rgba(250,204,21,0.18),transparent_70%)]"></div>
</div>

<header class="sticky top-0 z-30 border-b border-amber-900/40 bg-black/50 glass">
  <div class="max-w-[1400px] mx-auto px-6 py-4 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <div class="size-10 rounded-xl bg-gradient-to-br from-amber-400 to-yellow-600 p-[2px]"><div class="size-full rounded-[10px] bg-[#140f06] grid place-items-center"><span class="display text-xl gold-text gold-solid">V</span></div></div>
      <div><h1 class="display text-2xl font-bold gold-text gold-solid tracking-wide">THE VAULT</h1><p class="text-[11px] uppercase tracking-[0.2em] text-amber-200/70 -mt-1">Dynasty Gold Standard</p></div>
    </div>
    <button id="refresh" class="px-4 py-2 rounded-xl bg-amber-500/10 hover:bg-amber-500/20 border border-amber-700/50 text-amber-200 text-sm">Refresh Data</button>
  </div>
</header>

<main class="max-w-[1400px] mx-auto px-6 py-8">
  <div id="status" class="mb-6 flex items-center gap-2 text-amber-200/80 text-sm"><div class="size-2 rounded-full bg-amber-400 animate-pulse"></div><span>Loading league 1313454100225990656…</span></div>

  <div class="overflow-hidden rounded-[24px] border gold-border bg-[#110c05]/80">
    <div class="overflow-x-auto scrollbar">
      <table class="w-full text-[13px]">
        <thead class="bg-[#1a1307]/90 sticky top-0 z-10 border-b border-amber-900/50">
          <tr class="text-[11px] uppercase tracking-widest text-amber-200/70">
            <th class="px-4 py-3 w-10"></th>
            <th class="px-4 py-3 text-left min-w-[240px]">Team</th>
            <th class="px-3 py-3 text-right sortable" data-sort="total">Total Value <span class="arrow">▲▼</span></th>
            <th class="px-3 py-3 text-right sortable" data-sort="qb">QB <span class="arrow">▲▼</span></th>
            <th class="px-3 py-3 text-right sortable" data-sort="rb">RB <span class="arrow">▲▼</span></th>
            <th class="px-3 py-3 text-right sortable" data-sort="wr">WR <span class="arrow">▲▼</span></th>
            <th class="px-3 py-3 text-right sortable" data-sort="te">TE <span class="arrow">▲▼</span></th>
            <th class="px-3 py-3 text-right sortable" data-sort="age">Age <span class="arrow">▲▼</span></th>
            <th class="px-3 py-3 text-right sortable" data-sort="opt">Opt PPG <span class="arrow">▲▼</span></th>
            <th class="px-4 py-3 text-left">Archetype</th>
          </tr>
        </thead>
        <tbody id="tbody" class="divide-y divide-amber-950/60"></tbody>
      </table>
    </div>
  </div>
</main>

<div id="tip" class="hidden fixed z-50 w-[340px] max-w-[90vw] rounded-2xl border border-amber-800 bg-[#0f0a04] shadow-2xl p-3"></div>

<script>
const LEAGUE_ID = '1313454100225990656';
const VALUES_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRqxhqyuKK6vu_EoYta5FZ_KdOB8M54Q_qBwJKOUF5KcgbTt2dmHn_FuLj9d-FS8-ta5T0zkU0QEGcN/pub?gid=4113168&single=true&output=csv';
const PPG_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRqxhqyuKK6vu_EoYta5FZ_KdOB8M54Q_qBwJKOUF5KcgbTt2dmHn_FuLj9d-FS8-ta5T0zkU0QEGcN/pub?gid=118408869&single=true&output=csv';

let teams = [], sort = {key:'total',dir:-1}, expanded = new Set();
let leagueAvgOpt = 0, leagueAvgAge = 0;
const norm = s=>String(s||'').toLowerCase().replace(/[^a-z0-9]+/g,'');

function rankClass(rank, total = teams.length) {
  if (rank === 1) return 'bg-amber-400/25 text-amber-100 border-amber-400/70';
  const pct = rank / total;
  if (pct <= 0.25) return 'bg-emerald-600/25 text-emerald-200 border-emerald-700';
  if (pct <= 0.50) return 'bg-sky-600/25 text-sky-200 border-sky-700';
  if (pct <= 0.75) return 'bg-amber-700/25 text-amber-200 border-amber-800';
  return 'bg-rose-700/30 text-rose-200 border-rose-800';
}
function deltaBadge(v){
  const cls = v>5?'bg-emerald-600/25 text-emerald-200 border-emerald-700':v<-5?'bg-rose-700/30 text-rose-200 border-rose-800':'bg-amber-700/25 text-amber-200 border-amber-800';
  return `<span class="px-1.5 py-0.5 rounded border text-[10px] ${cls}">${v>=0?'+':''}${v.toFixed(0)}%</span>`;
}

async function load(){
  const [league,users,rosters,players,valuesCsv,ppgCsv] = await Promise.all([
    fetch(`https://api.sleeper.app/v1/league/${LEAGUE_ID}`).then(r=>r.json()),
    fetch(`https://api.sleeper.app/v1/league/${LEAGUE_ID}/users`).then(r=>r.json()),
    fetch(`https://api.sleeper.app/v1/league/${LEAGUE_ID}/rosters`).then(r=>r.json()),
    fetch(`https://api.sleeper.app/v1/players/nfl`).then(r=>r.json()),
    fetch(VALUES_URL).then(r=>r.text()),
    fetch(PPG_URL).then(r=>r.text()),
  ]);
  const values = Papa.parse(valuesCsv,{header:true,skipEmptyLines:true}).data;
  const ppgs = Papa.parse(ppgCsv,{header:true,skipEmptyLines:true}).data;

  const valMap = new Map(); values.forEach(r=>{const sid=String(r.sleeper_id||'').trim(); if(sid) valMap.set(sid, parseFloat(r.val_sf_ppr_tep05)||0);});
  const ppgMap = new Map(); ppgs.forEach(r=>{const name=r.Player||r.player||''; const ppg=parseFloat(r['Avg_PPR_0.5_TEP'])||0; if(name) ppgMap.set(norm(name),ppg);});

  const userMap = new Map(users.map(u=>[u.user_id,u]));
  const slots = (league.roster_positions||[]).filter(s=>!['BN','IR','TAXI'].includes(s));

  function optimal(plist){
    const pool=[...plist].sort((a,b)=>b.ppg-a.ppg); const used=new Set(); let total=0; const starters=[];
    for(const slot of slots){
      let allowed=[slot];
      if(slot==='FLEX') allowed=['RB','WR','TE'];
      if(slot==='SUPER_FLEX') allowed=['QB','RB','WR','TE'];
      if(slot==='WRRB_FLEX') allowed=['RB','WR'];
      if(slot==='REC_FLEX') allowed=['WR','TE'];
      const idx=pool.findIndex(p=>!used.has(p.id)&&allowed.includes(p.pos));
      if(idx>=0){const p=pool[idx]; used.add(p.id); total+=p.ppg; starters.push({...p,slot}); pool.splice(idx,1);}
    }
    return {total,starters};
  }

  const built = rosters.map(r=>{
    const u=userMap.get(r.owner_id)||{};
    const teamName=u.metadata?.team_name||u.display_name||'Team';
    const username=u.username||u.display_name||'';
    const plist=(r.players||[]).map(pid=>{
      const pidS=String(pid); const p=players[pidS]||{};
      const name=`${p.first_name||''} ${p.last_name||''}`.trim()||p.full_name||pidS;
      return {id:pidS,name,pos:p.position||'',age:p.age||0,value:valMap.get(pidS)||0,ppg:ppgMap.get(norm(name))||0,team:p.team||''};
    });
    const total=plist.reduce((s,p)=>s+p.value,0);
    const qb=plist.filter(p=>p.pos==='QB').reduce((s,p)=>s+p.value,0);
    const rb=plist.filter(p=>p.pos==='RB').reduce((s,p)=>s+p.value,0);
    const wr=plist.filter(p=>p.pos==='WR').reduce((s,p)=>s+p.value,0);
    const te=plist.filter(p=>p.pos==='TE').reduce((s,p)=>s+p.value,0);
    const valAge = plist.filter(p=>p.value>0&&p.age>0);
    const sumV = valAge.reduce((s,p)=>s+p.value,0);
    const age = sumV? valAge.reduce((s,p)=>s+p.value*p.age,0)/sumV : 0;
    const {total:opt,starters}=optimal(plist);
    return {rosterId:r.roster_id,teamName,username,total,qb,rb,wr,te,age,opt,starters,plist};
  });

  leagueAvgOpt = built.reduce((s,t)=>s+t.opt,0)/built.length;
  leagueAvgAge = built.reduce((s,t)=>s+t.age,0)/built.length;
  built.forEach(t=>{
    t.prodDelta = (t.opt / leagueAvgOpt - 1) * 100;
    t.longDelta = (leagueAvgAge - t.age) * 7;
  });
  teams=built; render();
  document.getElementById('status').innerHTML=`<div class="size-2 rounded-full bg-emerald-400"></div><span>Live • ${teams.length} teams • Avg Opt ${leagueAvgOpt.toFixed(1)} • Avg Age ${leagueAvgAge.toFixed(1)}</span>`;
}

function rankMap(key, asc=false){
  const sorted=[...teams].sort((a,b)=> asc? a[key]-b[key] : b[key]-a[key]);
  const map=new Map(); sorted.forEach((t,i)=>map.set(t.rosterId,i+1)); return map;
}

function render(){
  const tbody=document.getElementById('tbody');
  const data=[...teams].sort((a,b)=>{const av=a[sort.key],bv=b[sort.key]; return sort.dir*(av>bv?1:av<bv?-1:0);});
  const rTotal=rankMap('total'), rQB=rankMap('qb'), rRB=rankMap('rb'), rWR=rankMap('wr'), rTE=rankMap('te'), rAge=rankMap('age',true), rOpt=rankMap('opt');
  document.querySelectorAll('th.sortable').forEach(th=>th.classList.toggle('active', th.dataset.sort===sort.key));

  tbody.innerHTML = data.map(t=>{
    const isExp = expanded.has(t.rosterId);
    return `
    <tr class="team-row ${isExp?'expanded':''}" data-id="${t.rosterId}">
      <td class="px-4 py-3"><svg class="size-4 text-amber-400 transition-transform ${isExp?'rotate-90':''}" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="m9 18 6-6-6-6" stroke-width="2"/></svg></td>
      <td class="px-4 py-3">
        <div class="font-semibold whitespace-nowrap">${t.teamName}</div>
        <div class="text-[11px] text-amber-200/60 whitespace-nowrap">@${t.username}</div>
        <div class="mt-1.5 flex gap-1.5">${deltaBadge(t.prodDelta)} ${deltaBadge(t.longDelta)}</div>
      </td>
      <td class="px-3 py-3 text-right whitespace-nowrap"><span class="rank-pill mr-2 inline-flex px-1.5 py-0.5 rounded border text-[10px] ${rankClass(rTotal.get(t.rosterId))}">#${rTotal.get(t.rosterId)}</span><span class="font-mono">${Math.round(t.total).toLocaleString()}</span></td>
      <td class="px-3 py-3 text-right whitespace-nowrap"><span class="rank-pill mr-2 inline-flex px-1.5 py-0.5 rounded border text-[10px] ${rankClass(rQB.get(t.rosterId))}">#${rQB.get(t.rosterId)}</span><span class="font-mono text-sky-300">${Math.round(t.qb).toLocaleString()}</span></td>
      <td class="px-3 py-3 text-right whitespace-nowrap"><span class="rank-pill mr-2 inline-flex px-1.5 py-0.5 rounded border text-[10px] ${rankClass(rRB.get(t.rosterId))}">#${rRB.get(t.rosterId)}</span><span class="font-mono text-emerald-300">${Math.round(t.rb).toLocaleString()}</span></td>
      <td class="px-3 py-3 text-right whitespace-nowrap"><span class="rank-pill mr-2 inline-flex px-1.5 py-0.5 rounded border text-[10px] ${rankClass(rWR.get(t.rosterId))}">#${rWR.get(t.rosterId)}</span><span class="font-mono text-fuchsia-300">${Math.round(t.wr).toLocaleString()}</span></td>
      <td class="px-3 py-3 text-right whitespace-nowrap"><span class="rank-pill mr-2 inline-flex px-1.5 py-0.5 rounded border text-[10px] ${rankClass(rTE.get(t.rosterId))}">#${rTE.get(t.rosterId)}</span><span class="font-mono text-amber-300">${Math.round(t.te).toLocaleString()}</span></td>
      <td class="px-3 py-3 text-right whitespace-nowrap"><span class="rank-pill mr-2 inline-flex px-1.5 py-0.5 rounded border text-[10px] ${rankClass(rAge.get(t.rosterId))}">#${rAge.get(t.rosterId)}</span><span class="font-mono">${t.age.toFixed(1)}</span></td>
      <td class="px-3 py-3 text-right whitespace-nowrap"><span class="opt inline-flex items-center gap-1 px-2 py-1 rounded-lg bg-amber-950/60 border border-amber-800 cursor-help" data-id="${t.rosterId}"><span class="rank-pill mr-1 inline-flex px-1.5 py-0.5 rounded border text-[10px] ${rankClass(rOpt.get(t.rosterId))}">#${rOpt.get(t.rosterId)}</span><span class="font-mono">${t.opt.toFixed(1)}</span></td>
      <td class="px-4 py-3 whitespace-nowrap">—</td>
    </tr>
    ${isExp? `<tr class="bg-[#0e0a05] border-y border-amber-900/40"><td colspan="10" class="p-0"><div class="p-4"><div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">${['QB','RB','WR','TE'].map(pos=>{const list=t.plist.filter(p=>p.pos===pos).sort((a,b)=>b.value-a.value);const tot=list.reduce((s,p)=>s+p.value,0);return`<div class="rounded-xl border-amber-900/40 bg-[#0b0804] p-3"><div class="flex justify-between mb-2 text-[11px] text-amber-200/70 uppercase tracking-widest"><span>${pos}s</span><span>${list.length} • ${Math.round(tot).toLocaleString()}</span></div><div class="space-y-1">${list.map(p=>`<div class="flex justify-between text-[12px] px-2 py-1 rounded hover:bg-amber-950/30"><span class="truncate">${p.name} <span class="text-amber-200/40">• ${p.team||'FA'}</span></span><span class="font-mono flex gap-3"><span class="w-8 text-right text-amber-200/60">${p.age?p.age.toFixed(1):'—'}</span><span class="w-14 text-right">${Math.round(p.value).toLocaleString()}</span><span class="w-10 text-right text-emerald-300">${p.ppg.toFixed(1)}</span></div>`).join('')||`<div class="text-[11px] italic text-amber-200/40 px-2 py-2">No ${pos}s</div>`}</div></div>`}).join('')}</div></td></tr>`:''}
    `;
  }).join('');

  tbody.querySelectorAll('tr.team-row').forEach(row=>{
    row.addEventListener('click',()=>{ const id=Number(row.dataset.id); expanded.has(id)?expanded.delete(id):expanded.add(id); render(); });
  });
}

document.querySelectorAll('th.sortable').forEach(th=>{
  th.addEventListener('click',()=>{ const key=th.dataset.sort; if(sort.key===key) sort.dir*=-1; else {sort.key=key; sort.dir=-1;} render(); });
});
document.getElementById('refresh').addEventListener('click',load);
load();
</script>
</body>
</html>
