<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Vault Dynasty — Opt PPG Tool</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  body { font-family: Inter, system-ui; background:#050507 }
 .glass { background: linear-gradient(180deg,rgba(255,255,255,.06),rgba(255,255,255,.02)); backdrop-filter: blur(16px); border:1px solid rgba(255,255,255,.08) }
</style>
</head>
<body class="text-zinc-100">
<header class="sticky top-0 z-40 border-b border-white/5 bg-black/60 backdrop-blur-xl">
  <div class="max-w-[1400px] mx-auto px-6 h-[64px] flex items-center justify-between">
    <div class="flex items-center gap-3">
      <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-violet-500 to-cyan-400"></div>
      <h1 class="text-lg font-semibold">THE VAULT</h1>
      <span class="text-xs px-2 py-0.5 rounded bg-white/5 border border-white/10">SF • TEP 0.5</span>
    </div>
    <div id="format" class="font-mono text-xs text-zinc-400"></div>
  </div>
</header>

<main class="max-w-[1400px] mx-auto px-6 py-8">
  <div id="loading" class="glass rounded-2xl p-8 text-center">Loading league...</div>
  <div id="app" class="hidden">
    <table class="w-full text-sm">
      <thead class="text-zinc-500 border-b border-white/10">
        <tr><th class="text-left py-2">#</th><th class="text-left">Team</th><th class="text-right">Opt PPG</th><th class="text-right">Starters Val</th><th class="text-right">Total Val</th></tr>
      </thead>
      <tbody id="tbody" class="divide-y divide-white/5"></tbody>
    </table>
  </div>
</main>

<script>
const LEAGUE_ID = '1313454100225990656';
const VALUES_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRqxhqyuKK6vu_EoYta5FZ_KdOB8M54Q_qBwJKOUF5KcgbTt2dmHn_FuLj9d-FS8-ta5T0zkU0QEGcN/pub?gid=4113168&single=true&output=csv';
const PPG_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRqxhqyuKK6vu_EoYta5FZ_KdOB8M54Q_qBwJKOUF5KcgbTt2dmHn_FuLj9d-FS8-ta5T0zkU0QEGcN/pub?gid=118408869&single=true&output=csv';

async function init(){
  const [league, users, rosters, valsTxt, ppgTxt] = await Promise.all([
    fetch(`https://api.sleeper.app/v1/league/${LEAGUE_ID}`).then(r=>r.json()),
    fetch(`https://api.sleeper.app/v1/league/${LEAGUE_ID}/users`).then(r=>r.json()),
    fetch(`https://api.sleeper.app/v1/league/${LEAGUE_ID}/rosters`).then(r=>r.json()),
    fetch(VALUES_URL).then(r=>r.text()),
    fetch(PPG_URL).then(r=>r.text())
  ]);

  const slots = league.roster_positions.filter(p=>!['BN','IR','TAXI'].includes(p));
  document.getElementById('format').textContent = slots.join(' • ');

  const vals = Papa.parse(valsTxt,{header:true}).data;
  const vMap = {};
  vals.forEach(r=>{ if(r.sleeper_id) vMap[r.sleeper_id] = {val:+r.val_sf_ppr_tep05||0, name:r.name} });

  const ppg = Papa.parse(ppgTxt,{header:true}).data;
  const pMap = {};
  ppg.forEach(r=>{ const n=(r.Player||'').toLowerCase().replace(/[^a-z0-9]/g,''); pMap[n]=+r['Avg_PPR_0.5_TEP']||0 });

  const userMap = Object.fromEntries(users.map(u=>[u.user_id,u]));
  const players = await fetch('https://api.sleeper.app/v1/players/nfl').then(r=>r.json());

  const teams = rosters.map(ro=>{
    const plist = (ro.players||[]).map(pid=>{
      const p=players[pid]; if(!p) return null;
      const key=p.full_name.toLowerCase().replace(/[^a-z0-9]/g,'');
      return {id:pid,name:p.full_name,pos:p.position,ppg:pMap[key]||0,val:vMap[pid]?.val||0}
    }).filter(Boolean);

    const pool=[...plist].sort((a,b)=>b.ppg-a.ppg);
    const used=new Set(); const starters=[];
    const fits=(pl,sl)=> sl===pl.pos || (sl==='FLEX'&&['RB','WR','TE'].includes(pl.pos)) || (sl==='SUPER_FLEX');

    for(const s of slots){ const c=pool.find(p=>!used.has(p.id)&&fits(p,s)); if(c){used.add(c.id);starters.push({...c,slot:s})}}

    return {
      name:userMap[ro.owner_id]?.metadata?.team_name||userMap[ro.owner_id]?.display_name,
      opt:starters.reduce((a,b)=>a+b.ppg,0),
      sval:starters.reduce((a,b)=>a+b.val,0),
      tval:plist.reduce((a,b)=>a+b.val,0),
      starters
    }
  }).sort((a,b)=>b.opt-a.opt);

  document.getElementById('loading').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  document.getElementById('tbody').innerHTML = teams.map((t,i)=>`
    <tr class="hover:bg-white/5">
      <td class="py-2 font-mono text-zinc-500">${i+1}</td>
      <td class="py-2">${t.name}</td>
      <td class="py-2 text-right relative group">
        <span class="font-mono cursor-help">${t.opt.toFixed(1)}</span>
        <div class="invisible group-hover:visible absolute right-0 mt-1 z-50 w-80 p-3 rounded-xl bg-zinc-900 border-zinc-700 shadow-xl">
          <div class="text-xs text-zinc-500 mb-1">Starters — PPG vs Value</div>
          ${t.starters.map(s=>`<div class="flex justify-between text-xs py-0.5"><span>${s.slot} ${s.name}</span><span class="font-mono">${s.ppg.toFixed(1)} / ${Math.round(s.val).toLocaleString()}</span></div>`).join('')}
          <div class="border-t border-zinc-800 mt-1 pt-1 flex justify-between font-mono text-xs"><span>Total</span><span>${t.opt.toFixed(1)} / ${Math.round(t.sval).toLocaleString()}</span></div>
        </div>
      </td>
      <td class="py-2 text-right font-mono">${Math.round(t.sval).toLocaleString()}</td>
      <td class="py-2 text-right font-mono text-zinc-500">${Math.round(t.tval).toLocaleString()}</td>
    </tr>`).join('');
}
init();
</script>
</body>
</html>
