<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Dynasty Audit • Dark Gold</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0907;
  --panel:#12100c;
  --panel-2:#17130e;
  --line:#2a2215;
  --gold:#E7C070;
  --gold-2:#D4A847;
  --gold-3:#b88a2c;
  --text:#E8E6E1;
  --muted:#9c917d;
}
*{font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,sans-serif}
.mono{font-family:"JetBrains Mono",ui-monospace,SFMono-Regular,monospace}
body{background:var(--bg);color:var(--text)}
.gold{color:var(--gold)}
.gold-gradient{background:linear-gradient(180deg,var(--gold),var(--gold-2));-webkit-background-clip:text;background-clip:text;color:transparent}
.card{background:linear-gradient(180deg,rgba(255,255,255,.02),rgba(0,0,0,.0)),var(--panel);border:1px solid var(--line)}
.badge-tier{border:1px solid rgba(231,192,112,.35);background:rgba(231,192,112,.08);color:var(--gold)}
.rank-pill{display:inline-flex;align-items:center;gap:.5rem;padding:.25rem .5rem;border-radius:9999px;background:rgba(231,192,112,.06);border:1px solid rgba(231,192,112,.18);font-size:12px}
.rank-pill .rank{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:9999px;background:rgba(231,192,112,.15);color:var(--gold);font-weight:600}
.chip{display:inline-flex;align-items:center;gap:.5rem;padding:.375rem .625rem;border-radius:9999px;background:#0f0e0b;border:1px solid var(--line);font-size:13px}
.chip .pos{font-size:11px;font-weight:700;letter-spacing:.04em;color:#0a0907;background:var(--gold);padding:.15rem .4rem;border-radius:9999px}
.chip .val{color:var(--muted);font-family:"JetBrains Mono",monospace}
.col-head{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);font-weight:600}
.table-grid{display:grid;grid-template-columns:minmax(240px,1.8fr) 80px 150px 130px repeat(4,110px) 130px;align-items:center}
@media(max-width:1280px){
  .table-grid{grid-template-columns:minmax(220px,1.6fr) 70px 140px 120px repeat(4,100px) 120px}
}
@media(max-width:1024px){
  .table-wrap{overflow-x:auto}
  .table-grid{min-width:1100px}
}
.row-hover:hover{background:rgba(231,192,112,.03)}
.expand{background:var(--panel-2);border-top:1px solid var(--line)}
.pos-panel{background:#0f0e0b;border:1px solid var(--line);border-radius:14px;overflow:hidden}
.pos-panel .head{background:#141109;border-bottom:1px solid var(--line);padding:.75rem 1rem;display:flex;align-items:center;justify-content:space-between}
.pos-panel .head .title{font-weight:700;letter-spacing:.02em}
.pos-panel .head .meta{font-size:12px;color:var(--muted)}
.scroll-y{max-height:340px;overflow-y:auto}
.scroll-y::-webkit-scrollbar{width:8px}
.scroll-y::-webkit-scrollbar-thumb{background:#2a2215;border-radius:8px}
.sortable{cursor:pointer;user-select:none}
.sortable:hover{color:var(--gold)}
.btn{background:linear-gradient(180deg,var(--gold),var(--gold-2));color:#1a1205;font-weight:600;padding:.6rem 1rem;border-radius:12px}
.btn:disabled{opacity:.5}
.input{background:#0f0e0b;border:1px solid var(--line);border-radius:12px;padding:.6rem .9rem;color:var(--text);outline:none}
.input:focus{border-color:var(--gold-3);box-shadow:0 0 0 3px rgba(231,192,112,.12)}
</style>
</head>
<body class="min-h-screen">
<div class="border-b border-[#221a0f] sticky top-0 z-40 backdrop-blur bg-[#0a0907]/85">
  <div class="max-w-[1400px] mx-auto px-6 py-5 flex items-center justify-between gap-6">
    <div class="flex items-center gap-4">
      <div class="w-10 h-10 rounded-2xl bg-gradient-to-br from-[#f5d98a] to-[#c99a3a] flex items-center justify-center shadow-[0_0_30px_rgba(231,192,112,.25)]">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M12 2l2.9 5.9 6.5.9-4.7 4.6 1.1 6.5-5.8-3-5.8 3 1.1-6.5-4.7-4.6 6.5-.9L12 2z" fill="#1a1205"/></svg>
      </div>
      <div>
        <div id="leagueName" class="text-[28px] leading-7 font-bold gold-gradient">Dynasty Audit</div>
        <div id="leagueMeta" class="text-xs text-[#9c917d] mt-0.5">—</div>
      </div>
    </div>
    <div class="hidden md:flex items-center gap-3">
      <input id="leagueInput" class="input w-[320px]" placeholder="Sleeper League ID" />
      <button id="loadBtn" class="btn">Load</button>
    </div>
  </div>
</div>

<main class="max-w-[1400px] mx-auto px-6 py-8">
  <div class="md:hidden flex gap-2 mb-6">
    <input id="leagueInputM" class="input flex-1" placeholder="Sleeper League ID" />
    <button id="loadBtnM" class="btn">Load</button>
  </div>

  <div id="status" class="card rounded-2xl p-4 mb-6 flex items-center gap-3 text-sm text-[#cbbd9e]">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" class="opacity-70"><path d="M12 2v4M12 18v4M2 12h4M18 12h4M4.9 4.9l2.8 2.8M16.3 16.3l2.8 2.8M4.9 19.1l2.8-2.8M16.3 7.7l2.8-2.8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
    <span id="statusText">Enter a Sleeper league ID to audit. Values & PPG are pulled directly from CSV.</span>
  </div>

  <div id="loading" class="hidden card rounded-2xl p-10 text-center">
    <div class="inline-flex items-center gap-3 text-[#cbbd9e]">
      <svg class="animate-spin" width="20" height="20" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" stroke="#3a2e1a" stroke-width="4" fill="none"/><path d="M22 12a10 10 0 0 0-10-10" stroke="#E7C070" stroke-width="4" fill="none" stroke-linecap="round"/></svg>
      Loading league, CSV, players & picks...
    </div>
  </div>

  <div id="error" class="hidden card rounded-2xl p-6 border-red-900/50 bg-red-950/20 text-red-200"></div>

  <div id="tableWrap" class="table-wrap card rounded-2xl overflow-hidden hidden">
    <div class="table-grid col-head px-5 py-3 border-b border-[var(--line)] bg-[#0f0e0b]/70 sticky top-[73px] z-30 backdrop-blur">
      <div>TEAM</div>
      <div class="text-center">TIER</div>
      <div class="sortable" data-key="overall">OVERALL</div>
      <div class="sortable" data-key="ppg">PPG</div>
      <div class="sortable" data-key="qb">QB</div>
      <div class="sortable" data-key="rb">RB</div>
      <div class="sortable" data-key="wr">WR</div>
      <div class="sortable" data-key="te">TE</div>
      <div class="sortable" data-key="draft">DRAFT</div>
    </div>
    <div id="rows" class="divide-y divide-[var(--line)]"></div>
  </div>
</main>

<script>
const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRZY-Dra8s3j-ocJ7OK6yTs3BFcj-A_WeiIX35u49fg2xA8Y3Pg-nnOHVOnfZGOEAFWrj1EFBOV6qzi/pub?gid=2077026411&single=true&output=csv';
const SLEEPER = 'https://api.sleeper.app/v1';

const $ = s => document.querySelector(s);
const fmtInt = n => Math.round(n||0).toLocaleString();
const fmtPPG = n => (n||0).toFixed(1);

function normalizeName(name){
  return (name||'').toLowerCase().replace(/[^a-z0-9\s]/g,'').replace(/\s+/g,' ').trim();
}
function parseCSV(text){
  const rows=[];let cur='',row=[],inQ=false;
  for(let i=0;i<text.length;i++){
    const c=text[i], n=text[i+1];
    if(c==='"'){ if(inQ && n==='"'){cur+='"';i++;} else inQ=!inQ; }
    else if(c===',' && !inQ){row.push(cur);cur='';}
    else if(c==='\n' && !inQ){row.push(cur);cur='';rows.push(row);row=[];}
    else if(c!=='\r'){cur+=c;}
  }
  if(cur!==''||row.length){row.push(cur);rows.push(row);}
  const headers=rows.shift().map(h=>h.trim());
  return rows.filter(r=>r.length>1 && r.some(v=>v!=='')).
    map(r=>{const o={};headers.forEach((h,i)=>o[h]=r[i]??'');return o;});
}
function eligibleFor(slot,pos){
  const p=pos.toUpperCase();
  if(slot==='QB') return p==='QB';
  if(slot==='RB') return p==='RB';
  if(slot==='WR') return p==='WR';
  if(slot==='TE') return p==='TE';
  if(slot==='FLEX') return ['RB','WR','TE'].includes(p);
  if(slot==='SUPER_FLEX') return ['QB','RB','WR','TE'].includes(p);
  if(slot==='REC_FLEX') return ['WR','TE'].includes(p);
  if(slot==='WRRB_FLEX') return ['WR','RB'].includes(p);
  return false;
}
function buildSlots(roster_positions){
  const order=['QB','RB','WR','TE','REC_FLEX','WRRB_FLEX','FLEX','SUPER_FLEX'];
  const counts={}; roster_positions.forEach(p=>counts[p]=(counts[p]||0)+1);
  const slots=[];
  order.forEach(pos=>{for(let i=0;i<(counts[pos]||0);i++) slots.push(pos);});
  return slots;
}
function computeOptimalStarters(players, slots){
  const pool=[...players].sort((a,b)=>b.ppg - a.ppg);
  const used=new Set();
  const starters=[];
  for(const slot of slots){
    let bestIdx=-1;
    for(let i=0;i<pool.length;i++){
      const pl=pool[i];
      if(used.has(pl.id)) continue;
      if(eligibleFor(slot, pl.pos)){ bestIdx=i; break; }
    }
    if(bestIdx>=0){ const pl=pool[bestIdx]; used.add(pl.id); starters.push({...pl, slot}); }
  }
  return starters;
}
function tierFromPct(p){
  if(p>=0.9) return 'S';
  if(p>=0.7) return 'A';
  if(p>=0.4) return 'B';
  if(p>=0.2) return 'C';
  return 'D';
}
function rankTeams(teams, key){
  const sorted=[...teams].sort((a,b)=>b[key]-a[key]);
  const ranks=new Map();
  sorted.forEach((t,i)=>ranks.set(t.roster_id,i+1));
  return ranks;
}

let STATE={ teams:[], sortKey:'overall', sortDir:'desc', expanded:null };

async function loadLeague(leagueId){
  $('#error').classList.add('hidden');
  $('#tableWrap').classList.add('hidden');
  $('#loading').classList.remove('hidden');
  $('#statusText').textContent='Fetching CSV, Sleeper league, users, rosters, picks, drafts, players...';
  try{
    const [csvText, league, users, rosters, traded, drafts, playersDB] = await Promise.all([
      fetch(CSV_URL).then(r=>{if(!r.ok) throw new Error('CSV fetch failed'); return r.text();}),
      fetch(`${SLEEPER}/league/${leagueId}`).then(r=>r.json()),
      fetch(`${SLEEPER}/league/${leagueId}/users`).then(r=>r.json()),
      fetch(`${SLEEPER}/league/${leagueId}/rosters`).then(r=>r.json()),
      fetch(`${SLEEPER}/league/${leagueId}/traded_picks`).then(r=>r.json()),
      fetch(`${SLEEPER}/league/${leagueId}/drafts`).then(r=>r.json()),
      fetch(`${SLEEPER}/players/nfl`).then(r=>r.json())
    ]);

    const csvRows=parseCSV(csvText);
    const byId=new Map();
    const byName=new Map();
    csvRows.forEach(r=>{
      const id=String(r.sleeper_id||'').trim();
      const val=Number(r.value)||0;
      const ppg=Number(r.ppg)||0;
      const name=r.name||'';
      const pos=(r.pos||'').toUpperCase();
      if(id) byId.set(id,{value:val,ppg,name,pos});
      const n=normalizeName(name);
      if(n) byName.set(n,{value:val,ppg,name,pos,id});
    });

    const userMap=new Map(users.map(u=>[u.user_id,u]));
    const slots=buildSlots(league.roster_positions||[]);
    const season=parseInt(league.season||new Date().getFullYear());
    const draftRounds=league.settings?.draft_rounds||4;

    // pick equity
    const completedSeasons=new Set(drafts.filter(d=>d.status==='complete').map(d=>String(d.season)));
    const futureSeasons=[season,season+1,season+2].filter(s=>!completedSeasons.has(String(s)));
    const pickValue={1:10000,2:5000,3:2500,4:1200,5:600};
    const tradedMap=new Map();
    (traded||[]).forEach(tp=>{
      const key=`${tp.season}-${tp.round}-${tp.roster_id}`;
      tradedMap.set(key,tp.owner_id);
    });
    const pickEquityByRoster=new Map();
    rosters.forEach(r=>{
      let equity=0;
      const orig=r.roster_id;
      futureSeasons.forEach((s,idx)=>{
        const disc=Math.pow(0.85,idx);
        for(let rd=1;rd<=draftRounds;rd++){
          const key=`${s}-${rd}-${orig}`;
          const owner=tradedMap.has(key)?tradedMap.get(key):orig;
          if(owner===r.roster_id){
            equity+= (pickValue[rd]||400)*disc;
          }
        }
      });
      pickEquityByRoster.set(r.roster_id,Math.round(equity));
    });

    const teams=rosters.map(r=>{
      const user=userMap.get(r.owner_id)||{};
      const ids=new Set([...(r.players||[]),...(r.taxi||[]),...(r.reserve||[])]);
      const players=[];
      ids.forEach(pid=>{
        const p=playersDB[pid];
        if(!p) return;
        const pos=(p.position||'').toUpperCase();
        const full=p.full_name || `${p.first_name||''} ${p.last_name||''}`.trim();
        let rec=byId.get(String(pid));
        if(!rec){
          const n=normalizeName(full);
          rec=byName.get(n);
        }
        const value=rec?rec.value:0;
        const ppg=rec?rec.ppg:0;
        players.push({id:pid,name:full,pos,value,ppg});
      });

      const posSum={QB:0,RB:0,WR:0,TE:0};
      let playerValueSum=0;
      players.forEach(p=>{
        playerValueSum+=p.value;
        if(posSum[p.pos]!=null) posSum[p.pos]+=p.value;
      });
      const draftVal=pickEquityByRoster.get(r.roster_id)||0;
      const overall=playerValueSum+draftVal;

      const starters=computeOptimalStarters(players, slots);
      const ppgSum=starters.reduce((s,x)=>s+x.ppg,0);

      const byPos={QB:[],RB:[],WR:[],TE:[]};
      players.forEach(p=>{if(byPos[p.pos]) byPos[p.pos].push(p);});
      Object.keys(byPos).forEach(k=>byPos[k].sort((a,b)=>b.value-a.value));

      return {
        roster_id:r.roster_id,
        team_name:user.display_name||user.username||`Team ${r.roster_id}`,
        avatar:user.avatar,
        record:`${r.settings?.wins||0}-${r.settings?.losses||0}`,
        overall,
        ppg:ppgSum,
        qb:posSum.QB,
        rb:posSum.RB,
        wr:posSum.WR,
        te:posSum.TE,
        draft:draftVal,
        starters,
        byPos,
        players
      };
    });

    // ranks
    const rankOverall=rankTeams(teams,'overall');
    const rankPPG=rankTeams(teams,'ppg');
    const rankQB=rankTeams(teams,'qb');
    const rankRB=rankTeams(teams,'rb');
    const rankWR=rankTeams(teams,'wr');
    const rankTE=rankTeams(teams,'te');
    const rankDraft=rankTeams(teams,'draft');

    const sortedOverall=[...teams].sort((a,b)=>b.overall-a.overall);
    teams.forEach(t=>{
      const idx=sortedOverall.findIndex(x=>x.roster_id===t.roster_id);
      const pct=1-idx/Math.max(1,teams.length-1);
      t.tier=tierFromPct(pct);
      t.ranks={overall:rankOverall.get(t.roster_id),ppg:rankPPG.get(t.roster_id),qb:rankQB.get(t.roster_id),rb:rankRB.get(t.roster_id),wr:rankWR.get(t.roster_id),te:rankTE.get(t.roster_id),draft:rankDraft.get(t.roster_id)};
    });

    STATE.teams=teams;
    $('#leagueName').textContent=league.name||'Dynasty Audit';
    $('#leagueMeta').textContent=`${teams.length} teams • Season ${season}`;
    $('#statusText').textContent='Data loaded. Values and PPG are exact CSV numbers.';
    $('#loading').classList.add('hidden');
    $('#tableWrap').classList.remove('hidden');
    render();
  }catch(e){
    console.error(e);
    $('#loading').classList.add('hidden');
    $('#error').classList.remove('hidden');
    $('#error').textContent='Error: '+(e.message||e);
  }
}

function render(){
  const rows=$('#rows');
  rows.innerHTML='';
  let teams=[...STATE.teams];
  const key=STATE.sortKey;
  teams.sort((a,b)=> STATE.sortDir==='desc'? b[key]-a[key] : a[key]-b[key]);

  teams.forEach(t=>{
    const row=document.createElement('div');
    row.className='table-grid px-5 py-4 row-hover cursor-pointer';
    row.dataset.id=t.roster_id;
    row.innerHTML=`
      <div class="flex items-center gap-3 min-w-0">
        <div class="w-9 h-9 rounded-xl bg-[#1a1610] border border-[var(--line)] flex items-center justify-center text-[13px] font-bold text-[#d4b878]">${t.team_name.slice(0,2).toUpperCase()}</div>
        <div class="min-w-0">
          <div class="font-semibold leading-tight truncate">${t.team_name}</div>
          <div class="text-xs text-[#9c917d]">${t.record}</div>
        </div>
        <svg class="ml-auto opacity-50" width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M9 18l6-6-6-6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      </div>
      <div class="flex justify-center"><span class="badge-tier px-2.5 py-1 rounded-full text-xs font-bold">${t.tier}</span></div>
      <div><div class="rank-pill"><span class="rank">${t.ranks.overall}</span><span class="mono text-[#e8e6e1]">${fmtInt(t.overall)}</span></div></div>
      <div><div class="rank-pill"><span class="rank">${t.ranks.ppg}</span><span class="mono">${fmtPPG(t.ppg)}</span></div></div>
      <div><div class="rank-pill"><span class="rank">${t.ranks.qb}</span><span class="mono">${fmtInt(t.qb)}</span></div></div>
      <div><div class="rank-pill"><span class="rank">${t.ranks.rb}</span><span class="mono">${fmtInt(t.rb)}</span></div></div>
      <div><div class="rank-pill"><span class="rank">${t.ranks.wr}</span><span class="mono">${fmtInt(t.wr)}</span></div></div>
      <div><div class="rank-pill"><span class="rank">${t.ranks.te}</span><span class="mono">${fmtInt(t.te)}</span></div></div>
      <div><div class="rank-pill"><span class="rank">${t.ranks.draft}</span><span class="mono">${fmtInt(t.draft)}</span></div></div>
    `;
    row.addEventListener('click',()=> toggleExpand(t.roster_id));
    rows.appendChild(row);

    const exp=document.createElement('div');
    exp.className='expand hidden';
    exp.dataset.expFor=t.roster_id;
    exp.innerHTML=`
      <div class="px-5 py-5">
        <div class="text-[11px] uppercase tracking-wider text-[#9c917d] mb-3">Optimal Starters</div>
        <div class="flex flex-wrap gap-2 mb-6">
          ${t.starters.map(s=>`
            <div class="chip">
              <span class="pos">${s.slot.replace('_',' ')}</span>
              <span class="truncate max-w-[140px]">${s.name}</span>
              <span class="val">${fmtInt(s.value)}</span>
            </div>
          `).join('')}
        </div>
        <div class="grid grid-cols-1 lg:grid-cols-4 gap-5">
          ${['QB','RB','WR','TE'].map(pos=>`
            <div class="pos-panel">
              <div class="head">
                <div class="title gold">${pos}</div>
                <div class="meta mono">VAL / PPG</div>
              </div>
              <div class="scroll-y divide-y divide-[var(--line)]">
                ${t.byPos[pos].map(p=>`
                  <div class="flex items-center justify-between px-4 py-2.5 text-sm">
                    <div class="truncate pr-3">${p.name}</div>
                    <div class="flex items-center gap-4 mono text-xs text-[#cbbd9e]">
                      <span class="w-[70px] text-right">${fmtInt(p.value)}</span>
                      <span class="w-[45px] text-right">${fmtPPG(p.ppg)}</span>
                    </div>
                  </div>
                `).join('') || `<div class="px-4 py-6 text-sm text-[#7a7060]">No players</div>`}
              </div>
            </div>
          `).join('')}
        </div>
      </div>
    `;
    rows.appendChild(exp);
  });
}

function toggleExpand(id){
  document.querySelectorAll('[data-exp-for]').forEach(el=>{
    if(Number(el.dataset.expFor)===Number(id)){
      el.classList.toggle('hidden');
    }else{
      el.classList.add('hidden');
    }
  });
}

document.querySelectorAll('.sortable').forEach(el=>{
  el.addEventListener('click',()=>{
    const key=el.dataset.key;
    if(STATE.sortKey===key){ STATE.sortDir=STATE.sortDir==='desc'?'asc':'desc'; }
    else{ STATE.sortKey=key; STATE.sortDir='desc'; }
    render();
  });
});

function getLeagueIdFromURL(){
  const p=new URLSearchParams(location.search);
  return p.get('league_id')||p.get('leagueId')||'';
}
function init(){
  const id=getLeagueIdFromURL();
  if(id){ $('#leagueInput').value=id; $('#leagueInputM').value=id; loadLeague(id); }
  $('#loadBtn').addEventListener('click',()=>{ const v=$('#leagueInput').value.trim(); if(v){ history.replaceState(null,'','?league_id='+v); loadLeague(v);} });
  $('#loadBtnM').addEventListener('click',()=>{ const v=$('#leagueInputM').value.trim(); if(v){ history.replaceState(null,'','?league_id='+v); loadLeague(v);} });
}
init();
</script>
</body>
</html>
