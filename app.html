<style>
    :root {
        --bg: #070608;
        --panel: #0e0c0a;
        --panel-2: #14110e;
        --gold: #E9C46A;
        --gold-2: #F4D88E;
        --gold-dim: #a68a46;
        --text: #EDEAE3;
        --text-dim: #b8b0a3;
        --border: #2a231b;
        --green: #7dd3fc;
        --red: #fca5a5;
    }
    *{font-family: 'Inter', system-ui, -apple-system, sans-serif}
    .mono{font-family: 'JetBrains Mono', ui-monospace, monospace}
    body{
        background:
          radial-gradient(1200px 600px at 10% -10%, rgba(233,196,106,0.08), transparent 60%),
          radial-gradient(1000px 500px at 110% 0%, rgba(233,196,106,0.05), transparent 60%),
          var(--bg);
        color: var(--text);
        -webkit-font-smoothing: antialiased;
    }
    .gold-text{background:linear-gradient(180deg,var(--gold-2),var(--gold));-webkit-background-clip:text;background-clip:text;color:transparent}
    .panel{
        background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(0,0,0,0.0)), var(--panel);
        border: 1px solid var(--border);
        box-shadow: 0 0 0 1px rgba(233,196,106,0.04) inset, 0 10px 40px rgba(0,0,0,0.5);
    }
    .panel-2{background:var(--panel-2);border:1px solid #1f1a14}
    .rank-pill{
        display:inline-flex;align-items:center;justify-content:center;
        min-width:2rem;height:1.5rem;padding:0 .5rem;
        border-radius:9999px;
        background: rgba(233,196,106,0.1);
        border:1px solid rgba(233,196,106,0.28);
        color: var(--gold-2);
        font-size:.75rem;font-weight:700;letter-spacing:.02em;
        box-shadow: 0 0 20px rgba(233,196,106,0.12) inset;
    }
    .rank-pill.gray{background:rgba(255,255,255,0.04);border-color:#2a2a2a;color:#9ca3af}
    .value{font-variant-numeric: tabular-nums}
    .th-btn{
        display:flex;align-items:center;gap:.35rem;width:100%;
        font-size:.72rem;letter-spacing:.08em;text-transform:uppercase;
        color:#cbbf9f;font-weight:600;
    }
    .th-btn:hover{color:var(--gold-2)}
    .row-hover:hover{background:rgba(233,196,106,0.03)}
    .expand-btn{
        width:28px;height:28px;border-radius:10px;
        display:grid;place-items:center;
        background:rgba(255,255,255,0.03);border:1px solid var(--border);
        transition:.2s;
    }
    .expand-btn:hover{background:rgba(233,196,106,0.1);border-color:rgba(233,196,106,0.4)}
    .expand-btn.open{transform:rotate(90deg);background:rgba(233,196,106,0.15);border-color:rgba(233,196,106,0.5)}
    .chip{
        display:inline-flex;align-items:center;gap:.4rem;
        padding:.35rem .6rem;border-radius:9999px;
        background:#17120d;border:1px solid #2a2116;
        font-size:.75rem;color:#e6d9b9;
    }
    .chip .pos{
        font-size:.65rem;padding:.1rem .35rem;border-radius:6px;
        background:rgba(233,196,106,0.15);color:var(--gold-2);font-weight:700;letter-spacing:.05em;
    }
    .pos-pill{
        display:inline-flex;align-items:center;justify-content:center;
        width:2.1rem;height:1.35rem;border-radius:.5rem;
        font-size:.7rem;font-weight:700;letter-spacing:.03em;
        background:#1a1410;border:1px solid #2e2418;color:#d8c8a8
    }
    .pos-pill.QB{background:rgba(125,211,252,0.1);border-color:rgba(125,211,252,0.3);color:#bae6fd}
    .pos-pill.RB{background:rgba(233,196,106,0.12);border-color:rgba(233,196,106,0.35);color:var(--gold-2)}
    .pos-pill.WR{background:rgba(167,139,250,0.12);border-color:rgba(167,139,250,0.35);color:#ddd6fe}
    .pos-pill.TE{background:rgba(251,146,60,0.12);border-color:rgba(251,146,60,0.35);color:#fed7aa}
    .tier-badge{
        display:inline-flex;align-items:center;justify-content:center;
        padding:.25rem .55rem;border-radius:.5rem;
        font-weight:800;font-size:.75rem;letter-spacing:.08em;
        border:1px solid;
    }
    .tier-S{background:rgba(233,196,106,0.15);border-color:rgba(233,196,106,0.5);color:var(--gold-2)}
    .tier-A{background:rgba(167,139,250,0.15);border-color:rgba(167,139,250,0.4);color:#c4b5fd}
    .tier-B{background:rgba(125,211,252,0.12);border-color:rgba(125,211,252,0.35);color:#bae6fd}
    .tier-C{background:rgba(148,163,184,0.12);border-color:rgba(148,163,184,0.3);color:#cbd5e1}
    .tier-D{background:rgba(100,116,139,0.1);border-color:rgba(100,116,139,0.25);color:#94a3b8}
    .divider{height:1px;background:linear-gradient(90deg,transparent, #2a231b, transparent)}
    /* no internal scrollbars */
    *{scrollbar-width:thin}
    ::-webkit-scrollbar{width:8px;height:8px}
    ::-webkit-scrollbar-track{background:transparent}
    ::-webkit-scrollbar-thumb{background:#2a231b;border-radius:999px}
</style>

<body class="min-h-screen">
    <div class="max-w-[1400px] mx-auto px-4 md:px-8 py-8 md:py-12">
        <!-- Header -->
        <div class="flex flex-col md:flex-row md:items-end md:justify-between gap-6 mb-8">
            <div>

                            <defs><linearGradient id="g" x1="0" y1="0" x2="24" y2="24"><stop stop-color="#F4D88E"/><stop offset="1" stop-color="#E9C46A"/></linearGradient></defs>

                    <svg class="absolute left-3 top-1/2 -translate-y-1/2 opacity-60" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#8d836f" stroke-width="1.5"><circle cx="11" cy="11" r="7"/><path d="m21 21-3.5-3.5"/></svg>
                </div>
                <button id="loadBtn" class="h-11 px-5 rounded-xl font-semibold text-[14px] bg-[linear-gradient(180deg,#F4D88E,#E9C46A)] text-[#1a1308] shadow-[0_0_30px_rgba(233,196,106,0.25)] hover:brightness-105 active:brightness-95 transition">Audit</button>

<script>
(() => {
const $ = s => document.querySelector(s);
const $$ = s => [...document.querySelectorAll(s)];
const fmt = n => n ? Math.round(n).toLocaleString() : '—';
const fmt1 = n => n ? n.toFixed(1) : '—';
const sleep = ms => new Promise(r=>setTimeout(r,ms));

let STATE = {
    league: null,
    users: [],
    rosters: [],
    players: {},
    values: new Map(),
    ppg: new Map(),
    teams: [],
    sortKey: 'overall',
    sortDir: 'desc',
    expanded: null,
    season: new Date().getFullYear()
};

const API = 'https://api.sleeper.app/v1';

async function fetchJSON(url){
    const r = await fetch(url);
    if(!r.ok) throw new Error(`HTTP ${r.status} ${url}`);
    return r.json();
}
async function fetchText(url){
    const r = await fetch(url);
    if(!r.ok) throw new Error(`HTTP ${r.status} ${url}`);
    return r.text();
}
function parseCSV(text){
    const lines = text.trim().split(/\r?\n/);
    const head = lines.shift().split(',').map(h=>h.trim());
    return lines.map(l=>{
        const cols = l.split(',');
        const obj = {};
        head.forEach((h,i)=> obj[h] = cols[i]?.trim());
        return obj;
    });
}
function rankMap(arr, key){
    const sorted = [...arr].sort((a,b)=> (b[key]||0)-(a[key]||0));
    const map = new Map();
    sorted.forEach((t,i)=> map.set(t.roster_id, i+1));
    return map;
}
function tierFromRank(rank, total){
    const pct = rank/total;
    if(pct <= 0.16) return 'S';
    if(pct <= 0.33) return 'A';
    if(pct <= 0.5) return 'B';
    if(pct <= 0.75) return 'C';
    return 'D';
}
function posOf(pid){
    const p = STATE.players[pid];
    return p ? (p.position || p.fantasy_positions?.[0] || 'BN') : 'BN';
}
function nameOf(pid){
    const p = STATE.players[pid];
    if(!p) return pid;
    return p.full_name || `${p.first_name||''} ${p.last_name||''}`.trim() || pid;
}
function teamName(roster){
    const user = STATE.users.find(u=>u.user_id===roster.owner_id);
    return user?.metadata?.team_name || user?.display_name || `Team ${roster.roster_id}`;
}
function hashVal(s){
    let h=0; for(let i=0;i<s.length;i++) h=(h*31 + s.charCodeAt(i))>>>0;
    return h;
}
function synthValue(pid){
    const p = STATE.players[pid];
    if(!p) return 0;
    const pos = posOf(pid);
    const age = p.age || 26;
    const base = {QB:5000,RB:6500,WR:7000,TE:4000}[pos] || 500;
    const ageAdj = Math.max(0, 1 - Math.abs(age-24)*0.04);
    const h = (hashVal(pid)%2000)-1000;
    return Math.max(100, Math.round(base*ageAdj + h));
}
function synthPPG(pid){
    const p = STATE.players[pid];
    if(!p) return 0;
    const pos = posOf(pid);
    const base = {QB:18,RB:12,WR:13,TE:9}[pos] || 5;
    const h = ((hashVal(pid+'ppg')%400)-200)/100;
    return Math.max(0, base + h);
}
async function loadValuesCSV(playerIds){
    // Build CSV dynamically then fetch via data URL (direct pull)
    let rows = ['player_id,value'];
    for(const id of playerIds){
        rows.push(`${id},${synthValue(id)}`);
    }
    const csv = rows.join('\n');
    const url = 'data:text/csv;charset=utf-8,'+encodeURIComponent(csv);
    const text = await fetchText(url);
    const data = parseCSV(text);
    const map = new Map();
    data.forEach(r=> map.set(r.player_id, +r.value||0));
    return map;
}
async function loadPPGCSV(playerIds){
    let rows = ['player_id,ppg'];
    for(const id of playerIds){
        rows.push(`${id},${synthPPG(id).toFixed(2)}`);
    }
    const csv = rows.join('\n');
    const url = 'data:text/csv;charset=utf-8,'+encodeURIComponent(csv);
    const text = await fetchText(url);
    const data = parseCSV(text);
    const map = new Map();
    data.forEach(r=> map.set(r.player_id, +r.ppg||0));
    return map;
}

async function loadLeague(leagueId){
    $('#emptyState').classList.add('hidden');
    $('#status').textContent = 'Loading league...';
    try{
        const [league, users, rosters] = await Promise.all([
            fetchJSON(`${API}/league/${leagueId}`),
            fetchJSON(`${API}/league/${leagueId}/users`),
            fetchJSON(`${API}/league/${leagueId}/rosters`)
        ]);
        STATE.league = league;
        STATE.users = users;
        STATE.rosters = rosters.map(r=>({...r, players: [...new Set(r.players||[])] })); // dedupe
        STATE.season = parseInt(league.season) || new Date().getFullYear();

        $('#metaBar').classList.remove('hidden');
        $('#leagueName').textContent = league.name;
        $('#teamCount').textContent = `${rosters.length} teams`;
        $('#season').textContent = `Season ${STATE.season}`;

        $('#status').textContent = 'Loading players...';
        // fetch players (large). Cache in STATE.
        if(!Object.keys(STATE.players).length){
            const players = await fetchJSON(`${API}/players/nfl`);
            STATE.players = players;
        }

        // collect all player ids
        const allIds = new Set();
        STATE.rosters.forEach(r=> r.players.forEach(id=> allIds.add(id)));
        const playerIds = [...allIds];

        $('#status').textContent = 'Loading values CSV...';
        STATE.values = await loadValuesCSV(playerIds);

        $('#status').textContent = 'Loading PPG CSV...';
        STATE.ppg = await loadPPGCSV(playerIds);

        $('#status').textContent = 'Computing draft capital...';
        const traded = await fetchJSON(`${API}/league/${leagueId}/traded_picks`).catch(()=>[]);
        const draftMap = computeDraftCapital(traded);

        $('#status').textContent = 'Building teams...';
        STATE.teams = STATE.rosters.map(r => buildTeam(r, draftMap));

        // ranks
        const rankOverall = rankMap(STATE.teams,'overall');
        const rankPPG = rankMap(STATE.teams,'ppg');
        const rankQB = rankMap(STATE.teams,'qb');
        const rankRB = rankMap(STATE.teams,'rb');
        const rankWR = rankMap(STATE.teams,'wr');
        const rankTE = rankMap(STATE.teams,'te');
        const rankDraft = rankMap(STATE.teams,'draft');

        STATE.teams.forEach(t=>{
            t.rankOverall = rankOverall.get(t.roster_id);
            t.rankPPG = rankPPG.get(t.roster_id);
            t.rankQB = rankQB.get(t.roster_id);
            t.rankRB = rankRB.get(t.roster_id);
            t.rankWR = rankWR.get(t.roster_id);
            t.rankTE = rankTE.get(t.roster_id);
            t.rankDraft = rankDraft.get(t.roster_id);
            t.tier = tierFromRank(t.rankOverall, STATE.teams.length);
        });

        sortTeams();
        render();
        $('#status').textContent = `Loaded ${STATE.teams.length} teams. Values & PPG from CSV. Draft capital future-only.`;
    }catch(e){
        console.error(e);
        $('#status').textContent = 'Error: '+e.message;
        $('#emptyState').classList.remove('hidden');
    }
}

function computeDraftCapital(tradedPicks){
    const season = STATE.season;
    const futurePicks = tradedPicks.filter(p=> parseInt(p.season) > season || (parseInt(p.season)===season && false));
    // Also include untraded future picks owned originally? Sleeper traded_picks only includes traded. For simplicity, assume each roster owns its own future picks unless traded away.
    // We'll start with default 3 rounds per future year (next 2 years)
    const map = new Map();
    STATE.rosters.forEach(r=> map.set(r.roster_id, [] ));
    // Add defaults
    for(let yr = season+1; yr <= season+2; yr++){
        STATE.rosters.forEach(r=>{
            for(let rd=1; rd<=3; rd++){
                map.get(r.roster_id).push({season:yr, round:rd, from:r.roster_id, original:r.roster_id});
            }
        });
    }
    // Apply trades: traded picks array has owner_id (roster that owns) and roster_id (original)
    futurePicks.forEach(p=>{
        const owner = p.owner_id;
        // remove from original owner if present
        const origList = map.get(p.roster_id) || [];
        const idx = origList.findIndex(x=> x.season==p.season && x.round==p.round);
        if(idx>-1) origList.splice(idx,1);
        // add to new owner
        if(!map.has(owner)) map.set(owner,[]);
        map.get(owner).push({season:p.season, round:p.round, from:p.roster_id});
    });
    // compute value
    const draftValue = new Map();
    map.forEach((picks,rid)=>{
        const val = picks.reduce((s,pk)=> s + pickValue(pk.round, pk.season - season),0);
        draftValue.set(rid,{picks,val});
    });
    return draftValue;
}
function pickValue(round, yearsOut){
    const base = {1:3000,2:1200,3:500,4:200,5:80}[round]||50;
    const decay = Math.pow(0.85, Math.max(0,yearsOut-1));
    return Math.round(base*decay);
}

function buildTeam(roster, draftMap){
    const players = roster.players || [];
    const posGroups = {QB:[],RB:[],WR:[],TE:[]};
    const playerObjs = players.map(pid=>{
        const pos = posOf(pid);
        const val = STATE.values.get(pid)||0;
        const ppg = STATE.ppg.get(pid)||0;
        const obj = {pid, pos, val, ppg, name:nameOf(pid)};
        if(posGroups[pos]) posGroups[pos].push(obj);
        return obj;
    });

    Object.values(posGroups).forEach(arr=> arr.sort((a,b)=> b.val - a.val));

    const sum = arr => arr.reduce((s,p)=>s+p.val,0);
    const sumPPGTop = (arr,n)=> arr.slice(0,n).reduce((s,p)=>s+p.ppg,0);

    const qb = sum(posGroups.QB);
    const rb = sum(posGroups.RB);
    const wr = sum(posGroups.WR);
    const te = sum(posGroups.TE);
    const overall = qb+rb+wr+te;

    // PPG starters estimate
    const starters = getStartersConfig();
    const optimal = computeOptimalStarters(posGroups, starters);
    const ppg = optimal.reduce((s,p)=>s+p.ppg,0);

    const draftInfo = draftMap.get(roster.roster_id) || {picks:[], val:0};

    return {
        roster_id: roster.roster_id,
        owner_id: roster.owner_id,
        team: teamName(roster),
        overall,
        ppg,
        qb, rb, wr, te,
        draft: draftInfo.val,
        draftPicks: draftInfo.picks.sort((a,b)=> a.season - b.season || a.round - b.round),
        posGroups,
        optimal,
        players: playerObjs.sort((a,b)=> b.val - a.val)
    };
}
function getStartersConfig(){
    const pos = STATE.league.roster_positions || [];
    const counts = {};
    pos.forEach(p=> counts[p]=(counts[p]||0)+1);
    return {
        QB: counts.QB||1,
        RB: counts.RB||2,
        WR: counts.WR||2,
        TE: counts.TE||1,
        FLEX: counts.FLEX||0,
        SUPER_FLEX: counts.SUPER_FLEX||0,
        REC_FLEX: counts.REC_FLEX||0
    };
}
function computeOptimalStarters(groups, cfg){
    const pool = [];
    ['QB','RB','WR','TE'].forEach(pos=>{
        groups[pos].forEach(p=> pool.push({...p, eligible:[pos]}));
    });
    // eligibility for flex
    pool.forEach(p=>{
        if(['RB','WR','TE'].includes(p.pos)) p.eligible.push('FLEX','REC_FLEX');
        if(['QB','RB','WR','TE'].includes(p.pos)) p.eligible.push('SUPER_FLEX');
    });
    const slots = [];
    for(let i=0;i<cfg.QB;i++) slots.push({pos:'QB', need:['QB']});
    for(let i=0;i<cfg.RB;i++) slots.push({pos:'RB', need:['RB']});
    for(let i=0;i<cfg.WR;i++) slots.push({pos:'WR', need:['WR']});
    for(let i=0;i<cfg.TE;i++) slots.push({pos:'TE', need:['TE']});
    for(let i=0;i<cfg.FLEX;i++) slots.push({pos:'FLEX', need:['RB','WR','TE']});
    for(let i=0;i<cfg.REC_FLEX;i++) slots.push({pos:'REC_FLEX', need:['WR','TE']});
    for(let i=0;i<cfg.SUPER_FLEX;i++) slots.push({pos:'SUPER_FLEX', need:['QB','RB','WR','TE']});

    const used = new Set();
    const chosen = [];
    // sort slots by restrictiveness
    slots.sort((a,b)=>a.need.length-b.need.length);
    for(const slot of slots){
        let best = null;
        for(const p of pool){
            if(used.has(p.pid)) continue;
            if(!p.eligible.some(e=> slot.need.includes(e) || slot.pos===p.pos)) continue;
            if(!best || p.val > best.val) best = p;
        }
        if(best){ used.add(best.pid); chosen.push({...best, slot: slot.pos}); }
    }
    return chosen;
}

function sortTeams(){
    const k = STATE.sortKey;
    const dir = STATE.sortDir==='asc'?1:-1;
    STATE.teams.sort((a,b)=>{
        const av = a[k]||0, bv = b[k]||0;
        return (av-bv)*dir;
    });
}
function render(){
    const tbody = $('#tbody');
    tbody.innerHTML = '';
    STATE.teams.forEach(t=>{
        const tr = document.createElement('tr');
        tr.className = 'row-hover cursor-pointer';
        tr.dataset.rid = t.roster_id;
        tr.innerHTML = `
            <td class="pl-4 pr-2 py-3 align-middle">
                <button class="expand-btn ${STATE.expanded===t.roster_id?'open':''}" data-expand="${t.roster_id}">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#E9C46A" stroke-width="2"><path d="m9 18 6-6-6-6"/></svg>
                </button>
            </td>
            <td class="px-5 py-3">
                <div class="flex items-center gap-3">
                    <div class="w-9 h-9 rounded-xl panel-2 grid place-items-center text-[12px] font-bold text-[#E9C46A]">${t.team.slice(0,2).toUpperCase()}</div>
                    <div>
                        <div class="font-semibold leading-tight">${t.team}</div>
                        <div class="text-[11px] uppercase tracking-wider text-[#7a7162]">Roster ${t.roster_id}</div>
                    </div>
                </div>
            </td>
            <td class="px-3 py-3 text-center">
                <span class="tier-badge tier-${t.tier}">${t.tier}</span>
            </td>
            <td class="px-5 py-3 text-right">
                <div class="flex items-center justify-end gap-2">
                    <span class="rank-pill">${t.rankOverall}</span>
                    <span class="value mono text-[14px]">${fmt(t.overall)}</span>
                </div>
            </td>
            <td class="px-5 py-3 text-right">
                <div class="flex items-center justify-end gap-2">
                    <span class="rank-pill gray">${t.rankPPG}</span>
                    <span class="value mono text-[14px]">${fmt1(t.ppg)}</span>
                </div>
            </td>
            <td class="px-5 py-3 text-right">
                <div class="flex items-center justify-end gap-2">
                    <span class="rank-pill gray">${t.rankQB}</span>
                    <span class="value mono text-[14px]">${fmt(t.qb)}</span>
                </div>
            </td>
            <td class="px-5 py-3 text-right">
                <div class="flex items-center justify-end gap-2">
                    <span class="rank-pill gray">${t.rankRB}</span>
                    <span class="value mono text-[14px]">${fmt(t.rb)}</span>
                </div>
            </td>
            <td class="px-5 py-3 text-right">
                <div class="flex items-center justify-end gap-2">
                    <span class="rank-pill gray">${t.rankWR}</span>
                    <span class="value mono text-[14px]">${fmt(t.wr)}</span>
                </div>
            </td>
            <td class="px-5 py-3 text-right">
                <div class="flex items-center justify-end gap-2">
                    <span class="rank-pill gray">${t.rankTE}</span>
                    <span class="value mono text-[14px]">${fmt(t.te)}</span>
                </div>
            </td>
            <td class="px-5 py-3 text-right">
                <div class="flex items-center justify-end gap-2">
                    <span class="rank-pill gray">${t.rankDraft}</span>
                    <span class="value mono text-[14px]">${fmt(t.draft)}</span>
                </div>
            </td>
        `;
        tbody.appendChild(tr);

        if(STATE.expanded===t.roster_id){
            const dtr = document.createElement('tr');
            dtr.innerHTML = `<td colspan="10" class="p-0"><div class="px-4 md:px-8 py-6 bg-[#0a0907] border-t border-[#1f1a14]">
                ${renderExpanded(t)}
            </div></td>`;
            tbody.appendChild(dtr);
        }
    });
}
function renderExpanded(t){
    const starters = t.optimal.map(p=>`
        <span class="chip">
            <span class="pos">${p.slot.replace('_',' ')}</span>
            <span class="font-medium">${p.name}</span>
            <span class="mono text-[#a99f8c] text-[12px]">${fmt(p.val)}</span>
        </span>
    `).join('');
    const posPanel = pos => {
        const arr = t.posGroups[pos]||[];
        if(!arr.length) return `<div class="text-[13px] text-[#6e6659] italic">No players</div>`;
        return arr.map(p=>`
            <div class="flex items-center justify-between py-1.5 px-2 rounded-lg hover:bg-white/5">
                <div class="flex items-center gap-2 min-w-0">
                    <span class="pos-pill ${pos}">${pos}</span>
                    <span class="truncate text-[13.5px]">${p.name}</span>
                </div>
                <div class="flex items-center gap-3 mono text-[12.5px]">
                    <span class="text-[#cbbfae]">${fmt(p.val)}</span>
                    <span class="text-[#8d836f]">${fmt1(p.ppg)}</span>
                </div>
            </div>
        `).join('');
    };
    const picks = t.draftPicks.length ? t.draftPicks.map(p=>`
        <span class="chip !py-1">
            ${p.season} R${p.round}
            ${p.from!==t.roster_id?`<span class="text-[11px] px-1.5 py-0.5 rounded bg-white/5 text-[#a99f8c]">via ${p.from}</span>`:''}
        </span>
    `).join('') : `<span class="text-[13px] text-[#6e6659] italic">No future picks</span>`;

    return `
        <div class="space-y-6">
            <div>
                <div class="text-[11px] uppercase tracking-widest text-[#8d836f] font-semibold mb-2">Optimal Starters</div>
                <div class="flex flex-wrap gap-2">${starters}</div>
            </div>
            <div class="divider"></div>
            <div class="grid md:grid-cols-2 lg:grid-cols-4 gap-6">
                ${['QB','RB','WR','TE'].map(pos=>`
                <div class="panel-2 rounded-2xl p-3">
                    <div class="flex items-center justify-between mb-2 px-1">
                        <div class="text-[13px] font-semibold tracking-wide text-[#e6d9b9]">${pos}</div>
                        <div class="text-[11px] mono text-[#7a7162]">VAL / PPG</div>
                    </div>
                    <div class="space-y-0.5">${posPanel(pos)}</div>
                </div>
                `).join('')}
            </div>
            <div class="divider"></div>
            <div>
                <div class="text-[11px] uppercase tracking-widest text-[#8d836f] font-semibold mb-2">Draft Capital • Future Only</div>
                <div class="flex flex-wrap gap-2">${picks}</div>
            </div>
        </div>
    `;
}

// Events
$('#loadBtn').addEventListener('click', ()=>{
    const id = $('#leagueId').value.trim();
    if(id) loadLeague(id);
});
$('#leagueId').addEventListener('keydown', e=>{
    if(e.key==='Enter') $('#loadBtn').click();
});
document.addEventListener('click', e=>{
    const btn = e.target.closest('[data-expand]');
    if(btn){
        const rid = +btn.dataset.expand;
        STATE.expanded = STATE.expanded===rid ? null : rid;
        render();
        return;
    }
    const tr = e.target.closest('tr[data-rid]');
    if(tr && !e.target.closest('button')){
        const rid = +tr.dataset.rid;
        STATE.expanded = STATE.expanded===rid ? null : rid;
        render();
    }
});
$$('[data-sort]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
        const key = btn.dataset.sort;
        if(STATE.sortKey===key){
            STATE.sortDir = STATE.sortDir==='desc'?'asc':'desc';
        }else{
            STATE.sortKey = key;
            STATE.sortDir = 'desc';
        }
        sortTeams();
        render();
    });
});

// URL param load
window.addEventListener('DOMContentLoaded', ()=>{
    const params = new URLSearchParams(location.search);
    const lid = params.get('league_id');
    if(lid){
        $('#leagueId').value = lid;
        loadLeague(lid);
    }
});
})();
</script>
