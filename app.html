<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Vault – Sleeper League Overview</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root { color-scheme: dark; }
    body { font-family: 'Inter', sans-serif; }
    .scrollbar-thin::-webkit-scrollbar { height: 8px; width: 8px; }
    .scrollbar-thin::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 4px; }
    .glass { backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
  </style>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen antialiased">
  <!-- Header -->
  <header class="sticky top-0 z-40 border-b border-zinc-800 bg-zinc-950/80 glass">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="size-9 rounded-xl bg-gradient-to-br from-amber-400 to-amber-600 flex items-center justify-center shadow-lg shadow-amber-900/30">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" class="text-zinc-950">
            <path d="M12 2l7.5 4.5v9L12 20l-7.5-4.5v-9L12 2z" fill="currentColor" opacity=".9"/>
            <path d="M12 6v12M7.5 8.5l9 7M16.5 8.5l-9 7" stroke="white" stroke-width="1.2" stroke-linecap="round" opacity=".5"/>
          </svg>
        </div>
        <div class="leading-tight">
          <div class="font-extrabold tracking-tight text-lg">The Vault</div>
          <div class="text-xs text-zinc-400 -mt-0.5">Sleeper League Overview</div>
        </div>
      <a href="https://rosteraudit.com" target="_blank" rel="noreferrer" class="text-sm font-medium text-zinc-300 hover:text-amber-400 transition">rosteraudit.com →</a>
    </div>
  </header>

  <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 sm:py-12">
    <!-- Loading State -->
    <div id="loading" class="flex flex-col items-center justify-center py-32 text-center">
      <div class="size-12 rounded-full border-2 border-zinc-800 border-t-amber-500 animate-spin mb-4"></div>
      <p class="text-zinc-400 font-medium">Loading league...</p>
    </div>

    <!-- Error State -->
    <div id="error" class="hidden">
      <div class="max-w-xl mx-auto text-center py-24">
        <div class="inline-flex size-12 items-center justify-center rounded-2xl bg-red-500/10 border border-red-500/20 mb-4">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" class="text-red-400">
            <path d="M12 9v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </div>
        <h2 class="text-2xl font-bold mb-2">Something went wrong</h2>
        <p id="errorMsg" class="text-zinc-400"></p>
        <a href="/" class="mt-6 inline-flex items-center gap-2 px-4 py-2 rounded-xl bg-zinc-900 hover:bg-zinc-800 border border-zinc-800 text-sm font-medium transition">Go back home</a>
      </div>
    </div>

    <!-- Content -->
    <div id="content" class="hidden space-y-10">
      <!-- League Header -->
      <div class="flex flex-col lg:flex-row lg:items-end lg:justify-between gap-6">
        <div>
          <h1 id="leagueTitle" class="text-3xl sm:text-4xl font-extrabold tracking-tight">League</h1>
          <div id="badges" class="flex flex-wrap gap-2 mt-3"></div>
        </div>
        <div class="text-sm text-zinc-500">
          Last updated: <span id="updatedAt" class="text-zinc-300"></span>
        </div>
      </div>

      <!-- Power Rankings -->
      <section class="rounded-2xl border border-zinc-800 bg-zinc-900/50 overflow-hidden">
        <div class="px-5 sm:px-7 py-5 border-b border-zinc-800 flex items-center justify-between">
          <h2 class="text-lg font-bold tracking-tight">Power Rankings</h2>
          <div class="text-xs text-zinc-500">Sorted by Total Value</div>
        </div>
        <div class="overflow-x-auto scrollbar-thin">
          <table class="w-full text-sm">
            <thead class="text-xs uppercase tracking-wider text-zinc-400 bg-zinc-950/50">
              <tr class="[&>th]:text-left [&>th]:font-semibold [&>th]:px-5 [&>th]:py-3 whitespace-nowrap">
                <th>Rank</th>
                <th>Team</th>
                <th>Record</th>
                <th class="text-right">Total Value</th>
                <th class="text-right">Starter Value</th>
                <th class="text-right">Bench Value</th>
                <th class="text-right">Avg Age</th>
                <th class="text-right">PPG</th>
              </tr>
            </thead>
            <tbody id="powerRankings" class="divide-y divide-zinc-800/80"></tbody>
          </table>
        </div>
      </section>

      <!-- Team Cards -->
      <section>
        <h2 class="text-lg font-bold tracking-tight mb-4 px-1">Teams</h2>
        <div id="teamGrid" class="grid grid-cols-1 xl:grid-cols-2 gap-6"></div>
      </section>
    </div>
  </main>

  <footer class="border-t border-zinc-900 py-8 text-center text-xs text-zinc-600">
    Built for The Vault · Data via Sleeper & RosterAudit
  </footer>

  <script>
    const $ = (s, p=document) => p.querySelector(s);
    const esc = (s) => String(s ?? '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
    const fmtNum = (n) => new Intl.NumberFormat().format(Math.round(n || 0));
    const fmt1 = (n) => (n||0).toFixed(1);
    const posOrder = ['QB','RB','WR','TE','K','DEF'];
    const posIndex = p => { const i = posOrder.indexOf(p); return i === -1 ? 99 : i; };

    function normalizeName(n){ return String(n||'').toLowerCase().replace(/[^a-z0-9]+/g,''); }

    async function init(){
      const loading = $('#loading');
      const error = $('#error');
      const content = $('#content');
      const errorMsg = $('#errorMsg');

      try {
        const params = new URLSearchParams(location.search);
        let leagueId = params.get('league_id') || localStorage.getItem('vault_league_id') || '';
        if (leagueId) localStorage.setItem('vault_league_id', leagueId);
        if (!leagueId) throw new Error('No league selected. Go back home.');

        // Fetch league first to determine format
        const leagueRes = await fetch(`https://api.sleeper.app/v1/league/${leagueId}`);
        if (!leagueRes.ok) throw new Error('League not found.');
        const league = await leagueRes.json();

        const isSuperFlex = (league.roster_positions || []).includes('SUPER_FLEX');
        const format = isSuperFlex ? 'sf' : '1qb';

        // Parallel fetches
        const [rostersRes, usersRes, playersRes] = await Promise.all([
          fetch(`https://api.sleeper.app/v1/league/${leagueId}/rosters`),
          fetch(`https://api.sleeper.app/v1/league/${leagueId}/users`),
          fetch(`https://api.sleeper.app/v1/players/nfl`)
        ]);

        const [rosters, users, players] = await Promise.all([
          rostersRes.json(),
          usersRes.json(),
          playersRes.json()
        ]);

        // Rankings (optional)
        let rankings = [];
        let ppgMap = new Map();
        try {
          const raUrl = `https://rosteraudit.com/wp-json/ra/v1/rankings?format_key=${format}&per_page=500`;
          const proxies = [
            `https://api.allorigins.win/raw?url=${encodeURIComponent(raUrl)}`,
            `https://corsproxy.io/?${encodeURIComponent(raUrl)}`
          ];
          for (const proxyUrl of proxies) {
            try {
              const rankRes = await fetch(proxyUrl);
              if (rankRes.ok) {
                const data = await rankRes.json();
                if (Array.isArray(data)) { rankings = data; break; }
                else if (Array.isArray(data?.data)) { rankings = data.data; break; }
                else if (Array.isArray(data?.rankings)) { rankings = data.rankings; break; }
              }
            } catch(e) {}
          }
        } catch (e) { console.warn('Rankings fetch failed', e); }

        try {
          const ppgUrl = `https://rosteraudit.com/wp-json/ra/v1/projections/ppg-rankings`;
          const ppgProxies = [
            `https://api.allorigins.win/raw?url=${encodeURIComponent(ppgUrl)}`,
            `https://corsproxy.io/?${encodeURIComponent(ppgUrl)}`
          ];
          for (const ppgProxy of ppgProxies) {
            try {
              const ppgRes = await fetch(ppgProxy);
              if (ppgRes.ok) {
                const ppgData = await ppgRes.json();
                const arr = Array.isArray(ppgData) ? ppgData : (Array.isArray(ppgData?.data) ? ppgData.data : []);
                for (const p of arr) {
                  const id = String(p.sleeper_id || p.player_id || p.id || '');
                  if (id) ppgMap.set(id, Number(p.ppg || p.value || 0));
                }
                if (arr.length) break;
              }
            } catch(e) {}
          }
        } catch {}

        // Maps
        const userMap = Object.fromEntries(users.map(u => [u.user_id, u]));
        const rankById = new Map();
        const rankByName = new Map();
        for (const r of rankings) {
          const id = String(r.sleeper_id || r.player_id || r.id || '');
          if (id) rankById.set(id, r);
          const name = r.name || `${r.first_name || ''} ${r.last_name || ''}`.trim();
          if (name) rankByName.set(normalizeName(name), r);
        }

        function getPlayerInfo(pid){
          const p = players[pid] || {};
          const name = p.full_name || (p.first_name && p.last_name ? `${p.first_name} ${p.last_name}`.trim() : (p.full_name || 'Unknown'));
          const pos = p.position || p.fantasy_positions?.[0] || '';
          const team = p.team || '';
          const age = p.age || 0;

          let r = rankById.get(String(pid));
          if (!r) r = rankByName.get(normalizeName(name));
          const value = Number( (format === 'sf' ? (r?.val_sf ?? r?.sf_value ?? r?.value_sf ?? r?.value) : (r?.val_1qb ?? r?.oneqb_value ?? r?.value_1qb ?? r?.value)) || 0 );
          const ppg = Number( ppgMap.get(String(pid)) ?? r?.ppg ?? 0 );
          return {
            id: pid,
            name,
            pos,
            team,
            age,
            value,
            ppg
          };
        }

        // Process rosters
        const teams = rosters.map(r => {
          const owner = userMap[r.owner_id] || {};
          const starters = (r.starters || []).filter(Boolean);
          const taxi = new Set(r.taxi || []);
          const reserve = new Set(r.reserve || []);
          const allPids = (r.players || []).filter(Boolean);
          const benchPids = allPids.filter(pid => !starters.includes(pid) && !taxi.has(pid) && !reserve.has(pid));

          const starterInfos = starters.map(getPlayerInfo);
          const benchInfos = benchPids.map(getPlayerInfo);

          const starterValue = starterInfos.reduce((s,i)=>s+i.value,0);
          const benchValue = benchInfos.reduce((s,i)=>s+i.value,0);
          const totalValue = starterValue + benchValue;
          const starterAges = starterInfos.map(i=>i.age).filter(a=>a>0);
          const avgAge = starterAges.length ? starterAges.reduce((a,b)=>a+b,0)/starterAges.length : 0;
          const ppg = starterInfos.reduce((s,i)=>s+i.ppg,0);

          const wins = r.settings?.wins ?? 0;
          const losses = r.settings?.losses ?? 0;
          const ties = r.settings?.ties ?? 0;
          const record = `${wins}-${losses}${ties?`-${ties}`:''}`;

          const allInfos = [...starterInfos.map(i=>({...i,isStarter:true})), ...benchInfos.map(i=>({...i,isStarter:false}))];
          allInfos.sort((a,b)=>{
            const pd = posIndex(a.pos) - posIndex(b.pos);
            if (pd !== 0) return pd;
            return b.value - a.value;
          });

          return {
            roster_id: r.roster_id,
            owner_name: owner.display_name || owner.metadata?.team_name || 'Unknown Owner',
            avatar: owner.avatar,
            record,
            wins,
            starterValue,
            benchValue,
            totalValue,
            avgAge,
            ppg,
            players: allInfos
          };
        });

        teams.sort((a,b)=> b.totalValue - a.totalValue);

        // Compute positional ranks
        const rankMap = (key) => {
          const sorted = [...teams].sort((a,b)=> (b[key]||0) - (a[key]||0));
          const map = new Map();
          sorted.forEach((t,i)=> map.set(t.roster_id, i+1));
          return map;
        };
        const qbRankMap = rankMap('qbValue');
        const rbRankMap = rankMap('rbValue');
        const wrRankMap = rankMap('wrValue');
        const teRankMap = rankMap('teValue');
        const pkRankMap = rankMap('picksValue');
        teams.forEach(t => {
          t.qbRank = qbRankMap.get(t.roster_id);
          t.rbRank = rbRankMap.get(t.roster_id);
          t.wrRank = wrRankMap.get(t.roster_id);
          t.teRank = teRankMap.get(t.roster_id);
          t.pkRank = pkRankMap.get(t.roster_id);
        });


        // Render header
        $('#leagueTitle').textContent = league.name || 'League';
        const badges = $('#badges');
        badges.innerHTML = '';
        const badge = (txt) => `<span class="inline-flex items-center px-2.5 py-1 rounded-full text-xs font-semibold bg-zinc-800 border border-zinc-700 text-zinc-200">${esc(txt)}</span>`;
        badges.innerHTML += badge(isSuperFlex ? 'SuperFlex' : '1QB');
        const rec = league.scoring_settings?.rec ?? 0;
        badges.innerHTML += badge(rec >= 1 ? 'Full PPR' : rec >= 0.5 ? 'Half PPR' : 'Standard');
        const tePrem = (league.scoring_settings?.bonus_rec_te || league.scoring_settings?.rec_te > rec) ? 'TE Premium' : null;
        if (tePrem) badges.innerHTML += badge(tePrem);
        badges.innerHTML += badge(`${league.total_rosters || teams.length} Teams`);

        // Power Rankings
        const pr = $('#powerRankings');
        pr.innerHTML = teams.map((t,i)=>`
          <tr class="hover:bg-zinc-800/40 transition">
            <td class="px-5 py-3 font-mono text-zinc-500">${i+1}</td>
            <td class="px-5 py-3 font-medium">${esc(t.owner_name)} <span class="text-zinc-600">·</span> <span class="text-zinc-500">R${t.roster_id}</span></td>
            <td class="px-5 py-3 font-mono text-zinc-400">${esc(t.record)}</td>
            <td class="px-5 py-3 text-right font-semibold text-amber-400">${fmtNum(t.totalValue)}</td>
            <td class="px-5 py-3 text-right text-zinc-300">${fmtNum(t.starterValue)}</td>
            <td class="px-5 py-3 text-right text-zinc-400">${fmtNum(t.benchValue)}</td>
            <td class="px-5 py-3 text-right font-mono text-zinc-400">${fmt1(t.avgAge)}</td>
            <td class="px-5 py-3 text-right font-mono text-zinc-300">${fmt1(t.ppg)}</td>
          </tr>
        `).join('');

        // Team Cards
        const grid = $('#teamGrid');
        grid.innerHTML = teams.map(t=>`
          <div class="rounded-2xl border border-zinc-800 bg-gradient-to-b from-zinc-900 to-zinc-950 overflow-hidden">
            <div class="px-5 py-4 border-b border-zinc-800 flex items-start justify-between gap-4">
              <div>
                <div class="flex items-center gap-2">
                  <h3 class="font-bold text-lg leading-tight">${esc(t.owner_name)}</h3>
                  <span class="text-xs px-1.5 py-0.5 rounded bg-zinc-800 border border-zinc-700 text-zinc-400">R${t.roster_id}</span>
                </div>
                <div class="text-xs text-zinc-500 mt-0.5">${esc(t.record)} · Avg Age ${fmt1(t.avgAge)} · PPG ${fmt1(t.ppg)}</div>
              </div>
              <div class="text-right">
                <div class="text-2xl font-extrabold text-amber-400 leading-none">${fmtNum(t.totalValue)}</div>
                <div class="text-[10px] uppercase tracking-wider text-zinc-500 mt-0.5">Total Value</div>
              </div>
            </div>
            <div class="overflow-x-auto">
              <table class="w-full text-sm">
                <thead class="text-[11px] uppercase tracking-wider text-zinc-500 bg-zinc-950/60">
                  <tr class="[&>th]:px-5 [&>th]:py-2 [&>th]:font-semibold [&>th]:text-left whitespace-nowrap">
                    <th>Player</th>
                    <th>Pos</th>
                    <th>Team</th>
                    <th class="text-right">Value</th>
                    <th class="text-right">PPG</th>
                  </tr>
                </thead>
                <tbody class="divide-y divide-zinc-800/60">
                  ${t.players.map(p=>`
                    <tr class="hover:bg-zinc-900/60">
                      <td class="px-5 py-2.5">
                        <div class="flex items-center gap-2">
                          <span class="font-medium">${esc(p.name)}</span>
                          ${p.isStarter ? `<span class="text-[10px] px-1.5 py-0.5 rounded bg-amber-500/15 text-amber-300 border border-amber-500/20 font-bold">S</span>` : ''}
                        </div>
                      </td>
                      <td class="px-5 py-2.5 font-mono text-xs text-zinc-400">${esc(p.pos)}</td>
                      <td class="px-5 py-2.5 font-mono text-xs text-zinc-500">${esc(p.team)}</td>
                      <td class="px-5 py-2.5 text-right font-semibold text-amber-400/90">${p.value ? fmtNum(p.value) : '—'}</td>
                      <td class="px-5 py-2.5 text-right font-mono text-zinc-300">${p.ppg ? fmt1(p.ppg) : '—'}</td>
                    </tr>
                  `).join('')}
                </tbody>
              </table>
            </div>
          </div>
        `).join('');

        $('#updatedAt').textContent = new Date().toLocaleString();

        loading.classList.add('hidden');
        error.classList.add('hidden');
        content.classList.remove('hidden');
      } catch (e) {
        console.error(e);
        loading.classList.add('hidden');
        content.classList.add('hidden');
        error.classList.remove('hidden');
        errorMsg.textContent = e.message || 'Failed to load league.';
      }
    }

    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
