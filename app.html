<script>
const VALUES_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRqxhqyuKK6vu_EoYta5FZ_KdOB8M54Q_qBwJKOUF5KcgbTt2dmHn_FuLj9d-FS8-ta5T0zkU0QEGcN/pub?gid=4113168&single=true&output=csv';
const PPG_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRqxhqyuKK6vu_EoYta5FZ_KdOB8M54Q_qBwJKOUF5KcgbTt2dmHn_FuLj9d-FS8-ta5T0zkU0QEGcN/pub?gid=118408869&single=true&output=csv';

const el = {
  body: document.getElementById('teamsBody'),
  loading: document.getElementById('loading'),
  status: document.getElementById('status'),
  statusText: document.getElementById('statusText'),
  leagueId: document.getElementById('leagueId'),
  loadBtn: document.getElementById('loadBtn'),
  leagueName: document.getElementById('leagueName'),
  leagueSize: document.getElementById('leagueSize'),
  leagueMeta: document.getElementById('leagueMeta')
};

function showError(msg){
  el.status.classList.remove('hidden');
  el.statusText.textContent = msg;
}
function hideError(){ el.status.classList.add('hidden'); }

// Robust CSV parser
function parseCSV(text){
  const rows=[];
  let cur='', inQuotes=false, row=[];
  for(let i=0;i<text.length;i++){
    const ch=text[i], nxt=text[i+1];
    if(ch === '"'){
      if(inQuotes && nxt === '"'){cur+='"'; i++;}
      else inQuotes = !inQuotes;
    }else if(ch === ',' && !inQuotes){
      row.push(cur); cur='';
    }else if((ch === '\n' || ch === '\r') && !inQuotes){
      if(cur !== '' || row.length){ row.push(cur); rows.push(row); row=[]; cur='';}
      if(ch === '\r' && nxt === '\n') i++;
    }else{
      cur += ch;
    }
  }
  if(cur !== '' || row.length){ row.push(cur); rows.push(row);}
  // trim
  return rows.map(r=>r.map(c=>c.trim()));
}

function normalizeName(s){
  return s.toLowerCase()
    .replace(/[^a-z0-9]+/g,' ')
    .replace(/\b(jr|sr|ii|iii|iv|v)\b/g,'')
    .trim().replace(/\s+/g,' ');
}

function rankPill(rank){
  const cls = rank===1?'rank-1':rank===2?'rank-2':rank===3?'rank-3':'rank-else';
  return `<span class="inline-flex items-center justify-center w-7 h-7 rounded-full text-xs font-bold pill ${cls}">${rank}</span>`;
}

function tierBadge(tier){
  const map = {
    'Elite':'bg-violet-500/15 text-violet-300 border-violet-500/30',
    'Contender':'bg-cyan-500/15 text-cyan-300 border-cyan-500/30',
    'Middle':'bg-slate-500/15 text-slate-300 border-slate-500/30',
    'Rebuild':'bg-amber-500/15 text-amber-300 border-amber-500/30'
  };
  return `<span class="px-2.5 py-1 rounded-full text-xs font-medium border ${map[tier]||map.Middle}">${tier}</span>`;
}

function avatarUrl(avatar){
  return avatar ? `https://sleepercdn.com/avatars/thumbs/${avatar}` : 'https://sleepercdn.com/images/v2/icons/player_default.webp';
}

function fmtNum(n){
  if(n>=1000) return (n/1000).toFixed(1)+'k';
  return Math.round(n).toString();
}

function computeOptimalPPG(players, slots){
  const eligMap = {
    QB:['QB'],
    RB:['RB'],
    WR:['WR'],
    TE:['TE'],
    FLEX:['RB','WR','TE'],
    SUPER_FLEX:['QB','RB','WR','TE'],
    REC_FLEX:['WR','TE'],
    WRRB_FLEX:['RB','WR']
  };
  const useSlots = slots.filter(s=>!['BN','IR','TAXI',''].includes(s)).map(s=>eligMap[s]||[s]);
  const pls = players.filter(p=>p.ppg>0 && p.pos).slice().sort((a,b)=>b.ppg-a.ppg).slice(0,24);
  if(pls.length===0 || useSlots.length===0) return 0;

  // order slots by restrictiveness
  const order = useSlots.map((e,i)=>({e,i,len:e.length})).sort((a,b)=>a.len-b.len);
  const sorted = order.map(o=>o.e);

  let best=0;
  const used = new Array(pls.length).fill(false);

  function upperBound(idx, sum){
    let remain = sorted.length-idx;
    let ub=sum;
    let cnt=0;
    for(let i=0;i<pls.length && cnt<remain;i++){
      if(!used[i]){ub+=pls[i].ppg;cnt++;}
    }
    return ub;
  }

  function dfs(idx,sum){
    if(idx===sorted.length){ if(sum>best) best=sum; return;}
    if(upperBound(idx,sum)<=best) return;
    const elig=sorted[idx];
    let placed=false;
    for(let i=0;i<pls.length;i++){
      if(used[i]) continue;
      const p=pls[i];
      if(!elig.includes(p.pos)) continue;
      used[i]=true;
      dfs(idx+1,sum+p.ppg);
      used[i]=false;
      placed=true;
    }
    // allow empty slot
    dfs(idx+1,sum);
  }
  dfs(0,0);
  return best;
}

async function fetchText(url){
  const res = await fetch(url);
  if(!res.ok) throw new Error(`Failed ${url}: ${res.status}`);
  return res.text();
}
async function fetchJSON(url){
  const res = await fetch(url);
  if(!res.ok) throw new Error(`Failed ${url}: ${res.status}`);
  return res.json();
}

function buildValuesMap(rows){
  const header = rows[0].map(h=>h.toLowerCase());
  const idx = {
    id: header.findIndex(h=>h.includes('sleeper_id')||h==='id'),
    name: header.findIndex(h=>h==='name'||h.includes('player')),
    pos: header.findIndex(h=>h==='pos'),
    team: header.findIndex(h=>h==='team'),
    age: header.findIndex(h=>h==='age'),
    val: header.findIndex(h=>h.includes('val_sf_ppr_tep05')||h.includes('value'))
  };
  const map = new Map();
  for(let i=1;i<rows.length;i++){
    const r=rows[i];
    if(!r[idx.id]) continue;
    map.set(String(r[idx.id]).trim(),{
      sleeper_id:String(r[idx.id]).trim(),
      name:r[idx.name]||'',
      pos:r[idx.pos]||'',
      team:r[idx.team]||'',
      age:parseFloat(r[idx.age])||0,
      value:parseFloat(r[idx.val])||0
    });
  }
  return map;
}

function buildPPGMap(rows){
  const header = rows[0].map(h=>h.toLowerCase());
  const nameIdx = header.findIndex(h=>h.includes('player')||h==='name');
  const ppgIdx = header.findIndex(h=>h.includes('avg_ppr_0.5_tep')||h.includes('avg_ppr'));
  const map = new Map();
  for(let i=1;i<rows.length;i++){
    const r=rows[i];
    const name = r[nameIdx];
    if(!name) continue;
    const key = normalizeName(name);
    const ppg = parseFloat(r[ppgIdx])||0;
    map.set(key, ppg);
  }
  return map;
}

function computeRanks(teams, key){
  const sorted = [...teams].sort((a,b)=>b[key]-a[key]);
  const rankMap = new Map();
  sorted.forEach((t,i)=>rankMap.set(t.roster_id,i+1));
  return rankMap;
}

function getContenderTier(rank,total){
  const pct = rank/total;
  if(pct<=0.25) return 'Elite';
  if(pct<=0.5) return 'Contender';
  if(pct<=0.75) return 'Middle';
  return 'Rebuild';
}

async function loadLeague(leagueId){
  try{
    hideError();
    el.loading.classList.remove('hidden');
    el.body.innerHTML='';

    const [league, users, rosters, playersDict, valuesCsv, ppgCsv] = await Promise.all([
      fetchJSON(`https://api.sleeper.app/v1/league/${leagueId}`),
      fetchJSON(`https://api.sleeper.app/v1/league/${leagueId}/users`),
      fetchJSON(`https://api.sleeper.app/v1/league/${leagueId}/rosters`),
      fetchJSON(`https://api.sleeper.app/v1/players/nfl`),
      fetchText(VALUES_CSV),
      fetchText(PPG_CSV)
    ]);

    el.leagueName.textContent = league.name || 'League';
    el.leagueSize.textContent = `${rosters.length} teams • ${league.season}`;
    el.leagueMeta.classList.remove('hidden');

    const valuesMap = buildValuesMap(parseCSV(valuesCsv));
    const ppgMap = buildPPGMap(parseCSV(ppgCsv));

    const userMap = new Map(users.map(u=>[u.user_id,u]));

    const rosterPositions = league.roster_positions || [];

    const teams = rosters.map(roster=>{
      const user = userMap.get(roster.owner_id) || {};
      const teamName = user.metadata?.team_name || user.display_name || `Team ${roster.roster_id}`;
      const ownerName = user.display_name || 'Unknown';
      const avatar = user.avatar;

      const playerIds = [...(roster.players||[]),...(roster.taxi||[]),...(roster.reserve||[])];
      const players = playerIds.map(pid=>{
        const pidStr = String(pid);
        const val = valuesMap.get(pidStr);
        const sp = playersDict[pidStr];
        let name,pos,team,age,value;
        if(val){
          name=val.name; pos=val.pos; team=val.team; age=val.age; value=val.value;
        }else if(sp){
          name = [sp.first_name,sp.last_name].filter(Boolean).join(' ');
          pos = sp.position || '';
          team = sp.team || '';
          age = sp.age || 0;
          value = 0;
        }else{
          name='Unknown'; pos=''; team=''; age=0; value=0;
        }
        const ppg = ppgMap.get(normalizeName(name))||0;
        return {id:pidStr,name,pos,team,age,value,ppg};
      });

      const total_value = players.reduce((s,p)=>s+p.value,0);
      const ages = players.filter(p=>p.age>0).map(p=>p.age);
      const avg_age = ages.length? ages.reduce((a,b)=>a+b,0)/ages.length : 0;
      const pos_value = {QB:0,RB:0,WR:0,TE:0};
      players.forEach(p=>{ if(pos_value[p.pos]!==undefined) pos_value[p.pos]+=p.value; });
      const optimal_ppg = computeOptimalPPG(players, rosterPositions);

      return {
        roster_id: roster.roster_id,
        teamName,
        ownerName,
        avatar,
        players,
        total_value,
        avg_age,
        pos_value,
        optimal_ppg
      };
    });

    // ranks
    const overallRankMap = computeRanks(teams,'total_value');
    const qbRankMap = computeRanks(teams.map(t=>({...t,qb:t.pos_value.QB})),'qb');
    const rbRankMap = computeRanks(teams.map(t=>({...t,rb:t.pos_value.RB})),'rb');
    const wrRankMap = computeRanks(teams.map(t=>({...t,wr:t.pos_value.WR})),'wr');
    const teRankMap = computeRanks(teams.map(t=>({...t,te:t.pos_value.TE})),'te');

    teams.forEach(t=>{
      t.overall_rank = overallRankMap.get(t.roster_id);
      t.qb_rank = qbRankMap.get(t.roster_id);
      t.rb_rank = rbRankMap.get(t.roster_id);
      t.wr_rank = wrRankMap.get(t.roster_id);
      t.te_rank = teRankMap.get(t.roster_id);
      t.tier = getContenderTier(t.overall_rank, teams.length);
    });

    // sort by overall rank
    teams.sort((a,b)=>a.overall_rank-b.overall_rank);

    renderTeams(teams);
    el.loading.classList.add('hidden');
  }catch(err){
    console.error(err);
    el.loading.classList.add('hidden');
    showError('Failed to load league data. '+(err.message||''));
  }
}

function renderTeams(teams){
  el.body.innerHTML='';
  teams.forEach(team=>{
    const tr = document.createElement('tr');
    tr.className='row-hover cursor-pointer transition group';
    tr.dataset.roster=team.roster_id;
    tr.innerHTML = `
      <td class="px-4 py-3">
        <div class="flex items-center gap-3">
          <img src="${avatarUrl(team.avatar)}" class="w-10 h-10 rounded-xl bg-slate-800 object-cover border border-slate-700" />
          <div>
            <div class="font-semibold leading-tight group-hover:text-white">${escapeHtml(team.teamName)}</div>
            <div class="text-xs text-slate-400">${escapeHtml(team.ownerName)}</div>
          </div>
        </div>
      </td>
      <td class="px-3 py-3">${tierBadge(team.tier)}</td>
      <td class="px-3 py-3">
        <div class="flex items-center gap-2">
          ${rankPill(team.overall_rank)}
          <div class="text-xs text-slate-400 mono">${fmtNum(team.total_value)}</div>
        </div>
      </td>
      <td class="px-3 py-3 text-right mono text-slate-200">${team.optimal_ppg.toFixed(1)}</td>
      <td class="px-3 py-3 text-center">
        <div class="flex flex-col items-center gap-1">
          ${rankPill(team.qb_rank)}
          <span class="text-[11px] text-slate-500 mono">${fmtNum(team.pos_value.QB)}</span>
        </div>
      </td>
      <td class="px-3 py-3 text-center">
        <div class="flex flex-col items-center gap-1">
          ${rankPill(team.rb_rank)}
          <span class="text-[11px] text-slate-500 mono">${fmtNum(team.pos_value.RB)}</span>
        </div>
      </td>
      <td class="px-3 py-3 text-center">
        <div class="flex flex-col items-center gap-1">
          ${rankPill(team.wr_rank)}
          <span class="text-[11px] text-slate-500 mono">${fmtNum(team.pos_value.WR)}</span>
        </div>
      </td>
      <td class="px-3 py-3 text-center">
        <div class="flex flex-col items-center gap-1">
          ${rankPill(team.te_rank)}
          <span class="text-[11px] text-slate-500 mono">${fmtNum(team.pos_value.TE)}</span>
        </div>
      </td>
      <td class="px-3 py-3 text-center text-slate-500">—</td>
      <td class="px-2 py-3 text-slate-500">
        <svg class="w-4 h-4 transition-transform group-[.open]:rotate-180" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
      </td>
    `;
    const expTr = document.createElement('tr');
    expTr.className='hidden bg-[#0b0d12]';
    expTr.innerHTML = `<td colspan="10" class="p-0 border-t border-slate-800"></td>`;
    const cell = expTr.querySelector('td');
    cell.appendChild(renderExpanded(team));

    tr.addEventListener('click',()=>{
      const open = expTr.classList.toggle('hidden');
      tr.classList.toggle('open', !open);
    });

    el.body.appendChild(tr);
    el.body.appendChild(expTr);
  });
}

function renderExpanded(team){
  const wrap = document.createElement('div');
  wrap.className='p-4 md:p-6 grid grid-cols-1 lg:grid-cols-[320px_1fr] gap-6';

  // Left summary
  const left = document.createElement('div');
  left.className='space-y-4';
  left.innerHTML = `
    <div class="bg-[#151821] border border-slate-800 rounded-2xl p-4">
      <h3 class="text-xs uppercase tracking-widest text-slate-400 mb-3">Summary</h3>
      <div class="grid grid-cols-2 gap-3 text-sm">
        <div class="bg-[#0f1115] rounded-xl p-3 border border-slate-800">
          <div class="text-[11px] text-slate-500 uppercase">Overall Rank</div>
          <div class="text-xl font-bold mono">${team.overall_rank} <span class="text-slate-500 text-base">/ ${fmtNum(team.total_value)}</span></div>
        </div>
        <div class="bg-[#0f1115] rounded-xl p-3 border border-slate-800">
          <div class="text-[11px] text-slate-500 uppercase">Starter PPG</div>
          <div class="text-xl font-bold mono">${team.optimal_ppg.toFixed(1)}</div>
        </div>
        <div class="bg-[#0f1115] rounded-xl p-3 border border-slate-800">
          <div class="text-[11px] text-slate-500 uppercase">Avg Age</div>
          <div class="text-xl font-bold mono">${team.avg_age.toFixed(1)}</div>
        </div>
        <div class="bg-[#0f1115] rounded-xl p-3 border border-slate-800">
          <div class="text-[11px] text-slate-500 uppercase">Players</div>
          <div class="text-xl font-bold mono">${team.players.length}</div>
        </div>
      </div>
    </div>
    <div class="bg-[#151821] border border-slate-800 rounded-2xl p-4">
      <h3 class="text-xs uppercase tracking-widest text-slate-400 mb-2">Team Needs</h3>
      <p class="text-sm text-slate-300">Calculating positional scarcity… (placeholder)</p>
    </div>
    <div class="bg-[#151821] border border-slate-800 rounded-2xl p-4">
      <h3 class="text-xs uppercase tracking-widest text-slate-400 mb-2">Picks</h3>
      <p class="text-sm text-slate-500">No pick data available</p>
    </div>
  `;

  // Right players by position
  const right = document.createElement('div');
  right.className='grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-4';
  ['QB','RB','WR','TE'].forEach(pos=>{
    const col = document.createElement('div');
    col.className='bg-[#151821] border border-slate-800 rounded-2xl overflow-hidden';
    const players = team.players.filter(p=>p.pos===pos).sort((a,b)=>b.value-a.value);
    col.innerHTML = `
      <div class="px-4 py-2.5 border-b border-slate-800 flex items-center justify-between">
        <span class="font-semibold text-sm tracking-wide">${pos}</span>
        <span class="text-xs text-slate-500 mono">${fmtNum(team.pos_value[pos]||0)}</span>
      </div>
      <div class="divide-y divide-slate-800/60 max-h-[360px] overflow-auto">
        ${players.length?players.map(p=>`
          <div class="px-3 py-2 flex items-center justify-between hover:bg-white/[0.02]">
            <div class="min-w-0">
              <div class="text-sm truncate leading-tight">${escapeHtml(p.name)}</div>
              <div class="text-[11px] text-slate-500">${p.team||'FA'} • ${p.age?p.age.toFixed(1):'-'}y</div>
            </div>
            <div class="text-right">
              <div class="text-xs mono text-slate-300">${fmtNum(p.value)}</div>
              <div class="text-[11px] mono text-slate-500">${p.ppg.toFixed(1)}</div>
            </div>
          </div>
        `).join(''):`<div class="px-4 py-6 text-center text-sm text-slate-500">No players</div>`}
      </div>
    `;
    right.appendChild(col);
  });

  wrap.appendChild(left);
  wrap.appendChild(right);
  return wrap;
}

function escapeHtml(s){
  return s.replace(/[&<>"']/g,m=>({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[m]));
}

el.loadBtn.addEventListener('click',()=>loadLeague(el.leagueId.value.trim()));
el.leagueId.addEventListener('keydown',e=>{ if(e.key==='Enter') loadLeague(el.leagueId.value.trim()); });

// Auto load
loadLeague(el.leagueId.value.trim());
</script>
