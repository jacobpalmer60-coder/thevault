<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>THE VAULT • Gold Dynasty</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{color-scheme:dark}
body{font-family:Inter,system-ui;background:#000;overflow-x:hidden}
.display{font-family:Cinzel,serif}
.vault-bg{position:fixed;inset:0;z-index:-1;background:#000}
.vault-bg::before{content:"";position:absolute;inset:-20%;background:radial-gradient(60% 40% at 50% 0%,rgba(250,204,21,0.18),transparent 60%),radial-gradient(40% 30% at 80% 100%,rgba(218,165,32,0.12),transparent 50%);filter:blur(40px)}
.gold-text{background:linear-gradient(90deg,#fde68a,#facc15,#eab308);-webkit-background-clip:text;background-clip:text;color:transparent}
.card{background:rgba(10,10,10,0.7);backdrop-filter:blur(16px);border:1px solid rgba(250,204,21,0.15);box-shadow:0 0 60px -20px rgba(250,204,21,0.3),inset 0 1px 0 rgba(255,255,255,0.05)}
.rounded-vault{border-radius:28px}
.btn-gold{background:linear-gradient(180deg,rgba(250,204,21,0.15),rgba(161,98,7,0.15));border:1px solid rgba(250,204,21,0.3);border-radius:9999px;transition:all.2s}
.btn-gold:hover{background:linear-gradient(180deg,rgba(250,204,21,0.25),rgba(161,98,7,0.25));box-shadow:0 0 20px rgba(250,204,21,0.2)}
th{font-weight:500;letter-spacing:.08em}
tr:hover td{background:rgba(250,204,21,0.04)}
</style>
</head>
<body class="text-amber-50 antialiased">
<div class="vault-bg"></div>

<header class="sticky top-0 z-30 border-b border-amber-500/10 bg-black/70 backdrop-blur-xl">
  <div class="max-w-[1500px] mx-auto px-6 py-5 flex items-center justify-between">
    <div class="flex items-center gap-4">
      <div class="size-12 rounded-full bg-gradient-to-br from-amber-300 to-yellow-600 p-[1.5px] shadow-[0_0_30px_rgba(250,204,21,0.3)]">
        <div class="size-full rounded-full bg-black grid place-items-center">
          <span class="display text-2xl gold-text">V</span>
        </div>
      </div>
      <div>
        <h1 class="display text-[28px] leading-none gold-text tracking-wide">THE VAULT</h1>
        <p class="text-[10px] uppercase tracking-[0.25em] text-amber-200/50 mt-1">GOLD STANDARD</p>
      </div>
    <button id="refresh" class="btn-gold px-5 py-2.5 text-sm text-amber-100">Refresh Data</button>
  </div>
</header>

<main class="max-w-[1500px] mx-auto px-6 py-10">
  <div id="status" class="mb-8 flex items-center gap-3 text-amber-200/70 text-sm">
    <div class="size-2 rounded-full bg-amber-400 animate-pulse shadow-[0_0_10px_rgba(250,204,21,0.8)]"></div>
    <span>Syncing league...</span>
  </div>

  <div class="card rounded-vault overflow-hidden">
    <div class="overflow-x-auto">
      <table class="w-full text-[13px]">
        <thead class="bg-black/60 border-b border-amber-500/10">
          <tr class="text-[11px] uppercase text-amber-200/60">
            <th class="text-left px-6 py-4 rounded-tl-[28px]">Rank</th>
            <th class="text-left px-6 py-4">Team</th>
            <th class="text-right px-4 py-4">Total</th>
            <th class="text-right px-4 py-4">QB</th>
            <th class="text-right px-4 py-4">RB</th>
            <th class="text-right px-4 py-4">WR</th>
            <th class="text-right px-4 py-4">TE</th>
            <th class="text-right px-4 py-4">Picks</th>
            <th class="text-right px-4 py-4">Age</th>
            <th class="text-right px-4 py-4">Opt PPG</th>
            <th class="text-right px-4 py-4">Prod</th>
            <th class="text-right px-6 py-4 rounded-tr-[28px]">—</th>
          </tr>
        </thead>
        <tbody id="tbody" class="divide-y divide-amber-500/[0.06]"></tbody>
      </table>
    </div>
  </div>
</main>

<script>
const LEAGUE_ID='1313454100225990656';const VALUES_URL='https://docs.google.com/spreadsheets/d/e/2PACX-1vRqxhqyuKK6vu_EoYta5FZ_KdOB8M54Q_qBwJKOUF5KcgbTt2dmHn_FuLj9d-FS8-ta5T0zkU0QEGcN/pub?gid=4113168&single=true&output=csv';const PPG_URL='https://docs.google.com/spreadsheets/d/e/2PACX-1vRqxhqyuKK6vu_EoYta5FZ_KdOB8M54Q_qBwJKOUF5KcgbTt2dmHn_FuLj9d-FS8-ta5T0zkU0QEGcN/pub?gid=118408869&single=true&output=csv';const PICKS_URL='https://docs.google.com/spreadsheets/d/e/2PACX-1vRqxhqyuKK6vu_EoYta5FZ_KdOB8M54Q_qBwJKOUF5KcgbTt2dmHn_FuLj9d-FS8-ta5T0zkU0QEGcN/pub?gid=972793131&single=true&output=csv';
let teams=[];const norm=s=>String(s||'').toLowerCase().replace(/[^a-z0-9]+/g,'');const clean=v=>parseFloat(String(v||'').replace(/,/g,''))||0;
async function load(){const[league,users,rosters,players,valuesCsv,ppgCsv,traded,picksCsv]=await Promise.all([fetch(`https://api.sleeper.app/v1/league/${LEAGUE_ID}`).then(r=>r.json()),fetch(`https://api.sleeper.app/v1/league/${LEAGUE_ID}/users`).then(r=>r.json()),fetch(`https://api.sleeper.app/v1/league/${LEAGUE_ID}/rosters`).then(r=>r.json()),fetch(`https://api.sleeper.app/v1/players/nfl`).then(r=>r.json()),fetch(VALUES_URL).then(r=>r.text()),fetch(PPG_URL).then(r=>r.text()),fetch(`https://api.sleeper.app/v1/league/${LEAGUE_ID}/traded_picks`).then(r=>r.json()),fetch(PICKS_URL).then(r=>r.text())]);const values=Papa.parse(valuesCsv,{header:true,skipEmptyLines:true}).data;const ppgs=Papa.parse(ppgCsv,{header:true,skipEmptyLines:true}).data;const pickVals=Papa.parse(picksCsv,{header:true,skipEmptyLines:true}).data;const isSF=(league.roster_positions||[]).includes('SUPER_FLEX');const valMap=new Map();values.forEach(r=>{const sid=String(r.sleeper_id||'').trim();if(sid)valMap.set(sid,clean(isSF?r.val_sf_ppr_tep05:r.val_1qb_ppr_tep05));});const ppgMap=new Map();ppgs.forEach(r=>{const n=r.Player||r.player||'';if(n)ppgMap.set(norm(n),parseFloat(r['Avg_PPR_0.5_TEP'])||0);});const pickMap=new Map();pickVals.forEach(r=>{if(r.season)pickMap.set(`${r.season}-${r.round}-${(r.slot||'mid').toLowerCase()}`,isSF?clean(r.sf_value):clean(r.qb_value));});const userMap=new Map(users.map(u=>[u.user_id,u]));const slots=(league.roster_positions||[]).filter(s=>!['BN','IR','TAXI'].includes(s));const optimal=plist=>{const pool=[...plist].sort((a,b)=>b.ppg-a.ppg);const used=new Set();let tot=0;for(const slot of slots){let a=[slot];if(slot==='FLEX')a=['RB','WR','TE'];if(slot==='SUPER_FLEX')a=['QB','RB','WR','TE'];const i=pool.findIndex(p=>!used.has(p.id)&&a.includes(p.pos));if(i>=0){tot+=pool[i].ppg;used.add(pool[i].id);pool.splice(i,1);}}return tot;};
const YEARS=[2027,2028,2029],ROUNDS=[1,2,3,4];const pickOwner=new Map();YEARS.forEach(y=>ROUNDS.forEach(r=>rosters.forEach(ro=>pickOwner.set(`${y}-${r}-${ro.roster_id}`,ro.roster_id))));traded.filter(p=>YEARS.includes(+p.season)).forEach(p=>{const to=Number(p.owner_id);if(to&&to!==p.roster_id)pickOwner.set(`${p.season}-${p.round}-${p.roster_id}`,to);});const own=new Map(rosters.map(r=>[r.roster_id,[]]));pickOwner.forEach((o,k)=>{const[s,r,orig]=k.split('-');own.get(o).push({season:+s,round:+r,original:+orig});});
const built=rosters.map(r=>{const u=userMap.get(r.owner_id)||{};const tn=u.metadata?.team_name||u.display_name||'Team';const un=u.username||'';const plist=(r.players||[]).map(pid=>{const p=players[String(pid)]||{};const nm=`${p.first_name||''} ${p.last_name||''}`.trim();return{id:pid,name:nm,pos:p.position||'',age:p.age||0,value:valMap.get(String(pid))||0,ppg:ppgMap.get(norm(nm))||0};});const total=plist.reduce((s,p)=>s+p.value,0);const qb=plist.filter(p=>p.pos==='QB').reduce((s,p)=>s+p.value,0);const rb=plist.filter(p=>p.pos==='RB').reduce((s,p)=>s+p.value,0);const wr=plist.filter(p=>p.pos==='WR').reduce((s,p)=>s+p.value,0);const te=plist.filter(p=>p.pos==='TE').reduce((s,p)=>s+p.value,0);const vAge=plist.filter(p=>p.value>0);const age=vAge.length?vAge.reduce((s,p)=>s+p.value*p.age,0)/vAge.reduce((s,p)=>s+p.value,0):0;const opt=optimal(plist);return{rosterId:r.roster_id,teamName:tn,username:un,total,qb,rb,wr,te,age,opt,picks:own.get(r.roster_id)||[]};});
const avgOpt=built.reduce((s,t)=>s+t.opt,0)/built.length;built.forEach(t=>t.production=avgOpt?t.opt/avgOpt*100:100);const sorted=[...built].sort((a,b)=>b.opt-a.opt);const tier=new Map(sorted.map((t,i)=>[t.rosterId,i<3?'late':i<7?'mid':'early']));built.forEach(t=>{t.picksValue=t.picks.reduce((s,p)=>s+(pickMap.get(`${p.season}-${p.round}-${tier.get(p.original)||'mid'}`)||0),0);});built.sort((a,b)=>b.total-a.total);built.forEach((t,i)=>t.rank=i+1);teams=built;document.getElementById('status').innerHTML=`<div class="size-2 rounded-full bg-amber-400 animate-pulse shadow-[0_0_10px_rgba(250,204,21,0.8)]"></div><span>Live • ${traded.filter(p=>YEARS.includes(+p.season)).length} future picks synced</span>`;render();}
function render(){const tb=document.getElementById('tbody');tb.innerHTML=teams.map((t,i)=>`<tr><td class="px-6 py-4 font-mono text-amber-300/70">${t.rank}</td><td class="px-6 py-4"><div><div class="font-medium text-white">${t.teamName}</div><div class="text-[11px] text-amber-200/40 mt-0.5">@${t.username} • ${t.picks.length} picks</div></div></td><td class="px-4 py-4 text-right font-mono text-white">${Math.round(t.total).toLocaleString()}</td><td class="px-4 py-4 text-right font-mono text-sky-300/80">${Math.round(t.qb).toLocaleString()}</td><td class="px-4 py-4 text-right font-mono text-emerald-300/80">${Math.round(t.rb).toLocaleString()}</td><td class="px-4 py-4 text-right font-mono text-fuchsia-300/80">${Math.round(t.wr).toLocaleString()}</td><td class="px-4 py-4 text-right font-mono text-amber-300/80">${Math.round(t.te).toLocaleString()}</td><td class="px-4 py-4 text-right font-mono text-yellow-200">${Math.round(t.picksValue).toLocaleString()}</td><td class="px-4 py-4 text-right font-mono text-zinc-400">${t.age.toFixed(1)}</td><td class="px-4 py-4 text-right"><span class="inline-flex px-2.5 py-1 rounded-full bg-amber-500/10 border border-amber-500/20 text-amber-200 text-[11px] font-mono">${t.opt.toFixed(1)}</span></td><td class="px-4 py-4 text-right font-mono ${t.production>=100?'text-emerald-400':'text-zinc-500'}">${Math.round(t.production)}</td><td class="px-6 py-4 text-right">—</td></tr>`).join('');}
document.getElementById('refresh').onclick=load;load();
</script>
</body>
</html>
