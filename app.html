<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>THE VAULT • Live Picks + Age/Value/PPG</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{color-scheme:dark}
body{font-family:Inter,system-ui;background:#0a0703}
.display{font-family:Cinzel,serif}
.gold-solid{color:#fde68a}
.gold-border{border-image:linear-gradient(90deg,#a16207,#facc15,#a16207) 1}
.rank-pill{min-width:2.5rem}
tr.team-row{cursor:pointer}
tr.team-row:hover{background:rgba(120,80,20,.12)}
</style>
</head>
<body class="text-amber-50 leading-tight">
<header class="sticky top-0 z-30 border-b border-amber-900/40 bg-black/60">
  <div class="max-w-[1500px] mx-auto px-6 py-4 flex justify-between items-center">
    <div class="flex items-center gap-3"><div class="size-10 rounded-xl bg-gradient-to-br from-amber-400 to-yellow-600 p-[2px]"><div class="size-full rounded-[10px] bg-[#140f06] grid place-items-center"><span class="display text-xl gold-solid">V</span></div></div><h1 class="display text-2xl font-bold gold-solid">THE VAULT</h1></div>
    <button id="refresh" class="px-4 py-2 rounded-xl bg-amber-500/10 border border-amber-700/50 text-amber-200 text-sm">Refresh</button>
  </div>
</header>

<main class="max-w-[1500px] mx-auto px-6 py-8">
  <div id="status" class="mb-4 flex items-center gap-2 text-amber-200/80 text-sm"><div class="size-2 rounded-full bg-amber-400 animate-pulse"></div><span>Loading…</span></div>
  <div class="overflow-hidden rounded-2xl border gold-border bg-[#110c05]/80">
    <div class="overflow-x-auto">
      <table class="w-full text-[13px]">
        <thead class="bg-[#1a1307]/90 sticky top-0 border-b border-amber-900/50">
          <tr class="text-[11px] uppercase tracking-widest text-amber-200/70">
            <th class="px-3 w-8"></th>
            <th class="px-3 text-left">Team</th>
            <th class="px-2 text-right" data-sort="prodDelta">Prod</th>
            <th class="px-2 text-right" data-sort="longDelta">Long</th>
            <th class="px-2 text-right" data-sort="total">Total</th>
            <th class="px-2 text-right" data-sort="qb">QB</th>
            <th class="px-2 text-right" data-sort="rb">RB</th>
            <th class="px-2 text-right" data-sort="wr">WR</th>
            <th class="px-2 text-right" data-sort="te">TE</th>
            <th class="px-2 text-right" data-sort="picksValue">Picks</th>
            <th class="px-2 text-right" data-sort="age">Age</th>
            <th class="px-2 text-right" data-sort="opt">Opt</th>
            <th class="px-3 text-left">Archetype</th>
          </tr>
        </thead>
        <tbody id="tbody" class="divide-y divide-amber-950/60"></tbody>
      </table>
    </div>
  </div>
</main>

<script>
const LEAGUE_ID = '1313454100225990656';
const VALUES_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRqxhqyuKK6vu_EoYta5FZ_KdOB8M54Q_qBwJKOUF5KcgbTt2dmHn_FuLj9d-FS8-ta5T0zkU0QEGcN/pub?gid=4113168&single=true&output=csv';
const PPG_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRqxhqyuKK6vu_EoYta5FZ_KdOB8M54Q_qBwJKOUF5KcgbTt2dmHn_FuLj9d-FS8-ta5T0zkU0QEGcN/pub?gid=118408869&single=true&output=csv';
const PICK_VALUES_URL = 'REPLACE_WITH_YOUR_PICKS_TAB_CSV';

let teams=[], sort={key:'total',dir:-1}, expanded=new Set();
const norm=s=>String(s||'').toLowerCase().replace(/[^a-z0-9]+/g,'');
function rankClass(r,t){if(r===1)return'bg-amber-400/25 text-amber-100 border-amber-400/70';const p=r/t;return p<=.25?'bg-emerald-600/25 text-emerald-200 border-emerald-700':p<=.5?'bg-sky-600/25 text-sky-200 border-sky-700':p<=.75?'bg-amber-700/25 text-amber-200 border-amber-800':'bg-rose-700/30 text-rose-200 border-rose-800'}
function archetype(t){const{valP,ppgP,age,bal}=t;if(valP>=75&&ppgP>=75&&age>=24&&age<=27.5)return['Elite Contender','from-amber-500/20 to-yellow-500/20 text-amber-200 border-amber-600/40'];if(ppgP>=70&&age>=27.5)return['Aging Contender','from-orange-500/20 to-amber-600/20 text-orange-200 border-orange-600/40'];if(ppgP>=60&&ppgP<75&&age>=26)return['Win-Now Fringe','from-amber-600/20 to-yellow-700/20 text-amber-300 border-amber-700/40'];if(age<25.5&&valP>=45&&ppgP>=40&&ppgP<65)return['Young Riser','from-emerald-600/20 to-teal-600/20 text-emerald-200 border-emerald-600/40'];if(ppgP<40&&age<26&&valP>=35)return['Pick-Rich Rebuilder','from-sky-600/20 to-cyan-600/20 text-sky-200 border-sky-600/40'];if(bal>=70)return['Balanced Core','from-zinc-600/20 to-neutral-600/20 text-zinc-200 border-zinc-600/40'];return['Stuck in Middle','from-zinc-700/20 to-zinc-800/20 text-zinc-300 border-zinc-700/40']}

async function load(){
  const [lg,users,rosters,players,vCsv,pCsv,traded,drafts]=await Promise.all([
    fetch(`https://api.sleeper.app/v1/league/${LEAGUE_ID}`).then(r=>r.json()),
    fetch(`https://api.sleeper.app/v1/league/${LEAGUE_ID}/users`).then(r=>r.json()),
    fetch(`https://api.sleeper.app/v1/league/${LEAGUE_ID}/rosters`).then(r=>r.json()),
    fetch(`https://api.sleeper.app/v1/players/nfl`).then(r=>r.json()),
    fetch(VALUES_URL).then(r=>r.text()),
    fetch(PPG_URL).then(r=>r.text()),
    fetch(`https://api.sleeper.app/v1/league/${LEAGUE_ID}/traded_picks`).then(r=>r.json()),
    fetch(`https://api.sleeper.app/v1/league/${LEAGUE_ID}/drafts`).then(r=>r.json())
  ]);

  const lastDraftYear = drafts.length? Math.max(...drafts.map(d=>Number(d.season)||0)) : new Date().getFullYear();
  const SEASONS = [lastDraftYear+1, lastDraftYear+2, lastDraftYear+3];
  const ROUNDS = [1,2,3,4];

  const valMap=new Map(); Papa.parse(vCsv,{header:true,skipEmptyLines:true}).data.forEach(r=>{if(r.sleeper_id)valMap.set(String(r.sleeper_id),+r.val_sf_ppr_tep05||0)});
  const ppgMap=new Map(); Papa.parse(pCsv,{header:true,skipEmptyLines:true}).data.forEach(r=>{const n=r.Player||r.player;if(n)ppgMap.set(norm(n),+r['Avg_PPR_0.5_TEP']||0)});

  const userMap=new Map(users.map(u=>[u.user_id,u]));
  const rosterByUser=new Map(rosters.map(r=>[r.owner_id,r.roster_id]));
  const slots=(lg.roster_positions||[]).filter(s=>!['BN','IR','TAXI'].includes(s));

  function optimal(list){const pool=[...list].sort((a,b)=>b.ppg-a.ppg);let tot=0;const used=new Set();for(const s of slots){let allow=[s];if(s==='FLEX')allow=['RB','WR','TE'];if(s==='SUPER_FLEX')allow=['QB','RB','WR','TE'];if(s==='WRRB_FLEX')allow=['RB','WR'];if(s==='REC_FLEX')allow=['WR','TE'];const i=pool.findIndex(p=>!used.has(p.id)&&allow.includes(p.pos));if(i>=0){used.add(pool[i].id);tot+=pool[i].ppg;pool.splice(i,1)}}return tot}

  const built=rosters.map(r=>{
    const u=userMap.get(r.owner_id)||{};
    const plist=(r.players||[]).map(pid=>{const p=players[String(pid)]||{};const name=`${p.first_name||''} ${p.last_name||''}`.trim()||p.full_name||'';return{id:String(pid),name,pos:p.position||'',age:p.age||0,value:valMap.get(String(pid))||0,ppg:ppgMap.get(norm(name))||0,team:p.team||''}});
    const total=plist.reduce((s,p)=>s+p.value,0);
    const qb=plist.filter(p=>p.pos==='QB').reduce((s,p)=>s+p.value,0);
    const rb=plist.filter(p=>p.pos==='RB').reduce((s,p)=>s+p.value,0);
    const wr=plist.filter(p=>p.pos==='WR').reduce((s,p)=>s+p.value,0);
    const te=plist.filter(p=>p.pos==='TE').reduce((s,p)=>s+p.value,0);
    const vAge=plist.filter(p=>p.value>0&&p.age>0);const sumV=vAge.reduce((s,p)=>s+p.value,0);const age=sumV?vAge.reduce((s,p)=>s+p.value*p.age,0)/sumV:0;
    const opt=optimal(plist);
    return{rosterId:r.roster_id,teamName:u.metadata?.team_name||u.display_name||'Team',username:u.username||'',total,qb,rb,wr,te,age,opt,plist}
  });

  const avgOpt=built.reduce((s,t)=>s+t.opt,0)/built.length;
  built.forEach(t=>{t.prodDelta=(t.opt/avgOpt-1)*100; t.prodPts=t.opt-avgOpt});

  const own=new Map(built.map(t=>[t.rosterId,[]]));
  built.forEach(t=>SEASONS.forEach(s=>ROUNDS.forEach(r=>own.get(t.rosterId).push({season:s,round:r,original:t.rosterId}))));
  traded.forEach(p=>{const nr=rosterByUser.get(p.owner_id);if(!nr)return;const list=own.get(p.roster_id);const i=list.findIndex(x=>x.season==p.season&&x.round==p.round);if(i>=0)list.splice(i,1);own.get(nr).push({season:p.season,round:p.round,original:p.roster_id})});

  const tier=new Map([...built].sort((a,b)=>b.opt-a.opt).map((t,i)=>[t.rosterId,i<4?'late':i<8?'mid':'early']));

  let pickVal=new Map(),fallback=false;
  try{const csv=await fetch(PICK_VALUES_URL).then(r=>r.text());Papa.parse(csv,{header:true,skipEmptyLines:true}).data.forEach(r=>{if(r.season)pickVal.set(`${r.season}-${r.round}-${String(r.tier).toLowerCase()}`,+r.value||0)});if(!pickVal.size)fallback=true}catch(e){fallback=true}
  if(fallback){SEASONS.forEach(s=>[1,2,3,4].forEach(r=>{pickVal.set(`${s}-${r}-early`,r==1?5000:r==2?2000:r==3?800:300);pickVal.set(`${s}-${r}-mid`,r==1?3500:r==2?1400:r==3?560:210);pickVal.set(`${s}-${r}-late`,r==1?2400:r==2?960:r==3?384:144)}))}

  built.forEach(t=>{const ps=own.get(t.rosterId)||[];let sum=0;ps.forEach(p=>{p.tier=tier.get(p.original)||'mid';p.value=pickVal.get(`${p.season}-${p.round}-${p.tier}`)||0;sum+=p.value});t.picks=ps.sort((a,b)=>a.season-b.season||a.round-b.round);t.picksValue=sum;t.capital=t.total+sum;t.cpy=t.capital/Math.max(t.age,1)});

  const avgCpy=built.reduce((s,t)=>s+t.cpy,0)/built.length;
  built.forEach(t=>t.longDelta=(t.cpy/avgCpy-1)*100);

  const vals=built.map(t=>t.total).sort((a,b)=>a-b), opts=built.map(t=>t.opt).sort((a,b)=>a-b);
  built.forEach(t=>{t.valP=vals.indexOf(t.total)/(vals.length-1)*100;t.ppgP=opts.indexOf(t.opt)/(opts.length-1)*100;const sum=t.qb+t.rb+t.wr+t.te||1;const sh=[t.qb,t.rb,t.wr,t.te].map(v=>v/sum);const m=sh.reduce((a,b)=>a+b)/4;const sd=Math.sqrt(sh.reduce((s,x)=>s+(x-m)**2,0)/4);t.bal=100-sd*200;const [l,c]=archetype(t);t.arch=l;t.archCls=c});

  teams=built; render(); document.getElementById('status').innerHTML=`<div class="size-2 rounded-full bg-emerald-400"></div><span>Live • ${teams.length} teams • Picks ${SEASONS[0]}-${SEASONS[2]}${fallback?' (fallback values)':''}</span>`;
}

function rankMap(k,a=false){const s=[...teams].sort((x,y)=>a?x[k]-y[k]:y[k]-x[k]);const m=new Map();s.forEach((t,i)=>m.set(t.rosterId,i+1));return m}
function render(){
  const tb=document.getElementById('tbody');
  const data=[...teams].sort((a,b)=>{const av=a[sort.key],bv=b[sort.key];return sort.dir*(av>bv?1:av<bv?-1:0)});
  const rP=rankMap('prodDelta'),rL=rankMap('longDelta'),rT=rankMap('total'),rQ=rankMap('qb'),rR=rankMap('rb'),rW=rankMap('wr'),rE=rankMap('te'),rK=rankMap('picksValue'),rA=rankMap('age',true),rO=rankMap('opt');
  tb.innerHTML=data.map(t=>{
    const exp=expanded.has(t.rosterId);
    return `<tr class="team-row" data-id="${t.rosterId}">
      <td class="px-2"><svg class="size-3 text-amber-400 ${exp?'rotate-90':''}" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="m9 18 6-6" stroke-width="2"/></svg></td>
      <td class="px-2 py-2"><div class="font-medium">${t.teamName}</div><div class="text-[10px] text-amber-200/60">@${t.username}</div></td>
      <td class="px-1 text-right"><span class="rank-pill mr-1 px-1 py-0.5 rounded border text-[10px] ${rankClass(rP.get(t.rosterId),teams.length)}">#${rP.get(t.rosterId)}</span><span class="${t.prodDelta>=0?'text-emerald-300':'text-rose-300'}">${t.prodDelta>=0?'+':''}${t.prodDelta.toFixed(0)}%</span><div class="text-[9px] text-amber-200/50">(${t.prodPts>=0?'+':''}${t.prodPts.toFixed(1)})</div></td>
      <td class="px-1 text-right"><span class="rank-pill mr-1 px-1 py-0.5 rounded border text-[10px] ${rankClass(rL.get(t.rosterId),teams.length)}">#${rL.get(t.rosterId)}</span><span class="${t.longDelta>=0?'text-emerald-300':'text-rose-300'}">${t.longDelta>=0?'+':''}${t.longDelta.toFixed(0)}%</span></td>
      <td class="px-1 text-right"><span class="rank-pill mr-1 px-1 py-0.5 rounded border text-[10px] ${rankClass(rT.get(t.rosterId),teams.length)}">#${rT.get(t.rosterId)}</span>${Math.round(t.total).toLocaleString()}</td>
      <td class="px-1 text-right text-sky-300">${Math.round(t.qb).toLocaleString()}</td>
      <td class="px-1 text-right text-emerald-300">${Math.round(t.rb).toLocaleString()}</td>
      <td class="px-1 text-right text-fuchsia-300">${Math.round(t.wr).toLocaleString()}</td>
      <td class="px-1 text-right text-amber-300">${Math.round(t.te).toLocaleString()}</td>
      <td class="px-1 text-right"><span class="rank-pill mr-1 px-1 py-0.5 rounded border text-[10px] ${rankClass(rK.get(t.rosterId),teams.length)}">#${rK.get(t.rosterId)}</span>${Math.round(t.picksValue).toLocaleString()}</td>
      <td class="px-1 text-right">${t.age.toFixed(1)}</td>
      <td class="px-1 text-right">${t.opt.toFixed(1)}</td>
      <td class="px-2"><span class="px-2 py-0.5 rounded-full text-[10px] border bg-gradient-to-r ${t.archCls}">${t.arch}</span></td>
    </tr>
    ${exp?`<tr class="bg-[#0b0703]"><td colspan="13" class="p-3">
      <div class="mb-2 text-[11px] uppercase tracking-widest text-amber-200/70">Picks • ${t.picks.length} • ${Math.round(t.picksValue).toLocaleString()} total</div>
      <div class="flex flex-wrap gap-1 mb-3">${t.picks.map(p=>`<span class="px-1.5 py-0.5 rounded bg-amber-950/70 border-amber-800 text-[10px]">${p.season} R${p.round} <span class="opacity-60">${p.tier}</span></span>`).join('')}</div>
      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">${['QB','RB','WR','TE'].map(pos=>{const L=t.plist.filter(p=>p.pos===pos).sort((a,b)=>b.value-a.value);return`<div><div class="text-[10px] uppercase text-amber-200/60 mb-1">${pos} <span class="opacity-50">age • value • ppg</span></div>${L.map(p=>`<div class="flex justify-between text-[11px] py-0.5"><span class="truncate">${p.name}</span><span class="font-mono text-amber-200/80">${p.age? p.age.toFixed(0):'-'} • ${Math.round(p.value).toLocaleString()} • ${p.ppg.toFixed(1)}</span></div>`).join('')||'<div class="text-[10px] italic opacity-50">—</div>'}</div>`}).join('')}</div>
    </td></tr>`:''}`;
  }).join('');
  tb.querySelectorAll('tr.team-row').forEach(r=>r.onclick=()=>{const id=+r.dataset.id;expanded.has(id)?expanded.delete(id):expanded.add(id);render()});
}
document.querySelectorAll('th').forEach(th=>th.onclick=()=>{const k=th.dataset.sort;if(!k)return;if(sort.key===k)sort.dir*=-1;else{sort.key=k;sort.dir=-1}render()});
document.getElementById('refresh').onclick=load; load();
</script>
</body>
</html>
