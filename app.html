<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Sleeper League Overview • Dark Amber Glass</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
:root { color-scheme: dark; }
* { font-family: 'Inter', system-ui, -apple-system, sans-serif; }
.mono { font-family: 'JetBrains Mono', ui-monospace, monospace; }
html,body { background:#050508; }
.glass {
  background: linear-gradient(180deg, rgba(255,183,77,0.08), rgba(0,0,0,0.2));
  backdrop-filter: blur(16px) saturate(140%);
  -webkit-backdrop-filter: blur(16px) saturate(140%);
  border: 1px solid rgba(255,183,77,0.14);
  box-shadow: 0 0 0 1px rgba(255,183,77,0.04) inset, 0 10px 40px rgba(0,0,0,0.5);
}
.glass-strong {
  background: linear-gradient(180deg, rgba(30,20,10,0.9), rgba(10,8,6,0.9));
  backdrop-filter: blur(20px);
  border: 1px solid rgba(255,183,77,0.18);
}
.glow-amber { box-shadow: 0 0 30px rgba(245,158,11,0.15), 0 0 60px rgba(245,158,11,0.08); }
.rank-cell {
  width:36px;height:36px;
  display:flex;align-items:center;justify-content:center;
  border-radius:10px;
  font-weight:700;
  font-size:14px;
  color:white;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.15), 0 4px 12px rgba(0,0,0,0.4);
}
.scrollbar-thin::-webkit-scrollbar{ height:8px; width:8px;}
.scrollbar-thin::-webkit-scrollbar-track{ background:transparent;}
.scrollbar-thin::-webkit-scrollbar-thumb{ background:#3f3f46; border-radius:999px;}
.scrollbar-thin::-webkit-scrollbar-thumb:hover{ background:#52525b;}
table { border-collapse: separate; border-spacing:0; }
th, td { vertical-align: middle; }
thead th {
  position: sticky; top:0; z-index:10;
  background: rgba(20,12,6,0.85);
  backdrop-filter: blur(12px);
}
tbody tr.hoverable:hover { background: rgba(255,183,77,0.06); }
.expand-panel {
  background: linear-gradient(180deg, rgba(255,183,77,0.07), rgba(255,183,77,0.03));
  border:1px solid rgba(255,183,77,0.15);
}
.chip {
  background: rgba(255,183,77,0.08);
  border:1px solid rgba(255,183,77,0.18);
}
.status-pill {
  border-width:1px;
  font-weight:600;
  letter-spacing:.02em;
}
.skeleton {
  background: linear-gradient(90deg, rgba(255,255,255,0.04) 25%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0.04) 75%);
  background-size:200% 100%;
  animation: shimmer 1.5s infinite;
}
@keyframes shimmer {
  0% { background-position:-200% 0; }
  100% { background-position:200% 0; }
}
</style>
</head>
<body class="min-h-screen bg-[#050508] text-amber-100 selection:bg-amber-500/30">
<div class="pointer-events-none fixed inset-0 opacity-[0.06] mix-blend-soft-light" style="background-image: radial-gradient(circle at 1px 1px, white 1px, transparent 0); background-size:24px 24px;"></div>
<div class="pointer-events-none fixed inset-0 bg-gradient-to-b from-amber-900/10 via-transparent to-[#050508]"></div>

<div class="relative z-10 max-w-[1400px] mx-auto p-4 md:p-8">
  <!-- Header -->
  <header class="glass rounded-2xl p-4 md:p-6 mb-6 glow-amber">
    <div class="flex flex-wrap items-start gap-4 justify-between">
      <div class="flex items-center gap-4">
        <div class="w-12 h-12 rounded-xl bg-gradient-to-br from-amber-500 to-orange-600 flex items-center justify-center shadow-lg shadow-amber-900/40">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M12 3l7 4v10l-7 4-7-4V7l7-4z" stroke="white" stroke-width="1.5" stroke-linejoin="round"/></svg>
        </div>
        <div>
          <h1 class="text-2xl md:text-3xl font-bold tracking-tight">League Overview</h1>
          <p class="text-amber-200/70 text-sm">Dark amber glass • SuperFlex locked • Live Sleeper + Sheet</p>
        </div>
      </div>

      <div class="flex flex-wrap items-center gap-2">
        <span id="sfBadge" class="chip px-3 py-1.5 rounded-full text-xs font-semibold text-amber-200 flex items-center gap-1.5">
          <span class="w-2 h-2 rounded-full bg-emerald-400 animate-pulse"></span> SF LOCKED
        </span>
        <button id="refreshBtn" class="chip px-3 py-1.5 rounded-full text-xs font-medium hover:bg-amber-500/15 transition">Refresh</button>
      </div>
    </div>

    <!-- Controls -->
    <div class="mt-5 grid grid-cols-1 lg:grid-cols-12 gap-3">
      <div class="lg:col-span-4 flex gap-2">
        <input id="leagueInput" placeholder="Sleeper League ID" class="w-full px-4 py-2.5 rounded-xl bg-black/40 border border-amber-900/40 focus:outline-none focus:ring-2 focus:ring-amber-500/50 mono text-sm" />
        <button id="loadBtn" class="px-4 py-2.5 rounded-xl bg-amber-600 hover:bg-amber-500 text-black font-semibold text-sm transition shadow-lg shadow-amber-900/30">Load</button>
      </div>
      <div class="lg:col-span-4">
        <div class="relative">
          <input id="searchInput" placeholder="Search team..." class="w-full pl-10 pr-4 py-2.5 rounded-xl bg-black/40 border border-amber-900/40 focus:outline-none focus:ring-2 focus:ring-amber-500/50 text-sm" />
          <svg class="absolute left-3 top-1/2 -translate-y-1/2 opacity-60" width="18" height="18" viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="1.5"/><path d="M20 20l-3.5-3.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        </div>
      <div class="lg:col-span-4 flex flex-wrap gap-2 items-center">
        <div id="slotChips" class="flex flex-wrap gap-1.5"></div>
      </div>
    </div>

    <!-- Summary bar -->
    <div id="summaryBar" class="mt-5 grid grid-cols-2 md:grid-cols-4 lg:grid-cols-7 gap-2 text-[11px] uppercase tracking-wide">
      <!-- populated -->
    </div>
  </header>

  <!-- Table -->
  <main class="glass-strong rounded-2xl overflow-hidden">
    <div class="overflow-x-auto scrollbar-thin">
      <table class="w-full text-sm" style="table-layout: fixed;">
        <colgroup>
          <col style="width:56px">
          <col style="width:280px">
          <col style="width:130px">
          <col style="width:70px">
          <col style="width:70px">
          <col style="width:70px">
          <col style="width:70px">
          <col style="width:70px">
          <col style="width:110px">
          <col style="width:90px">
          <col style="width:90px">
        </colgroup>
        <thead class="text-[11px] uppercase tracking-wider text-amber-200/70">
          <tr class="border-b border-amber-900/30">
            <th rowspan="2" class="text-left pl-4 py-3 font-semibold cursor-pointer" data-sort="rank">#<span class="sort-ind"></span></th>
            <th rowspan="2" class="text-left py-3 font-semibold cursor-pointer" data-sort="team">Team<span class="sort-ind"></span></th>
            <th rowspan="2" class="text-left py-3 font-semibold cursor-pointer" data-sort="status">Status<span class="sort-ind"></span></th>
            <th colspan="5" class="text-center py-2 font-semibold border-l border-r border-amber-900/20">Pos Ranks</th>
            <th rowspan="2" class="text-right pr-3 py-3 font-semibold cursor-pointer" data-sort="total">Total<span class="sort-ind"></span></th>
            <th rowspan="2" class="text-right pr-3 py-3 font-semibold cursor-pointer" data-sort="ppg">PPG<span class="sort-ind"></span></th>
            <th rowspan="2" class="text-right pr-4 py-3 font-semibold cursor-pointer" data-sort="age">Age<span class="sort-ind"></span></th>
          </tr>
          <tr class="border-b border-amber-900/30">
            <th class="text-center py-2 font-medium cursor-pointer border-l border-amber-900/20" data-sort="qb_rank">QB<span class="sort-ind"></span></th>
            <th class="text-center py-2 font-medium cursor-pointer" data-sort="rb_rank">RB<span class="sort-ind"></span></th>
            <th class="text-center py-2 font-medium cursor-pointer" data-sort="wr_rank">WR<span class="sort-ind"></span></th>
            <th class="text-center py-2 font-medium cursor-pointer" data-sort="te_rank">TE<span class="sort-ind"></span></th>
            <th class="text-center py-2 font-medium cursor-pointer border-r border-amber-900/20" data-sort="pk_rank">PK<span class="sort-ind"></span></th>
          </tr>
        </thead>
        <tbody id="tableBody" class="divide-y divide-amber-900/15">
          <!-- rows -->
        </tbody>
      </table>
    </div>
    <div id="emptyState" class="hidden py-24 text-center">
      <div class="text-amber-200/60">Enter a League ID to begin</div>
    </div>
    <div id="loadingState" class="py-24 text-center">
      <div class="inline-flex items-center gap-3 text-amber-200/80">
        <span class="w-5 h-5 border-2 border-amber-500/30 border-t-amber-500 rounded-full animate-spin"></span>
        Loading league...
      </div>
    </div>
  </main>

  <footer class="mt-6 text-center text-[11px] text-amber-200/40">
    Built for Sleeper • Dark amber glass • SF locked
  </footer>
</div>

<script>
(() => {
  const SLEEPER_BASE = 'https://api.sleeper.app/v1';
  const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRZY-Dra8s3j-ocJ7OK6yTs3BFcj-A_WeiIX35u49fg2xA8Y3Pg-nnOHVOnfZGOEAFWrj1EFBOV6qzi/pub?gid=2077026411&single=true&output=csv';

  const leagueInput = document.getElementById('leagueInput');
  const loadBtn = document.getElementById('loadBtn');
  const refreshBtn = document.getElementById('refreshBtn');
  const searchInput = document.getElementById('searchInput');
  const tableBody = document.getElementById('tableBody');
  const slotChips = document.getElementById('slotChips');
  const summaryBar = document.getElementById('summaryBar');
  const loadingState = document.getElementById('loadingState');
  const emptyState = document.getElementById('emptyState');

  let state = {
    leagueId: null,
    league: null,
    rosters: [],
    users: [],
    picks: [],
    playersMap: new Map(),
    valuesMap: new Map(),
    pickValues: new Map(),
    teams: [],
    filtered: [],
    sortKey: 'rank',
    sortDir: 'asc',
    expandedId: null,
    starterSlots: []
  };

  // Utils
  const fmt = (n) => n == null || isNaN(n) ? '-' : Number(n).toLocaleString(undefined, { maximumFractionDigits: 0 });
  const fmt1 = (n) => n == null || isNaN(n) ? '-' : Number(n).toFixed(1);
  const avatarUrl = (id) => id ? `https://sleepercdn.com/avatars/${id}` : 'https://sleepercdn.com/images/v2/icons/player_default.webp';
  const getRankColor = (rank, n) => {
    if (rank === 1) return 'bg-cyan-600';
    if (rank <= 3) return 'bg-emerald-600';
    if (rank <= 6) return 'bg-amber-600';
    if (rank <= 8) return 'bg-orange-600';
    if (rank <= 10) return 'bg-red-600';
    return 'bg-red-800';
  };
  const statusStyle = (s) => {
    const map = {
      'WIN-NOW': 'bg-emerald-600/20 text-emerald-300 border-emerald-500/40',
      'CONTENDER': 'bg-sky-600/20 text-sky-300 border-sky-500/40',
      'REBUILDING': 'bg-red-600/20 text-red-300 border-red-500/40',
      'RISING': 'bg-purple-600/20 text-purple-300 border-purple-500/40',
      'FRINGE': 'bg-amber-600/20 text-amber-300 border-amber-500/40'
    };
    return map[s] || 'bg-zinc-700/20 text-zinc-300 border-zinc-600/40';
  };

  // CSV parse
  function parseCSV(text) {
    const lines = text.trim().split(/\r?\n/);
    const headers = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g, ''));
    const rows = [];
    for (let i = 1; i < lines.length; i++) {
      const line = lines[i];
      if (!line.trim()) continue;
      // naive split, handles quoted commas
      const parts = [];
      let cur = '', inQ = false;
      for (let c of line) {
        if (c === '"') { inQ = !inQ; continue; }
        if (c === ',' && !inQ) { parts.push(cur); cur=''; } else cur += c;
      }
      parts.push(cur);
      const obj = {};
      headers.forEach((h, idx) => obj[h] = parts[idx]?.trim() ?? '');
      rows.push(obj);
    }
    return rows;
  }

  function normalizeKey(s) {
    return s.toLowerCase().replace(/[^a-z0-9]/g,'');
  }

  function buildValueMaps(rows) {
    const map = new Map();
    const pickMap = new Map();
    if (!rows.length) return { map, pickMap };
    const headers = Object.keys(rows[0]);
    const keyNorm = {};
    headers.forEach(h => keyNorm[normalizeKey(h)] = h);
    const get = (row, ...candidates) => {
      for (const c of candidates) {
        const k = keyNorm[normalizeKey(c)];
        if (k && row[k] !== undefined) return row[k];
      }
      return '';
    };
    for (const r of rows) {
      const pid = get(r,'player_id','id','sleeper_id','sleeperid');
      const name = get(r,'player','full_name','name','player_name');
      const pos = (get(r,'pos','position') || '').toUpperCase();
      const team = get(r,'team','nfl_team') || '';
      const value = parseFloat(get(r,'value','dynasty_value','sf_value','superflex','value_dynasty_sf')) || 0;
      const ppg = parseFloat(get(r,'ppg','fantasy_ppg','pts','fppg')) || 0;
      const age = parseFloat(get(r,'age')) || 0;

      const key = (pid || name).toString().toLowerCase();
      if (!key) continue;
      const entry = { pid, name, pos, team, value, ppg, age };
      map.set(key, entry);
      if (pid) map.set(pid.toString().toLowerCase(), entry);

      // picks
      if (pos === 'PICK' || /^\d{4}/.test(pid) || /pick/i.test(name)) {
        // try to extract season and round
        const seasonMatch = (pid + ' ' + name).match(/(20\d{2})/);
        const roundMatch = (pid + ' ' + name).match(/(\d)(?:st|nd|rd|th)?\b/);
        if (seasonMatch && roundMatch) {
          const season = seasonMatch[1];
          const round = roundMatch[1];
          pickMap.set(`${season}_${round}`, value);
          pickMap.set(`${season} ${round}`, value);
        }
      }
    }
    return { map, pickMap };
  }

  async function fetchJSON(url) {
    const res = await fetch(url);
    if (!res.ok) throw new Error('Fetch failed ' + url);
    return res.json();
  }

  async function loadAll(leagueId) {
    state.leagueId = leagueId;
    localStorage.setItem('sleeper_league_id', leagueId);
    loadingState.classList.remove('hidden');
    emptyState.classList.add('hidden');
    tableBody.innerHTML = '';

    try {
      const [league, rosters, users, picks, csvText] = await Promise.all([
        fetchJSON(`${SLEEPER_BASE}/league/${leagueId}`),
        fetchJSON(`${SLEEPER_BASE}/league/${leagueId}/rosters`),
        fetchJSON(`${SLEEPER_BASE}/league/${leagueId}/users`),
        fetchJSON(`${SLEEPER_BASE}/league/${leagueId}/traded_picks`).catch(()=>[]),
        fetch(CSV_URL).then(r=>r.text()).catch(()=> '')
      ]);

      state.league = league;
      state.rosters = rosters;
      state.users = users;
      state.picks = picks;

      // Players map (optional heavy)
      try {
        const players = await fetchJSON(`${SLEEPER_BASE}/players/nfl`);
        state.playersMap = new Map(Object.entries(players));
      } catch { state.playersMap = new Map(); }

      const rows = csvText ? parseCSV(csvText) : [];
      const { map, pickMap } = buildValueMaps(rows);
      state.valuesMap = map;
      state.pickValues = pickMap;

      computeTeams();
      render();
    } catch (e) {
      console.error(e);
      loadingState.innerHTML = `<div class="text-red-400">Failed to load league. Check ID.</div>`;
    }
  }

  function lookupPlayer(pid) {
    const key = pid?.toString().toLowerCase();
    if (!key) return null;
    if (state.valuesMap.has(key)) return state.valuesMap.get(key);
    const p = state.playersMap.get(pid);
    if (p) {
      const name = `${p.first_name || ''} ${p.last_name || ''}`.trim();
      const nameKey = name.toLowerCase();
      if (state.valuesMap.has(nameKey)) {
        return state.valuesMap.get(nameKey);
      }
      return {
        pid,
        name: name || pid,
        pos: p.position || '',
        team: p.team || '',
        value: 0,
        ppg: 0,
        age: parseFloat(p.age) || 0
      };
    }
    return { pid, name: pid, pos:'', team:'', value:0, ppg:0, age:0 };
  }

  function getPickValue(season, round) {
    const k1 = `${season}_${round}`;
    const k2 = `${season} ${round}`;
    if (state.pickValues.has(k1)) return state.pickValues.get(k1);
    if (state.pickValues.has(k2)) return state.pickValues.get(k2);
    // fallback default curve
    const base = [8000,4000,2000,1000,500,250][round-1] || 100;
    const yearDiff = Math.max(0, season - new Date().getFullYear());
    return Math.round(base * Math.pow(0.85, yearDiff));
  }

  function computeOptimalLineup(players, slots) {
    // priority order
    const priority = ['QB','RB','WR','TE','K','DEF','WRRB_FLEX','REC_FLEX','FLEX','SUPER_FLEX','IDP_FLEX'];
    const slotObjs = slots.map(s => ({
      type: s,
      eligible: getEligible(s)
    })).sort((a,b)=> {
      const ia = priority.indexOf(a.type); const ib = priority.indexOf(b.type);
      return (ia===-1?999:ia)-(ib===-1?999:ib);
    });

    const used = new Set();
    const lineup = [];

    // sort players by ppg desc then value
    const sorted = [...players].sort((a,b)=> (b.ppg - a.ppg) || (b.value - a.value));

    for (const slot of slotObjs) {
      let bestIdx = -1;
      let bestScore = -1;
      for (let i=0;i<sorted.length;i++) {
        if (used.has(i)) continue;
        const pl = sorted[i];
        if (!slot.eligible.includes(pl.pos)) continue;
        const score = pl.ppg * 1000 + pl.value;
        if (score > bestScore) { bestScore = score; bestIdx = i; }
      }
      if (bestIdx >=0) {
        used.add(bestIdx);
        lineup.push({ slot: slot.type, player: sorted[bestIdx] });
      } else {
        lineup.push({ slot: slot.type, player: null });
      }
    }
    const totalPPG = lineup.reduce((s,x)=> s + (x.player?.ppg || 0),0);
    return { lineup, totalPPG };
  }

  function getEligible(slot) {
    const map = {
      QB:['QB'],
      RB:['RB'],
      WR:['WR'],
      TE:['TE'],
      K:['K'],
      DEF:['DEF'],
      FLEX:['RB','WR','TE'],
      WRRB_FLEX:['RB','WR'],
      REC_FLEX:['WR','TE'],
      SUPER_FLEX:['QB','RB','WR','TE'],
      IDP_FLEX:['DL','LB','DB']
    };
    return map[slot] || [slot];
  }

  function computeTeams() {
    const league = state.league;
    const starters = (league.roster_positions || []).filter(p => !['BN','IR','TAXI','Taxi'].includes(p));
    state.starterSlots = starters;

    const teams = state.rosters.map(roster => {
      const user = state.users.find(u => u.user_id === roster.owner_id);
      const teamName = user?.metadata?.team_name || user?.display_name || `Team ${roster.roster_id}`;
      const avatar = avatarUrl(user?.avatar);
      const record = `${roster.settings?.wins || 0}-${roster.settings?.losses || 0}${roster.settings?.ties ? `-${roster.settings.ties}` : ''}`;

      const pids = roster.players || [];
      const players = pids.map(pid => {
        const info = lookupPlayer(pid);
        return {
          id: pid,
          name: info.name,
          pos: info.pos,
          team: info.team,
          value: info.value,
          ppg: info.ppg,
          age: info.age
        };
      });

      const posVals = { QB:0, RB:0, WR:0, TE:0, K:0, DEF:0 };
      let totalPlayerValue = 0;
      let ageSum = 0, ageCount = 0;
      for (const pl of players) {
        totalPlayerValue += pl.value;
        if (posVals.hasOwnProperty(pl.pos)) posVals[pl.pos] += pl.value;
        if (pl.age > 0) { ageSum += pl.age; ageCount++; }
      }

      // picks
      const myPicks = state.picks.filter(pk => pk.owner_id === roster.roster_id);
      let picksValue = 0;
      const pickDetails = [];
      for (const pk of myPicks) {
        const val = getPickValue(pk.season, pk.round);
        picksValue += val;
        pickDetails.push({ season: pk.season, round: pk.round, value: val });
      }

      const totalValue = totalPlayerValue + picksValue;
      const avgAge = ageCount ? ageSum / ageCount : 0;

      const { lineup, totalPPG } = computeOptimalLineup(players, starters);

      return {
        roster_id: roster.roster_id,
        teamName,
        avatar,
        record,
        players,
        posVals,
        picksValue,
        pickDetails,
        totalValue,
        totalPlayerValue,
        avgAge,
        optimalPPG: totalPPG,
        lineup,
        qb_rank:0, rb_rank:0, wr_rank:0, te_rank:0, pk_rank:0,
        overall_rank:0,
        status:''
      };
    });

    // ranks
    const n = teams.length;
    const rankPos = (key) => {
      const sorted = [...teams].sort((a,b)=> b.posVals[key] - a.posVals[key]);
      sorted.forEach((t,i)=> t[`${key.toLowerCase()}_rank`] = i+1);
    };
    ['QB','RB','WR','TE','K'].forEach(rankPos);
    // overall
    teams.sort((a,b)=> b.totalValue - a.totalValue);
    teams.forEach((t,i)=> t.overall_rank = i+1);
    // status tier
    // compute value percentile
    teams.forEach(t => {
      const valuePct = n>1 ? 100 * (n - t.overall_rank) / (n-1) : 100;
      t.valuePct = valuePct;
    });
    for (const t of teams) {
      const top20 = t.valuePct >= 80;
      const top40 = t.valuePct >= 60;
      const bottom20 = t.valuePct <= 20;
      const val40_70 = t.valuePct >= 40 && t.valuePct <= 70;
      if (top20 && t.avgAge <= 26.0) t.status = 'WIN-NOW';
      else if (top40) t.status = 'CONTENDER';
      else if (bottom20 || t.avgAge >= 27.5) t.status = 'REBUILDING';
      else if (t.avgAge <= 24.5 && val40_70) t.status = 'RISING';
      else t.status = 'FRINGE';
    }

    // restore order by rank
    teams.sort((a,b)=> a.overall_rank - b.overall_rank);
    state.teams = teams;
  }

  function render() {
    loadingState.classList.add('hidden');
    if (!state.teams.length) {
      emptyState.classList.remove('hidden');
      return;
    }
    emptyState.classList.add('hidden');

    // slot chips
    const counts = {};
    state.starterSlots.forEach(s => counts[s] = (counts[s]||0)+1);
    slotChips.innerHTML = Object.entries(counts).map(([k,v])=> `
      <span class="chip px-2.5 py-1 rounded-full text-[11px] font-medium mono">${v}× ${k.replace('_',' ')}</span>
    `).join('');

    // summary
    const avgTotal = state.teams.reduce((s,t)=>s+t.totalValue,0)/state.teams.length;
    const avgPPG = state.teams.reduce((s,t)=>s+t.optimalPPG,0)/state.teams.length;
    const avgAge = state.teams.reduce((s,t)=>s+t.avgAge,0)/state.teams.length;
    const avgQB = state.teams.reduce((s,t)=>s+t.posVals.QB,0)/state.teams.length;
    summaryBar.innerHTML = `
      <div class="glass rounded-xl px-3 py-2">Avg Total <div class="mono text-amber-100 text-sm">${fmt(avgTotal)}</div></div>
      <div class="glass rounded-xl px-3 py-2">Avg PPG <div class="mono text-amber-100 text-sm">${fmt1(avgPPG)}</div></div>
      <div class="glass rounded-xl px-3 py-2">Avg Age <div class="mono text-amber-100 text-sm">${fmt1(avgAge)}</div></div>
      <div class="glass rounded-xl px-3 py-2">Teams <div class="mono text-amber-100 text-sm">${state.teams.length}</div></div>
      <div class="glass rounded-xl px-3 py-2">Avg QB Val <div class="mono text-amber-100 text-sm">${fmt(avgQB)}</div></div>
      <div class="glass rounded-xl px-3 py-2">Season <div class="mono text-amber-100 text-sm">${state.league.season}</div></div>
      <div class="glass rounded-xl px-3 py-2">SF <div class="mono text-amber-100 text-sm">Locked</div></div>
    `;

    // filter
    const q = searchInput.value.trim().toLowerCase();
    let data = state.teams.filter(t => !q || t.teamName.toLowerCase().includes(q));
    // sort
    data = [...data].sort((a,b)=>{
      const k = state.sortKey;
      let av, bv;
      switch(k){
        case 'rank': av=a.overall_rank; bv=b.overall_rank; break;
        case 'team': av=a.teamName.toLowerCase(); bv=b.teamName.toLowerCase(); break;
        case 'status': av=a.status; bv=b.status; break;
        case 'qb_rank': av=a.qb_rank; bv=b.qb_rank; break;
        case 'rb_rank': av=a.rb_rank; bv=b.rb_rank; break;
        case 'wr_rank': av=a.wr_rank; bv=b.wr_rank; break;
        case 'te_rank': av=a.te_rank; bv=b.te_rank; break;
        case 'pk_rank': av=a.pk_rank; bv=b.pk_rank; break;
        case 'total': av=a.totalValue; bv=b.totalValue; break;
        case 'ppg': av=a.optimalPPG; bv=b.optimalPPG; break;
        case 'age': av=a.avgAge; bv=b.avgAge; break;
        default: av=a.overall_rank; bv=b.overall_rank;
      }
      if (av < bv) return state.sortDir === 'asc' ? -1 : 1;
      if (av > bv) return state.sortDir === 'asc' ? 1 : -1;
      return 0;
    });
    state.filtered = data;

    // render rows
    tableBody.innerHTML = '';
    const n = state.teams.length;
    data.forEach((t, idx) => {
      const tr = document.createElement('tr');
      tr.className = 'hoverable cursor-pointer transition';
      tr.dataset.rosterId = t.roster_id;
      tr.innerHTML = `
        <td class="pl-4 py-3 mono text-amber-300/90">${t.overall_rank}</td>
        <td class="py-3 pr-2">
          <div class="flex items-center gap-3">
            <img src="${t.avatar}" class="w-9 h-9 rounded-lg border-amber-900/40" />
            <div>
              <div class="font-semibold leading-tight">${t.teamName}</div>
              <div class="text-xs text-amber-200/60 mono">${t.record}</div>
            </div>
          </div>
        </td>
        <td class="py-3">
          <span class="status-pill inline-flex px-2.5 py-1 rounded-full text-xs border ${statusStyle(t.status)}">${t.status}</span>
        </td>
        ${['qb_rank','rb_rank','wr_rank','te_rank','pk_rank'].map(k => {
          const rank = t[k];
          const color = getRankColor(rank, n);
          return `<td class="py-3"><div class="flex justify-center"><div class="rank-cell ${color}">${rank}</div></div></td>`;
        }).join('')}
        <td class="py-3 pr-3 text-right mono font-medium">${fmt(t.totalValue)}</td>
        <td class="py-3 pr-3 text-right mono">${fmt1(t.optimalPPG)}</td>
        <td class="py-3 pr-4 text-right mono">${fmt1(t.avgAge)}</td>
      `;
      tr.addEventListener('click', () => toggleExpand(t.roster_id));
      tableBody.appendChild(tr);

      if (state.expandedId === t.roster_id) {
        const expTr = document.createElement('tr');
        expTr.className = 'expand-row';
        expTr.innerHTML = `<td colspan="11" class="p-0"><div class="expand-panel m-3 rounded-xl p-4">${renderExpand(t)}</div></td>`;
        tableBody.appendChild(expTr);
      }
    });

    updateSortIndicators();
  }

  function renderExpand(t) {
    const lineupChips = t.lineup.map(l => {
      const pl = l.player;
      return `<div class="chip rounded-lg px-3 py-2 text-xs">
        <div class="uppercase tracking-wide text-amber-300/70 mono text-[10px]">${l.slot.replace('_',' ')}</div>
        <div class="font-semibold">${pl ? pl.name : '—'}</div>
        <div class="text-amber-200/60 mono">${pl ? `${pl.pos} • ${fmt1(pl.ppg)} PPG` : ''}</div>
      </div>`;
    }).join('');

    const groups = {};
    t.players.forEach(p => {
      const pos = p.pos || 'UNK';
      if (!groups[pos]) groups[pos] = [];
      groups[pos].push(p);
    });
    const posOrder = ['QB','RB','WR','TE','K','DEF'];
    const groupHtml = posOrder.filter(p=>groups[p]).map(pos => {
      const arr = groups[pos].sort((a,b)=> b.value - a.value);
      return `<div>
        <div class="text-[11px] uppercase tracking-wide text-amber-300/70 mb-2">${pos} • ${arr.length}</div>
        <div class="grid sm:grid-cols-2 lg:grid-cols-3 gap-2">
          ${arr.map(p=>`
            <div class="chip rounded-lg p-2.5 flex justify-between items-center">
              <div>
                <div class="font-medium text-sm leading-tight">${p.name}</div>
                <div class="text-[11px] text-amber-200/60 mono">${p.team || '-'} • Age ${p.age?fmt1(p.age):'-'}</div>
              </div>
              <div class="text-right">
                <div class="mono text-sm font-semibold">${fmt(p.value)}</div>
                <div class="text-[11px] text-amber-200/70 mono">${fmt1(p.ppg)} PPG</div>
              </div>
            </div>
          `).join('')}
        </div>
      </div>`;
    }).join('<div class="h-px bg-amber-900/20 my-4"></div>');

    const picksHtml = t.pickDetails.length ? `
      <div class="mt-4">
        <div class="text-[11px] uppercase tracking-wide text-amber-300/70 mb-2">Picks Owned • ${fmt(t.picksValue)}</div>
        <div class="flex flex-wrap gap-2">
          ${t.pickDetails.sort((a,b)=>a.season-b.season||a.round-b.round).map(p=>`
            <span class="chip rounded-full px-2.5 py-1 text-xs mono">${p.season} R${p.round} • ${fmt(p.value)}</span>
          `).join('')}
        </div>
      </div>` : '';

    return `
      <div class="flex flex-wrap items-center justify-between gap-3 mb-4">
        <div class="text-sm font-semibold">Optimal Starters • ${fmt1(t.optimalPPG)} PPG</div>
        <div class="text-xs mono text-amber-200/60">Total Value ${fmt(t.totalValue)} • Players ${fmt(t.totalPlayerValue)} • Picks ${fmt(t.picksValue)}</div>
      </div>
      <div class="grid md:grid-cols-2 lg:grid-cols-4 gap-2 mb-5">${lineupChips}</div>
      ${groupHtml}
      ${picksHtml}
    `;
  }

  function toggleExpand(id) {
    state.expandedId = state.expandedId === id ? null : id;
    render();
  }

  function updateSortIndicators() {
    document.querySelectorAll('th[data-sort]').forEach(th => {
      const ind = th.querySelector('.sort-ind');
      if (!ind) return;
      const key = th.dataset.sort;
      if (key === state.sortKey) {
        ind.textContent = state.sortDir === 'asc' ? ' ▲' : ' ▼';
      } else {
        ind.textContent = '';
      }
    });
  }

  // Events
  document.querySelectorAll('th[data-sort]').forEach(th => {
    th.addEventListener('click', () => {
      const key = th.dataset.sort;
      if (state.sortKey === key) {
        state.sortDir = state.sortDir === 'asc' ? 'desc' : 'asc';
      } else {
        state.sortKey = key;
        state.sortDir = key === 'team' || key === 'status' ? 'asc' : 'desc';
      }
      render();
    });
  });

  loadBtn.addEventListener('click', () => {
    const id = leagueInput.value.trim();
    if (id) loadAll(id);
  });
  leagueInput.addEventListener('keydown', e => { if (e.key === 'Enter') loadBtn.click(); });
  refreshBtn.addEventListener('click', () => { if (state.leagueId) loadAll(state.leagueId); });
  searchInput.addEventListener('input', () => render());

  // Auto-load
  function initAutoLoad() {
    const params = new URLSearchParams(location.search);
    const pid = params.get('league') || params.get('league_id') || params.get('id');
    const saved = localStorage.getItem('sleeper_league_id');
    const id = pid || saved;
    if (id) {
      leagueInput.value = id;
      loadAll(id);
    } else {
      loadingState.classList.add('hidden');
      emptyState.classList.remove('hidden');
    }
  }

  initAutoLoad();
})();
</script>
</body>
</html>
