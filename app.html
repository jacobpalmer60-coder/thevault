<script>
const SHEET_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRZY-Dra8s3j-ocJ7OK6yTs3BFcj-A_WeiIX35u49fg2xA8Y3Pg-nnOHVOnfZGOEAFWrj1EFBOV6qzi/pub?gid=2077026411&single=true&output=csv';
const SLEEPER_BASE = 'https://api.sleeper.app/v1';

const state = {
  leagueId: null,
  league: null,
  rosters: [],
  users: [],
  tradedPicks: [],
  players: {},
  valuesById: new Map(),
  valuesByName: new Map(),
  ppgById: new Map(),
  ppgByName: new Map(),
  ageById: new Map(),
  posById: new Map(),
  teams: [],
  sortKey: 'total',
  sortDir: 'desc',
  search: '',
};

const $ = sel => document.querySelector(sel);
const loadingEl = $('#loading');
const loadingStep = $('#loadingStep');

function showLoading(msg='Loading'){ loadingEl.classList.remove('hidden'); loadingEl.classList.add('flex'); loadingStep.textContent = msg; }
function hideLoading(){ loadingEl.classList.add('hidden'); loadingEl.classList.remove('flex'); }
function setStep(m){ loadingStep.textContent = m; }

function parseCSV(text){
  const rows=[]; let cur='', row=[], inQ=false;
  for(let i=0;i<text.length;i++){
    const c=text[i], n=text[i+1];
    if(inQ){
      if(c=='"' && n=='"'){cur+='"';i++;}
      else if(c=='"'){inQ=false;}
      else cur+=c;
    }else{
      if(c=='"') inQ=true;
      else if(c==','){row.push(cur);cur='';}
      else if(c=='\n'){row.push(cur);rows.push(row);cur='';row=[];}
      else if(c=='\r'){/*ignore*/}
      else cur+=c;
    }
  }
  if(cur!==''||row.length){row.push(cur);rows.push(row);}
  return rows.filter(r=>r.length>1);
}

function buildMapsFromSheet(rows){
  const header = rows[0].map(h=>h.trim().toLowerCase());
  const idx = name=> {
    const cands = Array.isArray(name)?name:[name];
    for(const cand of cands){
      const i = header.findIndex(h=>h===cand); if(i>=0) return i;
    }
    for(const cand of cands){
      const i = header.findIndex(h=>h.includes(cand)); if(i>=0) return i;
    }
    return -1;
  };
  const nameIdx = idx(['player','name','full_name','player_name']);
  const idIdx = idx(['sleeper_id','sleeper','player_id','id']);
  const posIdx = idx(['pos','position']);
  const ageIdx = idx(['age']);
  const ppgIdx = idx(['ppg','pts_per_game','fantasypointspergame','ppg_ppr']);
  const valSfIdx = idx(['sf','superflex','value_sf','sf_value','value superflex']);
  const valIdx = idx(['value','1qb','value_1qb']);

  state.valuesById.clear(); state.valuesByName.clear();
  state.ppgById.clear(); state.ppgByName.clear();
  state.ageById.clear(); state.posById.clear();

  for(let i=1;i<rows.length;i++){
    const r = rows[i];
    const name = nameIdx>=0? (r[nameIdx]||'').trim(): '';
    const id = idIdx>=0? (r[idIdx]||'').trim(): '';
    const pos = posIdx>=0? (r[posIdx]||'').trim().toUpperCase(): '';
    const age = ageIdx>=0? parseFloat(r[ageIdx]): NaN;
    const ppg = ppgIdx>=0? parseFloat(r[ppgIdx]): NaN;
    let val = NaN;
    if(valSfIdx>=0) val = parseFloat(r[valSfIdx]);
    if(!isFinite(val) && valIdx>=0) val = parseFloat(r[valIdx]);

    const keyName = name.toLowerCase();
    if(id){ 
      if(isFinite(val)) state.valuesById.set(id, val);
      if(isFinite(ppg)) state.ppgById.set(id, ppg);
      if(isFinite(age)) state.ageById.set(id, age);
      if(pos) state.posById.set(id, pos);
    }
    if(keyName){
      if(isFinite(val)) state.valuesByName.set(keyName, val);
      if(isFinite(ppg)) state.ppgByName.set(keyName, ppg);
    }
  }
}

function getPlayerValue(pid, pname){
  if(state.valuesById.has(pid)) return state.valuesById.get(pid);
  const key = pname.toLowerCase();
  if(state.valuesByName.has(key)) return state.valuesByName.get(key);
  return 0;
}
function getPlayerPPG(pid, pname){
  if(state.ppgById.has(pid)) return state.ppgById.get(pid);
  const key = pname.toLowerCase();
  if(state.ppgByName.has(key)) return state.ppgByName.get(key);
  return 0;
}
function getPlayerAge(pid){
  if(state.ageById.has(pid)) return state.ageById.get(pid);
  const p = state.players[pid];
  if(p && p.age) return p.age;
  return null;
}

function initials(name){
  const parts = name.trim().split(/\s+/);
  if(parts.length===1) return parts[0].slice(0,2).toUpperCase();
  return (parts[0][0]+parts[parts.length-1][0]).toUpperCase();
}

function fmtNum(n, digits=0){
  if(!isFinite(n)) return '—';
  if(n>=1000) return (n/1000).toFixed(digits===0?0:1)+'k';
  return Math.round(n).toLocaleString();
}
function fmtPPG(n){ return isFinite(n)? n.toFixed(1) : '—'; }
function fmtAge(n){ return isFinite(n)? n.toFixed(1) : '—'; }

async function fetchJSON(url){
  const res = await fetch(url);
  if(!res.ok) throw new Error(`Fetch ${url} failed ${res.status}`);
  return res.json();
}
async function fetchText(url){
  const res = await fetch(url);
  if(!res.ok) throw new Error(`Fetch ${url} failed`);
  return res.text();
}

function computePickOwnership(){
  const rosters = state.rosters;
  const picks = state.tradedPicks || [];
  const league = state.league;
  const currentYear = parseInt(league.season);
  const years = [currentYear, currentYear+1, currentYear+2];
  const rounds = [1,2,3,4];
  // init ownership map: key = `${season}-${round}-${originalRosterId}` -> ownerId
  const own = new Map();
  for(const r of rosters){
    for(const y of years){
      for(const rd of rounds){
        const key = `${y}-${rd}-${r.roster_id}`;
        own.set(key, r.roster_id);
      }
    }
  }
  for(const p of picks){
    const season = parseInt(p.season);
    if(!years.includes(season)) continue;
    const key = `${season}-${p.round}-${p.roster_id}`;
    if(own.has(key)){
      own.set(key, p.owner_id);
    }
  }
  // compute projected pick slot by roster (worst first)
  const sorted = [...rosters].sort((a,b)=>{
    const wa=a.settings?.wins||0, wb=b.settings?.wins||0;
    if(wa!==wb) return wa-wb;
    const pa=a.settings?.fpts||0, pb=b.settings?.fpts||0;
    return pa-pb;
  });
  const slotByRoster = new Map();
  sorted.forEach((r,i)=> slotByRoster.set(r.roster_id, i+1));
  const nTeams = rosters.length || 12;

  const pickValuesByRoster = new Map();
  for(const r of rosters) pickValuesByRoster.set(r.roster_id, {sum:0, count:0, details:[]});

  const roundRanges = {
    1:{max:8000,min:3000},
    2:{max:2500,min:1200},
    3:{max:1000,min:500},
    4:{max:400,min:200},
  };
  for(const [key, ownerId] of own.entries()){
    const [season, round, origRosterId] = key.split('-').map(Number);
    const yearOffset = season - currentYear;
    const range = roundRanges[round] || {max:100,min:50};
    const slot = yearOffset===0 ? (slotByRoster.get(origRosterId)|| Math.ceil(nTeams/2)) : Math.ceil(nTeams/2);
    const t = (slot-1)/(nTeams-1);
    let base = range.max - t*(range.max-range.min);
    // future depreciation
    base *= Math.pow(0.82, yearOffset);
    const entry = pickValuesByRoster.get(ownerId);
    if(entry){ entry.sum += base; entry.count++; entry.details.push({season, round, slot, value:base}); }
  }
  return pickValuesByRoster;
}

function buildTeams(){
  const rosters = state.rosters;
  const users = state.users;
  const userById = new Map(users.map(u=>[u.user_id, u]));
  const pickMap = computePickOwnership();

  const teams = rosters.map(r=>{
    const user = userById.get(r.owner_id) || {};
    const teamName = user.metadata?.team_name || user.display_name || `Team ${r.roster_id}`;
    const ownerName = user.display_name || '—';
    const playerIds = [...(r.players||[]), ...(r.taxi||[]), ...(r.reserve||[])].filter(Boolean);
    const playerObjs = playerIds.map(pid=>{
      const p = state.players[pid] || {};
      const name = p.full_name || `${p.first_name||''} ${p.last_name||''}`.trim() || pid;
      const pos = p.position || state.posById.get(pid) || 'UNK';
      const age = getPlayerAge(pid);
      const val = getPlayerValue(pid, name);
      const ppg = getPlayerPPG(pid, name);
      return {pid, name, pos, age, val, ppg};
    });

    const totals = {QB:0,RB:0,WR:0,TE:0};
    let ppgSum=0, ageSum=0, ageCnt=0;
    for(const pl of playerObjs){
      if(totals[pl.pos]!==undefined) totals[pl.pos]+=pl.val;
      ppgSum += pl.ppg;
      if(pl.age && pl.age>0){ ageSum+=pl.age; ageCnt++; }
    }
    const pickInfo = pickMap.get(r.roster_id) || {sum:0};
    const picksVal = pickInfo.sum;
    const totalVal = totals.QB+totals.RB+totals.WR+totals.TE+picksVal;
    const avgAge = ageCnt? ageSum/ageCnt : null;
    const wins = r.settings?.wins||0, losses=r.settings?.losses||0, ties=r.settings?.ties||0;
    const rec = `${wins}-${losses}${ties?`-${ties}`:''}`;
    return {
      roster_id: r.roster_id,
      teamName,
      ownerName,
      rec,
      wins, losses, ties,
      total: totalVal,
      qb: totals.QB,
      rb: totals.RB,
      wr: totals.WR,
      te: totals.TE,
      picks: picksVal,
      ppg: ppgSum,
      age: avgAge,
      players: playerObjs,
    };
  });
  state.teams = teams;
}

function computeRanks(){
  const metrics = ['total','qb','rb','wr','te','picks','ppg','age'];
  const ranks = {};
  for(const m of metrics){
    const arr = state.teams.map(t=>({id:t.roster_id, v:t[m]}));
    arr.sort((a,b)=>{
      if(m==='age'){ // ascending
        if(a.v==null) return 1;
        if(b.v==null) return -1;
        return a.v - b.v;
      }else{
        return (b.v||0) - (a.v||0);
      }
    });
    const map = new Map();
    let rank=1;
    for(let i=0;i<arr.length;i++){
      if(i>0 && arr[i].v !== arr[i-1].v) rank = i+1;
      map.set(arr[i].id, rank);
    }
    ranks[m]=map;
  }
  state.ranks = ranks;
  // max for heat
  const maxes = {};
  for(const m of metrics){
    maxes[m] = Math.max(...state.teams.map(t=> t[m]||0));
  }
  state.maxes = maxes;
}

function computeStatsBar(){
  const metrics = ['total','qb','rb','wr','te','picks','ppg','age'];
  const cards = metrics.map(m=>{
    const vals = state.teams.map(t=>t[m]).filter(v=>isFinite(v));
    const avg = vals.reduce((a,b)=>a+b,0)/vals.length;
    const sorted = [...vals].sort((a,b)=>a-b);
    const med = sorted.length%2? sorted[(sorted.length-1)/2] : (sorted[sorted.length/2-1]+sorted[sorted.length/2])/2;
    const label = m.toUpperCase();
    const fmt = m==='ppg'? fmtPPG : m==='age'? fmtAge : fmtNum;
    return {label, avg:fmt(avg,1), med:fmt(med,1)};
  });
  const el = $('#statsBar');
  el.innerHTML = cards.map(c=>`
    <div class="glass rounded-xl px-3 py-2">
      <div class="text-[10px] uppercase tracking-wider text-slate-500 mono">${c.label}</div>
      <div class="text-sm font-medium"><span class="text-amber-300">${c.avg}</span> <span class="text-slate-500">/</span> <span class="text-slate-300">${c.med}</span></div>
      <div class="text-[10px] text-slate-500">avg / med</div>
    </div>
  `).join('');
}

function heatStyle(value, max, rgb){
  if(!max) return '';
  const intensity = Math.min(1, value / max);
  const alpha = 0.06 + intensity*0.30;
  return `background: rgba(${rgb}, ${alpha});`;
}

const POS_COLOR = {
  QB:'6,182,212',
  RB:'16,185,129',
  WR:'139,92,246',
  TE:'249,115,22',
  PICKS:'245,158,11',
  TOTAL:'245,158,11',
  PPG:'56,189,248',
  AGE:'148,163,184',
};

function renderTable(){
  const tbody = $('#tbody');
  const q = state.search.toLowerCase().trim();
  let teams = [...state.teams];
  // filter
  if(q){
    teams = teams.filter(t=>{
      if(t.teamName.toLowerCase().includes(q)) return true;
      return t.players.some(p=>p.name.toLowerCase().includes(q));
    });
  }
  // sort
  const key = state.sortKey;
  const dir = state.sortDir;
  const rankKeyMap = {rank:'total'};
  const sortKey = rankKeyMap[key] || key;
  teams.sort((a,b)=>{
    const av = a[sortKey]??0, bv = b[sortKey]??0;
    if(sortKey==='age'){
      const cmp = (av??Infinity) - (bv??Infinity);
      return dir==='asc'? cmp : -cmp;
    }
    const cmp = (bv??0) - (av??0);
    return dir==='asc'? -cmp : cmp;
  });
  $('#teamCount').textContent = `${teams.length} teams`;
  tbody.innerHTML = teams.map((t,idx)=>{
    const highlight = q && t.players.some(p=>p.name.toLowerCase().includes(q));
    const rankTotal = state.ranks.total.get(t.roster_id);
    const cell = (m, val, fmtFn, rgb, align='right')=>{
      const rank = state.ranks[m].get(t.roster_id);
      const max = state.maxes[m];
      const style = heatStyle(val||0, max, rgb);
      return `<td class="px-3 py-3 align-top" style="${style}">
        <div class="flex flex-col items-${align==='right'?'end':'start'}">
          <div class="mono font-medium">${fmtFn(val)}</div>
          <div class="text-[10px] px-1.5 py-0.5 rounded-full bg-black/40 border border-white/10 mt-1 mono text-slate-400">#${rank}</div>
        </div>
      </td>`;
    };
    return `
    <tr class="hover:bg-white/[0.03] transition ${highlight?'ring-2 ring-amber-500/60 ring-inset':''}">
      <td class="px-4 py-3 mono text-slate-500">${idx+1}</td>
      <td class="px-4 py-3">
        <div class="flex items-center gap-3">
          <div class="w-9 h-9 rounded-xl bg-gradient-to-br from-amber-500/20 to-orange-600/20 border border-amber-500/20 flex items-center justify-center text-xs font-bold text-amber-200 mono">${initials(t.teamName)}</div>
          <div>
            <div class="font-semibold leading-tight">${t.teamName}</div>
            <div class="text-xs text-slate-500">${t.ownerName}</div>
          </div>
        </div>
      </td>
      <td class="px-4 py-3 mono text-slate-300">${t.rec}</td>
      ${cell('total', t.total, v=>fmtNum(v,1), POS_COLOR.TOTAL)}
      ${cell('qb', t.qb, v=>fmtNum(v), POS_COLOR.QB)}
      ${cell('rb', t.rb, v=>fmtNum(v), POS_COLOR.RB)}
      ${cell('wr', t.wr, v=>fmtNum(v), POS_COLOR.WR)}
      ${cell('te', t.te, v=>fmtNum(v), POS_COLOR.TE)}
      ${cell('picks', t.picks, v=>fmtNum(v), POS_COLOR.PICKS)}
      ${cell('ppg', t.ppg, fmtPPG, POS_COLOR.PPG)}
      ${cell('age', t.age, fmtAge, POS_COLOR.AGE)}
    </tr>`;
  }).join('');
}

function updateSortIndicators(){
  document.querySelectorAll('th[data-key]').forEach(th=>{
    const key = th.dataset.key;
    const isActive = key===state.sortKey;
    th.classList.toggle('text-amber-300', isActive);
    // remove old arrow
    th.querySelector('.sort-arrow')?.remove();
    if(isActive){
      const arrow = document.createElement('span');
      arrow.className='sort-arrow ml-1';
      arrow.textContent = state.sortDir==='desc'?'▼':'▲';
      th.appendChild(arrow);
    }
  });
}

async function loadLeague(leagueId){
  try{
    showLoading();
    setStep('Fetching league...');
    state.leagueId = leagueId;
    localStorage.setItem('sleeperLeagueId', leagueId);
    const [league, rosters, users, tradedPicks] = await Promise.all([
      fetchJSON(`${SLEEPER_BASE}/league/${leagueId}`),
      fetchJSON(`${SLEEPER_BASE}/league/${leagueId}/rosters`),
      fetchJSON(`${SLEEPER_BASE}/league/${leagueId}/users`),
      fetchJSON(`${SLEEPER_BASE}/league/${leagueId}/traded_picks`).catch(()=>[]),
    ]);
    state.league = league; state.rosters = rosters; state.users = users; state.tradedPicks = tradedPicks;
    setStep('Fetching players DB...');
    if(Object.keys(state.players).length===0){
      state.players = await fetchJSON(`${SLEEPER_BASE}/players/nfl`);
    }
    setStep('Fetching values CSV...');
    const csvText = await fetchText(SHEET_CSV);
    const rows = parseCSV(csvText);
    buildMapsFromSheet(rows);
    setStep('Computing...');
    buildTeams();
    computeRanks();
    computeStatsBar();
    renderTable();
    updateSortIndicators();
    $('#leagueMeta').textContent = `${league.name} • ${rosters.length} teams`;
    $('#lastUpdated').textContent = new Date().toLocaleString();
    hideLoading();
  }catch(err){
    hideLoading();
    console.error(err);
    alert('Failed to load league: '+err.message);
  }
}

function initEvents(){
  $('#loadBtn').addEventListener('click', ()=>{
    const id = $('#leagueInput').value.trim();
    if(id) loadLeague(id);
  });
  $('#leagueInput').addEventListener('keydown', e=>{
    if(e.key==='Enter'){ $('#loadBtn').click(); }
  });
  $('#search').addEventListener('input', e=>{
    state.search = e.target.value;
    renderTable();
  });
  document.querySelectorAll('th[data-key]').forEach(th=>{
    th.addEventListener('click', ()=>{
      const key = th.dataset.key;
      if(state.sortKey===key){
        state.sortDir = state.sortDir==='desc'?'asc':'desc';
      }else{
        state.sortKey = key;
        state.sortDir = (key==='age' || key==='rank')?'asc':'desc';
        if(key==='age') state.sortDir='asc';
      }
      updateSortIndicators();
      renderTable();
    });
  });
}

function autoLoad(){
  const params = new URLSearchParams(location.search);
  const urlLeague = params.get('league');
  const stored = localStorage.getItem('sleeperLeagueId');
  const leagueId = urlLeague || stored || '';
  if(leagueId){
    $('#leagueInput').value = leagueId;
    loadLeague(leagueId);
  }
}

initEvents();
autoLoad();
</script>
</body>
</html>
