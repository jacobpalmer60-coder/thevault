<body class="min-h-screen bg-[#070607] text-amber-100 selection:bg-amber-500/30">
  <div class="max-w-[1280px] mx-auto px-4 py-6 lg:py-8">
    <!-- Header -->
    <div class="flex flex-col lg:flex-row lg:items-end lg:justify-between gap-6 mb-6">
      <div>
        <h1 class="text-[32px] lg:text-[40px] font-bold leading-tight tracking-tight">

        </h1>
        <p class="text-amber-200/70 text-sm mt-1">Roster Audit • Gold / Amber dashboard</p>
      </div>

    <!-- Tier Legend -->
    <div class="bg-[#0d0b10] border border-amber-900/30 rounded-2xl p-4 mb-6">
      <div class="flex flex-wrap items-center gap-2.5">
        <span class="text-xs uppercase tracking-wider text-amber-300/60 mr-1">Tiers</span>
        <span class="tier-platinum text-[11px] font-bold px-2.5 py-1 rounded-full">PLATINUM</span>

        <span class="tier-bronze text-[11px] font-bold px-2.5 py-1 rounded-full">BRONZE</span>
        <span class="tier-copper text-[11px] font-bold px-2.5 py-1 rounded-full">COPPER</span>
        <span class="tier-iron text-[11px] font-bold px-2.5 py-1 rounded-full">IRON</span>

    <!-- Table -->
    <div class="bg-[#0a080c] border border-amber-900/30 rounded-2xl overflow-hidden">
      <div class="overflow-x-auto scrollbar-thin">
        <table class="w-full text-sm">
          <thead class="bg-[#110e16] border-b border-amber-900/30 text-[11px] uppercase tracking-wider text-amber-200/60">
            <tr>
              <th class="text-left font-semibold px-4 py-3 w-12">#</th>
              <th class="text-left font-semibold px-4 py-3 min-w-[220px]">Team</th>
              <th class="font-semibold px-2 py-3 text-center cursor-pointer select-none hover:text-amber-200" data-sort="qbRank">QB</th>
              <th class="font-semibold px-2 py-3 text-center cursor-pointer select-none hover:text-amber-200" data-sort="rbRank">RB</th>
              <th class="font-semibold px-2 py-3 text-center cursor-pointer select-none hover:text-amber-200" data-sort="wrRank">WR</th>
              <th class="font-semibold px-2 py-3 text-center cursor-pointer select-none hover:text-amber-200" data-sort="teRank">TE</th>
              <th class="font-semibold px-2 py-3 text-center cursor-pointer select-none hover:text-amber-200" data-sort="pkRank">PK</th>
              <th class="font-semibold px-4 py-3 text-right cursor-pointer select-none hover:text-amber-200" data-sort="ppg">PPG</th>
              <th class="font-semibold px-4 py-3 text-right cursor-pointer select-none hover:text-amber-200" data-sort="value">Value</th>
              <th class="font-semibold px-4 py-3 text-right cursor-pointer select-none hover:text-amber-200" data-sort="age">Age</th>
            </tr>

          <tbody id="tbody" class="divide-y divide-amber-950/40"></tbody>
        </table>
      </div>
      <div id="status" class="px-4 py-6 text-center text-amber-200/60 text-sm hidden">Loading…</div>
    </div>

    <div class="mt-8 text-[11px] text-amber-200/40 text-center">
      Data via Sleeper API + Google Sheet. No FORECAST or Title columns.
    </div>
  </div>

<script type="module">
const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRZY-Dra8s3j-ocJ7OK6yTs3BFcj-A_WeiIX35u49fg2xA8Y3Pg-nnOHVOnfZGOEAFWrj1EFBOV6qzi/pub?gid=2077026411&single=true&output=csv';

const $ = sel => document.querySelector(sel);
const tbody = $('#tbody');
const statusEl = $('#status');
const leagueInput = $('#leagueInput');
const loadBtn = $('#loadBtn');
const searchInput = $('#searchInput');
const sfBadge = $('#sfBadge');

let state = {
  leagueId: null,
  league: null,
  teams: [],
  filtered: [],
  sortKey: 'rank',
  sortDir: 'asc',
  expanded: null,
  search: ''
};

function fmtK(n){ if(!n) return '0'; return (n/1000).toFixed(1).replace(/\.0$/,'')+'k'; }
function fmt1(n){ return Number(n||0).toFixed(1); }
function heatClass(rank){ if(rank<=1) return 'heat-1'; if(rank<=3) return 'heat-2'; if(rank<=6) return 'heat-4'; if(rank<=8) return 'heat-7'; return 'heat-9'; }
function tierClass(t){ return 'tier-'+t.toLowerCase(); }

function getParam(){ const url=new URL(location.href); return url.searchParams.get('league_id')||url.searchParams.get('league')||url.searchParams.get('id'); }

async function fetchJSON(url){ const r=await fetch(url); if(!r.ok) throw new Error('Fetch failed '+url); return r.json(); }
async function fetchText(url){ const r=await fetch(url); if(!r.ok) throw new Error('Fetch failed'); return r.text(); }

function parseCSV(text){
  const res = Papa.parse(text, { header:true, skipEmptyLines:true });
  return res.data.map(r=>{
    const o={};
    for(const k in r){ o[k.toLowerCase().trim()]=r[k]; }
    return {
      id: o['sleeper_id']||o['id']||o['player_id']||'',
      name: o['player']||o['player_name']||o['full_name']||o['name']||'',
      pos: (o['pos']||o['position']||'').toUpperCase(),
      team: o['team']||'',
      age: parseFloat(o['age']||o['age_years']||0)||null,
      value: parseFloat(o['value']||o['dynasty_value']||o['val']||0)||0,
      ppg: parseFloat(o['ppg']||o['opt_ppg']||o['fantasy_points']||0)||0,
      raw:o
    };
  });
}

function pickRoundSuffix(n){ return n==1?'st':n==2?'nd':n==3?'rd':'th'; }

function buildPickMaps(players){
  const pickVal = new Map();
  const pickByName = new Map();
  players.forEach(p=>{
    if(p.pos==='PICK' || /pick/i.test(p.name)){
      const key = p.name.toLowerCase().replace(/\s+/g,' ').trim();
      pickVal.set(key, p.value);
      pickByName.set(key, p);
    }
  });
  return { pickVal, pickByName };
}

function estimatePickValue(season, round, pickMaps){
  const { pickVal } = pickMaps;
  const tries = [
    `${season} ${round}${pickRoundSuffix(round)}`,
    `${season} round ${round}`,
    `${season} r${round}`,
    `${season} ${round}`,
  ].map(s=>s.toLowerCase());
  for(const t of tries){ if(pickVal.has(t)) return pickVal.get(t); }
  // fuzzy
  for(const [k,v] of pickVal.entries()){
    if(k.includes(String(season)) && k.includes(String(round))) return v;
  }
  // fallback heuristic
  const base = [5000,2000,800,350,150];
  return base[round-1]||100;
}

function buildPlayerMap(players){
  const map = new Map();
  players.forEach(p=>{
    if(p.id) map.set(String(p.id), p);
    // also by name for picks
  });
  return map;
}

async function loadLeague(leagueId){
  if(!leagueId) return;
  state.leagueId = leagueId;
  localStorage.setItem('roster_audit_league', leagueId);
  leagueInput.value = leagueId;
  statusEl.classList.remove('hidden');
  statusEl.textContent = 'Loading league…';
  tbody.innerHTML = '';

  try{
    const [league, rosters, users, playersText, traded] = await Promise.all([
      fetchJSON(`https://api.sleeper.app/v1/league/${leagueId}`),
      fetchJSON(`https://api.sleeper.app/v1/league/${leagueId}/rosters`),
      fetchJSON(`https://api.sleeper.app/v1/league/${leagueId}/users`),
      fetchText(CSV_URL),
      fetchJSON(`https://api.sleeper.app/v1/league/${leagueId}/traded_picks`).catch(()=>[])
    ]);

    state.league = league;
    const players = parseCSV(playersText);
    const playerMap = buildPlayerMap(players);
    const pickMaps = buildPickMaps(players);

    const isSF = league.roster_positions?.includes('SUPER_FLEX');
    sfBadge.classList.toggle('hidden', !isSF);
    sfBadge.classList.toggle('flex', isSF);

    // map user to roster
    const userById = new Map(users.map(u=>[u.user_id, u]));
    const picksByOwner = new Map();
    traded.forEach(p=>{
      const owner = p.owner_id;
      if(!picksByOwner.has(owner)) picksByOwner.set(owner, []);
      picksByOwner.get(owner).push(p);
    });

    // assume each roster owns its own picks initially, then apply trades
    // build base picks for next 3 seasons
    const seasons = [league.season, Number(league.season)+1, Number(league.season)+2];
    const basePicks = [];
    rosters.forEach(r=>{
      seasons.forEach(s=>{
        [1,2,3,4].forEach(rd=>{
          basePicks.push({ season:s, round:rd, roster_id:r.roster_id, owner_id:r.owner_id });
        });
      });
    });
    // remove traded away, add traded in
    const finalPicksByRoster = new Map();
    rosters.forEach(r=> finalPicksByRoster.set(r.roster_id, []));
    // start with base
    basePicks.forEach(p=>{
      const roster = rosters.find(r=>r.roster_id===p.roster_id);
      if(roster) finalPicksByRoster.get(roster.roster_id).push({...p, owner_id:roster.owner_id});
    });
    // apply trades: remove from previous owner, add to new
    traded.forEach(t=>{
      // find and remove one matching pick from previous owner
      const prevOwnerRoster = rosters.find(r=>r.owner_id===t.previous_owner_id);
      if(prevOwnerRoster){
        const arr = finalPicksByRoster.get(prevOwnerRoster.roster_id);
        const idx = arr.findIndex(p=>p.season==t.season && p.round==t.round);
        if(idx>-1) arr.splice(idx,1);
      }
      const newOwnerRoster = rosters.find(r=>r.owner_id===t.owner_id);
      if(newOwnerRoster){
        finalPicksByRoster.get(newOwnerRoster.roster_id).push({
          season:t.season,
          round:t.round,
          roster_id:t.roster_id,
          owner_id:t.owner_id
        });
      }
    });

    // build teams
    const teams = rosters.map(r=>{
      const user = userById.get(r.owner_id) || {};
      const playerIds = r.players || [];
      const rosterPlayers = playerIds.map(id=>playerMap.get(String(id))).filter(Boolean);

      // positional values
      const posVals = { QB:0, RB:0, WR:0, TE:0 };
      const posAges = { QB:[], RB:[], WR:[], TE:[] };
      const posLists = { QB:[], RB:[], WR:[], TE:[] };
      let totalVal = 0;
      let ageSum=0, ageCnt=0;
      rosterPlayers.forEach(p=>{
        if(posVals.hasOwnProperty(p.pos)){
          posVals[p.pos]+=p.value;
          if(p.age) posAges[p.pos].push(p.age);
          posLists[p.pos].push(p);
        }
        totalVal+=p.value;
        if(p.age){ ageSum+=p.age; ageCnt++; }
      });

      // picks
      const picks = finalPicksByRoster.get(r.roster_id)||[];
      const pickList = picks.map(p=>{
        const val = estimatePickValue(p.season, p.round, pickMaps);
        return { ...p, value:val, label:`${p.season} ${p.round}${pickRoundSuffix(p.round)}` };
      });
      const picksValue = pickList.reduce((s,p)=>s+p.value,0);
      totalVal += picksValue;

      // optimal PPG
      const startSlots = (league.roster_positions||[]).filter(s=>!['BN','IR','TAXI'].includes(s));
      // build eligibility
      const slotElig = startSlots.map(s=>{
        if(s==='FLEX') return ['RB','WR','TE'];
        if(s==='SUPER_FLEX') return ['QB','RB','WR','TE'];
        return [s];
      });
      // sort slots by eligibility size
      const slots = slotElig.map((e,i)=>({elig:e, idx:i}))
        .sort((a,b)=>a.elig.length-b.elig.length);
      const pool = rosterPlayers.map(p=>({...p, used:false}));
      let ppgSum=0;
      slots.forEach(s=>{
        let bestIdx=-1, bestPPG=-1;
        pool.forEach((p,i)=>{
          if(!p.used && s.elig.includes(p.pos) && p.ppg>bestPPG){
            bestPPG=p.ppg; bestIdx=i;
          }
        });
        if(bestIdx>-1){ pool[bestIdx].used=true; ppgSum+=bestPPG; }
      });

      // avg age overall
      const avgAge = ageCnt? ageSum/ageCnt : null;

      // per position avg age
      const posAvgAge = {};
      for(const pos of ['QB','RB','WR','TE']){
        const arr = posAges[pos];
        posAvgAge[pos] = arr.length ? arr.reduce((a,b)=>a+b,0)/arr.length : null;
        posLists[pos].sort((a,b)=>b.value-a.value);
      }
      pickList.sort((a,b)=>b.value-a.value);

      const wins = r.settings?.wins||0;
      const losses = r.settings?.losses||0;

      return {
        roster_id:r.roster_id,
        owner_id:r.owner_id,
        teamName:user.metadata?.team_name || user.display_name || `Team ${r.roster_id}`,
        avatar:user.avatar ? `https://sleepercdn.com/avatars/${user.avatar}` : `https://api.dicebear.com/7.x/initials/svg?seed=${encodeURIComponent(user.display_name||'T')}`,
        posVals,
        posLists,
        posAvgAge,
        picksValue,
        pickList,
        totalValue: totalVal,
        ppg: ppgSum,
        avgAge,
        wins, losses,
        record:`${wins}-${losses}`,
        picksCount: picks.length
      };
    });

    // ranks
    const n = teams.length;
    const rankBy = (key, dir='desc')=>{
      const sorted=[...teams].sort((a,b)=> dir==='desc'?b[key]-a[key]:a[key]-b[key]);
      sorted.forEach((t,i)=>{ t[key+'Rank']=i+1; });
    };
    rankBy('totalValue','desc');
    teams.forEach(t=> t.rank = t.totalValueRank );
    ['QB','RB','WR','TE'].forEach(pos=>{
      const sorted=[...teams].sort((a,b)=>b.posVals[pos]-a.posVals[pos]);
      sorted.forEach((t,i)=> t[pos.toLowerCase()+'Rank']=i+1 );
    });
    {
      const sorted=[...teams].sort((a,b)=>b.picksValue-a.picksValue);
      sorted.forEach((t,i)=> t.pkRank=i+1 );
    }
    rankBy('ppg','desc');

    // percentiles
    teams.forEach(t=>{
      const totalPct = n>1 ? 100*(n - t.totalValueRank)/(n-1) : 100;
      const ppgPct = n>1 ? 100*(n - t.ppgRank)/(n-1) : 100;
      t.totalPct = totalPct;
      t.ppgPct = ppgPct;
    });

    // tiers with priority
    teams.forEach(t=>{
      const totalPct=t.totalPct, ppgPct=t.ppgPct, age=t.avgAge||0;
      let tier='SILVER';
      if(totalPct>=80 && ppgPct>=70 && age<=26.5) tier='PLATINUM';
      else if(totalPct>=60) tier='GOLD';
      else if(totalPct>=30 && totalPct<=60 && age>=27) tier='BRONZE';
      else if(totalPct<=35 && age<=25.5) tier='COPPER';
      else if(totalPct<=20) tier='IRON';
      else if(totalPct>=40 && totalPct<=60) tier='SILVER';
      t.tier = tier;
    });

    // positional value %
    teams.forEach(t=>{
      const total = t.totalValue||1;
      t.posPct = {
        QB: t.posVals.QB/total*100,
        RB: t.posVals.RB/total*100,
        WR: t.posVals.WR/total*100,
        TE: t.posVals.TE/total*100,
        PK: t.picksValue/total*100
      };
    });

    state.teams = teams;
    applyFilterSort();
    statusEl.classList.add('hidden');
  }catch(e){
    console.error(e);
    statusEl.textContent = 'Failed to load. Check League ID.';
    statusEl.classList.remove('hidden');
  }
}

function applyFilterSort(){
  const q = state.search.toLowerCase();
  let arr = state.teams.filter(t=> !q || t.teamName.toLowerCase().includes(q) );
  const key = state.sortKey;
  const dir = state.sortDir;
  arr.sort((a,b)=>{
    let av, bv;
    switch(key){
      case 'rank': av=a.rank; bv=b.rank; break;
      case 'qbRank': av=a.qbRank; bv=b.qbRank; break;
      case 'rbRank': av=a.rbRank; bv=b.rbRank; break;
      case 'wrRank': av=a.wrRank; bv=b.wrRank; break;
      case 'teRank': av=a.teRank; bv=b.teRank; break;
      case 'pkRank': av=a.pkRank; bv=b.pkRank; break;
      case 'ppg': av=a.ppg; bv=b.ppg; break;
      case 'value': av=a.totalValue; bv=b.totalValue; break;
      case 'age': av=a.avgAge||0; bv=b.avgAge||0; break;
      default: av=a.rank; bv=b.rank;
    }
    if(av===bv) return a.rank-b.rank;
    return dir==='asc'? av-bv : bv-av;
  });
  state.filtered = arr;
  renderTable();
}

function renderTable(){
  tbody.innerHTML = '';
  state.filtered.forEach((t,i)=>{
    const tr = document.createElement('tr');
    tr.className = 'hover:bg-amber-500/[0.04] cursor-pointer transition';
    tr.dataset.id = t.roster_id;
    tr.innerHTML = `
      <td class="px-4 py-3 mono text-amber-300/80">${t.rank}</td>
      <td class="px-4 py-3">
        <div class="flex items-center gap-3">
          <img src="${t.avatar}" class="w-9 h-9 rounded-full ring-1 ring-amber-900/50 object-cover"/>
          <div class="min-w-0">
            <div class="font-semibold leading-tight truncate max-w-[180px]">${t.teamName}</div>
            <div class="mt-1"><span class="text-[10px] font-bold px-2 py-0.5 rounded-full ${tierClass(t.tier)}">${t.tier}</span></div>
          </div>
        </div>
      </td>
      ${['qb','rb','wr','te','pk'].map(pos=>`
        <td class="px-2 py-3 text-center">
          <span class="inline-flex items-center justify-center w-7 h-7 rounded-md text-white text-[12px] font-bold ${heatClass(t[pos+'Rank'])}">${t[pos+'Rank']}</span>
        </td>`).join('')}
      <td class="px-4 py-3 text-right mono text-amber-200">${fmt1(t.ppg)}</td>
      <td class="px-4 py-3 text-right mono font-semibold text-amber-100">${fmtK(t.totalValue)}</td>
      <td class="px-4 py-3 text-right mono text-amber-200/90">${t.avgAge?fmt1(t.avgAge):'—'}</td>
    `;
    tr.addEventListener('click', ()=> toggleExpand(t.roster_id));
    tbody.appendChild(tr);

    // detail row
    const detailTr = document.createElement('tr');
    detailTr.className = 'bg-[#0f0c14] hidden';
    detailTr.dataset.detailFor = t.roster_id;
    detailTr.innerHTML = `
      <td colspan="10" class="p-0">
        <div class="border-t-2 border-amber-600/50 bg-[#120f18]">
          ${renderDetail(t)}
        </div>
      </td>
    `;
    tbody.appendChild(detailTr);
  });
}

function renderDetail(t){
  const pct = t.posPct;
  const segments = [
    {k:'QB',c:'bg-sky-600',v:pct.QB},
    {k:'RB',c:'bg-emerald-600',v:pct.RB},
    {k:'WR',c:'bg-amber-600',v:pct.WR},
    {k:'TE',c:'bg-purple-600',v:pct.TE},
    {k:'PK',c:'bg-rose-600',v:pct.PK},
  ];
  const strongest = Object.entries(pct).sort((a,b)=>b[1]-a[1])[0];
  const weakest = Object.entries(pct).filter(([k])=>k!=='PK').sort((a,b)=>a[1]-b[1])[0];
  const pickCap = pct.PK>18?'strong':pct.PK>10?'solid':'limited';
  const scout = `Elite ${strongest[0]} room powers this roster; ${weakest[0]} depth is the clear weakness. ${pickCap} pick capital sets up future flexibility.`;

  const windowYears = t.avgAge<25.5?5:t.avgAge<26.5?3:t.avgAge<27.5?2:1;

  const posCols = ['QB','RB','WR','TE','PICKS'].map(pos=>{
    if(pos==='PICKS'){
      const total = t.picksValue;
      const avgAge = '—';
      const rank = t.pkRank;
      const list = t.pickList.slice(0,8).map(p=>`
        <div class="flex justify-between text-[13px] py-0.5">
          <span class="truncate pr-2">${p.label}</span>
          <span class="mono text-amber-200/80">${fmtK(p.value)}</span>
        </div>
      `).join('');
      return colHtml(pos, rank, total, avgAge, list);
    }else{
      const total = t.posVals[pos];
      const avg = t.posAvgAge[pos]?fmt1(t.posAvgAge[pos]):'—';
      const rank = t[pos.toLowerCase()+'Rank'];
      const list = t.posLists[pos].slice(0,8).map(p=>`
        <div class="flex justify-between text-[13px] py-0.5">
          <span class="truncate pr-2">${p.name}</span>
          <span class="mono text-amber-200/80">${fmtK(p.value)}</span>
        </div>
      `).join('') || `<div class="text-amber-200/40 text-xs">No players</div>`;
      return colHtml(pos, rank, total, avg, list);
    }
  }).join('');

  return `
    <div class="p-4 lg:p-6 space-y-5">
      <!-- % bar -->
      <div class="flex h-9 rounded-lg overflow-hidden border border-amber-900/40">
        ${segments.map(s=>`
          <div class="${s.c} flex items-center justify-center text-[11px] font-bold text-black/80" style="width:${s.v.toFixed(1)}%">
            ${s.v>6? `${s.k} ${s.v.toFixed(0)}%`:''}
          </div>
        `).join('')}
      </div>
      <!-- scout -->
      <div class="text-[13px] text-amber-100/90">${scout}</div>
      <!-- badges -->
      <div class="flex flex-wrap gap-2">
        <span class="bg-[#1c1625] border border-amber-900/40 rounded-full px-3 py-1 text-xs font-semibold">RECORD ${t.record}</span>
        <span class="bg-[#1c1625] border border-amber-900/40 rounded-full px-3 py-1 text-xs font-semibold">WINDOW ${windowYears}yr</span>
        <span class="bg-[#1c1625] border border-amber-900/40 rounded-full px-3 py-1 text-xs font-semibold">PICKS ${t.picksCount}</span>
      </div>
      <!-- grid -->
      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-4">
        ${posCols}
      </div>
    </div>
  `;
}

function colHtml(pos, rank, total, avgAge, listHtml){
  return `
    <div class="bg-[#0b0910] border border-amber-900/30 rounded-xl p-3">
      <div class="flex items-center justify-between mb-2">
        <div class="flex items-center gap-2">
          <span class="inline-flex items-center justify-center w-6 h-6 rounded text-[11px] font-bold text-white ${heatClass(rank)}">${rank}</span>
          <span class="font-bold text-amber-200">${pos}</span>
        </div>
      </div>
      <div class="flex items-baseline justify-between text-[11px] uppercase tracking-wide text-amber-300/60 mb-2">
        <span>Value ${fmtK(total)}</span>
        <span>Age ${avgAge}</span>
      </div>
      <div class="space-y-0.5">
        ${listHtml}
      </div>
    </div>
  `;
}

function toggleExpand(id){
  const rows = tbody.querySelectorAll(`tr[data-detail-for="${id}"]`);
  const isOpen = !rows[0].classList.contains('hidden');
  // close all
  tbody.querySelectorAll('tr[data-detail-for]').forEach(r=>r.classList.add('hidden'));
  if(!isOpen){
    rows.forEach(r=>r.classList.remove('hidden'));
    state.expanded = id;
  }else{
    state.expanded = null;
  }
}

// sorting headers
document.querySelectorAll('th[data-sort]').forEach(th=>{
  th.addEventListener('click', ()=>{
    const key = th.dataset.sort;
    if(state.sortKey===key){
      state.sortDir = state.sortDir==='asc'?'desc':'asc';
    }else{
      state.sortKey = key;
      state.sortDir = key.includes('Rank')?'asc':'desc';
    }
    // update arrows
    document.querySelectorAll('th[data-sort]').forEach(h=>h.classList.remove('text-amber-200'));
    th.classList.add('text-amber-200');
    applyFilterSort();
  });
});

loadBtn.addEventListener('click', ()=> loadLeague(leagueInput.value.trim()));
leagueInput.addEventListener('keydown', e=>{ if(e.key==='Enter') loadLeague(leagueInput.value.trim()); });
searchInput.addEventListener('input', e=>{ state.search=e.target.value; applyFilterSort(); });

// init
const paramId = getParam() || localStorage.getItem('roster_audit_league') || '';
if(paramId){
  leagueInput.value = paramId;
  loadLeague(paramId);
}else{
  statusEl.classList.remove('hidden');
  statusEl.textContent = 'Enter a Sleeper League ID to begin';
}
</script>
</body>
</html>
