<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>THE VAULT • Gold + Picks Fixed</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{color-scheme:dark}
body{font-family:Inter,system-ui;background:#0a0703}
.display{font-family:Cinzel,serif}
.gold-solid{color:#fde68a}
.gold-border{border-image:linear-gradient(90deg,#a16207,#facc15,#a16207) 1}
.rank-pill{min-width:2.5rem}
tr.team-row{cursor:pointer}
tr.team-row:hover{background:rgba(120,80,20,.12)}
</style>
</head>
<body class="text-amber-50 antialiased leading-tight">
<header class="sticky top-0 z-30 border-b border-amber-900/40 bg-black/50">
  <div class="max-w- mx-auto px-6 py-4 flex justify-between items-center">
    <div class="flex items-center gap-3"><div class="size-10 rounded-xl bg-gradient-to-br from-amber-400 to-yellow-600 p-"><div class="size-full rounded- bg-[#140f06] grid place-items-center"><span class="display text-xl gold-solid">V</span></div></div><h1 class="display text-2xl font-bold gold-solid">THE VAULT</h1></div>
    <button id="refresh" class="px-4 py-2 rounded-xl bg-amber-500/10 border border-amber-700/50 text-amber-200 text-sm">Refresh</button>
  </div>
</header>

<main class="max-w- mx-auto px-6 py-8">
  <div id="status" class="mb-6 flex items-center gap-2 text-amber-200/80 text-sm"><div class="size-2 rounded-full bg-amber-400 animate-pulse"></div><span>Loading…</span></div>
  <div class="overflow-hidden rounded- border gold-border bg-[#110c05]/80">
    <div class="overflow-x-auto">
      <table class="w-full text-">
        <thead class="bg-[#1a1307]/90 sticky top-0 border-b border-amber-900/50">
          <tr class="text- uppercase tracking-widest text-amber-200/70">
            <th class="px-4 py-3 w-10"></th>
            <th class="px-4 py-3 text-left min-w-">Team</th>
            <th class="px-3 py-3 text-right sortable" data-sort="prodDelta">Prod</th>
            <th class="px-3 py-3 text-right sortable" data-sort="longDelta">Long</th>
            <th class="px-3 py-3 text-right sortable" data-sort="total">Total</th>
            <th class="px-3 py-3 text-right sortable" data-sort="qb">QB</th>
            <th class="px-3 py-3 text-right sortable" data-sort="rb">RB</th>
            <th class="px-3 py-3 text-right sortable" data-sort="wr">WR</th>
            <th class="px-3 py-3 text-right sortable" data-sort="te">TE</th>
            <th class="px-3 py-3 text-right sortable" data-sort="picksValue">Picks</th>
            <th class="px-3 py-3 text-right sortable" data-sort="age">Age</th>
            <th class="px-3 py-3 text-right sortable" data-sort="opt">Opt PPG</th>
            <th class="px-4 py-3 text-left">Archetype</th>
          </tr>
        </thead>
        <tbody id="tbody" class="divide-y divide-amber-950/60"></tbody>
      </table>
    </div>
  </div>
</main>

<script>
const PROD_DISPLAY_MULT = 1.0;
const LEAGUE_ID = '1313454100225990656';
const VALUES_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRqxhqyuKK6vu_EoYta5FZ_KdOB8M54Q_qBwJKOUF5KcgbTt2dmHn_FuLj9d-FS8-ta5T0zkU0QEGcN/pub?gid=4113168&single=true&output=csv';
const PPG_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRqxhqyuKK6vu_EoYta5FZ_KdOB8M54Q_qBwJKOUF5KcgbTt2dmHn_FuLj9d-FS8-ta5T0zkU0QEGcN/pub?gid=118408869&single=true&output=csv';
const PICK_VALUES_URL = 'REPLACE_WITH_YOUR_AUDIT_CSV_URL';

const SEASONS = [2025,2026,2027];
const ROUNDS = [1,2,3,4];
let teams=[], sort={key:'total',dir:-1}, expanded=new Set();
const norm = s=>String(s||'').toLowerCase().replace(/[^a-z0-9]+/g,'');
function rankClass(rank,total){ if(rank===1) return 'bg-amber-400/25 text-amber-100 border-amber-400/70'; const p=rank/total; return p<=.25?'bg-emerald-600/25 text-emerald-200 border-emerald-700':p<=.5?'bg-sky-600/25 text-sky-200 border-sky-700':p<=.75?'bg-amber-700/25 text-amber-200 border-amber-800':'bg-rose-700/30 text-rose-200 border-rose-800'; }

function archetype(t){
  const {valP,ppgP,age,bal} = t;
  if(valP>=75 && ppgP>=75 && age>=24 && age<=27.5) return ['Elite Contender','from-amber-500/20 to-yellow-500/20 text-amber-200 border-amber-600/40'];
  if(ppgP>=70 && age>=27.5) return ['Aging Contender','from-orange-500/20 to-amber-600/20 text-orange-200 border-orange-600/40'];
  if(ppgP>=60 && ppgP<75 && age>=26) return ['Win-Now Fringe','from-amber-600/20 to-yellow-700/20 text-amber-300 border-amber-700/40'];
  if(age<25.5 && valP>=45 && ppgP>=40 && ppgP<65) return ['Young Riser','from-emerald-600/20 to-teal-600/20 text-emerald-200 border-emerald-600/40'];
  if(ppgP<40 && age<26 && valP>=35) return ['Pick-Rich Rebuilder','from-sky-600/20 to-cyan-600/20 text-sky-200 border-sky-600/40'];
  if(bal>=70) return ['Balanced Core','from-zinc-600/20 to-neutral-600/20 text-zinc-200 border-zinc-600/40'];
  if(valP>=70 && ppgP<=45) return ['High-Variance','from-rose-600/20 to-red-600/20 text-rose-200 border-rose-600/40'];
  if(valP<=25 && ppgP<=25) return ['Stripped Rebuilder','from-stone-700/30 to-stone-800/30 text-stone-300 border-stone-700/40'];
  return ['Stuck in Middle','from-zinc-700/20 to-zinc-800/20 text-zinc-300 border-zinc-700/40'];
}

async function load(){
  const [league,users,rosters,players,valuesCsv,ppgCsv,traded] = await Promise.all([
    fetch(`https://api.sleeper.app/v1/league/${LEAGUE_ID}`).then(r=>r.json()),
    fetch(`https://api.sleeper.app/v1/league/${LEAGUE_ID}/users`).then(r=>r.json()),
    fetch(`https://api.sleeper.app/v1/league/${LEAGUE_ID}/rosters`).then(r=>r.json()),
    fetch(`https://api.sleeper.app/v1/players/nfl`).then(r=>r.json()),
    fetch(VALUES_URL).then(r=>r.text()),
    fetch(PPG_URL).then(r=>r.text()),
    fetch(`https://api.sleeper.app/v1/league/${LEAGUE_ID}/traded_picks`).then(r=>r.json()),
  ]);

  const valMap=new Map(); Papa.parse(valuesCsv,{header:true,skipEmptyLines:true}).data.forEach(r=>{const sid=String(r.sleeper_id||'').trim(); if(sid) valMap.set(sid, parseFloat(r.val_sf_ppr_tep05)||0);});
  const ppgMap=new Map(); Papa.parse(ppgCsv,{header:true,skipEmptyLines:true}).data.forEach(r=>{const n=r.Player||r.player||''; if(n) ppgMap.set(norm(n), parseFloat(r['Avg_PPR_0.5_TEP'])||0);});

  const userMap=new Map(users.map(u=>[u.user_id,u]));
  const rosterByUser=new Map(rosters.map(r=>[r.owner_id,r.roster_id]));
  const slots=(league.roster_positions||[]).filter(s=>!['BN','IR','TAXI'].includes(s));

  function optimal(plist){
    const pool=[...plist].sort((a,b)=>b.ppg-a.ppg); const used=new Set(); let total=0; const starters=[];
    for(const slot of slots){
      let allowed=[slot];
      if(slot==='FLEX') allowed=['RB','WR','TE'];
      if(slot==='SUPER_FLEX') allowed=['QB','RB','WR','TE'];
      if(slot==='WRRB_FLEX') allowed=['RB','WR'];
      if(slot==='REC_FLEX') allowed=['WR','TE'];
      const idx=pool.findIndex(p=>!used.has(p.id)&&allowed.includes(p.pos));
      if(idx>=0){ const p=pool[idx]; used.add(p.id); total+=p.ppg; starters.push({...p,slot}); pool.splice(idx,1); }
    }
    return {total,starters};
  }

  const built = rosters.map(r=>{
    const u=userMap.get(r.owner_id)||{};
    const plist=(r.players||[]).map(pid=>{const p=players[String(pid)]||{}; const name=`${p.first_name||''} ${p.last_name||''}`.trim()||p.full_name||String(pid); return {id:String(pid),name,pos:p.position||'',age:p.age||0,value:valMap.get(String(pid))||0,ppg:ppgMap.get(norm(name))||0,team:p.team||''};});
    const total=plist.reduce((s,p)=>s+p.value,0);
    const qb=plist.filter(p=>p.pos==='QB').reduce((s,p)=>s+p.value,0);
    const rb=plist.filter(p=>p.pos==='RB').reduce((s,p)=>s+p.value,0);
    const wr=plist.filter(p=>p.pos==='WR').reduce((s,p)=>s+p.value,0);
    const te=plist.filter(p=>p.pos==='TE').reduce((s,p)=>s+p.value,0);
    const vAge=plist.filter(p=>p.value>0&&p.age>0); const sumV=vAge.reduce((s,p)=>s+p.value,0); const age=sumV? vAge.reduce((s,p)=>s+p.value*p.age,0)/sumV : 0;
    const {total:opt,starters}=optimal(plist);
    return {rosterId:r.roster_id,teamName:u.metadata?.team_name||u.display_name||'Team',username:u.username||'',total,qb,rb,wr,te,age,opt,starters,plist};
  });

  const leagueAvgOpt = built.reduce((s,t)=>s+t.opt,0)/built.length;

  const ownership = new Map(built.map(t=>[t.rosterId, []]));
  built.forEach(t=>{ SEASONS.forEach(s=> ROUNDS.forEach(r=> ownership.get(t.rosterId).push({season:s,round:r,original:t.rosterId}))); });
  traded.forEach(p=>{
    const orig = p.roster_id;
    const newRoster = rosterByUser.get(p.owner_id);
    if(!newRoster) return;
    const list = ownership.get(orig);
    const idx = list.findIndex(x=>x.season==p.season && x.round==p.round);
    if(idx>=0) list.splice(idx,1);
    ownership.get(newRoster).push({season:p.season,round:p.round,original:orig});
  });

  const sortedOpt = [...built].sort((a,b)=>b.opt-a.opt);
  const tierMap = new Map();
  sortedOpt.forEach((t,i)=> tierMap.set(t.rosterId, i<4?'late': i<8?'mid':'early'));

  let pickVal = new Map(); let usingFallback = false;
  try{
    const resp = await fetch(PICK_VALUES_URL);
    if(!resp.ok) throw new Error('bad');
    const csv = await resp.text();
    Papa.parse(csv,{header:true,skipEmptyLines:true}).data.forEach(r=>{ if(r.season && r.round && r.tier) pickVal.set(`${r.season}-${r.round}-${String(r.tier).toLowerCase()}`, parseFloat(r.value)||0); });
    if(pickVal.size===0) usingFallback = true;
  }catch(e){ usingFallback = true; }
  if(usingFallback){
    ['2025','2026','2027'].forEach(s=>{ [1,2,3,4].forEach(rd=>{ pickVal.set(`${s}-${rd}-early`, rd===1?5000:rd===2?2000:rd===3?800:300); pickVal.set(`${s}-${rd}-mid`, rd===1?3500:rd===2?1400:rd===3?560:210); pickVal.set(`${s}-${rd}-late`, rd===1?2400:rd===2?960:rd===3?384:144); }); });
  }

  built.forEach(t=>{
    const picks = ownership.get(t.rosterId)||[];
    let sum=0;
    picks.forEach(pk=>{
      const tier = tierMap.get(pk.original) || 'mid';
      pk.tier = tier;
      pk.value = pickVal.get(`${pk.season}-${pk.round}-${tier}`) || 0;
      sum += pk.value;
    });
    t.picks = picks.sort((a,b)=> a.season-b.season || a.round-b.round);
    t.picksValue = sum;
    t.capital = t.total + t.picksValue;
    t.cpy = t.capital / Math.max(t.age,1);
  });

  const leagueAvgCpy = built.reduce((s,t)=>s+t.cpy,0)/built.length;
  built.forEach(t=>{
    t.prodDelta = (t.opt / leagueAvgOpt - 1) * 100;
    t.prodPts = t.opt - leagueAvgOpt;
    t.longDelta = (t.cpy / leagueAvgCpy - 1) * 100;
  });
  const vals = built.map(t=>t.total).sort((a,b)=>a-b);
  const opts = built.map(t=>t.opt).sort((a,b)=>a-b);
  built.forEach(t=>{
    t.valP = vals.indexOf(t.total)/(vals.length-1)*100;
    t.ppgP = opts.indexOf(t.opt)/(opts.length-1)*100;
    const sum = t.qb+t.rb+t.wr+t.te||1;
    const shares = [t.qb,t.rb,t.wr,t.te].map(v=>v/sum);
    const mean = shares.reduce((a,b)=>a+b)/4;
    const std = Math.sqrt(shares.reduce((s,x)=>s+(x-mean)**2,0)/4);
    t.bal = Math.max(0, Math.min(100, 100 - std*200));
    const [label,cls] = archetype(t); t.arch = label; t.archCls = cls;
  });

  teams = built;
  render();
  document.getElementById('status').innerHTML = `<div class="size-2 rounded-full bg-emerald-400"></div><span>Live • ${teams.length} teams${usingFallback?' (using fallback pick values)':''}</span>`;
}

function rankMap(key,asc=false){
  const sorted=[...teams].sort((a,b)=> asc? a[key]-b[key] : b[key]-a[key]);
  const map=new Map(); sorted.forEach((t,i)=>map.set(t.rosterId,i+1)); return map;
}

function render(){
  const tbody=document.getElementById('tbody');
  const data=[...teams].sort((a,b)=>{const av=a[sort.key],bv=b[sort.key]; return sort.dir*(av>bv?1:av<bv?-1:0);});
  const rProd=rankMap('prodDelta'), rLong=rankMap('longDelta'), rT=rankMap('total'), rQ=rankMap('qb'), rR=rankMap('rb'), rW=rankMap('wr'), rE=rankMap('te'), rP=rankMap('picksValue'), rA=rankMap('age',true), rO=rankMap('opt');
  tbody.innerHTML = data.map(t=>{
    const exp = expanded.has(t.rosterId);
    return `<tr class="team-row ${exp?'expanded':''}" data-id="${t.rosterId}">
      <td class="px-4 py-3"><svg class="size-4 text-amber-400 ${exp?'rotate-90':''}" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="m9 18 6-6" stroke-width="2"/></svg></td>
      <td class="px-4 py-3"><div class="font-semibold whitespace-nowrap">${t.teamName}</div><div class="text- text-amber-200/60 whitespace-nowrap">@${t.username}</div></td>
      <td class="px-3 py-3 text-right whitespace-nowrap"><span class="rank-pill mr-2 inline-flex px-1.5 py-0.5 rounded border text- ${rankClass(rProd.get(t.rosterId),teams.length)}">#${rProd.get(t.rosterId)}</span><div class="inline-flex flex-col items-end"><span class="${t.prodDelta>=0?'text-emerald-300':'text-rose-300'}">${t.prodDelta>=0?'+':''}${(t.prodDelta*PROD_DISPLAY_MULT).toFixed(0)}%</span><span class="text- text-amber-200/50">(${t.prodPts>=0?'+':''}${t.prodPts.toFixed(1)})</span></div></td>
      <td class="px-3 py-3 text-right whitespace-nowrap"><span class="rank-pill mr-2 inline-flex px-1.5 py-0.5 rounded border text- ${rankClass(rLong.get(t.rosterId),teams.length)}">#${rLong.get(t.rosterId)}</span><span class="${t.longDelta>=0?'text-emerald-300':'text-rose-300'}">${t.longDelta>=0?'+':''}${t.longDelta.toFixed(0)}%</span></td>
      <td class="px-3 py-3 text-right whitespace-nowrap"><span class="rank-pill mr-2 inline-flex px-1.5 py-0.5 rounded border text- ${rankClass(rT.get(t.rosterId),teams.length)}">#${rT.get(t.rosterId)}</span>${Math.round(t.total).toLocaleString()}</td>
      <td class="px-3 py-3 text-right whitespace-nowrap"><span class="rank-pill mr-2 inline-flex px-1.5 py-0.5 rounded border text- ${rankClass(rQ.get(t.rosterId),teams.length)}">#${rQ.get(t.rosterId)}</span><span class="text-sky-300">${Math.round(t.qb).toLocaleString()}</span></td>
      <td class="px-3 py-3 text-right whitespace-nowrap"><span class="rank-pill mr-2 inline-flex px-1.5 py-0.5 rounded border text- ${rankClass(rR.get(t.rosterId),teams.length)}">#${rR.get(t.rosterId)}</span><span class="text-emerald-300">${Math.round(t.rb).toLocaleString()}</span></td>
      <td class="px-3 py-3 text-right whitespace-nowrap"><span class="rank-pill mr-2 inline-flex px-1.5 py-0.5 rounded border text- ${rankClass(rW.get(t.rosterId),teams.length)}">#${rW.get(t.rosterId)}</span><span class="text-fuchsia-300">${Math.round(t.wr).toLocaleString()}</span></td>
      <td class="px-3 py-3 text-right whitespace-nowrap"><span class="rank-pill mr-2 inline-flex px-1.5 py-0.5 rounded border text- ${rankClass(rE.get(t.rosterId),teams.length)}">#${rE.get(t.rosterId)}</span><span class="text-amber-300">${Math.round(t.te).toLocaleString()}</span></td>
      <td class="px-3 py-3 text-right whitespace-nowrap"><span class="rank-pill mr-2 inline-flex px-1.5 py-0.5 rounded border text- ${rankClass(rP.get(t.rosterId),teams.length)}">#${rP.get(t.rosterId)}</span><span class="text-amber-200">${Math.round(t.picksValue).toLocaleString()}</span></td>
      <td class="px-3 py-3 text-right whitespace-nowrap"><span class="rank-pill mr-2 inline-flex px-1.5 py-0.5 rounded border text- ${rankClass(rA.get(t.rosterId),teams.length)}">#${rA.get(t.rosterId)}</span>${t.age.toFixed(1)}</td>
      <td class="px-3 py-3 text-right whitespace-nowrap"><span class="rank-pill mr-1 inline-flex px-1.5 py-0.5 rounded border text- ${rankClass(rO.get(t.rosterId),teams.length)}">#${rO.get(t.rosterId)}</span><span class="font-mono">${t.opt.toFixed(1)}</span></td>
      <td class="px-4 py-3 whitespace-nowrap"><span class="inline-flex px-2.5 py-1 rounded-full text- border bg-gradient-to-r ${t.archCls}">${t.arch}</span></td>
    </tr>
    ${exp?`<tr class="bg-[#0e0a05] border-y border-amber-900/40"><td colspan="13" class="p-0"><div class="p-4"><div class="mb-3 text- text-amber-200/80">Draft Capital: ${t.picks.length} picks • ${Math.round(t.picksValue).toLocaleString()} value • CPY ${Math.round(t.cpy).toLocaleString()}</div><div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">${['QB','RB','WR','TE'].map(pos=>{const list=t.plist.filter(p=>p.pos===pos).sort((a,b)=>b.value-a.value);return `<div class="rounded-xl border border-amber-900/40 bg-[#0b0804] p-3"><div class="text- uppercase tracking-widest text-amber-200/70 mb-2">${pos}s</div>${list.map(p=>`<div class="flex justify-between text- py-1"><span class="truncate">${p.name}</span><span class="font-mono">${Math.round(p.value).toLocaleString()}</span></div>`).join('')||`<div class="text- italic text-amber-200/40">No ${pos}s</div>`}</div>`}).join('')}</div></div></td></tr>`:''}`;
  }).join('');
  tbody.querySelectorAll('tr.team-row').forEach(row=> row.addEventListener('click',()=>{ const id=Number(row.dataset.id); expanded.has(id)?expanded.delete(id):expanded.add(id); render(); }));
}
document.querySelectorAll('th.sortable').forEach(th=> th.addEventListener('click',()=>{ const k=th.dataset.sort; if(sort.key===k) sort.dir*=-1; else {sort.key=k; sort.dir=-1;} render(); }));
document.getElementById('refresh').addEventListener('click',load);
load();
</script>
</body>
</html>
