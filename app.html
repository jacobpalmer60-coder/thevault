<!DOCTYPE html>
<html lang="en">

<body class="min-h-screen bg-[#050507] text-zinc-100 antialiased">
<div class="max-w-[1400px] mx-auto px-4 py-6 md:px-8 md:py-10">

  <!-- Header -->
  <header class="flex flex-col lg:flex-row lg:items-end lg:justify-between gap-6 mb-8">
    <div>
      <div class="flex items-center gap-3 mb-2">

          <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M12 2l2.9 6.1 6.7.9-4.8 4.7 1.1 6.7-5.9-3.1-5.9 3.1 1.1-6.7-4.8-4.7 6.7-.9L12 2z" fill="#1a1a1a" opacity=".9"/></svg>
        </div>

    </div>

  <!-- Table Card -->
  <div class="glass rounded-[24px] overflow-hidden">

      <div class="flex items-center gap-3">
        <h2 class="font-semibold text-zinc-100">League Overview</h2>
        <span id="teamCount" class="text-xs px-2 py-0.5 rounded-full bg-zinc-800 text-zinc-400 mono">—</span>

    <div class="overflow-x-auto">

        <thead class="bg-[#07070a] border-b border-zinc-800">

            <th class="text-left font-medium px-5 py-3 w-[220px]"><button class="sort-btn" data-key="team">Team</button></th>
            <th class="text-left font-medium px-4 py-3"><button class="sort-btn" data-key="tierRank">Contender Tier</button></th>
            <th class="text-left font-medium px-4 py-3"><button class="sort-btn" data-key="overallRank">Overall</button></th>
            <th class="text-left font-medium px-4 py-3"><button class="sort-btn" data-key="ppgRank">PPG</button></th>
            <th class="text-left font-medium px-4 py-3"><button class="sort-btn" data-key="qbRank">QB</button></th>
            <th class="text-left font-medium px-4 py-3"><button class="sort-btn" data-key="rbRank">RB</button></th>
            <th class="text-left font-medium px-4 py-3"><button class="sort-btn" data-key="wrRank">WR</button></th>
            <th class="text-left font-medium px-4 py-3"><button class="sort-btn" data-key="teRank">TE</button></th>
            <th class="text-left font-medium px-4 py-3 pr-5"><button class="sort-btn" data-key="draftRank">Draft</button></th>
          </tr>
        </thead>
        <tbody id="tableBody" class="divide-y divide-zinc-900/70"></tbody>
      </table>
    </div>
  </div>

  <footer class="mt-10 text-center text-[11px] text-zinc-600 pb-10">
    Gold theme • Values from CSV • Optimal starters maximize PPG • Draft equity discounted 0.85/yr
  </footer>
</div>

<script>
const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRZY-Dra8s3j-ocJ7OK6yTs3BFcj-A_WeiIX35u49fg2xA8Y3Pg-nnOHVOnfZGOEAFWrj1EFBOV6qzi/pub?gid=2077026411&single=true&output=csv';
const BASELINE = {1:5000,2:2500,3:1200,4:600,5:300};
const DISCOUNT = 0.85;

const state = {
  csvMap: new Map(),
  nameMap: new Map(),
  playersDB: null,
  league: null,
  users: [],
  rosters: [],
  picks: [],
  drafts: [],
  teams: [],
  sortKey: 'overallRank',
  sortDir: 'asc',
  expanded: new Set(),
};

const $ = s => document.querySelector(s);
const fmt = n => Math.round(n).toLocaleString();
const fmt1 = n => (n||0).toFixed(1);

function normalizeName(str){
  if(!str) return '';
  return str.toLowerCase()
    .replace(/[\.\'\-]/g,'')
    .replace(/\s+(jr|sr|ii|iii|iv|v)$/,'')
    .replace(/\s+/g,'')
    .trim();
}

// Robust CSV parser handling quoted fields
function parseCSV(text){
  const rows = [];
  let cur = [], val = '', inQ = false;
  for(let i=0;i<text.length;i++){
    const c = text[i], n = text[i+1];
    if(inQ){
      if(c === '"' && n === '"'){ val+='"'; i++; }
      else if(c === '"'){ inQ = false; }
      else { val += c; }
    }else{
      if(c === '"'){ inQ = true; }
      else if(c === ','){ cur.push(val); val=''; }
      else if(c === '\n'){ cur.push(val); rows.push(cur); cur=[]; val=''; }
      else if(c === '\r'){ /* skip */ }
      else { val += c; }
    }
  }
  if(val.length || cur.length) { cur.push(val); rows.push(cur); }
  return rows;
}

async function loadCSV(){
  setStatus('Loading CSV values…');
  const res = await fetch(CSV_URL);
  if(!res.ok) throw new Error('CSV fetch failed');
  const text = await res.text();
  const rows = parseCSV(text);
  const header = rows[0].map(h=>h.trim().toLowerCase());
  const idx = Object.fromEntries(header.map((h,i)=>[h,i]));
  for(let i=1;i<rows.length;i++){
    const r = rows[i];
    if(r.length < header.length) continue;
    const sleeper_id = r[idx['sleeper_id']]?.trim();
    const name = r[idx['name']]?.trim();
    const value = Number(r[idx['value']])||0;
    const ppg = Number(r[idx['ppg']])||0;
    const pos = r[idx['pos']]?.trim();
    const age = Number(r[idx['age']])||null;
    if(sleeper_id){
      state.csvMap.set(sleeper_id, {value, ppg, name, pos, age});
    }
    if(name){
      state.nameMap.set(normalizeName(name), {value, ppg, name, pos, age, sleeper_id});
    }
  }
  setStatus(`CSV loaded: ${state.csvMap.size.toLocaleString()} players mapped`);
}

async function loadPlayersDB(){
  if(state.playersDB) return;
  setStatus('Loading Sleeper players DB… (large)');
  const res = await fetch('https://api.sleeper.app/v1/players/nfl');
  if(!res.ok) throw new Error('Players DB failed');
  state.playersDB = await res.json();
}

async function loadLeague(leagueId){
  setStatus('Fetching league data…');
  const base = 'https://api.sleeper.app/v1/league/'+leagueId;
  const [league, users, rosters, picks, drafts] = await Promise.all([
    fetch(base).then(r=>r.json()),
    fetch(base+'/users').then(r=>r.json()),
    fetch(base+'/rosters').then(r=>r.json()),
    fetch(base+'/traded_picks').then(r=>r.json()),
    fetch(base+'/drafts').then(r=>r.json()),
  ]);
  state.league = league;
  state.users = users;
  state.rosters = rosters;
  state.picks = picks;
  state.drafts = drafts;

  const userMap = new Map(users.map(u=>[u.user_id,u]));
  const rosterMap = new Map(rosters.map(r=>[r.roster_id,r]));

  // build teams
  const nowYear = new Date().getFullYear();
  const completedSeasons = new Set(drafts.filter(d=>d.status==='complete').map(d=>Number(d.season)));
  const futurePicks = picks.filter(p=>{
    const s = Number(p.season);
    return s >= nowYear && !completedSeasons.has(s);
  });

  // Determine seasons to evaluate for draft capital
  const seasonsSet = new Set(futurePicks.map(p=>Number(p.season)));
  for(let y=nowYear; y<=nowYear+3; y++) seasonsSet.add(y);
  const seasons = [...seasonsSet].filter(s=> s>=nowYear && !completedSeasons.has(s)).sort((a,b)=>a-b);

  const nRosters = rosters.length;

  const teams = rosters.map(roster=>{
    const user = userMap.get(roster.owner_id);
    const teamName = user ? (user.metadata?.team_name || user.display_name) : `Team ${roster.roster_id}`;
    const avatar = user?.avatar;

    const playerIds = new Set([...(roster.players||[]), ...(roster.taxi||[]), ...(roster.reserve||[])]);
    const players = [];
    for(const pid of playerIds){
      const pInfo = state.playersDB[pid];
      if(!pInfo) continue;
      const pos = pInfo.position;
      if(!['QB','RB','WR','TE'].includes(pos)) continue;
      let val = state.csvMap.get(pid);
      if(!val && pInfo.full_name){
        val = state.nameMap.get(normalizeName(pInfo.full_name));
      }
      if(!val){
        console.warn('Missing value for', pid, pInfo.full_name);
        val = {value:0, ppg:0, name:pInfo.full_name, pos, age:pInfo.age||null};
      }
      players.push({
        id: pid,
        name: pInfo.full_name || `${pInfo.first_name} ${pInfo.last_name}`,
        pos,
        age: pInfo.age || val.age || null,
        value: val.value,
        ppg: val.ppg,
        team: pInfo.team || '',
      });
    }

    // positional sums & ages
    const posSum = {QB:0,RB:0,WR:0,TE:0};
    const posAge = {QB:[],RB:[],WR:[],TE:[]};
    for(const pl of players){
      posSum[pl.pos] += pl.value;
      if(pl.age) posAge[pl.pos].push(pl.age);
    }
    const posAvgAge = {};
    for(const p of ['QB','RB','WR','TE']){
      const arr = posAge[p];
      posAvgAge[p] = arr.length ? (arr.reduce((a,b)=>a+b,0)/arr.length) : null;
    }

    // optimal starters
    const rosterPos = league.roster_positions || [];
    const slotCounts = {};
    for(const s of rosterPos) slotCounts[s]=(slotCounts[s]||0)+1;
    const order = ['QB','RB','WR','TE','REC_FLEX','WRRB_FLEX','FLEX','SUPER_FLEX'];
    const slots=[];
    for(const s of order){
      const c = slotCounts[s]||0;
      for(let i=0;i<c;i++) slots.push(s);
    }
    const elig = {
      QB:['QB'],
      RB:['RB'],
      WR:['WR'],
      TE:['TE'],
      FLEX:['RB','WR','TE'],
      SUPER_FLEX:['QB','RB','WR','TE'],
      REC_FLEX:['WR','TE'],
      WRRB_FLEX:['RB','WR'],
    };
    const remaining = players.map(p=>({...p}));
    const starters=[];
    for(const slot of slots){
      const allowed = new Set(elig[slot]||[]);
      let bestIdx=-1, bestPPG=-1;
      for(let i=0;i<remaining.length;i++){
        const pl=remaining[i];
        if(allowed.has(pl.pos) && pl.ppg>bestPPG){
          bestPPG=pl.ppg;
          bestIdx=i;
        }
      }
      if(bestIdx>=0){
        const pick = remaining.splice(bestIdx,1)[0];
        starters.push({...pick, slot});
      }
    }
    const starterPPG = starters.reduce((s,p)=>s+p.ppg,0);

    // draft capital
    const picksOwned = [];
    let pickEquity=0;
    for(const season of seasons){
      const yearsOut = Math.max(0, season-nowYear);
      const discount = Math.pow(DISCOUNT, yearsOut);
      for(let round=1; round<=5; round++){
        // find current owner
        const orig = roster.roster_id;
        // find if this original pick has been traded
        const traded = futurePicks.find(tp=> Number(tp.season)===season && Number(tp.round)===round && Number(tp.roster_id)===orig);
        const ownerId = traded ? Number(traded.owner_id) : orig;
        if(ownerId === roster.roster_id){
          const baseVal = BASELINE[round]||0;
          const val = baseVal * discount;
          pickEquity += val;
          const fromTeam = rosterMap.get(orig);
          const fromUser = fromTeam ? userMap.get(fromTeam.owner_id) : null;
          const fromName = fromUser ? (fromUser.metadata?.team_name || fromUser.display_name) : `Team ${orig}`;
          picksOwned.push({
            season, round, value: val,
            original_roster_id: orig,
            from: fromName,
            isOwn: orig===roster.roster_id,
          });
        }
      }
    }
    // also add picks received from other rosters (where owner_id = this roster but roster_id != this)
    for(const tp of futurePicks){
      if(Number(tp.owner_id)===roster.roster_id && Number(tp.roster_id)!==roster.roster_id){
        const season = Number(tp.season);
        const round = Number(tp.round);
        const yearsOut = Math.max(0, season-nowYear);
        const discount = Math.pow(DISCOUNT, yearsOut);
        const baseVal = BASELINE[round]||0;
        const val = baseVal * discount;
        // avoid double counting if already counted via loop above? The loop above already counts by original roster. The previous loop only iterated orig = this roster. So we need to add received picks.
        pickEquity += val;
        const fromTeam = rosterMap.get(Number(tp.roster_id));
        const fromUser = fromTeam ? userMap.get(fromTeam.owner_id) : null;
        const fromName = fromUser ? (fromUser.metadata?.team_name || fromUser.display_name) : `Team ${tp.roster_id}`;
        picksOwned.push({
          season, round, value: val,
          original_roster_id: Number(tp.roster_id),
          from: fromName,
          isOwn: false,
        });
      }
    }

    const playerValueSum = players.reduce((s,p)=>s+p.value,0);
    const overallValue = playerValueSum + pickEquity;

    return {
      roster_id: roster.roster_id,
      teamName,
      avatar,
      record: `${roster.settings?.wins||0}-${roster.settings?.losses||0}`,
      players,
      posSum,
      posAvgAge,
      starters,
      starterPPG,
      pickEquity,
      picksOwned: picksOwned.sort((a,b)=> a.season - b.season || a.round - b.round),
      playerValueSum,
      overallValue,
    };
  });

  // rankings
  const rank = (arr, getVal) => {
    const sorted = [...arr].sort((a,b)=> getVal(b)-getVal(a));
    const map = new Map();
    sorted.forEach((t,i)=> map.set(t.roster_id, i+1));
    return map;
  };
  const overallRank = rank(teams, t=>t.overallValue);
  const ppgRank = rank(teams, t=>t.starterPPG);
  const qbRank = rank(teams, t=>t.posSum.QB);
  const rbRank = rank(teams, t=>t.posSum.RB);
  const wrRank = rank(teams, t=>t.posSum.WR);
  const teRank = rank(teams, t=>t.posSum.TE);
  const draftRank = rank(teams, t=>t.pickEquity);

  const n = teams.length;
  teams.forEach(t=>{
    t.overallRank = overallRank.get(t.roster_id);
    t.ppgRank = ppgRank.get(t.roster_id);
    t.qbRank = qbRank.get(t.roster_id);
    t.rbRank = rbRank.get(t.roster_id);
    t.wrRank = wrRank.get(t.roster_id);
    t.teRank = teRank.get(t.roster_id);
    t.draftRank = draftRank.get(t.roster_id);
    const pct = (t.overallRank-1)/(n-1||1);
    let tier='Rebuilder', tierClass='bg-zinc-800 text-zinc-300';
    if(pct < 0.2){ tier='Elite'; tierClass='bg-amber-500/15 text-amber-300 ring-1 ring-amber-500/30'; }
    else if(pct < 0.5){ tier='Contender'; tierClass='bg-emerald-500/15 text-emerald-300 ring-1 ring-emerald-500/30'; }
    else if(pct < 0.8){ tier='Middle'; tierClass='bg-sky-500/15 text-sky-300 ring-1 ring-sky-500/30'; }
    t.tier = tier;
    t.tierClass = tierClass;
    t.tierRank = t.overallRank;
  });

  state.teams = teams;
  state.sortKey = 'overallRank';
  state.sortDir = 'asc';
  render();
  updateLeagueMeta();
  setStatus(`Loaded ${teams.length} teams. Values matched from CSV.`);
}

function updateLeagueMeta(){
  const meta = $('#leagueMeta');
  if(!state.league){ meta.classList.add('hidden'); return; }
  meta.classList.remove('hidden');
  const rp = state.league.roster_positions || [];
  const counts = {};
  rp.forEach(p=> counts[p]=(counts[p]||0)+1);
  const parts = Object.entries(counts).filter(([k])=> !['BN'].includes(k)).map(([k,v])=> `${v} ${k}`);
  meta.innerHTML = `
    <div class="flex flex-wrap gap-x-4 gap-y-1">
      <span class="text-zinc-500">League:</span> <span class="text-zinc-200 font-medium">${state.league.name}</span>
      <span class="text-zinc-700">•</span>
      <span class="text-zinc-500">Settings:</span> <span class="text-zinc-300">${parts.join(' • ')}</span>
      <span class="text-zinc-700">•</span>
      <span class="text-zinc-500">Season:</span> <span class="text-zinc-300">${state.league.season}</span>
    </div>`;
  $('#teamCount').textContent = state.teams.length;
}

function setStatus(msg){
  const el = $('#status');
  el.classList.remove('hidden');
  el.textContent = msg;
}

function rankPill(rank){
  const hue = rank===1 ? 'from-amber-400 to-yellow-600 text-black' : rank<=3 ? 'from-zinc-700 to-zinc-800 text-amber-300' : 'from-zinc-800 to-zinc-900 text-zinc-400';
  return `<span class="rank-pill inline-flex items-center justify-center w-9 h-6 rounded-full bg-gradient-to-b ${hue} text-[11px] font-semibold mono">#${rank}</span>`;
}

function tierBadge(t){
  return `<span class="inline-flex items-center px-2.5 py-1 rounded-full text-xs font-medium ${t.tierClass}">${t.tier}</span>`;
}

function sortTeams(){
  const key = state.sortKey;
  const dir = state.sortDir==='asc' ? 1 : -1;
  const get = (t)=>{
    if(key==='team') return t.teamName.toLowerCase();
    if(key==='tierRank') return t.tierRank;
    return t[key];
  };
  return [...state.teams].sort((a,b)=>{
    const av = get(a), bv = get(b);
    if(typeof av === 'string') return av.localeCompare(bv)*dir;
    return (av-bv)*dir;
  });
}

function render(){
  const tbody = $('#tableBody');
  tbody.innerHTML = '';
  const teams = sortTeams();
  for(const t of teams){
    const tr = document.createElement('tr');
    tr.className = 'row-hover cursor-pointer transition';
    tr.dataset.roster = t.roster_id;
    tr.innerHTML = `
      <td class="px-5 py-3">
        <div class="flex items-center gap-3">
          <img src="${t.avatar ? `https://sleepercdn.com/avatars/${t.avatar}` : 'https://sleepercdn.com/images/v2/icons/player_default.webp'}" class="w-9 h-9 rounded-xl object-cover bg-zinc-900 ring-1 ring-zinc-800"/>
          <div>
            <div class="font-semibold leading-tight text-zinc-100">${t.teamName}</div>
            <div class="text-[11px] text-zinc-500 mono">${t.record}</div>
          </div>
        </div>
      </td>
      <td class="px-4 py-3">${tierBadge(t)}</td>
      <td class="px-4 py-3"><div class="flex items-center gap-2">${rankPill(t.overallRank)}<span class="mono text-zinc-200">${fmt(t.overallValue)}</span></div></td>
      <td class="px-4 py-3"><div class="flex items-center gap-2">${rankPill(t.ppgRank)}<span class="mono text-zinc-200">${fmt1(t.starterPPG)}</span></div></td>
      <td class="px-4 py-3"><div class="flex items-center gap-2">${rankPill(t.qbRank)}<span class="mono text-zinc-200">${fmt(t.posSum.QB)}</span></div></td>
      <td class="px-4 py-3"><div class="flex items-center gap-2">${rankPill(t.rbRank)}<span class="mono text-zinc-200">${fmt(t.posSum.RB)}</span></div></td>
      <td class="px-4 py-3"><div class="flex items-center gap-2">${rankPill(t.wrRank)}<span class="mono text-zinc-200">${fmt(t.posSum.WR)}</span></div></td>
      <td class="px-4 py-3"><div class="flex items-center gap-2">${rankPill(t.teRank)}<span class="mono text-zinc-200">${fmt(t.posSum.TE)}</span></div></td>
      <td class="px-4 py-3 pr-5"><div class="flex items-center gap-2">${rankPill(t.draftRank)}<span class="mono text-zinc-200">${fmt(t.pickEquity)}</span></div></td>
    `;
    tr.addEventListener('click', ()=> toggleExpand(t.roster_id));
    tbody.appendChild(tr);

    if(state.expanded.has(t.roster_id)){
      const trExp = document.createElement('tr');
      trExp.className = 'bg-[#060608]';
      trExp.innerHTML = `<td colspan="9" class="p-0"><div class="border-t border-amber-500/20">${renderExpanded(t)}</div></td>`;
      tbody.appendChild(trExp);
    }
  }
  // update sort arrows
  document.querySelectorAll('.sort-btn').forEach(btn=>{
    const k = btn.dataset.key;
    let arrow = '';
    if(k === state.sortKey){
      arrow = state.sortDir==='asc' ? ' ▲' : ' ▼';
    }
    btn.innerHTML = btn.textContent.replace(/ [▲▼]/,'') + arrow;
  });
}

function toggleExpand(id){
  if(state.expanded.has(id)) state.expanded.delete(id);
  else state.expanded.add(id);
  render();
}

function renderExpanded(t){
  const startersChips = t.starters.map(s=>`
    <span class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full bg-zinc-900 ring-1 ring-zinc-800 text-xs">
      <span class="text-[10px] uppercase tracking-wide text-zinc-500">${s.slot}</span>
      <span class="font-medium text-zinc-200">${s.name}</span>
      <span class="mono text-amber-300">${fmt1(s.ppg)}</span>
    </span>
  `).join('');

  const posCards = ['QB','RB','WR','TE'].map(pos=>{
    const list = t.players.filter(p=>p.pos===pos).sort((a,b)=>b.value-a.value);
    const rows = list.map(p=>`
      <div class="flex items-center justify-between py-1.5 border-b border-zinc-900/70 last:border-0">
        <div class="min-w-0">
          <div class="text-sm text-zinc-200 truncate">${p.name}</div>
          <div class="text-[11px] text-zinc-600">${p.team||'FA'} ${p.age? '• '+p.age+'y':''}</div>
        </div>
        <div class="text-right">
          <div class="mono text-xs text-zinc-300">${fmt(p.value)}</div>
          <div class="mono text-[11px] text-zinc-500">${fmt1(p.ppg)}</div>
        </div>
      </div>
    `).join('') || `<div class="text-xs text-zinc-600 py-6 text-center">No players</div>`;
    const total = t.posSum[pos];
    const avgAge = t.posAvgAge[pos] ? t.posAvgAge[pos].toFixed(1)+'y' : '—';
    return `
      <div class="bg-[#0a0a0f] rounded-2xl ring-1 ring-zinc-800 p-4 flex flex-col">
        <div class="flex items-baseline justify-between mb-2">
          <h4 class="font-semibold text-zinc-100">${pos}</h4>
          <div class="text-[11px] text-zinc-500 mono">${fmt(total)} • ${avgAge}</div>
        </div>
        <div>${rows}</div>
      </div>
    `;
  }).join('');

  // Draft capital grouped by year
  const byYear = {};
  t.picksOwned.forEach(p=>{
    (byYear[p.season] ||= []).push(p);
  });
  const draftHtml = Object.keys(byYear).sort().map(yr=>{
    const picks = byYear[yr];
    const chips = picks.map(p=>`
      <div class="flex items-center justify-between bg-zinc-950 ring-1 ring-zinc-800 rounded-xl px-3 py-2">
        <div class="flex items-center gap-2">
          <span class="text-[11px] px-1.5 py-0.5 rounded bg-zinc-800 text-zinc-300 mono">R${p.round}</span>
          <span class="text-sm text-zinc-200">${p.isOwn ? 'Own' : `from ${p.from}`}</span>
        </div>
        <span class="mono text-xs text-amber-300">${fmt(p.value)}</span>
      </div>
    `).join('');
    return `
      <div>
        <div class="text-xs uppercase tracking-wider text-zinc-500 mb-2">${yr}</div>
        <div class="grid sm:grid-cols-2 lg:grid-cols-3 gap-2">${chips}</div>
      </div>
    `;
  }).join('') || `<div class="text-xs text-zinc-600">No future picks recorded</div>`;

  return `
    <div class="p-5 md:p-6 space-y-6">
      <!-- Starters -->
      <div class="bg-[#0a0a0f] rounded-2xl ring-1 ring-zinc-800 p-4">
        <div class="flex flex-wrap items-center justify-between gap-3 mb-3">
          <h4 class="font-semibold text-zinc-100">Optimal Starters</h4>
          <div class="mono text-sm text-amber-300">Total PPG: ${fmt1(t.starterPPG)}</div>
        </div>
        <div class="flex flex-wrap gap-2">${startersChips || '<span class="text-xs text-zinc-600">No starters projected</span>'}</div>
      </div>

      <!-- Positional grids -->
      <div class="grid md:grid-cols-2 xl:grid-cols-4 gap-4">
        ${posCards}
      </div>

      <!-- Draft -->
      <div class="bg-[#0a0a0f] rounded-2xl ring-1 ring-zinc-800 p-4">
        <div class="flex items-baseline justify-between mb-3">
          <h4 class="font-semibold text-zinc-100">Draft Capital</h4>
          <div class="mono text-sm text-zinc-400">Equity: ${fmt(t.pickEquity)}</div>
        </div>
        <div class="space-y-4">${draftHtml}</div>
      </div>
    </div>
  `;
}

// Sorting handlers
document.addEventListener('click', e=>{
  const btn = e.target.closest('.sort-btn');
  if(!btn) return;
  const key = btn.dataset.key;
  if(state.sortKey === key){
    state.sortDir = state.sortDir==='asc' ? 'desc' : 'asc';
  }else{
    state.sortKey = key;
    state.sortDir = key==='team' ? 'asc' : 'asc';
  }
  render();
});

// Load button
$('#loadBtn').addEventListener('click', async ()=>{
  const id = $('#leagueInput').value.trim();
  if(!id) return alert('Enter Sleeper League ID');
  try{
    await loadPlayersDB();
    await loadCSV();
    await loadLeague(id);
    history.replaceState(null,'','?league='+id);
  }catch(err){
    console.error(err);
    setStatus('Error: '+err.message);
    alert('Failed to load league. Check ID and try again.');
  }
});

// Auto-load from URL
(async ()=>{
  const params = new URLSearchParams(location.search);
  const lid = params.get('league');
  if(lid){
    $('#leagueInput').value = lid;
    $('#loadBtn').click();
  }else{
    setStatus('Enter a Sleeper League ID to begin. CSV values will be matched by sleeper_id then name.');
  }
})();
</script>
</body>
</html>
